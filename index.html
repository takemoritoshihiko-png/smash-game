// --- Particles ---
function spawnTitleParticle() {
  titleParticles.push({
    x: Math.random() * 960,
    y: 640 + 10,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -1 - Math.random() * 2,
    size: 1 + Math.random() * 3,
    alpha: 0.3 + Math.random() * 0.5,
    color: ['#FF4444', '#4488FF', '#44FF88', '#FFDD44'][Math.floor(Math.random() * 4)],
    life: 200 + Math.random() * 200
  });
}

function updateParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.alpha *= 0.998;
    if (p.life <= 0 || p.alpha < 0.01) titleParticles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of titleParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Draw character body ---
function drawCharacterBody(x, y, scale, charIndex, time, facingLeft) {
  const ch = characters[charIndex];
  const c = ch.bodyColors;
  const s = scale;
  const bounce = Math.sin(time * 0.03 + charIndex) * 3 * s;
  const cy = y + bounce;

  ctx.save();
  ctx.translate(x, cy);
  if (facingLeft) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 60 * s, 25 * s, 8 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  if (charIndex === 0) {
    // Zen - image
    if (zenImg.complete && zenImg.naturalWidth > 0) {
      const imgW = 70 * s;
      const imgH = 90 * s;
      ctx.drawImage(zenImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 1) {
    // Don - image
    if (donImg.complete && donImg.naturalWidth > 0) {
      const imgW = 80 * s;
      const imgH = 95 * s;
      ctx.drawImage(donImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 2) {
    // Saisoku - image
    if (saisokuImg.complete && saisokuImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(saisokuImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 3) {
    // Meteor - image
    if (meteoImg.complete && meteoImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(meteoImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 4) {
    // Long - image or Canvas fallback

      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(longImg, -imgW / 2, -35 * s, imgW, imgH);
    } else {
      // Canvas描画：機械系・槍使い
      // 体（装甲風）
      ctx.fillStyle = '#5A6AAE';
      ctx.fillRect(-12 * s, -20 * s, 24 * s, 45 * s);
      // 肩アーマー
      ctx.fillStyle = '#7B8CDE';
      ctx.fillRect(-16 * s, -18 * s, 10 * s, 12 * s);
      ctx.fillRect(6 * s, -18 * s, 10 * s, 12 * s);
      // 頭（ヘルメット）
      ctx.fillStyle = '#8899DD';
      ctx.beginPath();
      ctx.arc(0, -25 * s, 12 * s, 0, Math.PI * 2);
      ctx.fill();
      // バイザー
      ctx.fillStyle = '#44FFCC';
      ctx.fillRect(-8 * s, -28 * s, 16 * s, 6 * s);
      // 脚
      ctx.fillStyle = '#4A5A9E';
      ctx.fillRect(-10 * s, 25 * s, 8 * s, 20 * s);
      ctx.fillRect(2 * s, 25 * s, 8 * s, 20 * s);
      // 槍
      ctx.fillStyle = '#AABBEE';
      ctx.fillRect(14 * s, -35 * s, 3 * s, 70 * s);
      // 槍の穂先
      ctx.fillStyle = '#44FFCC';
      ctx.beginPath();
      ctx.moveTo(15.5 * s, -40 * s);
      ctx.lineTo(12 * s, -30 * s);
      ctx.lineTo(19 * s, -30 * s);
      ctx.closePath();
      ctx.fill();
      // 機械パーツ（胸のコア）
      ctx.fillStyle = '#44FFCC';
      ctx.fillRect(-4 * s, -10 * s, 8 * s, 8 * s);
      ctx.fillStyle = '#33DDAA';
      ctx.fillRect(-2 * s, -8 * s, 4 * s, 4 * s);

      ctx.fillRect(2 * s, 25 * s, 8 * s, 22 * s);
      // 体（がっしり）

      // 胸の毛皮

      ctx.lineTo(0, 5 * s);
      ctx.lineTo(10 * s, -10 * s);
      ctx.closePath();
      ctx.fill();
      // 腕（太い）

      ctx.fillRect(11 * s, -14 * s, 7 * s, 28 * s);

      // 耳（三角）

      // 鼻

      // 瞳

      // 尻尾
      ctx.strokeStyle = '#7A6A5A';
      ctx.lineWidth = 4 * s;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-8 * s, 20 * s);
      ctx.quadraticCurveTo(-22 * s, 10 * s, -18 * s, -5 * s);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.lineCap = 'butt';

      ctx.fillStyle = '#D4877A';

      ctx.beginPath(); ctx.ellipse(8 * s, 44 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2); ctx.fill();
      // 体（丸くて大きい）
      ctx.fillStyle = '#3A3A3A';
      ctx.beginPath(); ctx.ellipse(0, 5 * s, 18 * s, 22 * s, 0, 0, Math.PI * 2); ctx.fill();
      // お腹（薄いグレー）
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.ellipse(0, 10 * s, 12 * s, 14 * s, 0, 0, Math.PI * 2); ctx.fill();
      // 腕（丸い）
      ctx.fillStyle = '#3A3A3A';
      ctx.beginPath(); ctx.ellipse(-18 * s, 2 * s, 7 * s, 10 * s, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(18 * s, 2 * s, 7 * s, 10 * s, -0.3, 0, Math.PI * 2); ctx.fill();
      // 頭（丸い）

// Draw character for battle (with animation transforms)
function drawBattleCharacter(x, y, scale, charIndex, time, facingLeft, animData) {
  const s = scale;

  ctx.save();
  ctx.translate(x, y);
  if (facingLeft) ctx.scale(-1, 1);

  // Animation transforms
  let scaleX = 1, scaleY = 1, rotation = 0, bobY = 0;
  let walkLean = 0;

  // Easing utility
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInCubic(t) { return t * t * t; }
  function easeOutElastic(t) {
    if (t === 0 || t === 1) return t;

        let spray;
        if (phase === 'startup') spray = easeIn * 0.3;
        else if (phase === 'active') spray = 0.3 + easeOut * 0.7;
        else spray = 1 - easeOut * 0.5;
        ctx.translate(12 * s, -10 * s);
        if (phase === 'active') {
          ctx.globalAlpha = 0.6 * (1 - phaseT * 0.5);
          ctx.fillStyle = '#2A0040';
          // インクの飛沫
          for (let j = 0; j < 5; j++) {
            const dx = (8 + j * 12) * s * spray;
            const dy = (Math.sin(j * 1.5 + phaseT * 4) * 8) * s;
            const r = (4 - j * 0.5) * s;
            ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI * 2); ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'special') {
        // 必殺: ジェット噴射（突進）
        if (phase === 'active') {
          // ジェットエフェクト（後方に水噴射）
          ctx.globalAlpha = 0.5 * (1 - phaseT);
          ctx.fillStyle = '#66CCFF';
          for (let j = 0; j < 3; j++) {
            const bx = (-15 - j * 12) * s;
            const by = (Math.random() - 0.5) * 10 * s;
            ctx.beginPath(); ctx.ellipse(bx, by, (6 - j * 1.5) * s, 4 * s, 0, 0, Math.PI * 2); ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'aerial') {
        // 空中: 触手回転
        let angle;
        if (phase === 'startup') angle = easeIn * Math.PI * 0.3;
        else if (phase === 'active') angle = Math.PI * 0.3 + easeOut * Math.PI * 1.7;
        else angle = Math.PI * 2 * (1 - easeOut * 0.1);
        ctx.rotate(angle);
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 3 * s;
        ctx.lineCap = 'round';
        for (let j = 0; j < 4; j++) {
          const a = (j / 4) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * 20 * s, Math.sin(a) * 20 * s);
          ctx.stroke();
        }
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active') {
          ctx.globalAlpha = 0.3 * (1 - phaseT);
          ctx.strokeStyle = '#FF80B0';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(0, 0, 22 * s, 0, Math.PI * 2); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'up') {
        // 上: 触手を真上に伸ばす
        let reach;
        if (phase === 'startup') reach = easeIn * 0.5;
        else if (phase === 'active') reach = 0.5 + easeOut * 0.5;
        else reach = 1 - easeOut * 0.5;
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 4 * s;
        ctx.lineCap = 'round';
        const len = reach * 35 * s;
        ctx.beginPath(); ctx.moveTo(-3 * s, -15 * s); ctx.lineTo(-4 * s, -15 * s - len); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(3 * s, -15 * s); ctx.lineTo(4 * s, -15 * s - len); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active') {
          ctx.fillStyle = '#F0A0C0';
          ctx.beginPath(); ctx.arc(-4 * s, -15 * s - len, 3 * s, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(4 * s, -15 * s - len, 3 * s, 0, Math.PI * 2); ctx.fill();
        }
      } else if (atkType === 'side') {
        // 横: 触手でピシャ（通常より長い）
        let reach;
        if (phase === 'startup') reach = -3 * s * easeIn;
        else if (phase === 'active') reach = 26 * s * easeOut;
        else reach = 26 * s * (1 - easeOut);
        ctx.translate(8 * s + reach, -6 * s);
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 4 * s;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-12 * s, 0); ctx.quadraticCurveTo(0, -6 * s, 12 * s, 0); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active' && phaseT < 0.3) {
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#FF80B0';
          ctx.beginPath(); ctx.arc(12 * s, 0, 7 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'down' || atkType === 'downair') {
        // 下/空中下: 触手叩きつけ
        let smash;
        if (phase === 'startup') smash = easeIn * 0.3;
        else if (phase === 'active') smash = 0.3 + easeOut * 0.7;
        else smash = (1 - easeOut) * 0.3;
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 5 * s;
        ctx.lineCap = 'round';
        const dy = smash * 25 * s;
        ctx.beginPath(); ctx.moveTo(-6 * s, 10 * s); ctx.lineTo(-8 * s, 10 * s + dy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(6 * s, 10 * s); ctx.lineTo(8 * s, 10 * s + dy); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.5 * (1 - phaseT * 2.5);
          ctx.fillStyle = '#E05090';
          ctx.beginPath(); ctx.ellipse(0, 10 * s + dy + 5 * s, 12 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    ctx.restore();
  }

  ctx.restore();
}

function drawStar(cx, cy, r, points, ctx) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.4;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// --- Utility: round rect ---
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}


// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle(dt) {
  titleTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 0, 640);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#141428');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.strokeStyle = 'rgba(100, 100, 255, 0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 960; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 640); ctx.stroke();
  }
  for (let y = 0; y < 640; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(960, y); ctx.stroke();
  }

  if (Math.random() < 0.3) spawnTitleParticle();
  updateParticles();
  drawParticles();

  if (titleFadeIn) {
    titleAlpha = Math.min(1, titleAlpha + 0.02);
    if (titleAlpha >= 1) titleFadeIn = false;
  }

  ctx.save();
  ctx.globalAlpha = titleAlpha;

  const glowIntensity = 15 + Math.sin(titleTime * 0.002) * 8;
  ctx.shadowColor = '#FF4466';
  ctx.shadowBlur = glowIntensity;
  ctx.font = 'bold 90px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = '#FF2244';
  ctx.lineWidth = 4;
  ctx.strokeText('SMASH GAME', 480, 200);

  const titleGrad = ctx.createLinearGradient(200, 150, 760, 250);
  titleGrad.addColorStop(0, '#FF6688');
  titleGrad.addColorStop(0.5, '#FFDDDD');
  titleGrad.addColorStop(1, '#FF6688');
  ctx.fillStyle = titleGrad;
  ctx.fillText('SMASH GAME', 480, 200);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#8888CC';
  ctx.fillText('— 格闘アクション —', 480, 270);

  for (let i = 0; i < 4; i++) {
    ctx.globalAlpha = titleAlpha * 0.4;
    drawCharacterBody(180 + i * 210, 430, 0.9, i, titleTime, false);
    ctx.globalAlpha = titleAlpha;
  }

  pressAlpha += pressDir * 0.025;
  if (pressAlpha > 1) { pressAlpha = 1; pressDir = -1; }
  if (pressAlpha < 0.2) { pressAlpha = 0.2; pressDir = 1; }

  ctx.globalAlpha = titleAlpha * pressAlpha;
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.shadowColor = '#FFFFFF';
  ctx.shadowBlur = 10;
  ctx.fillText('PRESS ENTER / CLICK TO START', 480, 535);
  ctx.shadowBlur = 0;

  // Online button
  ctx.globalAlpha = titleAlpha * (0.6 + pressAlpha * 0.4);
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#44DDFF';
  ctx.fillText('O キー : オンライン対戦', 480, 575);

  ctx.restore();
}

// ============================================================
// CHARACTER SELECT SCREEN (2P)
// ============================================================
function drawSelect(dt) {
  selectTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  // Header
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF4466';
  ctx.shadowBlur = 12;
  ctx.fillText('CHARACTER SELECT', 480, 48);
  ctx.shadowBlur = 0;

  // Divider
  const lineGrad = ctx.createLinearGradient(100, 0, 860, 0);
  lineGrad.addColorStop(0, 'transparent');
  lineGrad.addColorStop(0.5, '#FF4466');
  lineGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(100, 66); ctx.lineTo(860, 66); ctx.stroke();

  // Character cards - 2-row grid layout
  const charCount = characters.length;
  const cols = Math.min(charCount, 4);
  const rows = Math.ceil(charCount / cols);
  const cardW = 120;
  const cardH = rows <= 1 ? 220 : 130;
  const gapX = 14;
  const gapY = 10;
  const totalW = cols * cardW + (cols - 1) * gapX;
  const gridStartX = (960 - totalW) / 2;
  const gridStartY = 74;

  for (let i = 0; i < charCount; i++) {
    const ch = characters[i];
    const row = Math.floor(i / cols);
    const col = i % cols;
    const rowCount = (row < rows - 1) ? cols : (charCount - cols * (rows - 1));
    const rowTotalW = rowCount * cardW + (rowCount - 1) * gapX;
    const rowStartX = (960 - rowTotalW) / 2;
    const cx = rowStartX + col * (cardW + gapX);
    const cy = gridStartY + row * (cardH + gapY);
    const isP1 = p1Select === i;
    const isP2 = p2Select === i;

    ctx.save();

    // Card bg
    const cardGrad = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
    cardGrad.addColorStop(0, (isP1 || isP2) ? ch.dark + '88' : '#1a1a2e');
    cardGrad.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cardGrad;
    roundRect(ctx, cx, cy, cardW, cardH, 10);
    ctx.fill();

    // Border - P1 blue, P2 red, both = split
    if (isP1 && isP2) {
      ctx.strokeStyle = '#44AAFF';
      ctx.lineWidth = 3;
      ctx.save();
      ctx.beginPath();
      ctx.rect(cx, cy, cardW / 2, cardH);
      ctx.clip();
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = '#FF4444';
      ctx.beginPath();
      ctx.rect(cx + cardW / 2, cy, cardW / 2, cardH);
      ctx.clip();
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
      ctx.restore();
    } else if (isP1) {
      ctx.strokeStyle = '#44AAFF';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    } else if (isP2) {
      ctx.strokeStyle = '#FF4444';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    }

    // P1/P2 indicators at top
    if (isP1) {
      ctx.fillStyle = '#44AAFF';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('▼ 1P', cx + 6, cy + 14);
      if (p1Confirmed) {
        ctx.fillStyle = '#44FF44';
        ctx.fillText('OK!', cx + 6, cy + 28);
      }
    }
    if (isP2) {
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(gameMode === 'cpu' ? 'CPU ▼' : '2P ▼', cx + cardW - 6, cy + 14);
      if (p2Confirmed) {
        ctx.fillStyle = '#44FF44';
        ctx.fillText('OK!', cx + cardW - 6, cy + 28);
      }
    }

    // Type label
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = ch.accent;
    ctx.fillText(ch.type, cx + cardW / 2, cy + 38);

    // Character
    const charScale = rows <= 1 ? 1.0 : 0.65;
    const charY = rows <= 1 ? cy + 115 : cy + 72;
    drawCharacterBody(cx + cardW / 2, charY, charScale, i, selectTime, false);

    // Name
    ctx.font = rows <= 1 ? 'bold 22px sans-serif' : 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = (isP1 || isP2) ? '#FFF' : '#888';
    ctx.fillText(ch.name, cx + cardW / 2, cy + cardH - 8);

    ctx.restore();
  }

  // Detail panels - P1 left, P2 right
  const detailY = gridStartY + rows * (cardH + gapY) + 10;
  const p1Label = '1P';
  drawSelectDetail(60, detailY, p1Select, p1Label, '#44AAFF', p1Confirmed);
  const p2Label = gameMode === 'cpu' ? 'CPU' : '2P';
  drawSelectDetail(500, detailY, p2Select, p2Label, '#FF4444', p2Confirmed);

  // Mode selection overlay (before char select starts)
  if (!modeSelected) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, 960, 640);

    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.fillText('モード選択', 480, 200);

    const modes = [
      { label: 'VS 対戦', desc: '2人で対戦', icon: 'VS', color: '#44AAFF' },
      { label: 'CPU 対戦', desc: 'CPUと対戦', icon: 'CPU', color: '#FF8844' },
    ];
    const modeIdx = gameMode === 'vs' ? 0 : 1;
    for (let i = 0; i < 2; i++) {
      const mx = 280 + i * 200;
      const my = 270;
      const sel = modeIdx === i;
      ctx.fillStyle = sel ? modes[i].color + '33' : 'rgba(20,20,40,0.8)';
      roundRect(ctx, mx, my, 180, 130, 12); ctx.fill();
      ctx.strokeStyle = sel ? modes[i].color : '#444';
      ctx.lineWidth = sel ? 3 : 1;
      roundRect(ctx, mx, my, 180, 130, 12); ctx.stroke();

      ctx.font = 'bold 32px sans-serif';
      ctx.fillStyle = sel ? modes[i].color : '#888';
      ctx.fillText(modes[i].icon, mx + 90, my + 55);
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = sel ? '#FFF' : '#888';
      ctx.fillText(modes[i].label, mx + 90, my + 85);
      ctx.font = '13px sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText(modes[i].desc, mx + 90, my + 108);
    }

    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('← → で選択  |  Enter で決定  |  ESC で戻る', 480, 460);
    return;
  }

  // Controls
  ctx.textAlign = 'center';
  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#555';
  if (p1Confirmed && p2Confirmed) {
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#44FF44';
    ctx.shadowColor = '#44FF44';
    ctx.shadowBlur = 10;
    if (gameMode === 'cpu') {
      ctx.fillText('READY!  Enter で難易度選択へ', 480, 618);
    } else {
      ctx.fillText('READY TO FIGHT!  Press ENTER to start', 480, 618);
    }
    ctx.shadowBlur = 0;
  } else if (gameMode === 'cpu') {
    ctx.fillText('1P: ← → + Enter で選択   |   A D で CPU キャラ変更   |   ESC で戻る', 480, 618);
  } else {
    ctx.fillText('1P: ← → + Enter で選択   |   2P: A D + Space で選択   |   ESC で戻る', 480, 618);
  }
}

function drawSelectDetail(px, py, charIdx, label, color, isConfirmed) {
  const ch = characters[charIdx];
  const pw = 400;
  const ph = 220;

  ctx.fillStyle = 'rgba(15, 15, 30, 0.85)';
  roundRect(ctx, px, py, pw, ph, 10);
  ctx.fill();
  ctx.strokeStyle = isConfirmed ? '#44FF44' : color;
  ctx.lineWidth = 1.5;
  roundRect(ctx, px, py, pw, ph, 10);
  ctx.stroke();

  // Label
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = color;
  ctx.fillText(label, px + 12, py + 22);

  // Character preview
  drawCharacterBody(px + 80, py + 110, 1.3, charIdx, selectTime, false);

  // Info
  ctx.textAlign = 'left';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#FFF';
  ctx.fillText(ch.name, px + 160, py + 45);

  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = ch.accent;
  ctx.fillText(ch.type, px + 160, py + 65);

  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#AAA';
  ctx.fillText(ch.desc, px + 160, py + 88);

  // Stats
  const stats = ['POW', 'SPD', 'TEC', 'DEF'];
  const statKeys = ['power', 'speed', 'tech', 'defense'];
  const statColors = ['#FF4444', '#44FF88', '#FFDD44', '#4488FF'];

  for (let i = 0; i < 4; i++) {
    const sy = py + 100 + i * 22;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#777';
    ctx.fillText(stats[i], px + 160, sy + 2);

    ctx.fillStyle = '#1a1a2e';
    roundRect(ctx, px + 200, sy - 7, 170, 12, 3);
    ctx.fill();

    const val = ch.stats[statKeys[i]];
    const bw = (val / 5) * 170;
    ctx.fillStyle = statColors[i];
    roundRect(ctx, px + 200, sy - 7, bw, 12, 3);
    ctx.fill();
  }

  if (isConfirmed) {
    ctx.globalAlpha = 0.15 + Math.sin(selectTime * 0.005) * 0.05;
    ctx.fillStyle = '#44FF44';
    roundRect(ctx, px, py, pw, ph, 10);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DIFFICULTY SELECT SCREEN (CPU mode only)
// ============================================================
function drawDifficulty(dt) {
  difficultyTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF8844';
  ctx.shadowBlur = 12;
  ctx.fillText('CPU 難易度選択', 480, 80);
  ctx.shadowBlur = 0;

  const difficulties = [
    { name: 'やさしい', desc: 'ランダムに動く・たまに攻撃', color: '#44CC44', stars: 1 },
    { name: 'ふつう',   desc: '近づいて攻撃・たまにジャンプ', color: '#FFAA22', stars: 2 },
    { name: 'つよい',   desc: '積極追撃・必殺技も使う', color: '#FF4444', stars: 3 },
  ];

  for (let i = 0; i < 3; i++) {
    const d = difficulties[i];
    const cx = 160 + i * 240;
    const cy = 160;
    const w = 210;
    const h = 300;
    const sel = difficultySelected === i;
    const bounce = sel ? Math.sin(difficultyTime * 0.005) * 4 : 0;

    ctx.save();
    if (sel) { ctx.shadowColor = d.color; ctx.shadowBlur = 20; }

    const cg = ctx.createLinearGradient(cx, cy, cx, cy + h);
    cg.addColorStop(0, sel ? d.color + '33' : '#1a1a2e');
    cg.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cg;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.fill();

    ctx.strokeStyle = sel ? d.color : '#444';
    ctx.lineWidth = sel ? 3 : 1;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Stars
    const starY = cy + 50 + bounce;
    for (let s = 0; s < 3; s++) {
      ctx.fillStyle = s < d.stars ? d.color : '#333';
      drawStar(cx + w/2 - 30 + s * 30, starY, 14, 5, ctx);
    }

    // Name
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = sel ? '#FFF' : '#888';
    ctx.fillText(d.name, cx + w / 2, cy + 110 + bounce);

    // Description
    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#AAA';
    const words = d.desc.split('・');
    for (let j = 0; j < words.length; j++) {
      ctx.fillText(words[j], cx + w / 2, cy + 145 + j * 20 + bounce);
    }

    // Character matchup preview
    const p1Ch = characters[p1Select];
    const p2Ch = characters[p2Select];
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#44AAFF';
    ctx.fillText(p1Ch.name, cx + w / 2 - 35, cy + 215 + bounce);
    ctx.fillStyle = '#888';
    ctx.fillText('vs', cx + w / 2, cy + 215 + bounce);
    ctx.fillStyle = '#FF4444';
    ctx.fillText(p2Ch.name, cx + w / 2 + 35, cy + 215 + bounce);

    // Draw mini characters
    drawCharacterBody(cx + w/2 - 40, cy + 260 + bounce, 0.55, p1Select, difficultyTime, false);
    drawCharacterBody(cx + w/2 + 40, cy + 260 + bounce, 0.55, p2Select, difficultyTime, true);

    ctx.restore();
  }

  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';

// Screen shake system
let screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };
function triggerScreenShake(intensity, duration) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
  screenShake.duration = Math.max(screenShake.duration, duration);
}
function updateScreenShake() {
  if (screenShake.duration > 0) {
    screenShake.duration--;
    const t = screenShake.duration > 0 ? screenShake.intensity * (screenShake.duration / 10) : 0;
    screenShake.x = (Math.random() - 0.5) * t * 2;
    screenShake.y = (Math.random() - 0.5) * t * 2;
    if (screenShake.duration <= 0) { screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0; }
  }
}

// === Web Audio API Sound Effects ===
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function makeNoise(ac, duration, volume) {
  const buf = ac.createBuffer(1, ac.sampleRate * duration, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(volume, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.connect(g); g.connect(ac.destination);
  return { src, gain: g };
}

function playHitSound(type) {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;

    if (type === 'normal') {
      // ① Short punch snap
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.08);
      // Click noise
      const n = makeNoise(ac, 0.03, 0.12);
      n.src.start(now); n.src.stop(now + 0.03);

    } else if (type === 'strong') {
      // ② Heavy thud - low bass + noise burst
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.18);
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.25);
      // Impact noise
      const n = makeNoise(ac, 0.08, 0.2);
      n.src.start(now); n.src.stop(now + 0.08);
      // Sub bass body
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(80, now);
      o2.frequency.exponentialRampToValueAtTime(30, now + 0.2);
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.22);

    } else if (type === 'special') {

      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

      g2.gain.setValueAtTime(0.12, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.25);
      // Noise burst
      const n = makeNoise(ac, 0.1, 0.18);
      n.src.start(now); n.src.stop(now + 0.1);

    } else if (type === 'cmd') {
      // ④ Even flashier explosion for command attacks

      o.type = 'sawtooth';
      o.frequency.setValueAtTime(250, now);

      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

      // Rising shimmer

      o2.frequency.setValueAtTime(400, now);

      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

      o2.start(now); o2.stop(now + 0.35);
      // Sub bass

(function() {
  const f = 1/1.68, df = 0.6;
  for (const cmd of dragonCommandDefs) {
    const a = cmd.attack;
    a.startup = Math.max(1, Math.round(a.startup * f));
    a.active = Math.max(1, Math.round(a.active * f));
    a.recovery = Math.max(1, Math.round(a.recovery * f));
    a.damage = Math.round(a.damage * df * 10) / 10;
    if (a.slamActive) a.slamActive = Math.max(1, Math.round(a.slamActive * f));

  }
})();

function addCmdInput(playerId, dir) {
  const now = performance.now();
  cmdInputBuffers[playerId].push(dir);
  cmdInputTimestamps[playerId].push(now);
  // Trim old entries
  while (cmdInputTimestamps[playerId].length > 0 && now - cmdInputTimestamps[playerId][0] > CMD_INPUT_TIMEOUT * 16.67) {
    cmdInputBuffers[playerId].shift();
    cmdInputTimestamps[playerId].shift();
  }
}

function checkCommandInput(player) {
  const pid = player.id;
  const buf = cmdInputBuffers[pid];
  if (buf.length < 3) return null;
  // 天才: ドラゴンモード時は別のcommandDefsを使用
  const cmds = (player.charIdx === 10 && player.dragonMode) ? dragonCommandDefs : commandDefs[player.charIdx];
  if (!cmds) return null;

  for (const cmd of cmds) {
    if (player['cd_' + cmd.cooldownKey] > 0) continue;
    const seq = cmd.seq;
    if (buf.length < seq.length) continue;
    // Check if the last N entries match the sequence
    const tail = buf.slice(buf.length - seq.length);
    // Convert relative directions (F/B) to absolute based on facing
    let match = true;
    for (let i = 0; i < seq.length; i++) {
      let expected = seq[i];
      if (expected === 'F') expected = player.facingLeft ? 'L' : 'R';
      else if (expected === 'B') expected = player.facingLeft ? 'R' : 'L';
      if (tail[i] !== expected) { match = false; break; }
    }
    if (match) {
      // Clear buffer on success
      cmdInputBuffers[pid] = [];
      cmdInputTimestamps[pid] = [];
      return cmd;
    }
  }
  return null;
}

function executeCommand(player, cmd) {
  if (player.attacking || player.hitstun > 0 || !player.alive || player.grabbing || player.grabbed || player.guarding || player.guardBreakStun > 0) return false;

  const atk = cmd.attack;
  player.attacking = true;
  player.attackType = 'command';
  player.attackFrame = 0;
  player.attackData = atk;
  player.hitTargets = [];
  player.lastHitFrame = -99;
  player.specialState = null;
  player['cd_' + cmd.cooldownKey] = CMD_COOLDOWN;

  // Command activation sound
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const o1 = ac.createOscillator();
    const g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(400, now);
    o1.frequency.exponentialRampToValueAtTime(900, now + 0.08);
    o1.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    g1.gain.setValueAtTime(0.12, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.2);
    // Accent tone
    const o2 = ac.createOscillator();
    const g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(800, now + 0.03);
    o2.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    g2.gain.setValueAtTime(0.06, now + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.03); o2.stop(now + 0.15);
  } catch(e) {}

  // Show command name (コミック風フォント演出)
  const ch = characters[player.charIdx];
  cmdNameDisplay.push({
    text: cmd.name, x: player.x, y: player.y - 120,
    life: 60, maxLife: 60, color: ch.accent,
  });

  // Flash effect
  hitEffects.push({ x: player.x, y: player.y - 40, life: 15, maxLife: 15, color: '#FFFFFF', size: 50 });

  // ② 虹色オーラ
  specialAura.push({ playerId: player.id, life: 45, maxLife: 45 });

  // ⑤ 背景カラフルフラッシュ
  cmdFlash.alpha = 0.3;
  cmdFlash.color = ch.accent;

  // ⑤ キャラクター一瞬大きくなる演出
  cmdScaleEffect.playerId = player.id;
  cmdScaleEffect.life = 12;

  // ② 画面シェイク
  triggerScreenShake(4, 8);

  return true;
}

// Scale dragon attacks too
(function scaleDragonAtks() {
  const factor = 1 / 1.68;
  const dmgFactor = 0.6;
  for (const type in dragonAttackDefs) {
    if (type === 'throwDmg') { dragonAttackDefs[type] = Math.round(dragonAttackDefs[type] * dmgFactor); continue; }
    const atk = dragonAttackDefs[type];
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    atk.damage = Math.round(atk.damage * dmgFactor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * dmgFactor * 10) / 10;
  }
})();

// --- Speed up attacks to 168% of original (frames × 0.595) ---
(function scaleAttackSpeeds() {
  const factor = 1 / 1.68;
  function scaleAtk(atk) {
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    if (atk.slamActive) atk.slamActive = Math.max(1, Math.round(atk.slamActive * factor));
    if (atk.hitInterval) atk.hitInterval = Math.max(1, Math.round(atk.hitInterval * factor));
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') continue;
      scaleAtk(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleAtk(cmd.attack);
    }
  }
})();

// --- Reduce all damage to 60% ---
(function scaleDamage() {
  const factor = 0.6;
  function scaleDmg(atk) {
    atk.damage = Math.round(atk.damage * factor * 10) / 10;
    if (atk.finalDamage) atk.finalDamage = Math.round(atk.finalDamage * factor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * factor * 10) / 10;
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') { defs[type] = Math.round(defs[type] * factor); continue; }
      scaleDmg(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleDmg(cmd.attack);
    }
  }
})();

function applyHostState(data) {
  if (!players[0] || !players[1]) return;

  // Detect damage changes for local effects
  const oldDmg0 = players[0].damage, oldDmg1 = players[1].damage;
  const oldStocks0 = players[0].stocks, oldStocks1 = players[1].stocks;
  const oldAlive0 = players[0].alive, oldAlive1 = players[1].alive;

  // Apply player states (with velocity-predicted interpolation for smooth visuals)
  const LERP = 0.35;
  const applyFields = (target, src) => {
    // Predict where the character should be using velocity
    const predictX = src.x + src.vx * 0.5;
    const predictY = src.y + src.vy * 0.5;
    const dx = predictX - target.x, dy = predictY - target.y;
    const snapDist = 80;
    if (Math.abs(dx) > snapDist || Math.abs(dy) > snapDist || src.alive !== target.alive || src.respawnTimer !== target.respawnTimer) {
      target.x = src.x; target.y = src.y;
    } else {
      target.x += dx * LERP;
      target.y += dy * LERP;
    }
    target.vx = src.vx; target.vy = src.vy;
    target.damage = src.damage; target.stocks = src.stocks; target.alive = src.alive;
    target.attacking = src.attacking; target.attackType = src.attackType; target.attackFrame = src.attackFrame;
    target.facingLeft = src.facingLeft; target.hitstun = src.hitstun; target.grounded = src.grounded;
    target.guarding = src.guarding; target.animState = src.animState; target.walkCycle = src.walkCycle;
    target.spinAngle = src.spinAngle; target.damageTint = src.damageTint;
    target.invincibleTimer = src.invincibleTimer;
    target.dragonMode = src.dragonMode; target.dragonTimer = src.dragonTimer;
    target.charging = src.charging; target.chargeTime = src.chargeTime; target.chargeMaxTime = src.chargeMaxTime;
    target.grabbing = src.grabbing; target.grabbed = src.grabbed;
    target.grabTarget = src.grabTarget; target.grabbedBy = src.grabbedBy;
    target.respawnTimer = src.respawnTimer; target.landSquash = src.landSquash; target.jumpSquash = src.jumpSquash;
    target.specialState = src.specialState; target.jumps = src.jumps;
    target.guardDurability = src.guardDurability; target.guardBreakStun = src.guardBreakStun;
    target.justGuardTimer = src.justGuardTimer; target.strongLocked = src.strongLocked;
    target.dragonCooldown = src.dragonCooldown; target.dragonTransforming = src.dragonTransforming;
    target.dragonTransformTimer = src.dragonTransformTimer;
    target.throwCooldown = src.throwCooldown; target.inkBlindTimer = src.inkBlindTimer;
    target.animTimer = src.animTimer; target.charIdx = src.charIdx;
    target.kingComboHits = src.kingComboHits; target.kingComboTimer = src.kingComboTimer;
    target.senBuffTimer = src.senBuffTimer;
    target.dosbossRandomPattern = src.dosbossRandomPattern || 0; target.gravityDebuffTimer = src.gravityDebuffTimer || 0;
    target.cancelWindow = src.cancelWindow || 0; target.comboWindow = src.comboWindow || 0; target.airComboTimer = src.airComboTimer || 0;
    // Restore attackData from attackType
    if (src.attacking && src.attackType) {
      const defs = (target.charIdx === 10 && target.dragonMode) ? dragonAttackDefs : attackDefs[target.charIdx];
      target.attackData = defs ? (defs[src.attackType] || null) : null;
    } else {
      target.attackData = null;
    }
  };
  applyFields(players[0], data.p1);
  applyFields(players[1], data.p2);

  // Global state
  battleTimer = data.battleTimer;
  battleStarted = data.battleStarted;
  battleCountdown = data.battleCountdown;
  gameOver = data.gameOver;
  winner = data.winner;
  hitStopFrames = data.hitStopFrames;
  koSlowMotion.active = data.koSlowMotion.active;
  koSlowMotion.frames = data.koSlowMotion.frames;
  koSlowMotion.maxFrames = data.koSlowMotion.maxFrames;
  // hitFlash and screenShake are generated locally from state changes
  // Don't overwrite them from host to avoid cancelling guest-local effects

  // Projectiles
  projectiles.length = 0;
  if (data.projectiles) {
    for (const pr of data.projectiles) {
      projectiles.push(pr);
    }
  }

  // Generate local effects on damage/stock changes
  for (let i = 0; i < 2; i++) {
    const oldDmg = i === 0 ? oldDmg0 : oldDmg1;
    const newDmg = players[i].damage;
    const oldStocks = i === 0 ? oldStocks0 : oldStocks1;
    const newStocks = players[i].stocks;
    const oldAlive = i === 0 ? oldAlive0 : oldAlive1;
    const p = players[i];
    if (newDmg > oldDmg) {
      const dmgDiff = newDmg - oldDmg;
      const isBig = dmgDiff >= 12;
      const isHuge = dmgDiff >= 20;
      // Damage number
      damageNumbers.push({
        x: p.x + (Math.random() - 0.5) * 20, y: p.y - 50,
        vy: -1.8 - Math.random() * 0.5,
        value: dmgDiff,
        life: isBig ? 50 : 40, maxLife: isBig ? 50 : 40,
        color: dmgDiff >= 15 ? '#FF4444' : dmgDiff >= 8 ? '#FFAA44' : '#FFFFFF',
        scale: isBig ? 1.4 : 1.0,
        bold: isBig,
      });
      // Hit flash effect
      const chColor = characters[p.charIdx] ? characters[p.charIdx].accent : '#FFFFFF';
      if (isHuge) {
        hitEffects.push({ x: p.x, y: p.y - 40, life: 18, maxLife: 18, color: chColor, size: 25 + dmgDiff * 0.8 });
        hitEffects.push({ x: p.x, y: p.y - 35, life: 12, maxLife: 12, color: '#FFFFFF', size: 80, type: 'ring' });
      } else if (isBig) {
        hitEffects.push({ x: p.x, y: p.y - 40, life: 14, maxLife: 14, color: '#FF8800', size: 20 + dmgDiff * 0.6 });
      } else {
        hitEffects.push({ x: p.x, y: p.y - 40, life: 12, maxLife: 12, color: '#FFDD44', size: 12 + dmgDiff });
      }
      // Hit flash overlay
      hitFlash.alpha = Math.max(hitFlash.alpha, 0.1 + Math.min(dmgDiff / 40, 0.25));
      hitFlash.color = chColor;
      // Screen shake proportional to damage
      if (dmgDiff >= 5) triggerScreenShake(Math.min(dmgDiff / 3, 10), Math.min(dmgDiff / 2, 14));
      // Comic text
      if (dmgDiff >= 5) {
        const word = isHuge ? 'SMASH!' : isBig ? COMIC_WORDS[Math.floor(Math.random() * COMIC_WORDS.length)] : (dmgDiff >= 8 ? 'POW!' : 'BAM!');
        const ci = Math.floor(Math.random() * COMIC_COLORS.length);
        comicTexts.push({
          text: word, x: p.x + (Math.random()-0.5)*40, y: p.y - 60 + (Math.random()-0.5)*30,
          life: 35, maxLife: 35,
          color: COMIC_COLORS[ci], bgColor: COMIC_COLORS[(ci+4)%COMIC_COLORS.length],
          size: isHuge ? 24 : isBig ? 20 : 14,
          rotation: (Math.random()-0.5)*0.4,
        });
      }
      // Sparks - scale with damage, use attacker colors
      const other = players[1 - i];
      const atkCharIdx = other ? other.charIdx : 0;
      const sparkColors = {
        0:['#88CCFF','#AADDFF'],1:['#FF4422','#FF8844'],2:['#44FFAA','#88FFcc'],
        3:['#FFD700','#FFAA33'],4:['#44FFCC','#88AAFF'],5:['#C8A878','#7A6A5A'],
        6:['#FF6B6B','#3A3A3A'],7:['#FF66AA','#CC3366'],8:['#FF80B0','#E05090'],
        9:['#C0A0FF','#9966DD'],10:['#FF6600','#FF8833'],11:['#FFBB44','#DD8822'],
      };
      const sColors = sparkColors[atkCharIdx] || ['#FFDD44','#FFAA33'];
      const sparkCount = isHuge ? 25 : isBig ? 15 : Math.min(8, 3 + Math.floor(dmgDiff / 4));
      for (let s = 0; s < sparkCount; s++) {
        const a = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * (isHuge ? 7 : isBig ? 5 : 4);
        sparks.push({ x: p.x, y: p.y - 35, vx: Math.cos(a)*speed, vy: Math.sin(a)*speed - 1, life: 12+Math.random()*12, maxLife: 24, color: s%3===0?'#FFFFFF':sColors[s%sColors.length], size: 1.5+Math.random()*(isHuge?4:2.5), gravity: 0.1+Math.random()*0.08, drag: 0.97 });
      }
      // Hit sound
      if (isHuge) playHitSound('special');
      else if (isBig) playHitSound('strong');
      else playHitSound('normal');
    }
    if (newStocks < oldStocks) {
      const ch = characters[p.charIdx] || characters[0];
      const accent = ch.accent;
      const mainCol = ch.color;
      const ex = Math.max(BLAST_LEFT + 20, Math.min(BLAST_RIGHT - 20, p.x));
      const ey = Math.max(BLAST_TOP + 20, Math.min(BLAST_BOTTOM - 20, p.y));

      // KO display
      koDisplay = { active: true, life: 90, maxLife: 90, playerIdx: i };

      // Blast explosion with colors
      blastExplosions.push({ x: ex, y: ey, life: 40, maxLife: 40, color: accent, charColor: mainCol });

      // KO slash effects
      for (let j = 0; j < 5; j++) {
        const baseAngle = -0.6 + Math.random() * 1.2;
        koSlashEffects.push({
          x: ex, y: ey, angle: baseAngle,
          length: 400 + Math.random() * 500, width: 2 + Math.random() * 4,
          life: 90, maxLife: 90, delay: j * 3,
          color: j % 2 === 0 ? '#AADDFF' : '#FFFFFF',
        });
      }

      // Large spark burst (40 particles)
      for (let j = 0; j < 40; j++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 8;
        sparks.push({
          x: ex + (Math.random()-0.5)*20, y: ey + (Math.random()-0.5)*20,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 20 + Math.floor(Math.random()*20), maxLife: 40,
          color: j%4===0 ? '#FFFFFF' : j%4===1 ? accent : j%4===2 ? '#FFDD44' : mainCol,
          size: 1.5 + Math.random() * 3.5, gravity: 0.05 + Math.random()*0.1, drag: 0.98,
        });
      }

      // Star particles
      for (let j = 0; j < 16; j++) {
        const angle = (j/16) * Math.PI * 2 + Math.random() * 0.4;
        const speed = 2 + Math.random() * 7;
        sparks.push({
          x: ex, y: ey, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
          life: 70 + Math.floor(Math.random()*20), maxLife: 90,
          color: j%3===0 ? '#FFFFFF' : '#FFDD44', size: 3 + Math.random()*6,
          type: 'star', gravity: 0.04, drag: 0.985,
          spin: (Math.random()-0.5)*0.4, angle: Math.random()*Math.PI*2,
        });
      }

      // Stock loss animation
      const stockIdx = newStocks;
      const hudX = i === 0 ? 120 : 600;
      stockLossAnim = {
        active: true, playerId: i, life: 30, maxLife: 30,
        x: hudX + 10 + stockIdx * 22 + 7, y: 530 + 90 - 18 + 5,
      };

      // Confetti
      const killerIdx = i === 0 ? 1 : 0;
      const killerColor = characters[players[killerIdx] ? players[killerIdx].charIdx : 0].accent;
      for (let j = 0; j < 50; j++) {
        confetti.push({
          x: 100 + Math.random() * 760, y: -20 - Math.random() * 100,
          vx: (Math.random()-0.5)*4, vy: 1 + Math.random()*3,
          life: 60 + Math.floor(Math.random()*60), maxLife: 120,
          color: ['#FF4444','#FFDD00','#44AAFF','#FF66AA','#44FF88','#FF8844','#AA44FF', killerColor][j % 8],
          size: 3 + Math.random()*5,
          rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.2,
          type: j%3===0 ? 'rect' : j%3===1 ? 'star' : 'circle',
        });
      }

      // Hit flash
      hitFlash.alpha = 0.55;
      hitFlash.color = '#FFFFFF';

      // Screen shake + sound
      triggerScreenShake(10, 20);
      try { playHitSound('ko'); } catch(e) {}
    }
  }
}

function updateGuestEffects(dt) {
  // Increment battleTime for animation purposes
  battleTime += dt;

  // Client prediction: move players by their velocity between host updates
  for (const p of players) {
    if (!p.alive || p.grounded) continue;
    p.x += p.vx * 0.5; // half-step prediction (host will correct)
    p.y += p.vy * 0.5;
    p.vy += 0.3; // light gravity prediction
  }

  // Only update visual effects, no game logic
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    hitEffects[i].life--;
    if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
  }
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += (s.gravity || 0.15);
    s.vx *= (s.drag || 0.97);
    if (s.spin) s.angle = (s.angle || 0) + s.spin;
    s.life--;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy; d.vy *= 0.96; d.life--;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }
  for (let i = trails.length - 1; i >= 0; i--) {
    const tr = trails[i];
    tr.life--;
    if (tr.life <= 0) { trails.splice(i, 1); continue; }
    const target = players.find(pp => pp.id === tr.targetId);
    if (target && target.alive && target.hitstun > 0) {
      if (!tr.points) tr.points = [];
      tr.points.push({ x: target.x, y: target.y - 35 });
      const maxPts = tr.maxPoints || 20;
      if (tr.points.length > maxPts) tr.points.shift();
    }
  }
  for (let i = blastExplosions.length - 1; i >= 0; i--) {
    blastExplosions[i].life--;
    if (blastExplosions[i].life <= 0) blastExplosions.splice(i, 1);
  }
  for (let i = cmdNameDisplay.length - 1; i >= 0; i--) {
    cmdNameDisplay[i].life--; cmdNameDisplay[i].y -= 0.5;
    if (cmdNameDisplay[i].life <= 0) cmdNameDisplay.splice(i, 1);
  }
  for (let i = hitMissDisplays.length - 1; i >= 0; i--) {
    hitMissDisplays[i].life--; hitMissDisplays[i].y -= 0.8;
    if (hitMissDisplays[i].life <= 0) hitMissDisplays.splice(i, 1);
  }
  for (let i = comicTexts.length - 1; i >= 0; i--) {
    comicTexts[i].life--; comicTexts[i].y -= 0.6;
    if (comicTexts[i].life <= 0) comicTexts.splice(i, 1);
  }
  if (koDisplay.active) {
    koDisplay.life--;
    if (koDisplay.life <= 0) koDisplay.active = false;
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx; c.y += c.vy; c.vy += 0.03; c.vx *= 0.99;
    c.rotation += c.rotSpeed; c.life--;
    if (c.life <= 0) confetti.splice(i, 1);
  }
  for (let i = speedLines.length - 1; i >= 0; i--) {
    speedLines[i].life--;
    if (speedLines[i].life <= 0) speedLines.splice(i, 1);
  }
  for (let i = fireTrails.length - 1; i >= 0; i--) {
    const f = fireTrails[i];
    f.x += f.vx; f.y += f.vy; f.vy -= 0.05; f.size *= 0.97; f.life--;
    if (f.life <= 0) fireTrails.splice(i, 1);
  }
  for (let i = specialAura.length - 1; i >= 0; i--) {
    specialAura[i].life--;
    if (specialAura[i].life <= 0) specialAura.splice(i, 1);
  }
  if (cmdFlash.alpha > 0) {
    cmdFlash.alpha *= 0.88;
    if (cmdFlash.alpha < 0.01) cmdFlash.alpha = 0;
  }
  if (cmdScaleEffect.life > 0) cmdScaleEffect.life--;
  for (let i = koSlashEffects.length - 1; i >= 0; i--) {
    if (koSlashEffects[i].delay > 0) { koSlashEffects[i].delay--; }
    else { koSlashEffects[i].life--; if (koSlashEffects[i].life <= 0) koSlashEffects.splice(i, 1); }
  }
  if (stockLossAnim.active) {
    stockLossAnim.life--;
    if (stockLossAnim.life <= 0) stockLossAnim.active = false;
  }
  // screenShake and hitFlash are decayed in drawBattle (updateScreenShake / hitFlash render)
}

function playVsIntroFanfare() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const masterGain = ac.createGain();
    masterGain.gain.setValueAtTime(0.15, now);
    masterGain.connect(ac.destination);

    const notes = [
      // Fanfare melody: dramatic ascending brass-like
      { freq: 261.6, start: 0,    dur: 0.2,  type: 'square' },   // C4
      { freq: 329.6, start: 0.2,  dur: 0.2,  type: 'square' },   // E4
      { freq: 392.0, start: 0.4,  dur: 0.2,  type: 'square' },   // G4
      { freq: 523.3, start: 0.6,  dur: 0.4,  type: 'square' },   // C5
      { freq: 392.0, start: 1.0,  dur: 0.15, type: 'square' },   // G4
      { freq: 523.3, start: 1.15, dur: 0.6,  type: 'square' },   // C5 (hold)
      // Harmony layer
      { freq: 196.0, start: 0,    dur: 0.4,  type: 'triangle' }, // G3
      { freq: 261.6, start: 0.4,  dur: 0.4,  type: 'triangle' }, // C4
      { freq: 329.6, start: 0.8,  dur: 0.4,  type: 'triangle' }, // E4
      { freq: 392.0, start: 1.15, dur: 0.6,  type: 'triangle' }, // G4
      // Second phrase
      { freq: 587.3, start: 1.9,  dur: 0.15, type: 'square' },   // D5
      { freq: 659.3, start: 2.05, dur: 0.15, type: 'square' },   // E5
      { freq: 784.0, start: 2.2,  dur: 0.6,  type: 'square' },   // G5
      { freq: 392.0, start: 1.9,  dur: 0.9,  type: 'triangle' }, // G4
      { freq: 523.3, start: 1.9,  dur: 0.9,  type: 'triangle' }, // C5
    ];

    const oscNodes = [];
    for (const n of notes) {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = n.type;
      osc.frequency.setValueAtTime(n.freq, now + n.start);
      g.gain.setValueAtTime(0, now + n.start);
      g.gain.linearRampToValueAtTime(n.type === 'square' ? 0.4 : 0.25, now + n.start + 0.02);
      g.gain.setValueAtTime(n.type === 'square' ? 0.35 : 0.2, now + n.start + n.dur * 0.7);
      g.gain.linearRampToValueAtTime(0, now + n.start + n.dur);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now + n.start);
      osc.stop(now + n.start + n.dur + 0.05);
      oscNodes.push(osc);
    }

    vsIntroFanfareNodes = { masterGain, oscNodes };
  } catch (e) { /* ignore audio errors */ }
}

function stopVsIntroFanfare() {
  if (vsIntroFanfareNodes) {
    try {
      vsIntroFanfareNodes.masterGain.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 0.3);
    } catch (e) {}
    vsIntroFanfareNodes = null;
  }
}

// ============================================================
function startTransition(target) {
  if (transitioning) return;
  transitioning = true;
  transitionTarget = target;
}

function drawTransition() {
  if (!transitioning && selectTransition <= 0) return;
  if (transitioning) {
    selectTransition = Math.min(1, selectTransition + 0.04);
    if (selectTransition >= 1) {
      scene = transitionTarget;
      transitioning = false;
      if (scene === 'select') { p1Confirmed = false; p2Confirmed = false; modeSelected = false; }
      else if (scene === 'difficulty') { difficultyTime = 0; difficultySelected = 1; }
      else if (scene === 'stageselect') { stageSelectTime = 0; }
      else if (scene === 'vsintro') { vsIntroTime = 0; playVsIntroFanfare(); }
      else if (scene === 'battle') { initBattle(); }
    }
  } else {
    selectTransition = Math.max(0, selectTransition - 0.04);
  }
  if (selectTransition > 0) {
    ctx.fillStyle = `rgba(0, 0, 0, ${selectTransition})`;
    ctx.fillRect(0, 0, 960, 640);
  }
}

// --- スマッシュ攻撃システム ---
function trackSmashInput(p, dir) {
  if (p.smashInputDir === dir && (battleTime - p.smashInputTime) < SMASH_INPUT_WINDOW) {
    p.smashInputCount++;
  } else {
    p.smashInputDir = dir;
    p.smashInputCount = 1;
  }
  p.smashInputTime = battleTime;
}

function checkSmashReady(p) {
  if (p.smashInputCount >= 2 && (battleTime - p.smashInputTime) < SMASH_INPUT_WINDOW) {
    const dir = p.smashInputDir;
    p.smashInputCount = 0;
    if (dir === 'up') return 'upSmash';
    if (dir === 'side') return 'sideSmash';
    if (dir === 'down') return 'downSmash';
  }
  return null;
}

function startSmashAttack(p, smashType) {
  if (p.attacking || p.hitstun > 0 || !p.alive || p.grabbing || p.grabbed || p.guarding || p.guardBreakStun > 0 || p.guardPenalty > 0) return;
  if (!p.grounded) return; // 地上限定
  p.smashCharging = true;
  p.smashChargeTime = 0;
  p.smashType = smashType;
}

function executeSmash(p) {
  if (!p.smashCharging) return;
  const chargeRatio = Math.min(p.smashChargeTime / SMASH_CHARGE_MAX, 1);
  const chargeMult = 1 + chargeRatio * SMASH_CHARGE_BONUS;
  const defs = (p.charIdx === 10 && p.dragonMode) ? dragonAttackDefs : attackDefs[p.charIdx];
  const baseAtk = defs.strong;
  if (!baseAtk) { p.smashCharging = false; return; }
  const dir = p.facingLeft ? -1 : 1;
  const mult = SMASH_DAMAGE_MULT[p.smashType] || 1.5;
  const smashDmg = baseAtk.damage * mult * chargeMult;

  p.smashCharging = false;
  p.attacking = true;
  p.attackType = 'smash';
  p.attackFrame = 0;
  p.hitTargets = [];
  p.lastHitFrame = -99;
  p.specialState = null;

  let angle, startup, hw, hh, hx, hy;
  if (p.smashType === 'upSmash') {
    angle = -85; startup = 15; hx = 0; hy = -60; hw = 60; hh = 65;
  } else if (p.smashType === 'downSmash') {
    angle = -15; startup = 10; hx = 0; hy = -30; hw = 90; hh = 40;
  } else {
    angle = -45; startup = 20; hx = baseAtk.hx || 20; hy = -35; hw = (baseAtk.hw || 60) * 1.2; hh = baseAtk.hh || 45;
  }

  p.attackData = {
    name: p.smashType === 'upSmash' ? '上スマッシュ' : p.smashType === 'downSmash' ? '下スマッシュ' : '横スマッシュ',
    startup: startup, active: 6, recovery: p.smashType === 'sideSmash' ? 22 : 16,
    damage: smashDmg, kbBase: baseAtk.kbBase * mult, kbScale: baseAtk.kbScale * 1.3,
    kbAngle: angle, hx: hx, hy: hy, hw: hw, hh: hh,
    color: characters[p.charIdx].accent, effect: 'bigpunch',
    isSmash: true, smashType: p.smashType,
    centerHit: p.smashType === 'downSmash',
  };

  // 溜めエフェクト
  if (chargeRatio > 0.3) {
    hitEffects.push({ x: p.x, y: p.y - 40, life: 15, maxLife: 15, color: characters[p.charIdx].accent, size: 30 + chargeRatio * 30, type: 'ring' });
  }
  triggerScreenShake(2 + chargeRatio * 3, 6);
  playHitSound('cmd');
}

// --- 崖つかまりシステム ---
const LEDGE_GRAB_RANGE = 30;      // 崖端からの判定幅
const LEDGE_Y_RANGE = 50;         // 崖Y座標からの判定高さ
const LEDGE_MAX_TIME = 180;       // 最大つかまり時間(3秒)
const LEDGE_COOLDOWN = 60;        // 連続つかまり制限(1秒)

function checkLedgeGrab(p) {
  if (p.ledgeGrab || p.grounded || p.ledgeCooldown > 0 || !p.alive) return;
  if (p.hitstun > 0 || p.attacking || p.airDodging) return;
  // 上方向に移動中 or 落下速度が遅い時のみ
  if (p.vy > 4) return;
  const gy = STAGE_GROUND_Y;
  // 崖より下にいる
  if (p.y < gy - LEDGE_Y_RANGE) return;
  // 左崖
  if (p.x >= STAGE_LEFT - LEDGE_GRAB_RANGE && p.x <= STAGE_LEFT + 15 && p.y >= gy - LEDGE_Y_RANGE && p.y <= gy + LEDGE_Y_RANGE) {
    // 他のプレイヤーが同じ崖を掴んでいない
    if (players.some(pp => pp.id !== p.id && pp.ledgeGrab && pp.ledgeSide === -1)) return;
    grabLedge(p, -1);
  }
  // 右崖
  if (p.x >= STAGE_RIGHT - 15 && p.x <= STAGE_RIGHT + LEDGE_GRAB_RANGE && p.y >= gy - LEDGE_Y_RANGE && p.y <= gy + LEDGE_Y_RANGE) {
    if (players.some(pp => pp.id !== p.id && pp.ledgeGrab && pp.ledgeSide === 1)) return;
    grabLedge(p, 1);
  }
}

function grabLedge(p, side) {
  p.ledgeGrab = true;
  p.ledgeSide = side;
  p.ledgeTimer = 0;
  p.ledgeInvincible = 30; // 崖つかまり無敵0.5秒
  p.vx = 0; p.vy = 0;
  p.x = side === -1 ? STAGE_LEFT : STAGE_RIGHT;
  p.y = STAGE_GROUND_Y + 30;
  p.facingLeft = side === 1;
  p.attacking = false; p.specialState = null;
  p.grounded = false;
  p.jumps = p.charIdx === 15 ? 3 : 2;
}

function releaseLedge(p, type) {
  if (!p.ledgeGrab) return;
  p.ledgeGrab = false;
  p.ledgeCooldown = LEDGE_COOLDOWN;
  const dir = -p.ledgeSide; // ステージ内側方向
  if (type === 'normal') {
    // その場上がり
    p.x += dir * 40;
    p.y = STAGE_GROUND_Y;
    p.grounded = true;
    p.ledgeInvincible = 10;
  } else if (type === 'attack') {
    // 攻撃上がり
    p.x += dir * 50;
    p.y = STAGE_GROUND_Y - 10;
    p.vy = -3;
    startAttack(p, 'normal');
  } else if (type === 'dodge') {
    // 回避上がり
    p.x += dir * 70;
    p.y = STAGE_GROUND_Y;
    p.grounded = true;
    p.ledgeInvincible = 20;
    p.ledgeEndlag = 18; // 0.3秒硬直
  } else if (type === 'drop') {
    // 崖離し（落下）
    p.vy = 0;
  }
}

function updateLedge(p) {
  if (p.ledgeCooldown > 0) p.ledgeCooldown--;
  if (p.ledgeInvincible > 0) {
    p.ledgeInvincible--;
    p.invincibleTimer = Math.max(p.invincibleTimer, 1);
    // 無敵解除の瞬間: 赤フラッシュ
    if (p.ledgeInvincible === 0 && p.ledgeGrab) p.damageTint = 6;
  }
  if (p.ledgeEndlag > 0) { p.ledgeEndlag--; p.vx *= 0.8; }
  if (!p.ledgeGrab) return;
  p.ledgeTimer++;
  p.vx = 0; p.vy = 0;
  p.x = p.ledgeSide === -1 ? STAGE_LEFT : STAGE_RIGHT;
  p.y = STAGE_GROUND_Y + 30;
  // 3秒経過で自動落下
  if (p.ledgeTimer >= LEDGE_MAX_TIME) { releaseLedge(p, 'drop'); return; }
  // 無敵解除後のみ被弾で崖離し
  if (p.ledgeInvincible <= 0 && p.hitstun > 0) { releaseLedge(p, 'drop'); }
}

function removeUltimateVideo() {
  if (ultimateVideo && ultimateVideo.el) {
    try { ultimateVideo.el.pause(); } catch(e) {}
    if (document.body.contains(ultimateVideo.el)) document.body.removeChild(ultimateVideo.el);
  }
  ultimateVideo = null;
}

// 必殺技hitbox判定
function checkUltimateHit(attacker, target) {
  if (!target || !target.alive) return false;
  const ud = ultimateData[attacker.charIdx];
  if (!ud) return false;
  const dir = attacker.facingLeft ? -1 : 1;
  const tx = target.x, ty = target.y - 35;
  const range = ud.range;
  const r = ud.radius || 160;

  if (range === 'all' || range === 'random') return true;
  if (range === 'circle') {
    return Math.hypot(tx - attacker.x, ty - (attacker.y - 35)) < r;
  }
  if (range === 'line') {
    const inY = Math.abs(ty - (attacker.y - 35)) < 50;
    const inFront = dir > 0 ? tx > attacker.x - 20 : tx < attacker.x + 20;
    return inY && inFront;
  }
  if (range === 'front') {
    const dx = tx - attacker.x;
    const inFront = dir > 0 ? dx > -30 && dx < 200 : dx < 30 && dx > -200;
    const inY = Math.abs(ty - (attacker.y - 35)) < 100;
    return inFront && inY;
  }
  if (range === 'teleport') {
    // Catbus: always hits if target exists
    return true;
  }
  return Math.hypot(tx - attacker.x, ty - (attacker.y - 35)) < 200;
}

function triggerUltimate(p) {
  if (p.ultimateGauge < 100 || ultimateActive) return false;
  // Phase 1: startup attack motion (hit check happens after)
  ultimateActive = true;
  ultimatePlayerId = p.id;
  ultimatePhase = 'startup';
  ultimateTimer = 0;
  ultimateVideo = null;
  return true;
}

function startUltimateVideo() {
  const p = players[ultimatePlayerId];
  if (!p) { ultimatePhase = 'damage'; ultimateTimer = 0; return; }
  const charFileName = ultimateFileNames[p.charIdx] || 'zen';
  const video = document.createElement('video');
  video.src = 'images/ultimates/' + charFileName + '_ultimate.mp4';
  video.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;object-fit:cover;background:black;';
  video.muted = false;       // play video audio (BGM already faded out)
  video.playsInline = true;
  video.autoplay = true;
  let finished = false;
  function onFinish() {
    if (finished) return;
    finished = true;
    removeUltimateVideo();
    if (ultimateActive && ultimatePhase === 'video') {
      ultimatePhase = 'damage';
      ultimateTimer = 0;
    }
  }
  video.onended = onFinish;
  video.onerror = onFinish;
  document.body.appendChild(video);
  video.play().catch(() => {
    // Unmuted autoplay blocked - retry muted
    video.muted = true;
    video.play().catch(onFinish);
  });
  ultimateVideo = { el: video };
  // Safety timeout: 8 seconds max
  setTimeout(onFinish, 8000);
}

function applyUltimateDamage(attacker, target) {
  const ud = ultimateData[attacker.charIdx] || ultimateData[0];
  let dmg = ud.dmg, kb = ud.kb, angle = ud.angle;
  if (ud.range === 'random') { dmg = Math.floor(Math.random()*40)+1; kb = 5+Math.random()*15; angle = -Math.floor(Math.random()*80); }
  if (ud.range === 'teleport' && target) { attacker.x = target.x + (target.facingLeft ? 60 : -60); attacker.y = target.y; }
  if (ud.pull && target) { target.vx = (attacker.x - target.x)*0.15; target.vy = (attacker.y - target.y)*0.1; }
  if (attacker.charIdx === 10 && attacker.dragonMode) { dmg = 40; kb = 20; }
  const hitCount = ud.hits || 1;
  if (target) {
    for (let h = 0; h < hitCount; h++) applyHit(attacker, target, dmg, kb, 0.2, angle, 'cmd');
    if (ud.status) {
      const dur = ud.dur || 60;
      const st = ud.status;
      if (st === 'frozen') target.frozen = Math.max(target.frozen, dur);
      if (st === 'burning') { target.burning = Math.max(target.burning, dur); target.burnDmg = 3; }
      if (st === 'poisoned') { target.poisoned = Math.max(target.poisoned, ud.dur); target.poisonDmg = ud.poisonDmg||8; }
      if (st === 'stunned') target.stunned = Math.max(target.stunned, dur);
      if (st === 'cursed') target.cursed = Math.max(target.cursed, dur);
      if (st === 'confused') target.confused = Math.max(target.confused, dur);
      if (st === 'paralyzed') target.paralyzed = Math.max(target.paralyzed, dur);
      if (st === 'feared2') target.feared2 = Math.max(target.feared2, dur);
      if (st === 'sealMagic') target.sealMagic = Math.max(target.sealMagic, dur);
      if (st === 'bounce') { target.vy = 12; target.groundBounced = false; }
    }
    if (ud.steal && target.ultimateGauge !== undefined) {
      const stolen = target.ultimateGauge * (ud.steal/100);
      target.ultimateGauge -= stolen;
      attacker.ultimateGauge = Math.min(100, attacker.ultimateGauge + stolen);
    }
    if (ud.range === 'random') {
      const effs = ['frozen','burning','stunned','confused','paralyzed'];
      target[effs[Math.floor(Math.random()*effs.length)]] = 60+Math.floor(Math.random()*60);
    }
  }
  triggerScreenShake(15, 18);
  hitFlash.alpha = 0.5; hitFlash.color = ud.color;
  const ex = target ? target.x : attacker.x, ey = target ? target.y-35 : attacker.y-35;
  for (let i = 0; i < 30; i++) {
    const a = Math.random()*Math.PI*2;
    sparks.push({ x:ex,y:ey,vx:Math.cos(a)*8,vy:Math.sin(a)*8-3,life:25,maxLife:25,color:i%2?ud.color:'#FFF',size:3+Math.random()*4,gravity:0.1,drag:0.96 });
  }
  cmdNameDisplay.push({ text: ud.name, x: 480, y: 200, life: 70, maxLife: 70, color: ud.color });
}

function updateUltimate() {
  if (!ultimateActive) return;
  ultimateTimer++;

  // Phase 1: Startup attack motion (0.3s) → hit check
  if (ultimatePhase === 'startup') {
    if (ultimateTimer > 18) {
      const attacker = players[ultimatePlayerId];
      const target = attacker ? players.find(pp => pp.id !== attacker.id && pp.alive) : null;
      if (attacker && target && checkUltimateHit(attacker, target)) {
        // HIT confirmed → slow-mo phase
        attacker.ultimateGauge = 0;
        ultimatePhase = 'hitconfirm';
        ultimateTimer = 0;
        ultimateHitTarget = target.id;
        // Hit effects
        hitFlash.alpha = 0.6; hitFlash.color = '#FFFFFF';
        triggerScreenShake(15, 20);
        playHitSound('cmd');
        target.damageTint = 15;
        const ud = ultimateData[attacker.charIdx];
        // HIT!! text
        comicTexts.push({ text: 'HIT!!', x: target.x, y: target.y - 60, life: 35, maxLife: 35, color: '#FF4444', bgColor: '#FFD700', size: 32, rotation: 0 });
        // Hitbox flash
        hitEffects.push({ x: target.x, y: target.y - 35, life: 12, maxLife: 12, color: ud ? ud.color : '#FFD700', size: 100, type: 'ring' });
        // Send to guest
        if (onlineMode && isHost && peerConn && peerConn.open) {
          peerConn.send({ type: 'ultimate', playerId: attacker.id, charIdx: attacker.charIdx });
        }
      } else {
        // MISS → ゲージ消費・よろけ硬直
        if (attacker) {
          attacker.ultimateGauge = 0;
          attacker.hitstun = Math.max(attacker.hitstun, 12); // 0.2秒よろけ
        }
        ultimatePhase = 'missdrain';
        ultimateTimer = 0;
        playHitSound('guardBreak');
        if (attacker) {
          comicTexts.push({ text: 'MISS...', x: 480, y: 280, life: 48, maxLife: 48, color: '#666666', bgColor: '#333333', size: 28, rotation: 0 });
          for (let i = 0; i < 12; i++) {
            sparks.push({ x: attacker.x+(Math.random()-0.5)*40, y: attacker.y-30, vx: (Math.random()-0.5)*4, vy: -1-Math.random()*3, life: 18, maxLife: 18, color: '#888888', size: 3+Math.random()*3, gravity: -0.02, drag: 0.94 });
          }
        }
      }
    }
    return;
  }

  // Phase 1.5: Hit confirm slow-mo (0.3s at 0.2x speed)
  if (ultimatePhase === 'hitconfirm') {
    if (ultimateTimer > 18) {
      fadeOutBGM(0.3);
      ultimatePhase = 'darken';
      ultimateTimer = 0;
    }
    return; // game loop runs at reduced speed during this phase
  }

  // Phase 1.5b: Miss gauge drain animation
  if (ultimatePhase === 'missdrain') {
    if (ultimateTimer > 30) {
      ultimateActive = false;
      ultimatePhase = '';
    }
    return;
  }

  // Phase 2: Darken
  if (ultimatePhase === 'darken' && ultimateTimer > 18) {
    ultimatePhase = 'text';
    ultimateTimer = 0;
  }
  // Phase 3: Text display
  if (ultimatePhase === 'text' && ultimateTimer > 30) {
    ultimatePhase = 'video';
    ultimateTimer = 0;
    startUltimateVideo();
  }
  // Phase 4: Video (handled by video events → transitions to 'damage')
  // Phase 5: Damage
  if (ultimatePhase === 'damage') {
    if (ultimateTimer === 1) {
      const attacker = players[ultimatePlayerId];
      const target = attacker ? players.find(pp => pp.id !== attacker.id && pp.alive) : null;
      if (attacker && target) applyUltimateDamage(attacker, target);
    }
    if (ultimateTimer > 5) {
      ultimatePhase = 'brighten';
      ultimateTimer = 0;
    }
  }
  // Phase 6: Brighten
  if (ultimatePhase === 'brighten' && ultimateTimer > 18) {
    ultimateActive = false;
    ultimatePhase = '';
    removeUltimateVideo();
    fadeInBGM(0.5);
  }
}

function drawUltimateOverlay() {
  if (!ultimateActive) return;
  if (ultimatePhase === 'startup') {
    // Attack motion: flash around character
    const p = players[ultimatePlayerId];
    if (p) {
      const ud = ultimateData[p.charIdx];
      const t = ultimateTimer / 18;
      ctx.save();
      ctx.globalAlpha = 0.3 + t * 0.4;
      ctx.fillStyle = ud ? ud.color : '#FFD700';
      ctx.beginPath(); ctx.arc(p.x, p.y - 35, 40 + t * 30, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    return;
  }
  if (ultimatePhase === 'hitconfirm') {
    // Slow-mo overlay with vignette
    const t = ultimateTimer / 18;
    ctx.fillStyle = `rgba(0,0,0,${t * 0.3})`;
    ctx.fillRect(0, 0, 960, 640);
    // Pulsing white edge glow
    const p2 = players[ultimatePlayerId];
    const ud2 = p2 ? ultimateData[p2.charIdx] : null;
    const edgeColor = ud2 ? ud2.color : '#FFD700';
    ctx.strokeStyle = edgeColor;
    ctx.lineWidth = 4 + Math.sin(ultimateTimer * 0.5) * 2;
    ctx.globalAlpha = 0.4 + Math.sin(ultimateTimer * 0.3) * 0.2;
    ctx.strokeRect(4, 4, 952, 632);
    ctx.globalAlpha = 1;
    return;
  }
  if (ultimatePhase === 'missdrain') {
    // Gauge drain flash: red pulse fading out
    const t = ultimateTimer / 30;
    if (t < 0.5) {
      ctx.fillStyle = `rgba(255,0,0,${(0.5 - t) * 0.15})`;
      ctx.fillRect(0, 0, 960, 640);
    }
    return;
  }
  if (ultimatePhase === 'darken') {
    ctx.fillStyle = `rgba(0,0,0,${Math.min(0.85, ultimateTimer / 18 * 0.85)})`;
    ctx.fillRect(0, 0, 960, 640);
  } else if (ultimatePhase === 'text') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, 960, 640);
    const a = Math.min(1, ultimateTimer / 10);
    ctx.globalAlpha = a;
    const p = players[ultimatePlayerId];
    const ch = p ? characters[p.charIdx] : characters[0];
    ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = ch.accent || '#FFD700';
    ctx.fillText(ch.name, 480, 280);
    const ud2 = ultimateData[p ? p.charIdx : 0] || ultimateData[0];
    ctx.font = 'bold 44px sans-serif';
    ctx.fillStyle = ud2.color || '#FFD700'; ctx.shadowColor = ud2.color || '#FFD700'; ctx.shadowBlur = 20;
    ctx.fillText(ud2.name, 480, 340);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  } else if (ultimatePhase === 'video') {
    // Video element covers the screen via DOM; canvas shows fallback behind it
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, 960, 640);
    // Pulsing flash (visible if video hasn't loaded yet or file missing)
    {
      ctx.globalAlpha = 0.5 + Math.sin(ultimateTimer * 0.3) * 0.3;
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 40px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('⚡', 480, 330);
      ctx.globalAlpha = 1;
    }
  } else if (ultimatePhase === 'brighten') {
    const a = Math.max(0, 0.85 - ultimateTimer / 18 * 0.85);
    ctx.fillStyle = `rgba(0,0,0,${a})`;
    ctx.fillRect(0, 0, 960, 640);
  }
}

function triggerDSkill(p) {
  if (p.dSkillCooldown > 0 || p.dSkillActive || !p.alive || p.hitstun > 0 || p.grabbed) return;
  p.dSkillCooldown = D_SKILL_COOLDOWN;
  const target = players.find(pp => pp.id !== p.id && pp.alive);
  const dir = p.facingLeft ? -1 : 1;
  const ci = p.charIdx;

  if (ci === 0 && target) {
    // ゼン「居合い」: 残像3枚 + 長く太い斬撃ライン
    const oldX = p.x, oldY = p.y;
    const behindDir = target.facingLeft ? 1 : -1;
    p.x = target.x + behindDir * 50; p.y = target.y;
    p.facingLeft = behindDir < 0; p.vx = 0; p.vy = 0;
    // 残像3枚（元の位置→中間→到着）
    const mx = (oldX + p.x) / 2, my = (oldY + p.y) / 2;
    hitEffects.push({ x: oldX, y: oldY - 40, life: 22, maxLife: 22, color: '#88CCFF', size: 25, type: 'charGhost' });
    hitEffects.push({ x: mx, y: my - 40, life: 18, maxLife: 18, color: '#88CCFF', size: 20, type: 'charGhost' });
    hitEffects.push({ x: p.x - behindDir*20, y: p.y - 40, life: 14, maxLife: 14, color: '#AADDFF', size: 18, type: 'charGhost' });
    for (let i = 0; i < 8; i++) sparks.push({ x: oldX+(Math.random()-0.5)*25, y: oldY-40+(Math.random()-0.5)*25, vx:(Math.random()-0.5)*4, vy:-1-Math.random()*2.5, life:16, maxLife:16, color:'#AADDFF', size:2+Math.random(), gravity:0.04, drag:0.97 });
    // 斬撃（長く太く青白い）
    const hitbox = { x: p.x - 60, y: p.y - 75, w: 120, h: 120 };
    checkHitboxAgainstPlayers(p, hitbox, 12, 7, 0.10, -30, 'special');
    hitEffects.push({ x: p.x, y: p.y - 40, life: 24, maxLife: 24, color: '#AADDFF', size: 80, type: 'charSlash' });
    hitEffects.push({ x: p.x, y: p.y - 40, life: 20, maxLife: 20, color: '#FFFFFF', size: 55, type: 'charSlash' });
    hitEffects.push({ x: p.x, y: p.y - 40, life: 16, maxLife: 16, color: '#88CCFF', size: 40, type: 'charSlash' });
    cmdNameDisplay.push({ text: '居合い！', x: p.x, y: p.y - 100, life: 50, maxLife: 50, color: '#AADDFF' });
  } else if (ci === 1) {
    // ドン「大地震」: 画面端まで亀裂 + 大量土煙
    if (p.grounded) {
      const hitbox = { x: p.x - 126, y: p.y - 45, w: 252, h: 70 };
      checkHitboxAgainstPlayers(p, hitbox, 10, 8, 0.08, -70, 'special');
      triggerScreenShake(8, 16);
      hitEffects.push({ x: p.x, y: p.y, life: 25, maxLife: 25, color: '#8B4513', size: 200, type: 'shockwave' });
      hitEffects.push({ x: p.x - 120, y: p.y, life: 22, maxLife: 22, color: '#8B4513', size: 140, type: 'shockwave' });
      hitEffects.push({ x: p.x + 120, y: p.y, life: 22, maxLife: 22, color: '#8B4513', size: 140, type: 'shockwave' });
      hitEffects.push({ x: p.x, y: p.y, life: 18, maxLife: 18, color: '#FF6644', size: 90, type: 'ring' });
      for (let i = 0; i < 20; i++) sparks.push({ x: p.x+(Math.random()-0.5)*200, y: p.y, vx:(Math.random()-0.5)*7, vy:-3-Math.random()*5, life:22, maxLife:22, color:i%3===0?'#8B6914':(i%3===1?'#AA8855':'#CC9966'), size:3+Math.random()*4, gravity:0.15, drag:0.95 });
      cmdNameDisplay.push({ text: '大地震！', x: p.x, y: p.y - 100, life: 50, maxLife: 50, color: '#FF4422' });
    }
  } else if (ci === 2) {
    // サイソク「分身」: 残像2枚 + 鮮明
    p.dSkillActive = true; p.dSkillTimer = 30; p.dSkillBuff = 'bunshin';
    hitEffects.push({ x: p.x - dir*30, y: p.y - 40, life: 24, maxLife: 24, color: 'rgba(68,255,136,0.6)', size: 30, type: 'charGhost' });
    hitEffects.push({ x: p.x + dir*20, y: p.y - 40, life: 20, maxLife: 20, color: 'rgba(68,255,136,0.4)', size: 25, type: 'charGhost' });
    for (let i = 0; i < 10; i++) sparks.push({ x: p.x+(Math.random()-0.5)*35, y: p.y-40+(Math.random()-0.5)*35, vx:(Math.random()-0.5)*3, vy:-1.5-Math.random(), life:16, maxLife:16, color:'#44FF88', size:2+Math.random(), gravity:0.03, drag:0.97 });
    cmdNameDisplay.push({ text: '分身！', x: p.x, y: p.y - 100, life: 50, maxLife: 50, color: '#44FF88' });
  } else if (ci === 3) {
    // メテオ「燃焼拳」: 多めの炎 + 明るいオレンジ
    p.dSkillActive = true; p.dSkillTimer = 600; p.dSkillBuff = 'burnFist';
    for (let i = 0; i < 16; i++) sparks.push({ x: p.x+dir*15+(Math.random()-0.5)*15, y: p.y-45+(Math.random()-0.5)*20, vx:(Math.random()-0.5)*4+dir*2, vy:-2-Math.random()*3, life:20, maxLife:20, color:i%3===0?'#FF4400':(i%3===1?'#FFAA33':'#FFCC55'), size:2.5+Math.random()*2.5, type:'fireball', gravity:0.06, drag:0.97 });
    hitEffects.push({ x: p.x + dir*20, y: p.y - 45, life: 22, maxLife: 22, color: '#FFAA33', size: 25, type: 'charGlow' });
    hitEffects.push({ x: p.x + dir*15, y: p.y - 45, life: 16, maxLife: 16, color: '#FF6600', size: 18, type: 'ring' });

    checkHitboxAgainstPlayers(p, swarm, 16, 7, 0.11, -40, 'special');

    // 毒付与
    for (const t2 of players) {
      if (t2.id === p.id || !t2.alive) continue;
      const th = getPlayerHitbox(t2);
      if (hitboxCollides(swarm.x, swarm.y, swarm.w, swarm.h, th.x, th.y, th.w, th.h)) t2.poisonTimer = 180;

  playHitSound('cmd');
}

// --- D技更新（メインループから毎フレーム呼ぶ） ---
function updateDSkill(p) {
  if (p.dSkillCooldown > 0) p.dSkillCooldown--;
  if (!p.dSkillActive) return;
  p.dSkillTimer--;
  if (p.dSkillTimer <= 0) { p.dSkillActive = false; p.dSkillBuff = null; return; }
  const dir = p.facingLeft ? -1 : 1;

  // --- バフ持続エフェクト ---
  if (p.dSkillBuff === 'burnFist' && p.dSkillTimer % 8 === 0) {
    // メテオ: 拳周囲に小さな炎
    const d = p.facingLeft ? -1 : 1;
    sparks.push({ x: p.x+d*15+(Math.random()-0.5)*8, y: p.y-45+(Math.random()-0.5)*8, vx:(Math.random()-0.5)*1.5, vy:-1-Math.random(), life:10, maxLife:10, color:Math.random()>0.5?'#FF6600':'#FFAA44', size:1.5+Math.random(), type:'fireball', gravity:0.05, drag:0.97 });
  }
  if (p.dSkillBuff === 'ironWall' && p.dSkillTimer % 12 === 0) {
    // うる男: 紫オーラゆらゆら
    sparks.push({ x: p.x+(Math.random()-0.5)*30, y: p.y-20, vx:(Math.random()-0.5)*0.5, vy:-0.8-Math.random()*0.5, life:14, maxLife:14, color:'#AA88CC', size:2+Math.random()*2, gravity:-0.02, drag:0.97 });
  }
  if (p.dSkillBuff === 'bearRage' && p.dSkillTimer % 15 === 0) {
    // 熊太郎: 赤いオーラ
    sparks.push({ x: p.x+(Math.random()-0.5)*20, y: p.y-30, vx:0, vy:-1-Math.random()*0.5, life:12, maxLife:12, color:'#FF4444', size:1.5+Math.random(), gravity:-0.02, drag:0.97 });
  }
  if (p.dSkillBuff === 'tensaiBoost' && p.dSkillTimer % 6 === 0) {
    // 天才: 黒紫オーラ脈動
    sparks.push({ x: p.x+(Math.random()-0.5)*25, y: p.y-40+(Math.random()-0.5)*25, vx:(Math.random()-0.5)*2, vy:-0.5-Math.random(), life:12, maxLife:12, color:Math.random()>0.5?'#6622AA':'#9944CC', size:2+Math.random(), gravity:-0.02, drag:0.96 });
  }
  if (p.dSkillBuff === 'fortress' && p.dSkillTimer % 10 === 0) {
    // タンク: 金属光沢
    sparks.push({ x: p.x+(Math.random()-0.5)*30, y: p.y-30+(Math.random()-0.5)*20, vx:(Math.random()-0.5)*0.5, vy:-0.3, life:10, maxLife:10, color:Math.random()>0.5?'#CCCCCC':'#EEEEEE', size:1.5+Math.random(), gravity:0, drag:0.97 });
  }
  if (p.dSkillBuff === 'killIntent' && p.dSkillTimer % 8 === 0) {
    // とっこ: 緑の粒子が漂う
    sparks.push({ x: p.x+(Math.random()-0.5)*25, y: p.y-40+(Math.random()-0.5)*30, vx:(Math.random()-0.5)*1.5, vy:-0.5-Math.random(), life:15, maxLife:15, color:Math.random()>0.5?'#44FF44':'#22CC22', size:1.5+Math.random()*1.5, gravity:-0.03, drag:0.97 });
  }
  if (p.dSkillBuff === 'microStar' && p.dSkillTimer % 6 === 0) {
    // マイクロ: 黄色い星パーティクル
    const a = Math.random() * Math.PI * 2;
    sparks.push({ x: p.x+Math.cos(a)*20, y: p.y-35+Math.sin(a)*15, vx:Math.cos(a)*1.5, vy:-1-Math.random()*0.5, life:12, maxLife:12, color:Math.random()>0.5?'#FFD700':'#FFEE88', size:2+Math.random()*1.5, gravity:0.02, drag:0.97 });
  }
  // プル: 超重力崩壊の爆発
  if (p.dSkillBuff === 'pullCollapse') {
    // 持続引き寄せ
    for (const t of players) {
      if (t.id === p.id || !t.alive) continue;
      const dx = p.x - t.x, dy = (p.y-35) - (t.y-35);
      const dist = Math.max(Math.sqrt(dx*dx+dy*dy), 30);
      t.vx += (dx/dist) * 0.8; t.vy += (dy/dist) * 0.5;
    }
    if (p.dSkillTimer <= 1) {
      // 大爆発
      const boom = { x: p.x - 60, y: p.y - 95, w: 120, h: 120 };
      checkHitboxAgainstPlayers(p, boom, 20, 10, 0.14, -45, 'special');
      p.hitTargets = [];
      hitFlash.alpha = 0.4; hitFlash.color = '#330066';
      triggerScreenShake(10, 18);
      hitEffects.push({ x: p.x, y: p.y-35, life: 22, maxLife: 22, color: '#6622AA', size: 120, type: 'ring' });
      hitEffects.push({ x: p.x, y: p.y-35, life: 18, maxLife: 18, color: '#CC88FF', size: 80 });
      for (let i = 0; i < 15; i++) sparks.push({ x: p.x+(Math.random()-0.5)*80, y: p.y-35+(Math.random()-0.5)*60, vx:(Math.random()-0.5)*8, vy:-3-Math.random()*4, life:18, maxLife:18, color:i%3===0?'#6622AA':(i%3===1?'#9944DD':'#330066'), size:3+Math.random()*3, gravity:0.08, drag:0.95 });
    }
    if (p.dSkillTimer % 6 === 0) sparks.push({ x: p.x+(Math.random()-0.5)*50, y: p.y-35+(Math.random()-0.5)*40, vx:(p.x-(p.x+(Math.random()-0.5)*80))*0.03, vy:(p.y-35-(p.y+(Math.random()-0.5)*60))*0.03, life:12, maxLife:12, color:'#9944DD', size:2.5+Math.random(), gravity:-0.02, drag:0.97 });
  }
  if (p.dSkillBuff === 'poyoSuper' && p.dSkillTimer % 8 === 0) {
    // ぽよ: 水色の光パーティクル
    sparks.push({ x: p.x+(Math.random()-0.5)*30, y: p.y-25+(Math.random()-0.5)*20, vx:(Math.random()-0.5)*1.5, vy:-0.5-Math.random()*0.5, life:10, maxLife:10, color:Math.random()>0.5?'#88EEFF':'#AAEEFF', size:2+Math.random()*1.5, gravity:-0.02, drag:0.97 });
  }
  if (p.dSkillBuff === 'kowaiStealth' && p.dSkillTimer % 8 === 0) {
    // 怖: 透明化中の黒い霧
    sparks.push({ x: p.x+(Math.random()-0.5)*25, y: p.y-35+(Math.random()-0.5)*25, vx:(Math.random()-0.5)*1.5, vy:-0.5-Math.random()*0.5, life:14, maxLife:14, color:'#220011', size:2.5+Math.random()*2, gravity:-0.03, drag:0.96 });
  }
  if (p.dSkillBuff === 'satoruHaki' && p.dSkillTimer % 6 === 0) {
    // サトル: 青いオーラ
    sparks.push({ x: p.x+(Math.random()-0.5)*25, y: p.y-35+(Math.random()-0.5)*20, vx:(Math.random()-0.5)*1.5, vy:-1-Math.random()*0.5, life:12, maxLife:12, color:Math.random()>0.5?'#44AAFF':'#2266AA', size:2+Math.random()*1.5, gravity:-0.02, drag:0.97 });
  }
  // 金金: 鎧中の金色オーラ（updateDSkillとは別にメインループでも呼べるが、ここでまとめる）
  if (p.charIdx === 22 && p.kingkingArmorTimer > 0 && p.dSkillTimer % 8 === 0) {
    sparks.push({ x: p.x+(Math.random()-0.5)*30, y: p.y-35+(Math.random()-0.5)*25, vx:(Math.random()-0.5)*1.5, vy:-0.8-Math.random()*0.5, life:12, maxLife:12, color:Math.random()>0.5?'#FFD700':'#DAA520', size:2+Math.random()*1.5, gravity:-0.02, drag:0.97 });
  }
  // 分身（サイソク）: 毎フレーム分身が攻撃判定 + 残像エフェクト
  if (p.dSkillBuff === 'bunshin') {
    const bx = p.x - dir * 30, by = p.y;
    const hitbox = { x: bx - 20, y: by - 50, w: 40, h: 50 };
    if (p.dSkillTimer % 4 === 0) hitEffects.push({ x: bx, y: by - 40, life: 8, maxLife: 8, color: 'rgba(68,255,136,0.4)', size: 15, type: 'charGhost' });
    for (const t of players) {
      if (t.id === p.id || !t.alive || t.invincibleTimer > 0) continue;
      const th = getPlayerHitbox(t);
      if (hitboxCollides(hitbox.x, hitbox.y, hitbox.w, hitbox.h, th.x, th.y, th.w, th.h) && p.dSkillTimer % 6 === 0) {
        applyHit(p, t, 3, 2, 0.02, -20, 'normal');
      }
    }
  }
  // 砲台展開（ロング）: 10Fごとに大弾発射 + 光跡フラッシュ
  if (p.dSkillBuff === 'turret' && p.dSkillTimer % 10 === 0) {
    projectiles.push({ x: p.x + 25*dir, y: p.y - 40, vx: 15*dir, vy: (Math.random()-0.5)*2,
      w: 12, h: 8, damage: 4, kbBase: 3, kbScale: 0.04, kbAngle: -15, life: 39, ownerId: p.id,
      color: '#66DDFF', pcolor: '#A0B4FF', shape: 'rect', ownerCharIdx: p.charIdx, time: 0 });
    hitEffects.push({ x: p.x + dir*30, y: p.y - 40, life: 8, maxLife: 8, color: '#66DDFF', size: 15, type: 'charSpark' });
    sparks.push({ x: p.x+dir*25, y: p.y-40, vx:dir*4, vy:(Math.random()-0.5)*1.5, life:8, maxLife:8, color:'#A0B4FF', size:2, gravity:0, drag:0.95 });
  }
  // Catbus全力疾走: ダッシュ中ヒット判定
  if (p.dSkillBuff === 'catbusDash') {
    const hitbox = { x: p.x - 30, y: p.y - 50, w: 60, h: 60 };
    for (const t of players) {
      if (t.id === p.id || !t.alive || t.invincibleTimer > 0) continue;
      const th = getPlayerHitbox(t);
      if (hitboxCollides(hitbox.x, hitbox.y, hitbox.w, hitbox.h, th.x, th.y, th.w, th.h) && p.dSkillTimer % 5 === 0) {
        applyHit(p, t, 8, 6, 0.08, -30, 'strong');
      }
    }
  }
  // 波おじ ラッシュ: 3Fごとにパンチ判定 + 大きい衝撃波 + 派手な最終爆発
  if (p.dSkillBuff === 'rush' && p.dSkillTimer % 3 === 0) {
    const hitbox = { x: p.x + (dir > 0 ? 0 : -75), y: p.y - 65, w: 75, h: 75 };
    const isLast = p.dSkillTimer <= 3;
    checkHitboxAgainstPlayers(p, hitbox, isLast ? 8 : 3, isLast ? 6 : 2, isLast ? 0.08 : 0.03, isLast ? -35 : -15, isLast ? 'strong' : 'normal');
    p.hitTargets = [];
    hitEffects.push({ x: p.x + dir*30, y: p.y - 40, life: 8, maxLife: 8, color: '#FF4444', size: isLast ? 60 : 22, type: isLast ? 'ring' : 'charSpark' });
    if (isLast) {
      triggerScreenShake(6, 12);
      hitEffects.push({ x: p.x + dir*30, y: p.y - 40, life: 16, maxLife: 16, color: '#FF6644', size: 70 });
      hitEffects.push({ x: p.x + dir*30, y: p.y - 40, life: 12, maxLife: 12, color: '#FFFFFF', size: 45, type: 'ring' });
      for (let i = 0; i < 6; i++) sparks.push({ x: p.x+dir*30+(Math.random()-0.5)*20, y: p.y-40, vx:dir*(2+Math.random()*4), vy:-2-Math.random()*3, life:12, maxLife:12, color:i%2?'#FF4444':'#FF8844', size:2.5+Math.random(), gravity:0.1, drag:0.95 });
    }
  }
  // 要塞化（タンク）: 移動不可
  if (p.dSkillBuff === 'fortress') {
    p.vx = 0;
  }
}

// --- Air dodge trigger ---
function triggerAirDodge(p, dirKeys) {
  p.airDodging = true;
  p.airDodgeTimer = AIR_DODGE_INVINCIBLE_FRAMES;
  p.airDodgeUsed = true;
  p.attacking = false;
  p.specialState = null;
  p.attackFrame = 0;

  // 方向入力に応じた回避ダッシュ
  let dx = 0, dy = 0;
  // Arrow keys (P1, or online remote)
  if (dirKeys['ArrowLeft']) dx -= 1;
  if (dirKeys['ArrowRight']) dx += 1;
  if (dirKeys['ArrowUp']) dy -= 1;
  if (dirKeys['ArrowDown']) dy += 1;
  // WASD keys (P2 local)
  if (dirKeys['a'] || dirKeys['A']) dx -= 1;
  if (dirKeys['d'] || dirKeys['D']) dx += 1;
  if (dirKeys['w'] || dirKeys['W']) dy -= 1;
  // Note: S key is the air dodge trigger for P2, so don't count it as down direction here

  // Clamp
  if (dx > 1) dx = 1; if (dx < -1) dx = -1;
  if (dy > 1) dy = 1; if (dy < -1) dy = -1;

  if (dx !== 0 || dy !== 0) {
    // 方向回避: 既存の慣性に回避方向の速度を加算
    const len = Math.sqrt(dx * dx + dy * dy);
    p.vx += (dx / len) * AIR_DODGE_SPEED;
    p.vy += (dy / len) * AIR_DODGE_SPEED;
    if (dx !== 0) p.facingLeft = dx < 0;
  }
  // 方向なし: 慣性を維持したまま回避（速度リセットしない）
}

function canAirDodge(p) {
  return !p.grounded && !p.airDodging && !p.airDodgeUsed && p.airDodgeEndlag <= 0
    && !p.attacking && p.hitstun <= 0 && !p.grabbed && !p.grabbing
    && p.guardBreakStun <= 0 && p.alive;
}

// Process a keydown event for a specific player
function processPlayerKeydown(key, p, playerId, keyState) {
  // Direction commands + スマッシュ入力トラッキング
  if (key === 'ArrowDown') { addCmdInput(playerId, 'D'); trackSmashInput(p, 'down'); }
  if (key === 'ArrowUp') { addCmdInput(playerId, 'U'); trackSmashInput(p, 'up'); }
  if (key === 'ArrowLeft') { addCmdInput(playerId, 'L'); trackSmashInput(p, 'side'); }
  if (key === 'ArrowRight') { addCmdInput(playerId, 'R'); trackSmashInput(p, 'side'); }
  // Normal attack (Z)
  if (key === 'z' || key === 'Z') {
    if (p.grabbing) {
      const target = players.find(pp => pp.id === p.grabTarget);
      if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
    } else {
      const cmd = checkCommandInput(p);
      if (cmd && executeCommand(p, cmd)) { }
      else if (!p.grounded && keyState['ArrowDown']) startAttack(p, 'downair');
      else if (!p.grounded) startAttack(p, 'aerial');
      else if (keyState['ArrowUp']) startAttack(p, 'up');
      else if (keyState['ArrowLeft'] || keyState['ArrowRight']) startAttack(p, 'side');
      else if (keyState['ArrowDown']) startAttack(p, 'down');
      else startAttack(p, 'normal');
    }
  }
  // Strong attack (X) - キャンセル対応
  if (key === 'x' || key === 'X') {
    if (p.grabbing) {
      let dx = 0, dy = 0;
      if (keyState['ArrowLeft']) dx = -1;
      if (keyState['ArrowRight']) dx = 1;
      if (keyState['ArrowUp']) dy = -1;
      if (keyState['ArrowDown']) dy = 1;
      executeThrow(p, dx, dy);
    } else {
      // スマッシュ攻撃チェック（方向2回+X）
      const smash = checkSmashReady(p);
      if (smash && p.grounded) {
        startSmashAttack(p, smash);
      } else if (!tryCancelAttack(p, 'strong')) {
        startAttack(p, 'strong');
      }
    }
  }
  // Special (C) - キャンセル対応
  if (key === 'c' || key === 'C') {
    if (!(p.charIdx === 10 && !p.dragonMode && p.damage >= 80 && p.dragonCooldown <= 0 && p.grounded)) {
      if (!tryCancelAttack(p, 'special')) {
        startAttack(p, 'special');
      }
    }
  }
  // Guard (ground) / Air Dodge (air) - S key
  if (key === 's' || key === 'S') {
    if (p.grounded) {
      // 地上: ガード
      if (!p.attacking && !p.guarding && p.guardDurability > 0 && p.guardBreakStun <= 0) {
        p.guarding = true;
        p.justGuardTimer = typeof JUST_GUARD_WINDOW !== 'undefined' ? JUST_GUARD_WINDOW : 6;
      }
    } else {
      // 空中: 空中回避
      if (canAirDodge(p)) {
        triggerAirDodge(p, keyState);
      }
    }
  }
  // Throw (A key) / 投げ抜け
  if (key === 'a' || key === 'A') {
    if (p.grabbed && p.throwTechWindow > 0) {
      const grabber = players.find(pp => pp.id === p.grabbedBy);
      if (grabber) throwTech(grabber, p);
    } else if (!p.grabbing && p.grounded && !p.attacking && p.hitstun <= 0 && !p.grabbed) {
      tryGrab(p);
    }
  }
}

function handleKeyDown(e) {
  // Init audio context on first interaction (required by browsers)
  if (!audioCtx) { try { getAudioCtx(); } catch(ex) {} }
  if (transitioning) return;

  if (scene === 'title') {
    if (e.key === 'Enter' || e.key === ' ') startTransition('select');
    if (e.key === 'o' || e.key === 'O') startTransition('online');
  } else if (scene === 'online') {
    if (e.key === 'Escape') {
      if (peer) { peer.destroy(); peer = null; }
      peerConn = null;
      onlineMode = false;
      onlineState = 'menu';
      onlineInputId = '';
      onlineError = '';
      startTransition('title');
    }
    if (onlineState === 'menu') {
      if (e.key === 'h' || e.key === 'H') {
        startHosting();
      } else if (e.key === 'j' || e.key === 'J') {
        onlineInputFocused = true;
      } else if (onlineInputFocused) {
        if (e.key === 'Backspace') {
          onlineInputId = onlineInputId.slice(0, -1);
        } else if (e.key === 'Enter' && onlineInputId.length >= 4) {
          joinRoom(onlineInputId);
        } else if (e.key.length === 1 && /[0-9]/.test(e.key) && onlineInputId.length < 6) {
          onlineInputId += e.key;
        }
      }
    }
    // Connected state is now handled in setupPeerConnection
    e.preventDefault();
    return;
  } else if (scene === 'select') {
    // Mode selection phase
    if (!modeSelected) {
      // オンライン対戦中はCPUモード選択不可→自動的にVS固定
      if (onlineMode) {
        gameMode = 'vs';
        modeSelected = true;
        return;
      }
      // オフライン: cpu / bossrush のみ、オンライン: vs のみ
      const availModes = onlineMode ? ['vs'] : ['cpu', 'bossrush'];
      const curIdx = availModes.indexOf(gameMode);
      if (e.key === 'ArrowLeft') {
        gameMode = availModes[(curIdx - 1 + availModes.length) % availModes.length];
      }
      if (e.key === 'ArrowRight') {
        gameMode = availModes[(curIdx + 1) % availModes.length];
      }
      if (e.key === 'Enter') {
        if (gameMode === 'bossrush') {
          // Boss Rush: proceed to character select (P1 only)
          bossRushMode = true;
          modeSelected = true;
          p1Confirmed = false;
          p2Confirmed = false;
          return;
        }
        modeSelected = true;
        p1Confirmed = false;
        p2Confirmed = false;
        if (gameMode === 'cpu') {
          if (p2Select === p1Select) p2Select = (p1Select + 1) % characters.length;
        }
      }
      if (e.key === 'Escape') { bossRushMode = false; startTransition('title'); }
      return;
    }

    // Character select phase
    if (gameMode === 'bossrush') {
      // Boss Rush: P1 selects, bosses are random
      if (!p1Confirmed) {
        const n = characters.length + 1;
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'Enter') {
          if (p1Select >= characters.length) p1Select = Math.floor(Math.random() * characters.length);
          bossRushPlayerChar = p1Select;
          // Pick 3 unique random bosses
          const pool = [];
          for (let i = 0; i < characters.length; i++) { if (i !== p1Select) pool.push(i); }
          for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
          bossRushBosses = pool.slice(0, 3);
          bossRushCurrent = 0;
          bossRushPhase = 'intro';
          bossRushTimer = 0;
          p2Select = bossRushBosses[0];
          cpuDifficulty = 3;
          p1Confirmed = true; p2Confirmed = true;
        }
      } else if (e.key === 'Enter' && p1Confirmed) {
        startTransition('stageselect'); return;
      }
    } else if (gameMode === 'cpu') {
      // CPU mode: P1 selects, A/D changes CPU char
      if (!p1Confirmed) {
        const n = characters.length + 1; // +1 for random
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'a' || e.key === 'A') p2Select = (p2Select + n - 1) % n;
        if (e.key === 'd' || e.key === 'D') p2Select = (p2Select + 1) % n;
        if (e.key === 'Enter') {
          if (p1Select >= characters.length) p1Select = Math.floor(Math.random() * characters.length);
          if (p2Select >= characters.length) p2Select = Math.floor(Math.random() * characters.length);
          p1Confirmed = true; p2Confirmed = true;
        }
      } else if (e.key === 'Enter' && p1Confirmed) {
        startTransition('difficulty'); return;
      }
    } else if (onlineMode) {
      // Online VS mode: arrows select local char, Enter confirms & sends
      const n = characters.length + 1; // +1 for random
      if (isHost) {
        // Host controls P1
        if (!p1Confirmed) {
          if (e.key === 'ArrowLeft') { p1Select = (p1Select + n - 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p1Select }); }
          if (e.key === 'ArrowRight') { p1Select = (p1Select + 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p1Select }); }
          if (e.key === 'Enter') {
            if (p1Select >= characters.length) p1Select = Math.floor(Math.random() * characters.length);
            p1Confirmed = true; if (peerConn) peerConn.send({ type: 'charConfirm', charIdx: p1Select });
          }
        }
        if (p1Confirmed && p2Confirmed && e.key === 'Enter') {
          startTransition('stageselect'); return;
        }
      } else {
        // Guest controls P2
        if (!p2Confirmed) {
          if (e.key === 'ArrowLeft') { p2Select = (p2Select + n - 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p2Select }); }
          if (e.key === 'ArrowRight') { p2Select = (p2Select + 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p2Select }); }
          if (e.key === 'Enter') {
            if (p2Select >= characters.length) p2Select = Math.floor(Math.random() * characters.length);
            p2Confirmed = true; if (peerConn) peerConn.send({ type: 'charConfirm', charIdx: p2Select });
          }
        }
        // Guest can also see both confirmed and wait for host to start
      }
    } else {
      // Local VS mode: original 2P controls
      const n = characters.length + 1; // +1 for random
      if (!p1Confirmed) {
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'Enter') {
          if (p1Select >= characters.length) p1Select = Math.floor(Math.random() * characters.length);
          p1Confirmed = true;
        }
      } else if (e.key === 'Enter' && p1Confirmed && p2Confirmed) {
        startTransition('stageselect'); return;
      }
      if (!p2Confirmed) {
        if (e.key === 'a' || e.key === 'A') p2Select = (p2Select + n - 1) % n;
        if (e.key === 'd' || e.key === 'D') p2Select = (p2Select + 1) % n;
        if (e.key === ' ') {
          if (p2Select >= characters.length) p2Select = Math.floor(Math.random() * characters.length);
          p2Confirmed = true; e.preventDefault();
        }
      }
    }

    if (e.key === 'Escape') {
      if (p1Confirmed || p2Confirmed) { p1Confirmed = false; p2Confirmed = false; }
      else if (!onlineMode) { modeSelected = false; bossRushMode = false; }
    }
  } else if (scene === 'difficulty') {
    if (e.key === 'ArrowLeft') difficultySelected = Math.max(0, difficultySelected - 1);
    if (e.key === 'ArrowRight') difficultySelected = Math.min(3, difficultySelected + 1);
    if (e.key === 'Enter') {
      cpuDifficulty = difficultySelected;
      startTransition('stageselect');
    }
    if (e.key === 'Escape') startTransition('select');
  } else if (scene === 'stageselect') {
    if (e.key === 'ArrowLeft') selectedStage = (selectedStage + stages.length - 1) % stages.length;
    if (e.key === 'ArrowRight') selectedStage = (selectedStage + 1) % stages.length;
    if (e.key === 'Enter') {
      if (onlineMode && isHost && peerConn) {
        peerConn.send({ type: 'startBattle', charIdx: p1Select, stageIdx: selectedStage });
      }
      startTransition('vsintro');
    }
    if (e.key === 'Escape') {
      if (bossRushMode) { startTransition('select'); }
      else if (gameMode === 'cpu') startTransition('difficulty');
      else startTransition('select');
    }
  } else if (scene === 'vsintro') {
    if (e.key === 'Enter' || e.key === ' ') {
      stopVsIntroFanfare();
      startTransition('battle');
    }
  } else if (scene === 'battle') {
    // Boss Rush clear screen
    if (bossRushMode && bossRushPhase === 'clear' && bossRushTimer > 120 && e.key === 'Enter') {
      bossRushMode = false;
      stopBGM();
      startTransition('title');
      return;
    }
    if (gameOver && gameSetTimer > 180 && e.key === 'Enter') {
      if (bossRushMode) {
        if (winner === 0) {
          // Player won - advance to next boss or clear
          bossRushCurrent++;
          if (bossRushCurrent >= 3) {
            // All bosses defeated - clear!
            bossRushPhase = 'clear';
            bossRushTimer = 0;
            const remainStocks = players[0].stocks;
            bossRushTitle = remainStocks >= 3 ? '無傷の覇者' : (remainStocks >= 2 ? '鉄壁の覇者' : '死線の覇者');
            try { localStorage.setItem('smash_bossrush_title', bossRushTitle); } catch(e) {}
          } else {
            // Next boss
            bossRushPhase = 'intro';
            bossRushTimer = 0;
            p2Select = bossRushBosses[bossRushCurrent];
            const prevStocks = players[0].stocks;
            const prevDamage = players[0].damage;
            initBattle();
            players[0].stocks = prevStocks;
            players[0].damage = prevDamage;
          }
        } else {
          // Player lost - restart boss rush
          bossRushMode = false;
          stopBGM();
          startTransition('select');
        }
        return;
      }
      // リマッチ
      initBattle(); return;
    }
    if (gameOver && gameSetTimer > 180 && e.key === 'Escape') {
      stopBGM();
      bossRushMode = false;
      startTransition('select'); return;
    }
    if (!battleStarted || gameOver) return;
    const p1 = players[0], p2 = players[1];

    // 崖つかまり中の入力処理（P1）
    if (p1 && p1.ledgeGrab) {
      if (e.key === 'ArrowUp') {
        if (keys['z'] || keys['Z'] || keys['x'] || keys['X']) releaseLedge(p1, 'attack');
        else if (keys['s'] || keys['S']) releaseLedge(p1, 'dodge');
        else releaseLedge(p1, 'normal');
      }
      if (e.key === 'ArrowDown') releaseLedge(p1, 'drop');
      return;
    }
    // 崖つかまり中の入力処理（P2ローカル）
    if (p2 && p2.ledgeGrab && !(gameMode === 'cpu' || bossRushMode) && !onlineMode) {
      if (e.key === 'w' || e.key === 'W') {
        if (keys['j'] || keys['J'] || keys['i'] || keys['I']) releaseLedge(p2, 'attack');
        else if (keys['k'] || keys['K']) releaseLedge(p2, 'dodge');
        else releaseLedge(p2, 'normal');
      }
      if (e.key === 's' || e.key === 'S') releaseLedge(p2, 'drop');
      return;
    }

    // Online: guest's local input controls P2, not P1
    // Remote attacks are handled in the game loop via remoteKeys
    if (onlineMode && !isHost) {
      // Guest: input is recorded in keys{} and sent via sendGuestInput()
      // No local game state changes - host is authoritative
      return;
    }

    // P1 direction input for commands (host or offline)
    if (e.key === 'ArrowDown') addCmdInput(0, 'D');
    if (e.key === 'ArrowUp') addCmdInput(0, 'U');
    if (e.key === 'ArrowLeft') addCmdInput(0, 'L');
    if (e.key === 'ArrowRight') addCmdInput(0, 'R');

    // P1 attacks: Z X C
    if (e.key === 'z' || e.key === 'Z') {
      if (p1.grabbing) {
        const target = players.find(pp => pp.id === p1.grabTarget);
        if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
      } else {
        // Check command input first
        const cmd = checkCommandInput(p1);
        if (cmd && cmd.chargeCmd) {
          // Charge command: start charging
          if (!p1.charging && !p1.attacking) {
            p1.charging = true; p1.chargeTime = 0; p1.chargeCmd = cmd;
          }
        } else if (cmd && executeCommand(p1, cmd)) {
          // Command executed
        } else if (!p1.grounded && keys['ArrowDown']) {
          startAttack(p1, 'downair');
        } else if (!p1.grounded) {
          startAttack(p1, 'aerial');
        } else if (p1.grounded && Math.abs(p1.vx) > 3 && (keys['ArrowLeft'] || keys['ArrowRight'])) {
          startAttack(p1, 'dash');
        } else if (keys['ArrowUp']) {
          startAttack(p1, 'up');
        } else if (keys['ArrowLeft'] || keys['ArrowRight']) {
          startAttack(p1, 'side');
        } else if (keys['ArrowDown']) {
          startAttack(p1, 'down');
        } else {
          startAttack(p1, 'normal');
        }
      }
    }
    if (e.key === 'x' || e.key === 'X') {
      if (!tryCancelAttack(p1, 'strong')) {
        startAttack(p1, 'strong');
      }
    }
    // P1 Throw (A key) / 投げ抜け
    if (e.key === 'a' || e.key === 'A') {
      if (p1.grabbed && p1.throwTechWindow > 0) {
        // 投げ抜け
        const grabber = players.find(pp => pp.id === p1.grabbedBy);
        if (grabber) throwTech(grabber, p1);
      } else if (!p1.grabbing && p1.grounded && !p1.attacking && p1.hitstun <= 0 && !p1.grabbed) {
        tryGrab(p1);
      }
    }
    if (e.key === 'c' || e.key === 'C') {
      // 天才: 変形条件を満たしている場合はspecial攻撃を抑制（長押し変形用）
      if (!(p1.charIdx === 10 && !p1.dragonMode && p1.damage >= 80 && p1.dragonCooldown <= 0 && p1.grounded)) {
        startAttack(p1, 'special');
      }
    }
    // P1 Guard (ground) / Air Dodge (air) - S key
    if (e.key === 's' || e.key === 'S') {
      if (p1.grounded) {
        if (!p1.attacking && !p1.guarding && p1.guardDurability > 0 && p1.guardBreakStun <= 0) {
          p1.guarding = true;
          p1.justGuardTimer = typeof JUST_GUARD_WINDOW !== 'undefined' ? JUST_GUARD_WINDOW : 6;
        }
      } else {
        if (canAirDodge(p1)) {
          triggerAirDodge(p1, keys);
        }
      }
    }

    // P2 attacks: U I O (only in local VS mode, skip for online)
    if (gameMode === 'vs' && !onlineMode) {
      // P2 direction input for commands
      if (e.key === 's' || e.key === 'S') addCmdInput(1, 'D');
      if (e.key === 'w' || e.key === 'W') addCmdInput(1, 'U');
      if (e.key === 'a' || e.key === 'A') addCmdInput(1, 'L');
      if (e.key === 'd' || e.key === 'D') addCmdInput(1, 'R');

      if (e.key === 'u' || e.key === 'U') {
        if (p2.grabbing) {
          const target = players.find(pp => pp.id === p2.grabTarget);
          if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
        } else {
          const cmd = checkCommandInput(p2);
          if (cmd && cmd.chargeCmd) {
            if (!p2.charging && !p2.attacking) {
              p2.charging = true; p2.chargeTime = 0; p2.chargeCmd = cmd;
            }
          } else if (cmd && executeCommand(p2, cmd)) {
            // Command executed
          } else if (!p2.grounded && (keys['s'] || keys['S'])) {
            startAttack(p2, 'downair');
          } else if (!p2.grounded) {
            startAttack(p2, 'aerial');
          } else if (p2.grounded && Math.abs(p2.vx) > 3 && (keys['a'] || keys['A'] || keys['d'] || keys['D'])) {
            startAttack(p2, 'dash');
          } else if (keys['w'] || keys['W']) {
            startAttack(p2, 'up');
          } else if (keys['a'] || keys['A'] || keys['d'] || keys['D']) {
            startAttack(p2, 'side');
          } else if (keys['s'] || keys['S']) {
            startAttack(p2, 'down');
          } else {
            startAttack(p2, 'normal');
          }
        }
      }
      if (e.key === 'i' || e.key === 'I') {
        if (!tryCancelAttack(p2, 'strong')) {
          startAttack(p2, 'strong');
        }
      }
      // P2 Throw (F key) / 投げ抜け
      if (e.key === 'f' || e.key === 'F') {
        if (p2.grabbed && p2.throwTechWindow > 0) {
          const grabber = players.find(pp => pp.id === p2.grabbedBy);
          if (grabber) throwTech(grabber, p2);
        } else if (!p2.grabbing && p2.grounded && !p2.attacking && p2.hitstun <= 0 && !p2.grabbed) {
          tryGrab(p2);
        }
      }
      if (e.key === 'o' || e.key === 'O') {
        if (!(p2.charIdx === 10 && !p2.dragonMode && p2.damage >= 80 && p2.dragonCooldown <= 0 && p2.grounded)) {
          if (!tryCancelAttack(p2, 'special')) {
            startAttack(p2, 'special');
          }
        }
      }
      // P2 Air Dodge (E)
      if (e.key === 'e' || e.key === 'E') {
        if (canAirDodge(p2)) {
          triggerAirDodge(p2, keys);
        }
      }
    }
  }
}

canvas.addEventListener('click', (e) => {
  unlockAudio();

// ============================================================
// MAIN LOOP - 60FPS固定タイムステップ
// ============================================================
let lastTime = performance.now();
const FIXED_DT = 1000 / 60; // 16.667ms per frame
let accumulator = 0;

function gameLoop(timestamp) {
  let elapsed = timestamp - lastTime;
  lastTime = timestamp;

  // Cap elapsed to prevent spiral of death (e.g. tab was hidden)
  if (elapsed > 200) elapsed = FIXED_DT;

  accumulator += elapsed;

  // Fixed timestep updates for consistent physics
  let updated = false;
  while (accumulator >= FIXED_DT) {
    if (scene === 'vsintro') {
      vsIntroTime++;
      if (vsIntroTime >= VS_INTRO_DURATION && !transitioning) {
        stopVsIntroFanfare();
        startTransition('battle');
      }
    } else if (scene === 'battle') {
      if (onlineMode && !isHost) {
        // Guest: no game simulation, only update effects
        updateGuestEffects(FIXED_DT);
      } else if (hitStopFrames > 0) {
        hitStopFrames--;
      } else if (koSlowMotion.active) {
        // ③ スローモーション: 3フレームに1回だけ更新
        koSlowMotion.frames++;
        if (koSlowMotion.frames >= koSlowMotion.maxFrames) {
          koSlowMotion.active = false;
        }
        if (koSlowMotion.frames % 3 === 0) {
          updateBattle(FIXED_DT);
        }
      } else {
        if (ultimateActive && ultimatePhase === 'hitconfirm') {
          // Slow-mo: update every 5 frames
          if (ultimateTimer % 5 === 0) updateBattle(FIXED_DT);
        } else if (!ultimateActive || ultimatePhase === 'startup' || ultimatePhase === 'missdrain' || ultimatePhase === 'damage' || ultimatePhase === 'brighten') {
          updateBattle(FIXED_DT);
        }
        updateUltimate();
      }
      // Online host: process remote player's (P2) attack key presses (edge detection)
      if (onlineMode && isHost) {
        const rp = players[1];
        if (rp && rp.alive && battleStarted && !gameOver) {
          const rk = remoteKeys;
          const prk = prevRemoteKeys;
          // Z pressed
          if (rk.z && !prk.z) {
            const cmd = checkCommandInput(rp);
            if (cmd && cmd.chargeCmd) {
              if (!rp.charging && !rp.attacking) { rp.charging = true; rp.chargeTime = 0; rp.chargeCmd = cmd; }
            } else if (cmd && executeCommand(rp, cmd)) {
            } else if (!rp.grounded && rk.down) { startAttack(rp, 'downair');
            } else if (!rp.grounded) { startAttack(rp, 'aerial');
            } else if (rp.grounded && Math.abs(rp.vx) > 3 && (rk.left || rk.right)) { startAttack(rp, 'dash');
            } else if (rk.up) { startAttack(rp, 'up');
            } else if (rk.left || rk.right) { startAttack(rp, 'side');
            } else if (rk.down) { startAttack(rp, 'down');
            } else { startAttack(rp, 'normal'); }
          }
          // X pressed - キャンセル対応
          if (rk.x && !prk.x) {
            if (!tryCancelAttack(rp, 'strong')) { startAttack(rp, 'strong'); }
          }
          // A pressed - 投げ / 投げ抜け
          if (rk.a && !prk.a) {
            if (rp.grabbed && rp.throwTechWindow > 0) {
              const grabber = players.find(pp => pp.id === rp.grabbedBy);
              if (grabber) throwTech(grabber, rp);
            } else if (!rp.grabbing && rp.grounded && !rp.attacking && rp.hitstun <= 0 && !rp.grabbed) {
              tryGrab(rp);
            }
          }
          // C pressed - キャンセル対応
          if (rk.c && !prk.c) {
            if (!(rp.charIdx === 10 && !rp.dragonMode && rp.damage >= 80 && rp.dragonCooldown <= 0 && rp.grounded)) {
              if (!tryCancelAttack(rp, 'special')) { startAttack(rp, 'special'); }
            }
          }
          // Direction commands
          if (rk.down && !prk.down) addCmdInput(1, 'D');
          if (rk.up && !prk.up) addCmdInput(1, 'U');
          if (rk.left && !prk.left) addCmdInput(1, 'L');
          if (rk.right && !prk.right) addCmdInput(1, 'R');
          // S pressed - Air Dodge
          if (rk.s && !prk.s) {
            if (canAirDodge(rp)) {
              const dirKeys = { ArrowLeft: rk.left, ArrowRight: rk.right, ArrowUp: rk.up, ArrowDown: rk.down };
              triggerAirDodge(rp, dirKeys);
            }
          }
        }
        prevRemoteKeys = { ...remoteKeys };
      }
    }
    accumulator -= FIXED_DT;
    updated = true;
  }

  // Online: host sends state, guest sends input
  if (onlineMode && scene === 'battle') {
    if (isHost) sendHostState();
    else sendGuestInput();
  }

  // Render every frame for smooth visuals
  ctx.clearRect(0, 0, 960, 640);

  if (scene === 'title') {
    drawTitle(FIXED_DT);
  } else if (scene === 'online') {
    drawOnlineLobby(FIXED_DT);
  } else if (scene === 'select') {
    drawSelect(FIXED_DT);
  } else if (scene === 'difficulty') {
    drawDifficulty(FIXED_DT);
  } else if (scene === 'stageselect') {
    drawStageSelect(FIXED_DT);
  } else if (scene === 'vsintro') {
    drawVsIntro(FIXED_DT);
  } else if (scene === 'battle') {
    drawBattle(FIXED_DT);
    drawUltimateOverlay();
  }

  drawTransition();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>

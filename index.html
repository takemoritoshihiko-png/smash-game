        color: i % 2 === 0 ? '#AADDFF' : '#FFFFFF',
      });
    }

    // ② 黄色い星（大小様々、多めに飛び散る）
    for (let i = 0; i < 16; i++) {
      const angle = (i / 16) * Math.PI * 2 + Math.random() * 0.4;
      const speed = 2 + Math.random() * 7;
      sparks.push({
        x: ex, y: ey,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 70 + Math.floor(Math.random() * 20),
        maxLife: 90,
        color: i % 3 === 0 ? '#FFFFFF' : '#FFDD44',
        size: 3 + Math.random() * 6,
        type: 'star',
        gravity: 0.04,
        drag: 0.985,
        spin: (Math.random() - 0.5) * 0.4,
        angle: Math.random() * Math.PI * 2,
      });
    }

    // ③ スローモーション（1.5秒）
    koSlowMotion = { active: true, frames: 0, maxFrames: 90 };

    // ⑤ ストックロスアニメーション
    const stockIdx = p.stocks; // stocks already decremented, so this is the lost stock index
    const hudX = p.id === 0 ? 20 : 710;
    stockLossAnim = {
      active: true, playerId: p.id, life: 30, maxLife: 30,
      x: hudX + 10 + stockIdx * 22 + 7,
      y: 640 - 100 + 80 - 18 + 5,
    };

    // KO!! テキスト表示
    koDisplay = { active: true, life: 90, maxLife: 90, playerIdx: p.id };

    // 紙吹雪
    const killerIdx = p.id === 0 ? 1 : 0;
    const killerColor = characters[players[killerIdx] ? players[killerIdx].charIdx : 0].accent;
    for (let i = 0; i < 50; i++) {
      confetti.push({
        x: 100 + Math.random() * 760, y: -20 - Math.random() * 100,
        vx: (Math.random() - 0.5) * 4, vy: 1 + Math.random() * 3,
        life: 60 + Math.floor(Math.random() * 60), maxLife: 120,
        color: ['#FF4444','#FFDD00','#44AAFF','#FF66AA','#44FF88','#FF8844','#AA44FF', killerColor][i % 8],
        size: 3 + Math.random() * 5,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
        type: i % 3 === 0 ? 'rect' : i % 3 === 1 ? 'star' : 'circle',
      });
    }
    p.attacking = false;
    p.specialState = null;
    if (p.stocks <= 0) {
      gameOver = true;
      stopBGM();
      winner = p.id === 0 ? 1 : 0;
    } else {
      p.respawnTimer = RESPAWN_TIME;
    }
  }
}

// ============================================================
// BATTLE DRAWING
// ============================================================
function updateCamera() {
  // Find alive players to track
  const alive = players.filter(p => p.alive);
  if (alive.length === 0) return;

  // Calculate bounding box of all alive players
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of alive) {
    minX = Math.min(minX, p.x);
    maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y - 70); // account for character height
    maxY = Math.max(maxY, p.y);
  }

  // Also track players in hitstun flying offscreen (but not too far)
  for (const p of players) {
    if (!p.alive && p.respawnTimer > RESPAWN_TIME - 10) {
      // Recently died - briefly track their last position
      minX = Math.min(minX, Math.max(BLAST_LEFT + 50, p.x));
      maxX = Math.max(maxX, Math.min(BLAST_RIGHT - 50, p.x));
    }
  }

  // Target center = midpoint of players
  cam.targetX = (minX + maxX) / 2;
  cam.targetY = (minY + maxY) / 2;

  // Clamp target to keep stage visible
  const stageCX = (STAGE_LEFT + STAGE_RIGHT) / 2;
  const stageCY = STAGE_GROUND_Y - 100;
  // Bias toward stage center
  cam.targetX = cam.targetX * 0.7 + stageCX * 0.3;
  cam.targetY = cam.targetY * 0.6 + stageCY * 0.4;

  // Calculate zoom based on player distance
  const spanX = (maxX - minX) + cam.padX * 2;
  const spanY = (maxY - minY) + cam.padY * 2;
  const zoomX = 960 / Math.max(spanX, 200);
  const zoomY = 640 / Math.max(spanY, 200);
  cam.targetZoom = Math.min(zoomX, zoomY);
  cam.targetZoom = Math.max(cam.minZoom, Math.min(cam.maxZoom, cam.targetZoom));

  // Fast zoom-out when players are knocked far
  const anyFastKB = players.some(p => p.alive && p.hitstun > 0 && Math.sqrt(p.vx*p.vx + p.vy*p.vy) > 12);
  const zoomSpeed = anyFastKB ? 0.15 : cam.smoothZoom;
  const posSpeed = anyFastKB ? 0.15 : cam.smoothX;

  // Smooth interpolation
  cam.x += (cam.targetX - cam.x) * posSpeed;
  cam.y += (cam.targetY - cam.y) * posSpeed;
  cam.zoom += (cam.targetZoom - cam.zoom) * zoomSpeed;

  // Clamp camera so we don't show too far outside blast zones
  const halfW = (960 / cam.zoom) / 2;
  const halfH = (640 / cam.zoom) / 2;
  const viewMinX = BLAST_LEFT + 50;
  const viewMaxX = BLAST_RIGHT - 50;
  const viewMinY = BLAST_TOP + 50;
  const viewMaxY = BLAST_BOTTOM - 50;
  cam.x = Math.max(viewMinX + halfW, Math.min(viewMaxX - halfW, cam.x));
  cam.y = Math.max(viewMinY + halfH, Math.min(viewMaxY - halfH, cam.y));
}

function drawBattle(dt) {
  // Update camera
  updateCamera();

  // Screen shake
  updateScreenShake();
  ctx.save();
  if (screenShake.duration > 0) {
    ctx.translate(screenShake.x, screenShake.y);
  }

  // ===== 和風背景 =====
  // Sky gradient: 藍色→夕焼け紫
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 640);
  skyGrad.addColorStop(0, '#0e1428');
  skyGrad.addColorStop(0.3, '#1a1a3e');
  skyGrad.addColorStop(0.55, '#2e1a3a');
  skyGrad.addColorStop(0.75, '#4a1942');
  skyGrad.addColorStop(1, '#1a0a1a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, 960, 640);

  // Stars (sparse, calm)
  const starSeed = [
    [120,35,1.5],[300,55,1.2],[500,25,1.8],[680,50,1.3],[850,30,1.6],
    [80,110,1],[220,130,1.4],[440,100,1.1],[600,85,1.7],[780,120,1.2],
    [170,180,1.3],[350,170,1],[550,160,1.5],[730,190,1.1],[900,150,1.4],
  ];
  for (const [sx, sy, sr] of starSeed) {
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(sx + sy);
    ctx.fillStyle = '#EEDDCC';
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Moon (右上)
  const moonX = 760, moonY = 90, moonR = 50;
  // Moon glow
  const moonGlow = ctx.createRadialGradient(moonX, moonY, moonR * 0.3, moonX, moonY, moonR * 3);
  moonGlow.addColorStop(0, 'rgba(255, 240, 200, 0.15)');
  moonGlow.addColorStop(0.5, 'rgba(255, 220, 180, 0.05)');
  moonGlow.addColorStop(1, 'rgba(255, 200, 150, 0)');
  ctx.fillStyle = moonGlow;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR * 3, 0, Math.PI * 2); ctx.fill();
  // Moon body
  const moonBodyGrad = ctx.createRadialGradient(moonX - 8, moonY - 8, 2, moonX, moonY, moonR);
  moonBodyGrad.addColorStop(0, '#FFFDE8');
  moonBodyGrad.addColorStop(0.6, '#F5E6B8');
  moonBodyGrad.addColorStop(1, '#D4C090');
  ctx.fillStyle = moonBodyGrad;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2); ctx.fill();
  // Moon craters (subtle)
  ctx.fillStyle = 'rgba(180, 160, 120, 0.2)';
  ctx.beginPath(); ctx.arc(moonX - 12, moonY - 8, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(moonX + 15, moonY + 5, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(moonX + 5, moonY + 18, 5, 0, Math.PI * 2); ctx.fill();

  // Mountains (遠景: 3 layers)
  // Layer 3 (farthest, darkest)
  ctx.fillStyle = '#0e0e22';
  ctx.beginPath();
  ctx.moveTo(0, 420);
  ctx.lineTo(80, 310); ctx.lineTo(180, 350); ctx.lineTo(280, 280);
  ctx.lineTo(380, 330); ctx.lineTo(480, 260); ctx.lineTo(560, 300);
  ctx.lineTo(650, 270); ctx.lineTo(750, 320); ctx.lineTo(850, 290);
  ctx.lineTo(960, 340); ctx.lineTo(960, 420);
  ctx.closePath(); ctx.fill();
  // Layer 2 (富士山風)
  ctx.fillStyle = '#141432';
  ctx.beginPath();
  ctx.moveTo(0, 420);
  ctx.lineTo(100, 360); ctx.lineTo(200, 380);
  ctx.lineTo(340, 300); ctx.lineTo(420, 230); ctx.lineTo(500, 300); // 富士山
  ctx.lineTo(600, 360); ctx.lineTo(700, 340); ctx.lineTo(800, 370);
  ctx.lineTo(900, 350); ctx.lineTo(960, 380); ctx.lineTo(960, 420);
  ctx.closePath(); ctx.fill();
  // Snow cap on Fuji
  ctx.fillStyle = 'rgba(200, 210, 230, 0.25)';
  ctx.beginPath();
  ctx.moveTo(400, 260); ctx.lineTo(420, 230); ctx.lineTo(440, 260);
  ctx.closePath(); ctx.fill();
  // Layer 1 (nearest mountain)
  ctx.fillStyle = '#1a1a38';
  ctx.beginPath();
  ctx.moveTo(0, 420);
  ctx.lineTo(60, 390); ctx.lineTo(150, 400); ctx.lineTo(250, 370);
  ctx.lineTo(350, 395); ctx.lineTo(480, 360); ctx.lineTo(600, 390);
  ctx.lineTo(720, 375); ctx.lineTo(830, 395); ctx.lineTo(960, 385);
  ctx.lineTo(960, 420);
  ctx.closePath(); ctx.fill();

  // Torii gate (鳥居 - 中央奥)
  const toriiX = 480, toriiBase = 410, toriiH = 80;
  ctx.fillStyle = '#8B1A1A';
  // Pillars
  ctx.fillRect(toriiX - 50, toriiBase - toriiH, 6, toriiH);
  ctx.fillRect(toriiX + 44, toriiBase - toriiH, 6, toriiH);
  // Top beam (kasagi)
  ctx.fillRect(toriiX - 60, toriiBase - toriiH - 6, 120, 8);
  // Secondary beam (nuki)
  ctx.fillRect(toriiX - 45, toriiBase - toriiH + 18, 90, 5);
  // Kasagi ends (curved tips)
  ctx.fillStyle = '#8B1A1A';
  ctx.beginPath();
  ctx.moveTo(toriiX - 65, toriiBase - toriiH - 6);
  ctx.lineTo(toriiX - 60, toriiBase - toriiH + 2);
  ctx.lineTo(toriiX - 55, toriiBase - toriiH - 6);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(toriiX + 55, toriiBase - toriiH - 6);
  ctx.lineTo(toriiX + 60, toriiBase - toriiH + 2);
  ctx.lineTo(toriiX + 65, toriiBase - toriiH - 6);
  ctx.closePath(); ctx.fill();

  // Lanterns (灯籠 - 3つ)
  const lanternPositions = [[200, 400], [480, 405], [750, 398]];
  for (const [lx, ly] of lanternPositions) {
    // Pole
    ctx.fillStyle = '#444';
    ctx.fillRect(lx - 1, ly - 20, 3, 20);
    // Lantern body
    ctx.fillStyle = '#CC8833';
    ctx.fillRect(lx - 5, ly - 28, 11, 10);
    // Glow
    ctx.globalAlpha = 0.3;
    const lglow = ctx.createRadialGradient(lx, ly - 23, 2, lx, ly - 23, 18);
    lglow.addColorStop(0, '#FFCC66');
    lglow.addColorStop(1, 'rgba(255, 180, 60, 0)');
    ctx.fillStyle = lglow;
    ctx.beginPath(); ctx.arc(lx, ly - 23, 18, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Roof
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(lx - 7, ly - 28); ctx.lineTo(lx, ly - 34); ctx.lineTo(lx + 7, ly - 28);
    ctx.closePath(); ctx.fill();
  }

  // Sakura trees (桜の木 - ステージ両端)
  function drawSakuraTree(tx, ty, treeScale) {
    const ts = treeScale;
    // Trunk
    ctx.fillStyle = '#3A2520';
    ctx.beginPath();
    ctx.moveTo(tx - 5 * ts, ty);
    ctx.quadraticCurveTo(tx - 8 * ts, ty - 40 * ts, tx - 3 * ts, ty - 70 * ts);
    ctx.lineTo(tx + 3 * ts, ty - 70 * ts);
    ctx.quadraticCurveTo(tx + 8 * ts, ty - 40 * ts, tx + 5 * ts, ty);
    ctx.closePath(); ctx.fill();
    // Branches
    ctx.strokeStyle = '#3A2520';
    ctx.lineWidth = 3 * ts; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(tx, ty - 55 * ts);
    ctx.quadraticCurveTo(tx - 25 * ts, ty - 65 * ts, tx - 40 * ts, ty - 60 * ts); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx, ty - 60 * ts);
    ctx.quadraticCurveTo(tx + 20 * ts, ty - 75 * ts, tx + 35 * ts, ty - 68 * ts); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx - 5 * ts, ty - 45 * ts);
    ctx.quadraticCurveTo(tx - 30 * ts, ty - 50 * ts, tx - 35 * ts, ty - 42 * ts); ctx.stroke();
    ctx.lineWidth = 1; ctx.lineCap = 'butt';
    // Blossom clusters (pink cloud shapes)
    const blossomClusters = [
      [tx - 38 * ts, ty - 62 * ts, 16 * ts],
      [tx - 20 * ts, ty - 72 * ts, 14 * ts],
      [tx + 5 * ts, ty - 78 * ts, 18 * ts],
      [tx + 32 * ts, ty - 70 * ts, 15 * ts],
      [tx - 33 * ts, ty - 44 * ts, 12 * ts],
      [tx + 20 * ts, ty - 60 * ts, 13 * ts],
      [tx - 10 * ts, ty - 65 * ts, 10 * ts],
    ];
    for (const [bx, by, br] of blossomClusters) {
      ctx.fillStyle = 'rgba(255, 180, 200, 0.7)';
      ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255, 200, 210, 0.5)';
      ctx.beginPath(); ctx.arc(bx + br * 0.3, by - br * 0.2, br * 0.7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255, 160, 190, 0.4)';
      ctx.beginPath(); ctx.arc(bx - br * 0.3, by + br * 0.2, br * 0.6, 0, Math.PI * 2); ctx.fill();
    }
  }
  drawSakuraTree(70, 430, 1.1);
  drawSakuraTree(890, 425, 1.0);

  // === Apply dynamic camera transform ===
  ctx.save();
  ctx.translate(960 / 2, 640 / 2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  // ===== 和風ステージ足場 =====
  const stageW = STAGE_RIGHT - STAGE_LEFT;
  const stageH = 18;
  const stageY = STAGE_GROUND_Y;
  // Platform shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.beginPath();
  ctx.ellipse(STAGE_LEFT + stageW / 2, stageY + 30, stageW * 0.45, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // Platform body (木目風)
  const platGrad = ctx.createLinearGradient(0, stageY - 4, 0, stageY + stageH + 20);
  platGrad.addColorStop(0, '#8B5A2B');
  platGrad.addColorStop(0.3, '#7A4A1E');
  platGrad.addColorStop(1, '#4A2A0E');
  ctx.fillStyle = platGrad;
  ctx.beginPath();
  ctx.moveTo(STAGE_LEFT, stageY);
  ctx.lineTo(STAGE_RIGHT, stageY);
  ctx.lineTo(STAGE_RIGHT + 10, stageY + stageH + 20);
  ctx.lineTo(STAGE_LEFT - 10, stageY + stageH + 20);
  ctx.closePath();
  ctx.fill();
  // Top surface (畳風ライン)
  const topGrad = ctx.createLinearGradient(STAGE_LEFT, stageY - 4, STAGE_RIGHT, stageY - 4);
  topGrad.addColorStop(0, '#A0784A');
  topGrad.addColorStop(0.5, '#B8905A');
  topGrad.addColorStop(1, '#A0784A');
  ctx.fillStyle = topGrad;
  ctx.fillRect(STAGE_LEFT, stageY - 4, stageW, 6);
  // 畳 grid lines
  ctx.strokeStyle = 'rgba(60, 40, 20, 0.4)';
  ctx.lineWidth = 1;
  for (let lx = STAGE_LEFT + 40; lx < STAGE_RIGHT; lx += 40) {
    ctx.beginPath(); ctx.moveTo(lx, stageY - 4); ctx.lineTo(lx, stageY + 2); ctx.stroke();
  }
  // Center line
  ctx.strokeStyle = 'rgba(80, 50, 25, 0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(STAGE_LEFT, stageY - 1); ctx.lineTo(STAGE_RIGHT, stageY - 1); ctx.stroke();
  // Edge accent
  ctx.shadowColor = '#CC8844';
  ctx.shadowBlur = 6;
  ctx.strokeStyle = '#CC9955';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(STAGE_LEFT, stageY - 1);
  ctx.lineTo(STAGE_RIGHT, stageY - 1);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Blast zone
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.12)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.strokeRect(BLAST_LEFT, BLAST_TOP, BLAST_RIGHT - BLAST_LEFT, BLAST_BOTTOM - BLAST_TOP);
  ctx.setLineDash([]);

  // Projectiles
  for (const pr of projectiles) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, pr.life / 10);
    if (pr.shape === 'star') {
      ctx.fillStyle = pr.color;
      ctx.translate(pr.x, pr.y);
      ctx.rotate(pr.time * 0.3);
      drawStar(0, 0, pr.w * 0.6, 4, ctx);
      // Trail
      ctx.globalAlpha *= 0.3;
      ctx.fillStyle = pr.pcolor;
      drawStar(-pr.vx * 0.5, 0, pr.w * 0.4, 4, ctx);
    } else {
      // Slash projectile
      ctx.fillStyle = pr.color;
      const hw = pr.w / 2, hh = pr.h / 2;
      ctx.beginPath();
      ctx.ellipse(pr.x, pr.y, hw, hh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha *= 0.4;
      ctx.fillStyle = pr.pcolor;
      ctx.beginPath();
      ctx.ellipse(pr.x - pr.vx * 0.7, pr.y, hw * 0.7, hh * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Hit effects (enhanced)
  for (const e of hitEffects) {
    const t = 1 - e.life / e.maxLife;
    ctx.save();

    if (e.type === 'ring') {
      // 衝撃波リング - 円形に広がる
      const radius = e.size * t;
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    } else if (e.type === 'shockwave') {
      // 着地衝撃波 - 横に広がる半円
      ctx.globalAlpha = (1 - t) * 0.6;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * (1 - t);
      const sw = e.size * (0.3 + t * 0.7);
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, sw, sw * 0.3, 0, Math.PI, 0);
      ctx.stroke();
      // 内側の白い波
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = (1 - t) * 0.4;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, sw * 0.6, sw * 0.2, 0, Math.PI, 0);
      ctx.stroke();
    } else {
      // Outer ring
      ctx.globalAlpha = (1 - t) * 0.8;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * (1 - t);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * (0.5 + t * 0.5), 0, Math.PI * 2);
      ctx.stroke();
      // Inner flash
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = (1 - t) * 0.6;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * 0.35 * (1 - t), 0, Math.PI * 2);
      ctx.fill();
      // Cross flash on big hits
      if (e.size > 25) {
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2 * (1 - t);
        ctx.globalAlpha = (1 - t) * 0.5;
        const cr = e.size * 0.7 * (0.3 + t * 0.7);
        ctx.beginPath(); ctx.moveTo(e.x - cr, e.y); ctx.lineTo(e.x + cr, e.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(e.x, e.y - cr); ctx.lineTo(e.x, e.y + cr); ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Sparks (directional fire particles)
  for (const s of sparks) {
    const t = s.life / s.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.min(1, t * 1.5);

    if (s.type === 'dosbossDecoy') {
      ctx.globalAlpha = 0.4 + Math.sin(s.life * 0.1) * 0.15;
      ctx.fillStyle = '#CC66FF';
      ctx.beginPath(); ctx.ellipse(s.decoyX, s.decoyY - 30, 16, 28, 0, 0, Math.PI * 2); ctx.fill();
      // ? mark
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = 0.6 * t;
      ctx.fillText('?', s.decoyX, s.decoyY - 55);
      ctx.globalAlpha = 1;
      ctx.restore();
      continue;
    } else if (s.type === 'slash') {
      // Blue slash line spark
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.size * t;
      ctx.globalAlpha = t * 0.8;
      ctx.beginPath();
      ctx.moveTo(s.x - s.vx * 2, s.y - s.vy * 2);
      ctx.lineTo(s.x + s.vx, s.y + s.vy);
      ctx.stroke();
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = s.size * t * 0.3;
      ctx.globalAlpha = t * 0.5;
      ctx.stroke();
    } else if (s.type === 'explosion') {
      // Red explosion puff
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1.2 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.globalAlpha = t * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 2 * t, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'afterimage') {
      // Green afterimage streak
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.7;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.size * 0.6, s.size * 2 * t, Math.PI / 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'aura') {
      // Golden aura - glowing circle
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (0.8 + Math.sin(s.life * 0.3) * 0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.globalAlpha = t * 0.3;
      ctx.stroke();
    } else if (s.type === 'dust') {
      // 埃パーティクル - ぼやけた円がフェードアウト
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.5;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1.5 - t * 0.5), 0, Math.PI * 2);
      ctx.fill();
      // ソフトなグロー
      ctx.globalAlpha = t * 0.15;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3 * (1 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'star') {
      // 星パーティクル - 回転しながら飛ぶ
      const starAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.translate(s.x, s.y);
      ctx.rotate(starAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      drawStar(0, 0, s.size, 5, ctx);
      // 白いコア
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = t * 0.5;
      drawStar(0, 0, s.size * 0.5, 5, ctx);
    } else if (s.type === 'heart') {
      // ハートパーティクル
      const heartAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.translate(s.x, s.y);
      ctx.rotate(heartAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      ctx.beginPath();
      const hs = s.size;
      ctx.moveTo(0, hs * 0.3);
      ctx.bezierCurveTo(-hs, -hs * 0.3, -hs * 0.3, -hs, 0, -hs * 0.4);
      ctx.bezierCurveTo(hs * 0.3, -hs, hs, -hs * 0.3, 0, hs * 0.3);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = t * 0.4;
      ctx.beginPath();
      const hs2 = hs * 0.5;
      ctx.moveTo(0, hs2 * 0.3);
      ctx.bezierCurveTo(-hs2, -hs2 * 0.3, -hs2 * 0.3, -hs2, 0, -hs2 * 0.4);
      ctx.bezierCurveTo(hs2 * 0.3, -hs2, hs2, -hs2 * 0.3, 0, hs2 * 0.3);
      ctx.fill();
    } else if (s.type === 'bolt') {
      // 稲妻パーティクル
      ctx.translate(s.x, s.y);
      const boltAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.rotate(boltAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      const bs = s.size;
      ctx.beginPath();
      ctx.moveTo(-bs * 0.3, -bs);
      ctx.lineTo(bs * 0.15, -bs * 0.15);
      ctx.lineTo(bs * 0.5, -bs * 0.2);
      ctx.lineTo(-bs * 0.1, bs * 0.5);
      ctx.lineTo(bs * 0.05, bs * 0.05);
      ctx.lineTo(-bs * 0.4, bs * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.globalAlpha = t * 0.5;
      ctx.stroke();
    } else if (s.type === 'fireball') {
      // 火の玉 - グラデーション付きの大きな光球
      const r = s.size * (0.8 + (1 - t) * 0.4);
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.3, s.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.globalAlpha = t * 0.8;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Default spark
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * t, 0, Math.PI * 2);
      ctx.fill();
      // Bright core
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = t * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * t * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Damage numbers (floating)
  for (const d of damageNumbers) {
    const t = d.life / d.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.7 ? 1 : t / 0.7; // fade out in last 30%
    const size = Math.floor(18 * d.scale);
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = 'center';

    // Pop-in scale effect for bold (strong/special) numbers
    let popScale = 1;
    if (d.bold) {
      const age = (d.maxLife - d.life) / d.maxLife;
      if (age < 0.1) popScale = 1 + (1 - age / 0.1) * 0.4; // start big, shrink to normal
    }

    if (popScale !== 1) {
      ctx.translate(d.x, d.y);
      ctx.scale(popScale, popScale);
      ctx.translate(-d.x, -d.y);
    }

    // Outline for strong/special hits
    if (d.bold) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(d.value + '', d.x, d.y);
      // Glow
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 8;
    }
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText(d.value + '', d.x + 1, d.y + 1);
    ctx.shadowBlur = 0;
    // Main text
    ctx.fillStyle = d.color;
    ctx.fillText(d.value + '', d.x, d.y);
    ctx.restore();
  }

  // Knockback trails
  for (const tr of trails) {
    if (!tr.points || tr.points.length < 2) continue;
    const t = tr.life / tr.maxLife;
    const w = tr.width || 4;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // テーパー（先端が細い）軌跡を描画
    for (let i = 1; i < tr.points.length; i++) {
      const segT = i / tr.points.length; // 0=古い, 1=新しい
      ctx.globalAlpha = t * segT * 0.6;
      ctx.strokeStyle = tr.color;
      ctx.lineWidth = w * t * segT;
      ctx.beginPath();
      ctx.moveTo(tr.points[i - 1].x, tr.points[i - 1].y);
      ctx.lineTo(tr.points[i].x, tr.points[i].y);
      ctx.stroke();
    }
    // グロー
    ctx.globalAlpha = t * 0.12;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = (w + 4) * t;
    ctx.beginPath();
    ctx.moveTo(tr.points[0].x, tr.points[0].y);
    for (let i = 1; i < tr.points.length; i++) {
      ctx.lineTo(tr.points[i].x, tr.points[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Blast explosions (stock loss) - ④ 大きな爆発
  for (const be of blastExplosions) {
    const t = 1 - be.life / be.maxLife;
    ctx.save();
    // Multiple expanding rings (bigger)
    for (let r = 0; r < 5; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
      if (rt <= 0) continue;
      ctx.globalAlpha = (1 - rt) * 0.5;
      const colors = ['#FFF', be.color, be.charColor, '#FFDD44', '#FF66AA'];
      ctx.strokeStyle = colors[r];
      ctx.lineWidth = (6 - r) * (1 - rt);
      ctx.beginPath();
      ctx.arc(be.x, be.y, (60 + r * 30) * rt, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Central flash (bigger)
    if (t < 0.4) {
      const ft = t / 0.4;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grad = ctx.createRadialGradient(be.x, be.y, 0, be.x, be.y, 50 * (1 - ft));
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.5, be.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(be.x, be.y, 50 * (1 - ft), 0, Math.PI * 2);
      ctx.fill();
    }
    // Cross rays
    if (t < 0.5) {
      const ct2 = t / 0.5;
      ctx.globalAlpha = (1 - ct2) * 0.6;
      ctx.strokeStyle = '#FFDD44';
      ctx.lineWidth = 3 * (1 - ct2);
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const len = 80 * ct2;
        ctx.beginPath();
        ctx.moveTo(be.x + Math.cos(a) * 10, be.y + Math.sin(a) * 10);
        ctx.lineTo(be.x + Math.cos(a) * len, be.y + Math.sin(a) * len);
        ctx.stroke();
      }
    }
    // Screen flash overlay at start
    if (t < 0.12) {
      ctx.globalAlpha = 0.25 * (1 - t / 0.12);
      ctx.fillStyle = be.color;
      ctx.fillRect(0, 0, 960, 640);
    }
    ctx.restore();
  }

  // Players
  for (const p of players) {
    if (!p.alive) continue;
    ctx.save();

    if (p.invincibleTimer > 0 && Math.floor(p.invincibleTimer / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Hitstun flash + knockback afterimage
    if (p.hitstun > 0) {
      if (p.hitstun % 3 === 0) ctx.globalAlpha = 0.6;
      // Draw fading afterimage during strong knockback
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 6) {
        ctx.globalAlpha = 0.15;
        drawBattleCharacter(p.x - p.vx * 1.5, p.y - p.vy * 1.5 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        if (speed > 10) {
          ctx.globalAlpha = 0.07;
          drawBattleCharacter(p.x - p.vx * 3, p.y - p.vy * 3 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        }
        ctx.globalAlpha = p.hitstun % 3 === 0 ? 0.6 : 1;
      }
    }

    // ⑤ コマンド技スケールエフェクト & ドラゴンモード拡大
    const dragonScale = (p.charIdx === 10 && p.dragonMode) ? 1.3 : 1.0;
    if (cmdScaleEffect.playerId === p.id && cmdScaleEffect.life > 0) {
      const scaleT = cmdScaleEffect.life / 12;
      const s = (1 + scaleT * 0.3) * dragonScale;
      ctx.save();
      ctx.translate(p.x, p.y - 55);
      ctx.scale(s, s);
      ctx.translate(-p.x, -(p.y - 55));
      drawBattleCharacter(p.x, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.restore();
    } else if (dragonScale !== 1.0) {
      ctx.save();
      ctx.translate(p.x, p.y - 55);
      ctx.scale(dragonScale, dragonScale);
      ctx.translate(-p.x, -(p.y - 55));
      drawBattleCharacter(p.x, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.restore();
    } else {
      drawBattleCharacter(p.x, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
    }

    // Draw attack effects
    if (p.attacking && p.attackData) {
      drawAttackEffect(p);
    }

    // Guard effect
    if (p.guarding) {
      drawGuardEffect(p);
    }

    // Charge glow effect (溜め中の光る演出)
    if (p.charging) {
      ctx.save();
      const chargeRatio = Math.min(p.chargeTime / p.chargeMaxTime, 1);
      const pulse = Math.sin(battleTime * 0.15) * 0.3;
      const chColor = characters[p.charIdx].accent;
      // Glowing aura
      ctx.globalAlpha = 0.2 + chargeRatio * 0.4 + pulse * 0.1;
      const gr = ctx.createRadialGradient(p.x, p.y - 40, 5, p.x, p.y - 40, 30 + chargeRatio * 20);
      gr.addColorStop(0, chColor);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 40, 30 + chargeRatio * 20, 0, Math.PI * 2);
      ctx.fill();
      // Charge particles
      if (p.chargeTime % 4 === 0) {
        const a = Math.random() * Math.PI * 2;
        sparks.push({
          x: p.x + Math.cos(a) * 20, y: p.y - 40 + Math.sin(a) * 20,
          vx: -Math.cos(a) * 2, vy: -Math.sin(a) * 2 - 1,
          life: 10, maxLife: 15, color: chColor, size: 2 + chargeRatio * 2, gravity: -0.05,
        });
      }
      // Max charge flash
      if (chargeRatio >= 1 && battleTime % 10 < 5) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(p.x, p.y - 40, 35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // セン: 満腹パワーバフ中のスチームエフェクト
    if (p.charIdx === 18 && p.senBuffTimer > 0) {
      ctx.save();
      const pulse = Math.sin(battleTime * 0.08) * 0.1;
      ctx.globalAlpha = 0.2 + pulse;
      const sg = ctx.createRadialGradient(p.x, p.y - 40, 5, p.x, p.y - 40, 35);
      sg.addColorStop(0, '#FF8844');
      sg.addColorStop(0.5, '#FF884466');
      sg.addColorStop(1, 'rgba(255,136,68,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 40, 35, 0, Math.PI * 2);
      ctx.fill();
      // Steam particles
      if (battleTime % 8 === 0) {
        sparks.push({ x: p.x + (Math.random()-0.5)*20, y: p.y - 30, vx: (Math.random()-0.5)*1.5, vy: -1.5-Math.random()*1.5,
          life: 12, maxLife: 15, color: '#FFDDAA', size: 2+Math.random()*2, gravity: -0.03, drag: 0.98 });
      }
      // Buff timer indicator (flashing when low)
      const buffRatio = p.senBuffTimer / 600;
      if (buffRatio < 0.3 && battleTime % 10 < 5) {
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = '#FF8844';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 100, 8, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * buffRatio / 0.3);
        ctx.stroke();
      }
      ctx.restore();
    }
    // ドスボス: ランダム必殺技「?」表示
    if (p.charIdx === 19 && p.attacking && p.attackData && p.attackData.dosbossRandom && p.attackFrame <= p.attackData.startup) {
      ctx.save();
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#CC66FF';
      ctx.globalAlpha = 0.7 + Math.sin(battleTime * 0.2) * 0.3;
      ctx.fillText('?', p.x, p.y - 90);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // ドスボス: 重力デバフ表示
    if (p.gravityDebuffTimer > 0) {
      ctx.save();
      const gdt = p.gravityDebuffTimer / 180;
      ctx.globalAlpha = 0.3 * gdt;
      ctx.strokeStyle = '#9944CC';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y - 40, 20 + Math.sin(battleTime * 0.1) * 5, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Dragon mode aura (天才 ドラゴンモード中の炎オーラ)
    if (p.charIdx === 10 && p.dragonMode) {
      ctx.save();
      const pulse = Math.sin(battleTime * 0.1) * 0.15;
      ctx.globalAlpha = 0.25 + pulse;
      const fg = ctx.createRadialGradient(p.x, p.y - 40, 5, p.x, p.y - 40, 40);
      fg.addColorStop(0, '#FF6600');
      fg.addColorStop(0.5, '#FF440066');
      fg.addColorStop(1, 'rgba(255,68,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 40, 40, 0, Math.PI * 2);
      ctx.fill();
      // Dragon timer indicator
      const timerRatio = p.dragonTimer / 900;
      if (timerRatio < 0.3) {
        // Flashing warning when time is running out
        if (battleTime % 10 < 5) {
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = '#FF0000';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y - 100, 8, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * timerRatio / 0.3);
          ctx.stroke();
        }
      }
      // Fire particles
      if (battleTime % 6 === 0) {
        sparks.push({ x: p.x + (Math.random()-0.5)*20, y: p.y - 20, vx: (Math.random()-0.5)*2, vy: -1-Math.random()*2,
          life: 10, maxLife: 15, color: '#FF6600', size: 2+Math.random()*2, type: 'fireball', gravity: -0.05, drag: 0.98 });
      }
      ctx.restore();
    }

    // Dragon transform charging indicator
    if (p.charIdx === 10 && p.dragonTransformTimer > 0 && !p.dragonMode) {
      ctx.save();
      const tRatio = p.dragonTransformTimer / 60;
      ctx.globalAlpha = 0.4 + tRatio * 0.4;
      ctx.strokeStyle = '#FF4400';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 80, 12, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * tRatio);
      ctx.stroke();
      ctx.restore();
    }

    // Guard break stun effect
    if (p.guardBreakStun > 0) {
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(battleTime * 0.03) * 0.3;
      ctx.strokeStyle = '#FF6600';
      ctx.lineWidth = 2;
      // Dizzy stars
      for (let i = 0; i < 3; i++) {
        const angle = battleTime * 0.02 + i * Math.PI * 2 / 3;
        const sx = p.x + Math.cos(angle) * 18;
        const sy = p.y - 80 + Math.sin(angle) * 6;
        ctx.fillStyle = '#FFDD00';
        drawStar(sx, sy, 5, 5, ctx);
      }
      ctx.restore();
    }

    // Ink blind effect
    if (p.inkBlindTimer > 0) {
      ctx.save();
      const fade = Math.min(1, p.inkBlindTimer / 30);
      ctx.globalAlpha = 0.6 * fade;
      ctx.fillStyle = '#1A0030';
      ctx.beginPath(); ctx.ellipse(p.x, p.y - 45, 28, 35, 0, 0, Math.PI * 2); ctx.fill();
      // ink drip
      ctx.fillStyle = '#2A0040';
      ctx.globalAlpha = 0.5 * fade;
      for (let j = 0; j < 3; j++) {
        const dx = (j - 1) * 12;
        const drip = Math.min(20, (120 - p.inkBlindTimer) * 0.5);
        ctx.beginPath(); ctx.ellipse(p.x + dx, p.y - 30 + drip + j * 4, 4, 6 + drip * 0.3, 0, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    // Grab effect
    if (p.grabbing) {
      drawGrabEffect(p);
    }

    // Shadow dash / slide / charge after-image
    if (p.specialState === 'dashing' || p.specialState === 'sliding' || p.specialState === 'charging') {
      ctx.globalAlpha = 0.25;
      drawBattleCharacter(p.x - p.vx * 2, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.globalAlpha = 0.12;
      drawBattleCharacter(p.x - p.vx * 4, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
    }

    // Teleport slash flash
    if (p.specialState === 'teleSlashing') {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.ellipse(p.x, p.y - 35, 30, 45, 0, 0, Math.PI * 2); ctx.fill();
    }

    ctx.restore();

    // Player indicator
    const arrowY = p.y - 105;
    ctx.fillStyle = p.id === 0 ? '#44AAFF' : '#FF4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.id === 0 ? '1P' : (gameMode === 'cpu' ? 'CPU' : '2P'), p.x, arrowY - 8);
    ctx.beginPath();
    ctx.moveTo(p.x, arrowY + 2);
    ctx.lineTo(p.x - 6, arrowY - 4);
    ctx.lineTo(p.x + 6, arrowY - 4);
    ctx.closePath(); ctx.fill();
  }

  // Command name display (⑤ コミック風フォント)
  for (const cn of cmdNameDisplay) {
    const t = cn.life / cn.maxLife;
    const age = 1 - t;
    ctx.save();
    ctx.translate(cn.x, cn.y);
    // Pop-in scale
    let cnScale = 1;
    if (age < 0.1) cnScale = 0.2 + (age / 0.1) * 1.5;
    else if (age < 0.2) cnScale = 1.7 - ((age - 0.1) / 0.1) * 0.7;
    ctx.scale(cnScale, cnScale);
    ctx.globalAlpha = (t > 0.3 ? 1 : t / 0.3) * 0.8;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(cn.text, 0, 0);
    // Colored border
    ctx.strokeStyle = cn.color;
    ctx.lineWidth = 1.5;
    ctx.strokeText(cn.text, 0, 0);
    // White fill
    ctx.shadowColor = cn.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#FFF';
    ctx.fillText(cn.text, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // HIT/MISS displays
  for (const hm of hitMissDisplays) {
    const t = hm.life / hm.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.6 ? 1 : t / 0.6;
    ctx.textAlign = 'center';
    if (hm.isHit) {
      // Pop-in scale
      const age = 1 - t;
      const popScale = age < 0.15 ? 1.3 - age / 0.15 * 0.3 : 1.0;
      ctx.font = `bold ${Math.floor(32 * popScale)}px sans-serif`;
      ctx.shadowColor = '#FF4444';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#880000';
      ctx.lineWidth = 3;
      ctx.strokeText('HIT!', hm.x, hm.y);
      ctx.fillStyle = '#FF2222';
      ctx.fillText('HIT!', hm.x, hm.y);
      ctx.shadowBlur = 0;
    } else {
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#888888';
      ctx.globalAlpha *= 0.7;
      ctx.fillText('MISS', hm.x, hm.y);
    }
    ctx.restore();
  }

  // Countdown (screen space - after camera)
  if (battleCountdown > 0) {
    const sec = Math.ceil(battleCountdown / 60);
    ctx.font = 'bold 80px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF'; ctx.shadowColor = '#FFF'; ctx.shadowBlur = 20;
    ctx.fillText(sec.toString(), 480, 300);
    ctx.shadowBlur = 0;
  } else if (battleTime < 2500) {
    const goAlpha = Math.max(0, 1 - (battleTime - 3000) * 0.001);
    if (goAlpha > 0) {
      ctx.globalAlpha = Math.min(1, goAlpha);
      ctx.font = 'bold 90px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFDD44'; ctx.shadowColor = '#FFDD44'; ctx.shadowBlur = 20;
      ctx.fillText('GO!', 480, 300);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
  }

  // Game over
  if (gameOver && winner >= 0) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, 960, 640);
    if (battleTimer <= 0) {
      ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FF8844'; ctx.fillText('TIME UP!', 480, 230);
    }
    const wCh = characters[players[winner].charIdx];
    ctx.font = 'bold 50px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF'; ctx.shadowColor = wCh.color; ctx.shadowBlur = 20;
    const winLabel = winner === 0 ? '1P' : (gameMode === 'cpu' ? 'CPU' : '2P');
    ctx.fillText(`${winLabel} ${wCh.name} WIN!`, 480, 290);
    ctx.shadowBlur = 0;
    ctx.font = '22px sans-serif'; ctx.fillStyle = '#AAA';
    ctx.fillText('ENTER でキャラ選択に戻る', 480, 350);
  }

  // デバッグ：当たり判定の可視化（F3で切り替え）
  if (debugHitboxes) {
    for (const p of players) {
      if (!p.alive) continue;
      // プレイヤーの食らい判定（緑枠）
      const ph = getPlayerHitbox(p);
      ctx.strokeStyle = '#00FF00';
      ctx.lineWidth = 2;
      ctx.strokeRect(ph.x, ph.y, ph.w, ph.h);
      ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
      ctx.fillRect(ph.x, ph.y, ph.w, ph.h);
      // 中心点
      ctx.fillStyle = '#00FF00';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      // 座標表示
      ctx.font = '10px monospace';
      ctx.fillStyle = '#00FF00';
      ctx.textAlign = 'left';
      ctx.fillText(`P${p.id} (${Math.round(p.x)},${Math.round(p.y)})`, ph.x, ph.y - 4);
      // 攻撃判定（赤枠）
      if (p.attacking && p.attackData) {
        const atk = p.attackData;
        if (atk.hw > 0 && atk.hh > 0 && p.attackFrame >= atk.startup && p.attackFrame < atk.startup + atk.active) {
          let ah;
          if (atk.centerHit) {
            ah = { x: p.x - atk.hw / 2, y: p.y + atk.hy, w: atk.hw, h: atk.hh };
          } else {
            ah = getAttackHitbox(p, atk);
          }
          ctx.strokeStyle = '#FF0000';
          ctx.lineWidth = 2;
          ctx.strokeRect(ah.x, ah.y, ah.w, ah.h);
          ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
          ctx.fillRect(ah.x, ah.y, ah.w, ah.h);
        }
      }
    }
    // 飛び道具の判定（黄枠）
    for (const pr of projectiles) {
      ctx.strokeStyle = '#FFFF00';
      ctx.lineWidth = 1;
      ctx.strokeRect(pr.x - pr.w / 2, pr.y - pr.h / 2, pr.w, pr.h);
    }
    // 衝突範囲（水色枠）
    if (players.length >= 2 && players[0].alive && players[1].alive) {
      const a = players[0], b = players[1];
      ctx.strokeStyle = '#00FFFF';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(a.x - 18, a.y - 70, 36, 70);
      ctx.strokeRect(b.x - 18, b.y - 70, 36, 70);
      ctx.setLineDash([]);
    }
    // DEBUG表示
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DEBUG: Hitboxes ON (F3 to toggle)', 10, 20);
  }

  // ===== All-Star Brawl 2 Style Effects =====

  // Speed lines (吹っ飛び時)
  for (const sl of speedLines) {
    const t = sl.life / sl.maxLife;
    ctx.save();
    ctx.globalAlpha = t * 0.4;
    ctx.strokeStyle = sl.color;
    ctx.lineWidth = sl.width * t * 0.6;
    ctx.beginPath();
    ctx.moveTo(sl.x, sl.y);
    ctx.lineTo(sl.x + Math.cos(sl.angle) * sl.length * 0.6, sl.y + Math.sin(sl.angle) * sl.length * 0.6);
    ctx.stroke();
    // Glow
    ctx.globalAlpha = t * 0.1;
    ctx.lineWidth = sl.width * t * 2;
    ctx.stroke();
    ctx.restore();
  }

  // Fire trails (200%超えの炎の軌跡)
  for (const f of fireTrails) {
    const t = f.life / f.maxLife;
    ctx.save();
    const r = f.size * (0.6 + t * 0.4);
    const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.2, '#FFDD44');
    grad.addColorStop(0.5, '#FF6600');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.globalAlpha = t * 0.5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Comic text effects (POW!, BAM!, etc.)
  for (const ct of comicTexts) {
    const t = ct.life / ct.maxLife;
    const age = 1 - t;
    ctx.save();
    ctx.translate(ct.x, ct.y);
    ctx.rotate(ct.rotation);
    // Pop-in scale
    let scale = 1;
    if (age < 0.15) scale = 0.3 + (age / 0.15) * 1.2;
    else if (age < 0.25) scale = 1.5 - (age - 0.15) / 0.1 * 0.5;
    ctx.scale(scale, scale);
    ctx.globalAlpha = (t > 0.3 ? 1 : t / 0.3) * 0.7;
    // Background burst shape
    ctx.fillStyle = ct.bgColor;
    ctx.globalAlpha *= 0.2;
    const burstR = ct.size * 1.0;
    ctx.beginPath();
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const r = i % 2 === 0 ? burstR : burstR * 0.65;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = (t > 0.3 ? 1 : t / 0.3) * 0.7;
    // Text outline
    ctx.font = `bold ${ct.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(ct.text, 0, 0);
    // White border
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 1.5;
    ctx.strokeText(ct.text, 0, 0);
    // Colored fill
    ctx.fillStyle = ct.color;
    ctx.fillText(ct.text, 0, 0);
    ctx.restore();
  }

  // === End dynamic camera (world-space effects above, screen-space below) ===
  ctx.restore();

  // HUD (screen space)
  drawBattleHUD();

  // Confetti (紙吹雪 - screen space)
  for (const c of confetti) {
    const t = c.life / c.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.3 ? 0.6 : (t / 0.3) * 0.6;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillStyle = c.color;
    if (c.type === 'rect') {
      ctx.fillRect(-c.size, -c.size * 0.5, c.size * 2, c.size);
    } else if (c.type === 'star') {
      drawStar(0, 0, c.size, 5, ctx);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, c.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Special aura (虹色オーラ - 必殺技時)
  for (const sa of specialAura) {
    const t = sa.life / sa.maxLife;
    const p = players.find(pp => pp.id === sa.playerId);
    if (!p || !p.alive) continue;
    ctx.save();
    const auraTime = (sa.maxLife - sa.life) * 0.15;
    for (let ring = 0; ring < 3; ring++) {
      const hue = ((auraTime * 60 + ring * 120) % 360);
      ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
      ctx.lineWidth = (2 - ring * 0.5) * t;
      ctx.globalAlpha = t * (0.3 - ring * 0.08);
      const r = 18 + ring * 6 + Math.sin(auraTime + ring) * 3;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - 40, r * 0.7, r, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Inner glow
    const hue2 = ((auraTime * 90) % 360);
    const aGrad = ctx.createRadialGradient(p.x, p.y - 40, 3, p.x, p.y - 40, 22);
    aGrad.addColorStop(0, `hsla(${hue2}, 100%, 80%, ${0.15 * t})`);
    aGrad.addColorStop(1, `hsla(${hue2}, 100%, 50%, 0)`);
    ctx.fillStyle = aGrad;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - 40, 22, 28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ① KO光の斬撃エフェクト
  for (const sl of koSlashEffects) {
    if (sl.delay > 0) continue;
    const t = sl.life / sl.maxLife;
    ctx.save();
    ctx.translate(sl.x, sl.y);
    ctx.rotate(sl.angle);
    // Extend phase then fade
    const extend = t > 0.6 ? (1 - t) / 0.4 : 1;
    const fade = t < 0.3 ? t / 0.3 : 1;
    const len = sl.length * extend;
    // Main slash line
    ctx.globalAlpha = fade * t * 0.7;
    ctx.strokeStyle = sl.color;
    ctx.lineWidth = sl.width * (0.5 + t * 0.5);
    ctx.beginPath();
    ctx.moveTo(-len / 2, 0);
    ctx.lineTo(len / 2, 0);
    ctx.stroke();
    // Glow
    ctx.globalAlpha = fade * t * 0.25;
    ctx.lineWidth = sl.width * 4 * t;
    ctx.strokeStyle = '#88BBFF';
    ctx.stroke();
    // Bright core
    ctx.globalAlpha = fade * t * 0.5;
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#FFFFFF';
    ctx.stroke();
    ctx.restore();
  }

  // ⑤ ストックロスアニメーション
  if (stockLossAnim.active) {
    const t = stockLossAnim.life / stockLossAnim.maxLife;
    ctx.save();
    const animX = stockLossAnim.x;
    const animY = stockLossAnim.y - (1 - t) * 30;
    ctx.globalAlpha = t;
    ctx.translate(animX, animY);
    const s = 1 + (1 - t) * 1.5;
    ctx.scale(s, s);
    // Fading stock circle
    const pIdx = stockLossAnim.playerId;
    const ch = characters[players[pIdx] ? players[pIdx].charIdx : 0];
    ctx.fillStyle = ch.color;
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    // Cross mark
    ctx.strokeStyle = '#FF2222';
    ctx.lineWidth = 2;
    ctx.globalAlpha = t * 0.8;
    ctx.beginPath();
    ctx.moveTo(-5, -5); ctx.lineTo(5, 5);
    ctx.moveTo(5, -5); ctx.lineTo(-5, 5);
    ctx.stroke();
    ctx.restore();
  }

  // KO!! display (撃墜テキスト)
  if (koDisplay.active) {
    const kt = koDisplay.life / koDisplay.maxLife;
    const age = 1 - kt;
    ctx.save();
    ctx.translate(480, 280);
    // Dramatic scale-in
    let koScale = 1;
    if (age < 0.08) koScale = 0.1 + (age / 0.08) * 2.5;
    else if (age < 0.18) koScale = 2.6 - ((age - 0.08) / 0.1) * 1.6;
    ctx.scale(koScale, koScale);
    ctx.globalAlpha = (kt > 0.2 ? 1 : kt / 0.2) * 0.8;
    // Burst background
    ctx.fillStyle = '#FF2222';
    ctx.globalAlpha *= 0.1;
    ctx.beginPath();
    for (let i = 0; i < 16; i++) {
      const a = (i / 16) * Math.PI * 2 + age * 0.5;
      const r = i % 2 === 0 ? 84 : 48;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = (kt > 0.2 ? 1 : kt / 0.2) * 0.8;
    // KO text
    ctx.font = 'bold 60px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText('KO!!', 2, 2);
    // Red outline
    ctx.strokeStyle = '#880000';
    ctx.lineWidth = 4;
    ctx.strokeText('KO!!', 0, 0);
    // White border
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.strokeText('KO!!', 0, 0);
    // Red fill
    ctx.fillStyle = '#FF2222';
    ctx.fillText('KO!!', 0, 0);
    // Glow
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 15;
    ctx.fillText('KO!!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // End screen shake context
  ctx.restore();

  // Command technique background flash (画面全体フラッシュ)
  if (cmdFlash.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = cmdFlash.alpha * 0.6;
    ctx.fillStyle = cmdFlash.color;
    ctx.fillRect(0, 0, 960, 640);
    ctx.restore();
  }

  // Hit flash overlay (rendered outside shake)
  if (hitFlash.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = hitFlash.alpha;
    ctx.fillStyle = hitFlash.color;
    ctx.fillRect(0, 0, 960, 640);
    ctx.restore();
    hitFlash.alpha *= 0.75;
    if (hitFlash.alpha < 0.01) hitFlash.alpha = 0;
  }
}

function drawAttackEffect(p) {
  const atk = p.attackData;
  const frame = p.attackFrame;
  const inActive = frame > atk.startup && frame <= atk.startup + atk.active;
  if (!inActive && atk.specialType !== 'jumpSlam') return;

  const dir = p.facingLeft ? -1 : 1;
  const cx = p.x;
  const cy = p.y;

  ctx.save();

  if (atk.effect === 'slash') {
    // Sword arc
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    const startAngle = dir > 0 ? -Math.PI * 0.7 : Math.PI * 0.3;
    const sweep = Math.PI * 0.8 * t;
    ctx.arc(cx + 15 * dir, cy - 40, 45, startAngle, startAngle + sweep * dir);
    ctx.stroke();
    // White flash line at tip
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.globalAlpha = (1 - t) * 0.9;
    const tipAngle = startAngle + sweep * dir;
    const tipX = cx + 15 * dir + Math.cos(tipAngle) * 45;
    const tipY = cy - 40 + Math.sin(tipAngle) * 45;
    ctx.beginPath(); ctx.arc(tipX, tipY, 6 * (1 - t), 0, Math.PI * 2); ctx.stroke();
    // Glow
    ctx.globalAlpha = 0.3 * (1 - t);
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(cx + 15 * dir, cy - 40, 45, startAngle, startAngle + sweep * dir);
    ctx.stroke();
  }

  if (atk.effect === 'bigslash') {
    const t = (frame - atk.startup) / atk.active;
    const sx = cx + 10 * dir;
    // Main slash line
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 7;
    ctx.globalAlpha = 0.9 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(sx, cy - 65);
    ctx.lineTo(sx + 95 * dir * t, cy - 20);
    ctx.stroke();
    // White glow trail
    ctx.lineWidth = 16;
    ctx.globalAlpha = 0.25 * (1 - t);
    ctx.strokeStyle = '#FFF';
    ctx.stroke();
    // Secondary cross slash
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.6 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(sx + 20 * dir, cy - 15);
    ctx.lineTo(sx + 80 * dir * t, cy - 55);
    ctx.stroke();
    // Impact burst at end of slash
    if (t > 0.5) {
      const bt = (t - 0.5) * 2;
      ctx.globalAlpha = 0.6 * (1 - bt);
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      const bx = sx + 90 * dir, by = cy - 25;
      ctx.beginPath(); ctx.arc(bx, by, 20 * bt, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.3 * (1 - bt);
      ctx.beginPath(); ctx.arc(bx, by, 12 * (1 - bt), 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'punch') {
    const t = (frame - atk.startup) / atk.active;
    const px = cx + (20 + 20 * t) * dir;
    // Impact circle
    ctx.fillStyle = atk.color;
    ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.arc(px, cy - 35, 12 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // White spark flash
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.8 * (1 - t);
    const sparkR = 8 + 10 * t;
    for (let i = 0; i < 4; i++) {
      const a = i * Math.PI / 2 + t * Math.PI;
      ctx.beginPath();

    ctx.save();
    ctx.translate(cx + 30 * dir * t, cy);
    ctx.rotate(t * Math.PI * 8);
    ctx.strokeStyle = '#44FFCC'; ctx.lineWidth = 4 * (1 - t * 0.3); ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(0, 0, 15 + 5 * t, 0, Math.PI * 1.5); ctx.stroke();
    ctx.strokeStyle = '#88AAFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(0, 0, 22 + 5 * t, 0, Math.PI); ctx.stroke();
    ctx.restore();
    // Trail sparks
    for (let i = 0; i < 3; i++) {
      const tx = cx - (20 + i * 15) * dir * t;
      ctx.fillStyle = '#44FFCC'; ctx.globalAlpha = 0.3 * (1 - i * 0.25);
      ctx.beginPath(); ctx.arc(tx, cy - 5 + Math.sin(frame * 0.5 + i) * 8, 4 - i, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'cmdLong2') {
    // Extended spear: long cyan beam
    const t = (frame - atk.startup) / atk.active;
    const beamLen = 140 * Math.min(1, t * 2);
    // Main beam
    ctx.strokeStyle = '#A0B4FF'; ctx.lineWidth = 6 * (1 - t * 0.3); ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.moveTo(cx + 15 * dir, cy); ctx.lineTo(cx + (15 + beamLen) * dir, cy); ctx.stroke();
    // Inner glow
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.7 * (1 - t * 0.5);
    ctx.beginPath(); ctx.moveTo(cx + 15 * dir, cy); ctx.lineTo(cx + (15 + beamLen) * dir, cy); ctx.stroke();
    // Spear tip glow
    ctx.fillStyle = '#44FFCC'; ctx.globalAlpha = 0.8 * (1 - t * 0.3);
    ctx.beginPath(); ctx.arc(cx + (15 + beamLen) * dir, cy, 8 * (1 - t * 0.5), 0, Math.PI * 2); ctx.fill();
    // Electric crackle
    if (Math.random() > 0.4) {
      ctx.strokeStyle = '#44FFCC'; ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
      const sx = cx + (15 + Math.random() * beamLen) * dir;
      ctx.beginPath(); ctx.moveTo(sx, cy - 5); ctx.lineTo(sx + (Math.random() - 0.5) * 10, cy - 12 - Math.random() * 8); ctx.stroke();
    }
  }

  if (atk.effect === 'cmdJudge1') {
    // 拘束令状: 紫の鎖がターゲットに向かう
    const t = (frame - atk.startup) / atk.active;
    const range = 70 * Math.min(1, t * 2);
    // 紫の波紋
    ctx.strokeStyle = '#C0A0FF'; ctx.lineWidth = 3 * (1 - t * 0.5); ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + range * dir * 0.5, cy - 35, 20 + t * 30, 0, Math.PI * 2); ctx.stroke();
    // 内側の拘束サークル
    ctx.strokeStyle = '#9966DD'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5 * (1 - t);
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx + range * dir * 0.5, cy - 35, 10 + t * 15, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    // 「拘束」の文字エフェクト
    if (t < 0.5) {
      ctx.fillStyle = '#C0A0FF'; ctx.globalAlpha = 0.6 * (1 - t * 2);
      ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('BIND', cx + range * dir * 0.5, cy - 55);
    }
  }

  if (atk.effect === 'cmdJudge2') {
    // 死刑宣告: 全方向に黒い波動
    const t = (frame - atk.startup) / atk.active;
    const waveR = 20 + t * 80;
    // 黒い波動リング（複数）
    for (let r = 0; r < 3; r++) {
      const rt = Math.max(0, t - r * 0.15);
      if (rt <= 0) continue;
      const rr = 20 + rt * 80;
      ctx.strokeStyle = r === 0 ? '#2A2A3A' : r === 1 ? '#9966DD' : '#C0A0FF';
      ctx.lineWidth = (4 - r) * (1 - t * 0.5);
      ctx.globalAlpha = 0.6 * (1 - rt);
      ctx.beginPath(); ctx.arc(cx, cy - 35, rr, 0, Math.PI * 2); ctx.stroke();
    }
    // 中央の暗黒オーラ
    if (t < 0.5) {
      const grad = ctx.createRadialGradient(cx, cy - 35, 0, cx, cy - 35, 30);
      grad.addColorStop(0, 'rgba(42,42,58,0.6)');
      grad.addColorStop(1, 'rgba(42,42,58,0)');
      ctx.fillStyle = grad; ctx.globalAlpha = 1 - t * 2;
      ctx.beginPath(); ctx.arc(cx, cy - 35, 30, 0, Math.PI * 2); ctx.fill();
    }
    // 放射状の暗い線
    ctx.strokeStyle = '#2A2A3A'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5 * (1 - t);
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + t * 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 15, cy - 35 + Math.sin(a) * 15);
      ctx.lineTo(cx + Math.cos(a) * waveR, cy - 35 + Math.sin(a) * waveR);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// --- Draw guard state ---
function drawGuardEffect(p) {
  if (!p.guarding) return;
  ctx.save();

  const durRatio = p.guardDurability / GUARD_MAX_DURABILITY;
  const isJustGuard = p.justGuardTimer > 0;

  // Shield bubble
  const shieldRadius = 38;
  if (isJustGuard) {
    // Just guard: bright white shield
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.9;
    ctx.shadowColor = '#FFFFFF';
    ctx.shadowBlur = 20;
  } else {
    // Normal guard: colored shield based on durability
    const r = Math.floor(255 * (1 - durRatio));
    const g = Math.floor(200 * durRatio);
    const b = Math.floor(255 * durRatio);
    ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.3 + durRatio * 0.4;
  }

  ctx.beginPath();
  ctx.arc(p.x, p.y - 35, shieldRadius, 0, Math.PI * 2);
  ctx.stroke();

  // Shield fill
  if (isJustGuard) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
  } else {
    ctx.fillStyle = `rgba(100, 180, 255, ${0.05 + durRatio * 0.1})`;
  }
  ctx.fill();
  ctx.shadowBlur = 0;

  // Durability bar under shield
  const barW = 40, barH = 4;
  const barX = p.x - barW / 2, barY = p.y + 8;
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  const fillColor = durRatio > 0.5 ? '#44DDFF' : durRatio > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillStyle = fillColor;
  ctx.fillRect(barX, barY, barW * durRatio, barH);

  ctx.restore();
}

// --- Draw grab state ---
function drawGrabEffect(p) {
  if (!p.grabbing) return;
  const target = players.find(pp => pp.id === p.grabTarget);
  if (!target) return;

  ctx.save();
  // Grab circle
  const t = Math.sin(battleTime * 0.01) * 0.3 + 0.5;
  ctx.strokeStyle = '#FFAA00';
  ctx.lineWidth = 2;
  ctx.globalAlpha = t;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc((p.x + target.x) / 2, (p.y + target.y) / 2 - 35, 35, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // "THROW!" hint
  ctx.globalAlpha = 0.6 + Math.sin(battleTime * 0.008) * 0.3;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFAA00';
  const throwKey = p.id === 0 ? 'X で投げる' : (gameMode === 'cpu' ? '' : 'I で投げる');
  if (throwKey) ctx.fillText(throwKey, p.x, p.y - 110);
  ctx.restore();
}

function drawBattleHUD() {
  // Timer
  const mins = Math.floor(battleTimer / 60);
  const secs = battleTimer % 60;
  const timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  roundRect(ctx, 430, 10, 100, 44, 8); ctx.fill();
  ctx.strokeStyle = battleTimer <= 30 ? '#FF4444' : '#888';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 430, 10, 100, 44, 8); ctx.stroke();
  ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = battleTimer <= 30 ? '#FF4444' : '#FFF';
  if (battleTimer <= 10) { ctx.shadowColor = '#FF4444'; ctx.shadowBlur = 10; }
  ctx.fillText(timeStr, 480, 40); ctx.shadowBlur = 0;

  drawPlayerHUD(120, 530, players[0], '1P', '#44AAFF');
  const p2Label = gameMode === 'cpu' ? 'CPU' : '2P';
  drawPlayerHUD(600, 530, players[1], p2Label, '#FF4444');
}

function drawPlayerHUD(x, y, player, label, color) {
  if (!player) return;
  const ch = characters[player.charIdx] || characters[0];
  const w = 240, h = 90;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  roundRect(ctx, x, y, w, h, 8); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 8); ctx.stroke();

  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = color; ctx.fillText(label, x + 10, y + 20);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText(ch.name, x + 40, y + 20);

  const dmgStr = Math.floor(player.damage) + '%';
  let dmgColor = '#FFFFFF';
  if (player.damage >= 100) dmgColor = '#FFDD44';
  if (player.damage >= 200) dmgColor = '#FF8844';
  if (player.damage >= 300) dmgColor = '#FF4444';
  ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = dmgColor; ctx.shadowColor = dmgColor; ctx.shadowBlur = 8;
  ctx.fillText(dmgStr, x + w / 2, y + 62); ctx.shadowBlur = 0;

  ctx.textAlign = 'left';
  for (let i = 0; i < MAX_STOCKS; i++) {
    const sx = x + 10 + i * 22, sy = y + h - 18;
    if (i < player.stocks) {
      ctx.fillStyle = ch.color;
      ctx.beginPath(); ctx.arc(sx + 7, sy + 5, 7, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(sx + 7, sy + 5, 7, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Guard durability bar
  const guardRatio = player.guardDurability / GUARD_MAX_DURABILITY;
  const gbX = x + 120, gbY = y + h - 14, gbW = 110, gbH = 6;
  ctx.fillStyle = '#222';
  roundRect(ctx, gbX, gbY, gbW, gbH, 3); ctx.fill();
  const guardColor = guardRatio > 0.5 ? '#44BBDD' : guardRatio > 0.25 ? '#DDAA22' : '#DD4422';
  ctx.fillStyle = player.guardBreakStun > 0 ? '#FF2200' : guardColor;
  roundRect(ctx, gbX, gbY, gbW * guardRatio, gbH, 3); ctx.fill();
  ctx.font = '9px sans-serif'; ctx.fillStyle = '#AAA';
  ctx.fillText('GUARD', gbX + 1, gbY - 2);
}

// ============================================================
// ONLINE LOBBY
// ============================================================
function generateRoomId() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function setupPeerConnection(conn) {
  peerConn = conn;
  conn.on('open', () => {
    console.log('[ONLINE] Connection opened, isHost:', isHost);
    onlineState = 'connected';
    onlineError = '';
    // Send our character selection
    const myCharIdx = isHost ? p1Select : p2Select;
    conn.send({ type: 'charSelect', charIdx: myCharIdx });
    // Auto-transition to select screen
    onlineMode = true;
    gameMode = 'vs';
    modeSelected = true;
    p1Confirmed = false;
    p2Confirmed = false;
    if (scene === 'online') startTransition('select');
  });
  conn.on('data', (data) => {
    if (data.type === 'charSelect') {
      // Received remote player's character selection
      if (isHost) { p2Select = data.charIdx; }
      else { p1Select = data.charIdx; }
    } else if (data.type === 'charConfirm') {
      if (isHost) { p2Select = data.charIdx; p2Confirmed = true; }
      else { p1Select = data.charIdx; p1Confirmed = true; }
    } else if (data.type === 'startBattle') {
      if (isHost) { p2Select = data.charIdx; }
      else { p1Select = data.charIdx; }
      p1Confirmed = true; p2Confirmed = true;
      if (scene === 'select') startTransition('vsintro');
    } else if (data.type === 'input') {
      // Host receives guest input
      if (isHost) {
        remoteKeys = data.keys;
      }
    } else if (data.type === 'state') {
      // Guest receives authoritative state from host
      if (!isHost) {
        applyHostState(data);
      }
    }
  });
  conn.on('close', () => {
    console.log('[ONLINE] Connection closed');
    onlineError = '接続が切断されました';
    onlineState = 'menu';
    onlineMode = false;
    peerConn = null;
  });
  conn.on('error', (err) => {
    console.error('[ONLINE] Connection error:', err);
    onlineError = 'エラー: ' + err;
  });
}

function startHosting() {
  onlineRoomId = generateRoomId();
  onlineState = 'hosting';
  onlineError = '';
  isHost = true;
  console.log('[ONLINE] Hosting room:', onlineRoomId);
  peer = new Peer('smash-' + onlineRoomId);
  peer.on('open', (id) => {
    console.log('[ONLINE] Peer opened with ID:', id);
    onlineState = 'hosting';
  });
  peer.on('connection', (conn) => {
    console.log('[ONLINE] Guest connected!');
    setupPeerConnection(conn);
  });
  peer.on('error', (err) => {
    console.error('[ONLINE] Peer error:', err.type, err);
    onlineError = '接続エラー: ' + err.type;
    onlineState = 'menu';
  });
}

function joinRoom(roomId) {
  onlineState = 'joining';
  onlineError = '';
  isHost = false;
  console.log('[ONLINE] Joining room:', roomId);
  peer = new Peer();
  peer.on('open', (id) => {
    console.log('[ONLINE] Guest peer opened:', id, '→ connecting to smash-' + roomId);
    const conn = peer.connect('smash-' + roomId, { reliable: true });
    setupPeerConnection(conn);
  });
  peer.on('error', (err) => {
    console.error('[ONLINE] Peer error:', err.type, err);
    onlineError = 'エラー: ' + err.type;
    onlineState = 'menu';
  });
}

function sendGuestInput() {
  if (!peerConn || !peerConn.open) return;
  const myKeys = {
    left: !!(keys['ArrowLeft']),
    right: !!(keys['ArrowRight']),
    up: !!(keys['ArrowUp']),
    down: !!(keys['ArrowDown']),
    z: !!(keys['z'] || keys['Z']),
    x: !!(keys['x'] || keys['X']),
    c: !!(keys['c'] || keys['C']),
    v: !!(keys['v'] || keys['V']),
  };
  peerConn.send({ type: 'input', keys: myKeys });
}

function serializePlayer(p) {
  return {
    x: p.x, y: p.y, vx: p.vx, vy: p.vy,
    damage: p.damage, stocks: p.stocks, alive: p.alive,
    attacking: p.attacking, attackType: p.attackType, attackFrame: p.attackFrame,
    facingLeft: p.facingLeft, hitstun: p.hitstun, grounded: p.grounded,
    guarding: p.guarding, animState: p.animState, walkCycle: p.walkCycle,
    spinAngle: p.spinAngle, damageTint: p.damageTint,
    invincibleTimer: p.invincibleTimer,
    dragonMode: p.dragonMode, dragonTimer: p.dragonTimer,
    charging: p.charging, chargeTime: p.chargeTime, chargeMaxTime: p.chargeMaxTime,
    grabbing: p.grabbing, grabbed: p.grabbed,
    grabTarget: p.grabTarget, grabbedBy: p.grabbedBy,
    respawnTimer: p.respawnTimer, landSquash: p.landSquash, jumpSquash: p.jumpSquash,
    specialState: p.specialState, jumps: p.jumps,
    guardDurability: p.guardDurability, guardBreakStun: p.guardBreakStun,
    justGuardTimer: p.justGuardTimer, strongLocked: p.strongLocked,
    dragonCooldown: p.dragonCooldown, dragonTransforming: p.dragonTransforming,
    dragonTransformTimer: p.dragonTransformTimer,
    throwCooldown: p.throwCooldown, inkBlindTimer: p.inkBlindTimer,
    animTimer: p.animTimer, charIdx: p.charIdx,
    kingComboHits: p.kingComboHits, kingComboTimer: p.kingComboTimer,
    senBuffTimer: p.senBuffTimer,
    dosbossRandomPattern: p.dosbossRandomPattern, gravityDebuffTimer: p.gravityDebuffTimer,
    cancelWindow: p.cancelWindow, comboWindow: p.comboWindow, airComboTimer: p.airComboTimer,
  };
}

let hostSendCounter = 0;
function sendHostState() {
  if (!peerConn || !peerConn.open) return;
  hostSendCounter++;
  if (hostSendCounter % 2 !== 0) return; // send every 2 frames
  const stateData = {
    type: 'state',
    p1: serializePlayer(players[0]),
    p2: serializePlayer(players[1]),
    battleTimer, battleStarted, battleCountdown, gameOver, winner,
    hitStopFrames,
    koSlowMotion: { active: koSlowMotion.active, frames: koSlowMotion.frames, maxFrames: koSlowMotion.maxFrames },
    projectiles: projectiles.map(pr => ({
      x: pr.x, y: pr.y, vx: pr.vx, vy: pr.vy,
      w: pr.w, h: pr.h, life: pr.life, ownerId: pr.ownerId,
      color: pr.color, pcolor: pr.pcolor,
      shape: pr.shape, time: pr.time, ownerCharIdx: pr.ownerCharIdx,
    })),
  };
  peerConn.send(stateData);
}

function applyHostState(data) {
  if (!players[0] || !players[1]) return;

  // Detect damage changes for local effects
  const oldDmg0 = players[0].damage, oldDmg1 = players[1].damage;
  const oldStocks0 = players[0].stocks, oldStocks1 = players[1].stocks;
  const oldAlive0 = players[0].alive, oldAlive1 = players[1].alive;

  // Apply player states (with position interpolation for smooth visuals)
  const LERP = 0.4;
  const applyFields = (target, src) => {
    // Lerp position for smoothness; snap if too far or state changed drastically
    const dx = src.x - target.x, dy = src.y - target.y;
    const snapDist = 80;
    if (Math.abs(dx) > snapDist || Math.abs(dy) > snapDist || src.alive !== target.alive || src.respawnTimer !== target.respawnTimer) {
      target.x = src.x; target.y = src.y;
    } else {
      target.x += dx * LERP;
      target.y += dy * LERP;
    }
    target.vx = src.vx; target.vy = src.vy;
    target.damage = src.damage; target.stocks = src.stocks; target.alive = src.alive;
    target.attacking = src.attacking; target.attackType = src.attackType; target.attackFrame = src.attackFrame;
    target.facingLeft = src.facingLeft; target.hitstun = src.hitstun; target.grounded = src.grounded;
    target.guarding = src.guarding; target.animState = src.animState; target.walkCycle = src.walkCycle;
    target.spinAngle = src.spinAngle; target.damageTint = src.damageTint;
    target.invincibleTimer = src.invincibleTimer;
    target.dragonMode = src.dragonMode; target.dragonTimer = src.dragonTimer;
    target.charging = src.charging; target.chargeTime = src.chargeTime; target.chargeMaxTime = src.chargeMaxTime;
    target.grabbing = src.grabbing; target.grabbed = src.grabbed;
    target.grabTarget = src.grabTarget; target.grabbedBy = src.grabbedBy;
    target.respawnTimer = src.respawnTimer; target.landSquash = src.landSquash; target.jumpSquash = src.jumpSquash;
    target.specialState = src.specialState; target.jumps = src.jumps;
    target.guardDurability = src.guardDurability; target.guardBreakStun = src.guardBreakStun;
    target.justGuardTimer = src.justGuardTimer; target.strongLocked = src.strongLocked;
    target.dragonCooldown = src.dragonCooldown; target.dragonTransforming = src.dragonTransforming;
    target.dragonTransformTimer = src.dragonTransformTimer;
    target.throwCooldown = src.throwCooldown; target.inkBlindTimer = src.inkBlindTimer;
    target.animTimer = src.animTimer; target.charIdx = src.charIdx;
    target.kingComboHits = src.kingComboHits; target.kingComboTimer = src.kingComboTimer;
    target.senBuffTimer = src.senBuffTimer;
    target.dosbossRandomPattern = src.dosbossRandomPattern || 0; target.gravityDebuffTimer = src.gravityDebuffTimer || 0;
    target.cancelWindow = src.cancelWindow || 0; target.comboWindow = src.comboWindow || 0; target.airComboTimer = src.airComboTimer || 0;
    // Restore attackData from attackType
    if (src.attacking && src.attackType) {
      const defs = (target.charIdx === 10 && target.dragonMode) ? dragonAttackDefs : attackDefs[target.charIdx];
      target.attackData = defs ? (defs[src.attackType] || null) : null;
    } else {
      target.attackData = null;
    }
  };
  applyFields(players[0], data.p1);
  applyFields(players[1], data.p2);

  // Global state
  battleTimer = data.battleTimer;
  battleStarted = data.battleStarted;
  battleCountdown = data.battleCountdown;
  gameOver = data.gameOver;
  winner = data.winner;
  hitStopFrames = data.hitStopFrames;
  koSlowMotion.active = data.koSlowMotion.active;
  koSlowMotion.frames = data.koSlowMotion.frames;
  koSlowMotion.maxFrames = data.koSlowMotion.maxFrames;
  // hitFlash and screenShake are generated locally from state changes
  // Don't overwrite them from host to avoid cancelling guest-local effects

  // Projectiles
  projectiles.length = 0;
  if (data.projectiles) {
    for (const pr of data.projectiles) {
      projectiles.push(pr);
    }
  }

  // Generate local effects on damage/stock changes
  for (let i = 0; i < 2; i++) {
    const oldDmg = i === 0 ? oldDmg0 : oldDmg1;
    const newDmg = players[i].damage;
    const oldStocks = i === 0 ? oldStocks0 : oldStocks1;
    const newStocks = players[i].stocks;
    const oldAlive = i === 0 ? oldAlive0 : oldAlive1;
    const p = players[i];
    if (newDmg > oldDmg) {
      const dmgDiff = newDmg - oldDmg;
      const isBig = dmgDiff >= 12;
      damageNumbers.push({
        x: p.x + (Math.random() - 0.5) * 20, y: p.y - 50,
        vy: -1.8 - Math.random() * 0.5,
        value: dmgDiff,
        life: isBig ? 50 : 40, maxLife: isBig ? 50 : 40,
        color: dmgDiff >= 15 ? '#FF4444' : dmgDiff >= 8 ? '#FFAA44' : '#FFFFFF',
        scale: isBig ? 1.4 : 1.0,
        bold: isBig,
      });
      hitEffects.push({ x: p.x, y: p.y - 35, life: 8, maxLife: 8, color: '#FFFFFF', size: 15 + dmgDiff * 0.5 });
      // Hit flash
      const chColor = characters[p.charIdx] ? characters[p.charIdx].accent : '#FFFFFF';
      hitFlash.alpha = Math.max(hitFlash.alpha, 0.1 + Math.min(dmgDiff / 40, 0.2));
      hitFlash.color = chColor;
      // Screen shake proportional to damage
      if (dmgDiff >= 8) triggerScreenShake(Math.min(dmgDiff / 3, 8), Math.min(dmgDiff / 2, 12));
      for (let s = 0; s < Math.min(6, 2 + Math.floor(dmgDiff / 5)); s++) {
        sparks.push({ x: p.x, y: p.y - 35, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6 - 2, life: 10+Math.random()*10, maxLife: 20, color: '#FFAA33', size: 2+Math.random()*3, gravity: 0.15, drag: 0.97 });
      }
    }
    if (newStocks < oldStocks) {
      const ch = characters[p.charIdx] || characters[0];
      const accent = ch.accent;
      const mainCol = ch.color;
      const ex = Math.max(BLAST_LEFT + 20, Math.min(BLAST_RIGHT - 20, p.x));
      const ey = Math.max(BLAST_TOP + 20, Math.min(BLAST_BOTTOM - 20, p.y));

      // KO display
      koDisplay = { active: true, life: 90, maxLife: 90, playerIdx: i };

      // Blast explosion with colors
      blastExplosions.push({ x: ex, y: ey, life: 40, maxLife: 40, color: accent, charColor: mainCol });

      // KO slash effects
      for (let j = 0; j < 5; j++) {
        const baseAngle = -0.6 + Math.random() * 1.2;
        koSlashEffects.push({
          x: ex, y: ey, angle: baseAngle,
          length: 400 + Math.random() * 500, width: 2 + Math.random() * 4,
          life: 90, maxLife: 90, delay: j * 3,
          color: j % 2 === 0 ? '#AADDFF' : '#FFFFFF',
        });
      }

      // Large spark burst (40 particles)
      for (let j = 0; j < 40; j++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 8;
        sparks.push({
          x: ex + (Math.random()-0.5)*20, y: ey + (Math.random()-0.5)*20,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
          life: 20 + Math.floor(Math.random()*20), maxLife: 40,
          color: j%4===0 ? '#FFFFFF' : j%4===1 ? accent : j%4===2 ? '#FFDD44' : mainCol,
          size: 1.5 + Math.random() * 3.5, gravity: 0.05 + Math.random()*0.1, drag: 0.98,
        });
      }

      // Star particles
      for (let j = 0; j < 16; j++) {
        const angle = (j/16) * Math.PI * 2 + Math.random() * 0.4;
        const speed = 2 + Math.random() * 7;
        sparks.push({
          x: ex, y: ey, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
          life: 70 + Math.floor(Math.random()*20), maxLife: 90,
          color: j%3===0 ? '#FFFFFF' : '#FFDD44', size: 3 + Math.random()*6,
          type: 'star', gravity: 0.04, drag: 0.985,
          spin: (Math.random()-0.5)*0.4, angle: Math.random()*Math.PI*2,
        });
      }

      // Stock loss animation
      const stockIdx = newStocks;
      const hudX = i === 0 ? 120 : 600;
      stockLossAnim = {
        active: true, playerId: i, life: 30, maxLife: 30,
        x: hudX + 10 + stockIdx * 22 + 7, y: 530 + 90 - 18 + 5,
      };

      // Confetti
      const killerIdx = i === 0 ? 1 : 0;
      const killerColor = characters[players[killerIdx] ? players[killerIdx].charIdx : 0].accent;
      for (let j = 0; j < 50; j++) {
        confetti.push({
          x: 100 + Math.random() * 760, y: -20 - Math.random() * 100,
          vx: (Math.random()-0.5)*4, vy: 1 + Math.random()*3,
          life: 60 + Math.floor(Math.random()*60), maxLife: 120,
          color: ['#FF4444','#FFDD00','#44AAFF','#FF66AA','#44FF88','#FF8844','#AA44FF', killerColor][j % 8],
          size: 3 + Math.random()*5,
          rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.2,
          type: j%3===0 ? 'rect' : j%3===1 ? 'star' : 'circle',
        });
      }

      // Hit flash
      hitFlash.alpha = 0.55;
      hitFlash.color = '#FFFFFF';

      // Screen shake + sound
      triggerScreenShake(10, 20);
      try { playHitSound('ko'); } catch(e) {}
    }
  }
}

function updateGuestEffects(dt) {
  // Increment battleTime for animation purposes
  battleTime += dt;

  // Client prediction: move players by their velocity between host updates
  for (const p of players) {
    if (!p.alive || p.grounded) continue;
    p.x += p.vx * 0.5; // half-step prediction (host will correct)
    p.y += p.vy * 0.5;
    p.vy += 0.3; // light gravity prediction
  }

  // Only update visual effects, no game logic
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    hitEffects[i].life--;
    if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
  }
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += (s.gravity || 0.15);
    s.vx *= (s.drag || 0.97);
    if (s.spin) s.angle = (s.angle || 0) + s.spin;
    s.life--;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy; d.vy *= 0.96; d.life--;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }
  for (let i = trails.length - 1; i >= 0; i--) {
    const tr = trails[i];
    tr.life--;
    if (tr.life <= 0) { trails.splice(i, 1); continue; }
    const target = players.find(pp => pp.id === tr.targetId);
    if (target && target.alive && target.hitstun > 0) {
      if (!tr.points) tr.points = [];
      tr.points.push({ x: target.x, y: target.y - 35 });
      const maxPts = tr.maxPoints || 20;
      if (tr.points.length > maxPts) tr.points.shift();
    }
  }
  for (let i = blastExplosions.length - 1; i >= 0; i--) {
    blastExplosions[i].life--;
    if (blastExplosions[i].life <= 0) blastExplosions.splice(i, 1);
  }
  for (let i = cmdNameDisplay.length - 1; i >= 0; i--) {
    cmdNameDisplay[i].life--; cmdNameDisplay[i].y -= 0.5;
    if (cmdNameDisplay[i].life <= 0) cmdNameDisplay.splice(i, 1);
  }
  for (let i = hitMissDisplays.length - 1; i >= 0; i--) {
    hitMissDisplays[i].life--; hitMissDisplays[i].y -= 0.8;
    if (hitMissDisplays[i].life <= 0) hitMissDisplays.splice(i, 1);
  }
  for (let i = comicTexts.length - 1; i >= 0; i--) {
    comicTexts[i].life--; comicTexts[i].y -= 0.6;
    if (comicTexts[i].life <= 0) comicTexts.splice(i, 1);
  }
  if (koDisplay.active) {
    koDisplay.life--;
    if (koDisplay.life <= 0) koDisplay.active = false;
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx; c.y += c.vy; c.vy += 0.03; c.vx *= 0.99;
    c.rotation += c.rotSpeed; c.life--;
    if (c.life <= 0) confetti.splice(i, 1);
  }
  for (let i = speedLines.length - 1; i >= 0; i--) {
    speedLines[i].life--;
    if (speedLines[i].life <= 0) speedLines.splice(i, 1);
  }
  for (let i = fireTrails.length - 1; i >= 0; i--) {
    const f = fireTrails[i];
    f.x += f.vx; f.y += f.vy; f.vy -= 0.05; f.size *= 0.97; f.life--;
    if (f.life <= 0) fireTrails.splice(i, 1);
  }
  for (let i = specialAura.length - 1; i >= 0; i--) {
    specialAura[i].life--;
    if (specialAura[i].life <= 0) specialAura.splice(i, 1);
  }
  if (cmdFlash.alpha > 0) {
    cmdFlash.alpha *= 0.88;
    if (cmdFlash.alpha < 0.01) cmdFlash.alpha = 0;
  }
  if (cmdScaleEffect.life > 0) cmdScaleEffect.life--;
  for (let i = koSlashEffects.length - 1; i >= 0; i--) {
    if (koSlashEffects[i].delay > 0) { koSlashEffects[i].delay--; }
    else { koSlashEffects[i].life--; if (koSlashEffects[i].life <= 0) koSlashEffects.splice(i, 1); }
  }
  if (stockLossAnim.active) {
    stockLossAnim.life--;
    if (stockLossAnim.life <= 0) stockLossAnim.active = false;
  }
  // screenShake and hitFlash are decayed in drawBattle (updateScreenShake / hitFlash render)
}

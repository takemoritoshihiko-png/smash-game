// --- Character images ---
const zenImg = new Image();

// --- Particles ---
function spawnTitleParticle() {
  titleParticles.push({
    x: Math.random() * 960,
    y: 640 + 10,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -1 - Math.random() * 2,
    size: 1 + Math.random() * 3,
    alpha: 0.3 + Math.random() * 0.5,
    color: ['#FF4444', '#4488FF', '#44FF88', '#FFDD44'][Math.floor(Math.random() * 4)],
    life: 200 + Math.random() * 200
  });
}

function updateParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.alpha *= 0.998;
    if (p.life <= 0 || p.alpha < 0.01) titleParticles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of titleParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Draw character body ---
function drawCharacterBody(x, y, scale, charIndex, time, facingLeft) {
  const ch = characters[charIndex];
  const c = ch.bodyColors;
  const s = scale;
  const bounce = Math.sin(time * 0.03 + charIndex) * 3 * s;
  const cy = y + bounce;

  ctx.save();
  ctx.translate(x, cy);
  if (facingLeft) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 60 * s, 25 * s, 8 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  if (charIndex === 0) {
    // Zen - image
    if (zenImg.complete && zenImg.naturalWidth > 0) {
      const imgW = 70 * s;
      const imgH = 90 * s;
      ctx.drawImage(zenImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 1) {
    // Don - image
    if (donImg.complete && donImg.naturalWidth > 0) {
      const imgW = 80 * s;
      const imgH = 95 * s;
      ctx.drawImage(donImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 2) {
    // Saisoku - image
    if (saisokuImg.complete && saisokuImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(saisokuImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 3) {
    // Meteor - image
    if (meteoImg.complete && meteoImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(meteoImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 4) {
    // Long - image or Canvas fallback
    if (longImg.complete && longImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(longImg, -imgW / 2, -35 * s, imgW, imgH);
    } else {
      // Canvas描画：機械系・槍使い
      // 体（装甲風）
      ctx.fillStyle = '#5A6AAE';
      ctx.fillRect(-12 * s, -20 * s, 24 * s, 45 * s);
      // 肩アーマー
      ctx.fillStyle = '#7B8CDE';
      ctx.fillRect(-16 * s, -18 * s, 10 * s, 12 * s);
      ctx.fillRect(6 * s, -18 * s, 10 * s, 12 * s);
      // 頭（ヘルメット）
      ctx.fillStyle = '#8899DD';
      ctx.beginPath();
      ctx.arc(0, -25 * s, 12 * s, 0, Math.PI * 2);
      ctx.fill();
      // バイザー
      ctx.fillStyle = '#44FFCC';
      ctx.fillRect(-8 * s, -28 * s, 16 * s, 6 * s);
      // 脚
      ctx.fillStyle = '#4A5A9E';
      ctx.fillRect(-10 * s, 25 * s, 8 * s, 20 * s);
      ctx.fillRect(2 * s, 25 * s, 8 * s, 20 * s);
      // 槍
      ctx.fillStyle = '#AABBEE';
      ctx.fillRect(14 * s, -35 * s, 3 * s, 70 * s);
      // 槍の穂先
      ctx.fillStyle = '#44FFCC';
      ctx.beginPath();
      ctx.moveTo(15.5 * s, -40 * s);
      ctx.lineTo(12 * s, -30 * s);
      ctx.lineTo(19 * s, -30 * s);
      ctx.closePath();
      ctx.fill();
      // 機械パーツ（胸のコア）
      ctx.fillStyle = '#44FFCC';
      ctx.fillRect(-4 * s, -10 * s, 8 * s, 8 * s);
      ctx.fillStyle = '#33DDAA';
      ctx.fillRect(-2 * s, -8 * s, 4 * s, 4 * s);
    }
  } else if (charIndex === 5) {
    // うる男 - 狼系獣人
    if (uruoImg.complete && uruoImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(uruoImg, -imgW / 2, -35 * s, imgW, imgH);
    } else {
      // Canvas描画：狼系獣人
      // 脚
      ctx.fillStyle = '#5A4A3A';
      ctx.fillRect(-10 * s, 25 * s, 8 * s, 22 * s);
      ctx.fillRect(2 * s, 25 * s, 8 * s, 22 * s);
      // 体（がっしり）
      ctx.fillStyle = '#7A6A5A';
      ctx.fillRect(-14 * s, -18 * s, 28 * s, 44 * s);
      // 胸の毛皮
      ctx.fillStyle = '#C8A878';
      ctx.beginPath();
      ctx.moveTo(-10 * s, -10 * s);
      ctx.lineTo(0, 5 * s);
      ctx.lineTo(10 * s, -10 * s);
      ctx.closePath();
      ctx.fill();
      // 腕（太い）
      ctx.fillStyle = '#6A5A4A';
      ctx.fillRect(-18 * s, -14 * s, 7 * s, 28 * s);
      ctx.fillRect(11 * s, -14 * s, 7 * s, 28 * s);
      // 爪（右手）
      ctx.fillStyle = '#EEE';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect((12 + i * 2) * s, 14 * s, 1.5 * s, 5 * s);
      }
      // 頭（狼）
      ctx.fillStyle = '#8A7A6A';
      ctx.beginPath();
      ctx.arc(0, -28 * s, 13 * s, 0, Math.PI * 2);
      ctx.fill();
      // 耳（三角）
      ctx.fillStyle = '#6A5A4A';
      ctx.beginPath();
      ctx.moveTo(-10 * s, -38 * s);
      ctx.lineTo(-6 * s, -50 * s);
      ctx.lineTo(-2 * s, -36 * s);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(2 * s, -36 * s);
      ctx.lineTo(6 * s, -50 * s);
      ctx.lineTo(10 * s, -38 * s);
      ctx.closePath();
      ctx.fill();
      // 耳の内側
      ctx.fillStyle = '#C8A878';
      ctx.beginPath();
      ctx.moveTo(-8 * s, -39 * s);
      ctx.lineTo(-6 * s, -47 * s);
      ctx.lineTo(-3 * s, -37 * s);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(3 * s, -37 * s);
      ctx.lineTo(6 * s, -47 * s);
      ctx.lineTo(8 * s, -39 * s);
      ctx.closePath();
      ctx.fill();
      // マズル（口元）
      ctx.fillStyle = '#B8A888';
      ctx.beginPath();
      ctx.ellipse(0, -22 * s, 7 * s, 5 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // 鼻
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(0, -24 * s, 2.5 * s, 0, Math.PI * 2);
      ctx.fill();
      // 目（鋭い）
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.ellipse(-5 * s, -30 * s, 3 * s, 2 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(5 * s, -30 * s, 3 * s, 2 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // 瞳
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(-5 * s, -30 * s, 1.5 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(5 * s, -30 * s, 1.5 * s, 0, Math.PI * 2);
      ctx.fill();
      // 尻尾
      ctx.strokeStyle = '#7A6A5A';
      ctx.lineWidth = 4 * s;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-8 * s, 20 * s);
      ctx.quadraticCurveTo(-22 * s, 10 * s, -18 * s, -5 * s);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.lineCap = 'butt';
    }
  } else if (charIndex === 6) {
    // 熊太郎 - 黒いクマ
    if (kumataroImg.complete && kumataroImg.naturalWidth > 0) {
      const imgW = 78 * s;
      const imgH = 90 * s;
      ctx.drawImage(kumataroImg, -imgW / 2, -35 * s, imgW, imgH);
    } else {
      // Canvas描画：丸い黒クマ
      // 脚（短め・太い）
      ctx.fillStyle = '#2A2A2A';
      ctx.beginPath(); ctx.ellipse(-8 * s, 38 * s, 7 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(8 * s, 38 * s, 7 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
      // 足の裏（肉球）
      ctx.fillStyle = '#D4877A';
      ctx.beginPath(); ctx.ellipse(-8 * s, 44 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(8 * s, 44 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2); ctx.fill();
      // 体（丸くて大きい）
      ctx.fillStyle = '#3A3A3A';
      ctx.beginPath(); ctx.ellipse(0, 5 * s, 18 * s, 22 * s, 0, 0, Math.PI * 2); ctx.fill();
      // お腹（薄いグレー）
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.ellipse(0, 10 * s, 12 * s, 14 * s, 0, 0, Math.PI * 2); ctx.fill();
      // 腕（丸い）
      ctx.fillStyle = '#3A3A3A';
      ctx.beginPath(); ctx.ellipse(-18 * s, 2 * s, 7 * s, 10 * s, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(18 * s, 2 * s, 7 * s, 10 * s, -0.3, 0, Math.PI * 2); ctx.fill();
      // 頭（丸い）
      ctx.fillStyle = '#3A3A3A';
      ctx.beginPath(); ctx.arc(0, -22 * s, 16 * s, 0, Math.PI * 2); ctx.fill();
      // 耳（丸い）
      ctx.fillStyle = '#2A2A2A';
      ctx.beginPath(); ctx.arc(-12 * s, -35 * s, 6 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(12 * s, -35 * s, 6 * s, 0, Math.PI * 2); ctx.fill();
      // 耳の内側
      ctx.fillStyle = '#D4877A';
      ctx.beginPath(); ctx.arc(-12 * s, -35 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(12 * s, -35 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
      // ほっぺ（赤い）
      ctx.fillStyle = '#FF6B6B';
      ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.ellipse(-9 * s, -17 * s, 5 * s, 3.5 * s, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(9 * s, -17 * s, 5 * s, 3.5 * s, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // 目（つぶらな瞳）
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(-6 * s, -24 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(6 * s, -24 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(-5 * s, -24 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7 * s, -24 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
      // ハイライト
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(-4 * s, -25 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(8 * s, -25 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
      // 鼻
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.ellipse(0, -19 * s, 3 * s, 2 * s, 0, 0, Math.PI * 2); ctx.fill();
      // 口（にっこり）
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.arc(0, -16 * s, 4 * s, 0.2, Math.PI - 0.2);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  ctx.restore();
}

// Draw character for battle (with animation transforms)
function drawBattleCharacter(x, y, scale, charIndex, time, facingLeft, animData) {
  const s = scale;

  ctx.save();
  ctx.translate(x, y);
  if (facingLeft) ctx.scale(-1, 1);

  // Animation transforms
  let scaleX = 1, scaleY = 1, rotation = 0, bobY = 0;
  let walkLean = 0;

  // Easing utility
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInCubic(t) { return t * t * t; }
  function easeOutElastic(t) {
    if (t === 0 || t === 1) return t;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;
  }

  // Limb offsets for procedural animation
  let armAngle = 0, legAngle = 0, armSwing = 0;

  if (animData) {
    // Idle breathing animation (per-character) - smoother with additional harmonics
    if (animData.animState === 'idle') {
      const t = animData.animTimer;
      if (charIndex === 0) {
        bobY = Math.sin(t * 0.04) * 2.5 + Math.sin(t * 0.08) * 0.5;
        scaleX = 1 + Math.sin(t * 0.04) * 0.012;
        scaleY = 1 + Math.sin(t * 0.04 + 0.5) * 0.008;
        armAngle = Math.sin(t * 0.03) * 0.03;
      } else if (charIndex === 1) {
        bobY = Math.sin(t * 0.025) * 3.5 + Math.sin(t * 0.05) * 0.8;
        scaleX = 1 + Math.sin(t * 0.025 + 1) * 0.01;
        scaleY = 1 + Math.sin(t * 0.025) * 0.018;
        armAngle = Math.sin(t * 0.02) * 0.02;
      } else if (charIndex === 2) {
        bobY = Math.sin(t * 0.07) * 2.5 + Math.sin(t * 0.14) * 1;
        scaleX = 1 + Math.sin(t * 0.09) * 0.015;
        scaleY = 1 + Math.sin(t * 0.07 + 0.3) * 0.01;
        armAngle = Math.sin(t * 0.08) * 0.05;
      } else if (charIndex === 3) {
        bobY = Math.sin(t * 0.045) * 2.5 + Math.sin(t * 0.09) * 0.6;
        walkLean = Math.sin(t * 0.03) * 0.025;
        scaleY = 1 + Math.sin(t * 0.045) * 0.01;
        armAngle = Math.sin(t * 0.04) * 0.04;
      } else if (charIndex === 4) {
        bobY = Math.sin(t * 0.06) * 1.5 + Math.sin(t * 0.12) * 0.5;
        scaleX = 1 + Math.sin(t * 0.08) * 0.01;
        scaleY = 1 + Math.sin(t * 0.06 + 0.5) * 0.006;
      }
    }

    // Walk animation - 4-phase cycle with easing
    if (animData.animState === 'walk') {
      const wc = animData.walkCycle;
      // 4-frame walk phase: contact, down, passing, up
      const walkSpeeds = [0.18, 0.12, 0.3, 0.15, 0.2];
      const ws = walkSpeeds[charIndex] || 0.18;
      const phase = (wc * ws) % (Math.PI * 2);
      const walkPhase = Math.floor((phase / (Math.PI * 2)) * 4); // 0-3
      // Smooth sub-phase for interpolation
      const subPhase = ((phase / (Math.PI * 2)) * 4) % 1;
      const easedSub = easeOutCubic(subPhase);

      if (charIndex === 0) {
        bobY = Math.abs(Math.sin(phase)) * 2.5;
        walkLean = Math.sin(phase) * 0.07;
        scaleY = 0.96 + Math.abs(Math.sin(phase)) * 0.04;
        legAngle = Math.sin(phase) * 0.15;
        armSwing = -Math.sin(phase) * 0.12;
      } else if (charIndex === 1) {
        // Don: heavy stomp with impact pause
        const stompT = Math.abs(Math.sin(phase));
        const eased = stompT < 0.5 ? easeOutCubic(stompT * 2) * 0.5 : 0.5 + easeInCubic((stompT - 0.5) * 2) * 0.5;
        bobY = -eased * 6;
        scaleX = 1 + Math.sin(phase) * 0.04;
        scaleY = 1 - eased * 0.05;
        walkLean = Math.sin(phase) * 0.03;
        legAngle = Math.sin(phase) * 0.1;
        armSwing = -Math.sin(phase) * 0.08;
      } else if (charIndex === 2) {

        ctx.beginPath(); ctx.ellipse(0, 5 * s, 16 * s, 18 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        if (phase === 'active' && phaseT < 0.3) {
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#FF6B6B';
          ctx.beginPath(); ctx.ellipse(0, 12 * s, 18 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'up') {
        // 上攻撃: 両手振り上げ
        let angle;
        if (phase === 'startup') angle = Math.PI * 0.2 + easeIn * 0.2;
        else if (phase === 'active') angle = Math.PI * 0.4 - easeOut * Math.PI * 0.9;
        else angle = -Math.PI * 0.5 * (1 - easeOut);
        // 左手
        ctx.save();
        ctx.translate(-8 * s, armY);
        ctx.rotate(angle);
        ctx.fillStyle = '#3A3A3A';
        ctx.beginPath(); ctx.ellipse(0, 10 * s, 5 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4A4A4A';
        ctx.beginPath(); ctx.arc(0, 20 * s, pawR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        // 右手
        ctx.save();
        ctx.translate(8 * s, armY);
        ctx.rotate(angle);
        ctx.fillStyle = '#3A3A3A';
        ctx.beginPath(); ctx.ellipse(0, 10 * s, 5 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4A4A4A';
        ctx.beginPath(); ctx.arc(0, 20 * s, pawR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        if (phase === 'active') {
          ctx.globalAlpha = 0.3 * (1 - phaseT);
          ctx.strokeStyle = '#FF6B6B';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, armY, 22 * s, Math.PI * 0.6, Math.PI * 0.6 - phaseT * Math.PI * 0.7);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'side') {
        // 横攻撃: クマスワイプ
        let reach;
        if (phase === 'startup') reach = -6 * s * easeIn;
        else if (phase === 'active') reach = 22 * s * easeOut;
        else reach = 22 * s * (1 - easeOut);
        ctx.translate(armX + reach, armY + 2 * s);
        ctx.fillStyle = '#3A3A3A';
        ctx.beginPath(); ctx.ellipse(-10 * s, 0, 6 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4A4A4A';
        ctx.beginPath(); ctx.arc(0, 0, pawR * 1.1, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#D4877A';
        ctx.beginPath(); ctx.arc(1 * s, 0, 3.5 * s, 0, Math.PI * 2); ctx.fill();
        if (phase === 'active') {
          ctx.globalAlpha = 0.35 * (1 - phaseT);
          ctx.strokeStyle = '#FF4444';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, pawR * 2, -0.5, -0.5 + phaseT * Math.PI * 0.5);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'down' || atkType === 'downair') {
        // 下/空中下: お尻落とし・お尻プレス
        let squash;
        if (phase === 'startup') squash = easeIn * 0.1;
        else if (phase === 'active') squash = 0.1 + easeOut * 0.15;
        else squash = 0.25 * (1 - easeOut);
        ctx.scale(1 + squash, 1 - squash);
        if (phase === 'active') {
          ctx.globalAlpha = 0.4 * (1 - phaseT);
          ctx.fillStyle = '#FF6B6B';
          ctx.beginPath(); ctx.ellipse(0, 20 * s, 14 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    ctx.restore();
  }

  ctx.restore();
}

function drawStar(cx, cy, r, points, ctx) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.4;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// --- Utility: round rect ---
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawTitle(dt) {
  titleTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 0, 640);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#141428');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.strokeStyle = 'rgba(100, 100, 255, 0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 960; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 640); ctx.stroke();
  }
  for (let y = 0; y < 640; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(960, y); ctx.stroke();
  }

  if (Math.random() < 0.3) spawnTitleParticle();
  updateParticles();
  drawParticles();

  if (titleFadeIn) {
    titleAlpha = Math.min(1, titleAlpha + 0.02);
    if (titleAlpha >= 1) titleFadeIn = false;
  }

  ctx.save();
  ctx.globalAlpha = titleAlpha;

  const glowIntensity = 15 + Math.sin(titleTime * 0.002) * 8;
  ctx.shadowColor = '#FF4466';
  ctx.shadowBlur = glowIntensity;
  ctx.font = 'bold 90px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = '#FF2244';
  ctx.lineWidth = 4;
  ctx.strokeText('SMASH GAME', 480, 200);

  const titleGrad = ctx.createLinearGradient(200, 150, 760, 250);
  titleGrad.addColorStop(0, '#FF6688');
  titleGrad.addColorStop(0.5, '#FFDDDD');
  titleGrad.addColorStop(1, '#FF6688');
  ctx.fillStyle = titleGrad;
  ctx.fillText('SMASH GAME', 480, 200);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#8888CC';
  ctx.fillText('— 格闘アクション —', 480, 270);

  for (let i = 0; i < 4; i++) {
    ctx.globalAlpha = titleAlpha * 0.4;
    drawCharacterBody(180 + i * 210, 430, 0.9, i, titleTime, false);
    ctx.globalAlpha = titleAlpha;
  }

  pressAlpha += pressDir * 0.025;
  if (pressAlpha > 1) { pressAlpha = 1; pressDir = -1; }
  if (pressAlpha < 0.2) { pressAlpha = 0.2; pressDir = 1; }

  ctx.globalAlpha = titleAlpha * pressAlpha;
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.shadowColor = '#FFFFFF';
  ctx.shadowBlur = 10;
  ctx.fillText('PRESS ENTER / CLICK TO START', 480, 555);
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ============================================================
// CHARACTER SELECT SCREEN (2P)
// ============================================================
function drawSelect(dt) {
  selectTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  // Header
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF4466';
  ctx.shadowBlur = 12;
  ctx.fillText('CHARACTER SELECT', 480, 48);
  ctx.shadowBlur = 0;

  // Divider
  const lineGrad = ctx.createLinearGradient(100, 0, 860, 0);
  lineGrad.addColorStop(0, 'transparent');
  lineGrad.addColorStop(0.5, '#FF4466');
  lineGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(100, 66); ctx.lineTo(860, 66); ctx.stroke();

  // Character cards
  const charCount = characters.length;
  const cardW = charCount <= 4 ? 170 : 150;
  const cardH = charCount <= 4 ? 230 : 220;
  const gap = charCount <= 4 ? 16 : 12;
  const totalW = charCount * cardW + (charCount - 1) * gap;
  const startX = (960 - totalW) / 2;

  for (let i = 0; i < charCount; i++) {
    const ch = characters[i];
    const cx = startX + i * (cardW + gap);
    const cy = 82;
    const isP1 = p1Select === i;
    const isP2 = p2Select === i;

    ctx.save();

    // Card bg
    const cardGrad = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
    cardGrad.addColorStop(0, (isP1 || isP2) ? ch.dark + '88' : '#1a1a2e');
    cardGrad.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cardGrad;
    roundRect(ctx, cx, cy, cardW, cardH, 10);
    ctx.fill();

    // Border - P1 blue, P2 red, both = split
    if (isP1 && isP2) {
      ctx.strokeStyle = '#44AAFF';
      ctx.lineWidth = 3;
      ctx.save();
      ctx.beginPath();
      ctx.rect(cx, cy, cardW / 2, cardH);
      ctx.clip();
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = '#FF4444';
      ctx.beginPath();
      ctx.rect(cx + cardW / 2, cy, cardW / 2, cardH);
      ctx.clip();
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
      ctx.restore();
    } else if (isP1) {
      ctx.strokeStyle = '#44AAFF';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    } else if (isP2) {
      ctx.strokeStyle = '#FF4444';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    }

    // P1/P2 indicators at top
    if (isP1) {
      ctx.fillStyle = '#44AAFF';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('▼ 1P', cx + 6, cy + 14);
      if (p1Confirmed) {
        ctx.fillStyle = '#44FF44';
        ctx.fillText('OK!', cx + 6, cy + 28);
      }
    }
    if (isP2) {
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(gameMode === 'cpu' ? 'CPU ▼' : '2P ▼', cx + cardW - 6, cy + 14);
      if (p2Confirmed) {
        ctx.fillStyle = '#44FF44';
        ctx.fillText('OK!', cx + cardW - 6, cy + 28);
      }
    }

    // Type label
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = ch.accent;
    ctx.fillText(ch.type, cx + cardW / 2, cy + 42);

    // Character
    drawCharacterBody(cx + cardW / 2, cy + 115, 1.0, i, selectTime, false);

    // Name
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = (isP1 || isP2) ? '#FFF' : '#888';
    ctx.fillText(ch.name, cx + cardW / 2, cy + cardH - 12);

    ctx.restore();
  }

  // Detail panels - P1 left, P2 right
  const p1Label = '1P';
  drawSelectDetail(60, 340, p1Select, p1Label, '#44AAFF', p1Confirmed);
  const p2Label = gameMode === 'cpu' ? 'CPU' : '2P';
  drawSelectDetail(500, 340, p2Select, p2Label, '#FF4444', p2Confirmed);

  // Mode selection overlay (before char select starts)
  if (!modeSelected) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, 960, 640);

    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.fillText('モード選択', 480, 200);

    const modes = [
      { label: 'VS 対戦', desc: '2人で対戦', icon: 'VS', color: '#44AAFF' },
      { label: 'CPU 対戦', desc: 'CPUと対戦', icon: 'CPU', color: '#FF8844' },
    ];
    const modeIdx = gameMode === 'vs' ? 0 : 1;
    for (let i = 0; i < 2; i++) {
      const mx = 280 + i * 200;
      const my = 270;
      const sel = modeIdx === i;
      ctx.fillStyle = sel ? modes[i].color + '33' : 'rgba(20,20,40,0.8)';
      roundRect(ctx, mx, my, 180, 130, 12); ctx.fill();
      ctx.strokeStyle = sel ? modes[i].color : '#444';
      ctx.lineWidth = sel ? 3 : 1;
      roundRect(ctx, mx, my, 180, 130, 12); ctx.stroke();

      ctx.font = 'bold 32px sans-serif';
      ctx.fillStyle = sel ? modes[i].color : '#888';
      ctx.fillText(modes[i].icon, mx + 90, my + 55);
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = sel ? '#FFF' : '#888';
      ctx.fillText(modes[i].label, mx + 90, my + 85);
      ctx.font = '13px sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText(modes[i].desc, mx + 90, my + 108);
    }

    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('← → で選択  |  Enter で決定  |  ESC で戻る', 480, 460);
    return;
  }

  // Controls
  ctx.textAlign = 'center';
  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#555';
  if (p1Confirmed && p2Confirmed) {
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#44FF44';
    ctx.shadowColor = '#44FF44';
    ctx.shadowBlur = 10;
    if (gameMode === 'cpu') {
      ctx.fillText('READY!  Enter で難易度選択へ', 480, 618);
    } else {
      ctx.fillText('READY TO FIGHT!  Press ENTER to start', 480, 618);
    }
    ctx.shadowBlur = 0;
  } else if (gameMode === 'cpu') {
    ctx.fillText('1P: ← → + Enter で選択   |   A D で CPU キャラ変更   |   ESC で戻る', 480, 618);
  } else {
    ctx.fillText('1P: ← → + Enter で選択   |   2P: A D + Space で選択   |   ESC で戻る', 480, 618);
  }
}

function drawSelectDetail(px, py, charIdx, label, color, isConfirmed) {
  const ch = characters[charIdx];
  const pw = 400;
  const ph = 240;

  ctx.fillStyle = 'rgba(15, 15, 30, 0.85)';
  roundRect(ctx, px, py, pw, ph, 10);
  ctx.fill();
  ctx.strokeStyle = isConfirmed ? '#44FF44' : color;
  ctx.lineWidth = 1.5;
  roundRect(ctx, px, py, pw, ph, 10);
  ctx.stroke();

  // Label
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = color;
  ctx.fillText(label, px + 12, py + 22);

  // Character preview
  drawCharacterBody(px + 80, py + 125, 1.5, charIdx, selectTime, false);

  // Info
  ctx.textAlign = 'left';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#FFF';
  ctx.fillText(ch.name, px + 160, py + 45);

  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = ch.accent;
  ctx.fillText(ch.type, px + 160, py + 65);

  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#AAA';
  ctx.fillText(ch.desc, px + 160, py + 88);

  // Stats
  const stats = ['POW', 'SPD', 'TEC', 'DEF'];
  const statKeys = ['power', 'speed', 'tech', 'defense'];
  const statColors = ['#FF4444', '#44FF88', '#FFDD44', '#4488FF'];

  for (let i = 0; i < 4; i++) {
    const sy = py + 108 + i * 22;
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#777';
    ctx.fillText(stats[i], px + 160, sy + 2);

    ctx.fillStyle = '#1a1a2e';
    roundRect(ctx, px + 200, sy - 7, 170, 12, 3);
    ctx.fill();

    const val = ch.stats[statKeys[i]];
    const bw = (val / 5) * 170;
    ctx.fillStyle = statColors[i];
    roundRect(ctx, px + 200, sy - 7, bw, 12, 3);
    ctx.fill();
  }

  if (isConfirmed) {
    ctx.globalAlpha = 0.15 + Math.sin(selectTime * 0.005) * 0.05;
    ctx.fillStyle = '#44FF44';
    roundRect(ctx, px, py, pw, ph, 10);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawDifficulty(dt) {
  difficultyTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF8844';
  ctx.shadowBlur = 12;
  ctx.fillText('CPU 難易度選択', 480, 80);
  ctx.shadowBlur = 0;

  const difficulties = [
    { name: 'やさしい', desc: 'ランダムに動く・たまに攻撃', color: '#44CC44', stars: 1 },
    { name: 'ふつう',   desc: '近づいて攻撃・たまにジャンプ', color: '#FFAA22', stars: 2 },
    { name: 'つよい',   desc: '積極追撃・必殺技も使う', color: '#FF4444', stars: 3 },
  ];

  for (let i = 0; i < 3; i++) {
    const d = difficulties[i];
    const cx = 160 + i * 240;
    const cy = 160;
    const w = 210;
    const h = 300;
    const sel = difficultySelected === i;
    const bounce = sel ? Math.sin(difficultyTime * 0.005) * 4 : 0;

    ctx.save();
    if (sel) { ctx.shadowColor = d.color; ctx.shadowBlur = 20; }

    const cg = ctx.createLinearGradient(cx, cy, cx, cy + h);
    cg.addColorStop(0, sel ? d.color + '33' : '#1a1a2e');
    cg.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cg;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.fill();

    ctx.strokeStyle = sel ? d.color : '#444';
    ctx.lineWidth = sel ? 3 : 1;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Stars
    const starY = cy + 50 + bounce;
    for (let s = 0; s < 3; s++) {
      ctx.fillStyle = s < d.stars ? d.color : '#333';
      drawStar(cx + w/2 - 30 + s * 30, starY, 14, 5, ctx);
    }

    // Name
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = sel ? '#FFF' : '#888';
    ctx.fillText(d.name, cx + w / 2, cy + 110 + bounce);

    // Description
    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#AAA';
    const words = d.desc.split('・');
    for (let j = 0; j < words.length; j++) {
      ctx.fillText(words[j], cx + w / 2, cy + 145 + j * 20 + bounce);
    }

    // Character matchup preview
    const p1Ch = characters[p1Select];
    const p2Ch = characters[p2Select];
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#44AAFF';
    ctx.fillText(p1Ch.name, cx + w / 2 - 35, cy + 215 + bounce);
    ctx.fillStyle = '#888';
    ctx.fillText('vs', cx + w / 2, cy + 215 + bounce);
    ctx.fillStyle = '#FF4444';
    ctx.fillText(p2Ch.name, cx + w / 2 + 35, cy + 215 + bounce);

    // Draw mini characters
    drawCharacterBody(cx + w/2 - 40, cy + 260 + bounce, 0.55, p1Select, difficultyTime, false);
    drawCharacterBody(cx + w/2 + 40, cy + 260 + bounce, 0.55, p2Select, difficultyTime, true);

    ctx.restore();
  }

  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.fillText('← → で選択  |  Enter で対戦開始  |  ESC でキャラ選択に戻る', 480, 560);
}

// Screen shake system
let screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };
function triggerScreenShake(intensity, duration) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
  screenShake.duration = Math.max(screenShake.duration, duration);
}
function updateScreenShake() {
  if (screenShake.duration > 0) {
    screenShake.duration--;
    const t = screenShake.duration > 0 ? screenShake.intensity * (screenShake.duration / 10) : 0;
    screenShake.x = (Math.random() - 0.5) * t * 2;
    screenShake.y = (Math.random() - 0.5) * t * 2;
    if (screenShake.duration <= 0) { screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0; }
  }
}

// === Web Audio API Sound Effects ===
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function makeNoise(ac, duration, volume) {
  const buf = ac.createBuffer(1, ac.sampleRate * duration, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(volume, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.connect(g); g.connect(ac.destination);
  return { src, gain: g };
}

  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;

    if (type === 'normal') {
      // ① Short punch snap
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.08);
      // Click noise
      const n = makeNoise(ac, 0.03, 0.12);
      n.src.start(now); n.src.stop(now + 0.03);

function addCmdInput(playerId, dir) {
  const now = performance.now();
  cmdInputBuffers[playerId].push(dir);
  cmdInputTimestamps[playerId].push(now);
  // Trim old entries
  while (cmdInputTimestamps[playerId].length > 0 && now - cmdInputTimestamps[playerId][0] > CMD_INPUT_TIMEOUT * 16.67) {
    cmdInputBuffers[playerId].shift();
    cmdInputTimestamps[playerId].shift();
  }
}

function checkCommandInput(player) {
  const pid = player.id;
  const buf = cmdInputBuffers[pid];
  if (buf.length < 3) return null;
  const cmds = commandDefs[player.charIdx];
  if (!cmds) return null;

  for (const cmd of cmds) {
    if (player['cd_' + cmd.cooldownKey] > 0) continue;
    const seq = cmd.seq;
    if (buf.length < seq.length) continue;
    // Check if the last N entries match the sequence
    const tail = buf.slice(buf.length - seq.length);
    // Convert relative directions (F/B) to absolute based on facing
    let match = true;
    for (let i = 0; i < seq.length; i++) {
      let expected = seq[i];
      if (expected === 'F') expected = player.facingLeft ? 'L' : 'R';
      else if (expected === 'B') expected = player.facingLeft ? 'R' : 'L';
      if (tail[i] !== expected) { match = false; break; }
    }
    if (match) {
      // Clear buffer on success
      cmdInputBuffers[pid] = [];
      cmdInputTimestamps[pid] = [];
      return cmd;
    }
  }
  return null;
}

function executeCommand(player, cmd) {
  if (player.attacking || player.hitstun > 0 || !player.alive || player.grabbing || player.grabbed || player.guarding || player.guardBreakStun > 0) return false;

  const atk = cmd.attack;
  player.attacking = true;
  player.attackType = 'command';
  player.attackFrame = 0;
  player.attackData = atk;
  player.hitTargets = [];
  player.lastHitFrame = -99;
  player.specialState = null;
  player['cd_' + cmd.cooldownKey] = CMD_COOLDOWN;

  // Command activation sound
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const o1 = ac.createOscillator();
    const g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(400, now);
    o1.frequency.exponentialRampToValueAtTime(900, now + 0.08);
    o1.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    g1.gain.setValueAtTime(0.12, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.2);
    // Accent tone
    const o2 = ac.createOscillator();
    const g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(800, now + 0.03);
    o2.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    g2.gain.setValueAtTime(0.06, now + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.03); o2.stop(now + 0.15);
  } catch(e) {}

  // Show command name
  const ch = characters[player.charIdx];
  cmdNameDisplay.push({
    text: cmd.name, x: player.x, y: player.y - 120,
    life: 60, maxLife: 60, color: ch.accent,
  });

  // Flash effect
  hitEffects.push({ x: player.x, y: player.y - 40, life: 15, maxLife: 15, color: '#FFFFFF', size: 50 });
  return true;
}

// --- Speed up attacks to 168% of original (frames × 0.595) ---
(function scaleAttackSpeeds() {
  const factor = 1 / 1.68;
  function scaleAtk(atk) {
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    if (atk.slamActive) atk.slamActive = Math.max(1, Math.round(atk.slamActive * factor));
    if (atk.hitInterval) atk.hitInterval = Math.max(1, Math.round(atk.hitInterval * factor));
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') continue;
      scaleAtk(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleAtk(cmd.attack);
    }
  }
})();

// --- Reduce all damage to 60% ---
(function scaleDamage() {
  const factor = 0.6;
  function scaleDmg(atk) {
    atk.damage = Math.round(atk.damage * factor * 10) / 10;
    if (atk.finalDamage) atk.finalDamage = Math.round(atk.finalDamage * factor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * factor * 10) / 10;
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') { defs[type] = Math.round(defs[type] * factor); continue; }
      scaleDmg(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleDmg(cmd.attack);
    }
  }
})();

function createPlayer(id, charIdx, startX) {
  return {
    id, charIdx,
    x: startX, y: STAGE_GROUND_Y - 60,
    vx: 0, vy: 0,
    facingLeft: id === 1,
    grounded: false, jumps: 2, jumpUsed: false,
    damage: 0, stocks: MAX_STOCKS,
    respawnTimer: 0, invincibleTimer: 0, alive: true,
    // Attack state
    attacking: false, attackType: null, attackFrame: 0, attackData: null,
    hitTargets: [], lastHitFrame: -99,
    hitstun: 0,
    // Special attack states
    specialState: null,
    // Grab/throw state
    grabbing: false, grabTarget: null, grabTimer: 0,
    grabbed: false, grabbedBy: null,
    grabHoldFrames: 0, // how long X/I has been held
    throwCooldown: 0,
    // Guard state
    guarding: false,
    guardDurability: GUARD_MAX_DURABILITY,
    guardBreakStun: 0, // frames of stun after guard break
    justGuardTimer: 0, // counts down from JUST_GUARD_WINDOW when guard starts
    // Command cooldowns
    cd_cmd1: 0,
    cd_cmd2: 0,
    strongLocked: false, // locked until landing after aerial strong
    // Animation state
    animState: 'idle', // 'idle' | 'walk' | 'jump' | 'fall' | 'hitstun'
    animTimer: 0,
    walkCycle: 0,
    landSquash: 0,    // frames of landing squash
    jumpSquash: 0,    // frames of jump anticipation squash
    damageTint: 0,    // frames of red flash
    spinAngle: 0,     // rotation from strong knockback
    wasGrounded: true, // for landing detection
  };
}

// --- Knockback calculation ---
function calcKnockback(damage, kbBase, kbScale) {
  // Smash-style scaling: low damage = barely moves, high damage = flies far
  // 0%: base only, 50%: ×1.25, 100%: ×1.5, 150%: ×1.85, 200%+: ×2.3+
  const ratio = damage / 100;
  const damageMultiplier = 1 + ratio * 0.5 + Math.max(0, ratio - 1) * 0.3;
  return (kbBase + damage * kbScale) * damageMultiplier;
}

function applyHit(attacker, target, damage, kbBase, kbScale, kbAngle, hitType) {
  if (target.invincibleTimer > 0) return;
  // hitType: 'normal', 'strong', 'special', 'cmd', 'aerial', 'down', 'projectile'
  if (!hitType) hitType = 'normal';

  // Guard check
  if (target.guarding) {
    // Just Guard: complete invincibility + stagger attacker
    if (target.justGuardTimer > 0) {
      // Just Guard success!
      hitEffects.push({
        x: target.x, y: target.y - 40,
        life: 20, maxLife: 20,
        color: '#FFFFFF', size: 50
      });
      playHitSound('justGuard');
      // Stagger attacker
      if (attacker.id !== undefined) {
        const realAttacker = players.find(pp => pp.id === attacker.id);
        if (realAttacker) {
          realAttacker.hitstun = JUST_GUARD_STAGGER;
          realAttacker.attacking = false;
          realAttacker.specialState = null;
          realAttacker.attackFrame = 0;
          const pushDir = realAttacker.x < target.x ? -1 : 1;
          realAttacker.vx = pushDir * 6;
        }
      }
      return;
    }

    // Normal Guard: 80% damage reduction, reduced knockback, lose durability
    const reducedDamage = damage * GUARD_DAMAGE_REDUCTION;
    target.damage = Math.min(999, target.damage + reducedDamage);
    target.guardDurability -= damage * GUARD_DURABILITY_COST;
    // Small pushback
    const dir = attacker.x < target.x ? 1 : -1;
    target.vx = dir * 3;
    playHitSound('guard');
    // Guard break check
    if (target.guardDurability <= 0) {
      target.guardDurability = 0;
      target.guarding = false;
      target.guardBreakStun = GUARD_BREAK_STUN;
      hitEffects.push({
        x: target.x, y: target.y - 40,
        life: 25, maxLife: 25,
        color: '#FF6600', size: 60
      });
      playHitSound('guardBreak');
      triggerScreenShake(6, 15);
    } else {
      // Guard hit effect (shield spark)
      hitEffects.push({
        x: target.x + (attacker.x < target.x ? -20 : 20), y: target.y - 35,
        life: 8, maxLife: 8,
        color: '#44DDFF', size: 20
      });
    }
    return;
  }

  target.damage = Math.min(999, target.damage + damage);
  const kb = calcKnockback(target.damage, kbBase, kbScale);
  const rad = kbAngle * Math.PI / 180;
  const dir = attacker.x < target.x ? 1 : -1;
  target.vx = Math.cos(rad) * kb * dir;
  target.vy = Math.sin(rad) * kb;
  target.hitstun = Math.floor(8 + target.damage * 0.12);
  target.damageTint = 12;

  // Spin knockback for certain attacks (瞬身乱舞、百裂拳)
  const atkData = attacker.attackData;
  if (atkData && atkData.spinKB && kb > 3) {
    target.spinAngle = dir * 0.15;
  }

  target.attacking = false;
  target.specialState = null;
  target.attackFrame = 0;
  // Break grab
  if (target.grabbing) releaseGrab(target);
  if (target.grabbed) {
    const grabber = players.find(pp => pp.grabTarget === target.id);
    if (grabber) releaseGrab(grabber);
  }

  // --- Hit effects vary by attack type ---
  const charColor = characters[attacker.charIdx] ? characters[attacker.charIdx].accent : '#FFFFFF';
  const charMainColor = characters[attacker.charIdx] ? characters[attacker.charIdx].color : '#FFFFFF';
  const isStrong = hitType === 'strong' || hitType === 'cmd';
  const isSpecial = hitType === 'special' || hitType === 'cmd';

  if (isStrong || isSpecial) {
    // Strong/Special: big hit flash + screen shake
    hitEffects.push({
      x: target.x, y: target.y - 40,
      life: 18, maxLife: 18,
      color: isSpecial ? charColor : '#FF8800',
      size: Math.min(60, 25 + kb * 2.5)
    });
    triggerScreenShake(isSpecial ? 5 + kb * 0.3 : 3 + kb * 0.2, isSpecial ? 12 : 8);
    if (hitType === 'cmd') {
      hitFlash.alpha = 0.25;
      hitFlash.color = charColor;
    }
    playHitSound(hitType === 'cmd' ? 'cmd' : isSpecial ? 'special' : 'strong');
  } else {
    // Normal hit: yellow spark flash
    hitEffects.push({
      x: target.x, y: target.y - 40,
      life: 12, maxLife: 12,
      color: '#FFDD44',
      size: Math.min(35, 12 + kb * 1.5)
    });
    playHitSound('normal');
  }

  // ① 攻撃ヒット時パーティクル（通常:10粒黄色、強:20粒オレンジ、必殺:30+粒キャラカラー）
  const hx = (target.x + attacker.x) / 2;
  const hy = target.y - 40;

  if (isSpecial && attacker.charIdx !== undefined) {
    // 必殺技: キャラ固有カラーで30粒以上
    const charColors = {
      0: ['#88CCFF', '#AADDFF', '#4488CC'],  // Zen: blue
      1: ['#FF4422', '#FF8844', '#FFBB66'],  // Don: red/orange
      2: ['#44FFAA', '#88FFcc', '#22DD88'],  // Saisoku: green
      3: ['#FFD700', '#FFAA33', '#FFEE88'],  // Meteor: gold
      4: ['#44FFCC', '#88AAFF', '#66DDFF'],  // Long: cyan
    };
    const colors = charColors[attacker.charIdx] || ['#FFFFFF'];
    const specialCount = 30 + Math.floor(kb * 1.5);
    const specialTypes = ['slash', 'explosion', 'afterimage', 'aura', 'slash'];
    const sType = specialTypes[attacker.charIdx] || 'slash';

    for (let i = 0; i < specialCount; i++) {
      const a = (Math.random() - 0.5) * Math.PI * 2;
      const speed = 2 + Math.random() * 7 + kb * 0.2;
      sparks.push({
        x: hx + (Math.random() - 0.5) * 20, y: hy + (Math.random() - 0.5) * 20,
        vx: Math.cos(a) * speed * (i % 3 === 0 ? 1.3 : 1),
        vy: Math.sin(a) * speed - 1,
        life: 15 + Math.floor(Math.random() * 15),
        maxLife: 30,
        color: colors[i % colors.length],
        size: 1.5 + Math.random() * 3.5,
        type: sType,
        gravity: 0.08 + Math.random() * 0.1,
      });
    }
  } else if (isStrong) {
    // 強攻撃: オレンジ大きめ20粒
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 6 + kb * 0.3;
      sparks.push({
        x: hx + (Math.random() - 0.5) * 15, y: hy + (Math.random() - 0.5) * 15,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - 1,
        life: 15 + Math.floor(Math.random() * 12),
        maxLife: 27,
        color: i % 3 === 0 ? '#FFFFFF' : i % 3 === 1 ? '#FF8844' : '#FFAA22',
        size: 2.5 + Math.random() * 3,
        type: 'explosion',
        gravity: 0.12 + Math.random() * 0.08,
      });
    }
  } else {
    // 通常攻撃: 黄色10粒
    for (let i = 0; i < 10; i++) {
      const a = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 4 + kb * 0.2;
      sparks.push({
        x: hx + (Math.random() - 0.5) * 10, y: hy + (Math.random() - 0.5) * 10,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - 0.5,
        life: 12 + Math.floor(Math.random() * 8),
        maxLife: 20,
        color: i % 3 === 0 ? '#FFFFFF' : '#FFDD44',
        size: 1.5 + Math.random() * 2,
        gravity: 0.12 + Math.random() * 0.08,
      });
    }
  }

  // 吹っ飛び方向への追加スパーク
  const sparkCount = Math.min(isSpecial ? 20 : isStrong ? 16 : 10, (isStrong ? 6 : 4) + Math.floor(kb * 0.8));
  const sparkColor = isSpecial ? charColor : isStrong ? '#FF8844' : '#FFDD44';
  for (let i = 0; i < sparkCount; i++) {
    const angle = Math.atan2(target.vy, target.vx) + (Math.random() - 0.5) * 1.2;
    const speed = 2 + Math.random() * 4 + kb * 0.3;
    sparks.push({
      x: target.x + (Math.random() - 0.5) * 10,
      y: target.y - 35 + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.floor(Math.random() * 10),
      maxLife: 25,
      color: i % 3 === 0 ? '#FFFFFF' : sparkColor,
      size: (isStrong ? 2 : 1.5) + Math.random() * (isStrong ? 3 : 2.5),
      gravity: 0.1 + Math.random() * 0.1,
    });
  }

  // Floating damage number (larger for strong/special)
  const numScale = isSpecial ? Math.min(2.5, 1.2 + kb * 0.08) : isStrong ? Math.min(2.2, 1.0 + kb * 0.07) : Math.min(1.8, 0.8 + kb * 0.06);
  damageNumbers.push({
    x: target.x + (Math.random() - 0.5) * 20,
    y: target.y - 50,
    vy: -1.8 - Math.random() * 0.5,
    value: Math.floor(damage),
    life: isSpecial ? 55 : isStrong ? 48 : 40,
    maxLife: isSpecial ? 55 : isStrong ? 48 : 40,
    color: isSpecial ? charColor : kb > 10 ? '#FF4444' : kb > 5 ? '#FFAA44' : '#FFFFFF',
    scale: numScale,
    bold: isStrong || isSpecial,
  });

  // ② 吹っ飛び軌跡（ダメージ率が高いほど長い）
  if (kb > 3) {
    const dmgFactor = Math.min(target.damage / 150, 1); // ダメージ率で軌跡長変化
    const trailLife = Math.floor(15 + kb * 0.8 + dmgFactor * 20);
    const maxPoints = Math.floor(15 + dmgFactor * 20); // 高ダメージ=長い軌跡
    trails.push({
      x: target.x, y: target.y - 35,
      vx: target.vx, vy: target.vy,
      life: trailLife,
      maxLife: trailLife,
      color: isSpecial ? charColor : characters[attacker.charIdx].accent,
      targetId: target.id,
      maxPoints: maxPoints,
      width: 3 + dmgFactor * 5, // 太さもダメージで変化
    });
  }
}

// --- Hitbox collision ---
function hitboxCollides(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function getPlayerHitbox(p) {
  return { x: p.x - 18, y: p.y - 70, w: 36, h: 70 };
}

function getAttackHitbox(p, atk) {
  const dir = p.facingLeft ? -1 : 1;
  const cx = p.x + atk.hx * dir;
  const hw = atk.hw;
  const hx = dir > 0 ? cx : cx - hw;
  return { x: hx, y: p.y + atk.hy, w: hw, h: atk.hh };
}

// --- Projectile spawning ---
function spawnProjectile(p, projDef) {
  const dir = p.facingLeft ? -1 : 1;
  projectiles.push({
    x: p.x + 30 * dir, y: p.y - 40,
    vx: projDef.speed * dir, vy: 0,
    w: projDef.w, h: projDef.h,
    damage: projDef.damage, kbBase: projDef.kbBase, kbScale: projDef.kbScale, kbAngle: projDef.kbAngle,
    life: projDef.life, ownerId: p.id,
    color: projDef.color, pcolor: projDef.pcolor,
    shape: projDef.shape || 'rect',
    ownerCharIdx: p.charIdx,
    time: 0,
  });
}

// --- Start attack ---
function startAttack(p, type) {
  if (p.attacking || p.hitstun > 0 || !p.alive || p.grabbing || p.grabbed || p.guarding || p.guardBreakStun > 0) return;

  // Meteor only: strong attack locked until landing after use
  if (type === 'strong' && p.charIdx === 3 && p.strongLocked) return;

  // Context-sensitive attack type
  const defs = attackDefs[p.charIdx];
  let actualType = type;
  // downair は空中専用
  if (type === 'downair' && p.grounded) return;

  const atk = defs[actualType];
  if (!atk) return;

  // Meteor only: lock strong attack until landing after use
  if (actualType === 'strong' && p.charIdx === 3) {
    p.strongLocked = true;
  }

  p.attacking = true;
  p.attackType = actualType;
  p.attackFrame = 0;
  p.attackData = atk;
  p.hitTargets = [];
  p.lastHitFrame = -99;
  p.specialState = null;

  // Swing sound
  try {
    const ac = getAudioCtx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    const now = ac.currentTime;
    if (actualType === 'strong' || actualType === 'special') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, now);
      o.frequency.exponentialRampToValueAtTime(100, now + 0.08);
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    } else {
      o.type = 'triangle';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(200, now + 0.04);
      g.gain.setValueAtTime(0.04, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    }
    o.start(now); o.stop(now + 0.12);
  } catch(e) {}
}

// --- Grab / Throw ---
function releaseGrab(grabber) {
  if (grabber.grabTarget !== null) {
    const target = players.find(pp => pp.id === grabber.grabTarget);
    if (target) {
      target.grabbed = false;
      target.grabbedBy = null;
    }
  }
  grabber.grabbing = false;
  grabber.grabTarget = null;
  grabber.grabTimer = 0;
}

function tryGrab(p) {
  if (p.attacking || p.hitstun > 0 || !p.alive || p.grabbing || p.grabbed || !p.grounded) return;
  if (p.throwCooldown > 0) return;
  for (const target of players) {
    if (target.id === p.id || !target.alive || target.invincibleTimer > 0 || target.grabbed) continue;
    const dist = Math.abs(p.x - target.x);
    if (dist < GRAB_RANGE) {
      // Grab!
      playHitSound('grab');
      p.grabbing = true;
      p.grabTarget = target.id;
      p.grabTimer = 0;
      p.attacking = false;
      target.grabbed = true;
      target.grabbedBy = p.id;
      target.hitstun = 0;
      target.attacking = false;
      target.specialState = null;
      target.guarding = false;
      target.vx = 0; target.vy = 0;
      // Face each other
      p.facingLeft = target.x < p.x;
      return;
    }
  }
}

function executeThrow(grabber, dirX, dirY) {
  const target = players.find(pp => pp.id === grabber.grabTarget);
  if (!target) { releaseGrab(grabber); return; }

  const throwDmg = attackDefs[grabber.charIdx].throwDmg || 10;
  target.damage = Math.min(999, target.damage + throwDmg);

  const kb = THROW_BASE_KB + target.damage * THROW_KB_SCALE;

  // Determine throw direction
  if (dirY < 0) {
    // Up throw
    target.vx = 0;
    target.vy = -kb * 1.2;
  } else if (dirY > 0) {
    // Down throw (slam into ground, bounce up)
    target.vx = 0;
    target.vy = -kb * 0.5;
    target.damage = Math.min(999, target.damage + 3); // bonus damage
  } else {
    // Forward/back throw
    const throwDir = dirX !== 0 ? dirX : (grabber.facingLeft ? -1 : 1);
    target.vx = throwDir * kb;
    target.vy = -kb * 0.6;
  }

  target.hitstun = Math.floor(10 + target.damage * 0.1);
  target.damageTint = 12;
  playHitSound('throw');
  triggerScreenShake(3, 6);

  hitEffects.push({
    x: target.x, y: target.y - 40,
    life: 15, maxLife: 15,
    color: '#FFAA00',
    size: Math.min(40, 20 + kb * 0.5)
  });

  grabber.throwCooldown = 30;
  releaseGrab(grabber);
}

// --- CPU AI ---
let cpuActionTimer = 0;
let cpuJumpTimer = 0;
let cpuAttackCooldown = 0;

function getCpuGuard(cpu, target) {
  if (!cpu.grounded || cpu.attacking || cpu.grabbing || cpu.grabbed) return false;
  if (cpu.guardDurability <= 10) return false; // Don't guard with low durability
  const dist = Math.abs(target.x - cpu.x);

  if (cpuDifficulty === 0) {
    // Easy: rarely guards
    return target.attacking && dist < 80 && Math.random() < 0.01;
  } else if (cpuDifficulty === 1) {
    // Normal: sometimes guards when attacked nearby
    return target.attacking && dist < 100 && Math.random() < 0.04;
  } else {
    // Hard: guards reactively, sometimes just guards
    if (target.attacking && dist < 120) return Math.random() < 0.08;
    // Guard against projectiles
    for (const pr of projectiles) {
      if (pr.ownerId !== cpu.id && Math.abs(pr.x - cpu.x) < 100 && Math.abs(pr.y - cpu.y) < 60) {
        return Math.random() < 0.12;
      }
    }
    return false;
  }
}

function getCpuInput(cpu, target) {
  const result = { moveX: 0, jump: false, attack: null, grab: false, throwDir: null };
  if (!target.alive || !cpu.alive) return result;

  const dx = target.x - cpu.x;
  const dy = target.y - cpu.y;
  const dist = Math.abs(dx);
  const dirToTarget = dx > 0 ? 1 : -1;
  const isAirborne = !cpu.grounded;

  cpuActionTimer++;
  if (cpuAttackCooldown > 0) cpuAttackCooldown--;

  // CPU grab/throw handling
  if (cpu.grabbing) {
    if (cpu.grabTimer > 15 + Math.random() * 20) {
      const dirs = [[dirToTarget, 0], [0, -1], [-dirToTarget, 0]];
      const d = dirs[Math.floor(Math.random() * dirs.length)];
      result.throwDir = { x: d[0], y: d[1] };
    }
    return result;
  }

  if (cpuDifficulty === 0) {
    // --- EASY ---
    if (cpuActionTimer % 90 < 45) {
      result.moveX = Math.sin(cpuActionTimer * 0.05) > 0 ? 1 : -1;
    }
    if (Math.random() < 0.008) result.jump = true;
    if (dist < 120 && Math.random() < 0.02 && cpuAttackCooldown <= 0) {
      result.attack = isAirborne ? 'aerial' : 'normal';
      cpuAttackCooldown = 60;
    }
    if (cpu.x < STAGE_LEFT + 30) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 30) result.moveX = -1;

  } else if (cpuDifficulty === 1) {
    // --- NORMAL ---
    if (dist > 80) {
      result.moveX = dirToTarget;
    } else if (dist < 40) {
      result.moveX = Math.random() < 0.3 ? -dirToTarget : 0;
    }
    if (dy < -60 && Math.random() < 0.04) result.jump = true;
    if (Math.random() < 0.01) result.jump = true;

    if (cpuAttackCooldown <= 0) {
      if (isAirborne && dist < 80 && Math.random() < 0.05) {
        result.attack = 'aerial';
        cpuAttackCooldown = 30;
      } else if (dist < 80) {
        if (Math.random() < 0.04) {
          const roll = Math.random();
          if (roll < 0.5) result.attack = 'normal';
          else if (roll < 0.75) result.attack = 'strong';
          else result.attack = 'down';
          cpuAttackCooldown = 35;
        }
      } else if (dist < 150 && Math.random() < 0.015) {
        result.attack = 'strong';
        cpuAttackCooldown = 45;
      }
    }

    if (cpu.x < STAGE_LEFT + 20) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 20) result.moveX = -1;
    if (cpu.y > STAGE_GROUND_Y + 50) result.jump = true;

  } else {
    // --- HARD ---
    if (dist > 60) {
      result.moveX = dirToTarget;
    } else if (dist > 30) {
      result.moveX = Math.random() < 0.6 ? dirToTarget : 0;
    }
    if (dy < -50 && Math.random() < 0.06) result.jump = true;
    if (target.attacking && Math.random() < 0.08) result.jump = true;
    if (Math.random() < 0.012) result.jump = true;

    if (cpuAttackCooldown <= 0) {
      // Aerial attacks when airborne
      if (isAirborne && dist < 70 && Math.random() < 0.08) {
        // 空中で相手が下にいたらメテオ（下空中攻撃）
        if (dy > 20 && Math.random() < 0.4) {
          result.attack = 'downair';
        } else {
          result.attack = 'aerial';
        }
        cpuAttackCooldown = 18;
      }
      // Grab at close range
      else if (dist < GRAB_RANGE && cpu.grounded && Math.random() < 0.03 && cpu.throwCooldown <= 0) {
        result.grab = true;
        cpuAttackCooldown = 20;
      }
      else if (dist < 70) {
        if (Math.random() < 0.07) {
          const roll = Math.random();
          if (roll < 0.2) result.attack = 'normal';
          else if (roll < 0.35) result.attack = 'strong';
          else if (roll < 0.5) result.attack = 'down';
          else if (roll < 0.65) result.attack = 'up';
          else if (roll < 0.8) result.attack = 'side';
          else result.attack = 'special';
          cpuAttackCooldown = 22;
        }
      } else if (dist < 130) {
        if (Math.random() < 0.04) {
          result.attack = Math.random() < 0.5 ? 'strong' : 'special';
          cpuAttackCooldown = 28;
        }
      } else if (dist < 250 && Math.random() < 0.02) {
        result.attack = 'special';
        cpuAttackCooldown = 35;
      }
    }

    if (target.hitstun > 0 && dist < 80 && cpuAttackCooldown <= 0 && Math.random() < 0.12) {
      result.attack = 'normal';
      cpuAttackCooldown = 15;
    }

    // CPU command attacks (hard only, rare)
    if (cpuAttackCooldown <= 0 && Math.random() < 0.006) {
      const cmds = commandDefs[cpu.charIdx];
      if (cmds) {
        const cmd = cmds[Math.floor(Math.random() * cmds.length)];
        if (cpu['cd_' + cmd.cooldownKey] <= 0 && dist < 200) {
          result.command = cmd;
          cpuAttackCooldown = 60;
        }
      }
    }

    if (cpu.x < STAGE_LEFT + 15) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 15) result.moveX = -1;
    if (cpu.y > STAGE_GROUND_Y + 30) result.jump = true;
    if (cpu.x < STAGE_LEFT - 50 || cpu.x > STAGE_RIGHT + 50) {
      result.moveX = cpu.x < 480 ? 1 : -1;
      result.jump = true;
    }
  }

  return result;
}

function updateBattle(dt) {
  battleTime += dt;

  if (battleCountdown > 0) { battleCountdown--; return; }
  battleStarted = true;

  battleFrameAcc++;
  if (battleFrameAcc >= 60) { battleFrameAcc = 0; if (battleTimer > 0) battleTimer--; }

  if (battleTimer <= 0 && !gameOver) {
    gameOver = true;
    const p1 = players[0], p2 = players[1];
    if (p1.stocks !== p2.stocks) winner = p1.stocks > p2.stocks ? 0 : 1;
    else winner = p1.damage <= p2.damage ? 0 : 1;
  }
  if (gameOver) return;

  // Update hit effects
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    hitEffects[i].life--;
    if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
  }

  // Update sparks - 物理演算（重力・空気抵抗・フェードアウト）
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += (s.gravity || 0.15);
    s.vx *= (s.drag || 0.97);
    if (s.spin) s.angle = (s.angle || 0) + s.spin; // 回転更新
    s.life--;
    if (s.life <= 0) sparks.splice(i, 1);
  }

  // Update damage numbers
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy;
    d.vy *= 0.96;
    d.life--;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }

  // Update trails (follow target while alive, then fade)
  for (let i = trails.length - 1; i >= 0; i--) {
    const tr = trails[i];
    tr.life--;
    if (tr.life <= 0) { trails.splice(i, 1); continue; }
    const target = players.find(pp => pp.id === tr.targetId);
    if (target && target.alive && target.hitstun > 0) {
      if (!tr.points) tr.points = [];
      tr.points.push({ x: target.x, y: target.y - 35 });
      const maxPts = tr.maxPoints || 20;
      if (tr.points.length > maxPts) tr.points.shift();
    }
  }

  // Update blast explosions
  for (let i = blastExplosions.length - 1; i >= 0; i--) {
    blastExplosions[i].life--;
    if (blastExplosions[i].life <= 0) blastExplosions.splice(i, 1);
  }

  // Update command name display
  for (let i = cmdNameDisplay.length - 1; i >= 0; i--) {
    cmdNameDisplay[i].life--;
    cmdNameDisplay[i].y -= 0.5;
    if (cmdNameDisplay[i].life <= 0) cmdNameDisplay.splice(i, 1);
  }

  // Update hit/miss displays
  for (let i = hitMissDisplays.length - 1; i >= 0; i--) {
    hitMissDisplays[i].life--;
    hitMissDisplays[i].y -= 0.8;
    if (hitMissDisplays[i].life <= 0) hitMissDisplays.splice(i, 1);
  }

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    pr.x += pr.vx;
    pr.y += pr.vy;
    pr.life--;
    pr.time++;
    if (pr.life <= 0) { projectiles.splice(i, 1); continue; }
    // Check hit against players
    for (const p of players) {
      if (p.id === pr.ownerId || !p.alive || p.invincibleTimer > 0) continue;
      const ph = getPlayerHitbox(p);
      if (hitboxCollides(pr.x - pr.w/2, pr.y - pr.h/2, pr.w, pr.h, ph.x, ph.y, ph.w, ph.h)) {
        const fakeAttacker = { x: pr.x - pr.vx * 5, charIdx: pr.ownerCharIdx };
        applyHit(fakeAttacker, p, pr.damage, pr.kbBase, pr.kbScale, pr.kbAngle, 'special');
        showHitDisplay(p.x, p.y, true);
        projectiles.splice(i, 1);
        break;
      }
    }
  }

  // Update players
  for (const p of players) {
    if (p.respawnTimer > 0) {
      p.respawnTimer--;
      if (p.respawnTimer === 0) {
        p.x = p.id === 0 ? 350 : 610;
        p.y = 100; p.vx = 0; p.vy = 0;
        p.alive = true; p.invincibleTimer = 120;
        p.facingLeft = p.id === 1;
        p.attacking = false; p.hitstun = 0; p.specialState = null;
        p.guarding = false; p.guardDurability = GUARD_MAX_DURABILITY; p.guardBreakStun = 0; p.justGuardTimer = 0;
        p.animState = 'fall'; p.spinAngle = 0; p.damageTint = 0; p.landSquash = 0; p.jumpSquash = 0;
      }
      continue;
    }
    if (!p.alive) continue;
    if (p.invincibleTimer > 0) p.invincibleTimer--;

    const ch = characters[p.charIdx];
    if (p.throwCooldown > 0) p.throwCooldown--;
    if (p.cd_cmd1 > 0) p.cd_cmd1--;
    if (p.cd_cmd2 > 0) p.cd_cmd2--;

    // Grabbed state: stuck to grabber
    if (p.grabbed) {
      const grabber = players.find(pp => pp.id === p.grabbedBy);
      if (grabber && grabber.grabbing) {
        const gdir = grabber.facingLeft ? -1 : 1;
        p.x = grabber.x + gdir * 30;
        p.y = grabber.y;
        p.vx = 0; p.vy = 0;
      } else {
        p.grabbed = false; p.grabbedBy = null;
      }
      continue;
    }

    // Grabbing state: hold opponent, wait for throw input
    if (p.grabbing) {
      p.grabTimer++;
      p.vx = 0;
      // Gravity still applies
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.y += p.vy;
      landingCheck(p);

      // Auto release after duration
      if (p.grabTimer >= GRAB_DURATION) {
        releaseGrab(p);
      }
      // Throw input is handled in handleKeyDown
      continue;
    }

    // Guard break stun
    if (p.guardBreakStun > 0) {
      p.guardBreakStun--;
      p.guarding = false;
      p.vx *= 0.88;
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.x += p.vx;
      p.y += p.vy;
      landingCheck(p);
      blastCheck(p);
      continue;
    }

    // Hitstun - 自然な放物線＋回転＋壁バウンド
    if (p.hitstun > 0) {
      p.hitstun--;
      p.guarding = false;
      p.animState = 'hitstun';
      // 速度に応じた回転（大きく吹っ飛んだ時だけ少し回転）
      const kbSpeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (kbSpeed > 10) {
        const spinRate = Math.min(kbSpeed / 80, 0.15);
        p.spinAngle += (p.vx > 0 ? spinRate : -spinRate);
      }
      // 吹っ飛び中も上昇/落下で重力が変化（放物線が自然に）
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.x += p.vx;
      p.y += p.vy;
      // 空気抵抗（速いほど減衰が弱い = 遠くまで飛ぶ）
      const airRes = kbSpeed > 12 ? 0.98 : 0.95;
      p.vx *= airRes;
      landingCheck(p);
      wallBounceCheck(p);
      blastCheck(p);
      continue;
    }

    // Attack update
    if (p.attacking) {
      p.attackFrame++;
      const atk = p.attackData;
      const totalFrames = atk.startup + atk.active + atk.recovery;

      // Special movement attacks
      if (atk.specialType === 'jumpSlam') {
        if (p.attackFrame === atk.startup) {
          p.vy = atk.jumpPower;
          p.specialState = 'jumping';
          p.grounded = false;
        }
        if (p.specialState === 'jumping') {
          p.vy += getGravity(p);
          if (p.vy > 0) { p.specialState = 'slamming'; p.vy = 16; }
        }
        if (p.specialState === 'slamming') {
          p.vy = 16;
          // Check if we hit ground
          if (p.grounded) {
            // Slam hit!
            p.specialState = 'slamHit';
            p.attackFrame = atk.startup + 1; // start active frames
            p.hitTargets = [];
          }
        }
        if (p.specialState === 'slamHit') {
          const slamFrame = p.attackFrame - atk.startup;
          if (slamFrame <= atk.slamActive) {
            const hb = { x: p.x - atk.slamHw / 2, y: p.y + atk.slamHy, w: atk.slamHw, h: atk.slamHh };
            checkHitboxAgainstPlayers(p, hb, atk.damage, atk.kbBase, atk.kbScale, atk.kbAngle, 'strong');
          }
          if (slamFrame > atk.slamActive + atk.recovery) {
            if (p.hitTargets.length === 0) {
              showHitDisplay(p.x, p.y, false);
              playHitSound('miss');
            }
            p.attacking = false; p.specialState = null;
          }
        }
        // Apply movement (limited horizontal control)
        p.x += p.vx * 0.3;
        p.y += p.vy;
        landingCheck(p);
        blastCheck(p);
        if (p.specialState !== 'slamHit') continue;
        if (p.attacking) continue;
      }

      if (atk.specialType === 'shadowDash' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        const dir = p.facingLeft ? -1 : 1;
        p.vx = atk.dashSpeed * dir;
        p.specialState = 'dashing';
      } else if (atk.specialType === 'shadowDash' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
        p.vx *= 0.3;
      }

      // Slide (sweep / sliding)
      if (atk.specialType === 'slide' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        const dir = p.facingLeft ? -1 : 1;
        p.vx = atk.slideSpeed * dir;
        p.specialState = 'sliding';
      } else if (atk.specialType === 'slide' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
        p.vx *= 0.3;
      }

      if (atk.specialType === 'uppercut' && p.attackFrame === atk.startup + 1) {
        p.vy = atk.launchVy;
        p.grounded = false;
        p.specialState = 'rising';
      }
      if (atk.specialType === 'uppercut' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Divekick: 空中下攻撃で急降下
      if (atk.specialType === 'divekick' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        p.vy = atk.diveSpeed;
        p.vx *= 0.3;
        p.specialState = 'diving';
      }
      if (atk.specialType === 'divekick' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Command: Teleport Slash (Zen cmd2)
      if (atk.specialType === 'cmdTeleSlash' && p.attackFrame === atk.startup) {
        const dir = p.facingLeft ? -1 : 1;
        p.x += atk.teleportDist * dir;
        p.specialState = 'teleSlashing';
        // Clamp to stage
        p.x = Math.max(BLAST_LEFT + 30, Math.min(BLAST_RIGHT - 30, p.x));
      }
      if (atk.specialType === 'cmdTeleSlash' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Command: Charge (Don cmd2)
      if (atk.specialType === 'cmdCharge' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        const dir = p.facingLeft ? -1 : 1;
        p.vx = atk.chargeSpeed * dir;
        p.specialState = 'charging';
      } else if (atk.specialType === 'cmdCharge' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
        p.vx *= 0.2;
      }

      // Command: Shuriken Storm (Saisoku cmd1)
      if (atk.specialType === 'cmdShurikenStorm' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        if ((p.attackFrame - atk.startup) % 3 === 1) {
          const dir = p.facingLeft ? -1 : 1;
          const spread = (Math.random() - 0.5) * 4;
          projectiles.push({
            x: p.x + 20 * dir, y: p.y - 40 + spread * 5,
            vx: (10 + Math.random() * 3) * dir, vy: spread,
            w: 14, h: 14,
            damage: 4, kbBase: 1.5, kbScale: 0.03, kbAngle: -5,
            life: 35, ownerId: p.id,
            color: '#88FFCC', pcolor: '#AAFFDD',
            shape: 'star', ownerCharIdx: p.charIdx, time: 0,
          });
        }
      }

      // Command: Clone Rush (Saisoku cmd2)
      if (atk.specialType === 'cmdCloneRush' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        p.specialState = 'cloneRush';
      }
      if (atk.specialType === 'cmdCloneRush' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Active frames - check hitbox
      if (p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        // Spawn projectile on first active frame
        if (atk.projectile && p.attackFrame === atk.startup + 1) {
          spawnProjectile(p, atk.projectile);
        }

        // Determine hit type for effects
        const ht = p.attackType === 'command' ? 'cmd' : p.attackType || 'normal';

        // Melee hitbox
        if (atk.hw > 0 && atk.hh > 0) {
          let hitbox;
          if (atk.centerHit) {
            hitbox = { x: p.x - atk.hw / 2, y: p.y + atk.hy, w: atk.hw, h: atk.hh };
          } else {
            hitbox = getAttackHitbox(p, atk);
          }

          if (atk.multiHit) {
            const sinceLastHit = p.attackFrame - p.lastHitFrame;
            const isLast = p.attackFrame >= atk.startup + atk.active - 2;
            if (sinceLastHit >= atk.hitInterval) {
              const dmg = isLast ? atk.finalDamage : atk.damage;
              const kb = isLast ? atk.finalKbBase : atk.kbBase;
              const ks = isLast ? atk.finalKbScale : atk.kbScale;
              const ka = isLast ? atk.finalKbAngle : atk.kbAngle;
              // Clear targets for multi-hit
              p.hitTargets = [];
              if (checkHitboxAgainstPlayers(p, hitbox, dmg, kb, ks, ka, ht)) {
                p.lastHitFrame = p.attackFrame;
              }
            }
          } else {
            checkHitboxAgainstPlayers(p, hitbox, atk.damage, atk.kbBase, atk.kbScale, atk.kbAngle, ht);
          }
        }
      }

      // End attack
      if (p.attackFrame >= totalFrames) {
        // Show MISS if melee attack hit nobody (skip projectile-only attacks)
        if (p.hitTargets.length === 0 && atk.hw > 0) {
          const dir = p.facingLeft ? -1 : 1;
          showHitDisplay(p.x + 30 * dir, p.y, false);
          playHitSound('miss');
        }
        p.attacking = false;
        p.specialState = null;
      }

      // During attack, limited movement
      if (atk.specialType === 'shadowDash' || atk.specialType === 'slide' || atk.specialType === 'cmdCharge') {
        p.vy += getGravity(p);
        if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
        p.x += p.vx;
        p.y += p.vy;
        landingCheck(p);
        blastCheck(p);
      } else if (atk.specialType !== 'jumpSlam') {
        p.vy += getGravity(p);
        if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
        p.x += p.vx * 0.3;
        p.y += p.vy;
        p.vx *= 0.85;
        landingCheck(p);
        blastCheck(p);
      }
      continue;
    }

    // --- Guard handling ---
    let wantsGuard = false;
    if (p.id === 0) {
      wantsGuard = !!(keys['v'] || keys['V']);
    } else if (p.id === 1 && gameMode === 'cpu') {
      // CPU guard handled by AI
      const cpuTarget = players[0];
      wantsGuard = getCpuGuard(p, cpuTarget);
    } else {
      wantsGuard = !!(keys['p'] || keys['P']);
    }

    // Can only guard if grounded, not attacking, not grabbing/grabbed
    if (wantsGuard && p.grounded && !p.attacking && !p.grabbing && !p.grabbed && p.guardDurability > 0) {
      if (!p.guarding) {
        // Start guarding - set just guard window
        p.guarding = true;
        p.justGuardTimer = JUST_GUARD_WINDOW;
      }
    } else {
      p.guarding = false;
    }

    // Just guard timer countdown
    if (p.justGuardTimer > 0) p.justGuardTimer--;

    // Guard durability regen when not guarding
    if (!p.guarding && p.guardDurability < GUARD_MAX_DURABILITY) {
      p.guardDurability = Math.min(GUARD_MAX_DURABILITY, p.guardDurability + GUARD_REGEN_RATE);
    }

    // Guarding state: no movement, stay grounded, gauge decays over time
    if (p.guarding) {
      p.guardDurability -= GUARD_DECAY_RATE;
      if (p.guardDurability <= 0) {
        // Guard break from natural decay
        p.guardDurability = 0;
        p.guarding = false;
        p.guardBreakStun = GUARD_BREAK_STUN;
        hitEffects.push({ x: p.x, y: p.y - 40, life: 25, maxLife: 25, color: '#FF6600', size: 60 });
        playHitSound('guardBreak');
        triggerScreenShake(6, 15);
      }
      p.vx = 0;
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.y += p.vy;
      landingCheck(p);
      continue;
    }

    // --- Normal movement ---
    let moveX = 0;
    let jumpPress = false;

    // CPU AI for player 2
    if (p.id === 1 && gameMode === 'cpu') {
      const ai = getCpuInput(p, players[0]);
      moveX = ai.moveX;
      jumpPress = ai.jump;
      if (ai.command) executeCommand(p, ai.command);
      else if (ai.attack) startAttack(p, ai.attack);
      if (ai.grab) tryGrab(p);
      if (ai.throwDir && p.grabbing) executeThrow(p, ai.throwDir.x, ai.throwDir.y);
    } else if (p.id === 0) {
      if (keys['ArrowLeft']) moveX = -1;
      if (keys['ArrowRight']) moveX = 1;
      jumpPress = !!keys['ArrowUp'];
    } else {
      if (keys['a'] || keys['A']) moveX = -1;
      if (keys['d'] || keys['D']) moveX = 1;
      jumpPress = !!(keys['w'] || keys['W']);
    }

    applyMovement(p, moveX, ch);
    if (moveX < 0) p.facingLeft = true;
    if (moveX > 0) p.facingLeft = false;

    // Update walk cycle
    if (moveX !== 0 && p.grounded) {
      p.walkCycle++;
    } else {
      p.walkCycle = 0;
    }

    // Grab hold detection (X/I held)
    if (p.id === 0) {
      if (keys['x'] || keys['X']) {
        p.grabHoldFrames++;
        if (p.grabHoldFrames === GRAB_HOLD_FRAMES && p.grounded && !p.attacking) tryGrab(p);
      } else {
        p.grabHoldFrames = 0;
      }
    } else if (gameMode === 'vs') {
      if (keys['i'] || keys['I']) {
        p.grabHoldFrames++;
        if (p.grabHoldFrames === GRAB_HOLD_FRAMES && p.grounded && !p.attacking) tryGrab(p);
      } else {
        p.grabHoldFrames = 0;
      }
    }

    if (jumpPress && !p.jumpUsed && p.jumps > 0) {
      p.vy = ch.jumpPower;
      p.jumps--; p.jumpUsed = true; p.grounded = false;
      p.jumpSquash = 6; // jump anticipation squash
      playHitSound('jump');
    }
    if (!jumpPress) p.jumpUsed = false;

    // スマブラ風重力: 上昇=弱、頂点=極弱、落下=強
    p.vy += getGravity(p);
    if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
    p.x += p.vx;
    p.y += p.vy;
    const wasGroundedBefore = p.grounded;
    landingCheck(p);
    wallBounceCheck(p);
    blastCheck(p);

    // Landing detection - stronger squash for faster falls + dust particles
    if (!wasGroundedBefore && p.grounded) {
      const prevVy = p.vy || 0;
      const impactStrength = Math.min(Math.abs(prevVy) / MAX_FALL_SPEED, 1);
      p.landSquash = Math.floor(8 + impactStrength * 4);

      // ③ 着地時パーティクル（攻撃専用エフェクトがある場合はスキップ）
      if (impactStrength > 0.15 && p.specialState !== 'slamHit' && p.specialState !== 'slamming') {
        const dustCount = Math.floor(3 + impactStrength * 8);
        for (let i = 0; i < dustCount; i++) {
          const side = i % 2 === 0 ? -1 : 1;
          const speed = (1 + Math.random() * 2 + impactStrength * 3) * side;
          sparks.push({
            x: p.x + (Math.random() - 0.5) * 20,
            y: p.y,
            vx: speed,
            vy: -0.5 - Math.random() * 1.5 * impactStrength,
            life: 10 + Math.floor(Math.random() * 8),
            maxLife: 18,
            color: '#BBAA99',
            size: 1.5 + Math.random() * 2 * impactStrength,
            type: 'dust',
            gravity: 0.06,
            drag: 0.93,
          });
        }

        // 強い吹っ飛びからの着地: 衝撃波エフェクト
        if (impactStrength > 0.5 || p.hitstun > 0) {
          const shockSize = 30 + impactStrength * 50;
          hitEffects.push({
            x: p.x, y: p.y,
            life: 12, maxLife: 12,
            color: '#DDCCAA',
            size: shockSize,
            type: 'shockwave',
          });
          // 大量の埃
          for (let i = 0; i < 12; i++) {
            const a = Math.random() * Math.PI; // 上半分のみ
            const speed = 2 + Math.random() * 4 * impactStrength;
            sparks.push({
              x: p.x + (Math.random() - 0.5) * 30,
              y: p.y - 2,
              vx: Math.cos(a + Math.PI) * speed,
              vy: -Math.sin(a) * speed * 0.8,
              life: 15 + Math.floor(Math.random() * 10),
              maxLife: 25,
              color: i % 3 === 0 ? '#CCBB99' : '#998877',
              size: 2 + Math.random() * 3,
              type: 'dust',
              gravity: 0.08,
              drag: 0.92,
            });
          }
          triggerScreenShake(Math.floor(impactStrength * 4), 6);
        }
      }
    }

    // Update animation state
    p.animTimer++;
    if (p.jumpSquash > 0) p.jumpSquash--;
    if (p.landSquash > 0) p.landSquash--;
    if (p.damageTint > 0) p.damageTint--;

    // Decay spin angle when not in hitstun - smoother deceleration
    if (p.hitstun <= 0) {
      p.spinAngle *= 0.88;
      if (Math.abs(p.spinAngle) < 0.005) p.spinAngle = 0;
    }

    // Determine animation state
    if (p.grounded) {
      if (moveX !== 0) {
        p.animState = 'walk';
      } else {
        p.animState = 'idle';
      }
    } else {
      p.animState = p.vy < 0 ? 'jump' : 'fall';
    }
  }

  // キャラクター同士の押し合い
  resolvePlayerCollisions();
}

// キャラクター同士の衝突：ヒットボックスが重なったら左右に5pxずらすだけ
function resolvePlayerCollisions() {
  if (players.length < 2) return;
  const a = players[0];
  const b = players[1];
  if (!a.alive || !b.alive) return;
  // X方向チェック
  if (Math.abs(a.x - b.x) >= 36) return;
  // Y方向チェック：足のY座標の差が70以上なら衝突しない（上を飛び越えられる）
  if (Math.abs(a.y - b.y) >= 70) return;
  if (a.x <= b.x) {
    a.x -= 5;
    b.x += 5;
  } else {
    a.x += 5;
    b.x -= 5;
  }
}

function checkHitboxAgainstPlayers(attacker, hitbox, damage, kbBase, kbScale, kbAngle, hitType) {
  let hit = false;
  for (const target of players) {
    if (target.id === attacker.id || !target.alive || target.invincibleTimer > 0) continue;
    if (attacker.hitTargets.includes(target.id)) continue;

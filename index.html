// --- Audio unlock on first interaction ---
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try {
    const ac = getAudioCtx();
    if (ac.state === 'suspended') ac.resume();
  } catch(e) {}
  bgmAudio.load();
}

// --- Input tracking ---
const keys = {};
document.addEventListener('keydown', (e) => {
  unlockAudio();
  keys[e.key] = true;
  if (e.key === 'F3' || ((e.key === 'h' || e.key === 'H') && scene === 'battle')) { debugHitboxes = !debugHitboxes; e.preventDefault(); }
  handleKeyDown(e);
});
document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

// --- Particles ---
function spawnTitleParticle() {
  titleParticles.push({
    x: Math.random() * 960,
    y: 640 + 10,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -1 - Math.random() * 2,
    size: 1 + Math.random() * 3,
    alpha: 0.3 + Math.random() * 0.5,
    color: ['#FF4444', '#4488FF', '#44FF88', '#FFDD44'][Math.floor(Math.random() * 4)],
    life: 200 + Math.random() * 200
  });
}

function updateParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.alpha *= 0.998;
    if (p.life <= 0 || p.alpha < 0.01) titleParticles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of titleParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

  const ch = characters[charIndex];
  const c = ch.bodyColors;
  const s = scale;

        else if (phase === 'active') reach = 26 * s * easeOut;
        else reach = 26 * s * (1 - easeOut);
        ctx.translate(8 * s + reach, -6 * s);
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 4 * s;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-12 * s, 0); ctx.quadraticCurveTo(0, -6 * s, 12 * s, 0); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active' && phaseT < 0.3) {
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#FF80B0';
          ctx.beginPath(); ctx.arc(12 * s, 0, 7 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'down' || atkType === 'downair') {
        // 下/空中下: 触手叩きつけ
        let smash;
        if (phase === 'startup') smash = easeIn * 0.3;
        else if (phase === 'active') smash = 0.3 + easeOut * 0.7;
        else smash = (1 - easeOut) * 0.3;
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 5 * s;
        ctx.lineCap = 'round';
        const dy = smash * 25 * s;
        ctx.beginPath(); ctx.moveTo(-6 * s, 10 * s); ctx.lineTo(-8 * s, 10 * s + dy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(6 * s, 10 * s); ctx.lineTo(8 * s, 10 * s + dy); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.5 * (1 - phaseT * 2.5);
          ctx.fillStyle = '#E05090';
          ctx.beginPath(); ctx.ellipse(0, 10 * s + dy + 5 * s, 12 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    ctx.restore();
  }

  ctx.restore();
}

function drawStar(cx, cy, r, points, ctx) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.4;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// --- Utility: round rect ---
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}


// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle(dt) {
  titleTime += dt;

  // === 背景: 深い紺→黒グラデーション ===
  const bgGrad = ctx.createLinearGradient(0, 0, 0, 640);
  bgGrad.addColorStop(0, '#000022');
  bgGrad.addColorStop(0.5, '#000011');
  bgGrad.addColorStop(1, '#000000');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 960, 640);

  // === 背景キャラシルエット（ゆっくり流れる）===
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 6; i++) {
    const cx = ((titleTime * 0.3 + i * 180) % 1200) - 120;
    const ci = (i * 7 + 3) % characters.length;
    drawCharacterBody(cx, 400 + Math.sin(i * 2.1) * 60, 1.2, ci, titleTime, i % 2 === 0);
  }
  ctx.globalAlpha = 1;

  // === パーティクル（星・光の粒）===
  if (Math.random() < 0.4) spawnTitleParticle();
  updateParticles();
  drawParticles();

  // === フェードイン ===
  if (titleFadeIn) {
    titleAlpha = Math.min(1, titleAlpha + 0.02);
    if (titleAlpha >= 1) titleFadeIn = false;
  }

  ctx.save();
  ctx.globalAlpha = titleAlpha;

  // === タイトルロゴ（ズームイン + 浮遊）===
  const logoAge = Math.min(1, titleTime * 0.015); // 1秒かけて登場
  const logoScale = logoAge < 1 ? 0.3 + logoAge * 0.7 : 1;
  const logoY = 190 + (logoAge < 1 ? (1 - logoAge) * 80 : Math.sin(titleTime * 0.002) * 5);
  ctx.save();
  ctx.translate(480, logoY);
  ctx.scale(logoScale, logoScale);

  // オーラエフェクト
  const glowPulse = 20 + Math.sin(titleTime * 0.003) * 10;
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = glowPulse;

  // タイトル文字
  ctx.font = 'bold 88px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = '#AA7700'; ctx.lineWidth = 5;
  ctx.strokeText('SMASH GAME', 0, 0);
  const titleGrad = ctx.createLinearGradient(-250, -40, 250, 40);
  titleGrad.addColorStop(0, '#FFD700');
  titleGrad.addColorStop(0.3, '#FFFFAA');
  titleGrad.addColorStop(0.5, '#FFFFFF');
  titleGrad.addColorStop(0.7, '#FFFFAA');
  titleGrad.addColorStop(1, '#FFD700');
  ctx.fillStyle = titleGrad;
  ctx.fillText('SMASH GAME', 0, 0);
  ctx.shadowBlur = 0;

  // サブタイトル
  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#8899CC';
  ctx.fillText('— ULTIMATE BRAWL —', 0, 55);
  ctx.restore();

  // === メニュー項目 ===
  const menuItems = [
    { label: 'ENTER  ゲーム開始', color: '#FFD700' },
    { label: 'O  オンライン対戦', color: '#44DDFF' },
  ];
  const menuStartY = 350;
  for (let i = 0; i < menuItems.length; i++) {
    const my = menuStartY + i * 45;
    const pulse = 0.7 + Math.sin(titleTime * 0.004 + i) * 0.3;
    ctx.globalAlpha = titleAlpha * pulse;
    ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = menuItems[i].color;
    ctx.shadowColor = menuItems[i].color; ctx.shadowBlur = 8;
    ctx.fillText(menuItems[i].label, 480, my);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = titleAlpha;

  // === ボスラッシュ称号 ===
  try {
    const savedTitle = localStorage.getItem('smash_bossrush_title');
    if (savedTitle) {
      ctx.globalAlpha = titleAlpha * 0.6;
      ctx.font = 'bold 14px sans-serif';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('🏆 ' + savedTitle, 480, 440);
    }
  } catch(e) {}

  // === 前景キャラ（画面端から走ってくる）===
  ctx.globalAlpha = titleAlpha * 0.5;
  const runCycle = Math.floor(titleTime * 0.005) % characters.length;
  const runX = ((titleTime * 1.5) % 1400) - 200;
  if (runX > -100 && runX < 1060) {
    drawCharacterBody(runX, 540, 0.8, runCycle, titleTime, runX > 480);
  }
  ctx.globalAlpha = titleAlpha;

  // === Press Any Key ===
  pressAlpha += pressDir * 0.025;
  if (pressAlpha > 1) { pressAlpha = 1; pressDir = -1; }
  if (pressAlpha < 0.2) { pressAlpha = 0.2; pressDir = 1; }
  ctx.globalAlpha = titleAlpha * pressAlpha * 0.6;
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#666688';
  ctx.fillText('Press Any Key to Start', 480, 590);

  // === クレジット・バージョン ===
  ctx.globalAlpha = titleAlpha * 0.35;
  ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = '#555566';
  ctx.fillText('© Good Idea Company', 20, 630);
  ctx.textAlign = 'right';
  ctx.fillText('v1.0.0', 940, 630);

  ctx.restore();
}

// ============================================================
// CHARACTER SELECT SCREEN (2P)
// ============================================================
function drawSelect(dt) {
  selectTime += dt;

  // === 背景 ===
  const bgGrad = ctx.createLinearGradient(0, 0, 0, 640);
  bgGrad.addColorStop(0, '#000022'); bgGrad.addColorStop(1, '#000011');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, 960, 640);

  // 背景パーティクル
  if (Math.random() < 0.15) spawnTitleParticle();
  updateParticles(); drawParticles();

  // === ヘッダー ===
  ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
  const hGrad = ctx.createLinearGradient(300, 0, 660, 0);
  hGrad.addColorStop(0, '#FFD700'); hGrad.addColorStop(0.5, '#FFFFFF'); hGrad.addColorStop(1, '#FFD700');
  ctx.fillStyle = hGrad; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
  ctx.fillText('CHARACTER SELECT', 480, 28); ctx.shadowBlur = 0;
  // 金ライン
  ctx.strokeStyle = '#FFD70044'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(200, 38); ctx.lineTo(760, 38); ctx.stroke();

  // === キャラグリッド（中央） ===
  const charCount = characters.length;
  const totalSlots = charCount + 1;
  const cols = 8, rows = Math.ceil(totalSlots / cols);
  const cardW = 70, cardH = 70, gapX = 4, gapY = 4;
  const gridW = cols * cardW + (cols - 1) * gapX;
  const gridStartX = (960 - gridW) / 2;
  const gridStartY = 48;

  for (let i = 0; i < totalSlots; i++) {
    const isRandom = i >= charCount;
    const ch = isRandom ? null : characters[i];
    const row = Math.floor(i / cols), col = i % cols;
    const lastRowCount = totalSlots - cols * (rows - 1);
    const rowCount = row < rows - 1 ? cols : lastRowCount;
    const rowW = rowCount * cardW + (rowCount - 1) * gapX;
    const rowX = (960 - rowW) / 2;
    const cx = rowX + (row < rows - 1 ? col : col) * (cardW + gapX);
    const cy = gridStartY + row * (cardH + gapY);
    const isP1 = p1Select === i, isP2 = p2Select === i;
    const selected = isP1 || isP2;
    const bounce = selected ? Math.sin(selectTime * 0.008 + i) * 2 : 0;

    ctx.save();
    // 非選択は暗く
    if (!selected) ctx.globalAlpha = 0.55;

    // カード背景
    ctx.fillStyle = selected ? (isRandom ? '#333322' : ch.dark + 'AA') : '#111118';
    roundRect(ctx, cx, cy + bounce, cardW, cardH, 8); ctx.fill();

    // 枠
    if (isP1 && isP2) {
      ctx.strokeStyle = '#44AAFF'; ctx.lineWidth = 2;
      ctx.save(); ctx.beginPath(); ctx.rect(cx, cy + bounce, cardW / 2, cardH); ctx.clip();
      roundRect(ctx, cx, cy + bounce, cardW, cardH, 8); ctx.stroke(); ctx.restore();
      ctx.strokeStyle = '#FF4444'; ctx.save(); ctx.beginPath(); ctx.rect(cx + cardW / 2, cy + bounce, cardW / 2, cardH); ctx.clip();
      roundRect(ctx, cx, cy + bounce, cardW, cardH, 8); ctx.stroke(); ctx.restore();
    } else if (isP1) {
      ctx.strokeStyle = '#44AAFF'; ctx.lineWidth = 2;
      if (isP1 && !p1Confirmed) { ctx.shadowColor = '#44AAFF'; ctx.shadowBlur = 8; }
      roundRect(ctx, cx, cy + bounce, cardW, cardH, 8); ctx.stroke(); ctx.shadowBlur = 0;
    } else if (isP2) {
      ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 2;
      if (isP2 && !p2Confirmed) { ctx.shadowColor = '#FF4444'; ctx.shadowBlur = 8; }
      roundRect(ctx, cx, cy + bounce, cardW, cardH, 8); ctx.stroke(); ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      roundRect(ctx, cx, cy + bounce, cardW, cardH, 8); ctx.stroke();
    }

    // キャラアイコン
    ctx.globalAlpha = selected ? 1 : 0.55;
    if (isRandom) {
      ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.7 + Math.sin(selectTime * 0.005) * 0.3;
      ctx.fillText('?', cx + cardW / 2, cy + bounce + 48);
    } else {
      drawCharacterBody(cx + cardW / 2, cy + bounce + 50, 0.4, i, selectTime, false);
    }

    // 名前（選択中のみ）
    if (selected) {
      ctx.globalAlpha = 1; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFF';
      ctx.fillText(isRandom ? 'ランダム' : ch.name, cx + cardW / 2, cy + bounce + cardH - 3);
    }

    // P1/P2マーカー
    if (isP1) { ctx.globalAlpha = 1; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left'; ctx.fillStyle = p1Confirmed ? '#44FF44' : '#44AAFF'; ctx.fillText(p1Confirmed ? '✓1P' : '1P', cx + 3, cy + bounce + 10); }
    if (isP2) { ctx.globalAlpha = 1; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'right'; ctx.fillStyle = p2Confirmed ? '#44FF44' : '#FF4444'; ctx.fillText(p2Confirmed ? '✓' : (gameMode === 'bossrush' ? 'B' : (gameMode === 'cpu' ? 'CPU' : '2P')), cx + cardW - 3, cy + bounce + 10); }
    ctx.restore();
  }

  // === P1 大表示（左） ===
  const panelY = gridStartY + rows * (cardH + gapY) + 8;
  drawSelectPanel(20, panelY, p1Select, '1P', '#44AAFF', p1Confirmed);
  // === P2 大表示（右） ===
  const p2Lbl = gameMode === 'bossrush' ? 'BOSS' : (gameMode === 'cpu' ? 'CPU' : '2P');
  const p2Col = gameMode === 'bossrush' ? '#FF44CC' : '#FF4444';
  drawSelectPanel(500, panelY, p2Select, p2Lbl, p2Col, p2Confirmed);

  // === モード選択オーバーレイ ===
  if (!modeSelected) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, 960, 640);
    ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 15;
    ctx.fillText('SELECT MODE', 480, 200); ctx.shadowBlur = 0;

    const modes = onlineMode ? [
      { label: 'VS 対戦', desc: '2人で対戦', icon: '⚔️', color: '#44AAFF', mode: 'vs' },
    ] : [
      { label: 'CPU 対戦', desc: 'CPUと対戦', icon: '🤖', color: '#FF8844', mode: 'cpu' },
      { label: 'BOSS RUSH', desc: 'ボス3連戦', icon: '👑', color: '#FF44CC', mode: 'bossrush' },
    ];
    const modeIdx = modes.findIndex(m => m.mode === gameMode);
    for (let i = 0; i < modes.length; i++) {
      const mw = 200, mx = (960 - modes.length * mw) / 2 + i * mw + 10, my = 260;
      const sel = modeIdx === i;
      ctx.fillStyle = sel ? modes[i].color + '22' : 'rgba(10,10,20,0.9)';
      roundRect(ctx, mx, my, mw - 20, 140, 14); ctx.fill();
      ctx.strokeStyle = sel ? modes[i].color : '#333'; ctx.lineWidth = sel ? 3 : 1;
      roundRect(ctx, mx, my, mw - 20, 140, 14); ctx.stroke();
      if (sel) { ctx.shadowColor = modes[i].color; ctx.shadowBlur = 12; }
      ctx.font = '36px sans-serif'; ctx.fillStyle = sel ? modes[i].color : '#555';
      ctx.fillText(modes[i].icon, mx + (mw - 20) / 2, my + 50); ctx.shadowBlur = 0;
      ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = sel ? '#FFF' : '#666';
      ctx.fillText(modes[i].label, mx + (mw - 20) / 2, my + 85);
      ctx.font = '13px sans-serif'; ctx.fillStyle = '#777';
      ctx.fillText(modes[i].desc, mx + (mw - 20) / 2, my + 108);
    }
    ctx.font = '14px sans-serif'; ctx.fillStyle = '#555';
    ctx.fillText('← → で選択  |  Enter で決定  |  ESC で戻る', 480, 460);
    return;
  }

  // === 操作ガイド ===
  ctx.textAlign = 'center'; ctx.font = '12px sans-serif'; ctx.fillStyle = '#444';
  if (p1Confirmed && p2Confirmed) {
    ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = '#44FF44';
    ctx.shadowColor = '#44FF44'; ctx.shadowBlur = 8;
    ctx.fillText(gameMode === 'cpu' ? 'READY! Enter → 難易度選択' : 'READY TO FIGHT! Press ENTER', 480, 628);
    ctx.shadowBlur = 0;
  } else if (gameMode === 'bossrush') {
    ctx.fillText('← → で選択  |  Enter で決定  |  ESC で戻る', 480, 628);
  } else if (gameMode === 'cpu') {
    ctx.fillText('1P: ← → + Enter  |  CPU: A D  |  ESC: 戻る', 480, 628);
  } else {
    ctx.fillText('1P: ← → + Enter  |  2P: A D + Space  |  ESC: 戻る', 480, 628);
  }
}

function drawSelectPanel(px, py, charIdx, label, color, isConfirmed) {
  const isRandom = charIdx >= characters.length;
  const ch = isRandom ? { name:'ランダム', type:'RANDOM', accent:'#FFD700', desc:'ランダムでキャラが選ばれる', stats:{power:0,speed:0,tech:0,defense:0}, bodyColors:{main:'#888'} } : characters[charIdx];
  const pw = 440, ph = Math.min(260, 640 - py - 14);

  // 背景のキャラシルエット
  if (!isRandom) {
    ctx.save(); ctx.globalAlpha = 0.04;
    drawCharacterBody(px + pw / 2, py + ph / 2 + 20, 2.5, charIdx, selectTime, label !== '1P');
    ctx.restore();
  }

  // パネル
  ctx.fillStyle = 'rgba(8,8,20,0.85)';
  roundRect(ctx, px, py, pw, ph, 10); ctx.fill();
  ctx.strokeStyle = isConfirmed ? '#44FF44' : color; ctx.lineWidth = isConfirmed ? 2 : 1;
  roundRect(ctx, px, py, pw, ph, 10); ctx.stroke();

  // ラベル
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left'; ctx.fillStyle = color;
  ctx.fillText(label, px + 12, py + 20);

  // キャラプレビュー
  const previewScale = ph < 200 ? 0.9 : 1.2;
  const previewY = ph < 200 ? py + 80 : py + 100;
  if (isRandom) {
    ctx.font = 'bold 50px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.7 + Math.sin(selectTime * 0.005) * 0.3;
    ctx.fillText('?', px + 80, previewY + 10); ctx.globalAlpha = 1;
  } else {
    drawCharacterBody(px + 80, previewY, previewScale, charIdx, selectTime, false);
  }

  // 名前・タイプ
  ctx.textAlign = 'left';
  ctx.font = 'bold 26px sans-serif'; ctx.fillStyle = '#FFF';
  ctx.fillText(ch.name, px + 160, py + 40);
  ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = ch.accent || '#888';
  ctx.fillText(ch.type || '', px + 160, py + 58);
  ctx.font = '11px sans-serif'; ctx.fillStyle = '#888';
  ctx.fillText(ch.desc || '', px + 160, py + 75);

  // ステータスバー
  const stats = ['POW', 'SPD', 'TEC', 'DEF'];
  const statKeys = ['power', 'speed', 'tech', 'defense'];
  const statColors = ['#FF4444', '#44FF88', '#FFD700', '#4488FF'];
  const barW = 140, barH = 8, statGap = 18;
  const statY = py + (ph < 200 ? 72 : 90);
  for (let i = 0; i < 4; i++) {
    const sy = statY + i * statGap;
    ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left'; ctx.fillStyle = '#555';
    ctx.fillText(stats[i], px + 160, sy + 6);
    ctx.fillStyle = '#111122'; roundRect(ctx, px + 195, sy, barW, barH, 3); ctx.fill();
    const val = ch.stats ? ch.stats[statKeys[i]] : 0;
    ctx.fillStyle = statColors[i]; roundRect(ctx, px + 195, sy, (val / 5) * barW, barH, 3); ctx.fill();
  }

  // 確定エフェクト
  if (isConfirmed) {
    ctx.globalAlpha = 0.1 + Math.sin(selectTime * 0.005) * 0.05;
    ctx.fillStyle = '#44FF44'; roundRect(ctx, px, py, pw, ph, 10); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DIFFICULTY SELECT SCREEN (CPU mode only)
// ============================================================
function drawDifficulty(dt) {
  difficultyTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF8844';
  ctx.shadowBlur = 12;
  ctx.fillText('CPU 難易度選択', 480, 80);
  ctx.shadowBlur = 0;

  const difficulties = [
    { name: 'やさしい', desc: 'ランダムに動く・たまに攻撃', color: '#44CC44', stars: 1 },
    { name: 'ふつう',   desc: '近づいて攻撃・たまにジャンプ', color: '#FFAA22', stars: 2 },
    { name: 'つよい',   desc: '積極追撃・必殺技も使う', color: '#FF4444', stars: 3 },
    { name: 'さいきょう', desc: 'コンボ・復帰・即反撃', color: '#CC44FF', stars: 4 },
  ];

  for (let i = 0; i < difficulties.length; i++) {
    const d = difficulties[i];
    const totalCards = difficulties.length;
    const cardW = 170;
    const gap = 16;
    const totalW2 = totalCards * cardW + (totalCards - 1) * gap;
    const cx = (960 - totalW2) / 2 + i * (cardW + gap);
    const cy = 160;
    const w = cardW;
    const h = 300;
    const sel = difficultySelected === i;
    const bounce = sel ? Math.sin(difficultyTime * 0.005) * 4 : 0;

    ctx.save();
    if (sel) { ctx.shadowColor = d.color; ctx.shadowBlur = 20; }

    const cg = ctx.createLinearGradient(cx, cy, cx, cy + h);
    cg.addColorStop(0, sel ? d.color + '33' : '#1a1a2e');
    cg.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cg;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.fill();

    ctx.strokeStyle = sel ? d.color : '#444';
    ctx.lineWidth = sel ? 3 : 1;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Stars
    const starY = cy + 50 + bounce;
    const maxStars = d.stars <= 3 ? 3 : 4;
    const starSpacing = maxStars <= 3 ? 30 : 24;
    const starStartX = cx + w/2 - (maxStars - 1) * starSpacing / 2;
    for (let s = 0; s < maxStars; s++) {
      ctx.fillStyle = s < d.stars ? d.color : '#333';
      drawStar(starStartX + s * starSpacing, starY, maxStars <= 3 ? 14 : 12, 5, ctx);
    }

    // Name
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = sel ? '#FFF' : '#888';
    ctx.fillText(d.name, cx + w / 2, cy + 110 + bounce);

    // Description
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#AAA';
    const words = d.desc.split('・');
    for (let j = 0; j < words.length; j++) {
      ctx.fillText(words[j], cx + w / 2, cy + 145 + j * 20 + bounce);

    // Character matchup preview
    const p1Ch = characters[p1Select];

    ctx.fillStyle = '#FF4444';
    ctx.fillText(p2Ch.name, cx + w / 2 + 35, cy + 215 + bounce);

    drawCharacterBody(cx + w/2 - 30, cy + 260 + bounce, 0.45, p1Select, difficultyTime, false);

// ============================================================
// STAGE SELECT SCREEN
// ============================================================
function drawStageSelect(dt) {
  stageSelectTime += dt;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  // Title
  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#44AAFF';
  ctx.shadowBlur = 12;
  ctx.fillText('STAGE SELECT', 480, 70);
  ctx.shadowBlur = 0;

  // Stage cards
  const cardW = stages.length <= 2 ? 340 : 270;
  const cardH = stages.length <= 2 ? 380 : 380;
  const gap = stages.length <= 2 ? 40 : 24;
  const totalW = stages.length * cardW + (stages.length - 1) * gap;
  const startX = (960 - totalW) / 2;

  for (let i = 0; i < stages.length; i++) {
    const s = stages[i];
    const sel = selectedStage === i;
    const cx = startX + i * (cardW + gap);
    const cy = 110;
    const bounce = sel ? Math.sin(stageSelectTime * 0.005) * 4 : 0;

    ctx.save();
    if (sel) { ctx.shadowColor = '#44AAFF'; ctx.shadowBlur = 20; }

    // Card background
    const cg = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
    cg.addColorStop(0, sel ? '#44AAFF22' : '#1a1a2e');
    cg.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cg;
    roundRect(ctx, cx, cy + bounce, cardW, cardH, 14);
    ctx.fill();

    // Card border
    ctx.strokeStyle = sel ? '#44AAFF' : '#444';
    ctx.lineWidth = sel ? 3 : 1;
    roundRect(ctx, cx, cy + bounce, cardW, cardH, 14);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Preview image area
    const previewX = cx + 15;
    const previewY = cy + 20 + bounce;
    const previewW = cardW - 30;
    const previewH = 200;

    // Clip for rounded preview
    ctx.save();
    roundRect(ctx, previewX, previewY, previewW, previewH, 8);
    ctx.clip();

    // Draw stage preview
    if (s.id === 'sakura') {
      if (bgImg.complete && bgImg.naturalWidth > 0) {
        ctx.drawImage(bgImg, previewX, previewY, previewW, previewH);
      } else {
        const skyGrad = ctx.createLinearGradient(previewX, previewY, previewX, previewY + previewH);
        skyGrad.addColorStop(0, '#87CEEB');
        skyGrad.addColorStop(1, '#E0A0A0');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(previewX, previewY, previewW, previewH);
      }
    } else if (s.id === 'seijaku') {
      if (bg2Img.complete && bg2Img.naturalWidth > 0) {
        ctx.drawImage(bg2Img, previewX, previewY, previewW, previewH);
      }
    } else if (s.id === 'mahoujin') {
      if (bg3Img.complete && bg3Img.naturalWidth > 0) {
        ctx.drawImage(bg3Img, previewX, previewY, previewW, previewH);
      }
    }

    // Draw mini platform preview
    const platY = previewY + previewH - 40;
    const platLX = previewX + 30;
    const platRX = previewX + previewW - 30;
    if (s.id === 'sakura') {
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(platLX, platY, platRX - platLX, 8);
      ctx.fillStyle = '#B8905A';
      ctx.fillRect(platLX, platY, platRX - platLX, 3);
    } else if (s.id === 'seijaku') {
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(platLX, platY, platRX - platLX, 8);
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(platLX, platY, platRX - platLX, 2);
    } else if (s.id === 'mahoujin') {
      // メイン足場
      ctx.fillStyle = '#2a1a3a';
      ctx.fillRect(platLX, platY, platRX - platLX, 6);
      ctx.strokeStyle = 'rgba(170, 120, 255, 0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(platLX, platY); ctx.lineTo(platRX, platY); ctx.stroke();
      // 中段左右
      const mw = (platRX - platLX) / 3;
      ctx.fillStyle = '#3a2050';
      ctx.fillRect(platLX + 10, platY - 28, mw, 4);
      ctx.fillRect(platRX - mw - 10, platY - 28, mw, 4);
      // 上段中央
      const tw = (platRX - platLX) / 4;
      ctx.fillRect(previewX + previewW / 2 - tw / 2, platY - 52, tw, 4);
    }

    ctx.restore(); // end clip

    // Stage name
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = sel ? '#FFF' : '#888';
    ctx.fillText(s.name, cx + cardW / 2, cy + 260 + bounce);

    // Description
    ctx.font = '16px sans-serif';
    ctx.fillStyle = sel ? '#AAA' : '#666';
    ctx.fillText(s.desc, cx + cardW / 2, cy + 295 + bounce);

    // Selection indicator
    if (sel) {
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#44AAFF';
      const indicatorAlpha = 0.5 + Math.sin(stageSelectTime * 0.008) * 0.3;
      ctx.globalAlpha = indicatorAlpha;
      ctx.fillText('▼', cx + cardW / 2, cy + bounce - 5);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // Footer
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.fillText('← → で選択  |  Enter で決定  |  ESC で戻る', 480, 560);
}

// Screen shake system
let screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };
function triggerScreenShake(intensity, duration) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
  screenShake.duration = Math.max(screenShake.duration, duration);
}
function updateScreenShake() {
  if (screenShake.duration > 0) {
    screenShake.duration--;
    const t = screenShake.duration > 0 ? screenShake.intensity * (screenShake.duration / 10) : 0;
    screenShake.x = (Math.random() - 0.5) * t * 2;
    screenShake.y = (Math.random() - 0.5) * t * 2;
    if (screenShake.duration <= 0) { screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0; }
  }
}

// === Web Audio API Sound Effects ===
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function makeNoise(ac, duration, volume) {
  const buf = ac.createBuffer(1, ac.sampleRate * duration, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(volume, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.connect(g); g.connect(ac.destination);
  return { src, gain: g };
}

function playHitSound(type) {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;

    if (type === 'normal') {
      // ① Short punch snap
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.08);
      // Click noise
      const n = makeNoise(ac, 0.03, 0.12);
      n.src.start(now); n.src.stop(now + 0.03);

    } else if (type === 'strong') {
      // ② Heavy thud - low bass + noise burst
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.18);
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.25);
      // Impact noise
      const n = makeNoise(ac, 0.08, 0.2);
      n.src.start(now); n.src.stop(now + 0.08);
      // Sub bass body
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(80, now);
      o2.frequency.exponentialRampToValueAtTime(30, now + 0.2);
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.22);

    } else if (type === 'special') {
      // ③ Flashy explosion - multi-layer

      const o = ac.createOscillator(); const g = ac.createGain();

      o.frequency.setValueAtTime(350, now);

let bgmPlaying = false;

const bgmMap = { 'sounds/bgm.mp3': bgmAudio, 'sounds/bgm2.mp3': bgm2Audio, 'sounds/bgm3.mp3': bgm3Audio };

function startBGM() {
  if (bgmPlaying) return;
  const stage = stages[selectedStage];
  currentBgmAudio = bgmMap[stage.bgmSrc] || bgmAudio;
  currentBgmAudio.currentTime = 0;
  currentBgmAudio.play().catch(() => {});
  bgmPlaying = true;
}

function stopBGM() {
  if (!bgmPlaying) return;
  currentBgmAudio.pause();
  currentBgmAudio.currentTime = 0;
  bgmPlaying = false;
}

let bgmFadeInterval = null;
const BGM_VOLUME = 0.4;
function fadeOutBGM(duration, callback) {
  if (bgmFadeInterval) clearInterval(bgmFadeInterval);
  if (!bgmPlaying) { if (callback) callback(); return; }
  const steps = Math.max(1, Math.floor(duration * 60));
  const dec = currentBgmAudio.volume / steps;
  let i = 0;
  bgmFadeInterval = setInterval(() => {
    i++;
    currentBgmAudio.volume = Math.max(0, currentBgmAudio.volume - dec);
    if (i >= steps) {
      clearInterval(bgmFadeInterval); bgmFadeInterval = null;
      currentBgmAudio.pause();
      if (callback) callback();
    }
  }, 1000 / 60);
}
function fadeInBGM(duration) {
  if (bgmFadeInterval) clearInterval(bgmFadeInterval);
  if (!bgmPlaying) return;
  currentBgmAudio.volume = 0;
  currentBgmAudio.play().catch(() => {});
  const steps = Math.max(1, Math.floor(duration * 60));
  const inc = BGM_VOLUME / steps;
  let i = 0;
  bgmFadeInterval = setInterval(() => {
    i++;
    currentBgmAudio.volume = Math.min(BGM_VOLUME, currentBgmAudio.volume + inc);
    if (i >= steps) { clearInterval(bgmFadeInterval); bgmFadeInterval = null; }
  }, 1000 / 60);
}

// === SE (攻撃ヒット・撃墜) ===
function playHitSE() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(200, now);
    o.frequency.exponentialRampToValueAtTime(50, now + 0.1);
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.1);
  } catch(e) {}
}

function playKOSE() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Deep boom
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(100, now);
    o.frequency.exponentialRampToValueAtTime(20, now + 0.6);
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.6);
    // Sub rumble
    const o2 = ac.createOscillator(); const g2 = ac.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(50, now);
    o2.frequency.exponentialRampToValueAtTime(15, now + 0.5);
    g2.gain.setValueAtTime(0.2, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now); o2.stop(now + 0.55);
    // Noise burst
    const n = makeNoise(ac, 0.2, 0.18);
    n.src.start(now); n.src.stop(now + 0.2);
  } catch(e) {}
}

function addCmdInput(playerId, dir) {
  // キーリピート防止: 直前と同じ方向の連続入力は無視
  const buf = cmdInputBuffers[playerId];
  if (buf.length > 0 && buf[buf.length - 1] === dir && cmdInputFrames[playerId].length > 0 && cmdFrameCounter - cmdInputFrames[playerId][cmdInputFrames[playerId].length - 1] < 3) return;
  cmdInputBuffers[playerId].push(dir);
  cmdInputFrames[playerId].push(cmdFrameCounter);
  // 古いエントリを削除（フレームベース）
  while (cmdInputFrames[playerId].length > 0 && cmdFrameCounter - cmdInputFrames[playerId][0] > CMD_INPUT_WINDOW) {
    cmdInputBuffers[playerId].shift();
    cmdInputFrames[playerId].shift();
  }
}

function checkCommandInput(player) {
  const pid = player.id;
  const buf = cmdInputBuffers[pid];
  const frames = cmdInputFrames[pid];
  // 古いエントリをZ押下時にも削除
  while (frames.length > 0 && cmdFrameCounter - frames[0] > CMD_INPUT_WINDOW) {
    buf.shift();
    frames.shift();
  }
  if (buf.length < 4) return null;
  // 天才: ドラゴンモード時は別のcommandDefsを使用
  const cmds = (player.charIdx === 10 && player.dragonMode) ? dragonCommandDefs : commandDefs[player.charIdx];
  if (!cmds) return null;

  for (const cmd of cmds) {
    if (player['cd_' + cmd.cooldownKey] > 0) continue;
    const seq = cmd.seq;
    // 部分列マッチング: バッファ内にシーケンスが順番通りに含まれているか
    let seqIdx = 0;
    for (let i = 0; i < buf.length && seqIdx < seq.length; i++) {
      let expected = seq[seqIdx];
      if (expected === 'F') expected = player.facingLeft ? 'L' : 'R';
      else if (expected === 'B') expected = player.facingLeft ? 'R' : 'L';
      if (buf[i] === expected) seqIdx++;
    }
    if (seqIdx === seq.length) {
      // Clear buffer on success
      cmdInputBuffers[pid] = [];
      cmdInputFrames[pid] = [];
      return cmd;
    }
  }
  return null;
}

function executeCommand(player, cmd) {
  if (player.attacking || player.hitstun > 0 || !player.alive || player.grabbing || player.grabbed || player.guarding || player.guardBreakStun > 0) return false;

  const atk = cmd.attack;
  player.attacking = true;
  player.attackType = 'command';
  player.attackFrame = 0;
  player.attackData = atk;
  player.hitTargets = [];
  player.lastHitFrame = -99;
  player.specialState = null;
  player['cd_' + cmd.cooldownKey] = CMD_COOLDOWN;

  // Command activation sound
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const o1 = ac.createOscillator();
    const g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(400, now);
    o1.frequency.exponentialRampToValueAtTime(900, now + 0.08);
    o1.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    g1.gain.setValueAtTime(0.12, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.2);
    // Accent tone
    const o2 = ac.createOscillator();
    const g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(800, now + 0.03);
    o2.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    g2.gain.setValueAtTime(0.06, now + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.03); o2.stop(now + 0.15);
  } catch(e) {}

  // Show command name (コミック風フォント演出)
  const ch = characters[player.charIdx];
  cmdNameDisplay.push({
    text: cmd.name, x: player.x, y: player.y - 120,
    life: 60, maxLife: 60, color: ch.accent,
  });

  // Flash effect
  hitEffects.push({ x: player.x, y: player.y - 40, life: 15, maxLife: 15, color: '#FFFFFF', size: 50 });

  // ② 虹色オーラ
  specialAura.push({ playerId: player.id, life: 45, maxLife: 45 });

  // ⑤ 背景カラフルフラッシュ
  cmdFlash.alpha = 0.3;
  cmdFlash.color = ch.accent;

  // ⑤ キャラクター一瞬大きくなる演出
  cmdScaleEffect.playerId = player.id;
  cmdScaleEffect.life = 12;

  // ② 画面シェイク
  triggerScreenShake(4, 8);

  return true;
}

// Scale dragon attacks too
(function scaleDragonAtks() {
  const factor = 1 / 1.68;
  const dmgFactor = 0.6;
  for (const type in dragonAttackDefs) {
    if (type === 'throwDmg') { dragonAttackDefs[type] = Math.round(dragonAttackDefs[type] * dmgFactor); continue; }
    const atk = dragonAttackDefs[type];
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    atk.damage = Math.round(atk.damage * dmgFactor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * dmgFactor * 10) / 10;
  }
})();

// --- Speed up attacks to 168% of original (frames × 0.595) ---
(function scaleAttackSpeeds() {
  const factor = 1 / 1.68;
  function scaleAtk(atk) {
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    if (atk.slamActive) atk.slamActive = Math.max(1, Math.round(atk.slamActive * factor));
    if (atk.hitInterval) atk.hitInterval = Math.max(1, Math.round(atk.hitInterval * factor));
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') continue;
      scaleAtk(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleAtk(cmd.attack);
    }
  }
})();

// --- Reduce all damage to 60% ---
(function scaleDamage() {
  const factor = 0.6;
  function scaleDmg(atk) {
    atk.damage = Math.round(atk.damage * factor * 10) / 10;
    if (atk.finalDamage) atk.finalDamage = Math.round(atk.finalDamage * factor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * factor * 10) / 10;
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') { defs[type] = Math.round(defs[type] * factor); continue; }
      scaleDmg(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleDmg(cmd.attack);
    }
  }
})();

    consecutiveHits: 0,      // 連続ヒット数（おんぱ・とっこ用）
    dosbossComboCount: 0,    // ドスボス連続ランダム必殺技カウント
  };
}

  koDisplay = { active: false, life: 0, maxLife: 90, playerIdx: -1 };
  cmdFlash = { alpha: 0, color: '#FFFFFF' };
  cmdScaleEffect = { playerId: -1, life: 0 };
  hitStopFrames = 0;

  stockLossAnim = { active: false, playerId: -1, life: 0, maxLife: 30, x: 0, y: 0 };
  cmdInputBuffers[0] = []; cmdInputBuffers[1] = [];
  cmdInputFrames[0] = []; cmdInputFrames[1] = [];

// --- Knockback calculation ---
function calcKnockback(damage, kbBase, kbScale) {
  // Smash-style scaling: low damage = barely moves, high damage = flies far
  // 0%: base only, 50%: ×1.25, 100%: ×1.5, 150%: ×1.85, 200%+: ×2.3+
  const ratio = damage / 100;
  const damageMultiplier = 1 + ratio * 0.5 + Math.max(0, ratio - 1) * 0.3;
  return (kbBase + damage * kbScale) * damageMultiplier;
}

function applyHit(attacker, target, damage, kbBase, kbScale, kbAngle, hitType) {
  if (target.invincibleTimer > 0 || target.airDodgeTimer > 0) return;
  // hitType: 'normal', 'strong', 'special', 'cmd', 'aerial', 'down', 'projectile'
  if (!hitType) hitType = 'normal';

  // Guard check
  if (target.guarding) {
    // Just Guard: complete invincibility + stagger attacker
    if (target.justGuardTimer > 0) {
      // Just Guard success!
      hitEffects.push({
        x: target.x, y: target.y - 40,
        life: 20, maxLife: 20,
        color: '#FFFFFF', size: 50
      });
      playHitSound('justGuard');
      // Stagger attacker
      if (attacker.id !== undefined) {
        const realAttacker = players.find(pp => pp.id === attacker.id);
        if (realAttacker) {
          realAttacker.hitstun = JUST_GUARD_STAGGER;
          realAttacker.attacking = false;
          realAttacker.specialState = null;
          realAttacker.attackFrame = 0;
          const pushDir = realAttacker.x < target.x ? -1 : 1;
          realAttacker.vx = pushDir * 6;
        }
      }
      return;
    }

    // Normal Guard: 80% damage reduction, reduced knockback, lose durability
    // パッシブ: ジャッジマン(9) ガード強化 ガード中被ダメ-15%
    const gci = target.charIdx;
    const guardPassive = gci === 6 ? 0.2 : (gci === 9 ? 0.85 : (gci === 5 ? 0.85 : 1.0)); // 熊太郎: 90%カット(0.2)
    const reducedDamage = damage * GUARD_DAMAGE_REDUCTION * guardPassive;
    // シャうでん(8): ガード成功でゲージ+5%
    if (gci === 8 && target.ultimateGauge !== undefined) target.ultimateGauge = Math.min(100, target.ultimateGauge + 5);
    target.damage = Math.min(999, target.damage + reducedDamage);
    target.guardDurability -= damage * GUARD_DURABILITY_COST;
    // Small pushback
    const dir = attacker.x < target.x ? 1 : -1;
    target.vx = dir * 3;
    playHitSound('guard');
    // Guard break check
    if (target.guardDurability <= 0) {
      target.guardDurability = 0;
      target.guarding = false;
      target.guardBreakStun = GUARD_BREAK_STUN;
      hitEffects.push({
        x: target.x, y: target.y - 40,
        life: 25, maxLife: 25,
        color: '#FF6600', size: 60
      });
      playHitSound('guardBreak');
      triggerScreenShake(6, 15);
    } else {
      // Guard hit effect (shield spark)
      hitEffects.push({
        x: target.x + (attacker.x < target.x ? -20 : 20), y: target.y - 35,
        life: 8, maxLife: 8,
        color: '#44DDFF', size: 20
      });
    }
    // ガードフレームデータ: 攻撃側に硬直ペナルティ
    const penaltyType = hitType === 'smash' ? 'smash' : (hitType || 'normal');
    const penalty = GUARD_PENALTY[penaltyType] || GUARD_PENALTY.normal;
    if (attacker.id !== undefined) {
      const realAtk = players.find(pp => pp.id === attacker.id);
      if (realAtk) {
        realAtk.guardPenalty = penalty;
        realAtk.attacking = false;
        realAtk.specialState = null;
      }
    }
    return;
  }

  // サム空中攻撃補正: 空中時1.3倍ダメージ
  let finalDamage = damage;
  if (attacker.charIdx === 15 && !attacker.grounded) {
    finalDamage *= 1.3;
  }
  // パッシブ: メテオ(3) 空中攻撃強化 +10%
  if (attacker.charIdx === 3 && !attacker.grounded && (hitType === 'aerial' || hitType === 'downair')) {
    finalDamage *= 1.1;
  }
  // パッシブ: とっこ(14) 初段強化 +15%（コンボ外の最初の一撃）
  if (attacker.charIdx === 14 && attacker.comboWindow <= 0) {
    finalDamage *= 1.15;
  }
  // パッシブ: バレット(7) 飛び道具強化 +15%
  if (attacker.charIdx === 7 && hitType === 'projectile') {
    finalDamage *= 1.15;
  }
  // パッシブ: ゼン(0) コンボ補正緩和 コンボ中ダメージ減衰10%少ない
  if (attacker.charIdx === 0 && attacker.comboWindow > 0) {
    finalDamage *= 1.1;
  }
  // セン: 満腹パワーバフ中は1.3倍ダメージ
  if (attacker.charIdx === 18 && attacker.senBuffTimer > 0) {
    finalDamage *= 1.3;
  }
  // キングコンボ補正: Z×3→X(1.5倍)→C(2倍)
  if (attacker.charIdx === 16) {
    const ap = attacker;
    if (ap.kingComboTimer > 0) {
      if (hitType === 'normal' && ap.kingComboHits < 3) {
        ap.kingComboHits++;
        ap.kingComboTimer = 15;
        // コンボ継続中の金色フラッシュ（段数で大きくなる）
        hitEffects.push({ x: target.x, y: target.y - 35, life: 8, maxLife: 8, color: '#FFD700', size: 15 + ap.kingComboHits * 8 });
      } else if (hitType === 'strong' && ap.kingComboHits >= 3) {
        finalDamage *= 1.5;
        ap.kingComboHits = 4;
        ap.kingComboTimer = 15;
        hitEffects.push({ x: target.x, y: target.y - 35, life: 12, maxLife: 12, color: '#FFD700', size: 50 });
      } else if (hitType === 'special' && ap.kingComboHits >= 4) {
        // フルコンボ: Z→Z→Z→X→C = 2.2倍ダメージ + 衝撃波リング + 画面フラッシュ（パッシブ+10%込み）
        finalDamage *= 2.2;
        ap.kingComboHits = 0;
        ap.kingComboTimer = 0;
        hitEffects.push({ x: target.x, y: target.y - 35, life: 15, maxLife: 15, color: '#FFFFFF', size: 80 });
        hitEffects.push({ x: target.x, y: target.y - 35, life: 15, maxLife: 15, color: '#FFD700', size: 120, type: 'ring' });
        hitFlash.alpha = 0.4;
        hitFlash.color = '#FFD700';
        triggerScreenShake(8, 15);
      } else {
        ap.kingComboHits = hitType === 'normal' ? 1 : 0;
        ap.kingComboTimer = hitType === 'normal' ? 15 : 0;
      }
    } else {
      // コンボ開始: 通常攻撃のみ起点になる
      if (hitType === 'normal') {
        ap.kingComboHits = 1;
        ap.kingComboTimer = 15;
      }
    }
  }
  // バレット近距離弱体化: 近距離（80px以内）で与ダメ20%、被ダメ1.5倍
  let finalKbScale = kbScale;
  const dist = Math.abs(attacker.x - target.x);
  const CLOSE_RANGE = 80;
  if (attacker.charIdx === 7 && hitType !== 'projectile' && dist < CLOSE_RANGE) {
    finalDamage *= 0.2;
    finalKbScale *= 0.2;
  }
  if (target.charIdx === 7 && dist < CLOSE_RANGE) {
    finalDamage *= 1.5;
    finalKbScale *= 1.3;
  }

  // ディフェンス補正: defense値が高いほど被ダメージ軽減 (defense 1=1.25倍, 3=1.0倍, 5=0.8倍)
  const targetDef = characters[target.charIdx] ? characters[target.charIdx].stats.defense : 3;
  const defMultiplier = 1.15 - targetDef * 0.07;
  finalDamage *= defMultiplier;
  // パッシブ: うる男(5) 防御強化 被ダメ-10%
  if (target.charIdx === 5) finalDamage *= 0.9;
  // パッシブ: タンク(12) 装甲 被ダメ-15%
  if (target.charIdx === 12) finalDamage *= 0.85;
  // D技バフ: 被ダメ減少
  if (target.dSkillBuff === 'ironWall') finalDamage *= 0.5;     // うる男 鉄壁
  if (target.dSkillBuff === 'fortress') finalDamage *= 0.3;     // タンク 要塞化
  if (target.dSkillBuff === 'killIntent') finalDamage *= 1.2;   // とっこ 被ダメ1.2倍
  // D技バフ: 与ダメ増加
  if (attacker.dSkillBuff === 'tensaiBoost') finalDamage *= 1.5; // 天才 覚醒
  if (attacker.charIdx === 10 && attacker.dragonMode) finalDamage *= 1.5; // 天才 ドラゴンモード攻撃力1.5倍
  if (attacker.bossBuffed) finalDamage *= 1.3; // ボスラッシュ: ボス攻撃力1.3倍（1.6→1.3）
  if (attacker.dSkillBuff === 'killIntent') finalDamage *= 1.5;  // とっこ 殺意
  if (attacker.dSkillBuff === 'fortress') finalDamage *= 1.5;    // タンク 要塞化
  if (attacker.dSkillBuff === 'microStar') finalDamage *= 1.3;  // マイクロ スター変身
  if (attacker.dSkillBuff === 'satoruHaki') finalDamage *= 1.3; // サトル 海王類の覇気
  if (attacker.dSkillBuff === 'kowaiStealth') finalDamage *= 1.5; // 怖 口裂け変身
  if (attacker.dSkillBuff === 'poyoSuper') finalDamage *= 1.5;  // ぽよ スーパースライム
  // D技: メテオ 燃焼拳（1回消費）
  if (attacker.dSkillBuff === 'burnFist') { finalDamage += 5; attacker.dSkillActive = false; attacker.dSkillBuff = null; }
  // D技: 熊太郎 熊の怒り（投げ以外では消費しない→投げ側で処理）

  // --- 自己バフ（攻撃側・与ダメ補正） ---
  const aci = attacker.charIdx;
  if (aci === 0 && attacker.damage >= 50) finalDamage *= 1.2;         // ゼン「集中」
  if (aci === 1 && attacker.stocks === 1) finalDamage *= 1.3;         // ドン「激怒」
  if (aci === 2 && attacker.dashing) finalDamage *= 1.15;             // サイソク「加速」
  if (aci === 3 && attacker.autoBuff > 0) finalDamage *= 1.2;         // メテオ「炎上」
  if (aci === 6 && attacker.autoBuff > 0) finalDamage *= 1.15;        // 熊太郎「怒り」
  if (aci === 9 && target.damage > attacker.damage) finalDamage *= 1.15; // ジャッジマン「公正」
  if (aci === 16 && target.damage < 50) finalDamage *= 1.15;          // キング「威圧」
  if (aci === 20 && attacker.autoBuff > 0) finalDamage *= 1.1;        // マイクロ「スター」
  if (aci === 22 && attacker.kingkingArmorTimer > 0) finalDamage *= 1.4; // 金金「お金の鎧」攻撃力
  if (aci === 21 && attacker.autoBuff > 0) finalDamage *= 1.2;        // ミスターツー「念力増幅」
  // --- 自己バフ（防御側・被ダメ補正） ---
  const tci = target.charIdx;
  if (tci === 1 && target.stocks === 1) finalDamage *= 1.1;           // ドン「激怒」被ダメ増
  if (tci === 12 && target.grounded) finalDamage *= 0.9;              // タンク「装甲」地上
  if (tci === 18 && target.senBuffTimer > 0) finalDamage *= 0.9;      // セン「満腹」バフ中
  if (tci === 22 && target.kingkingArmorTimer > 0) finalDamage *= 0.7; // 金金「お金の鎧」被ダメ
  // 恐怖状態: 攻撃力0.8倍
  if (attacker.fearTimer > 0) finalDamage *= 0.8;
  // === 固有パッシブ（攻撃側） ===
  const aci2 = attacker.charIdx;
  // ゼン(0): 凍結相手へ1.3倍
  if (aci2 === 0 && target.frozen > 0) finalDamage *= 1.3;
  // サイソク(2): ダッシュ攻撃1.2倍
  if (aci2 === 2 && attacker.dashing) finalDamage *= 1.2;
  // ロング(4): 距離でダメージ変動
  if (aci2 === 4) {
    const d4 = Math.abs(target.x - attacker.x);
    if (d4 > 150) finalDamage *= 1.1;
    else if (d4 < 50) finalDamage *= 0.8;
  }
  // うる男(5): 怒り中1.3倍
  if (aci2 === 5 && attacker.rageActive) finalDamage *= 1.3;
  // シャうでん(8): 感電相手へ1.3倍
  if (aci2 === 8 && target.stunned > 0) finalDamage *= 1.3;
  // ジャッジマン(9): 相手ダメージに応じてアップ
  if (aci2 === 9) finalDamage *= 1 + Math.min(0.3, target.damage * 0.002);
  // 波おじ(13): コンボ補正
  if (aci2 === 13 && attacker.comboWindow > 0) {
    attacker.comboCount = (attacker.comboCount || 0) + 1;
    if (attacker.comboCount >= 6) finalDamage *= 1.15;
    else if (attacker.comboCount >= 5) finalDamage *= 1.1;
    else if (attacker.comboCount >= 4) finalDamage *= 1.05;
  } else if (aci2 === 13) { attacker.comboCount = 1; }
  // とっこ(14): 全攻撃に毒付与
  if (aci2 === 14) target.poisoned = Math.max(target.poisoned || 0, 120);
  // セン(18): 逆境強化
  if (aci2 === 18) finalDamage *= 1 + Math.min(0.2, attacker.damage * 0.0013);
  // === 固有パッシブ（防御側） ===
  // うる男(5): 怒り中被ダメ0.8倍
  if (tci === 5 && target.rageActive) finalDamage *= 0.8;
  // うる男(5): 怒りゲージ蓄積
  if (tci === 5) target.rageGauge = Math.min(100, (target.rageGauge || 0) + Math.ceil(finalDamage * 0.8));
  // ドスボス(19): ガード中85%カット
  if (tci === 19 && target.guarding) finalDamage *= 0.15;

  target.damage = Math.min(999, target.damage + finalDamage);
  // 必殺技ゲージ蓄積
  if (attacker.ultimateGauge !== undefined) attacker.ultimateGauge = Math.min(100, attacker.ultimateGauge + 3);
  if (target.ultimateGauge !== undefined) target.ultimateGauge = Math.min(100, target.ultimateGauge + 5 + (target.damage >= 50 ? 2 : 0));
  playHitSE();
  const kb = calcKnockback(target.damage, kbBase, finalKbScale);
  // 体重補正: weight が大きいほど吹っ飛びにくい (weight 0.7=1.43倍, 1.0=1.0倍, 1.5=0.67倍)
  const targetWeight = characters[target.charIdx] ? characters[target.charIdx].weight : 1.0;
  let weightedKb = kb / targetWeight;
  // パッシブ: ドン(1) 重量強化 吹っ飛び-10%
  if (target.charIdx === 1) weightedKb *= 0.9;
  // パッシブ: おんぱ(17) ノックバック強化 全KB+10%
  if (attacker.charIdx === 17) weightedKb *= 1.1;
  // パッシブ: 波おじ(13) コンボ強化 コンボ最終ヒットKB+15%
  if (attacker.charIdx === 13 && attacker.comboWindow > 0 && attacker.cancelWindow <= 0) weightedKb *= 1.15;
  // 自己バフ: 波おじ「根性」ダメージ100%以上でKB耐性1.2倍
  if (target.charIdx === 13 && target.damage >= 100) weightedKb *= (1 / 1.2);
  // ドラゴンモード: ノックバック耐性1.35倍
  if (target.charIdx === 10 && target.dragonMode) weightedKb *= (1 / 1.35);
  // タンク(12): 常時KB耐性+10%
  if (target.charIdx === 12) weightedKb *= 0.9;
  // サトル(23): 空中回避直後のカウンター+20%
  if (attacker.charIdx === 23 && attacker.airDodgeEndlag > 0) weightedKb *= 1.2;
  // ボスラッシュ: ボスKB耐性1.25倍
  if (target.bossBuffed) weightedKb *= (1 / 1.25);
  // 自己バフ: おんぱ「共鳴」連続ヒットでKB増加
  if (attacker.charIdx === 17 && attacker.consecutiveHits > 0) weightedKb *= (1 + Math.min(attacker.consecutiveHits * 0.05, 0.25));
  // ドラゴンモード: 横スマッシュKB1.2倍
  if (attacker.charIdx === 10 && attacker.dragonMode && hitType === 'smash') weightedKb *= 1.2;
  // 崖外復帰阻止ボーナス: ステージ外の相手には1.3倍KB
  if (target.x < STAGE_LEFT - 30 || target.x > STAGE_RIGHT + 30) weightedKb *= 1.3;
  // --- ノックバック角度補正 ---
  let finalAngle = kbAngle;
  // 全キャラ共通の角度設定（hitTypeベース）
  const isAir = attacker.grounded !== undefined ? !attacker.grounded : false;
  if (hitType === 'normal') finalAngle = isAir ? -45 : -35;
  else if (hitType === 'strong') finalAngle = isAir ? -60 : -50;
  else if (hitType === 'special') finalAngle = isAir ? -65 : -55;
  else if (hitType === 'aerial') finalAngle = -45;
  else if (hitType === 'downair') finalAngle = 90; // スパイク（真下）
  else if (hitType === 'up') finalAngle = -85;
  else if (hitType === 'side') finalAngle = -30;
  else if (hitType === 'down') finalAngle = 90; // 真下
  else if (hitType === 'dash') finalAngle = -25;
  else if (hitType === 'cmd') finalAngle = kbAngle; // コマンド技は定義値を維持
  else if (hitType === 'projectile') finalAngle = kbAngle; // 飛び道具も定義値維持
  // キャラ別特殊角度
  if (aci === 0 && hitType === 'side') finalAngle = -40;        // ゼン: 横攻撃を少し浮かせる
  if (aci === 1 && hitType !== 'cmd' && hitType !== 'projectile') finalAngle -= 5; // ドン: 全技5度上補正
  if (aci === 2 && hitType === 'side') finalAngle = -20;        // サイソク: 低く鋭く
  if (aci === 12 && hitType !== 'cmd' && hitType !== 'projectile') finalAngle += 5; // タンク: 5度下補正
  if (aci === 15 && isAir) finalAngle = -70;                    // サム: 空中攻撃で高く浮かせる
  if (aci === 17 && hitType !== 'cmd' && hitType !== 'projectile') { // おんぱ: 放射状
    const dx = target.x - attacker.x;
    const dy = (target.y - 35) - (attacker.y !== undefined ? attacker.y - 35 : target.y - 35);
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) finalAngle = Math.atan2(dy, Math.abs(dx)) * 180 / Math.PI;
  }
  const rad = finalAngle * Math.PI / 180;
  const dir = attacker.x < target.x ? 1 : -1;
  target.vx = Math.cos(rad) * weightedKb * dir;
  target.vy = Math.sin(rad) * weightedKb;
  // ベク変用: 吹っ飛び初速を記録
  target.diFrame = 0;
  target.diBaseVx = target.vx;
  target.diBaseVy = target.vy;
  // コンボ継続中はヒットストップ追加（追撃しやすくする）
  const comboBonus = (attacker.comboWindow > 0) ? 4 : 0;
  target.hitstun = Math.floor(8 + target.damage * 0.12) + comboBonus;
  target.damageTint = 12;

  // ① キャンセルウィンドウ: ヒット確認後10F以内にキャンセル可能
  if (attacker.id !== undefined) {
    const realAttacker = players.find(pp => pp.id === attacker.id);
    if (realAttacker) {
      realAttacker.cancelWindow = 10;
      realAttacker.comboWindow = 20;
    }
  }
  // ③ 空中コンボ: 空中の相手は落下速度低下で追撃しやすい
  if (!target.grounded) {
    target.airComboTimer = 20;
  }

  // --- 自己バフトリガー（ヒット成功時） ---
  if (attacker.charIdx === 3 && (hitType === 'special' || hitType === 'cmd')) {
    attacker.autoBuff = 180; attacker.autoBuffType = 'meteoFlame'; // メテオ「炎上」3秒
  }
  if (attacker.charIdx === 17) attacker.consecutiveHits++;  // おんぱ「共鳴」カウント
  if (attacker.charIdx === 14) attacker.consecutiveHits++;  // とっこ「殺気」カウント

  // ムッシー: 毒付与
  if (attacker.charIdx === 28) {
    const atkData3 = attacker.attackData;
    if (atkData3 && atkData3.mussyPoison) {

      life: 35, maxLife: 35,
      color: COMIC_COLORS[ci], bgColor: COMIC_COLORS[(ci + 4) % COMIC_COLORS.length],
      size: isSpecial ? 24 : isStrong ? 20 : 14,
      rotation: (Math.random() - 0.5) * 0.4,
    });
  }

  // ① カラフルな星・ハート・稲妻パーティクル
  if (kb > 3) {
    const decorCount = isSpecial ? 8 : isStrong ? 5 : 3;
    for (let i = 0; i < decorCount; i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = 3 + Math.random() * 5;
      sparks.push({
        x: hx, y: hy, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 2,

        color: ['#FF4444','#FFDD00','#44AAFF','#FF66AA','#44FF88'][i % 5],
        size: 5 + Math.random() * 4,
        type: ['star','heart','bolt'][i % 3],
        gravity: 0.1, drag: 0.97,
        spin: (Math.random() - 0.5) * 0.3, angle: Math.random() * Math.PI * 2,
      });
    }
  }

  // ③ スピードライン（吹っ飛び時 - 画面を走る）
  if (kb > 5) {
    const lineCount = Math.min(18, 6 + Math.floor(kb * 0.8));
    for (let i = 0; i < lineCount; i++) {
      speedLines.push({
        x: target.x, y: target.y - 35,
        angle: Math.atan2(target.vy, target.vx) + (Math.random() - 0.5) * 0.8,
        length: 80 + Math.random() * 200 + kb * 5,
        life: 15 + Math.floor(Math.random() * 10),
        maxLife: 25,
        color: i % 3 === 0 ? '#FFFFFF' : i % 3 === 1 ? charColor : COMIC_COLORS[i % COMIC_COLORS.length],
        width: 1.5 + Math.random() * 3,
      });
    }
    // Full-screen radial speed lines for strong knockback
    if (kb > 10) {
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2 + Math.random() * 0.3;
        speedLines.push({
          x: 480, y: 320,
          angle: a,
          length: 300 + Math.random() * 200,
          life: 10 + Math.floor(Math.random() * 8),
          maxLife: 18,
          color: i % 2 === 0 ? 'rgba(255,255,255,0.5)' : charColor,
          width: 1 + Math.random() * 1.5,
        });
      }
    }
  }

  // ② 必殺技ヒット時の画面フラッシュ
  if (isSpecial) {
    hitFlash.alpha = Math.max(hitFlash.alpha, 0.2);
    hitFlash.color = charColor;
  }

  // ③ 炎の軌跡（200%超え）
  if (target.damage > 200 && kb > 4) {
    for (let i = 0; i < 6; i++) {
      fireTrails.push({
        x: target.x + (Math.random() - 0.5) * 15,
        y: target.y - 35 + (Math.random() - 0.5) * 15,
        vx: target.vx * 0.3 + (Math.random() - 0.5) * 2,
        vy: target.vy * 0.3 - Math.random() * 2,
        life: 20 + Math.floor(Math.random() * 15),
        maxLife: 35,
        size: 4 + Math.random() * 6,
      });
    }
  }
}

// --- Hitbox collision ---
function hitboxCollides(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

];
function getAttackHitbox(p, atk) {
  const dir = p.facingLeft ? -1 : 1;
  const r = CHAR_REACH[p.charIdx] || [1,1,1,1];
  // 攻撃タイプに応じたリーチ倍率を選択
  const at = p.attackType || '';
  let wMult, hMult;
  if (at === 'up' || at === 'upSmash') { wMult = 1.0; hMult = r[2]; }
  else if (at === 'down' || at === 'downSmash' || at === 'downair') { wMult = 1.0; hMult = r[3]; }
  else if (at === 'side' || at === 'sideSmash' || at === 'dash' || at === 'aerial' || at === 'strong') { wMult = r[1]; hMult = 1.0; }
  else { wMult = r[0]; hMult = 1.0; } // normal, command等
  const cx = p.x + atk.hx * dir * wMult;
  const hw = atk.hw * wMult;
  const hx = dir > 0 ? cx : cx - hw;
  return { x: hx, y: p.y + atk.hy, w: hw, h: atk.hh * hMult };
}

// --- Projectile spawning ---
function spawnProjectile(p, projDef) {
  const dir = p.facingLeft ? -1 : 1;
  let vx, vy;
  if (projDef.dirAngle !== undefined) {
    const rad = projDef.dirAngle * Math.PI / 180;
    vx = Math.cos(rad) * projDef.speed * dir;
    vy = Math.sin(rad) * projDef.speed;
  } else {
    vx = projDef.speed * dir;
    vy = 0;
  }
  projectiles.push({
    x: p.x + 30 * dir, y: p.y - 40,
    vx, vy,
    w: projDef.w, h: projDef.h,
    damage: projDef.damage, kbBase: projDef.kbBase, kbScale: projDef.kbScale, kbAngle: projDef.kbAngle,
    life: projDef.life, ownerId: p.id,
    color: projDef.color, pcolor: projDef.pcolor,
    shape: projDef.shape || 'rect',
    ownerCharIdx: p.charIdx,
    time: 0,
    homing: projDef.homing || false,
    pierce: projDef.pierce || false,
    ink: projDef.ink || false,
    meshitero: !!(p.attackData && p.attackData.meshitero),
    gravityDebuff: !!(p.attackData && p.attackData.gravityDebuff),
    hitTargets: [],
  });
}

// --- Start attack ---
// ① キャンセル攻撃: 攻撃中でもヒット確認後にキャンセルして次の技に繋ぐ
function tryCancelAttack(p, type) {
  if (p.cancelWindow <= 0 || !p.attacking) return false;
  const from = p.attackType;
  // Z(normal/aerial/side/up/down/downair/dash)→X(strong), X(strong)→C(special) のみ許可
  const canCancel = (from !== 'strong' && from !== 'special' && from !== 'command' && type === 'strong')
                 || (from === 'strong' && type === 'special');
  if (!canCancel) return false;
  // キャンセル実行: 現在の攻撃を中断して新しい攻撃開始
  p.attacking = false;
  p.specialState = null;
  p.cancelWindow = 0;
  startAttack(p, type);
  return p.attacking; // startAttack が成功したか
}

function startAttack(p, type) {
  if (p.attacking || p.hitstun > 0 || !p.alive || p.grabbing || p.grabbed || p.guarding || p.guardBreakStun > 0) return;

  // Meteor only: strong attack locked until landing after use
  if (type === 'strong' && p.charIdx === 3 && p.strongLocked) return;

  // 波おじ: 空中強攻撃は最大2回まで
  if (type === 'strong' && p.charIdx === 13 && !p.grounded) {
    if (p.airStrongCount >= 2) return;
    p.airStrongCount++;
  }

  // バレット: スナイパー（必殺技）クールダウン5秒
  if (type === 'special' && p.charIdx === 7 && p.sniperCooldown > 0) return;

  // Context-sensitive attack type
  // 天才: ドラゴンモード時は別のattackDefsを使用
  const defs = (p.charIdx === 10 && p.dragonMode) ? dragonAttackDefs : attackDefs[p.charIdx];
  let actualType = type;
  // downair は空中専用
  if (type === 'downair' && p.grounded) return;

  const atk = defs[actualType];
  if (!atk) return;

  // Meteor only: lock strong attack until landing after use
  if (actualType === 'strong' && p.charIdx === 3) {
    p.strongLocked = true;
  }

  // バレット: スナイパー使用時にクールダウン設定（5秒 = 300フレーム）
  if (actualType === 'special' && p.charIdx === 7) {
    p.sniperCooldown = 300;
  }

  p.attacking = true;
  p.attackType = actualType;
  p.attackFrame = 0;
  p.attackData = atk;
  p.hitTargets = [];
  p.lastHitFrame = -99;
  p.specialState = null;

  // Swing sound
  try {
    const ac = getAudioCtx();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    const now = ac.currentTime;
    if (actualType === 'strong' || actualType === 'special') {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, now);
      o.frequency.exponentialRampToValueAtTime(100, now + 0.08);
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    } else {
      o.type = 'triangle';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(200, now + 0.04);
      g.gain.setValueAtTime(0.04, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    }
    o.start(now); o.stop(now + 0.12);
  } catch(e) {}
}

// --- Grab / Throw ---
function releaseGrab(grabber) {
  if (grabber.grabTarget !== null) {
    const target = players.find(pp => pp.id === grabber.grabTarget);
    if (target) {
      target.grabbed = false;
      target.grabbedBy = null;
      target.throwTechWindow = 0;
    }
  }
  grabber.grabbing = false;
  grabber.grabTarget = null;
  grabber.grabTimer = 0;
  grabber.throwPhase = 0;
  grabber.throwPhaseTimer = 0;
}

function tryGrab(p) {
  if (p.attacking || p.hitstun > 0 || !p.alive || p.grabbing || p.grabbed || !p.grounded) return;
  if (p.throwCooldown > 0) return;
  for (const target of players) {
    if (target.id === p.id || !target.alive || target.invincibleTimer > 0 || target.airDodgeTimer > 0 || target.grabbed) continue;
    // 投げ無敵中はスキップ
    if (target.throwImmuneTimer > 0) continue;
    const dist = Math.abs(p.x - target.x);
    if (dist < GRAB_RANGE) {
      // Grab! ガード中でも投げ成立（ガード崩し）
      playHitSound('grab');
      p.grabbing = true;
      p.grabTarget = target.id;
      p.grabTimer = 0;
      p.attacking = false;
      p.throwPhase = 1; // 掴みフェーズ開始
      p.throwPhaseTimer = getGrabFrames(p.charIdx) + getGrabDurationBonus(target.damage);
      target.grabbed = true;
      target.grabbedBy = p.id;
      target.hitstun = 0;
      target.attacking = false;
      target.specialState = null;
      target.guarding = false; // ガード崩し
      target.vx = 0; target.vy = 0;
      target.throwTechWindow = THROW_TECH_WINDOW; // 投げ抜け受付開始
      // Face each other
      p.facingLeft = target.x < p.x;
      // 白いフラッシュエフェクト
      hitEffects.push({ x: (p.x + target.x) / 2, y: p.y - 40, life: 10, maxLife: 10, color: '#FFFFFF', size: 30 });
      return;
    }
  }
}

function throwTech(grabber, target) {
  // 投げ抜け成功: 両者少し離れる
  const pushDir = grabber.x < target.x ? -1 : 1;
  grabber.vx = pushDir * 5;
  target.vx = -pushDir * 5;
  grabber.vy = -3;
  target.vy = -3;
  target.throwImmuneTimer = THROW_IMMUNE_FRAMES;
  grabber.throwCooldown = 20;
  // 「TECH!」テキスト表示
  cmdNameDisplay.push({ text: 'TECH!', x: (grabber.x + target.x) / 2, y: Math.min(grabber.y, target.y) - 80, life: 50, maxLife: 50, color: '#00FFAA' });
  hitEffects.push({ x: (grabber.x + target.x) / 2, y: target.y - 40, life: 12, maxLife: 12, color: '#00FFAA', size: 40 });
  playHitSound('justGuard');
  releaseGrab(grabber);
}

function startThrowExec(grabber, dirX, dirY) {
  // 掴みフェーズ→投げ実行フェーズへ移行
  grabber.throwPhase = 2;
  grabber.throwPhaseTimer = THROW_EXEC_FRAMES;
  grabber.throwDir = { x: dirX, y: dirY };
}

function executeThrow(grabber, dirX, dirY) {
  const target = players.find(pp => pp.id === grabber.grabTarget);
  if (!target) { releaseGrab(grabber); return; }

  const targetWeight = characters[target.charIdx] ? characters[target.charIdx].weight : 1.0;
  const dmgTable = getThrowDmg(grabber.charIdx);
  const kbMult = getThrowKbMultiplier(target.damage);
  // パッシブ: 熊太郎(6) 投げ強化 投げダメ/KB+15%
  let kumaPassive = grabber.charIdx === 6 ? 1.15 : 1.0;
  // D技: 熊太郎 熊の怒り（投げ2倍、1回消費）
  if (grabber.dSkillBuff === 'bearRage') { kumaPassive *= 2.0; grabber.dSkillActive = false; grabber.dSkillBuff = null; }

  // 方向別ダメージ/ノックバック（角度ベース）
  let throwDmg, kbBase, kbScale;
  let throwAngle, throwDir; // 角度（度数、負=上）, 方向
  // 波おじ: 下投げを低めに
  const namiDownAngle = grabber.charIdx === 13 ? -15 : -20;
  if (dirY < 0) {
    // 上投げ: 真上80度
    throwDmg = dmgTable.up * kumaPassive;
    kbBase = 9; kbScale = 0.09;
    throwAngle = -80; throwDir = 0;
    target.hitstun = Math.floor(15 + target.damage * 0.12);
  } else if (dirY > 0) {
    // 下投げ: 低い角度20度（コンボ起点）
    throwDmg = dmgTable.down * kumaPassive;
    kbBase = 6; kbScale = 0.06;
    throwAngle = namiDownAngle; throwDir = grabber.facingLeft ? -1 : 1;
    target.hitstun = Math.floor(18 + target.damage * 0.12);
  } else if (dirX !== 0 && dirX !== (grabber.facingLeft ? -1 : 1)) {
    // 後ろ投げ: 斜め上30度（後方）
    throwDmg = dmgTable.back * kumaPassive;
    kbBase = 10; kbScale = 0.12;
    throwAngle = -30; throwDir = grabber.facingLeft ? 1 : -1;
    target.hitstun = Math.floor(10 + target.damage * 0.1);
  } else {
    // 前投げ: 斜め上30度
    throwDmg = dmgTable.front * kumaPassive;
    kbBase = 8; kbScale = 0.10;
    throwAngle = -30; throwDir = grabber.facingLeft ? -1 : 1;
    target.hitstun = Math.floor(10 + target.damage * 0.1);
  }
  {
    const kb = (kbBase + target.damage * kbScale) / targetWeight * kbMult * kumaPassive;
    const tRad = throwAngle * Math.PI / 180;
    if (throwDir === 0) {
      // 上投げ: 真上
      target.vx = 0;
      target.vy = -kb * 1.3;
    } else {
      target.vx = Math.cos(tRad) * kb * throwDir;
      target.vy = Math.sin(tRad) * kb;
    }
  }

  target.damage = Math.min(999, target.damage + throwDmg);
  target.damageTint = 12;
  target.throwImmuneTimer = THROW_IMMUNE_FRAMES;
  playHitSound('throw');
  triggerScreenShake(4, 8);

  // 衝撃波リングエフェクト
  hitEffects.push({ x: target.x, y: target.y - 40, life: 15, maxLife: 15, color: '#FFAA00', size: 40 });
  hitEffects.push({ x: target.x, y: target.y - 40, life: 12, maxLife: 12, color: '#FFFFFF', size: 60, type: 'ring' });

  // ダメージ数値表示
  damageNumbers.push({ x: target.x, y: target.y - 60, value: throwDmg, life: 40, maxLife: 40, color: '#FFAA00' });

  // コンボシステム連携
  if (grabber.id !== undefined) {
    const realGrabber = players.find(pp => pp.id === grabber.id);
    if (realGrabber) {
      realGrabber.cancelWindow = 10;
      realGrabber.comboWindow = 25; // 投げ後のコンボウィンドウ（やや長め）
    }
  }
  if (!target.grounded) {
    target.airComboTimer = 25;
  }

  grabber.throwCooldown = 30;
  // 自己バフ: 熊太郎「怒り」投げ成功後3秒間全ダメ1.15倍
  if (grabber.charIdx === 6) { grabber.autoBuff = 180; grabber.autoBuffType = 'kumaRage'; }
  releaseGrab(grabber);
}

// --- CPU AI ---
let cpuActionTimer = 0;
let cpuJumpTimer = 0;
let cpuAttackCooldown = 0;

function getCpuGuard(cpu, target) {
  if (!cpu.grounded || cpu.attacking || cpu.grabbing || cpu.grabbed) return false;
  if (cpu.guardDurability <= 10) return false; // Don't guard with low durability
  const dist = Math.abs(target.x - cpu.x);

  if (cpuDifficulty === 0) {
    // Easy: rarely guards
    return target.attacking && dist < 80 && Math.random() < 0.01;
  } else if (cpuDifficulty === 1) {
    // Normal: sometimes guards when attacked nearby
    return target.attacking && dist < 100 && Math.random() < 0.04;
  } else if (cpuDifficulty === 2) {
    // Hard: guards reactively, sometimes just guards
    if (target.attacking && dist < 120) return Math.random() < 0.08;
    // Guard against projectiles
    for (const pr of projectiles) {
      if (pr.ownerId !== cpu.id && Math.abs(pr.x - cpu.x) < 100 && Math.abs(pr.y - cpu.y) < 60) {
        return Math.random() < 0.12;
      }
    }
    return false;
  } else {
    // Extreme: highly reactive guard
    if (target.attacking && dist < 140) return Math.random() < 0.15;
    for (const pr of projectiles) {
      if (pr.ownerId !== cpu.id && Math.abs(pr.x - cpu.x) < 130 && Math.abs(pr.y - cpu.y) < 70) {
        return Math.random() < 0.2;
      }
    }
    return false;
  }
}

function getCpuInput(cpu, target) {
  const result = { moveX: 0, jump: false, attack: null, grab: false, throwDir: null };
  if (!target.alive || !cpu.alive) return result;
  // CPU崖つかまり処理
  if (cpu.ledgeGrab) {
    const choices = cpuDifficulty >= 2 ? ['normal','attack','dodge'] : ['normal','normal','dodge'];
    if (cpu.ledgeTimer > 30 || Math.random() < 0.03) {
      releaseLedge(cpu, choices[Math.floor(Math.random() * choices.length)]);
    }
    return result;
  }

  const dx = target.x - cpu.x;
  const dy = target.y - cpu.y;
  const dist = Math.abs(dx);
  const dirToTarget = dx > 0 ? 1 : -1;
  const isAirborne = !cpu.grounded;

  cpuActionTimer++;
  if (cpuAttackCooldown > 0) cpuAttackCooldown--;

  // CPU grab/throw handling
  if (cpu.grabbing) {
    if (cpu.grabTimer > 15 + Math.random() * 20) {
      const dirs = [[dirToTarget, 0], [0, -1], [-dirToTarget, 0]];
      const d = dirs[Math.floor(Math.random() * dirs.length)];
      result.throwDir = { x: d[0], y: d[1] };
    }
    return result;
  }

  if (cpuDifficulty === 0) {
    // --- EASY ---
    if (cpuActionTimer % 90 < 45) {
      result.moveX = Math.sin(cpuActionTimer * 0.05) > 0 ? 1 : -1;
    }
    if (Math.random() < 0.008) result.jump = true;
    if (dist < 120 && Math.random() < 0.02 && cpuAttackCooldown <= 0) {
      result.attack = isAirborne ? 'aerial' : 'normal';
      cpuAttackCooldown = 60;
    }
    if (cpu.x < STAGE_LEFT + 30) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 30) result.moveX = -1;

  } else if (cpuDifficulty === 1) {
    // --- NORMAL ---
    if (dist > 80) {
      result.moveX = dirToTarget;
    } else if (dist < 40) {
      result.moveX = Math.random() < 0.3 ? -dirToTarget : 0;
    }
    if (dy < -60 && Math.random() < 0.04) result.jump = true;
    if (Math.random() < 0.01) result.jump = true;

    if (cpuAttackCooldown <= 0) {
      if (isAirborne && dist < 80 && Math.random() < 0.05) {
        result.attack = 'aerial';
        cpuAttackCooldown = 30;
      } else if (dist < 80) {
        if (Math.random() < 0.04) {
          const roll = Math.random();
          if (roll < 0.5) result.attack = 'normal';
          else if (roll < 0.75) result.attack = 'strong';
          else result.attack = 'down';
          cpuAttackCooldown = 35;
        }
      } else if (dist < 150 && Math.random() < 0.015) {
        result.attack = 'strong';
        cpuAttackCooldown = 45;
      }
    }

    if (cpu.x < STAGE_LEFT + 20) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 20) result.moveX = -1;
    if (cpu.y > STAGE_GROUND_Y + 50) result.jump = true;

  } else if (cpuDifficulty === 2) {
    // --- HARD ---
    if (dist > 60) {
      result.moveX = dirToTarget;
    } else if (dist > 30) {
      result.moveX = Math.random() < 0.6 ? dirToTarget : 0;
    }
    if (dy < -50 && Math.random() < 0.06) result.jump = true;
    if (target.attacking && Math.random() < 0.08) result.jump = true;
    if (Math.random() < 0.012) result.jump = true;

    if (cpuAttackCooldown <= 0) {
      // Aerial attacks when airborne
      if (isAirborne && dist < 70 && Math.random() < 0.08) {
        if (dy > 20 && Math.random() < 0.4) {
          result.attack = 'downair';
        } else {
          result.attack = 'aerial';
        }
        cpuAttackCooldown = 18;
      }
      // Grab at close range
      else if (dist < GRAB_RANGE && cpu.grounded && Math.random() < 0.03 && cpu.throwCooldown <= 0) {
        result.grab = true;
        cpuAttackCooldown = 20;
      }
      else if (dist < 70) {
        if (Math.random() < 0.07) {
          const roll = Math.random();
          if (roll < 0.2) result.attack = 'normal';
          else if (roll < 0.35) result.attack = 'strong';
          else if (roll < 0.5) result.attack = 'down';
          else if (roll < 0.65) result.attack = 'up';
          else if (roll < 0.8) result.attack = 'side';
          else result.attack = 'special';
          cpuAttackCooldown = 22;
        }
      } else if (dist < 130) {
        if (Math.random() < 0.04) {
          result.attack = Math.random() < 0.5 ? 'strong' : 'special';
          cpuAttackCooldown = 28;
        }
      } else if (dist < 250 && Math.random() < 0.02) {
        result.attack = 'special';
        cpuAttackCooldown = 35;
      }
    }

    if (target.hitstun > 0 && dist < 80 && cpuAttackCooldown <= 0 && Math.random() < 0.12) {
      result.attack = 'normal';
      cpuAttackCooldown = 15;
    }

    // CPU command attacks (hard only, rare)
    if (cpuAttackCooldown <= 0 && Math.random() < 0.006) {
      const cmds = commandDefs[cpu.charIdx];
      if (cmds) {
        const cmd = cmds[Math.floor(Math.random() * cmds.length)];
        if (cpu['cd_' + cmd.cooldownKey] <= 0 && dist < 200) {
          result.command = cmd;
          cpuAttackCooldown = 60;
        }
      }
    }

    if (cpu.x < STAGE_LEFT + 15) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 15) result.moveX = -1;
    if (cpu.y > STAGE_GROUND_Y + 30) result.jump = true;
    if (cpu.x < STAGE_LEFT - 50 || cpu.x > STAGE_RIGHT + 50) {
      result.moveX = cpu.x < 480 ? 1 : -1;
      result.jump = true;
    }

  } else {
    // --- EXTREME (最強) ---
    // ③ Movement: always chase, dash in fast
    if (dist > 40) {
      result.moveX = dirToTarget;
    } else if (dist > 20) {
      result.moveX = Math.random() < 0.7 ? dirToTarget : 0;
    }
    // Jump: reactive evasion + aerial approach
    if (dy < -40 && Math.random() < 0.1) result.jump = true;
    if (target.attacking && dist < 120 && Math.random() < 0.15) result.jump = true;
    if (Math.random() < 0.015) result.jump = true;

    // ① Combo system: track last hit
    if (!cpu._comboState) cpu._comboState = 0; // 0=none, 1=hit landed waiting, 2+=combo step
    if (!cpu._comboTimer) cpu._comboTimer = 0;

    // Detect if our attack just hit (target in hitstun and we just attacked)
    if (target.hitstun > 0 && cpu.attacking && cpu._comboState === 0) {
      cpu._comboState = 1;
      cpu._comboTimer = 0;
    }
    if (cpu._comboState > 0) cpu._comboTimer++;

    // Combo follow-up
    if (cpu._comboState >= 1 && !cpu.attacking && cpuAttackCooldown <= 0 && target.hitstun > 0 && dist < 100) {
      if (cpu._comboTimer >= 5 && cpu._comboTimer <= 10) {
        if (cpu._comboState === 1) {
          // First follow-up: strong or direction attack
          const roll = Math.random();
          if (roll < 0.3) result.attack = 'strong';
          else if (roll < 0.5) result.attack = 'up';
          else if (roll < 0.7) result.attack = 'side';
          else result.attack = 'down';
          cpuAttackCooldown = 6;
          cpu._comboState = 2;
          cpu._comboTimer = 0;
        } else if (cpu._comboState === 2 && target.damage >= 100) {
          // Finisher: special at high damage
          result.attack = 'special';
          cpuAttackCooldown = 8;
          cpu._comboState = 0;
          cpu._comboTimer = 0;
        } else {
          cpu._comboState = 0;
        }
      } else if (cpu._comboTimer > 15) {
        cpu._comboState = 0; // combo window expired
      }
    }
    if (target.hitstun <= 0 && cpu._comboState > 0 && cpu._comboTimer > 5) {
      cpu._comboState = 0;
    }

    if (cpuAttackCooldown <= 0 && cpu._comboState === 0) {
      // Aerial attacks
      if (isAirborne && dist < 80 && Math.random() < 0.12) {
        if (dy > 20 && Math.random() < 0.5) result.attack = 'downair';
        else result.attack = 'aerial';
        cpuAttackCooldown = 10;
      }
      // Grab at close range
      else if (dist < GRAB_RANGE && cpu.grounded && Math.random() < 0.05 && cpu.throwCooldown <= 0) {
        result.grab = true;
        cpuAttackCooldown = 12;
      }
      // Close range: fast attacks
      else if (dist < 60) {
        if (Math.random() < 0.12) {
          const roll = Math.random();
          if (roll < 0.3) result.attack = 'normal';
          else if (roll < 0.45) result.attack = 'strong';
          else if (roll < 0.6) result.attack = 'down';
          else if (roll < 0.75) result.attack = 'up';
          else if (roll < 0.9) result.attack = 'side';
          else result.attack = 'special';
          cpuAttackCooldown = 12;
        }
      }
      // Mid range
      else if (dist < 120) {
        if (Math.random() < 0.06) {
          result.attack = Math.random() < 0.5 ? 'dash' : 'special';
          cpuAttackCooldown = 15;
        }
      }
      // Long range: dash or projectile
      else if (dist < 250 && Math.random() < 0.04) {
        result.attack = 'special';
        cpuAttackCooldown = 20;
      }

      // ③ Instant counter-attack after hitstun ends
      if (cpu.hitstun === 1 && dist < 80) {
        result.attack = 'normal';
        cpuAttackCooldown = 5;
        cpu._comboState = 0;
      }
    }

    // Punish target's recovery
    if (target.hitstun > 0 && dist < 90 && cpuAttackCooldown <= 0 && Math.random() < 0.2) {
      result.attack = 'normal';
      cpuAttackCooldown = 6;
    }

    // Command attacks (more frequent than hard)
    if (cpuAttackCooldown <= 0 && Math.random() < 0.015) {
      const cmds = commandDefs[cpu.charIdx];
      if (cmds) {
        const cmd = cmds[Math.floor(Math.random() * cmds.length)];
        if (cpu['cd_' + cmd.cooldownKey] <= 0 && dist < 180) {
          result.command = cmd;
          cpuAttackCooldown = 30;
        }
      }
    }

    // ② Recovery: aggressively return to stage
    if (cpu.x < STAGE_LEFT + 10) result.moveX = 1;
    if (cpu.x > STAGE_RIGHT - 10) result.moveX = -1;
    if (cpu.y > STAGE_GROUND_Y + 20) result.jump = true;
    // Off-stage recovery: immediate jump + move toward stage
    if (cpu.x < STAGE_LEFT - 30 || cpu.x > STAGE_RIGHT + 30) {
      result.moveX = cpu.x < 480 ? 1 : -1;
      result.jump = true;
    }
    // Below stage: always jump
    if (cpu.y > STAGE_GROUND_Y + 50) {
      result.jump = true;
      result.moveX = cpu.x < 480 ? 1 : -1;
    }
  }

  return result;
}

function updateBattle(dt) {
  battleTime += dt;
  cmdFrameCounter++; // コマンド入力用フレームカウンタ

  if (battleCountdown > 0) { battleCountdown--; return; }
  battleStarted = true;

  battleFrameAcc++;
  if (battleFrameAcc >= 60) { battleFrameAcc = 0; if (battleTimer > 0) battleTimer--; }

  if (battleTimer <= 0 && !gameOver) {
    gameOver = true;
    stopBGM();
    const p1 = players[0], p2 = players[1];
    if (p1.stocks !== p2.stocks) winner = p1.stocks > p2.stocks ? 0 : 1;
    else winner = p1.damage <= p2.damage ? 0 : 1;
  }
  if (gameOver) return;

  // Update hit effects
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    hitEffects[i].life--;
    if (hitEffects[i].life <= 0) hitEffects.splice(i, 1);
  }

  // Update sparks - 物理演算（重力・空気抵抗・フェードアウト）
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += (s.gravity || 0.15);
    s.vx *= (s.drag || 0.97);
    if (s.spin) s.angle = (s.angle || 0) + s.spin; // 回転更新
    s.life--;
    // ドスボス デコイ爆発
    if (s.type === 'dosbossDecoy' && s.life === 1) {
      const boomHitbox = { x: s.decoyX - 50, y: s.decoyY - 50, w: 100, h: 80 };
      const decoyOwner = players.find(pp => pp.id === s.ownerId);
      if (decoyOwner) {
        const savedTargets = decoyOwner.hitTargets;
        decoyOwner.hitTargets = [];
        checkHitboxAgainstPlayers(decoyOwner, boomHitbox, 10, 5, 0.09, -40, 'special');
        decoyOwner.hitTargets = savedTargets;
      }

      hitEffects.push({ x: s.decoyX, y: s.decoyY - 30, life: 15, maxLife: 15, color: '#CC66FF', size: 60 });
      hitEffects.push({ x: s.decoyX, y: s.decoyY - 30, life: 12, maxLife: 12, color: '#FF6600', size: 80, type: 'ring' });
      triggerScreenShake(4, 8);
    }
    if (s.life <= 0) sparks.splice(i, 1);
  }

  // Update damage numbers
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy;
    d.vy *= 0.96;
    d.life--;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }

  // Update trails (follow target while alive, then fade)
  for (let i = trails.length - 1; i >= 0; i--) {
    const tr = trails[i];
    tr.life--;
    if (tr.life <= 0) { trails.splice(i, 1); continue; }
    const target = players.find(pp => pp.id === tr.targetId);
    if (target && target.alive && target.hitstun > 0) {
      if (!tr.points) tr.points = [];
      tr.points.push({ x: target.x, y: target.y - 35 });
      const maxPts = tr.maxPoints || 20;
      if (tr.points.length > maxPts) tr.points.shift();
    }
  }

  // Update blast explosions
  for (let i = blastExplosions.length - 1; i >= 0; i--) {
    blastExplosions[i].life--;
    if (blastExplosions[i].life <= 0) blastExplosions.splice(i, 1);
  }

  // Update command name display
  for (let i = cmdNameDisplay.length - 1; i >= 0; i--) {
    cmdNameDisplay[i].life--;
    cmdNameDisplay[i].y -= 0.5;
    if (cmdNameDisplay[i].life <= 0) cmdNameDisplay.splice(i, 1);
  }

  // Update hit/miss displays
  for (let i = hitMissDisplays.length - 1; i >= 0; i--) {
    hitMissDisplays[i].life--;
    hitMissDisplays[i].y -= 0.8;
    if (hitMissDisplays[i].life <= 0) hitMissDisplays.splice(i, 1);
  }

  // Update comic texts
  for (let i = comicTexts.length - 1; i >= 0; i--) {
    comicTexts[i].life--;
    comicTexts[i].y -= 0.6;
    if (comicTexts[i].life <= 0) comicTexts.splice(i, 1);
  }

  // Update KO display
  if (koDisplay.active) {
    koDisplay.life--;
    if (koDisplay.life <= 0) koDisplay.active = false;
  }

  // Update confetti
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx; c.y += c.vy;
    c.vy += 0.03;
    c.vx *= 0.99;
    c.rotation += c.rotSpeed;
    c.life--;
    if (c.life <= 0) confetti.splice(i, 1);
  }

  // Update speed lines
  for (let i = speedLines.length - 1; i >= 0; i--) {
    speedLines[i].life--;
    if (speedLines[i].life <= 0) speedLines.splice(i, 1);
  }

  // Update fire trails
  for (let i = fireTrails.length - 1; i >= 0; i--) {
    const f = fireTrails[i];
    f.x += f.vx; f.y += f.vy;
    f.vy -= 0.05;
    f.size *= 0.97;
    f.life--;
    if (f.life <= 0) fireTrails.splice(i, 1);
  }

  // Update special aura
  for (let i = specialAura.length - 1; i >= 0; i--) {
    specialAura[i].life--;
    if (specialAura[i].life <= 0) specialAura.splice(i, 1);
  }

  // Update command flash
  if (cmdFlash.alpha > 0) {
    cmdFlash.alpha *= 0.88;
    if (cmdFlash.alpha < 0.01) cmdFlash.alpha = 0;
  }

  // Update command scale effect
  if (cmdScaleEffect.life > 0) {
    cmdScaleEffect.life--;
  }

  // Update KO slash effects
  for (let i = koSlashEffects.length - 1; i >= 0; i--) {
    if (koSlashEffects[i].delay > 0) {
      koSlashEffects[i].delay--;
    } else {
      koSlashEffects[i].life--;
      if (koSlashEffects[i].life <= 0) koSlashEffects.splice(i, 1);
    }
  }

  // Update stock loss animation
  if (stockLossAnim.active) {
    stockLossAnim.life--;
    if (stockLossAnim.life <= 0) stockLossAnim.active = false;
  }

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    // Homing: steer toward nearest enemy
    if (pr.homing) {
      let nearestEnemy = null, nearestDist = Infinity;
      for (const p of players) {
        if (p.id === pr.ownerId || !p.alive) continue;
        const dx = p.x - pr.x, dy = (p.y - 40) - pr.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < nearestDist) { nearestDist = dist; nearestEnemy = p; }
      }
      if (nearestEnemy) {
        const dx = nearestEnemy.x - pr.x, dy = (nearestEnemy.y - 40) - pr.y;
        const targetAngle = Math.atan2(dy, dx);
        const curAngle = Math.atan2(pr.vy, pr.vx);
        let diff = targetAngle - curAngle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turnRate = 0.06;
        const newAngle = curAngle + Math.sign(diff) * Math.min(Math.abs(diff), turnRate);
        const spd = Math.sqrt(pr.vx * pr.vx + pr.vy * pr.vy);
        pr.vx = Math.cos(newAngle) * spd;
        pr.vy = Math.sin(newAngle) * spd;
      }
    }
    pr.x += pr.vx;
    pr.y += pr.vy;
    pr.life--;
    pr.time++;
    if (pr.life <= 0) { projectiles.splice(i, 1); continue; }
    // Check hit against players
    let hitSomething = false;
    for (const p of players) {
      if (p.id === pr.ownerId || !p.alive || p.invincibleTimer > 0 || p.airDodgeTimer > 0) continue;
      if (pr.pierce && pr.hitTargets && pr.hitTargets.includes(p.id)) continue;
      const ph = getPlayerHitbox(p);
      if (hitboxCollides(pr.x - pr.w/2, pr.y - pr.h/2, pr.w, pr.h, ph.x, ph.y, ph.w, ph.h)) {
        const owner = players.find(pl => pl.id === pr.ownerId);
        const fakeAttacker = { x: pr.x - pr.vx * 5, charIdx: pr.ownerCharIdx, senBuffTimer: owner ? owner.senBuffTimer : 0,
          damage: owner ? owner.damage : 0, stocks: owner ? owner.stocks : 3, dashing: false, autoBuff: owner ? owner.autoBuff : 0,
          autoBuffType: owner ? owner.autoBuffType : null, comboWindow: owner ? owner.comboWindow : 0, consecutiveHits: owner ? owner.consecutiveHits : 0,
          dSkillBuff: owner ? owner.dSkillBuff : null, dSkillCooldown: owner ? owner.dSkillCooldown : 0 };
        // 自己バフ: ロング「狙撃」距離比例ダメ増 / バレット「精密射撃」遠距離1.2倍
        let projDmg = pr.damage;
        if (owner) {
          const dist = Math.abs(pr.x - (owner ? owner.x : pr.x));
          if (pr.ownerCharIdx === 4) projDmg *= (1 + Math.min(dist / 500, 0.3));   // ロング: 最大1.3倍
          if (pr.ownerCharIdx === 7) projDmg *= (1 + Math.min(dist / 400, 0.2));   // バレット: 最大1.2倍
          if (pr.ownerCharIdx === 19) projDmg *= (1 + Math.min((owner.dosbossComboCount || 0) * 0.05, 0.25)); // ドスボス「混沌」
        }
        applyHit(fakeAttacker, p, projDmg, pr.kbBase, pr.kbScale, pr.kbAngle, 'projectile');
        showHitDisplay(p.x, p.y, true);
        if (pr.meshitero) {
          cmdNameDisplay.push({ text: '飯テロ！', x: p.x, y: p.y - 100, life: 60, maxLife: 60, color: '#FF8844' });
        }
        // ドスボス: 重力砲デバフ
        if (pr.gravityDebuff || (owner && owner.attackData && owner.attackData.gravityDebuff)) {
          p.gravityDebuffTimer = 180; // 3 seconds
          cmdNameDisplay.push({ text: '重力低下！', x: p.x, y: p.y - 100, life: 45, maxLife: 45, color: '#9944CC' });
        }
        if (pr.ink) p.inkBlindTimer = 120; // 2 seconds of ink blind
        if (pr.pierce) { if (pr.hitTargets) pr.hitTargets.push(p.id); }
        else { projectiles.splice(i, 1); hitSomething = true; }
        break;
      }
    }
    if (hitSomething) continue;
  }

  // Update players
  for (const p of players) {
    if (p.respawnTimer > 0) {
      p.respawnTimer--;
      if (p.respawnTimer === 0) {
        p.x = p.id === 0 ? 350 : 610;
        p.y = 100; p.vx = 0; p.vy = 0;
        p.alive = true; p.invincibleTimer = 120;
        p.facingLeft = p.id === 1;
        p.attacking = false; p.hitstun = 0; p.specialState = null;
        p.guarding = false; p.guardDurability = GUARD_MAX_DURABILITY; p.guardBreakStun = 0; p.justGuardTimer = 0;
        p.throwImmuneTimer = 0; p.throwPhase = 0; p.throwPhaseTimer = 0; p.throwTechWindow = 0; p.throwCooldown = 0;
        p.animState = 'fall'; p.spinAngle = 0; p.damageTint = 0; p.landSquash = 0; p.jumpSquash = 0;
        p.senBuffTimer = 0;
        p.gravityDebuffTimer = 0;
      }
      continue;
    }
    if (!p.alive) continue;
    if (p.invincibleTimer > 0) p.invincibleTimer--;

    const ch = characters[p.charIdx];
    if (p.throwCooldown > 0) p.throwCooldown--;
    if (p.throwImmuneTimer > 0) p.throwImmuneTimer--;
    if (p.throwTechWindow > 0) p.throwTechWindow--;
    if (p.cd_cmd1 > 0) p.cd_cmd1--;
    if (p.cd_cmd2 > 0) p.cd_cmd2--;
    if (p.cd_cmd3 > 0) p.cd_cmd3--;
    if (p.sniperCooldown > 0) p.sniperCooldown--;
    if (p.inkBlindTimer > 0) p.inkBlindTimer--;
    if (p.kingComboTimer > 0) { p.kingComboTimer--; if (p.kingComboTimer <= 0) { p.kingComboHits = 0; } }
    if (p.senBuffTimer > 0) p.senBuffTimer--;
    if (p.kingkingArmorTimer > 0) p.kingkingArmorTimer--;
    if (p.fearTimer > 0) p.fearTimer--;
    if (p.poisonTimer > 0) { p.poisonTimer--; if (p.poisonTimer % 60 === 0) p.damage = Math.min(999, p.damage + 1); }
    if (p.fearGauge > 0 && p.fearTimer <= 0) p.fearGauge = Math.max(0, p.fearGauge - 0.1); // ゲージ自然減少
    if (p.gravityDebuffTimer > 0) p.gravityDebuffTimer--;
    if (p.cancelWindow > 0) p.cancelWindow--;
    if (p.comboWindow > 0) p.comboWindow--;
    if (p.airComboTimer > 0) p.airComboTimer--;
    if (p.dragonCooldown > 0) p.dragonCooldown--;
    updateDSkill(p);
    // ガード硬直カウントダウン
    if (p.guardPenalty > 0) { p.guardPenalty--; p.vx *= 0.9; }
    // スマッシュ溜め更新
    if (p.smashCharging) {
      p.smashChargeTime++;
      p.vx = 0; // 溜め中は移動不可
      // Xキーリリースで発動
      let xHeld = false;
      if (p.id === 0) { xHeld = (onlineMode && !isHost) ? !!remoteKeys.x : !!(keys['x'] || keys['X']); }
      else if (gameMode === 'cpu' || bossRushMode) { xHeld = false; } // CPU即発動
      else if (onlineMode && isHost) { xHeld = !!remoteKeys.x; }
      else { xHeld = !!(keys['i'] || keys['I']); } // P2
      if (!xHeld || p.smashChargeTime >= SMASH_CHARGE_MAX) executeSmash(p);
      if (p.hitstun > 0) { p.smashCharging = false; p.smashType = null; } // 被弾キャンセル
    }
    // 自己バフタイマー
    if (p.autoBuff > 0) p.autoBuff--;
    if (p.autoBuff <= 0) p.autoBuffType = null;
    // 連続ヒットリセット（2秒間ヒットなしでリセット）
    if (p.comboWindow <= 0 && p.consecutiveHits > 0) p.consecutiveHits = 0;
    // マイクロ: Dスキル後10秒間バフ
    if (p.charIdx === 20 && p.dSkillCooldown === D_SKILL_COOLDOWN - 1) { p.autoBuff = 600; p.autoBuffType = 'microAfterStar'; }
    // ミスターツー: テレポート使用後3秒バフ（specialState確認）
    if (p.charIdx === 21 && p.specialState === 'dashing' && p.attackType === 'special') { p.autoBuff = 180; p.autoBuffType = 'mrtwoTeleAmp'; }
    // ドスボス: ランダム必殺技使用カウント
    if (p.charIdx === 19 && p.attacking && p.attackData && p.attackData.dosbossRandom && p.attackFrame === 1) p.dosbossComboCount++;

    // Dキー長押し検出
    let dKeyHeld = false;
    if (p.id === 0) {
      dKeyHeld = (onlineMode && !isHost) ? !!remoteKeys.d : !!(keys['d'] || keys['D']);
    } else if (gameMode === 'cpu' || bossRushMode) {
      dKeyHeld = false;
    } else if (onlineMode && isHost) {
      dKeyHeld = !!remoteKeys.d;
    } else {
      dKeyHeld = !!(keys['r'] || keys['R']); // P2ローカル: Rキー
    }
    if (dKeyHeld && !p.dSkillActive && p.alive && p.hitstun <= 0 && !p.grabbed && !ultimateActive && p.sealMagic <= 0) {
      p.dHoldTimer++;
      if (p.dHoldTimer >= D_SKILL_HOLD_FRAMES) {
        // ゲージMAX → 必殺技、それ以外 → 通常D技
        if (p.ultimateGauge >= 100) {
          triggerUltimate(p);
        } else if (p.dSkillCooldown <= 0) {
          triggerDSkill(p);
        } else {
          // クールダウン中: 弾くSE
          playHitSound('guard');
        }
        p.dHoldTimer = 0;
      }
    } else {
      p.dHoldTimer = 0;
    }

    // 天才: ドラゴンモード処理
    if (p.charIdx === 10) {
      // Transform: Cボタン長押しで変形（ダメージ80%以上、クールダウンなし）
      const cKeyHeld = p.id === 0 ? (keys['c'] || keys['C']) : (onlineMode && isHost) ? !!remoteKeys.c : (gameMode === 'vs' ? (keys['o'] || keys['O']) : false);
      if (cKeyHeld && !p.dragonMode && p.damage >= 80 && p.dragonCooldown <= 0 && p.grounded && p.hitstun <= 0) {
        p.dragonTransformTimer++;
        if (p.dragonTransformTimer >= 60) { // 1秒長押し
          p.dragonMode = true;
          p.dragonTimer = 900; // 15秒
          p.dragonTransformTimer = 0;
          p.dragonTransforming = true;
          // 変形エフェクト（強化版）
          triggerScreenShake(12, 20);
          hitFlash.alpha = 0.5;
          hitFlash.color = '#FF4400';
          hitEffects.push({ x: p.x, y: p.y - 40, life: 35, maxLife: 35, color: '#FF6600', size: 80 });
          hitEffects.push({ x: p.x, y: p.y - 40, life: 25, maxLife: 25, color: '#FF2200', size: 50, type: 'ring' });
          specialAura.push({ playerId: p.id, life: 78, maxLife: 78 });
          playHitSound('cmd');
          // 炎パーティクル（1.5倍量）
          for (let i = 0; i < 30; i++) {
            const a = Math.random() * Math.PI * 2;
            sparks.push({ x: p.x, y: p.y - 35, vx: Math.cos(a) * (3 + Math.random() * 6), vy: Math.sin(a) * (3 + Math.random() * 6) - 2,
              life: 25 + Math.floor(Math.random() * 20), maxLife: 45, color: ['#FF4400','#FF8833','#FFAA44','#FF2200'][i%4], size: 3 + Math.random() * 5, type: 'fireball', gravity: 0.08, drag: 0.97 });
          }
          cmdNameDisplay.push({ text: 'DRAGON MODE!', x: p.x, y: p.y - 120, life: 108, maxLife: 108, color: '#FF4400' });
          // ドラゴンモードではステータス変更
          p.weight = 1.5;
        }
      } else {
        p.dragonTransformTimer = 0;
      }
      // ドラゴンモードタイマー
      if (p.dragonMode) {
        p.dragonTimer--;
        p.dragonTransforming = false;
        if (p.dragonTimer <= 0) {
          p.dragonMode = false;
          p.dragonCooldown = 1200; // 20秒クールダウン
          p.weight = 0.8; // 人型に戻す
          hitEffects.push({ x: p.x, y: p.y - 40, life: 15, maxLife: 15, color: '#FFFFFF', size: 40 });
          cmdNameDisplay.push({ text: 'HUMAN MODE', x: p.x, y: p.y - 120, life: 60, maxLife: 60, color: '#FF8833' });
        }
      }
    }

    // Grabbed state: stuck to grabber
    if (p.grabbed) {
      const grabber = players.find(pp => pp.id === p.grabbedBy);
      if (grabber && grabber.grabbing) {
        const gdir = grabber.facingLeft ? -1 : 1;
        p.x = grabber.x + gdir * 30;
        p.y = grabber.y;
        p.vx = 0; p.vy = 0;
      } else {
        p.grabbed = false; p.grabbedBy = null;
      }
      continue;
    }

    // Grabbing state: 投げモーションフェーズ管理
    if (p.grabbing) {
      p.grabTimer++;
      p.vx = 0;
      // Gravity still applies
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.y += p.vy;
      landingCheck(p);

      // フェーズ1: 掴みモーション（10F）
      if (p.throwPhase === 1) {
        p.throwPhaseTimer--;
        if (p.throwPhaseTimer <= 0) {
          // 掴みモーション完了 → 方向入力を読み取って投げ実行フェーズへ
          let dx = 0, dy = 0;
          if (p.id === 0) {
            if (onlineMode && !isHost) {
              if (remoteKeys.left) dx = -1; if (remoteKeys.right) dx = 1;
              if (remoteKeys.up) dy = -1; if (remoteKeys.down) dy = 1;
            } else {
              if (keys['ArrowLeft']) dx = -1; if (keys['ArrowRight']) dx = 1;
              if (keys['ArrowUp']) dy = -1; if (keys['ArrowDown']) dy = 1;
            }
          } else if (gameMode === 'cpu' || bossRushMode) {
            // CPU投げ方向: ランダム
            const r = Math.random();
            if (r < 0.3) dy = -1;       // 上投げ
            else if (r < 0.5) dy = 1;   // 下投げ
            else dx = p.facingLeft ? -1 : 1; // 前投げ
          } else if (onlineMode && isHost) {
            if (remoteKeys.left) dx = -1; if (remoteKeys.right) dx = 1;
            if (remoteKeys.up) dy = -1; if (remoteKeys.down) dy = 1;
          } else {
            if (keys['a'] || keys['A']) dx = -1; if (keys['d'] || keys['D']) dx = 1;
            if (keys['w'] || keys['W']) dy = -1; if (keys['s'] || keys['S']) dy = 1;
          }
          startThrowExec(p, dx, dy);
        }
      }
      // フェーズ2: 投げ実行モーション（15F）
      else if (p.throwPhase === 2) {
        p.throwPhaseTimer--;
        if (p.throwPhaseTimer <= 0) {
          executeThrow(p, p.throwDir.x, p.throwDir.y);
        }
      }
      // レガシー: フェーズなしの場合は従来通り自動解放
      else {
        if (p.grabTimer >= GRAB_DURATION) {
          releaseGrab(p);
        }
      }
      continue;
    }

    // ガード硬直ペナルティ（攻撃がガードされた時）
    if (p.guardPenalty > 0 && !p.attacking && !p.smashCharging) {
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.vx *= 0.9;
      p.y += p.vy;
      landingCheck(p);
      continue;
    }

    // Guard break stun
    if (p.guardBreakStun > 0) {
      p.guardBreakStun--;
      p.guarding = false;
      // スタン終了時にガード耐久値を最低30%まで回復（即再ブレイク防止）
      if (p.guardBreakStun <= 0) {
        p.guardBreakStun = 0;
        p.guardDurability = Math.max(p.guardDurability, GUARD_MAX_DURABILITY * 0.3);
      }
      p.vx *= 0.88;
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.x += p.vx;
      p.y += p.vy;
      landingCheck(p);
      blastCheck(p);
      continue;
    }

    // 崖つかまり更新
    updateLedge(p);
    if (p.ledgeGrab) continue; // 崖つかまり中は通常処理スキップ

    // === 固有パッシブシステム更新 ===
    const ci = p.charIdx;
    // ドン(1): 着地時スタン
    if (ci === 1 && p.grounded && !p._wasGrounded) {
      for (const t of players) {
        if (t.id !== p.id && t.alive && Math.hypot(t.x - p.x, t.y - p.y) < 100) {
          t.stunned = Math.max(t.stunned, 12);
        }
      }
    }
    p._wasGrounded = p.grounded;
    // サイソク(2): 高速移動中残像
    if (ci === 2 && Math.abs(p.vx) > 6 && battleTime % 3 === 0) {
      sparks.push({ x: p.x, y: p.y - 35, vx: 0, vy: 0, life: 8, maxLife: 8, color: '#44FFAA', size: 15, gravity: 0, drag: 1, type: 'charGhost' });
    }
    // メテオ(3): 常時炎エフェクト
    if (ci === 3 && battleTime % 8 === 0 && p.alive) {
      sparks.push({ x: p.x + (Math.random()-0.5)*20, y: p.y - 20, vx: (Math.random()-0.5)*1.5, vy: -1-Math.random(), life: 10, maxLife: 10, color: Math.random()>0.5?'#FFD700':'#FF8833', size: 2+Math.random(), gravity: -0.03, drag: 0.96 });
    }
    // うる男(5): 怒り蓄積
    if (ci === 5) {
      if (p.rageActive) { p.rageTimer--; if (p.rageTimer <= 0) { p.rageActive = false; p.rageGauge = 0; } }
      if (p.rageGauge >= 100 && !p.rageActive) {
        p.rageActive = true; p.rageTimer = 300;
        cmdNameDisplay.push({ text: '怒り爆発！', x: p.x, y: p.y - 100, life: 50, maxLife: 50, color: '#FF4444' });
      }
    }
    // 怖(24): 相手ゲージ蓄積5%低下（常時）
    if (ci === 24 && p.alive) {
      for (const t of players) {
        if (t.id !== p.id && t.ultimateGauge !== undefined) {
          // 蓄積速度を遅くする（直接減らすのではなく、updateで-0.05/frame）
          if (battleTime % 12 === 0 && t.ultimateGauge > 0) t.ultimateGauge = Math.max(0, t.ultimateGauge - 0.05);
        }
      }
      // 近くの相手が震えるエフェクト
      for (const t of players) {
        if (t.id !== p.id && t.alive && Math.hypot(t.x - p.x, t.y - p.y) < 150 && battleTime % 4 < 2) {
          // 震えは描画側で処理（ここではフラグのみ）
        }
      }
    }

    // 状態異常更新
    if (p.frozen > 0) { p.frozen--; p.vx = 0; p.vy = 0; continue; } // 凍結: 完全行動不能
    if (p.stunned > 0) { p.stunned--; p.vx *= 0.9; continue; } // スタン
    if (p.burning > 0) { p.burning--; if (p.burning % 60 === 0) p.damage = Math.min(999, p.damage + p.burnDmg); }
    if (p.poisoned > 0) { p.poisoned--; if (p.poisoned % 30 === 0 && p.poisonDmg > 0) p.damage = Math.min(999, p.damage + Math.ceil(p.poisonDmg / 10)); }
    if (p.cursed > 0) p.cursed--;
    if (p.confused > 0) p.confused--;
    if (p.paralyzed > 0) p.paralyzed--;
    if (p.feared2 > 0) p.feared2--;
    if (p.sealMagic > 0) p.sealMagic--;

    // バウンド硬直
    if (p.bounceStun > 0) {
      p.bounceStun--;
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.vx *= 0.92;
      p.x += p.vx;
      p.y += p.vy;
      landingCheck(p);
      blastCheck(p);
      if (p.bounceStun <= 0) p.groundBounced = false;
      continue;
    }

    // Hitstun - 自然な放物線＋回転＋壁バウンド
    if (p.hitstun > 0) {
      p.hitstun--;
      p.guarding = false;
      p.animState = 'hitstun';

      // ベク変（DI）: 最初の10フレームのみ方向変更可能
      p.diFrame++;
      if (p.diFrame <= 10) {
        let diX = 0, diY = 0;
        if (p.id === 0) {
          if (onlineMode && !isHost) { diX = remoteKeys.right ? 1 : remoteKeys.left ? -1 : 0; diY = remoteKeys.up ? -1 : remoteKeys.down ? 1 : 0; }
          else { diX = keys['ArrowRight'] ? 1 : keys['ArrowLeft'] ? -1 : 0; diY = keys['ArrowUp'] ? -1 : keys['ArrowDown'] ? 1 : 0; }
        } else if (p.id === 1) {
          if (onlineMode && isHost) { diX = remoteKeys.right ? 1 : remoteKeys.left ? -1 : 0; diY = remoteKeys.up ? -1 : remoteKeys.down ? 1 : 0; }
          else if (gameMode === 'cpu' || bossRushMode) { /* CPU: no DI */ }
          else if (onlineMode && !isHost) { diX = keys['ArrowRight'] ? 1 : keys['ArrowLeft'] ? -1 : 0; diY = keys['ArrowUp'] ? -1 : keys['ArrowDown'] ? 1 : 0; }
          else { diX = (keys['d']||keys['D']) ? 1 : (keys['a']||keys['A']) ? -1 : 0; diY = (keys['w']||keys['W']) ? -1 : (keys['s']||keys['S']) ? 1 : 0; }
        }
        if (diX !== 0 || diY !== 0) {
          const diStrengthX = 0.15, diStrengthY = 0.20;
          const smoothFactor = 0.15; // なめらかに反映
          p.vx += diX * Math.abs(p.diBaseVx) * diStrengthX * smoothFactor;
          p.vy += diY * Math.abs(p.diBaseVy) * diStrengthY * smoothFactor;
          // 最大変更量を制限
          const maxVx = Math.abs(p.diBaseVx) * 1.3;
          const maxVy = Math.abs(p.diBaseVy) * 1.3;
          if (maxVx > 0.5) p.vx = Math.sign(p.vx) * Math.min(Math.abs(p.vx), maxVx);
          if (maxVy > 0.5) p.vy = Math.sign(p.vy) * Math.min(Math.abs(p.vy), maxVy);
          // 白い軌跡エフェクト
          if (p.diFrame % 2 === 0) {
            sparks.push({ x: p.x, y: p.y - 30, vx: -p.vx * 0.1, vy: -p.vy * 0.1, life: 8, maxLife: 8, color: '#FFFFFF', size: 2, gravity: 0, drag: 0.9 });
          }
        }
      }

      // 速度に応じた回転（大きく吹っ飛んだ時だけ少し回転）
      const kbSpeed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (kbSpeed > 10) {
        const spinRate = Math.min(kbSpeed / 80, 0.15);
        p.spinAngle += (p.vx > 0 ? spinRate : -spinRate);
      }
      // 放物線ノックバック: ダメージ量で重力を調整
      const comboGrav = p.airComboTimer > 0 ? 0.5 : 1.0;
      const dmgGrav = p.damage <= 50 ? 1.0 : (p.damage <= 100 ? 0.85 : 0.7);
      const kbGravity = getGravity(p) * 0.8 * comboGrav * dmgGrav;
      p.vy += kbGravity;
      const effMaxFall = MAX_FALL_SPEED * (p.airComboTimer > 0 ? 0.6 : 1.0);
      if (p.vy > effMaxFall) p.vy = effMaxFall;
      p.x += p.vx;
      p.y += p.vy;
      // 空気抵抗（高ダメージ時は緩めて遠くまで飛ばす）
      const airRes = p.damage > 100 ? 0.99 : (kbSpeed > 12 ? 0.98 : 0.96);
      p.vx *= airRes;
      // 吹っ飛び中の軌跡エフェクト
      if (kbSpeed > 6 && p.hitstun % 3 === 0) {
        // 高ダメージ時はピンク白グラデーション軌跡
        const trailColor = p.damage > 100
          ? ['#FFAACC','#FFDDEE','#FFFFFF','#FF88AA'][Math.floor(Math.random() * 4)]
          : ['#FF4444','#FFDD00','#44AAFF','#FF66AA','#44FF88'][Math.floor(Math.random() * 5)];
        sparks.push({
          x: p.x + (Math.random() - 0.5) * 10, y: p.y - 35 + (Math.random() - 0.5) * 10,
          vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2 - 1,
          life: p.damage > 100 ? 18 : 15 + Math.floor(Math.random() * 10), maxLife: p.damage > 100 ? 18 : 25,
          color: trailColor,
          size: 3 + Math.random() * 3, type: 'star',
          gravity: 0.08, drag: 0.97,
          spin: (Math.random() - 0.5) * 0.3, angle: Math.random() * Math.PI * 2,
        });
      }
      // ③ 炎の軌跡（200%超え）
      if (p.damage > 200 && kbSpeed > 4 && p.hitstun % 2 === 0) {
        fireTrails.push({
          x: p.x + (Math.random() - 0.5) * 10,
          y: p.y - 35 + (Math.random() - 0.5) * 10,
          vx: -p.vx * 0.1 + (Math.random() - 0.5) * 1,
          vy: -Math.random() * 1.5 - 0.5,
          life: 15 + Math.floor(Math.random() * 10),
          maxLife: 25,
          size: 3 + Math.random() * 5,
        });
      }
      landingCheck(p);
      wallBounceCheck(p);
      blastCheck(p);
      continue;
    }

    // Attack update
    if (p.attacking) {
      p.attackFrame++;
      const atk = p.attackData;
      const totalFrames = atk.startup + atk.active + atk.recovery;

      // Special movement attacks
      if (atk.specialType === 'jumpSlam') {
        if (p.attackFrame === atk.startup) {
          p.vy = atk.jumpPower;
          p.specialState = 'jumping';
          p.grounded = false;
        }
        if (p.specialState === 'jumping') {
          p.vy += getGravity(p);
          if (p.vy > 0) { p.specialState = 'slamming'; p.vy = 16; }
        }
        if (p.specialState === 'slamming') {
          p.vy = 16;
          // 降下中も攻撃判定を出す（足元hitbox）
          const slamW = atk.slamHw || atk.hw || 60;
          const slamH = atk.slamHh || atk.hh || 40;
          const slamHb = { x: p.x - slamW / 2, y: p.y - 10, w: slamW, h: slamH };
          checkHitboxAgainstPlayers(p, slamHb, atk.damage * 0.7, atk.kbBase, atk.kbScale, 80, 'strong');
          // Check if we hit ground
          if (p.grounded) {
            // Slam hit!
            p.specialState = 'slamHit';
            p.attackFrame = atk.startup + 1; // start active frames
            p.hitTargets = []; // 着地時にリセットして着地ヒットも判定
          }
        }
        if (p.specialState === 'slamHit') {
          const slamFrame = p.attackFrame - atk.startup;
          if (slamFrame <= atk.slamActive) {
            const hb = { x: p.x - atk.slamHw / 2, y: p.y + atk.slamHy, w: atk.slamHw, h: atk.slamHh };
            checkHitboxAgainstPlayers(p, hb, atk.damage, atk.kbBase, atk.kbScale, atk.kbAngle, 'strong');
          }
          if (slamFrame > atk.slamActive + atk.recovery) {
            if (p.hitTargets.length === 0) {
              showHitDisplay(p.x, p.y, false);
              playHitSound('miss');
            }
            p.attacking = false; p.specialState = null;
          }
        }
        // Apply movement (limited horizontal control)
        p.x += p.vx * 0.3;
        p.y += p.vy;
        landingCheck(p);
        blastCheck(p);
        if (p.specialState !== 'slamHit') continue;
        if (p.attacking) continue;
      }

      if (atk.specialType === 'shadowDash' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        const dir = p.facingLeft ? -1 : 1;
        p.vx = atk.dashSpeed * dir;
        p.specialState = 'dashing';
      } else if (atk.specialType === 'shadowDash' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
        p.vx *= 0.3;
      }

      // Slide (sweep / sliding)
      if (atk.specialType === 'slide' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        const dir = p.facingLeft ? -1 : 1;
        p.vx = atk.slideSpeed * dir;
        p.specialState = 'sliding';
      } else if (atk.specialType === 'slide' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
        p.vx *= 0.3;
      }

      if (atk.specialType === 'uppercut' && p.attackFrame === atk.startup + 1) {
        p.vy = atk.launchVy;
        p.grounded = false;
        p.specialState = 'rising';
      }
      if (atk.specialType === 'uppercut' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Divekick: 空中下攻撃で急降下
      if (atk.specialType === 'divekick' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        p.vy = atk.diveSpeed;
        p.vx *= 0.3;
        p.specialState = 'diving';
      }
      if (atk.specialType === 'divekick' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Command: Teleport Slash (Zen cmd2)
      if (atk.specialType === 'cmdTeleSlash' && p.attackFrame === atk.startup) {
        const dir = p.facingLeft ? -1 : 1;
        p.x += atk.teleportDist * dir;
        p.specialState = 'teleSlashing';
        // Clamp to stage
        p.x = Math.max(BLAST_LEFT + 30, Math.min(BLAST_RIGHT - 30, p.x));
      }
      if (atk.specialType === 'cmdTeleSlash' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Command: Charge (Don cmd2)
      if (atk.specialType === 'cmdCharge' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        const dir = p.facingLeft ? -1 : 1;
        p.vx = atk.chargeSpeed * dir;
        p.specialState = 'charging';
      } else if (atk.specialType === 'cmdCharge' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
        p.vx *= 0.2;
      }

      // Command: Shuriken Storm (Saisoku cmd1)
      if (atk.specialType === 'cmdShurikenStorm' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        if ((p.attackFrame - atk.startup) % 3 === 1) {
          const dir = p.facingLeft ? -1 : 1;
          const spread = (Math.random() - 0.5) * 4;
          projectiles.push({
            x: p.x + 20 * dir, y: p.y - 40 + spread * 5,
            vx: (10 + Math.random() * 3) * dir, vy: spread,
            w: 14, h: 14,
            damage: 4, kbBase: 1.5, kbScale: 0.03, kbAngle: -5,
            life: 35, ownerId: p.id,
            color: '#88FFCC', pcolor: '#AAFFDD',
            shape: 'star', ownerCharIdx: p.charIdx, time: 0,
          });
        }
      }

      // Command: Clone Rush (Saisoku cmd2)
      if (atk.specialType === 'cmdCloneRush' && p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        p.specialState = 'cloneRush';
      }
      if (atk.specialType === 'cmdCloneRush' && p.attackFrame > atk.startup + atk.active) {
        p.specialState = null;
      }

      // Active frames - check hitbox
      if (p.attackFrame > atk.startup && p.attackFrame <= atk.startup + atk.active) {
        // Spawn projectile on first active frame (or multi-shot)
        if (atk.projectile) {
          if (atk.multiShot && atk.shotInterval) {
            const activeFrame = p.attackFrame - atk.startup;
            if (activeFrame >= 1 && activeFrame <= atk.multiShot * atk.shotInterval && (activeFrame - 1) % atk.shotInterval === 0) {
              spawnProjectile(p, atk.projectile);
            }
          } else if (p.attackFrame === atk.startup + 1) {
            spawnProjectile(p, atk.projectile);
          }
        }
        // BulletStorm: scatter random projectiles during active frames
        if (atk.specialType === 'bulletStorm' && p.attackFrame % 2 === 0) {
          const dir = p.facingLeft ? -1 : 1;
          const angle = (Math.random() - 0.3) * Math.PI * 0.8;
          projectiles.push({
            x: p.x + 20 * dir, y: p.y - 40,
            vx: Math.cos(angle) * 10 * dir, vy: Math.sin(angle) * 10,
            w: 10, h: 8,
            damage: 3, kbBase: 2, kbScale: 0.03, kbAngle: -15,
            life: 40, ownerId: p.id,
            color: '#FF66AA', pcolor: '#FFAACC',
            shape: 'rect', ownerCharIdx: p.charIdx, time: 0,
            homing: false, pierce: false,
          });
        }

        // Determine hit type for effects
        const ht = p.attackType === 'command' ? 'cmd' : p.attackType || 'normal';

        // Melee hitbox
        if (atk.hw > 0 && atk.hh > 0) {
          let hitbox;
          if (atk.centerHit) {
            hitbox = { x: p.x - atk.hw / 2, y: p.y + atk.hy, w: atk.hw, h: atk.hh };
          } else {
            hitbox = getAttackHitbox(p, atk);
          }

          if (atk.multiHit) {
            const sinceLastHit = p.attackFrame - p.lastHitFrame;
            const isLast = p.attackFrame >= atk.startup + atk.active - 2;
            if (sinceLastHit >= atk.hitInterval) {
              const dmg = isLast ? atk.finalDamage : atk.damage;
              const kb = isLast ? atk.finalKbBase : atk.kbBase;
              const ks = isLast ? atk.finalKbScale : atk.kbScale;
              const ka = isLast ? atk.finalKbAngle : atk.kbAngle;
              // Clear targets for multi-hit
              p.hitTargets = [];
              if (checkHitboxAgainstPlayers(p, hitbox, dmg, kb, ks, ka, ht)) {
                p.lastHitFrame = p.attackFrame;
              }
            }
          } else {
            checkHitboxAgainstPlayers(p, hitbox, atk.damage, atk.kbBase, atk.kbScale, atk.kbAngle, ht);
          }
        }
      }

      // ドスボス: ランダムキャノン - startup終了後の最初のactiveフレームで発動
      if (atk.dosbossRandom && p.attackFrame === atk.startup + 1) {
        const pattern = Math.floor(Math.random() * 3);
        p.dosbossRandomPattern = pattern;
        const dir = p.facingLeft ? -1 : 1;
        if (pattern === 0) {
          // パターンA: 通常砲撃 - 大きな砲弾
          spawnProjectile(p, { speed:11, damage:11, kbBase:6, kbScale:0.10, kbAngle:-25, w:30, h:28, life:45, color:'#CC66FF', pcolor:'#9944CC' });
          cmdNameDisplay.push({ text: '通常砲撃！', x: p.x, y: p.y - 100, life: 45, maxLife: 45, color: '#CC66FF' });
        } else if (pattern === 1) {
          // パターンB: 木投げ - スタン付き飛び道具
          const proj = { speed:9, damage:7, kbBase:3, kbScale:0.05, kbAngle:-15, w:20, h:28, life:40, color:'#44AA22', pcolor:'#33881A' };
          const pr = {
            x: p.x + 30 * dir, y: p.y - 40,
            vx: proj.speed * dir, vy: -2,
            w: proj.w, h: proj.h,
            damage: proj.damage, kbBase: proj.kbBase, kbScale: proj.kbScale, kbAngle: proj.kbAngle,
            life: proj.life, ownerId: p.id,
            color: proj.color, pcolor: proj.pcolor,
            shape: 'rect', ownerCharIdx: p.charIdx, time: 0,
            stun: true, stunFrames: 30,
            meshitero: false,
          };
          projectiles.push(pr);
          cmdNameDisplay.push({ text: '木投げ！', x: p.x, y: p.y - 100, life: 45, maxLife: 45, color: '#44AA22' });
        } else {
          // パターンC: 自爆爆発 - 自分もダメージ、周囲に大ダメージ
          // パッシブ: ドスボス(19) ランダム強化 パターンCダメージ+15%
          cmdNameDisplay.push({ text: 'BOOM!', x: p.x, y: p.y - 100, life: 60, maxLife: 60, color: '#FF6600' });
          p.damage = Math.min(999, p.damage + 6);
          const boomHitbox = { x: p.x - 70, y: p.y - 70, w: 140, h: 100 };
          const boomDmg = p.charIdx === 19 ? Math.floor(15 * 1.15) : 15;
          checkHitboxAgainstPlayers(p, boomHitbox, boomDmg, 8, 0.14, -40, 'special');
          triggerScreenShake(8, 15);
          hitFlash.alpha = 0.3;
          hitFlash.color = '#FF6600';
          hitEffects.push({ x: p.x, y: p.y - 35, life: 20, maxLife: 20, color: '#FF6600', size: 80 });
          hitEffects.push({ x: p.x, y: p.y - 35, life: 15, maxLife: 15, color: '#9944CC', size: 120, type: 'ring' });
        }
      }

      // ドスボス: デコイ設置
      if (atk.dosbossDecoy && p.attackFrame === atk.startup + 1) {
        const dir = p.facingLeft ? -1 : 1;
        const decoyX = p.x + 80 * dir;
        sparks.push({
          x: decoyX, y: p.y,
          vx: 0, vy: 0,
          life: 180, maxLife: 180,
          color: '#CC66FF',
          type: 'dosbossDecoy',
          gravity: 0, drag: 1,
          ownerId: p.id, ownerCharIdx: p.charIdx,
          decoyX: decoyX, decoyY: p.y,
        });
        cmdNameDisplay.push({ text: 'デコイ！', x: decoyX, y: p.y - 80, life: 45, maxLife: 45, color: '#CC66FF' });
      }

      // End attack
      if (p.attackFrame >= totalFrames) {
        // Show MISS if melee attack hit nobody (skip projectile-only attacks)
        if (p.hitTargets.length === 0 && atk.hw > 0) {
          const dir = p.facingLeft ? -1 : 1;
          showHitDisplay(p.x + 30 * dir, p.y, false);
          playHitSound('miss');
        }
        // セン: 満腹パワーバフ発動
        if (atk.senBuff) {
          // パッシブ: セン(18) バフ延長+15%
          p.senBuffTimer = p.charIdx === 18 ? 690 : 600; // 11.5秒 or 10秒
          cmdNameDisplay.push({ text: '満腹パワー！', x: p.x, y: p.y - 120, life: 90, maxLife: 90, color: '#FF8844' });
        }
        // 金金: お金の鎧発動
        if (atk.kingkingArmor) {
          p.kingkingArmorTimer = 600; // 10秒
          cmdNameDisplay.push({ text: 'MONEY POWER!', x: p.x, y: p.y - 120, life: 90, maxLife: 90, color: '#FFD700' });
          hitFlash.alpha = 0.25; hitFlash.color = '#FFD700';
          triggerScreenShake(5, 10);
          hitEffects.push({ x: p.x, y: p.y - 40, life: 25, maxLife: 25, color: '#FFD700', size: 60, type: 'ring' });
          hitEffects.push({ x: p.x, y: p.y - 40, life: 20, maxLife: 20, color: '#DAA520', size: 40, type: 'charGlow' });
          for (let i = 0; i < 12; i++) sparks.push({ x: p.x+(Math.random()-0.5)*40, y: p.y-40+(Math.random()-0.5)*40, vx:(Math.random()-0.5)*5, vy:-2-Math.random()*3, life:20, maxLife:20, color:i%2?'#FFD700':'#DAA520', size:3+Math.random()*2, gravity:0.1, drag:0.96 });
        }
        p.attacking = false;
        p.specialState = null;
      }

      // During attack, limited movement
      if (atk.specialType === 'shadowDash' || atk.specialType === 'slide' || atk.specialType === 'cmdCharge') {
        p.vy += getGravity(p);
        if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
        p.x += p.vx;
        p.y += p.vy;
        // ステージ範囲内にクランプ（テレポート等の画面外防止）
        if (p.x < BLAST_LEFT + 50) p.x = BLAST_LEFT + 50;
        if (p.x > BLAST_RIGHT - 50) p.x = BLAST_RIGHT - 50;
        if (p.y < BLAST_TOP + 50) p.y = BLAST_TOP + 50;
        landingCheck(p);
        blastCheck(p);
      } else if (atk.specialType !== 'jumpSlam') {
        p.vy += getGravity(p);
        if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
        if (p.grounded) {
          // 地上攻撃: 横移動を大幅制限
          p.x += p.vx * 0.3;
          p.vx *= 0.85;
        } else {
          // 空中攻撃: 慣性を維持し、入力で微調整可能
          p.x += p.vx;
          p.vx *= 0.98; // 軽い空気抵抗のみ
          // 空中攻撃中の横入力（moveXはcontinueでスキップされるのでここで取得）
          let airMoveX = 0;
          if (p.id === 0) {
            if (onlineMode && !isHost) { if (remoteKeys.left) airMoveX = -1; if (remoteKeys.right) airMoveX = 1; }
            else { if (keys['ArrowLeft']) airMoveX = -1; if (keys['ArrowRight']) airMoveX = 1; }
          } else if (p.id === 1) {
            if (onlineMode && isHost) { if (remoteKeys.left) airMoveX = -1; if (remoteKeys.right) airMoveX = 1; }
            else if (!(gameMode === 'cpu' || bossRushMode)) {
              if (onlineMode && !isHost) { if (keys['ArrowLeft']) airMoveX = -1; if (keys['ArrowRight']) airMoveX = 1; }
              else { if (keys['a'] || keys['A']) airMoveX = -1; if (keys['d'] || keys['D']) airMoveX = 1; }
            }
          }
          if (airMoveX !== 0) {
            const ch2 = characters[p.charIdx];
            const airDrift = ch2.moveSpeed * AIR_SPEED_MULT * 0.65;
            p.vx += airMoveX * AIR_ACCEL * airDrift * 0.15;
          }
        }
        p.y += p.vy;
        landingCheck(p);
        blastCheck(p);
      }
      continue;
    }

    // --- Guard handling ---
    let wantsGuard = false;
    if (p.id === 0) {
      wantsGuard = (onlineMode && !isHost) ? !!remoteKeys.s : !!(keys['s'] || keys['S']);
    } else if (p.id === 1 && (gameMode === 'cpu' || bossRushMode)) {
      const cpuTarget = players[0];
      wantsGuard = getCpuGuard(p, cpuTarget);
    } else if (onlineMode && isHost) {
      wantsGuard = !!remoteKeys.s;
    } else if (onlineMode && !isHost) {
      wantsGuard = !!(keys['s'] || keys['S']);
    } else {
      wantsGuard = !!(keys['p'] || keys['P']);
    }

    // Can only guard if grounded, not attacking, not grabbing/grabbed
    if (wantsGuard && p.grounded && !p.attacking && !p.grabbing && !p.grabbed && p.guardDurability > 0) {
      if (!p.guarding) {
        // Start guarding - set just guard window
        p.guarding = true;
        p.justGuardTimer = JUST_GUARD_WINDOW;
      }
    } else {
      p.guarding = false;
    }

    // Just guard timer countdown
    if (p.justGuardTimer > 0) p.justGuardTimer--;

    // Guard durability regen when not guarding
    if (!p.guarding && p.guardDurability < GUARD_MAX_DURABILITY) {
      p.guardDurability = Math.min(GUARD_MAX_DURABILITY, p.guardDurability + GUARD_REGEN_RATE);
    }

    // Guarding state: no movement, stay grounded, gauge decays over time
    if (p.guarding) {
      p.guardDurability -= GUARD_DECAY_RATE;
      if (p.guardDurability <= 0) {
        // Guard break from natural decay
        p.guardDurability = 0;
        p.guarding = false;
        p.guardBreakStun = GUARD_BREAK_STUN;
        hitEffects.push({ x: p.x, y: p.y - 40, life: 25, maxLife: 25, color: '#FF6600', size: 60 });
        playHitSound('guardBreak');
        triggerScreenShake(6, 15);
      }
      p.vx = 0;
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.y += p.vy;
      landingCheck(p);
      continue;
    }

    // --- Air dodge update ---
    if (p.airDodgeTimer > 0) {
      p.airDodgeTimer--;
      if (p.airDodgeTimer <= 0) {
        p.airDodging = false;
        p.airDodgeEndlag = AIR_DODGE_ENDLAG_FRAMES;
        p.vx *= 0.3;
        p.vy *= 0.3;
      }
    }
    if (p.airDodgeEndlag > 0) {
      p.airDodgeEndlag--;
    }
    if (p.airDodging) {
      // 空中回避中: 慣性維持 + 重力適用（通常通り落下する）
      p.vx *= 0.97;
      p.vy += getGravity(p) * 0.7; // 重力やや軽減
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.x += p.vx;
      p.y += p.vy;
      landingCheck(p);
      blastCheck(p);
      continue;
    }
    if (p.airDodgeEndlag > 0 && !p.grounded) {
      // 硬直中: 攻撃・移動不可、重力のみ適用
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.x += p.vx * 0.1;
      p.y += p.vy;
      p.vx *= 0.9;
      landingCheck(p);
      blastCheck(p);
      continue;
    }

    // --- Normal movement ---
    let moveX = 0;
    let jumpPress = false;

    // CPU AI for player 2
    if (p.id === 1 && (gameMode === 'cpu' || bossRushMode)) {
      const ai = getCpuInput(p, players[0]);
      moveX = ai.moveX;
      jumpPress = ai.jump;
      if (ai.command) executeCommand(p, ai.command);
      else if (ai.attack) startAttack(p, ai.attack);
      if (ai.grab) tryGrab(p);
    } else if (p.id === 0) {
      // P1: host=local keys, guest-online=remote keys
      if (onlineMode && !isHost) {
        // Guest's remote controls P1
        if (remoteKeys.left) moveX = -1;
        if (remoteKeys.right) moveX = 1;
        jumpPress = !!remoteKeys.up;
      } else {
        // Host or offline: local arrow keys
        if (keys['ArrowLeft']) moveX = -1;
        if (keys['ArrowRight']) moveX = 1;
        jumpPress = !!keys['ArrowUp'];
      }
    } else {
      // P2: host-online=remote keys, guest-online=local keys, offline=WASD
      if (onlineMode && isHost) {
        // Host receives guest's remote for P2
        if (remoteKeys.left) moveX = -1;
        if (remoteKeys.right) moveX = 1;
        jumpPress = !!remoteKeys.up;
      } else if (onlineMode && !isHost) {
        // Guest controls P2 locally with arrow keys
        if (keys['ArrowLeft']) moveX = -1;
        if (keys['ArrowRight']) moveX = 1;
        jumpPress = !!keys['ArrowUp'];
      } else {
        // Offline: WASD
        if (keys['a'] || keys['A']) moveX = -1;
        if (keys['d'] || keys['D']) moveX = 1;
        jumpPress = !!(keys['w'] || keys['W']);
      }
    }

    // 状態異常: 混乱→入力反転、呪縛→ジャンプ禁止
    if (p.confused > 0) moveX = -moveX;
    if (p.cursed > 0) jumpPress = false;

    // --- ダッシュ検出: 同方向に素早く2回入力 ---
    if (moveX !== 0 && p.grounded && !p.dashing) {
      if (moveX === p.lastMoveDir && (battleTime - p.lastMoveDirTime) < DASH_INPUT_WINDOW && p.lastMoveDirTime > 0) {
        p.dashing = true;
      }
      if (moveX !== p.lastMoveDir) {
        p.lastMoveDir = moveX;
        p.lastMoveDirTime = battleTime;
      }
    }
    if (p.dashing && !p.grounded) p.dashing = false; // 空中ではダッシュ解除

    // --- 急降下: 下キー入力で落下速度アップ ---
    let downPress = false;
    if (p.id === 0) {
      downPress = (onlineMode && !isHost) ? !!remoteKeys.down : !!keys['ArrowDown'];
    } else if (gameMode === 'cpu' || bossRushMode) {
      downPress = false;
    } else if (onlineMode && isHost) {
      downPress = !!remoteKeys.down;
    } else if (onlineMode && !isHost) {
      downPress = !!keys['ArrowDown'];
    } else {
      downPress = !!(keys['s'] || keys['S']);
    }
    if (downPress && !p.grounded && p.vy > 0 && !p.fastFalling) {
      p.fastFalling = true;
    }
    if (p.grounded) p.fastFalling = false;

    // --- 着地硬直 ---
    if (p.landLag > 0) {
      p.landLag--;
      p.vx *= 0.8; // 硬直中は減速
      p.vy += getGravity(p);
      if (p.vy > MAX_FALL_SPEED) p.vy = MAX_FALL_SPEED;
      p.y += p.vy;
      landingCheck(p);
      continue;
    }

    applyMovement(p, moveX, ch);
    if (moveX < 0) p.facingLeft = true;
    if (moveX > 0) p.facingLeft = false;

    // Update walk cycle
    if (moveX !== 0 && p.grounded) {
      p.walkCycle++;
    } else {
      p.walkCycle = 0;
    }

    // Grab detection: A key (P1), F key (P2 local), or online A key
    // Note: tryGrab is now primarily triggered from handleKeyDown on keypress,
    // but we keep continuous detection for hold-to-grab behavior
    if (p.id === 0) {
      const k0 = (onlineMode && !isHost) ? remoteKeys : null;
      const grab0 = k0 ? !!k0.a : !!(keys['a'] || keys['A']);
      if (grab0) {
        if (p.grabHoldFrames === 0 && p.grounded && !p.attacking) tryGrab(p);
        p.grabHoldFrames = 1;
      } else { p.grabHoldFrames = 0; }
    } else if (gameMode === 'vs') {
      const k1 = (onlineMode && isHost) ? remoteKeys : null;
      const grab1 = k1 ? !!k1.a : !!(keys['f'] || keys['F']);
      if (grab1) {
        if (p.grabHoldFrames === 0 && p.grounded && !p.attacking) tryGrab(p);
        p.grabHoldFrames = 1;
      } else { p.grabHoldFrames = 0; }
    }

    // Charge command update
    if (p.charging) {
      p.chargeTime++;
      // Cancel if hit or not grounded
      if (p.hitstun > 0 || !p.alive) {
        p.charging = false; p.chargeCmd = null;
      }
      // Check if attack key released → fire charge
      let attackKeyHeld;
      if (onlineMode) {
        const isRemote = (isHost && p.id === 1) || (!isHost && p.id === 0);
        attackKeyHeld = isRemote ? remoteKeys.z : (keys['z'] || keys['Z']);
      } else {
        attackKeyHeld = p.id === 0 ? (keys['z'] || keys['Z']) : (keys['u'] || keys['U']);
      }
      if (!attackKeyHeld || p.chargeTime >= p.chargeMaxTime) {
        // Release charge!
        const chargeRatio = Math.min(p.chargeTime / p.chargeMaxTime, 1); // 0→1
        const cmd = p.chargeCmd;
        p.charging = false; p.chargeCmd = null;
        if (cmd && !p.attacking && p.alive) {
          // Scale damage/knockback/size by charge ratio (1x at min → 2.5x at max)
          const scaleFactor = 1 + chargeRatio * 1.5;
          const chargedAtk = JSON.parse(JSON.stringify(cmd.attack));
          chargedAtk.damage = Math.round(chargedAtk.damage * scaleFactor);
          chargedAtk.kbBase = chargedAtk.kbBase * scaleFactor;
          chargedAtk.kbScale = chargedAtk.kbScale * scaleFactor;
          if (chargedAtk.hw) chargedAtk.hw = Math.round(chargedAtk.hw * (1 + chargeRatio * 0.5));
          if (chargedAtk.hh) chargedAtk.hh = Math.round(chargedAtk.hh * (1 + chargeRatio * 0.5));
          if (chargedAtk.projectile) {
            chargedAtk.projectile.damage = Math.round(chargedAtk.projectile.damage * scaleFactor);
            chargedAtk.projectile.w = Math.round(chargedAtk.projectile.w * (1 + chargeRatio * 0.6));
            chargedAtk.projectile.h = Math.round(chargedAtk.projectile.h * (1 + chargeRatio * 0.6));
          }
          // Execute as command
          p.attacking = true;
          p.attackType = 'command';
          p.attackFrame = 0;
          p.attackData = chargedAtk;
          p.hitTargets = [];
          p.lastHitFrame = -99;
          p.specialState = null;
          p['cd_' + cmd.cooldownKey] = 300; // 5 sec cooldown
          playHitSound('cmd');
          triggerScreenShake(3 + chargeRatio * 4, 8);
          hitFlash.alpha = 0.1 + chargeRatio * 0.15;
          hitFlash.color = characters[p.charIdx].accent;
          // Show charge release effect
          const ch2 = characters[p.charIdx];
          cmdNameDisplay.push({ text: cmd.name, x: p.x, y: p.y - 120, life: 60, maxLife: 60, color: ch2.accent });
          hitEffects.push({ x: p.x, y: p.y - 40, life: 15, maxLife: 15, color: '#FFFFFF', size: 30 + chargeRatio * 30 });
        }
      }
    }

    if (jumpPress && !p.jumpUsed && p.jumps > 0) {
      let jumpMult = 1.15; // ジャンプ初速を旧値より15%アップ
      // パッシブ: 天才(10) 復帰強化 ジャンプ力+10%（ドラゴン時+15%）
      if (p.charIdx === 10) jumpMult *= p.dragonMode ? 1.15 : 1.1;
      // ボスラッシュ: ボスジャンプ力+20%
      if (p.bossBuffed) jumpMult *= 1.1;
      // パッシブ: サム(15) 3段ジャンプ強化 3回目+15%
      if (p.charIdx === 15 && p.jumps === 1) jumpMult *= 1.15;
      // 重量別ジャンプ力調整: 軽量×0.85, 中量×0.88, 重量そのまま
      const wJump = ch.weight || 1.0;
      const jumpWeightMult = wJump >= 1.0 ? 1.0 : (wJump >= 0.8 ? 0.88 : 0.85);
      p.vy = ch.jumpPower * jumpMult * jumpWeightMult;
      p.jumps--; p.jumpUsed = true; p.grounded = false;
      p.fastFalling = false; // ジャンプ時に急降下リセット
      p.jumpSquash = 6; // jump anticipation squash
      playHitSound('jump');
    }
    if (!jumpPress) p.jumpUsed = false;

    // スマブラ風重力: 上昇=弱、頂点=極弱、落下=強（重量で差別化）
    p.vy += getGravity(p);
    // 急降下: 落下速度を倍率で加速
    const charMaxFall = getWeightMaxFall(p);
    const effectiveMaxFall = p.fastFalling ? charMaxFall * FAST_FALL_MULT : charMaxFall;
    if (p.fastFalling && p.vy > 0) p.vy = Math.min(p.vy * 1.1, effectiveMaxFall);
    if (p.vy > effectiveMaxFall) p.vy = effectiveMaxFall;
    p.x += p.vx;
    p.y += p.vy;
    const wasGroundedBefore = p.grounded;
    landingCheck(p);
    wallBounceCheck(p);
    blastCheck(p);
    checkLedgeGrab(p);

    // Landing detection - stronger squash for faster falls + dust particles + 着地硬直
    if (!wasGroundedBefore && p.grounded) {
      // 着地ゲージ増加廃止
      if (p.charIdx === 13) p.airStrongCount = 0;
      const prevVy = p.vy || 0;
      const impactStrength = Math.min(Math.abs(prevVy) / MAX_FALL_SPEED, 1);
      // パッシブ: Catbus(11) 着地強化 着地硬直-15%
      const landLagPassive = p.charIdx === 11 ? 0.85 : 1.0;
      p.landSquash = Math.floor((8 + impactStrength * 4) * landLagPassive);
      // 着地硬直フレーム（シャうでん「水流」: 空中攻撃後の着地硬直ゼロ）
      const baseLandLag = p.fastFalling ? LAND_LAG_FASTFALL : LAND_LAG_NORMAL;
      const shaudenZero = (p.charIdx === 8 && p.attacking) ? 0 : 1;
      p.landLag = Math.floor(baseLandLag * landLagPassive * shaudenZero);
      p.fastFalling = false;
      p.dashing = false;

      // ③ 着地時パーティクル（攻撃専用エフェクトがある場合はスキップ）
      if (impactStrength > 0.15 && p.specialState !== 'slamHit' && p.specialState !== 'slamming') {
        const dustCount = Math.floor(3 + impactStrength * 8);
        for (let i = 0; i < dustCount; i++) {
          const side = i % 2 === 0 ? -1 : 1;
          const speed = (1 + Math.random() * 2 + impactStrength * 3) * side;
          sparks.push({
            x: p.x + (Math.random() - 0.5) * 20,
            y: p.y,
            vx: speed,
            vy: -0.5 - Math.random() * 1.5 * impactStrength,
            life: 10 + Math.floor(Math.random() * 8),
            maxLife: 18,
            color: '#BBAA99',
            size: 1.5 + Math.random() * 2 * impactStrength,
            type: 'dust',
            gravity: 0.06,
            drag: 0.93,
          });
        }

        // 強い吹っ飛びからの着地: 衝撃波エフェクト
        if (impactStrength > 0.5 || p.hitstun > 0) {
          const shockSize = 30 + impactStrength * 50;
          hitEffects.push({
            x: p.x, y: p.y,
            life: 12, maxLife: 12,
            color: '#DDCCAA',
            size: shockSize,
            type: 'shockwave',
          });
          // 大量の埃
          for (let i = 0; i < 12; i++) {
            const a = Math.random() * Math.PI; // 上半分のみ
            const speed = 2 + Math.random() * 4 * impactStrength;
            sparks.push({
              x: p.x + (Math.random() - 0.5) * 30,
              y: p.y - 2,
              vx: Math.cos(a + Math.PI) * speed,
              vy: -Math.sin(a) * speed * 0.8,
              life: 15 + Math.floor(Math.random() * 10),
              maxLife: 25,
              color: i % 3 === 0 ? '#CCBB99' : '#998877',
              size: 2 + Math.random() * 3,
              type: 'dust',
              gravity: 0.08,
              drag: 0.92,
            });
          }
          triggerScreenShake(Math.floor(impactStrength * 4), 6);
        }
      }
    }

    // Update animation state
    p.animTimer++;
    if (p.jumpSquash > 0) p.jumpSquash--;
    if (p.landSquash > 0) p.landSquash--;
    if (p.damageTint > 0) p.damageTint--;

    // Decay spin angle when not in hitstun - smoother deceleration
    if (p.hitstun <= 0) {
      p.spinAngle *= 0.88;
      if (Math.abs(p.spinAngle) < 0.005) p.spinAngle = 0;
    }

    // Determine animation state
    if (p.grounded) {
      if (moveX !== 0) {
        p.animState = 'walk';
      } else {
        p.animState = 'idle';
      }
    } else {
      p.animState = p.vy < 0 ? 'jump' : 'fall';
    }
  }

  // キャラクター同士の押し合い
  resolvePlayerCollisions();
}

// キャラクター同士の衝突：ヒットボックスが重なったら左右に5pxずらすだけ
function resolvePlayerCollisions() {
  if (players.length < 2) return;
  const a = players[0];
  const b = players[1];
  if (!a.alive || !b.alive) return;
  // X方向チェック
  if (Math.abs(a.x - b.x) >= 36) return;
  // Y方向チェック：足のY座標の差が70以上なら衝突しない（上を飛び越えられる）
  if (Math.abs(a.y - b.y) >= 70) return;
  if (a.x <= b.x) {
    a.x -= 5;
    b.x += 5;
  } else {
    a.x += 5;
    b.x -= 5;
  }
}

function checkHitboxAgainstPlayers(attacker, hitbox, damage, kbBase, kbScale, kbAngle, hitType) {
  let hit = false;
  for (const target of players) {
    if (target.id === attacker.id || !target.alive || target.invincibleTimer > 0 || target.airDodgeTimer > 0) continue;
    if (attacker.hitTargets.includes(target.id)) continue;
    const th = getPlayerHitbox(target);
    if (hitboxCollides(hitbox.x, hitbox.y, hitbox.w, hitbox.h, th.x, th.y, th.w, th.h)) {
      applyHit(attacker, target, damage, kbBase, kbScale, kbAngle, hitType);
      attacker.hitTargets.push(target.id);
      showHitDisplay(target.x, target.y, true);
      hit = true;
    }
  }
  return hit;
}

// スマブラ風の重力計算
function getWeightGravityMult(p) {
  // weight: 0.4(lightest) ~ 1.0(mid) ~ 1.7(heaviest)
  const w = characters[p.charIdx] ? characters[p.charIdx].weight : 1.0;
  if (w >= 1.2) return 1.25;       // heavy: faster fall
  if (w >= 0.9) return 1.0;        // mid: default
  if (w >= 0.7) return 0.85;       // light: slower fall
  return 0.85;                     // ultra-light: slightly slower (was 0.75)
}
function getWeightMaxFall(p) {
  const w = characters[p.charIdx] ? characters[p.charIdx].weight : 1.0;
  if (w >= 1.2) return MAX_FALL_SPEED * 1.15;
  if (w >= 0.9) return MAX_FALL_SPEED;
  if (w >= 0.7) return MAX_FALL_SPEED * 0.88;
  return MAX_FALL_SPEED * 0.9;
}
function getGravity(p) {
  if (p.grounded) return GRAVITY;
  const wm = getWeightGravityMult(p);
  // Apex: light chars float longer
  if (Math.abs(p.vy) < APEX_THRESHOLD) {
    const apexMult = wm < 1.0 ? 0.88 : 0.92; // light: 0.88, mid/heavy: 0.92 (was 0.75/1.0)
    return GRAVITY_APEX * wm * apexMult;
  }
  if (p.vy < 0) return GRAVITY_RISE * wm;
  return GRAVITY_FALL * wm;
}

// 慣性付き速度更新
// キャラ別移動特性 [地上加速, 地上摩擦, 空中加速, 空中摩擦]
const CHAR_MOVE = [
  [0.70,0.75,0.45,0.88], // 0 zen 標準
  [0.40,0.60,0.25,0.92], // 1 don 超重量
  [1.20,0.88,0.85,0.82], // 2 saisoku 軽快
  [1.00,0.85,0.75,0.83], // 3 meteo 軽量
  [0.65,0.72,0.40,0.89], // 4 long 中量
  [0.40,0.60,0.25,0.92], // 5 uruo 超重量
  [0.50,0.65,0.30,0.91], // 6 kumatarou 重め
  [1.10,0.87,0.82,0.82], // 7 bullet 軽快
  [0.90,0.83,0.65,0.85], // 8 shawden 軽量
  [0.60,0.70,0.38,0.90], // 9 judgeman 重め
  [0.70,0.75,0.45,0.88], // 10 tensai 標準
  [1.10,0.87,0.82,0.82], // 11 catbus 軽快
  [0.35,0.55,0.20,0.93], // 12 tank 超重量
  [0.55,0.68,0.35,0.90], // 13 namioji 中重量
  [0.75,0.78,0.50,0.87], // 14 tokko 中量やや軽
  [1.00,0.85,0.78,0.83], // 15 sam 軽量
  [0.75,0.78,0.50,0.87], // 16 king 中量やや軽
  [0.60,0.70,0.38,0.90], // 17 onpa 中重量
  [0.50,0.65,0.30,0.91], // 18 sen 重め
  [0.35,0.55,0.20,0.93], // 19 dosboss 超重量
  [0.65,0.72,0.40,0.89], // 20 micro 中量
  [0.50,0.65,0.30,0.91], // 21 mrtwo 重め
  [0.50,0.65,0.30,0.91], // 22 kinkin 重め
  [1.00,0.85,0.75,0.83], // 23 satoru 軽量
  [0.85,0.82,0.62,0.85], // 24 kowai 中軽量
  [0.90,0.83,0.65,0.85], // 25 yaho 中軽量
  [1.05,0.86,0.80,0.83], // 26 poyo 軽量
  [0.65,0.72,0.40,0.89], // 27 pull 中量
  [0.70,0.75,0.45,0.88], // 28 mussy 標準
];
function applyMovement(p, moveX, ch) {
  const cm = CHAR_MOVE[p.charIdx] || [0.70,0.75,0.45,0.88];
  const accel = p.grounded ? cm[0] : cm[2];
  let friction = p.grounded ? cm[1] * STAGE_FRICTION : cm[3];
  const senSpeedMult = (p.charIdx === 18 && p.senBuffTimer > 0) ? 1.3 : 1;
  const gravDebuffMult = (p.gravityDebuffTimer > 0) ? 0.5 : 1;
  // パッシブ: サイソク(2) ダッシュ速度+15%（地上）
  const saisokuMult = (p.charIdx === 2 && p.grounded) ? 1.15 : 1;
  // パッシブ: シャうでん(8) 空中機動強化+15%（空中）
  const shaudenMult = (p.charIdx === 8 && !p.grounded) ? 1.15 : 1;
  // 地上最高速度倍率 / 空中移動速度制限（重量で差別化）
  const w = ch.weight || 1.0;
  const airWeightMult = w >= 1.2 ? 0.55 : (w >= 0.9 ? 0.65 : (w >= 0.7 ? 0.78 : 0.85));
  const speedMult = p.grounded ? GROUND_SPEED_MULT : AIR_SPEED_MULT * (airWeightMult / 0.65);
  // ダッシュ倍率
  const dashMult = (p.dashing && p.grounded) ? DASH_SPEED_MULT : 1.0;
  // D技: 天才 覚醒 速度1.3倍 / タンク 要塞化 移動不可
  const dSkillSpeedMult = p.dSkillBuff === 'tensaiBoost' ? 1.3 : p.dSkillBuff === 'fortress' ? 0 : 1.0;
  // 自己バフ: 天才「変形解放」ダメ80%↑で速度1.2倍 / Catbus「全速力」ダッシュ継続で加速
  const kkArmorSpeed = (p.charIdx === 22 && p.kingkingArmorTimer > 0) ? 1.2 : 1.0;
  const fearSpeedMult = (p.fearTimer > 0) ? 0.7 : 1.0;
  const poisonSpeedMult = (p.poisonTimer > 0) ? 0.9 : 1.0;
  const paralysisMult = (p.paralyzed > 0) ? 0.5 : 1.0;
  const dragonSpeedMult = (p.charIdx === 10 && p.dragonMode) ? 1.2 : 1.0;
  const bossSpeedMult = p.bossBuffed ? 1.15 : 1.0;
  const autoSpeedMult = ((p.charIdx === 10 && p.damage >= 80) ? 1.2 : (p.charIdx === 11 && p.dashing) ? Math.min(1.3, 1 + p.dashTimer * 0.002) : 1.0) * kkArmorSpeed * fearSpeedMult * poisonSpeedMult * dragonSpeedMult * bossSpeedMult * paralysisMult;
  if (p.charIdx === 11 && p.dashing) p.dashTimer++;
  if (!p.dashing) p.dashTimer = 0;
  const targetVx = moveX * ch.moveSpeed * senSpeedMult * gravDebuffMult * saisokuMult * shaudenMult * speedMult * dashMult * dSkillSpeedMult * autoSpeedMult;

  if (moveX !== 0) {
    // ダッシュターン: ダッシュ中に逆方向入力→少し滑る
    if (p.dashing && p.grounded && moveX !== 0 && Math.sign(p.vx) !== 0 && Math.sign(p.vx) !== moveX) {
      p.vx *= DASH_TURN_FRICTION;
      p.dashing = false;
    }
    // 入力あり: 目標速度に向かって加速
    p.vx += (targetVx - p.vx) * accel;
  } else {
    // 入力なし: 摩擦で減速
    p.vx *= friction;
    if (Math.abs(p.vx) < 0.3) p.vx = 0;
    // 地上で入力なし→ダッシュ解除
    if (p.grounded) p.dashing = false;
  }
}

// 地面バウンド判定（吹っ飛び中のみ）
function wallBounceCheck(p) {
  if (p.hitstun <= 0) return;

  // 地面バウンド（ステージ上で高速落下時）
  if (p.grounded && Math.abs(p.vy) < 1 && p.hitstun > 5) {
    // 着地直後にバウンド判定（landingCheckでvy=0にされた直後）
    const kbSpeed = Math.sqrt(p.vx * p.vx);
    if (kbSpeed > 6) {
      p.vy = -kbSpeed * 0.3;
      p.grounded = false;
      p.spinAngle += (p.vx > 0 ? 0.06 : -0.06);
    }
  }
}

function landingCheck(p) {
  p.grounded = false;
  if (p.vy >= 0) {
    const prevVy = p.vy; // 着地前の落下速度を保存
    let landed = false;
    if (p.x >= STAGE_LEFT && p.x <= STAGE_RIGHT) {
      if (p.y >= STAGE_GROUND_Y && p.y - p.vy < STAGE_GROUND_Y + 8) {
        p.y = STAGE_GROUND_Y; p.vy = 0; p.grounded = true; landed = true;
        p.jumps = p.charIdx === 15 ? 3 : 2; p.strongLocked = false;
        p.airDodgeUsed = false; p.airDodging = false; p.airDodgeTimer = 0; p.airDodgeEndlag = 0;
        if (p.attacking && p.attackData && p.attackData.specialType === 'divekick') {
          p.attacking = false; p.specialState = null; p.attackFrame = 0;
        }
      }
    }
    if (!landed) {
      for (const plat of platforms) {
        if (p.x >= plat.x && p.x <= plat.x + plat.w) {
          if (p.y >= plat.y && p.y - prevVy < plat.y + 8) {
            p.y = plat.y; p.vy = 0; p.grounded = true; landed = true;
            p.jumps = p.charIdx === 15 ? 3 : 2; p.strongLocked = false;
            p.airDodgeUsed = false; p.airDodging = false; p.airDodgeTimer = 0; p.airDodgeEndlag = 0;
            if (p.attacking && p.attackData && p.attackData.specialType === 'divekick') {
              p.attacking = false; p.specialState = null; p.attackFrame = 0;
            }
            break;
          }
        }
      }
    }
    // スパイクバウンド: 下方向に高速で叩きつけられた時
    if (landed && p.hitstun > 0 && prevVy > 8 && !p.groundBounced) {
      p.groundBounced = true;
      p.grounded = false;
      p.vy = -(prevVy * 0.5);
      p.bounceStun = 18; // 0.3秒硬直
      p.landSquash = 10; // 潰れアニメーション
      // 衝撃波エフェクト
      triggerScreenShake(8, 8);
      hitEffects.push({ x: p.x, y: p.y, life: 14, maxLife: 14, color: '#FFAA44', size: 90, type: 'ring' });
      hitEffects.push({ x: p.x, y: p.y, life: 10, maxLife: 10, color: '#FFFFFF', size: 60 });
      // 砂埃パーティクル
      for (let i = 0; i < 12; i++) {
        const a = Math.PI + (Math.random() - 0.5) * Math.PI;
        sparks.push({ x: p.x + (Math.random()-0.5)*30, y: p.y, vx: Math.cos(a)*(3+Math.random()*5), vy: -1-Math.random()*3, life: 12+Math.random()*8, maxLife: 20, color: i%3===0?'#FFFFFF':'#FFCC88', size: 2+Math.random()*2, gravity: 0.15, drag: 0.95 });
      }
    }
    // バウンド済みリセット（着地して通常着地の場合）
    if (landed && p.hitstun <= 0) p.groundBounced = false;
  }
}

function blastCheck(p) {

    const stockIdx = p.stocks; // stocks already decremented, so this is the lost stock index

    stockLossAnim = {
      active: true, playerId: p.id, life: 30, maxLife: 30,
      x: hudX + 10 + stockIdx * 22 + 7,
      y: 640 - 100 + 80 - 18 + 5,
    };

    // KO!! テキスト表示
    koDisplay = { active: true, life: 90, maxLife: 90, playerIdx: p.id };

    // 紙吹雪
    const killerIdx = p.id === 0 ? 1 : 0;
    const killerColor = characters[players[killerIdx] ? players[killerIdx].charIdx : 0].accent;
    for (let i = 0; i < 50; i++) {
      confetti.push({
        x: 100 + Math.random() * 760, y: -20 - Math.random() * 100,
        vx: (Math.random() - 0.5) * 4, vy: 1 + Math.random() * 3,
        life: 60 + Math.floor(Math.random() * 60), maxLife: 120,
        color: ['#FF4444','#FFDD00','#44AAFF','#FF66AA','#44FF88','#FF8844','#AA44FF', killerColor][i % 8],
        size: 3 + Math.random() * 5,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
        type: i % 3 === 0 ? 'rect' : i % 3 === 1 ? 'star' : 'circle',
      });
    }
    p.attacking = false;
    p.specialState = null;
    if (p.stocks <= 0) {
      gameOver = true;
      stopBGM();
      winner = p.id === 0 ? 1 : 0;
      gameSetTimer = 0; gameSetPhase = 1;
      koSlowMotion.active = true; koSlowMotion.frames = 30; koSlowMotion.maxFrames = 30;
    } else {
      p.respawnTimer = RESPAWN_TIME;
    }
  }
}

// ============================================================
// BATTLE DRAWING
// ============================================================
function updateCamera() {
  // Find alive players to track
  const alive = players.filter(p => p.alive);
  if (alive.length === 0) return;

  // Calculate bounding box of all alive players
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of alive) {
    minX = Math.min(minX, p.x);
    maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y - 70); // account for character height
    maxY = Math.max(maxY, p.y);
  }

  // Also track players in hitstun flying offscreen (but not too far)
  for (const p of players) {
    if (!p.alive && p.respawnTimer > RESPAWN_TIME - 10) {
      // Recently died - briefly track their last position
      minX = Math.min(minX, Math.max(BLAST_LEFT + 50, p.x));
      maxX = Math.max(maxX, Math.min(BLAST_RIGHT - 50, p.x));
    }
  }

  // Target center = midpoint of players
  cam.targetX = (minX + maxX) / 2;
  cam.targetY = (minY + maxY) / 2;

  // Clamp target to keep stage visible
  const stageCX = (STAGE_LEFT + STAGE_RIGHT) / 2;
  const stageCY = STAGE_GROUND_Y - 100;
  // Bias toward stage center
  cam.targetX = cam.targetX * 0.7 + stageCX * 0.3;
  cam.targetY = cam.targetY * 0.6 + stageCY * 0.4;

  // Calculate zoom based on player distance
  const spanX = (maxX - minX) + cam.padX * 2;
  const spanY = (maxY - minY) + cam.padY * 2;
  const zoomX = 960 / Math.max(spanX, 200);
  const zoomY = 640 / Math.max(spanY, 200);
  cam.targetZoom = Math.min(zoomX, zoomY);
  cam.targetZoom = Math.max(cam.minZoom, Math.min(cam.maxZoom, cam.targetZoom));

  // Fast zoom-out when players are knocked far
  const anyFastKB = players.some(p => p.alive && p.hitstun > 0 && Math.sqrt(p.vx*p.vx + p.vy*p.vy) > 12);
  const zoomSpeed = anyFastKB ? 0.15 : cam.smoothZoom;
  const posSpeed = anyFastKB ? 0.15 : cam.smoothX;

  // Smooth interpolation
  cam.x += (cam.targetX - cam.x) * posSpeed;
  cam.y += (cam.targetY - cam.y) * posSpeed;
  cam.zoom += (cam.targetZoom - cam.zoom) * zoomSpeed;

  // Clamp camera so we don't show too far outside blast zones
  const halfW = (960 / cam.zoom) / 2;
  const halfH = (640 / cam.zoom) / 2;
  const viewMinX = BLAST_LEFT + 50;
  const viewMaxX = BLAST_RIGHT - 50;
  const viewMinY = BLAST_TOP + 50;
  const viewMaxY = BLAST_BOTTOM - 50;
  cam.x = Math.max(viewMinX + halfW, Math.min(viewMaxX - halfW, cam.x));
  cam.y = Math.max(viewMinY + halfH, Math.min(viewMaxY - halfH, cam.y));
}

function drawBattle(dt) {
  // Update camera
  updateCamera();

  // Screen shake
  updateScreenShake();
  ctx.save();
  if (screenShake.duration > 0) {
    ctx.translate(screenShake.x, screenShake.y);
  }

  // ===== 背景画像 =====
  const curStage = stages[selectedStage];
  if (curStage.id === 'mahoujin') {
    ctx.drawImage(bg3Img, 0, 0, 960, 640);
  } else if (curStage.id === 'seijaku') {
    ctx.drawImage(bg2Img, 0, 0, 960, 640);
  } else {
    if (bgImg.complete && bgImg.naturalWidth > 0) {
      ctx.drawImage(bgImg, 0, 0, 960, 640);
    } else {
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, 960, 640);
    }
  }

  // === Apply dynamic camera transform ===
  ctx.save();
  ctx.translate(960 / 2, 640 / 2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  // ===== ステージ足場 =====
  const stageW = STAGE_RIGHT - STAGE_LEFT;
  const stageH = 18;
  const stageY = STAGE_GROUND_Y;

  if (curStage.id === 'mahoujin') {
    // 魔法陣の間: メインプラットフォーム（紫の魔法石床）
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.ellipse(STAGE_LEFT + stageW / 2, stageY + 28, stageW * 0.42, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    const magicPlatGrad = ctx.createLinearGradient(0, stageY - 4, 0, stageY + stageH + 20);
    magicPlatGrad.addColorStop(0, '#2a1a3a');
    magicPlatGrad.addColorStop(0.4, '#1a0a2a');
    magicPlatGrad.addColorStop(1, '#0d0518');
    ctx.fillStyle = magicPlatGrad;
    ctx.beginPath();
    ctx.moveTo(STAGE_LEFT, stageY);
    ctx.lineTo(STAGE_RIGHT, stageY);
    ctx.lineTo(STAGE_RIGHT + 8, stageY + stageH + 20);
    ctx.lineTo(STAGE_LEFT - 8, stageY + stageH + 20);
    ctx.closePath();
    ctx.fill();
    // 魔法陣ライン（上面）
    ctx.shadowColor = '#AA77FF';
    ctx.shadowBlur = 6;
    ctx.strokeStyle = 'rgba(170, 120, 255, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(STAGE_LEFT, stageY - 1); ctx.lineTo(STAGE_RIGHT, stageY - 1); ctx.stroke();
    ctx.shadowBlur = 0;
    // 魔法の紋様ライン
    ctx.strokeStyle = 'rgba(200, 170, 255, 0.2)';
    ctx.lineWidth = 1;
    for (let lx = STAGE_LEFT + 60; lx < STAGE_RIGHT; lx += 60) {
      ctx.beginPath(); ctx.moveTo(lx, stageY - 3); ctx.lineTo(lx, stageY + 2); ctx.stroke();
    }
    // 薄い光のエフェクト（メイン足場上）
    const mainGlow = ctx.createLinearGradient(STAGE_LEFT, stageY - 30, STAGE_LEFT, stageY);
    mainGlow.addColorStop(0, 'rgba(170, 120, 255, 0)');
    mainGlow.addColorStop(1, 'rgba(170, 120, 255, 0.06)');
    ctx.fillStyle = mainGlow;
    ctx.fillRect(STAGE_LEFT, stageY - 30, stageW, 30);

    // 中段・上段プラットフォーム描画
    for (const plat of platforms) {
      // 浮遊の揺れ
      const floatOfs = Math.sin(battleTime * 0.02 + plat.x * 0.01) * 2;
      const py = plat.y + floatOfs;
      // 影
      ctx.fillStyle = 'rgba(100, 60, 180, 0.15)';
      ctx.beginPath();
      ctx.ellipse(plat.x + plat.w / 2, py + 15, plat.w * 0.35, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // 石板本体
      const subGrad = ctx.createLinearGradient(0, py - 3, 0, py + 12);
      subGrad.addColorStop(0, '#3a2050');
      subGrad.addColorStop(0.5, '#2a1040');
      subGrad.addColorStop(1, '#1a0828');
      ctx.fillStyle = subGrad;
      ctx.beginPath();
      ctx.moveTo(plat.x, py);
      ctx.lineTo(plat.x + plat.w, py);
      ctx.lineTo(plat.x + plat.w + 4, py + 12);
      ctx.lineTo(plat.x - 4, py + 12);
      ctx.closePath();
      ctx.fill();
      // 金色の縁ライン
      ctx.shadowColor = '#DDAA44';
      ctx.shadowBlur = 5;
      ctx.strokeStyle = 'rgba(220, 170, 60, 0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(plat.x, py); ctx.lineTo(plat.x + plat.w, py); ctx.stroke();
      ctx.shadowBlur = 0;
      // 薄い光のエフェクト（足場上）
      const subGlow = ctx.createLinearGradient(plat.x, py - 20, plat.x, py);
      subGlow.addColorStop(0, 'rgba(170, 120, 255, 0)');
      subGlow.addColorStop(1, 'rgba(170, 120, 255, 0.05)');
      ctx.fillStyle = subGlow;
      ctx.fillRect(plat.x, py - 20, plat.w, 20);
      // 端からのオーラ
      for (let side = 0; side < 2; side++) {
        const ex = side === 0 ? plat.x : plat.x + plat.w;
        const auraAlpha = 0.15 + Math.sin(battleTime * 0.04 + side * 3 + plat.x * 0.02) * 0.08;
        ctx.fillStyle = `rgba(170, 120, 255, ${auraAlpha})`;
        ctx.beginPath();
        ctx.arc(ex, py - 3, 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (curStage.id === 'seijaku') {
    // 夜のパリ: 石畳風プラットフォーム
    // Platform shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.ellipse(STAGE_LEFT + stageW / 2, stageY + 28, stageW * 0.42, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Platform body (石畳風)
    const stonePlatGrad = ctx.createLinearGradient(0, stageY - 4, 0, stageY + stageH + 20);
    stonePlatGrad.addColorStop(0, '#2a2a2a');
    stonePlatGrad.addColorStop(0.4, '#222222');
    stonePlatGrad.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = stonePlatGrad;
    ctx.beginPath();
    ctx.moveTo(STAGE_LEFT, stageY);
    ctx.lineTo(STAGE_RIGHT, stageY);
    ctx.lineTo(STAGE_RIGHT + 8, stageY + stageH + 20);
    ctx.lineTo(STAGE_LEFT - 8, stageY + stageH + 20);
    ctx.closePath();
    ctx.fill();
    // Top surface (石畳ライン)
    const stoneTopGrad = ctx.createLinearGradient(STAGE_LEFT, stageY - 4, STAGE_RIGHT, stageY - 4);
    stoneTopGrad.addColorStop(0, '#3a3a3a');
    stoneTopGrad.addColorStop(0.5, '#4a4a4a');
    stoneTopGrad.addColorStop(1, '#3a3a3a');
    ctx.fillStyle = stoneTopGrad;
    ctx.fillRect(STAGE_LEFT, stageY - 4, stageW, 6);
    // 石畳の目地ライン
    ctx.strokeStyle = 'rgba(80, 80, 80, 0.3)';
    ctx.lineWidth = 1;
    for (let lx = STAGE_LEFT + 50; lx < STAGE_RIGHT; lx += 50) {
      ctx.beginPath(); ctx.moveTo(lx, stageY - 4); ctx.lineTo(lx, stageY + 2); ctx.stroke();
    }
    // Edge accent (細い青白ライン)
    ctx.shadowColor = '#445566';
    ctx.shadowBlur = 4;
    ctx.strokeStyle = '#556677';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(STAGE_LEFT, stageY - 1);
    ctx.lineTo(STAGE_RIGHT, stageY - 1);
    ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    // 桜ノ舞台: 和風プラットフォーム
    // Platform shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.beginPath();
    ctx.ellipse(STAGE_LEFT + stageW / 2, stageY + 30, stageW * 0.45, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // Platform body (木目風)
    const platGrad = ctx.createLinearGradient(0, stageY - 4, 0, stageY + stageH + 20);
    platGrad.addColorStop(0, '#8B5A2B');
    platGrad.addColorStop(0.3, '#7A4A1E');
    platGrad.addColorStop(1, '#4A2A0E');
    ctx.fillStyle = platGrad;
    ctx.beginPath();
    ctx.moveTo(STAGE_LEFT, stageY);
    ctx.lineTo(STAGE_RIGHT, stageY);
    ctx.lineTo(STAGE_RIGHT + 10, stageY + stageH + 20);
    ctx.lineTo(STAGE_LEFT - 10, stageY + stageH + 20);
    ctx.closePath();
    ctx.fill();
    // Top surface (畳風ライン)
    const topGrad = ctx.createLinearGradient(STAGE_LEFT, stageY - 4, STAGE_RIGHT, stageY - 4);
    topGrad.addColorStop(0, '#A0784A');
    topGrad.addColorStop(0.5, '#B8905A');
    topGrad.addColorStop(1, '#A0784A');
    ctx.fillStyle = topGrad;
    ctx.fillRect(STAGE_LEFT, stageY - 4, stageW, 6);
    // 畳 grid lines
    ctx.strokeStyle = 'rgba(60, 40, 20, 0.4)';
    ctx.lineWidth = 1;
    for (let lx = STAGE_LEFT + 40; lx < STAGE_RIGHT; lx += 40) {
      ctx.beginPath(); ctx.moveTo(lx, stageY - 4); ctx.lineTo(lx, stageY + 2); ctx.stroke();
    }
    // Center line
    ctx.strokeStyle = 'rgba(80, 50, 25, 0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(STAGE_LEFT, stageY - 1); ctx.lineTo(STAGE_RIGHT, stageY - 1); ctx.stroke();
    // Edge accent
    ctx.shadowColor = '#CC8844';
    ctx.shadowBlur = 6;
    ctx.strokeStyle = '#CC9955';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(STAGE_LEFT, stageY - 1);
    ctx.lineTo(STAGE_RIGHT, stageY - 1);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Blast zone
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.12)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.strokeRect(BLAST_LEFT, BLAST_TOP, BLAST_RIGHT - BLAST_LEFT, BLAST_BOTTOM - BLAST_TOP);
  ctx.setLineDash([]);

  // Projectiles
  for (const pr of projectiles) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, pr.life / 10);
    if (pr.shape === 'star') {
      ctx.fillStyle = pr.color;
      ctx.translate(pr.x, pr.y);
      ctx.rotate(pr.time * 0.3);
      drawStar(0, 0, pr.w * 0.6, 4, ctx);
      // Trail
      ctx.globalAlpha *= 0.3;
      ctx.fillStyle = pr.pcolor;
      drawStar(-pr.vx * 0.5, 0, pr.w * 0.4, 4, ctx);
    } else {
      // Slash projectile
      ctx.fillStyle = pr.color;
      const hw = pr.w / 2, hh = pr.h / 2;
      ctx.beginPath();
      ctx.ellipse(pr.x, pr.y, hw, hh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha *= 0.4;
      ctx.fillStyle = pr.pcolor;
      ctx.beginPath();
      ctx.ellipse(pr.x - pr.vx * 0.7, pr.y, hw * 0.7, hh * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Hit effects (enhanced)
  for (const e of hitEffects) {
    const t = 1 - e.life / e.maxLife;
    ctx.save();

    if (e.type === 'ring') {
      // 衝撃波リング - 円形に広がる
      const radius = Math.max(0, e.size * t);
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    } else if (e.type === 'charSlash') {
      // キャラ固有: 細い斬撃線
      ctx.globalAlpha = (1 - t) * 0.7;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 1.5 * (1 - t);
      const angle = Math.random() * 0.5 - 0.25 + (e.x % 2 ? 0.8 : -0.8);
      const len = e.size * (0.5 + t * 0.5);
      ctx.beginPath();
      ctx.moveTo(e.x - Math.cos(angle) * len, e.y - Math.sin(angle) * len);
      ctx.lineTo(e.x + Math.cos(angle) * len, e.y + Math.sin(angle) * len);
      ctx.stroke();
    } else if (e.type === 'charGhost') {
      // キャラ固有: 薄い残像円
      ctx.globalAlpha = (1 - t) * 0.3;
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * (1 - t * 0.5), 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'charSpark') {
      // キャラ固有: 小さなスパーク（十字）
      ctx.globalAlpha = (1 - t) * 0.7;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 1.5 * (1 - t);
      const r = e.size * (0.3 + t * 0.7);
      ctx.beginPath(); ctx.moveTo(e.x - r, e.y); ctx.lineTo(e.x + r, e.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(e.x, e.y - r); ctx.lineTo(e.x, e.y + r); ctx.stroke();
    } else if (e.type === 'charGlow') {
      // キャラ固有: 薄い光（グラデーション円）
      ctx.globalAlpha = (1 - t) * 0.5;
      const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.size * (1 - t * 0.3));
      g.addColorStop(0, e.color);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * (1 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'shockwave') {
      // 着地衝撃波 - 横に広がる半円
      ctx.globalAlpha = (1 - t) * 0.6;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * (1 - t);
      const sw = e.size * (0.3 + t * 0.7);
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, sw, sw * 0.3, 0, Math.PI, 0);
      ctx.stroke();
      // 内側の白い波
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = (1 - t) * 0.4;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, sw * 0.6, sw * 0.2, 0, Math.PI, 0);
      ctx.stroke();
    } else {
      // Outer ring
      ctx.globalAlpha = (1 - t) * 0.8;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * (1 - t);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * (0.5 + t * 0.5), 0, Math.PI * 2);
      ctx.stroke();
      // Inner flash
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = (1 - t) * 0.6;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * 0.35 * (1 - t), 0, Math.PI * 2);
      ctx.fill();
      // Cross flash on big hits
      if (e.size > 25) {
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2 * (1 - t);
        ctx.globalAlpha = (1 - t) * 0.5;
        const cr = e.size * 0.7 * (0.3 + t * 0.7);
        ctx.beginPath(); ctx.moveTo(e.x - cr, e.y); ctx.lineTo(e.x + cr, e.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(e.x, e.y - cr); ctx.lineTo(e.x, e.y + cr); ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Sparks (directional fire particles)
  for (const s of sparks) {
    const t = s.life / s.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.min(1, t * 1.5);

    if (s.type === 'dosbossDecoy') {
      ctx.globalAlpha = 0.4 + Math.sin(s.life * 0.1) * 0.15;
      ctx.fillStyle = '#CC66FF';
      ctx.beginPath(); ctx.ellipse(s.decoyX, s.decoyY - 30, 16, 28, 0, 0, Math.PI * 2); ctx.fill();
      // ? mark
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = 0.6 * t;
      ctx.fillText('?', s.decoyX, s.decoyY - 55);
      ctx.globalAlpha = 1;
      ctx.restore();
      continue;
    } else if (s.type === 'slash') {
      // Blue slash line spark
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.size * t;
      ctx.globalAlpha = t * 0.8;
      ctx.beginPath();
      ctx.moveTo(s.x - s.vx * 2, s.y - s.vy * 2);
      ctx.lineTo(s.x + s.vx, s.y + s.vy);
      ctx.stroke();
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = s.size * t * 0.3;
      ctx.globalAlpha = t * 0.5;
      ctx.stroke();
    } else if (s.type === 'explosion') {
      // Red explosion puff
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1.2 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.globalAlpha = t * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 2 * t, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'afterimage') {
      // Green afterimage streak
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.7;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.size * 0.6, s.size * 2 * t, Math.PI / 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'aura') {
      // Golden aura - glowing circle
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (0.8 + Math.sin(s.life * 0.3) * 0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.globalAlpha = t * 0.3;
      ctx.stroke();
    } else if (s.type === 'dust') {
      // 埃パーティクル - ぼやけた円がフェードアウト
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.5;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1.5 - t * 0.5), 0, Math.PI * 2);
      ctx.fill();
      // ソフトなグロー
      ctx.globalAlpha = t * 0.15;

    const th = getPlayerHitbox(target);
    if (hitboxCollides(hitbox.x, hitbox.y, hitbox.w, hitbox.h, th.x, th.y, th.w, th.h)) {
      applyHit(attacker, target, damage, kbBase, kbScale, kbAngle, hitType);
      attacker.hitTargets.push(target.id);
      showHitDisplay(target.x, target.y, true);
      hit = true;
    }
  }
  return hit;
}

// スマブラ風の重力計算
function getGravity(p) {
  if (p.grounded) return GRAVITY;
  if (Math.abs(p.vy) < APEX_THRESHOLD) return GRAVITY_APEX;
  if (p.vy < 0) return GRAVITY_RISE;
  return GRAVITY_FALL;
}

// 慣性付き速度更新
function applyMovement(p, moveX, ch) {
  const accel = p.grounded ? GROUND_ACCEL : AIR_ACCEL;
  const friction = p.grounded ? GROUND_FRICTION * STAGE_FRICTION : AIR_FRICTION;
  const targetVx = moveX * ch.moveSpeed;

  if (moveX !== 0) {
    // 入力あり: 目標速度に向かって加速
    p.vx += (targetVx - p.vx) * accel;
  } else {
    // 入力なし: 摩擦で減速
    p.vx *= friction;
    if (Math.abs(p.vx) < 0.1) p.vx = 0;
  }
}

// 壁・天井バウンド判定（吹っ飛び中のみ）
function wallBounceCheck(p) {
  if (p.hitstun <= 0) return;

  // 天井バウンド
  if (p.y <= BLAST_TOP + 10 && p.vy < -WALL_BOUNCE_THRESHOLD) {
    p.vy *= CEILING_BOUNCE_FACTOR;
    p.y = BLAST_TOP + 11;
    p.spinAngle += (p.vx > 0 ? 0.1 : -0.1);
    triggerScreenShake(3, 6);
    sparks.push({ x: p.x, y: BLAST_TOP + 10, vx: -1 + Math.random() * 2, vy: 3, life: 12, color: '#FFAA44' });
  }

  // 地面バウンド（ステージ上で高速落下時）
  if (p.grounded && Math.abs(p.vy) < 1 && p.hitstun > 5) {
    // 着地直後にバウンド判定（landingCheckでvy=0にされた直後）
    const kbSpeed = Math.sqrt(p.vx * p.vx);
    if (kbSpeed > 6) {
      p.vy = -kbSpeed * 0.3;
      p.grounded = false;
      p.spinAngle += (p.vx > 0 ? 0.06 : -0.06);
    }
  }
}

function landingCheck(p) {
  p.grounded = false;
  if (p.vy >= 0) {
    if (p.x >= STAGE_LEFT && p.x <= STAGE_RIGHT) {
      if (p.y >= STAGE_GROUND_Y && p.y - p.vy < STAGE_GROUND_Y + 8) {
        p.y = STAGE_GROUND_Y; p.vy = 0; p.grounded = true; p.jumps = 2; p.strongLocked = false;
        // divekick着地で攻撃終了
        if (p.attacking && p.attackData && p.attackData.specialType === 'divekick') {
          p.attacking = false; p.specialState = null; p.attackFrame = 0;
        }
      }
    }
    for (const plat of platforms) {
      if (p.x >= plat.x && p.x <= plat.x + plat.w) {
        if (p.y >= plat.y && p.y - p.vy < plat.y + 8) {
          p.y = plat.y; p.vy = 0; p.grounded = true; p.jumps = 2; p.strongLocked = false;
          if (p.attacking && p.attackData && p.attackData.specialType === 'divekick') {
            p.attacking = false; p.specialState = null; p.attackFrame = 0;
          }
        }
      }
    }
  }
}

function blastCheck(p) {
  if (p.x < BLAST_LEFT || p.x > BLAST_RIGHT || p.y < BLAST_TOP || p.y > BLAST_BOTTOM) {
    // ④ 撃墜時爆発エフェクト
    const ex = Math.max(BLAST_LEFT + 20, Math.min(BLAST_RIGHT - 20, p.x));
    const ey = Math.max(BLAST_TOP + 20, Math.min(BLAST_BOTTOM - 20, p.y));
    const accent = characters[p.charIdx].accent;
    const mainCol = characters[p.charIdx].color;

    blastExplosions.push({
      x: ex, y: ey,
      life: 40, maxLife: 40,
      color: accent,
      charColor: mainCol,
    });

    // 大量の火花（40粒）
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 8;
      sparks.push({
        x: ex + (Math.random() - 0.5) * 20,
        y: ey + (Math.random() - 0.5) * 20,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 20 + Math.floor(Math.random() * 20),
        maxLife: 40,
        color: i % 4 === 0 ? '#FFFFFF' : i % 4 === 1 ? accent : i % 4 === 2 ? '#FFDD44' : mainCol,
        size: 1.5 + Math.random() * 3.5,
        gravity: 0.05 + Math.random() * 0.1,
        drag: 0.98,
      });
    }

    // 星パーティクル（8個）
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
      const speed = 3 + Math.random() * 5;
      sparks.push({
        x: ex, y: ey,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        life: 25 + Math.floor(Math.random() * 15),
        maxLife: 40,
        color: i % 2 === 0 ? '#FFDD44' : '#FFFFFF',
        size: 4 + Math.random() * 3,
        type: 'star',
        gravity: 0.12,
        drag: 0.97,
        spin: (Math.random() - 0.5) * 0.3,
        angle: Math.random() * Math.PI * 2,
      });
    }

    // 大きな火の玉（4個）
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2 + Math.random() * 0.5;
      const speed = 2 + Math.random() * 3;
      sparks.push({
        x: ex, y: ey,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 20 + Math.floor(Math.random() * 10),
        maxLife: 30,
        color: accent,
        size: 5 + Math.random() * 4,
        type: 'fireball',
        gravity: 0.06,
        drag: 0.96,
      });
    }
    p.stocks--;
    p.alive = false;
    p.damage = 0;
    playHitSound('ko');
    triggerScreenShake(10, 20);
    hitFlash.alpha = 0.35;
    hitFlash.color = '#FFFFFF';
    p.attacking = false;
    p.specialState = null;
    if (p.stocks <= 0) {
      gameOver = true;
      winner = p.id === 0 ? 1 : 0;
    } else {
      p.respawnTimer = RESPAWN_TIME;
    }
  }
}

// ============================================================
// BATTLE DRAWING
// ============================================================
function drawBattle(dt) {
  // Screen shake
  updateScreenShake();
  ctx.save();
  if (screenShake.duration > 0) {
    ctx.translate(screenShake.x, screenShake.y);
  }

  // Background - 宇宙・星空
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 640);
  skyGrad.addColorStop(0, '#0a0a2e');
  skyGrad.addColorStop(0.4, '#1a1a4e');
  skyGrad.addColorStop(0.7, '#2a1a3e');
  skyGrad.addColorStop(1, '#0a0a20');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, 960, 640);

  // Stars
  const starSeed = [
    [120,45,2],[250,80,1.5],[380,30,1.8],[500,70,1.2],[650,25,2.2],[780,60,1.6],[870,40,1.4],
    [90,130,1],[200,160,1.7],[340,120,1.3],[460,150,2],[590,110,1.5],[720,140,1.8],[850,125,1.1],
    [60,220,1.6],[180,250,1.2],[310,210,1.9],[440,240,1.4],[560,200,1.7],[700,230,1.3],[820,215,2],
    [150,300,1.1],[280,280,1.5],[420,310,1.8],[550,290,1.2],[680,305,1.6],[800,275,1.4],
    [50,90,1.3],[410,55,1.1],[630,95,1.9],[760,15,1.5],[900,85,1.7],[170,190,1.4],[530,175,2.1]
  ];
  const t = Date.now() * 0.001;
  for (const [sx, sy, sr] of starSeed) {
    const twinkle = 0.5 + 0.5 * Math.sin(t * (1 + sr) + sx);
    ctx.globalAlpha = 0.3 + 0.7 * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, sr * (0.8 + 0.2 * twinkle), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Stage platform
  const stageW = STAGE_RIGHT - STAGE_LEFT;
  const stageH = 18;
  const stageY = STAGE_GROUND_Y;
  // Platform shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.beginPath();
  ctx.ellipse(STAGE_LEFT + stageW / 2, stageY + 30, stageW * 0.45, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // Platform body
  const platGrad = ctx.createLinearGradient(0, stageY - 4, 0, stageY + stageH + 20);
  platGrad.addColorStop(0, '#556688');
  platGrad.addColorStop(0.3, '#445577');
  platGrad.addColorStop(1, '#2a3344');
  ctx.fillStyle = platGrad;
  ctx.beginPath();
  ctx.moveTo(STAGE_LEFT, stageY);
  ctx.lineTo(STAGE_RIGHT, stageY);
  ctx.lineTo(STAGE_RIGHT + 10, stageY + stageH + 20);
  ctx.lineTo(STAGE_LEFT - 10, stageY + stageH + 20);
  ctx.closePath();
  ctx.fill();
  // Platform top surface
  const topGrad = ctx.createLinearGradient(STAGE_LEFT, stageY - 4, STAGE_RIGHT, stageY - 4);
  topGrad.addColorStop(0, '#8899bb');
  topGrad.addColorStop(0.5, '#aabbdd');
  topGrad.addColorStop(1, '#8899bb');
  ctx.fillStyle = topGrad;
  ctx.fillRect(STAGE_LEFT, stageY - 4, stageW, 6);
  // Edge glow
  ctx.shadowColor = '#66aaff';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = '#88bbff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(STAGE_LEFT, stageY - 1);
  ctx.lineTo(STAGE_RIGHT, stageY - 1);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Blast zone
  ctx.strokeStyle = 'rgba(255, 50, 50, 0.12)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.strokeRect(BLAST_LEFT, BLAST_TOP, BLAST_RIGHT - BLAST_LEFT, BLAST_BOTTOM - BLAST_TOP);
  ctx.setLineDash([]);

  // Projectiles
  for (const pr of projectiles) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, pr.life / 10);
    if (pr.shape === 'star') {
      ctx.fillStyle = pr.color;
      ctx.translate(pr.x, pr.y);
      ctx.rotate(pr.time * 0.3);
      drawStar(0, 0, pr.w * 0.6, 4, ctx);
      // Trail
      ctx.globalAlpha *= 0.3;
      ctx.fillStyle = pr.pcolor;
      drawStar(-pr.vx * 0.5, 0, pr.w * 0.4, 4, ctx);
    } else {
      // Slash projectile
      ctx.fillStyle = pr.color;
      const hw = pr.w / 2, hh = pr.h / 2;
      ctx.beginPath();
      ctx.ellipse(pr.x, pr.y, hw, hh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha *= 0.4;
      ctx.fillStyle = pr.pcolor;
      ctx.beginPath();
      ctx.ellipse(pr.x - pr.vx * 0.7, pr.y, hw * 0.7, hh * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Hit effects (enhanced)
  for (const e of hitEffects) {
    const t = 1 - e.life / e.maxLife;
    ctx.save();

    if (e.type === 'shockwave') {
      // 着地衝撃波 - 横に広がる半円
      ctx.globalAlpha = (1 - t) * 0.6;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * (1 - t);
      const sw = e.size * (0.3 + t * 0.7);
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, sw, sw * 0.3, 0, Math.PI, 0);
      ctx.stroke();
      // 内側の白い波
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = (1 - t) * 0.4;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, sw * 0.6, sw * 0.2, 0, Math.PI, 0);
      ctx.stroke();
    } else {
      // Outer ring
      ctx.globalAlpha = (1 - t) * 0.8;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * (1 - t);
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * (0.5 + t * 0.5), 0, Math.PI * 2);
      ctx.stroke();
      // Inner flash
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = (1 - t) * 0.6;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * 0.35 * (1 - t), 0, Math.PI * 2);
      ctx.fill();
      // Cross flash on big hits
      if (e.size > 25) {
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2 * (1 - t);
        ctx.globalAlpha = (1 - t) * 0.5;
        const cr = e.size * 0.7 * (0.3 + t * 0.7);
        ctx.beginPath(); ctx.moveTo(e.x - cr, e.y); ctx.lineTo(e.x + cr, e.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(e.x, e.y - cr); ctx.lineTo(e.x, e.y + cr); ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Sparks (directional fire particles)
  for (const s of sparks) {
    const t = s.life / s.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.min(1, t * 1.5);

    if (s.type === 'slash') {
      // Blue slash line spark
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.size * t;
      ctx.globalAlpha = t * 0.8;
      ctx.beginPath();
      ctx.moveTo(s.x - s.vx * 2, s.y - s.vy * 2);
      ctx.lineTo(s.x + s.vx, s.y + s.vy);
      ctx.stroke();
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = s.size * t * 0.3;
      ctx.globalAlpha = t * 0.5;
      ctx.stroke();
    } else if (s.type === 'explosion') {
      // Red explosion puff
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1.2 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.globalAlpha = t * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 2 * t, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'afterimage') {
      // Green afterimage streak
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.7;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.size * 0.6, s.size * 2 * t, Math.PI / 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'aura') {
      // Golden aura - glowing circle
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (0.8 + Math.sin(s.life * 0.3) * 0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.globalAlpha = t * 0.3;
      ctx.stroke();
    } else if (s.type === 'dust') {
      // 埃パーティクル - ぼやけた円がフェードアウト
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.5;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1.5 - t * 0.5), 0, Math.PI * 2);
      ctx.fill();
      // ソフトなグロー
      ctx.globalAlpha = t * 0.15;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3 * (1 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'star') {
      // 星パーティクル - 回転しながら飛ぶ
      const starAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.translate(s.x, s.y);
      ctx.rotate(starAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      drawStar(0, 0, s.size, 5, ctx);
      // 白いコア
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = t * 0.5;
      drawStar(0, 0, s.size * 0.5, 5, ctx);
    } else if (s.type === 'fireball') {
      // 火の玉 - グラデーション付きの大きな光球
      const r = s.size * (0.8 + (1 - t) * 0.4);
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.3, s.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.globalAlpha = t * 0.8;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Default spark
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * t, 0, Math.PI * 2);
      ctx.fill();
      // Bright core
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = t * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * t * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Damage numbers (floating)
  for (const d of damageNumbers) {
    const t = d.life / d.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.7 ? 1 : t / 0.7; // fade out in last 30%
    const size = Math.floor(18 * d.scale);
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = 'center';

    // Pop-in scale effect for bold (strong/special) numbers
    let popScale = 1;
    if (d.bold) {
      const age = (d.maxLife - d.life) / d.maxLife;
      if (age < 0.1) popScale = 1 + (1 - age / 0.1) * 0.4; // start big, shrink to normal
    }

    if (popScale !== 1) {
      ctx.translate(d.x, d.y);
      ctx.scale(popScale, popScale);
      ctx.translate(-d.x, -d.y);
    }

    // Outline for strong/special hits
    if (d.bold) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(d.value + '', d.x, d.y);
      // Glow
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 8;
    }
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText(d.value + '', d.x + 1, d.y + 1);
    ctx.shadowBlur = 0;
    // Main text
    ctx.fillStyle = d.color;
    ctx.fillText(d.value + '', d.x, d.y);
    ctx.restore();
  }

  // Knockback trails
  for (const tr of trails) {
    if (!tr.points || tr.points.length < 2) continue;
    const t = tr.life / tr.maxLife;
    const w = tr.width || 4;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // テーパー（先端が細い）軌跡を描画
    for (let i = 1; i < tr.points.length; i++) {
      const segT = i / tr.points.length; // 0=古い, 1=新しい
      ctx.globalAlpha = t * segT * 0.6;
      ctx.strokeStyle = tr.color;
      ctx.lineWidth = w * t * segT;
      ctx.beginPath();
      ctx.moveTo(tr.points[i - 1].x, tr.points[i - 1].y);
      ctx.lineTo(tr.points[i].x, tr.points[i].y);
      ctx.stroke();
    }
    // グロー
    ctx.globalAlpha = t * 0.12;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = (w + 4) * t;
    ctx.beginPath();
    ctx.moveTo(tr.points[0].x, tr.points[0].y);
    for (let i = 1; i < tr.points.length; i++) {
      ctx.lineTo(tr.points[i].x, tr.points[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Blast explosions (stock loss)
  for (const be of blastExplosions) {
    const t = 1 - be.life / be.maxLife;
    ctx.save();
    // Multiple expanding rings
    for (let r = 0; r < 3; r++) {
      const delay = r * 0.12;
      const rt = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
      if (rt <= 0) continue;
      ctx.globalAlpha = (1 - rt) * 0.7;
      ctx.strokeStyle = r === 0 ? '#FFF' : r === 1 ? be.color : be.charColor;
      ctx.lineWidth = (4 - r) * (1 - rt);
      ctx.beginPath();
      ctx.arc(be.x, be.y, (40 + r * 25) * rt, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Central flash
    if (t < 0.3) {
      ctx.globalAlpha = 1 - t / 0.3;
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(be.x, be.y, 25 * (1 - t / 0.3), 0, Math.PI * 2);
      ctx.fill();
    }
    // Screen flash overlay at start
    if (t < 0.08) {
      ctx.globalAlpha = 0.3 * (1 - t / 0.08);
      ctx.fillStyle = be.color;
      ctx.fillRect(0, 0, 960, 640);
    }
    ctx.restore();
  }

  // Players
  for (const p of players) {
    if (!p.alive) continue;
    ctx.save();

    if (p.invincibleTimer > 0 && Math.floor(p.invincibleTimer / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Hitstun flash + knockback afterimage
    if (p.hitstun > 0) {
      if (p.hitstun % 3 === 0) ctx.globalAlpha = 0.6;
      // Draw fading afterimage during strong knockback
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 6) {
        ctx.globalAlpha = 0.15;
        drawBattleCharacter(p.x - p.vx * 1.5, p.y - p.vy * 1.5 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        if (speed > 10) {
          ctx.globalAlpha = 0.07;
          drawBattleCharacter(p.x - p.vx * 3, p.y - p.vy * 3 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        }
        ctx.globalAlpha = p.hitstun % 3 === 0 ? 0.6 : 1;
      }
    }

    drawBattleCharacter(p.x, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);

    // Draw attack effects
    if (p.attacking && p.attackData) {
      drawAttackEffect(p);
    }

    // Guard effect
    if (p.guarding) {
      drawGuardEffect(p);
    }

    // Guard break stun effect
    if (p.guardBreakStun > 0) {
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(battleTime * 0.03) * 0.3;
      ctx.strokeStyle = '#FF6600';
      ctx.lineWidth = 2;
      // Dizzy stars
      for (let i = 0; i < 3; i++) {
        const angle = battleTime * 0.02 + i * Math.PI * 2 / 3;
        const sx = p.x + Math.cos(angle) * 18;
        const sy = p.y - 80 + Math.sin(angle) * 6;
        ctx.fillStyle = '#FFDD00';
        drawStar(sx, sy, 5, 5, ctx);
      }
      ctx.restore();
    }

    // Grab effect
    if (p.grabbing) {
      drawGrabEffect(p);
    }

    // Shadow dash / slide / charge after-image
    if (p.specialState === 'dashing' || p.specialState === 'sliding' || p.specialState === 'charging') {
      ctx.globalAlpha = 0.25;
      drawBattleCharacter(p.x - p.vx * 2, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.globalAlpha = 0.12;
      drawBattleCharacter(p.x - p.vx * 4, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
    }

    // Teleport slash flash
    if (p.specialState === 'teleSlashing') {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.ellipse(p.x, p.y - 35, 30, 45, 0, 0, Math.PI * 2); ctx.fill();
    }

    ctx.restore();

    // Player indicator
    const arrowY = p.y - 105;
    ctx.fillStyle = p.id === 0 ? '#44AAFF' : '#FF4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.id === 0 ? '1P' : (gameMode === 'cpu' ? 'CPU' : '2P'), p.x, arrowY - 8);
    ctx.beginPath();
    ctx.moveTo(p.x, arrowY + 2);
    ctx.lineTo(p.x - 6, arrowY - 4);
    ctx.lineTo(p.x + 6, arrowY - 4);
    ctx.closePath(); ctx.fill();
  }

  // HUD
  drawBattleHUD();

  // Command name display
  for (const cn of cmdNameDisplay) {
    const t = cn.life / cn.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.7 ? 1 : t / 0.7;
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = cn.color;
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FFF';
    ctx.fillText(cn.text, cn.x, cn.y);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = cn.color;
    ctx.lineWidth = 1.5;
    ctx.strokeText(cn.text, cn.x, cn.y);
    ctx.restore();
  }

  // HIT/MISS displays
  for (const hm of hitMissDisplays) {
    const t = hm.life / hm.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.6 ? 1 : t / 0.6;
    ctx.textAlign = 'center';
    if (hm.isHit) {
      // Pop-in scale
      const age = 1 - t;
      const popScale = age < 0.15 ? 1.3 - age / 0.15 * 0.3 : 1.0;
      ctx.font = `bold ${Math.floor(32 * popScale)}px sans-serif`;
      ctx.shadowColor = '#FF4444';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#880000';
      ctx.lineWidth = 3;
      ctx.strokeText('HIT!', hm.x, hm.y);
      ctx.fillStyle = '#FF2222';
      ctx.fillText('HIT!', hm.x, hm.y);
      ctx.shadowBlur = 0;
    } else {
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#888888';
      ctx.globalAlpha *= 0.7;
      ctx.fillText('MISS', hm.x, hm.y);
    }
    ctx.restore();
  }

  // Countdown
  if (battleCountdown > 0) {
    const sec = Math.ceil(battleCountdown / 60);
    ctx.font = 'bold 80px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF'; ctx.shadowColor = '#FFF'; ctx.shadowBlur = 20;
    ctx.fillText(sec.toString(), 480, 300);
    ctx.shadowBlur = 0;
  } else if (battleTime < 2500) {
    const goAlpha = Math.max(0, 1 - (battleTime - 3000) * 0.001);
    if (goAlpha > 0) {
      ctx.globalAlpha = Math.min(1, goAlpha);
      ctx.font = 'bold 90px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFDD44'; ctx.shadowColor = '#FFDD44'; ctx.shadowBlur = 20;
      ctx.fillText('GO!', 480, 300);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
  }

  // Game over
  if (gameOver && winner >= 0) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, 960, 640);
    if (battleTimer <= 0) {
      ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FF8844'; ctx.fillText('TIME UP!', 480, 230);
    }
    const wCh = characters[players[winner].charIdx];
    ctx.font = 'bold 50px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF'; ctx.shadowColor = wCh.color; ctx.shadowBlur = 20;
    const winLabel = winner === 0 ? '1P' : (gameMode === 'cpu' ? 'CPU' : '2P');
    ctx.fillText(`${winLabel} ${wCh.name} WIN!`, 480, 290);
    ctx.shadowBlur = 0;
    ctx.font = '22px sans-serif'; ctx.fillStyle = '#AAA';
    ctx.fillText('ENTER でキャラ選択に戻る', 480, 350);
  }

  // デバッグ：当たり判定の可視化（F3で切り替え）
  if (debugHitboxes) {
    for (const p of players) {
      if (!p.alive) continue;
      // プレイヤーの食らい判定（緑枠）
      const ph = getPlayerHitbox(p);
      ctx.strokeStyle = '#00FF00';
      ctx.lineWidth = 2;
      ctx.strokeRect(ph.x, ph.y, ph.w, ph.h);
      ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
      ctx.fillRect(ph.x, ph.y, ph.w, ph.h);
      // 中心点
      ctx.fillStyle = '#00FF00';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      // 座標表示
      ctx.font = '10px monospace';
      ctx.fillStyle = '#00FF00';
      ctx.textAlign = 'left';
      ctx.fillText(`P${p.id} (${Math.round(p.x)},${Math.round(p.y)})`, ph.x, ph.y - 4);
      // 攻撃判定（赤枠）
      if (p.attacking && p.attackData) {
        const atk = p.attackData;
        if (atk.hw > 0 && atk.hh > 0 && p.attackFrame >= atk.startup && p.attackFrame < atk.startup + atk.active) {
          let ah;
          if (atk.centerHit) {
            ah = { x: p.x - atk.hw / 2, y: p.y + atk.hy, w: atk.hw, h: atk.hh };
          } else {
            ah = getAttackHitbox(p, atk);
          }
          ctx.strokeStyle = '#FF0000';
          ctx.lineWidth = 2;
          ctx.strokeRect(ah.x, ah.y, ah.w, ah.h);
          ctx.fillStyle = 'rgba(255, 0, 0, 0.15)';
          ctx.fillRect(ah.x, ah.y, ah.w, ah.h);
        }
      }
    }
    // 飛び道具の判定（黄枠）
    for (const pr of projectiles) {
      ctx.strokeStyle = '#FFFF00';
      ctx.lineWidth = 1;
      ctx.strokeRect(pr.x - pr.w / 2, pr.y - pr.h / 2, pr.w, pr.h);
    }
    // 衝突範囲（水色枠）
    if (players.length >= 2 && players[0].alive && players[1].alive) {
      const a = players[0], b = players[1];
      ctx.strokeStyle = '#00FFFF';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(a.x - 18, a.y - 70, 36, 70);
      ctx.strokeRect(b.x - 18, b.y - 70, 36, 70);
      ctx.setLineDash([]);
    }
    // DEBUG表示
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DEBUG: Hitboxes ON (F3 to toggle)', 10, 20);
  }

  // End screen shake context
  ctx.restore();

  // Hit flash overlay (rendered outside shake)
  if (hitFlash.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = hitFlash.alpha;
    ctx.fillStyle = hitFlash.color;
    ctx.fillRect(0, 0, 960, 640);
    ctx.restore();
    hitFlash.alpha *= 0.75;
    if (hitFlash.alpha < 0.01) hitFlash.alpha = 0;
  }
}

function drawAttackEffect(p) {
  const atk = p.attackData;
  const frame = p.attackFrame;
  const inActive = frame > atk.startup && frame <= atk.startup + atk.active;
  if (!inActive && atk.specialType !== 'jumpSlam') return;

  const dir = p.facingLeft ? -1 : 1;
  const cx = p.x;
  const cy = p.y;

  ctx.save();

  if (atk.effect === 'slash') {
    // Sword arc
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    const startAngle = dir > 0 ? -Math.PI * 0.7 : Math.PI * 0.3;
    const sweep = Math.PI * 0.8 * t;
    ctx.arc(cx + 15 * dir, cy - 40, 45, startAngle, startAngle + sweep * dir);
    ctx.stroke();
    // White flash line at tip
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.globalAlpha = (1 - t) * 0.9;
    const tipAngle = startAngle + sweep * dir;
    const tipX = cx + 15 * dir + Math.cos(tipAngle) * 45;
    const tipY = cy - 40 + Math.sin(tipAngle) * 45;
    ctx.beginPath(); ctx.arc(tipX, tipY, 6 * (1 - t), 0, Math.PI * 2); ctx.stroke();
    // Glow
    ctx.globalAlpha = 0.3 * (1 - t);
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(cx + 15 * dir, cy - 40, 45, startAngle, startAngle + sweep * dir);
    ctx.stroke();
  }

  if (atk.effect === 'bigslash') {
    const t = (frame - atk.startup) / atk.active;
    const sx = cx + 10 * dir;
    // Main slash line
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 7;
    ctx.globalAlpha = 0.9 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(sx, cy - 65);
    ctx.lineTo(sx + 95 * dir * t, cy - 20);
    ctx.stroke();
    // White glow trail
    ctx.lineWidth = 16;
    ctx.globalAlpha = 0.25 * (1 - t);
    ctx.strokeStyle = '#FFF';
    ctx.stroke();
    // Secondary cross slash
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.6 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(sx + 20 * dir, cy - 15);
    ctx.lineTo(sx + 80 * dir * t, cy - 55);
    ctx.stroke();
    // Impact burst at end of slash
    if (t > 0.5) {
      const bt = (t - 0.5) * 2;
      ctx.globalAlpha = 0.6 * (1 - bt);
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      const bx = sx + 90 * dir, by = cy - 25;
      ctx.beginPath(); ctx.arc(bx, by, 20 * bt, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.3 * (1 - bt);
      ctx.beginPath(); ctx.arc(bx, by, 12 * (1 - bt), 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'punch') {
    const t = (frame - atk.startup) / atk.active;
    const px = cx + (20 + 20 * t) * dir;
    // Impact circle
    ctx.fillStyle = atk.color;
    ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.arc(px, cy - 35, 12 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // White spark flash
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.8 * (1 - t);
    const sparkR = 8 + 10 * t;
    for (let i = 0; i < 4; i++) {
      const a = i * Math.PI / 2 + t * Math.PI;
      ctx.beginPath();
      ctx.moveTo(px + Math.cos(a) * sparkR * 0.4, cy - 35 + Math.sin(a) * sparkR * 0.4);
      ctx.lineTo(px + Math.cos(a) * sparkR, cy - 35 + Math.sin(a) * sparkR);
      ctx.stroke();
    }
  }

  if (atk.effect === 'shockwave') {
    const t = (frame - atk.startup) / atk.active;
    const radius = 60 * t;
    // Red ground wave
    ctx.strokeStyle = '#FF4422';
    ctx.lineWidth = 5 * (1 - t);
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx - radius, cy - 5);
    ctx.quadraticCurveTo(cx, cy - 25 * (1 - t), cx + radius, cy - 5);
    ctx.stroke();
    // Second wave (delayed, smaller)
    if (t > 0.2) {
      const t2 = (t - 0.2) / 0.8;
      ctx.strokeStyle = atk.color;
      ctx.lineWidth = 3 * (1 - t2);
      ctx.globalAlpha = 0.5 * (1 - t2);
      const r2 = 45 * t2;
      ctx.beginPath();
      ctx.moveTo(cx - r2, cy - 3);
      ctx.quadraticCurveTo(cx, cy - 15 * (1 - t2), cx + r2, cy - 3);
      ctx.stroke();
    }
    // Rising dust columns
    for (let i = 0; i < 6; i++) {
      const dx = (i - 2.5) * 22 * t;
      const dustH = 15 + i * 4;
      ctx.globalAlpha = 0.35 * (1 - t);
      ctx.fillStyle = i % 2 === 0 ? '#FF6644' : '#887';
      ctx.beginPath();
      ctx.arc(cx + dx, cy - 8 - dustH * t, (5 - i * 0.5) * (1 - t), 0, Math.PI * 2);
      ctx.fill();
    }
    // Ground crack glow
    ctx.globalAlpha = 0.4 * (1 - t);
    ctx.fillStyle = '#FF2200';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 2, radius * 0.8, 6 * (1 - t), 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (atk.effect === 'slam') {
    if (p.specialState === 'slamHit') {
      const t = (frame - atk.startup) / atk.slamActive;
      // Expanding shockwave rings（適正サイズ）
      ctx.strokeStyle = atk.color;
      ctx.lineWidth = 4 * (1 - t);
      ctx.globalAlpha = 0.7 * (1 - t);
      const r = 40 * t;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      // Second ring
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = 0.3 * (1 - t);
      ctx.beginPath(); ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2); ctx.stroke();
      // Ground crack lines
      ctx.strokeStyle = '#FF6622';
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = 0.5 * (1 - t);
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * 28 * t, cy + Math.sin(a) * 12 * t + 4);
        ctx.stroke();
      }
      // Central impact flash
      if (t < 0.3) {
        ctx.fillStyle = '#FFF';
        ctx.globalAlpha = 0.6 * (1 - t / 0.3);
        ctx.beginPath(); ctx.arc(cx, cy, 14 * (1 - t / 0.3), 0, Math.PI * 2); ctx.fill();
      }
    } else if (p.specialState === 'slamming') {
      // Falling indicator with speed lines
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(cx, cy + 10);
      ctx.lineTo(cx - 10, cy - 20);
      ctx.lineTo(cx + 10, cy - 20);
      ctx.fill();
      // Speed lines above
      ctx.strokeStyle = '#FF8844';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(cx - 8 + i * 8, cy - 25);
        ctx.lineTo(cx - 8 + i * 8, cy - 50);
        ctx.stroke();
      }
    }
  }

  if (atk.effect === 'kick') {
    const t = (frame - atk.startup) / atk.active;
    const kickNum = Math.floor(t * 3);
    const kickT = (t * 3) % 1;
    ctx.fillStyle = atk.color;
    ctx.globalAlpha = 0.7 * (1 - kickT * 0.5);
    const kx = cx + (25 + kickNum * 8) * dir;
    const ky = cy - 30 - kickNum * 10;
    ctx.beginPath();
    ctx.arc(kx, ky, 10 * (1 - kickT * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // Speed lines
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(kx - 15 * dir, ky - 5 + i * 5);
      ctx.lineTo(kx - 25 * dir, ky - 5 + i * 5);
      ctx.stroke();
    }
  }

  if (atk.effect === 'dash') {
    if (p.specialState === 'dashing') {
      const t = (frame - atk.startup) / atk.active;
      // Green energy trail
      ctx.strokeStyle = '#22FFAA';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;
      for (let i = 0; i < 6; i++) {
        const ly = cy - 60 + i * 15;
        ctx.beginPath();
        ctx.moveTo(cx - 25 * dir, ly);
        ctx.lineTo(cx - (45 + i * 12) * dir, ly);
        ctx.stroke();
      }
      // Green afterimage silhouettes
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#22FFAA';
      ctx.beginPath(); ctx.ellipse(cx - p.vx * 1.5, cy - 30, 14, 30, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.12;
      ctx.beginPath(); ctx.ellipse(cx - p.vx * 3, cy - 30, 14, 30, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.06;
      ctx.beginPath(); ctx.ellipse(cx - p.vx * 4.5, cy - 30, 14, 30, 0, 0, Math.PI * 2); ctx.fill();
      // Forward energy burst
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.5 * (1 - t);
      ctx.beginPath(); ctx.arc(cx + 20 * dir, cy - 35, 10 * (0.5 + t * 0.5), 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'uppercut') {
    const t = (frame - atk.startup) / atk.active;
    const startY = cy - 20;
    // Rising arc trail
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 6 * (1 - t * 0.5);
    ctx.globalAlpha = 0.8 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, startY);
    ctx.quadraticCurveTo(cx + 15 * dir, startY - 45 * t, cx + 10 * dir, startY - 65 * t);
    ctx.stroke();
    // White glow trail
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 12 * (1 - t * 0.5);
    ctx.globalAlpha = 0.15 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, startY);
    ctx.quadraticCurveTo(cx + 15 * dir, startY - 45 * t, cx + 10 * dir, startY - 65 * t);
    ctx.stroke();
    // Fire effect (bigger)
    ctx.fillStyle = '#FF8800';
    ctx.globalAlpha = 0.6 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 10 * dir, cy - 55 - 25 * t, 14 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // Inner white flame
    ctx.fillStyle = '#FFDD44';
    ctx.globalAlpha = 0.4 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 10 * dir, cy - 55 - 25 * t, 7 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
  }

  if (atk.effect === 'rapid') {
    const t = (frame - atk.startup) / atk.active;
    const punchIdx = frame % 4;
    // Orange rapid punch impacts
    const offsets = [[15, -45], [22, -32], [12, -42], [24, -28], [18, -38], [20, -34]];
    const o = offsets[punchIdx % offsets.length];
    // Main impact
    ctx.fillStyle = '#FFAA22';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 1.2) * 0.3;
    ctx.beginPath();
    ctx.arc(cx + o[0] * dir, cy + o[1], 9, 0, Math.PI * 2);
    ctx.fill();
    // Previous punch afterglow
    const o2 = offsets[(punchIdx + 3) % offsets.length];
    ctx.fillStyle = '#FF8800';
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(cx + o2[0] * dir, cy + o2[1], 6, 0, Math.PI * 2);
    ctx.fill();
    // Speed lines (more)
    ctx.strokeStyle = '#FFCC44';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.4;
    for (let i = 0; i < 4; i++) {
      const lx = cx + (o[0] + 5) * dir;
      const ly = cy + o[1] - 6 + i * 4;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + 18 * dir, ly);
      ctx.stroke();
    }
    // Orange energy aura around fists area
    ctx.strokeStyle = '#FF6600';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.5) * 0.1;
    ctx.beginPath();
    ctx.arc(cx + 18 * dir, cy - 37, 22, 0, Math.PI * 2);
    ctx.stroke();
  }

  // --- Aerial attack effects ---
  if (atk.effect === 'airslash') {
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 10 * dir, cy - 30, 35, -Math.PI * 0.2 + t * Math.PI * 1.2, -Math.PI * 0.2 + t * Math.PI * 1.5);
    ctx.stroke();
    ctx.lineWidth = 10; ctx.globalAlpha = 0.2 * (1 - t); ctx.strokeStyle = '#FFF'; ctx.stroke();
  }

  if (atk.effect === 'airslam') {
    const t = (frame - atk.startup) / atk.active;
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx, cy + 10, 25 * t, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.4 * (1 - t);
    ctx.beginPath(); ctx.arc(cx, cy + 10, 30 * t, 0, Math.PI * 2); ctx.stroke();
  }

  if (atk.effect === 'airkick') {
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 5 * dir, cy - 30, 30, t * Math.PI * 2, t * Math.PI * 2 + Math.PI * 0.6);
    ctx.stroke();
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.5 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 25 * dir * t, cy - 35, 8, 0, Math.PI * 2); ctx.fill();
  }

  if (atk.effect === 'airknee') {
    const t = (frame - atk.startup) / atk.active;
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.7 * (1 - t);
    const kx = cx + (15 + 15 * t) * dir;
    ctx.beginPath(); ctx.arc(kx, cy - 25, 12 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.3;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(kx - 10 * dir, cy - 30 + i * 6);
      ctx.lineTo(kx - 25 * dir, cy - 30 + i * 6); ctx.stroke();
    }
  }

  // --- Down attack effects ---
  if (atk.effect === 'sweep') {
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5);
    ctx.lineTo(cx + 60 * dir * t, cy - 2);
    ctx.stroke();
    ctx.fillStyle = '#887'; ctx.globalAlpha = 0.3 * (1 - t);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(cx + (15 + i * 18) * dir * t, cy - 3, 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'lowkick') {
    const t = (frame - atk.startup) / atk.active;
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 25 * dir * t, cy - 8, 10 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
  }

  if (atk.effect === 'sliding') {
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(cx - (10 + i * 12) * dir, cy - 3 + i * 3);
      ctx.lineTo(cx - (20 + i * 12) * dir, cy - 3 + i * 3); ctx.stroke();
    }
    ctx.fillStyle = '#887'; ctx.globalAlpha = 0.3 * (1 - t);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(cx - (5 + i * 10) * dir, cy, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'crouchupper') {
    const t = (frame - atk.startup) / atk.active;
    ctx.strokeStyle = atk.color; ctx.lineWidth = 4; ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, cy - 10);
    ctx.lineTo(cx + 12 * dir, cy - 50 * t);
    ctx.stroke();
    ctx.fillStyle = '#FF8800'; ctx.globalAlpha = 0.4 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 50 * t, 8, 0, Math.PI * 2); ctx.fill();
  }

  // === COMMAND ATTACK EFFECTS ===

  // Zen cmd1: 真空波 - big blue slash wave
  if (atk.effect === 'cmdZen1') {
    const t = (frame - atk.startup) / atk.active;
    // Charging slash aura
    ctx.strokeStyle = '#44AAFF';
    ctx.lineWidth = 6 * (1 - t);
    ctx.globalAlpha = 0.8 * (1 - t);
    const startA = dir > 0 ? -Math.PI * 0.8 : Math.PI * 0.2;
    ctx.beginPath();
    ctx.arc(cx + 20 * dir, cy - 35, 55, startA, startA + Math.PI * t * dir);
    ctx.stroke();
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 12 * (1 - t); ctx.globalAlpha = 0.2 * (1 - t);
    ctx.stroke();
  }

  // Zen cmd2: 神速斬り - teleport slash
  if (atk.effect === 'cmdZen2') {
    const t = (frame - atk.startup) / atk.active;
    // Flash lines at teleport
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.7 * (1 - t);
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + t * 3;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 15, cy - 35 + Math.sin(a) * 15);
      ctx.lineTo(cx + Math.cos(a) * 50 * (0.5 + t), cy - 35 + Math.sin(a) * 50 * (0.5 + t));
      ctx.stroke();
    }
    // Giant cross slash
    ctx.strokeStyle = '#88DDFF'; ctx.lineWidth = 5 * (1 - t); ctx.globalAlpha = 0.9 * (1 - t);
    ctx.beginPath(); ctx.moveTo(cx - 40 * dir, cy - 70); ctx.lineTo(cx + 60 * dir * t, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - 40 * dir, cy); ctx.lineTo(cx + 60 * dir * t, cy - 70); ctx.stroke();
  }

  // Don cmd1: 大地砕き - massive ground shockwave
  if (atk.effect === 'cmdDon1') {
    const t = (frame - atk.startup) / atk.active;
    // Multiple expanding ground waves
    for (let w = 0; w < 3; w++) {
      const wt = Math.max(0, t - w * 0.15);
      if (wt <= 0) continue;
      const r = 80 * wt;
      ctx.strokeStyle = w === 0 ? '#FF2200' : w === 1 ? '#FF6600' : '#FF8844';
      ctx.lineWidth = (6 - w * 1.5) * (1 - wt);
      ctx.globalAlpha = 0.7 * (1 - wt);
      ctx.beginPath();
      ctx.moveTo(cx - r, cy - 5); ctx.quadraticCurveTo(cx, cy - 30 * (1 - wt), cx + r, cy - 5);
      ctx.stroke();
    }
    // Ground fracture lines
    ctx.strokeStyle = '#FF4400'; ctx.lineWidth = 3 * (1 - t); ctx.globalAlpha = 0.6 * (1 - t);
    for (let i = 0; i < 10; i++) {
      const fx = (i - 4.5) * 18 * t;
      ctx.beginPath(); ctx.moveTo(cx + fx, cy - 3); ctx.lineTo(cx + fx * 1.2, cy + 10); ctx.stroke();
    }
    // Central explosion
    if (t < 0.3) {
      ctx.fillStyle = '#FFF'; ctx.globalAlpha = 0.8 * (1 - t / 0.3);
      ctx.beginPath(); ctx.arc(cx, cy - 10, 30 * (1 - t / 0.3), 0, Math.PI * 2); ctx.fill();
    }
  }

  // Don cmd2: 鬼突進 - charging rush
  if (atk.effect === 'cmdDon2') {
    if (p.specialState === 'charging') {
      const t = (frame - atk.startup) / atk.active;
      // Red energy aura
      ctx.fillStyle = '#FF2200'; ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.ellipse(cx + 15 * dir, cy - 35, 25, 40, 0, 0, Math.PI * 2); ctx.fill();
      // Speed lines
      ctx.strokeStyle = '#FF6644'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6;
      for (let i = 0; i < 7; i++) {
        const ly = cy - 65 + i * 12;
        ctx.beginPath(); ctx.moveTo(cx - 20 * dir, ly); ctx.lineTo(cx - (60 + i * 8) * dir, ly); ctx.stroke();
      }
      // Fire trail
      ctx.fillStyle = '#FF8800'; ctx.globalAlpha = 0.4;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.arc(cx - (20 + i * 15) * dir, cy - 30 + Math.sin(frame * 0.5 + i) * 8, 8 - i, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // Saisoku cmd1: 手裏剣嵐 - shuriken storm (aura only, projectiles handled in update)
  if (atk.effect === 'cmdSaisoku1') {
    const t = (frame - atk.startup) / atk.active;
    // Spinning green aura
    ctx.strokeStyle = '#44FFAA'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 4; i++) {
      const a = frame * 0.15 + i * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(cx + 10 * dir, cy - 35, 25, a, a + Math.PI * 0.4);
      ctx.stroke();
    }
    // Wind effect
    ctx.strokeStyle = '#88FFCC'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.3;
    for (let i = 0; i < 5; i++) {
      const wy = cy - 55 + i * 10;
      ctx.beginPath(); ctx.moveTo(cx, wy); ctx.lineTo(cx + (30 + i * 5) * dir, wy + 2); ctx.stroke();
    }
  }

  // Saisoku cmd2: 瞬身乱舞 - clone rush
  if (atk.effect === 'cmdSaisoku2') {
    if (p.specialState === 'cloneRush') {
      const t = (frame - atk.startup) / atk.active;
      // 4 clone afterimages at different positions
      const cloneOffsets = [[-30, -10], [20, -20], [-15, 10], [35, -5]];
      const activeClone = Math.floor(t * 4) % 4;
      for (let i = 0; i < 4; i++) {
        const cAlpha = i === activeClone ? 0.5 : 0.15;
        ctx.globalAlpha = cAlpha * (1 - t * 0.5);
        ctx.fillStyle = '#22FFAA';
        const ox = cloneOffsets[i][0] * dir;
        const oy = cloneOffsets[i][1];
        ctx.beginPath(); ctx.ellipse(cx + ox, cy + oy - 30, 12, 28, 0, 0, Math.PI * 2); ctx.fill();
      }
      // Slash marks per clone
      ctx.strokeStyle = '#AAFFDD'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6 * (1 - t);
      const slashIdx = frame % 4;
      const so = cloneOffsets[slashIdx];
      ctx.beginPath();
      ctx.moveTo(cx + so[0] * dir - 15 * dir, cy + so[1] - 45);
      ctx.lineTo(cx + so[0] * dir + 25 * dir, cy + so[1] - 15);
      ctx.stroke();
    }
  }

  // Meteor cmd1: 百裂拳 (enhanced rapid punches)
  if (atk.effect === 'cmdMeteo1') {
    const t = (frame - atk.startup) / atk.active;
    const punchIdx = frame % 6;
    const offsets = [[18, -48], [24, -32], [14, -44], [26, -28], [20, -40], [22, -36]];
    const o = offsets[punchIdx];
    // Multiple simultaneous impacts
    ctx.fillStyle = '#FFAA00'; ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(cx + o[0] * dir, cy + o[1], 10, 0, Math.PI * 2); ctx.fill();
    // Previous punch
    const o2 = offsets[(punchIdx + 3) % 6];
    ctx.fillStyle = '#FF6600'; ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(cx + o2[0] * dir, cy + o2[1], 7, 0, Math.PI * 2); ctx.fill();
    // Intense speed lines
    ctx.strokeStyle = '#FFCC44'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 6; i++) {
      const lx = cx + (o[0] + 8) * dir;
      const ly = cy + o[1] - 8 + i * 3;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 22 * dir, ly); ctx.stroke();
    }
    // Fire aura
    ctx.strokeStyle = '#FF4400'; ctx.lineWidth = 3; ctx.globalAlpha = 0.25 + Math.sin(frame * 0.3) * 0.1;
    ctx.beginPath(); ctx.arc(cx + 18 * dir, cy - 37, 28, 0, Math.PI * 2); ctx.stroke();
  }

  // Meteor cmd2: 昇天拳MAX - super uppercut
  if (atk.effect === 'cmdMeteo2') {
    const t = (frame - atk.startup) / atk.active;
    const startY = cy - 20;
    // Giant rising arc
    ctx.strokeStyle = '#FF8800'; ctx.lineWidth = 8 * (1 - t * 0.5); ctx.globalAlpha = 0.9 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, startY);
    ctx.quadraticCurveTo(cx + 20 * dir, startY - 55 * t, cx + 12 * dir, startY - 80 * t);
    ctx.stroke();
    // White glow
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 16 * (1 - t); ctx.globalAlpha = 0.2 * (1 - t);
    ctx.stroke();
    // Big fire
    ctx.fillStyle = '#FF6600'; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 60 - 30 * t, 18 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFDD44'; ctx.globalAlpha = 0.5 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 60 - 30 * t, 10 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
    // Explosion ring at peak
    if (t > 0.6) {
      const rt = (t - 0.6) / 0.4;
      ctx.strokeStyle = '#FFAA00'; ctx.lineWidth = 3 * (1 - rt); ctx.globalAlpha = 0.6 * (1 - rt);
      ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 80, 30 * rt, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Long command effects
  if (atk.effect === 'cmdLong1') {
    // Drill charge: spinning cyan drill effect
    const t = (frame - atk.startup) / atk.active;
    ctx.save();
    ctx.translate(cx + 30 * dir * t, cy);
    ctx.rotate(t * Math.PI * 8);
    ctx.strokeStyle = '#44FFCC'; ctx.lineWidth = 4 * (1 - t * 0.3); ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(0, 0, 15 + 5 * t, 0, Math.PI * 1.5); ctx.stroke();
    ctx.strokeStyle = '#88AAFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(0, 0, 22 + 5 * t, 0, Math.PI); ctx.stroke();
    ctx.restore();
    // Trail sparks
    for (let i = 0; i < 3; i++) {
      const tx = cx - (20 + i * 15) * dir * t;
      ctx.fillStyle = '#44FFCC'; ctx.globalAlpha = 0.3 * (1 - i * 0.25);
      ctx.beginPath(); ctx.arc(tx, cy - 5 + Math.sin(frame * 0.5 + i) * 8, 4 - i, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'cmdLong2') {
    // Extended spear: long cyan beam
    const t = (frame - atk.startup) / atk.active;
    const beamLen = 140 * Math.min(1, t * 2);
    // Main beam
    ctx.strokeStyle = '#A0B4FF'; ctx.lineWidth = 6 * (1 - t * 0.3); ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.moveTo(cx + 15 * dir, cy); ctx.lineTo(cx + (15 + beamLen) * dir, cy); ctx.stroke();
    // Inner glow
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.7 * (1 - t * 0.5);
    ctx.beginPath(); ctx.moveTo(cx + 15 * dir, cy); ctx.lineTo(cx + (15 + beamLen) * dir, cy); ctx.stroke();
    // Spear tip glow
    ctx.fillStyle = '#44FFCC'; ctx.globalAlpha = 0.8 * (1 - t * 0.3);
    ctx.beginPath(); ctx.arc(cx + (15 + beamLen) * dir, cy, 8 * (1 - t * 0.5), 0, Math.PI * 2); ctx.fill();
    // Electric crackle
    if (Math.random() > 0.4) {
      ctx.strokeStyle = '#44FFCC'; ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
      const sx = cx + (15 + Math.random() * beamLen) * dir;
      ctx.beginPath(); ctx.moveTo(sx, cy - 5); ctx.lineTo(sx + (Math.random() - 0.5) * 10, cy - 12 - Math.random() * 8); ctx.stroke();
    }
  }

  ctx.restore();
}

// --- Draw guard state ---
function drawGuardEffect(p) {
  if (!p.guarding) return;
  ctx.save();

  const durRatio = p.guardDurability / GUARD_MAX_DURABILITY;
  const isJustGuard = p.justGuardTimer > 0;

  // Shield bubble
  const shieldRadius = 38;
  if (isJustGuard) {
    // Just guard: bright white shield
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.9;
    ctx.shadowColor = '#FFFFFF';
    ctx.shadowBlur = 20;
  } else {
    // Normal guard: colored shield based on durability
    const r = Math.floor(255 * (1 - durRatio));
    const g = Math.floor(200 * durRatio);
    const b = Math.floor(255 * durRatio);
    ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.3 + durRatio * 0.4;
  }

  ctx.beginPath();
  ctx.arc(p.x, p.y - 35, shieldRadius, 0, Math.PI * 2);
  ctx.stroke();

  // Shield fill
  if (isJustGuard) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
  } else {
    ctx.fillStyle = `rgba(100, 180, 255, ${0.05 + durRatio * 0.1})`;
  }
  ctx.fill();
  ctx.shadowBlur = 0;

  // Durability bar under shield
  const barW = 40, barH = 4;
  const barX = p.x - barW / 2, barY = p.y + 8;
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  const fillColor = durRatio > 0.5 ? '#44DDFF' : durRatio > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillStyle = fillColor;
  ctx.fillRect(barX, barY, barW * durRatio, barH);

  ctx.restore();
}

// --- Draw grab state ---
function drawGrabEffect(p) {
  if (!p.grabbing) return;
  const target = players.find(pp => pp.id === p.grabTarget);
  if (!target) return;

  ctx.save();
  // Grab circle
  const t = Math.sin(battleTime * 0.01) * 0.3 + 0.5;
  ctx.strokeStyle = '#FFAA00';
  ctx.lineWidth = 2;
  ctx.globalAlpha = t;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc((p.x + target.x) / 2, (p.y + target.y) / 2 - 35, 35, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // "THROW!" hint
  ctx.globalAlpha = 0.6 + Math.sin(battleTime * 0.008) * 0.3;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFAA00';
  const throwKey = p.id === 0 ? 'X で投げる' : (gameMode === 'cpu' ? '' : 'I で投げる');
  if (throwKey) ctx.fillText(throwKey, p.x, p.y - 110);
  ctx.restore();
}

function drawBattleHUD() {
  // Timer
  const mins = Math.floor(battleTimer / 60);
  const secs = battleTimer % 60;
  const timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  roundRect(ctx, 430, 10, 100, 44, 8); ctx.fill();
  ctx.strokeStyle = battleTimer <= 30 ? '#FF4444' : '#888';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 430, 10, 100, 44, 8); ctx.stroke();
  ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = battleTimer <= 30 ? '#FF4444' : '#FFF';
  if (battleTimer <= 10) { ctx.shadowColor = '#FF4444'; ctx.shadowBlur = 10; }
  ctx.fillText(timeStr, 480, 40); ctx.shadowBlur = 0;

  drawPlayerHUD(120, 530, players[0], '1P', '#44AAFF');
  const p2Label = gameMode === 'cpu' ? 'CPU' : '2P';
  drawPlayerHUD(600, 530, players[1], p2Label, '#FF4444');
}

function drawPlayerHUD(x, y, player, label, color) {
  const ch = characters[player.charIdx];
  const w = 240, h = 90;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  roundRect(ctx, x, y, w, h, 8); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 8); ctx.stroke();

  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = color; ctx.fillText(label, x + 10, y + 20);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText(ch.name, x + 40, y + 20);

  const dmgStr = Math.floor(player.damage) + '%';
  let dmgColor = '#FFFFFF';
  if (player.damage >= 100) dmgColor = '#FFDD44';
  if (player.damage >= 200) dmgColor = '#FF8844';
  if (player.damage >= 300) dmgColor = '#FF4444';
  ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = dmgColor; ctx.shadowColor = dmgColor; ctx.shadowBlur = 8;
  ctx.fillText(dmgStr, x + w / 2, y + 62); ctx.shadowBlur = 0;

  ctx.textAlign = 'left';
  for (let i = 0; i < MAX_STOCKS; i++) {
    const sx = x + 10 + i * 22, sy = y + h - 18;
    if (i < player.stocks) {
      ctx.fillStyle = ch.color;
      ctx.beginPath(); ctx.arc(sx + 7, sy + 5, 7, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(sx + 7, sy + 5, 7, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Guard durability bar
  const guardRatio = player.guardDurability / GUARD_MAX_DURABILITY;
  const gbX = x + 120, gbY = y + h - 14, gbW = 110, gbH = 6;
  ctx.fillStyle = '#222';
  roundRect(ctx, gbX, gbY, gbW, gbH, 3); ctx.fill();
  const guardColor = guardRatio > 0.5 ? '#44BBDD' : guardRatio > 0.25 ? '#DDAA22' : '#DD4422';
  ctx.fillStyle = player.guardBreakStun > 0 ? '#FF2200' : guardColor;
  roundRect(ctx, gbX, gbY, gbW * guardRatio, gbH, 3); ctx.fill();
  ctx.font = '9px sans-serif'; ctx.fillStyle = '#AAA';
  ctx.fillText('GUARD', gbX + 1, gbY - 2);
}

// ============================================================
// TRANSITIONS & INPUT
// ============================================================
function startTransition(target) {
  if (transitioning) return;
  transitioning = true;
  transitionTarget = target;
}

function drawTransition() {
  if (!transitioning && selectTransition <= 0) return;
  if (transitioning) {
    selectTransition = Math.min(1, selectTransition + 0.04);
    if (selectTransition >= 1) {
      scene = transitionTarget;
      transitioning = false;
      if (scene === 'select') { p1Confirmed = false; p2Confirmed = false; modeSelected = false; }
      else if (scene === 'difficulty') { difficultyTime = 0; difficultySelected = 1; }
      else if (scene === 'battle') { initBattle(); }
    }
  } else {
    selectTransition = Math.max(0, selectTransition - 0.04);
  }
  if (selectTransition > 0) {
    ctx.fillStyle = `rgba(0, 0, 0, ${selectTransition})`;
    ctx.fillRect(0, 0, 960, 640);
  }
}

// Process a keydown event for a specific player
function processPlayerKeydown(key, p, playerId, keyState) {
  // Direction commands
  if (key === 'ArrowDown') addCmdInput(playerId, 'D');
  if (key === 'ArrowUp') addCmdInput(playerId, 'U');
  if (key === 'ArrowLeft') addCmdInput(playerId, 'L');
  if (key === 'ArrowRight') addCmdInput(playerId, 'R');
  // Normal attack (Z)
  if (key === 'z' || key === 'Z') {
    if (p.grabbing) {
      const target = players.find(pp => pp.id === p.grabTarget);
      if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
    } else {
      const cmd = checkCommandInput(p);
      if (cmd && executeCommand(p, cmd)) { }
      else if (!p.grounded && keyState['ArrowDown']) startAttack(p, 'downair');
      else if (!p.grounded) startAttack(p, 'aerial');
      else if (keyState['ArrowUp']) startAttack(p, 'up');
      else if (keyState['ArrowLeft'] || keyState['ArrowRight']) startAttack(p, 'side');
      else if (keyState['ArrowDown']) startAttack(p, 'down');
      else startAttack(p, 'normal');
    }
  }
  // Strong attack (X)
  if (key === 'x' || key === 'X') {
    if (p.grabbing) {
      let dx = 0, dy = 0;
      if (keyState['ArrowLeft']) dx = -1;
      if (keyState['ArrowRight']) dx = 1;
      if (keyState['ArrowUp']) dy = -1;
      if (keyState['ArrowDown']) dy = 1;
      executeThrow(p, dx, dy);
    } else {
      startAttack(p, 'strong');
    }
  }
  // Special (C)
  if (key === 'c' || key === 'C') startAttack(p, 'special');
  // Guard (V)
  if (key === 'v' || key === 'V') {
    if (p.grounded && !p.attacking && !p.guarding && p.guardDurability > 0 && p.guardBreakStun <= 0) {
      p.guarding = true;
      p.justGuardTimer = typeof JUST_GUARD_WINDOW !== 'undefined' ? JUST_GUARD_WINDOW : 6;
    }
  }
}

function handleKeyDown(e) {
  // Init audio context on first interaction (required by browsers)
  if (!audioCtx) { try { getAudioCtx(); } catch(ex) {} }
  if (transitioning) return;

  if (scene === 'title') {
    if (e.key === 'Enter' || e.key === ' ') startTransition('select');
  } else if (scene === 'select') {
    // Mode selection phase
    if (!modeSelected) {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        gameMode = gameMode === 'vs' ? 'cpu' : 'vs';
      }
      if (e.key === 'Enter') {
        modeSelected = true;
        p1Confirmed = false;
        p2Confirmed = false;
        if (gameMode === 'cpu') {
          // In CPU mode, P2 defaults to a different char
          if (p2Select === p1Select) p2Select = (p1Select + 1) % characters.length;
        }
      }
      if (e.key === 'Escape') startTransition('title');
      return;
    }

    // Character select phase
    if (gameMode === 'cpu') {
      // CPU mode: P1 selects, A/D changes CPU char
      if (!p1Confirmed) {
        const n = characters.length;
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'a' || e.key === 'A') p2Select = (p2Select + n - 1) % n;
        if (e.key === 'd' || e.key === 'D') p2Select = (p2Select + 1) % n;
        if (e.key === 'Enter') { p1Confirmed = true; p2Confirmed = true; }
      } else if (e.key === 'Enter' && p1Confirmed) {
        startTransition('difficulty'); return;
      }
    } else {
      // VS mode: original 2P controls
      const n = characters.length;
      if (!p1Confirmed) {
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'Enter') p1Confirmed = true;
      } else if (e.key === 'Enter' && p1Confirmed && p2Confirmed) {
        startTransition('battle'); return;
      }
      if (!p2Confirmed) {
        if (e.key === 'a' || e.key === 'A') p2Select = (p2Select + n - 1) % n;
        if (e.key === 'd' || e.key === 'D') p2Select = (p2Select + 1) % n;
        if (e.key === ' ') { p2Confirmed = true; e.preventDefault(); }
      }
    }

    if (e.key === 'Escape') {
      if (p1Confirmed || p2Confirmed) { p1Confirmed = false; p2Confirmed = false; }
      else { modeSelected = false; }
    }
  } else if (scene === 'difficulty') {
    if (e.key === 'ArrowLeft') difficultySelected = Math.max(0, difficultySelected - 1);
    if (e.key === 'ArrowRight') difficultySelected = Math.min(2, difficultySelected + 1);
    if (e.key === 'Enter') {
      cpuDifficulty = difficultySelected;
      startTransition('battle');
    }
    if (e.key === 'Escape') startTransition('select');
  } else if (scene === 'battle') {
    if (gameOver && e.key === 'Enter') {
      startTransition('select'); return;
    }
    if (!battleStarted || gameOver) return;
    const p1 = players[0], p2 = players[1];

    // P1 direction input for commands
    if (e.key === 'ArrowDown') addCmdInput(0, 'D');
    if (e.key === 'ArrowUp') addCmdInput(0, 'U');
    if (e.key === 'ArrowLeft') addCmdInput(0, 'L');
    if (e.key === 'ArrowRight') addCmdInput(0, 'R');

    // P1 attacks: Z X C
    if (e.key === 'z' || e.key === 'Z') {
      if (p1.grabbing) {
        const target = players.find(pp => pp.id === p1.grabTarget);
        if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
      } else {
        // Check command input first
        const cmd = checkCommandInput(p1);
        if (cmd && executeCommand(p1, cmd)) {
          // Command executed
        } else if (!p1.grounded && keys['ArrowDown']) {
          startAttack(p1, 'downair');
        } else if (!p1.grounded) {
          startAttack(p1, 'aerial');
        } else if (keys['ArrowUp']) {
          startAttack(p1, 'up');
        } else if (keys['ArrowLeft'] || keys['ArrowRight']) {
          startAttack(p1, 'side');
        } else if (keys['ArrowDown']) {
          startAttack(p1, 'down');
        } else {
          startAttack(p1, 'normal');
        }
      }
    }
    if (e.key === 'x' || e.key === 'X') {
      if (p1.grabbing) {
        // Throw! direction from arrow keys
        let dx = 0, dy = 0;
        if (keys['ArrowLeft']) dx = -1;
        if (keys['ArrowRight']) dx = 1;
        if (keys['ArrowUp']) dy = -1;
        if (keys['ArrowDown']) dy = 1;
        executeThrow(p1, dx, dy);
      } else {
        startAttack(p1, 'strong');
      }
    }
    if (e.key === 'c' || e.key === 'C') startAttack(p1, 'special');

    // P2 attacks: U I O (only in VS mode)
    if (gameMode === 'vs') {
      // P2 direction input for commands
      if (e.key === 's' || e.key === 'S') addCmdInput(1, 'D');
      if (e.key === 'w' || e.key === 'W') addCmdInput(1, 'U');
      if (e.key === 'a' || e.key === 'A') addCmdInput(1, 'L');
      if (e.key === 'd' || e.key === 'D') addCmdInput(1, 'R');

      if (e.key === 'u' || e.key === 'U') {
        if (p2.grabbing) {
          const target = players.find(pp => pp.id === p2.grabTarget);
          if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
        } else {
          const cmd = checkCommandInput(p2);
          if (cmd && executeCommand(p2, cmd)) {
            // Command executed
          } else if (!p2.grounded && (keys['s'] || keys['S'])) {
            startAttack(p2, 'downair');
          } else if (!p2.grounded) {
            startAttack(p2, 'aerial');
          } else if (keys['w'] || keys['W']) {
            startAttack(p2, 'up');
          } else if (keys['a'] || keys['A'] || keys['d'] || keys['D']) {
            startAttack(p2, 'side');
          } else if (keys['s'] || keys['S']) {
            startAttack(p2, 'down');
          } else {
            startAttack(p2, 'normal');
          }
        }
      }
      if (e.key === 'i' || e.key === 'I') {
        if (p2.grabbing) {
          let dx = 0, dy = 0;
          if (keys['a'] || keys['A']) dx = -1;
          if (keys['d'] || keys['D']) dx = 1;
          if (keys['w'] || keys['W']) dy = -1;
          if (keys['s'] || keys['S']) dy = 1;
          executeThrow(p2, dx, dy);
        } else {
          startAttack(p2, 'strong');
        }
      }
      if (e.key === 'o' || e.key === 'O') startAttack(p2, 'special');
    }
  }
}

canvas.addEventListener('click', (e) => {
  if (transitioning) return;
  if (scene === 'title') startTransition('select');
});

// ============================================================
// MAIN LOOP - 60FPS固定タイムステップ
// ============================================================
let lastTime = performance.now();
const FIXED_DT = 1000 / 60; // 16.667ms per frame
let accumulator = 0;

function gameLoop(timestamp) {
  let elapsed = timestamp - lastTime;
  lastTime = timestamp;

  // Cap elapsed to prevent spiral of death (e.g. tab was hidden)
  if (elapsed > 200) elapsed = FIXED_DT;

  accumulator += elapsed;

  // Fixed timestep updates for consistent physics
  let updated = false;
  while (accumulator >= FIXED_DT) {
    if (scene === 'battle') {
      updateBattle(FIXED_DT);
    }
    accumulator -= FIXED_DT;
    updated = true;
  }

  // Render every frame for smooth visuals
  ctx.clearRect(0, 0, 960, 640);

  if (scene === 'title') {
    drawTitle(FIXED_DT);
  } else if (scene === 'select') {
    drawSelect(FIXED_DT);
  } else if (scene === 'difficulty') {
    drawDifficulty(FIXED_DT);
  } else if (scene === 'battle') {
    drawBattle(FIXED_DT);
  }

  drawTransition();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>

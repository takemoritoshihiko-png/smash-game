// ============================================================
function playVsIntroFanfare() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const masterGain = ac.createGain();
    masterGain.gain.setValueAtTime(0.15, now);
    masterGain.connect(ac.destination);

    const notes = [
      // Fanfare melody: dramatic ascending brass-like
      { freq: 261.6, start: 0,    dur: 0.2,  type: 'square' },   // C4
      { freq: 329.6, start: 0.2,  dur: 0.2,  type: 'square' },   // E4
      { freq: 392.0, start: 0.4,  dur: 0.2,  type: 'square' },   // G4
      { freq: 523.3, start: 0.6,  dur: 0.4,  type: 'square' },   // C5
      { freq: 392.0, start: 1.0,  dur: 0.15, type: 'square' },   // G4
      { freq: 523.3, start: 1.15, dur: 0.6,  type: 'square' },   // C5 (hold)
      // Harmony layer
      { freq: 196.0, start: 0,    dur: 0.4,  type: 'triangle' }, // G3
      { freq: 261.6, start: 0.4,  dur: 0.4,  type: 'triangle' }, // C4
      { freq: 329.6, start: 0.8,  dur: 0.4,  type: 'triangle' }, // E4
      { freq: 392.0, start: 1.15, dur: 0.6,  type: 'triangle' }, // G4
      // Second phrase
      { freq: 587.3, start: 1.9,  dur: 0.15, type: 'square' },   // D5
      { freq: 659.3, start: 2.05, dur: 0.15, type: 'square' },   // E5
      { freq: 784.0, start: 2.2,  dur: 0.6,  type: 'square' },   // G5
      { freq: 392.0, start: 1.9,  dur: 0.9,  type: 'triangle' }, // G4
      { freq: 523.3, start: 1.9,  dur: 0.9,  type: 'triangle' }, // C5
    ];

    const oscNodes = [];
    for (const n of notes) {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = n.type;
      osc.frequency.setValueAtTime(n.freq, now + n.start);
      g.gain.setValueAtTime(0, now + n.start);
      g.gain.linearRampToValueAtTime(n.type === 'square' ? 0.4 : 0.25, now + n.start + 0.02);
      g.gain.setValueAtTime(n.type === 'square' ? 0.35 : 0.2, now + n.start + n.dur * 0.7);
      g.gain.linearRampToValueAtTime(0, now + n.start + n.dur);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now + n.start);
      osc.stop(now + n.start + n.dur + 0.05);
      oscNodes.push(osc);
    }

    vsIntroFanfareNodes = { masterGain, oscNodes };
  } catch (e) { /* ignore audio errors */ }
}

function stopVsIntroFanfare() {
  if (vsIntroFanfareNodes) {
    try {
      vsIntroFanfareNodes.masterGain.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 0.3);
    } catch (e) {}
    vsIntroFanfareNodes = null;
  }
}

function drawVsIntro(dt) {
  const t = vsIntroTime / VS_INTRO_DURATION; // 0→1
  const ch1 = characters[p1Select];
  const ch2 = characters[p2Select];

  // Background - split screen with animated stripes
  // Left side (P1 - red)
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, 480, 640);
  ctx.clip();
  const leftGrad = ctx.createLinearGradient(0, 0, 480, 640);
  leftGrad.addColorStop(0, '#4a0a0a');
  leftGrad.addColorStop(0.5, '#7a1a1a');
  leftGrad.addColorStop(1, '#3a0808');
  ctx.fillStyle = leftGrad;
  ctx.fillRect(0, 0, 480, 640);
  // Animated diagonal stripes
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#FF4444';
  const stripeOffset = (vsIntroTime * 2) % 80;
  for (let i = -20; i < 30; i++) {
    const sx = i * 80 + stripeOffset;
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx + 40, 0);
    ctx.lineTo(sx + 40 - 200, 640);
    ctx.lineTo(sx - 200, 640);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Right side (P2 - blue)
  ctx.save();
  ctx.beginPath();
  ctx.rect(480, 0, 480, 640);
  ctx.clip();
  const rightGrad = ctx.createLinearGradient(480, 0, 960, 640);
  rightGrad.addColorStop(0, '#0a0a4a');
  rightGrad.addColorStop(0.5, '#1a1a7a');
  rightGrad.addColorStop(1, '#08083a');
  ctx.fillStyle = rightGrad;
  ctx.fillRect(480, 0, 480, 640);
  // Animated diagonal stripes (opposite direction)
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#4444FF';
  const stripeOffset2 = (vsIntroTime * 2) % 80;
  for (let i = -20; i < 30; i++) {
    const sx = 480 + i * 80 - stripeOffset2;
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx + 40, 0);
    ctx.lineTo(sx + 40 + 200, 640);
    ctx.lineTo(sx + 200, 640);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Center divider - glowing diagonal line
  ctx.save();
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(510, 0);
  ctx.lineTo(450, 640);
  ctx.stroke();
  ctx.strokeStyle = '#FFDD44';
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(512, 0);
  ctx.lineTo(452, 640);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(508, 0);
  ctx.lineTo(448, 640);
  ctx.stroke();
  ctx.restore();

  // Character slide-in animation
  const slideEase = Math.min(1, vsIntroTime / 30); // 0.5 sec slide-in
  const eased = 1 - Math.pow(1 - slideEase, 3); // ease-out cubic

  // P1 character (slide from left)
  const p1X = -100 + eased * 340; // final position: 240
  ctx.save();
  ctx.globalAlpha = eased;
  drawBattleCharacter(p1X, 350, 2.0, p1Select, vsIntroTime, false, null);
  ctx.restore();

  // P2 character (slide from right)
  const p2X = 1060 - eased * 340; // final position: 720
  ctx.save();
  ctx.globalAlpha = eased;
  drawBattleCharacter(p2X, 350, 2.0, p2Select, vsIntroTime, true, null);
  ctx.restore();

  // Character glow effect behind each character
  if (eased > 0.5) {
    const glowAlpha = (eased - 0.5) * 0.3;
    // P1 glow
    ctx.save();
    ctx.globalAlpha = glowAlpha;
    const g1 = ctx.createRadialGradient(p1X, 330, 10, p1X, 330, 100);
    g1.addColorStop(0, ch1.accent);
    g1.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g1;
    ctx.beginPath();
    ctx.arc(p1X, 330, 100, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // P2 glow
    ctx.save();
    ctx.globalAlpha = glowAlpha;
    const g2 = ctx.createRadialGradient(p2X, 330, 10, p2X, 330, 100);
    g2.addColorStop(0, ch2.accent);
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(p2X, 330, 100, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // VS text - appears after characters slide in
  const vsDelay = 25;
  if (vsIntroTime > vsDelay) {
    const vsT = Math.min(1, (vsIntroTime - vsDelay) / 15);
    const vsEase = 1 - Math.pow(1 - vsT, 3);
    const vsScale = vsT < 0.5 ? 0.3 + vsT * 4 : 2.3 - (vsT - 0.5) * 2.6;
    const finalScale = Math.max(1, vsScale);

    ctx.save();
    ctx.translate(480, 280);
    ctx.scale(finalScale, finalScale);
    ctx.globalAlpha = vsEase;

    // VS glow
    ctx.shadowColor = '#FFDD44';
    ctx.shadowBlur = 30;
    ctx.font = 'bold 80px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 8;
    ctx.strokeText('VS', 0, 0);
    // Yellow border
    ctx.strokeStyle = '#FFAA00';
    ctx.lineWidth = 4;
    ctx.strokeText('VS', 0, 0);
    // White fill
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('VS', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Character names and types at bottom
  const nameDelay = 35;
  if (vsIntroTime > nameDelay) {
    const nameT = Math.min(1, (vsIntroTime - nameDelay) / 20);
    const nameEase = 1 - Math.pow(1 - nameT, 2);

    // P1 info (left)
    ctx.save();
    ctx.globalAlpha = nameEase;
    // Name background
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(20, 490, 300, 70);
    ctx.fillStyle = ch1.color;
    ctx.fillRect(20, 490, 4, 70);
    // Name
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(ch1.name, 40, 525);
    // Type
    ctx.font = '16px sans-serif';
    ctx.fillStyle = ch1.accent;
    ctx.fillText(ch1.type, 40, 548);
    // Player label
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#FF6666';
    ctx.fillText('1P', 290, 510);
    ctx.restore();

    // P2 info (right)
    ctx.save();
    ctx.globalAlpha = nameEase;
    // Name background
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(640, 490, 300, 70);
    ctx.fillStyle = ch2.color;
    ctx.fillRect(936, 490, 4, 70);
    // Name
    ctx.font = 'bold 30px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(ch2.name, 920, 525);
    // Type
    ctx.font = '16px sans-serif';
    ctx.fillStyle = ch2.accent;
    ctx.fillText(ch2.type, 920, 548);
    // Player label
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#6666FF';
    ctx.textAlign = 'left';
    ctx.fillText(gameMode === 'cpu' ? 'CPU' : '2P', 650, 510);
    ctx.restore();
  }

  // "Press ENTER to skip" hint
  if (vsIntroTime > 60) {
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(vsIntroTime * 0.08) * 0.2;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#AAA';
    ctx.fillText('ENTER でスキップ', 480, 620);
    ctx.restore();
  }
}

// ============================================================
// TRANSITIONS & INPUT
// ============================================================
function startTransition(target) {
  if (transitioning) return;
  transitioning = true;
  transitionTarget = target;
}

function drawTransition() {
  if (!transitioning && selectTransition <= 0) return;
  if (transitioning) {
    selectTransition = Math.min(1, selectTransition + 0.04);
    if (selectTransition >= 1) {
      scene = transitionTarget;
      transitioning = false;
      if (scene === 'select') { p1Confirmed = false; p2Confirmed = false; modeSelected = false; }
      else if (scene === 'difficulty') { difficultyTime = 0; difficultySelected = 1; }
      else if (scene === 'vsintro') { vsIntroTime = 0; playVsIntroFanfare(); }
      else if (scene === 'battle') { initBattle(); }
    }
  } else {
    selectTransition = Math.max(0, selectTransition - 0.04);
  }
  if (selectTransition > 0) {
    ctx.fillStyle = `rgba(0, 0, 0, ${selectTransition})`;
    ctx.fillRect(0, 0, 960, 640);
  }
}

// Process a keydown event for a specific player
function processPlayerKeydown(key, p, playerId, keyState) {
  // Direction commands
  if (key === 'ArrowDown') addCmdInput(playerId, 'D');
  if (key === 'ArrowUp') addCmdInput(playerId, 'U');
  if (key === 'ArrowLeft') addCmdInput(playerId, 'L');
  if (key === 'ArrowRight') addCmdInput(playerId, 'R');
  // Normal attack (Z)
  if (key === 'z' || key === 'Z') {
    if (p.grabbing) {
      const target = players.find(pp => pp.id === p.grabTarget);
      if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
    } else {
      const cmd = checkCommandInput(p);
      if (cmd && executeCommand(p, cmd)) { }
      else if (!p.grounded && keyState['ArrowDown']) startAttack(p, 'downair');
      else if (!p.grounded) startAttack(p, 'aerial');
      else if (keyState['ArrowUp']) startAttack(p, 'up');
      else if (keyState['ArrowLeft'] || keyState['ArrowRight']) startAttack(p, 'side');
      else if (keyState['ArrowDown']) startAttack(p, 'down');
      else startAttack(p, 'normal');
    }
  }
  // Strong attack (X)
  if (key === 'x' || key === 'X') {
    if (p.grabbing) {
      let dx = 0, dy = 0;
      if (keyState['ArrowLeft']) dx = -1;
      if (keyState['ArrowRight']) dx = 1;
      if (keyState['ArrowUp']) dy = -1;
      if (keyState['ArrowDown']) dy = 1;
      executeThrow(p, dx, dy);
    } else {
      startAttack(p, 'strong');
    }
  }
  // Special (C)
  if (key === 'c' || key === 'C') {
    if (!(p.charIdx === 10 && !p.dragonMode && p.damage >= 80 && p.dragonCooldown <= 0 && p.grounded)) {
      startAttack(p, 'special');
    }
  }
  // Guard (V)
  if (key === 'v' || key === 'V') {
    if (p.grounded && !p.attacking && !p.guarding && p.guardDurability > 0 && p.guardBreakStun <= 0) {
      p.guarding = true;
      p.justGuardTimer = typeof JUST_GUARD_WINDOW !== 'undefined' ? JUST_GUARD_WINDOW : 6;
    }
  }
}

function handleKeyDown(e) {
  // Init audio context on first interaction (required by browsers)
  if (!audioCtx) { try { getAudioCtx(); } catch(ex) {} }
  if (transitioning) return;

  if (scene === 'title') {
    if (e.key === 'Enter' || e.key === ' ') startTransition('select');
    if (e.key === 'o' || e.key === 'O') startTransition('online');
  } else if (scene === 'online') {
    if (e.key === 'Escape') {
      if (peer) { peer.destroy(); peer = null; }
      peerConn = null;
      onlineMode = false;
      onlineState = 'menu';
      onlineInputId = '';
      onlineError = '';
      startTransition('title');
    }
    if (onlineState === 'menu') {
      if (e.key === 'h' || e.key === 'H') {
        startHosting();
      } else if (e.key === 'j' || e.key === 'J') {
        onlineInputFocused = true;
      } else if (onlineInputFocused) {
        if (e.key === 'Backspace') {
          onlineInputId = onlineInputId.slice(0, -1);
        } else if (e.key === 'Enter' && onlineInputId.length >= 4) {
          joinRoom(onlineInputId);
        } else if (e.key.length === 1 && /[0-9]/.test(e.key) && onlineInputId.length < 6) {
          onlineInputId += e.key;
        }
      }
    }
    if (onlineState === 'connected') {
      // Auto-transition to select screen
      onlineMode = true;
      gameMode = 'vs';
      modeSelected = true;
      p1Confirmed = false;
      p2Confirmed = false;
      startTransition('select');
    }
    e.preventDefault();
    return;
  } else if (scene === 'select') {
    // Mode selection phase
    if (!modeSelected) {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        gameMode = gameMode === 'vs' ? 'cpu' : 'vs';
      }
      if (e.key === 'Enter') {
        modeSelected = true;
        p1Confirmed = false;
        p2Confirmed = false;
        if (gameMode === 'cpu') {
          // In CPU mode, P2 defaults to a different char
          if (p2Select === p1Select) p2Select = (p1Select + 1) % characters.length;
        }
      }
      if (e.key === 'Escape') startTransition('title');
      return;
    }

    // Character select phase
    if (gameMode === 'cpu') {
      // CPU mode: P1 selects, A/D changes CPU char
      if (!p1Confirmed) {
        const n = characters.length;
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'a' || e.key === 'A') p2Select = (p2Select + n - 1) % n;
        if (e.key === 'd' || e.key === 'D') p2Select = (p2Select + 1) % n;
        if (e.key === 'Enter') { p1Confirmed = true; p2Confirmed = true; }
      } else if (e.key === 'Enter' && p1Confirmed) {
        startTransition('difficulty'); return;
      }
    } else if (onlineMode) {
      // Online VS mode: arrows select local char, Enter confirms & sends
      const n = characters.length;
      if (isHost) {
        if (!p1Confirmed) {
          if (e.key === 'ArrowLeft') { p1Select = (p1Select + n - 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p1Select }); }
          if (e.key === 'ArrowRight') { p1Select = (p1Select + 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p1Select }); }
          if (e.key === 'Enter') { p1Confirmed = true; if (peerConn) peerConn.send({ type: 'charConfirm', charIdx: p1Select }); }
        }
        if (p1Confirmed && p2Confirmed && e.key === 'Enter') {
          if (peerConn) peerConn.send({ type: 'startBattle', charIdx: p1Select });
          startTransition('vsintro'); return;
        }
      } else {
        // Guest controls P2 selection but displayed as P2
        if (!p2Confirmed) {
          if (e.key === 'ArrowLeft') { p2Select = (p2Select + n - 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p2Select }); }
          if (e.key === 'ArrowRight') { p2Select = (p2Select + 1) % n; if (peerConn) peerConn.send({ type: 'charSelect', charIdx: p2Select }); }
          if (e.key === 'Enter') { p2Confirmed = true; if (peerConn) peerConn.send({ type: 'charConfirm', charIdx: p2Select }); }
        }
      }
    } else {
      // Local VS mode: original 2P controls
      const n = characters.length;
      if (!p1Confirmed) {
        if (e.key === 'ArrowLeft') p1Select = (p1Select + n - 1) % n;
        if (e.key === 'ArrowRight') p1Select = (p1Select + 1) % n;
        if (e.key === 'Enter') p1Confirmed = true;
      } else if (e.key === 'Enter' && p1Confirmed && p2Confirmed) {
        startTransition('vsintro'); return;
      }
      if (!p2Confirmed) {
        if (e.key === 'a' || e.key === 'A') p2Select = (p2Select + n - 1) % n;
        if (e.key === 'd' || e.key === 'D') p2Select = (p2Select + 1) % n;
        if (e.key === ' ') { p2Confirmed = true; e.preventDefault(); }
      }
    }

    if (e.key === 'Escape') {
      if (p1Confirmed || p2Confirmed) { p1Confirmed = false; p2Confirmed = false; }
      else { modeSelected = false; }
    }
  } else if (scene === 'difficulty') {
    if (e.key === 'ArrowLeft') difficultySelected = Math.max(0, difficultySelected - 1);
    if (e.key === 'ArrowRight') difficultySelected = Math.min(2, difficultySelected + 1);
    if (e.key === 'Enter') {
      cpuDifficulty = difficultySelected;
      startTransition('vsintro');
    }
    if (e.key === 'Escape') startTransition('select');
  } else if (scene === 'vsintro') {
    if (e.key === 'Enter' || e.key === ' ') {
      stopVsIntroFanfare();
      startTransition('battle');
    }
  } else if (scene === 'battle') {
    if (gameOver && e.key === 'Enter') {
      startTransition('select'); return;
    }
    if (!battleStarted || gameOver) return;
    const p1 = players[0], p2 = players[1];

    // P1 direction input for commands
    if (e.key === 'ArrowDown') addCmdInput(0, 'D');
    if (e.key === 'ArrowUp') addCmdInput(0, 'U');
    if (e.key === 'ArrowLeft') addCmdInput(0, 'L');
    if (e.key === 'ArrowRight') addCmdInput(0, 'R');

    // P1 attacks: Z X C
    if (e.key === 'z' || e.key === 'Z') {
      if (p1.grabbing) {
        const target = players.find(pp => pp.id === p1.grabTarget);
        if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
      } else {
        // Check command input first
        const cmd = checkCommandInput(p1);
        if (cmd && cmd.chargeCmd) {
          // Charge command: start charging
          if (!p1.charging && !p1.attacking) {
            p1.charging = true; p1.chargeTime = 0; p1.chargeCmd = cmd;
          }
        } else if (cmd && executeCommand(p1, cmd)) {
          // Command executed
        } else if (!p1.grounded && keys['ArrowDown']) {
          startAttack(p1, 'downair');
        } else if (!p1.grounded) {
          startAttack(p1, 'aerial');
        } else if (p1.grounded && Math.abs(p1.vx) > 3 && (keys['ArrowLeft'] || keys['ArrowRight'])) {
          startAttack(p1, 'dash');
        } else if (keys['ArrowUp']) {
          startAttack(p1, 'up');
        } else if (keys['ArrowLeft'] || keys['ArrowRight']) {
          startAttack(p1, 'side');
        } else if (keys['ArrowDown']) {
          startAttack(p1, 'down');
        } else {
          startAttack(p1, 'normal');
        }
      }
    }
    if (e.key === 'x' || e.key === 'X') {
      if (p1.grabbing) {
        // Throw! direction from arrow keys
        let dx = 0, dy = 0;
        if (keys['ArrowLeft']) dx = -1;
        if (keys['ArrowRight']) dx = 1;
        if (keys['ArrowUp']) dy = -1;
        if (keys['ArrowDown']) dy = 1;
        executeThrow(p1, dx, dy);
      } else {
        startAttack(p1, 'strong');
      }
    }
    if (e.key === 'c' || e.key === 'C') {
      // 天才: 変形条件を満たしている場合はspecial攻撃を抑制（長押し変形用）
      if (!(p1.charIdx === 10 && !p1.dragonMode && p1.damage >= 80 && p1.dragonCooldown <= 0 && p1.grounded)) {
        startAttack(p1, 'special');
      }
    }

    // P2 attacks: U I O (only in VS mode)
    if (gameMode === 'vs') {
      // P2 direction input for commands
      if (e.key === 's' || e.key === 'S') addCmdInput(1, 'D');
      if (e.key === 'w' || e.key === 'W') addCmdInput(1, 'U');
      if (e.key === 'a' || e.key === 'A') addCmdInput(1, 'L');
      if (e.key === 'd' || e.key === 'D') addCmdInput(1, 'R');

      if (e.key === 'u' || e.key === 'U') {
        if (p2.grabbing) {
          const target = players.find(pp => pp.id === p2.grabTarget);
          if (target) { target.damage = Math.min(999, target.damage + 2); hitEffects.push({x:target.x,y:target.y-40,life:6,maxLife:6,color:'#FFF',size:10}); }
        } else {
          const cmd = checkCommandInput(p2);
          if (cmd && cmd.chargeCmd) {
            if (!p2.charging && !p2.attacking) {
              p2.charging = true; p2.chargeTime = 0; p2.chargeCmd = cmd;
            }
          } else if (cmd && executeCommand(p2, cmd)) {
            // Command executed
          } else if (!p2.grounded && (keys['s'] || keys['S'])) {
            startAttack(p2, 'downair');
          } else if (!p2.grounded) {
            startAttack(p2, 'aerial');
          } else if (p2.grounded && Math.abs(p2.vx) > 3 && (keys['a'] || keys['A'] || keys['d'] || keys['D'])) {
            startAttack(p2, 'dash');
          } else if (keys['w'] || keys['W']) {
            startAttack(p2, 'up');
          } else if (keys['a'] || keys['A'] || keys['d'] || keys['D']) {
            startAttack(p2, 'side');
          } else if (keys['s'] || keys['S']) {
            startAttack(p2, 'down');
          } else {
            startAttack(p2, 'normal');
          }
        }
      }
      if (e.key === 'i' || e.key === 'I') {
        if (p2.grabbing) {
          let dx = 0, dy = 0;
          if (keys['a'] || keys['A']) dx = -1;
          if (keys['d'] || keys['D']) dx = 1;
          if (keys['w'] || keys['W']) dy = -1;
          if (keys['s'] || keys['S']) dy = 1;
          executeThrow(p2, dx, dy);
        } else {
          startAttack(p2, 'strong');
        }
      }
      if (e.key === 'o' || e.key === 'O') {
        if (!(p2.charIdx === 10 && !p2.dragonMode && p2.damage >= 80 && p2.dragonCooldown <= 0 && p2.grounded)) {
          startAttack(p2, 'special');
        }
      }
    }
  }
}

canvas.addEventListener('click', (e) => {
  if (transitioning) return;
  if (scene === 'title') startTransition('select');
});

// ============================================================
// MAIN LOOP - 60FPS固定タイムステップ
// ============================================================
let lastTime = performance.now();
const FIXED_DT = 1000 / 60; // 16.667ms per frame
let accumulator = 0;

function gameLoop(timestamp) {
  let elapsed = timestamp - lastTime;
  lastTime = timestamp;

  // Cap elapsed to prevent spiral of death (e.g. tab was hidden)
  if (elapsed > 200) elapsed = FIXED_DT;

  accumulator += elapsed;

  // Fixed timestep updates for consistent physics
  let updated = false;
  while (accumulator >= FIXED_DT) {
    if (scene === 'vsintro') {
      vsIntroTime++;
      if (vsIntroTime >= VS_INTRO_DURATION && !transitioning) {
        stopVsIntroFanfare();
        startTransition('battle');
      }
    } else if (scene === 'battle') {
      if (hitStopFrames > 0) {
        hitStopFrames--;
      } else if (koSlowMotion.active) {
        // ③ スローモーション: 3フレームに1回だけ更新
        koSlowMotion.frames++;
        if (koSlowMotion.frames >= koSlowMotion.maxFrames) {
          koSlowMotion.active = false;
        }
        if (koSlowMotion.frames % 3 === 0) {
          updateBattle(FIXED_DT);
        }
      } else {
        updateBattle(FIXED_DT);
      }
      // Online: send keys and process remote attacks
      if (onlineMode) {
        sendOnlineKeys();
        // Process remote player's attack key presses (edge detection)
        const remotePlayerId = isHost ? 1 : 0;
        const rp = players[remotePlayerId];
        if (rp && rp.alive && battleStarted && !gameOver) {
          const rk = remoteKeys;
          const prk = prevRemoteKeys;
          // Z pressed (normal/command attack)
          if (rk.z && !prk.z) {
            const cmd = checkCommandInput(rp);
            if (cmd && cmd.chargeCmd) {
              if (!rp.charging && !rp.attacking) { rp.charging = true; rp.chargeTime = 0; rp.chargeCmd = cmd; }
            } else if (cmd && executeCommand(rp, cmd)) {
            } else if (!rp.grounded && rk.down) { startAttack(rp, 'downair');
            } else if (!rp.grounded) { startAttack(rp, 'aerial');
            } else if (rp.grounded && Math.abs(rp.vx) > 3 && (rk.left || rk.right)) { startAttack(rp, 'dash');
            } else if (rk.up) { startAttack(rp, 'up');
            } else if (rk.left || rk.right) { startAttack(rp, 'side');
            } else if (rk.down) { startAttack(rp, 'down');
            } else { startAttack(rp, 'normal'); }
          }
          // X pressed (strong/throw)
          if (rk.x && !prk.x) {
            if (rp.grabbing) {
              let dx = 0, dy = 0;
              if (rk.left) dx = -1; if (rk.right) dx = 1;
              if (rk.up) dy = -1; if (rk.down) dy = 1;
              executeThrow(rp, dx, dy);
            } else { startAttack(rp, 'strong'); }
          }
          // C pressed (special)
          if (rk.c && !prk.c) {
            if (!(rp.charIdx === 10 && !rp.dragonMode && rp.damage >= 80 && rp.dragonCooldown <= 0 && rp.grounded)) {
              startAttack(rp, 'special');
            }
          }
          // V pressed (guard)
          if (rk.v && !prk.v) {
            if (rp.grounded && !rp.attacking && !rp.guarding && rp.guardDurability > 0 && rp.guardBreakStun <= 0) {
              rp.guarding = true;
              rp.justGuardTimer = typeof JUST_GUARD_WINDOW !== 'undefined' ? JUST_GUARD_WINDOW : 6;
            }
          }
          // V released (guard release)
          if (!rk.v && prk.v) { rp.guarding = false; }
          // Direction commands
          if (rk.down && !prk.down) addCmdInput(remotePlayerId, 'D');
          if (rk.up && !prk.up) addCmdInput(remotePlayerId, 'U');
          if (rk.left && !prk.left) addCmdInput(remotePlayerId, 'L');
          if (rk.right && !prk.right) addCmdInput(remotePlayerId, 'R');
        }
        prevRemoteKeys = { ...remoteKeys };
      }
    }
    accumulator -= FIXED_DT;
    updated = true;
  }

  // Render every frame for smooth visuals
  ctx.clearRect(0, 0, 960, 640);

  if (scene === 'title') {
    drawTitle(FIXED_DT);
  } else if (scene === 'online') {
    drawOnlineLobby(FIXED_DT);
  } else if (scene === 'select') {
    drawSelect(FIXED_DT);
  } else if (scene === 'difficulty') {
    drawDifficulty(FIXED_DT);
  } else if (scene === 'vsintro') {
    drawVsIntro(FIXED_DT);
  } else if (scene === 'battle') {
    drawBattle(FIXED_DT);
  }

  drawTransition();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>

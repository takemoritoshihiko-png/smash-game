      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3 * (1 - t * 0.3), 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === 'star') {
      // 星パーティクル - 回転しながら飛ぶ
      const starAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.translate(s.x, s.y);
      ctx.rotate(starAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      drawStar(0, 0, s.size, 5, ctx);
      // 白いコア
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = t * 0.5;
      drawStar(0, 0, s.size * 0.5, 5, ctx);
    } else if (s.type === 'heart') {
      // ハートパーティクル
      const heartAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.translate(s.x, s.y);
      ctx.rotate(heartAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      ctx.beginPath();
      const hs = s.size;
      ctx.moveTo(0, hs * 0.3);
      ctx.bezierCurveTo(-hs, -hs * 0.3, -hs * 0.3, -hs, 0, -hs * 0.4);
      ctx.bezierCurveTo(hs * 0.3, -hs, hs, -hs * 0.3, 0, hs * 0.3);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.globalAlpha = t * 0.4;
      ctx.beginPath();
      const hs2 = hs * 0.5;
      ctx.moveTo(0, hs2 * 0.3);
      ctx.bezierCurveTo(-hs2, -hs2 * 0.3, -hs2 * 0.3, -hs2, 0, -hs2 * 0.4);
      ctx.bezierCurveTo(hs2 * 0.3, -hs2, hs2, -hs2 * 0.3, 0, hs2 * 0.3);
      ctx.fill();
    } else if (s.type === 'bolt') {
      // 稲妻パーティクル
      ctx.translate(s.x, s.y);
      const boltAngle = (s.angle || 0) + (s.spin || 0) * (s.maxLife - s.life);
      ctx.rotate(boltAngle);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = t * 0.9;
      const bs = s.size;
      ctx.beginPath();
      ctx.moveTo(-bs * 0.3, -bs);
      ctx.lineTo(bs * 0.15, -bs * 0.15);
      ctx.lineTo(bs * 0.5, -bs * 0.2);
      ctx.lineTo(-bs * 0.1, bs * 0.5);
      ctx.lineTo(bs * 0.05, bs * 0.05);
      ctx.lineTo(-bs * 0.4, bs * 0.1);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.globalAlpha = t * 0.5;
      ctx.stroke();
    } else if (s.type === 'fireball') {
      // 火の玉 - グラデーション付きの大きな光球
      const r = s.size * (0.8 + (1 - t) * 0.4);
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.3, s.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.globalAlpha = t * 0.8;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Default spark
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * t, 0, Math.PI * 2);
      ctx.fill();
      // Bright core
      ctx.fillStyle = '#FFF';
      ctx.globalAlpha = t * 0.6;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * t * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Damage numbers (floating)
  for (const d of damageNumbers) {
    const t = d.life / d.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.7 ? 1 : t / 0.7; // fade out in last 30%
    const size = Math.floor(26 * d.scale);
    ctx.font = `bold ${size}px sans-serif`;
    ctx.textAlign = 'center';

    // Pop-in scale effect for bold (strong/special) numbers
    let popScale = 1;
    if (d.bold) {
      const age = (d.maxLife - d.life) / d.maxLife;
      if (age < 0.08) popScale = 1 + (1 - age / 0.08) * 0.6; // start big, snap to normal
      else if (age < 0.15) popScale = 1 + (0.15 - age) * 0.5; // slight bounce
    }

    if (popScale !== 1) {
      ctx.translate(d.x, d.y);
      ctx.scale(popScale, popScale);
      ctx.translate(-d.x, -d.y);
    }

    // Outline for strong/special hits
    if (d.bold) {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(d.value + '', d.x, d.y);
      // Glow
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 8;
    }
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText(d.value + '', d.x + 1, d.y + 1);
    ctx.shadowBlur = 0;
    // Main text
    ctx.fillStyle = d.color;
    ctx.fillText(d.value + '', d.x, d.y);
    ctx.restore();
  }

  // Knockback trails
  for (const tr of trails) {
    if (!tr.points || tr.points.length < 2) continue;
    const t = tr.life / tr.maxLife;
    const w = tr.width || 4;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // テーパー（先端が細い）軌跡を描画
    for (let i = 1; i < tr.points.length; i++) {
      const segT = i / tr.points.length; // 0=古い, 1=新しい
      ctx.globalAlpha = t * segT * 0.6;
      ctx.strokeStyle = tr.color;
      ctx.lineWidth = w * t * segT;
      ctx.beginPath();
      ctx.moveTo(tr.points[i - 1].x, tr.points[i - 1].y);
      ctx.lineTo(tr.points[i].x, tr.points[i].y);
      ctx.stroke();
    }
    // グロー
    ctx.globalAlpha = t * 0.12;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = (w + 4) * t;
    ctx.beginPath();
    ctx.moveTo(tr.points[0].x, tr.points[0].y);
    for (let i = 1; i < tr.points.length; i++) {
      ctx.lineTo(tr.points[i].x, tr.points[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Blast explosions (stock loss) - ④ 大きな爆発
  for (const be of blastExplosions) {
    const t = 1 - be.life / be.maxLife;
    ctx.save();
    // Multiple expanding rings (bigger)
    for (let r = 0; r < 5; r++) {
      const delay = r * 0.08;
      const rt = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
      if (rt <= 0) continue;
      ctx.globalAlpha = (1 - rt) * 0.5;
      const colors = ['#FFF', be.color, be.charColor, '#FFDD44', '#FF66AA'];
      ctx.strokeStyle = colors[r];
      ctx.lineWidth = (6 - r) * (1 - rt);
      ctx.beginPath();
      ctx.arc(be.x, be.y, (60 + r * 30) * rt, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Central flash (bigger)
    if (t < 0.4) {
      const ft = t / 0.4;
      ctx.globalAlpha = (1 - ft) * 0.9;
      const grad = ctx.createRadialGradient(be.x, be.y, 0, be.x, be.y, 50 * (1 - ft));
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.5, be.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(be.x, be.y, 50 * (1 - ft), 0, Math.PI * 2);
      ctx.fill();
    }
    // Cross rays
    if (t < 0.5) {
      const ct2 = t / 0.5;
      ctx.globalAlpha = (1 - ct2) * 0.6;
      ctx.strokeStyle = '#FFDD44';
      ctx.lineWidth = 3 * (1 - ct2);
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const len = 80 * ct2;
        ctx.beginPath();
        ctx.moveTo(be.x + Math.cos(a) * 10, be.y + Math.sin(a) * 10);
        ctx.lineTo(be.x + Math.cos(a) * len, be.y + Math.sin(a) * len);
        ctx.stroke();
      }
    }
    // Screen flash overlay at start
    if (t < 0.12) {
      ctx.globalAlpha = 0.25 * (1 - t / 0.12);
      ctx.fillStyle = be.color;
      ctx.fillRect(0, 0, 960, 640);
    }
    ctx.restore();
  }

  // Players
  for (const p of players) {
    if (!p.alive) continue;
    ctx.save();

    // 空中回避エフェクト: 残像 + 半透明
    if (p.airDodging || p.airDodgeTimer > 0) {
      // 残像エフェクト（移動方向の逆に2つ）
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 2) {
        ctx.globalAlpha = 0.2;
        drawBattleCharacter(p.x - p.vx * 2, p.y - p.vy * 2 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        ctx.globalAlpha = 0.08;
        drawBattleCharacter(p.x - p.vx * 4, p.y - p.vy * 4 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      }
      // 本体半透明
      ctx.globalAlpha = 0.35;
    } else if (p.invincibleTimer > 0) {
      // 崖無敵: 残り5Fから速い点滅
      const blinkRate = (p.ledgeGrab && p.ledgeInvincible > 0 && p.ledgeInvincible <= 5) ? 2 : 4;
      if (Math.floor(p.invincibleTimer / blinkRate) % 2 === 0) ctx.globalAlpha = 0.4;
    }

    // Hitstun flash + knockback afterimage
    if (p.hitstun > 0) {
      if (p.hitstun % 3 === 0) ctx.globalAlpha = 0.6;
      // Draw fading afterimage during strong knockback
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 6) {
        ctx.globalAlpha = 0.15;
        drawBattleCharacter(p.x - p.vx * 1.5, p.y - p.vy * 1.5 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        if (speed > 10) {
          ctx.globalAlpha = 0.07;
          drawBattleCharacter(p.x - p.vx * 3, p.y - p.vy * 3 - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
        }
        ctx.globalAlpha = p.hitstun % 3 === 0 ? 0.6 : 1;
      }
    }

    // アイドルモーション: 待機中にわずかに上下に揺れる（描画のみ）
    const isIdle = p.grounded && !p.attacking && Math.abs(p.vx) < 0.5 && p.hitstun <= 0 && !p.grabbing && !p.grabbed && !p.guarding && p.guardBreakStun <= 0;
    const idleOfs = isIdle ? Math.sin(battleTime * (Math.PI * 2 / 180)) * 0.3 : 0;
    const drawY = p.y - 55 + idleOfs;

    // ⑤ コマンド技スケールエフェクト & ドラゴンモード拡大
    const dragonScale = (p.charIdx === 10 && p.dragonMode) ? 1.3 : 1.0;
    if (cmdScaleEffect.playerId === p.id && cmdScaleEffect.life > 0) {
      const scaleT = cmdScaleEffect.life / 12;
      const s = (1 + scaleT * 0.3) * dragonScale;
      ctx.save();
      ctx.translate(p.x, drawY);
      ctx.scale(s, s);
      ctx.translate(-p.x, -drawY);
      drawBattleCharacter(p.x, drawY, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.restore();
    } else if (dragonScale !== 1.0) {
      ctx.save();
      ctx.translate(p.x, drawY);
      ctx.scale(dragonScale, dragonScale);
      ctx.translate(-p.x, -drawY);
      drawBattleCharacter(p.x, drawY, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.restore();
    } else {
      drawBattleCharacter(p.x, drawY, 1.0, p.charIdx, battleTime, p.facingLeft, p);
    }

    // Draw attack effects
    if (p.attacking && p.attackData) {
      drawAttackEffect(p);
    }

    // Guard effect
    if (p.guarding) {
      drawGuardEffect(p);
    }

    // Charge glow effect (溜め中の光る演出)
    if (p.charging) {
      ctx.save();
      const chargeRatio = Math.min(p.chargeTime / p.chargeMaxTime, 1);
      const pulse = Math.sin(battleTime * 0.15) * 0.3;
      const chColor = characters[p.charIdx].accent;
      // Glowing aura
      ctx.globalAlpha = 0.2 + chargeRatio * 0.4 + pulse * 0.1;
      const gr = ctx.createRadialGradient(p.x, p.y - 40, 5, p.x, p.y - 40, 30 + chargeRatio * 20);
      gr.addColorStop(0, chColor);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 40, 30 + chargeRatio * 20, 0, Math.PI * 2);
      ctx.fill();
      // Charge particles
      if (p.chargeTime % 4 === 0) {
        const a = Math.random() * Math.PI * 2;
        sparks.push({
          x: p.x + Math.cos(a) * 20, y: p.y - 40 + Math.sin(a) * 20,
          vx: -Math.cos(a) * 2, vy: -Math.sin(a) * 2 - 1,
          life: 10, maxLife: 15, color: chColor, size: 2 + chargeRatio * 2, gravity: -0.05,
        });
      }
      // Max charge flash
      if (chargeRatio >= 1 && battleTime % 10 < 5) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(p.x, p.y - 40, 35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // セン: 満腹パワーバフ中のスチームエフェクト
    if (p.charIdx === 18 && p.senBuffTimer > 0) {
      ctx.save();
      const pulse = Math.sin(battleTime * 0.08) * 0.1;
      ctx.globalAlpha = 0.2 + pulse;
      const sg = ctx.createRadialGradient(p.x, p.y - 40, 5, p.x, p.y - 40, 35);
      sg.addColorStop(0, '#FF8844');
      sg.addColorStop(0.5, '#FF884466');
      sg.addColorStop(1, 'rgba(255,136,68,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 40, 35, 0, Math.PI * 2);
      ctx.fill();
      // Steam particles
      if (battleTime % 8 === 0) {
        sparks.push({ x: p.x + (Math.random()-0.5)*20, y: p.y - 30, vx: (Math.random()-0.5)*1.5, vy: -1.5-Math.random()*1.5,
          life: 12, maxLife: 15, color: '#FFDDAA', size: 2+Math.random()*2, gravity: -0.03, drag: 0.98 });
      }
      // Buff timer indicator (flashing when low)
      const buffRatio = p.senBuffTimer / 600;
      if (buffRatio < 0.3 && battleTime % 10 < 5) {
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = '#FF8844';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y - 100, 8, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * buffRatio / 0.3);
        ctx.stroke();
      }
      ctx.restore();
    }
    // ドスボス: ランダム必殺技「?」表示
    if (p.charIdx === 19 && p.attacking && p.attackData && p.attackData.dosbossRandom && p.attackFrame <= p.attackData.startup) {
      ctx.save();
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#CC66FF';
      ctx.globalAlpha = 0.7 + Math.sin(battleTime * 0.2) * 0.3;
      ctx.fillText('?', p.x, p.y - 90);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // ドスボス: 重力デバフ表示
    if (p.gravityDebuffTimer > 0) {
      ctx.save();
      const gdt = p.gravityDebuffTimer / 180;
      ctx.globalAlpha = 0.3 * gdt;
      ctx.strokeStyle = '#9944CC';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y - 40, 20 + Math.sin(battleTime * 0.1) * 5, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Dragon mode aura (天才 ドラゴンモード中の炎オーラ)
    if (p.charIdx === 10 && p.dragonMode) {
      ctx.save();
      const pulse = Math.sin(battleTime * 0.1) * 0.15;
      ctx.globalAlpha = 0.25 + pulse;
      const fg = ctx.createRadialGradient(p.x, p.y - 40, 5, p.x, p.y - 40, 40);
      fg.addColorStop(0, '#FF6600');
      fg.addColorStop(0.5, '#FF440066');
      fg.addColorStop(1, 'rgba(255,68,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 40, 40, 0, Math.PI * 2);
      ctx.fill();
      // Dragon timer indicator
      const timerRatio = p.dragonTimer / 900;
      if (timerRatio < 0.3) {
        // Flashing warning when time is running out
        if (battleTime % 10 < 5) {
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = '#FF0000';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y - 100, 8, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * timerRatio / 0.3);
          ctx.stroke();
        }
      }
      // Fire particles
      if (battleTime % 6 === 0) {
        sparks.push({ x: p.x + (Math.random()-0.5)*20, y: p.y - 20, vx: (Math.random()-0.5)*2, vy: -1-Math.random()*2,
          life: 10, maxLife: 15, color: '#FF6600', size: 2+Math.random()*2, type: 'fireball', gravity: -0.05, drag: 0.98 });
      }
      ctx.restore();
    }

    // Dragon transform charging indicator
    if (p.charIdx === 10 && p.dragonTransformTimer > 0 && !p.dragonMode) {
      ctx.save();
      const tRatio = p.dragonTransformTimer / 60;
      ctx.globalAlpha = 0.4 + tRatio * 0.4;
      ctx.strokeStyle = '#FF4400';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 80, 12, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * tRatio);
      ctx.stroke();
      ctx.restore();
    }

    // Guard break stun effect
    if (p.guardBreakStun > 0) {
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(battleTime * 0.03) * 0.3;
      ctx.strokeStyle = '#FF6600';
      ctx.lineWidth = 2;
      // Dizzy stars
      for (let i = 0; i < 3; i++) {
        const angle = battleTime * 0.02 + i * Math.PI * 2 / 3;
        const sx = p.x + Math.cos(angle) * 18;
        const sy = p.y - 80 + Math.sin(angle) * 6;
        ctx.fillStyle = '#FFDD00';
        drawStar(sx, sy, 5, 5, ctx);
      }
      ctx.restore();
    }

    // Ink blind effect
    if (p.inkBlindTimer > 0) {
      ctx.save();
      const fade = Math.min(1, p.inkBlindTimer / 30);
      ctx.globalAlpha = 0.6 * fade;
      ctx.fillStyle = '#1A0030';
      ctx.beginPath(); ctx.ellipse(p.x, p.y - 45, 28, 35, 0, 0, Math.PI * 2); ctx.fill();
      // ink drip
      ctx.fillStyle = '#2A0040';
      ctx.globalAlpha = 0.5 * fade;
      for (let j = 0; j < 3; j++) {
        const dx = (j - 1) * 12;
        const drip = Math.min(20, (120 - p.inkBlindTimer) * 0.5);
        ctx.beginPath(); ctx.ellipse(p.x + dx, p.y - 30 + drip + j * 4, 4, 6 + drip * 0.3, 0, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    // Grab effect
    if (p.grabbing) {
      drawGrabEffect(p);
    }

    // Shadow dash / slide / charge after-image
    if (p.specialState === 'dashing' || p.specialState === 'sliding' || p.specialState === 'charging') {
      ctx.globalAlpha = 0.25;
      drawBattleCharacter(p.x - p.vx * 2, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
      ctx.globalAlpha = 0.12;
      drawBattleCharacter(p.x - p.vx * 4, p.y - 55, 1.0, p.charIdx, battleTime, p.facingLeft, p);
    }

    // Teleport slash flash
    if (p.specialState === 'teleSlashing') {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.ellipse(p.x, p.y - 35, 30, 45, 0, 0, Math.PI * 2); ctx.fill();
    }

    ctx.restore();

    // Player indicator
    const arrowY = p.y - 105;
    ctx.fillStyle = p.id === 0 ? '#44AAFF' : '#FF4444';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.id === 0 ? '1P' : (bossRushMode ? 'BOSS' : (gameMode === 'cpu' ? 'CPU' : '2P')), p.x, arrowY - 8);
    ctx.beginPath();
    ctx.moveTo(p.x, arrowY + 2);
    ctx.lineTo(p.x - 6, arrowY - 4);
    ctx.lineTo(p.x + 6, arrowY - 4);
    ctx.closePath(); ctx.fill();
  }

  // 崖マーカー描画
  ctx.save();
  for (const side of [-1, 1]) {
    const lx = side === -1 ? STAGE_LEFT : STAGE_RIGHT;
    const ly = STAGE_GROUND_Y;
    // 光るエッジ
    ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.4 + Math.sin(battleTime * 0.08) * 0.2;
    ctx.fillRect(lx - 3, ly - 5, 6, 10);
    ctx.globalAlpha = 1;
    // つかまり中のキャラ表示
    for (const p of players) {
      if (p.ledgeGrab && p.ledgeSide === side) {
        ctx.globalAlpha = 0.7;
        ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('▲崖', lx, ly + 45);
        ctx.globalAlpha = 1;
      }
    }
  }
  ctx.restore();

  // 状態異常エフェクト描画
  for (const p of players) {
    if (!p.alive) continue;
    const sx2 = p.x, sy2 = p.y - 70;
    ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    if (p.frozen > 0) {
      ctx.globalAlpha = 0.4; ctx.fillStyle = '#88DDFF';
      ctx.fillRect(p.x - 18, p.y - 60, 36, 60);
      ctx.globalAlpha = 1; ctx.fillText('🧊', sx2, sy2);
    }
    if (p.burning > 0) { ctx.fillText('🔥', sx2, sy2 - (p.frozen > 0 ? 16 : 0)); }
    if (p.poisoned > 0) {
      ctx.globalAlpha = 0.3; ctx.fillStyle = '#44CC44';
      ctx.beginPath(); ctx.arc(p.x, p.y - 35, 20, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1; ctx.fillText('💀', sx2 + 14, sy2);
    }
    if (p.stunned > 0) { ctx.fillText('⚡', sx2 - 14, sy2); }
    if (p.cursed > 0) {
      ctx.globalAlpha = 0.25; ctx.fillStyle = '#9944CC';
      ctx.beginPath(); ctx.arc(p.x, p.y - 35, 22, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1; ctx.fillText('🔮', sx2, sy2 - 16);
    }
    if (p.confused > 0) { ctx.fillText('💫', sx2, sy2 - 16); }
    if (p.paralyzed > 0) { ctx.fillText('🌀', sx2 + 14, sy2 - 16); }
    if (p.feared2 > 0) { ctx.fillText('😱', sx2 - 14, sy2 - 16); }
    if (p.sealMagic > 0) { ctx.fillText('🚫', sx2, sy2 - 32); }
  }

  // Command name display (⑤ コミック風フォント)
  for (const cn of cmdNameDisplay) {
    const t = cn.life / cn.maxLife;
    const age = 1 - t;
    ctx.save();
    ctx.translate(cn.x, cn.y);
    // Pop-in scale
    let cnScale = 1;
    if (age < 0.1) cnScale = 0.2 + (age / 0.1) * 1.5;
    else if (age < 0.2) cnScale = 1.7 - ((age - 0.1) / 0.1) * 0.7;
    ctx.scale(cnScale, cnScale);
    ctx.globalAlpha = (t > 0.3 ? 1 : t / 0.3) * 0.8;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(cn.text, 0, 0);
    // Colored border
    ctx.strokeStyle = cn.color;
    ctx.lineWidth = 1.5;
    ctx.strokeText(cn.text, 0, 0);
    // White fill
    ctx.shadowColor = cn.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#FFF';
    ctx.fillText(cn.text, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // HIT/MISS displays
  for (const hm of hitMissDisplays) {
    const t = hm.life / hm.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.6 ? 1 : t / 0.6;
    ctx.textAlign = 'center';
    if (hm.isHit) {
      // Pop-in scale
      const age = 1 - t;
      const popScale = age < 0.15 ? 1.3 - age / 0.15 * 0.3 : 1.0;
      ctx.font = `bold ${Math.floor(32 * popScale)}px sans-serif`;
      ctx.shadowColor = '#FF4444';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#880000';
      ctx.lineWidth = 3;
      ctx.strokeText('HIT!', hm.x, hm.y);
      ctx.fillStyle = '#FF2222';
      ctx.fillText('HIT!', hm.x, hm.y);
      ctx.shadowBlur = 0;
    } else {
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#888888';
      ctx.globalAlpha *= 0.7;
      ctx.fillText('MISS', hm.x, hm.y);
    }
    ctx.restore();
  }

  // Countdown (screen space - after camera)
  if (battleCountdown > 0) {
    const sec = Math.ceil(battleCountdown / 60);
    ctx.font = 'bold 80px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF'; ctx.shadowColor = '#FFF'; ctx.shadowBlur = 20;
    ctx.fillText(sec.toString(), 480, 300);
    ctx.shadowBlur = 0;
  } else if (battleTime < 2500) {
    const goAlpha = Math.max(0, 1 - (battleTime - 3000) * 0.001);
    if (goAlpha > 0) {
      ctx.globalAlpha = Math.min(1, goAlpha);
      ctx.font = 'bold 90px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFDD44'; ctx.shadowColor = '#FFDD44'; ctx.shadowBlur = 20;
      ctx.fillText('GO!', 480, 300);
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
  }

  // Boss Rush HUD
  if (bossRushMode) {
    // Boss intro overlay
    if (bossRushPhase === 'intro') {
      bossRushTimer++;
      const introAlpha = bossRushTimer < 20 ? bossRushTimer / 20 : (bossRushTimer > 70 ? Math.max(0, 1 - (bossRushTimer - 70) / 20) : 1);
      ctx.fillStyle = `rgba(0, 0, 0, ${introAlpha * 0.85})`;
      ctx.fillRect(0, 0, 960, 640);
      if (introAlpha > 0.1) {
        ctx.globalAlpha = introAlpha;
        ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
        ctx.fillStyle = '#FF44CC';
        ctx.fillText(`BOSS ${bossRushCurrent + 1} / 3`, 480, 250);
        ctx.font = 'bold 48px sans-serif';
        ctx.fillStyle = '#FFF';
        ctx.shadowColor = '#FF44CC'; ctx.shadowBlur = 15;
        ctx.fillText('【BOSS】' + characters[bossRushBosses[bossRushCurrent]].name, 480, 320);
        ctx.shadowBlur = 0;
        ctx.font = '18px sans-serif';
        ctx.fillStyle = '#AAA';
        ctx.fillText('ENTER で開始', 480, 400);
        ctx.globalAlpha = 1;
      }
      if (bossRushTimer >= 90) bossRushPhase = 'battle';
    }
    // Boss Rush progress bar (top)
    if (bossRushPhase === 'battle' || gameOver) {
      ctx.globalAlpha = 0.8;
      ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
      ctx.fillStyle = '#FF44CC';
      ctx.fillText('BOSS RUSH', 20, 25);
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i < bossRushCurrent ? '#44FF44' : (i === bossRushCurrent ? '#FF44CC' : '#444');
        ctx.fillRect(130 + i * 40, 14, 30, 14);
        ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
        ctx.strokeRect(130 + i * 40, 14, 30, 14);
      }
      ctx.textAlign = 'right';
      ctx.fillStyle = '#FFF';
      ctx.fillText('【BOSS】' + characters[p2Select].name, 940, 25);
      ctx.globalAlpha = 1;
    }
    // Boss Rush clear screen
    if (bossRushPhase === 'clear') {
      bossRushTimer++;
      ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.85, bossRushTimer / 30)})`;
      ctx.fillRect(0, 0, 960, 640);
      const clearAlpha = Math.min(1, bossRushTimer / 40);
      ctx.globalAlpha = clearAlpha;
      ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20;
      ctx.fillText('BOSS RUSH CLEAR!!', 480, 240);
      ctx.shadowBlur = 0;
      if (bossRushTimer > 60) {
        const titleAlpha2 = Math.min(1, (bossRushTimer - 60) / 30);
        ctx.globalAlpha = titleAlpha2;
        ctx.font = 'bold 36px sans-serif';
        ctx.fillStyle = '#FF44CC'; ctx.shadowColor = '#FF44CC'; ctx.shadowBlur = 10;
        ctx.fillText('称号: ' + bossRushTitle, 480, 330);
        ctx.shadowBlur = 0;
        ctx.font = 'bold 24px sans-serif';
        ctx.fillStyle = '#FFF';
        ctx.fillText('プレイヤー: ' + characters[bossRushPlayerChar].name, 480, 390);
      }
      if (bossRushTimer > 120) {
        // Gold particle effects
        if (bossRushTimer % 4 === 0) {
          const a = Math.random() * Math.PI * 2;
          sparks.push({ x: 480 + Math.cos(a) * 120, y: 300 + Math.sin(a) * 80, vx: Math.cos(a) * 2, vy: -1 - Math.random() * 2, life: 40, maxLife: 40, color: Math.random() > 0.5 ? '#FFD700' : '#FF44CC', size: 2 + Math.random() * 3, gravity: 0.02, drag: 0.97 });
        }
        ctx.globalAlpha = Math.min(1, (bossRushTimer - 120) / 30);
        ctx.font = '20px sans-serif';
        ctx.fillStyle = '#44FF44';
        ctx.fillText('ENTER : タイトルに戻る', 480, 480);
      }
      ctx.globalAlpha = 1;
      // Restore canvas state before returning (match ctx.save at drawBattle start)
      ctx.restore();
      return; // skip normal game set rendering
    }
  }

  // Boss Rush defeated overlay
  if (bossRushMode && gameOver && winner === 0 && bossRushCurrent < 3 && bossRushPhase !== 'clear') {
    // Override GAME SET text with boss defeated message
    if (gameSetPhase >= 2) {
      // Will be drawn on top of normal game set
    }
  }

  // Game over - GAME SET演出
  if (gameOver && winner >= 0) {
    gameSetTimer++;
    const wP = players[winner];
    const wCh = characters[wP.charIdx];
    const winLabel = winner === 0 ? '1P' : (bossRushMode ? '【BOSS】' : (gameMode === 'cpu' ? 'CPU' : '2P'));

    // カメラを画面中央にリセット
    cam.x = 480; cam.y = 320; cam.zoom = 1;
    cam.targetX = 480; cam.targetY = 320; cam.targetZoom = 1;
    screenShake.intensity = 0; screenShake.duration = 0; screenShake.x = 0; screenShake.y = 0;

    // フェーズ管理
    // Phase 1: スローモーション + 白フラッシュ (0-30)
    // Phase 2: GAME SET!! テキスト表示 (30-90 = 1秒間)
    // Phase 3: GAME SET!! フェードアウト (90-110)
    // Phase 4: 勝者表示 (110-)
    if (gameSetPhase === 1 && gameSetTimer > 30) gameSetPhase = 2;
    if (gameSetPhase === 2 && gameSetTimer > 90) gameSetPhase = 3;
    if (gameSetPhase === 3 && gameSetTimer > 110) gameSetPhase = 4;

    // Phase 1: スローモーション + 白フラッシュ
    if (gameSetPhase === 1) {
      const flashT = Math.max(0, 1 - gameSetTimer / 15);
      ctx.fillStyle = `rgba(255, 255, 255, ${flashT * 0.6})`;
      ctx.fillRect(0, 0, 960, 640);
    }

    // Phase 2: GAME SET!! テキスト（1秒間表示）
    if (gameSetPhase === 2) {
      ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.7, (gameSetTimer - 30) / 20)})`;
      ctx.fillRect(0, 0, 960, 640);
      const gsT = Math.min(1, (gameSetTimer - 30) / 20);
      const gsScale = 1 + (1 - gsT) * 2; // 3x → 1x に縮小
      ctx.save();
      ctx.translate(480, 300);
      ctx.scale(gsScale, gsScale);
      ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = 6;
      ctx.strokeText('GAME SET!!', 0, 0);
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 15;
      ctx.fillText('GAME SET!!', 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Phase 3: GAME SET!! フェードアウト
    if (gameSetPhase === 3) {
      const fadeT = Math.max(0, 1 - (gameSetTimer - 90) / 20);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, 960, 640);
      ctx.globalAlpha = fadeT;
      ctx.save();
      ctx.translate(480, 300);
      ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = 6;
      ctx.strokeText('GAME SET!!', 0, 0);
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 15;
      ctx.fillText('GAME SET!!', 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // Phase 4: 勝者表示
    if (gameSetPhase >= 4) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, 960, 640);
      const p4T = Math.min(1, (gameSetTimer - 110) / 30);
      ctx.globalAlpha = p4T;
      // スポットライト
      const spot = ctx.createRadialGradient(480, 320, 0, 480, 320, 250);
      spot.addColorStop(0, 'rgba(255,215,0,0.15)');
      spot.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = spot;
      ctx.fillRect(0, 0, 960, 640);
      // 勝者キャラ大表示
      ctx.save();
      ctx.translate(480, 350);
      ctx.scale(2, 2);
      drawCharacterBody(0, 0, 1.0, wP.charIdx, battleTime, false);
      ctx.restore();
      // WINNER テキスト
      ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 10;
      ctx.fillText('WINNER!!', 480, 180);
      ctx.shadowBlur = 0;
      // キャラ名
      ctx.font = 'bold 42px sans-serif';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
      ctx.strokeText(`${winLabel}  ${wCh.name}`, 480, 225);
      ctx.fillStyle = '#FFF';
      ctx.fillText(`${winLabel}  ${wCh.name}`, 480, 225);
      // 金色パーティクル（定期生成）
      if (gameSetTimer % 8 === 0) {
        const a = Math.random() * Math.PI * 2;
        sparks.push({ x: 480 + Math.cos(a)*80, y: 350 + Math.sin(a)*60, vx:Math.cos(a)*2, vy:-1-Math.random()*2, life:30, maxLife:30, color:Math.random()>0.5?'#FFD700':'#FFEE88', size:2+Math.random()*2, gravity:0.02, drag:0.97 });
      }
      // 操作案内
      if (gameSetTimer > 180) {
        ctx.globalAlpha = Math.min(1, (gameSetTimer - 180) / 30);
        ctx.font = 'bold 20px sans-serif';
        if (bossRushMode && winner === 0 && bossRushCurrent < 2) {
          ctx.fillStyle = '#44FF44';
          ctx.fillText(`ENTER : 次のボスへ (${bossRushCurrent + 2}/3)`, 480, 540);
        } else if (bossRushMode && winner === 0 && bossRushCurrent === 2) {
          ctx.fillStyle = '#FFD700';
          ctx.fillText('ENTER : クリア!!', 480, 540);
        } else if (bossRushMode && winner === 1) {
          ctx.fillStyle = '#FF4444';
          ctx.fillText('ENTER : モード選択に戻る', 380, 540);
          ctx.fillStyle = '#AAAAAA';
          ctx.fillText('ESC : タイトルに戻る', 580, 540);
        } else {
          ctx.fillStyle = '#44FF44';
          ctx.fillText('ENTER : リマッチ', 380, 540);
          ctx.fillStyle = '#AAAAAA';
          ctx.fillText('ESC : キャラ変更', 580, 540);
        }
      }
      ctx.globalAlpha = 1;
    }
  }

  // デバッグ：当たり判定の可視化（F3で切り替え）
  if (debugHitboxes) {
    for (const p of players) {
      if (!p.alive) continue;
      // プレイヤーの食らい判定（緑枠）
      const ph = getPlayerHitbox(p);
      ctx.strokeStyle = '#00FF00';
      ctx.lineWidth = 2;
      ctx.strokeRect(ph.x, ph.y, ph.w, ph.h);
      ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
      ctx.fillRect(ph.x, ph.y, ph.w, ph.h);
      // 中心点
      ctx.fillStyle = '#00FF00';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      // 座標表示
      ctx.font = '10px monospace';
      ctx.fillStyle = '#00FF00';
      ctx.textAlign = 'left';
      ctx.fillText(`P${p.id} (${Math.round(p.x)},${Math.round(p.y)})`, ph.x, ph.y - 4);
      // 攻撃判定（赤枠）
      if (p.attacking && p.attackData) {
        const atk = p.attackData;
        if (atk.hw > 0 && atk.hh > 0 && p.attackFrame >= atk.startup && p.attackFrame < atk.startup + atk.active) {
          let ah;
          if (atk.centerHit) {
            ah = { x: p.x - atk.hw / 2, y: p.y + atk.hy, w: atk.hw, h: atk.hh };
          } else {
            ah = getAttackHitbox(p, atk);
          }
          ctx.strokeStyle = '#FF0000';
          ctx.lineWidth = 2;
          ctx.strokeRect(ah.x, ah.y, ah.w, ah.h);
          ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
          ctx.fillRect(ah.x, ah.y, ah.w, ah.h);
        }
      }
    }
    // 飛び道具の判定（黄枠）
    for (const pr of projectiles) {
      ctx.strokeStyle = '#FFFF00';
      ctx.lineWidth = 1;
      ctx.strokeRect(pr.x - pr.w / 2, pr.y - pr.h / 2, pr.w, pr.h);
    }
    // 衝突範囲（水色枠）
    if (players.length >= 2 && players[0].alive && players[1].alive) {
      const a = players[0], b = players[1];
      ctx.strokeStyle = '#00FFFF';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(a.x - 18, a.y - 70, 36, 70);
      ctx.strokeRect(b.x - 18, b.y - 70, 36, 70);
      ctx.setLineDash([]);
    }
    // DEBUG表示
    ctx.fillStyle = '#FFFF00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DEBUG: Hitboxes ON (F3 to toggle)', 10, 20);
  }

  // ===== All-Star Brawl 2 Style Effects =====

  // Speed lines (吹っ飛び時)
  for (const sl of speedLines) {
    const t = sl.life / sl.maxLife;
    ctx.save();
    ctx.globalAlpha = t * 0.4;
    ctx.strokeStyle = sl.color;
    ctx.lineWidth = sl.width * t * 0.6;
    ctx.beginPath();
    ctx.moveTo(sl.x, sl.y);
    ctx.lineTo(sl.x + Math.cos(sl.angle) * sl.length * 0.6, sl.y + Math.sin(sl.angle) * sl.length * 0.6);
    ctx.stroke();
    // Glow
    ctx.globalAlpha = t * 0.1;
    ctx.lineWidth = sl.width * t * 2;
    ctx.stroke();
    ctx.restore();
  }

  // Fire trails (200%超えの炎の軌跡)
  for (const f of fireTrails) {
    const t = f.life / f.maxLife;
    ctx.save();
    const r = f.size * (0.6 + t * 0.4);
    const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.2, '#FFDD44');
    grad.addColorStop(0.5, '#FF6600');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.globalAlpha = t * 0.5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Comic text effects (POW!, BAM!, etc.)
  for (const ct of comicTexts) {
    const t = ct.life / ct.maxLife;
    const age = 1 - t;
    ctx.save();
    ctx.translate(ct.x, ct.y);
    ctx.rotate(ct.rotation);
    // Pop-in scale
    let scale = 1;
    if (age < 0.15) scale = 0.3 + (age / 0.15) * 1.2;
    else if (age < 0.25) scale = 1.5 - (age - 0.15) / 0.1 * 0.5;
    ctx.scale(scale, scale);
    ctx.globalAlpha = (t > 0.3 ? 1 : t / 0.3) * 0.7;
    // Background burst shape
    ctx.fillStyle = ct.bgColor;
    ctx.globalAlpha *= 0.2;
    const burstR = ct.size * 1.0;
    ctx.beginPath();
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const r = i % 2 === 0 ? burstR : burstR * 0.65;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = (t > 0.3 ? 1 : t / 0.3) * 0.7;
    // Text outline
    ctx.font = `bold ${ct.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(ct.text, 0, 0);
    // White border
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 1.5;
    ctx.strokeText(ct.text, 0, 0);
    // Colored fill
    ctx.fillStyle = ct.color;
    ctx.fillText(ct.text, 0, 0);
    ctx.restore();
  }

  // === End dynamic camera (world-space effects above, screen-space below) ===
  ctx.restore();

  // HUD (screen space)
  drawBattleHUD();

  // Confetti (紙吹雪 - screen space)
  for (const c of confetti) {
    const t = c.life / c.maxLife;
    ctx.save();
    ctx.globalAlpha = t > 0.3 ? 0.6 : (t / 0.3) * 0.6;
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillStyle = c.color;
    if (c.type === 'rect') {
      ctx.fillRect(-c.size, -c.size * 0.5, c.size * 2, c.size);
    } else if (c.type === 'star') {
      drawStar(0, 0, c.size, 5, ctx);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, c.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Special aura (虹色オーラ - 必殺技時)
  for (const sa of specialAura) {
    const t = sa.life / sa.maxLife;
    const p = players.find(pp => pp.id === sa.playerId);
    if (!p || !p.alive) continue;
    ctx.save();
    const auraTime = (sa.maxLife - sa.life) * 0.15;
    for (let ring = 0; ring < 3; ring++) {
      const hue = ((auraTime * 60 + ring * 120) % 360);
      ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
      ctx.lineWidth = (2 - ring * 0.5) * t;
      ctx.globalAlpha = t * (0.3 - ring * 0.08);
      const r = 18 + ring * 6 + Math.sin(auraTime + ring) * 3;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y - 40, r * 0.7, r, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Inner glow
    const hue2 = ((auraTime * 90) % 360);
    const aGrad = ctx.createRadialGradient(p.x, p.y - 40, 3, p.x, p.y - 40, 22);
    aGrad.addColorStop(0, `hsla(${hue2}, 100%, 80%, ${0.15 * t})`);
    aGrad.addColorStop(1, `hsla(${hue2}, 100%, 50%, 0)`);
    ctx.fillStyle = aGrad;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - 40, 22, 28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ① KO光の斬撃エフェクト
  for (const sl of koSlashEffects) {
    if (sl.delay > 0) continue;
    const t = sl.life / sl.maxLife;
    ctx.save();
    ctx.translate(sl.x, sl.y);
    ctx.rotate(sl.angle);
    // Extend phase then fade
    const extend = t > 0.6 ? (1 - t) / 0.4 : 1;
    const fade = t < 0.3 ? t / 0.3 : 1;
    const len = sl.length * extend;
    // Main slash line
    ctx.globalAlpha = fade * t * 0.7;
    ctx.strokeStyle = sl.color;
    ctx.lineWidth = sl.width * (0.5 + t * 0.5);
    ctx.beginPath();
    ctx.moveTo(-len / 2, 0);
    ctx.lineTo(len / 2, 0);
    ctx.stroke();
    // Glow
    ctx.globalAlpha = fade * t * 0.25;
    ctx.lineWidth = sl.width * 4 * t;
    ctx.strokeStyle = '#88BBFF';
    ctx.stroke();
    // Bright core
    ctx.globalAlpha = fade * t * 0.5;
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#FFFFFF';
    ctx.stroke();
    ctx.restore();
  }

  // ⑤ ストックロスアニメーション
  if (stockLossAnim.active) {
    const t = stockLossAnim.life / stockLossAnim.maxLife;
    ctx.save();
    const animX = stockLossAnim.x;
    const animY = stockLossAnim.y - (1 - t) * 30;
    ctx.globalAlpha = t;
    ctx.translate(animX, animY);
    const s = 1 + (1 - t) * 1.5;
    ctx.scale(s, s);
    // Fading stock circle
    const pIdx = stockLossAnim.playerId;
    const ch = characters[players[pIdx] ? players[pIdx].charIdx : 0];
    ctx.fillStyle = ch.color;
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    // Cross mark
    ctx.strokeStyle = '#FF2222';
    ctx.lineWidth = 2;
    ctx.globalAlpha = t * 0.8;
    ctx.beginPath();
    ctx.moveTo(-5, -5); ctx.lineTo(5, 5);
    ctx.moveTo(5, -5); ctx.lineTo(-5, 5);
    ctx.stroke();
    ctx.restore();
  }

  // KO!! display (撃墜テキスト)
  if (koDisplay.active) {
    const kt = koDisplay.life / koDisplay.maxLife;
    const age = 1 - kt;
    ctx.save();
    ctx.translate(480, 280);
    // Dramatic scale-in
    let koScale = 1;
    if (age < 0.08) koScale = 0.1 + (age / 0.08) * 2.5;
    else if (age < 0.18) koScale = 2.6 - ((age - 0.08) / 0.1) * 1.6;
    ctx.scale(koScale, koScale);
    ctx.globalAlpha = (kt > 0.2 ? 1 : kt / 0.2) * 0.8;
    // Burst background
    ctx.fillStyle = '#FF2222';
    ctx.globalAlpha *= 0.1;
    ctx.beginPath();
    for (let i = 0; i < 16; i++) {
      const a = (i / 16) * Math.PI * 2 + age * 0.5;
      const r = i % 2 === 0 ? 84 : 48;
      if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = (kt > 0.2 ? 1 : kt / 0.2) * 0.8;
    // KO text
    ctx.font = 'bold 60px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillText('KO!!', 2, 2);
    // Red outline
    ctx.strokeStyle = '#880000';
    ctx.lineWidth = 4;
    ctx.strokeText('KO!!', 0, 0);
    // White border
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.strokeText('KO!!', 0, 0);
    // Red fill
    ctx.fillStyle = '#FF2222';
    ctx.fillText('KO!!', 0, 0);
    // Glow
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 15;
    ctx.fillText('KO!!', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // End screen shake context
  ctx.restore();

  // Command technique background flash (画面全体フラッシュ)
  if (cmdFlash.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = cmdFlash.alpha * 0.6;
    ctx.fillStyle = cmdFlash.color;
    ctx.fillRect(0, 0, 960, 640);
    ctx.restore();
  }

  // Hit flash overlay (rendered outside shake)
  if (hitFlash.alpha > 0) {
    ctx.save();
    ctx.globalAlpha = hitFlash.alpha;
    ctx.fillStyle = hitFlash.color;
    ctx.fillRect(0, 0, 960, 640);
    ctx.restore();
    hitFlash.alpha *= 0.75;
    if (hitFlash.alpha < 0.01) hitFlash.alpha = 0;
  }
}

function drawAttackEffect(p) {
  const atk = p.attackData;
  const frame = p.attackFrame;
  const inActive = frame > atk.startup && frame <= atk.startup + atk.active;
  if (!inActive && atk.specialType !== 'jumpSlam') return;

  const dir = p.facingLeft ? -1 : 1;
  const cx = p.x;
  const cy = p.y;

  ctx.save();

  if (atk.effect === 'slash') {
    // Sword arc
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    const startAngle = dir > 0 ? -Math.PI * 0.7 : Math.PI * 0.3;
    const sweep = Math.PI * 0.8 * t;
    ctx.arc(cx + 15 * dir, cy - 40, 45, startAngle, startAngle + sweep * dir);
    ctx.stroke();
    // White flash line at tip
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.globalAlpha = (1 - t) * 0.9;
    const tipAngle = startAngle + sweep * dir;
    const tipX = cx + 15 * dir + Math.cos(tipAngle) * 45;
    const tipY = cy - 40 + Math.sin(tipAngle) * 45;
    ctx.beginPath(); ctx.arc(tipX, tipY, 6 * (1 - t), 0, Math.PI * 2); ctx.stroke();
    // Glow
    ctx.globalAlpha = 0.3 * (1 - t);
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(cx + 15 * dir, cy - 40, 45, startAngle, startAngle + sweep * dir);
    ctx.stroke();
  }

  if (atk.effect === 'bigslash') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const sx = cx + 10 * dir;
    // Main slash line
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 7;
    ctx.globalAlpha = 0.9 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(sx, cy - 65);
    ctx.lineTo(sx + 95 * dir * t, cy - 20);
    ctx.stroke();
    // White glow trail
    ctx.lineWidth = 16;
    ctx.globalAlpha = 0.25 * (1 - t);
    ctx.strokeStyle = '#FFF';
    ctx.stroke();
    // Secondary cross slash
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.6 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(sx + 20 * dir, cy - 15);
    ctx.lineTo(sx + 80 * dir * t, cy - 55);
    ctx.stroke();
    // Impact burst at end of slash
    if (t > 0.5) {
      const bt = (t - 0.5) * 2;
      ctx.globalAlpha = 0.6 * (1 - bt);
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 2;
      const bx = sx + 90 * dir, by = cy - 25;
      ctx.beginPath(); ctx.arc(bx, by, 20 * bt, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.3 * (1 - bt);
      ctx.beginPath(); ctx.arc(bx, by, 12 * (1 - bt), 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'punch') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const px = cx + (20 + 20 * t) * dir;
    // Impact circle
    ctx.fillStyle = atk.color;
    ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.arc(px, cy - 35, 12 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // White spark flash
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.8 * (1 - t);
    const sparkR = 8 + 10 * t;
    for (let i = 0; i < 4; i++) {
      const a = i * Math.PI / 2 + t * Math.PI;
      ctx.beginPath();
      ctx.moveTo(px + Math.cos(a) * sparkR * 0.4, cy - 35 + Math.sin(a) * sparkR * 0.4);
      ctx.lineTo(px + Math.cos(a) * sparkR, cy - 35 + Math.sin(a) * sparkR);
      ctx.stroke();
    }
  }

  if (atk.effect === 'shockwave') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const es = atk.effectScale || 1;
    const radius = 60 * es * t;
    // Red ground wave
    ctx.strokeStyle = '#FF4422';
    ctx.lineWidth = 5 * (1 - t);
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx - radius, cy - 5);
    ctx.quadraticCurveTo(cx, cy - 25 * es * (1 - t), cx + radius, cy - 5);
    ctx.stroke();
    // Second wave (delayed, smaller)
    if (t > 0.2) {
      const t2 = (t - 0.2) / 0.8;
      ctx.strokeStyle = atk.color;
      ctx.lineWidth = 3 * (1 - t2);
      ctx.globalAlpha = 0.5 * (1 - t2);
      const r2 = 45 * es * t2;
      ctx.beginPath();
      ctx.moveTo(cx - r2, cy - 3);
      ctx.quadraticCurveTo(cx, cy - 15 * es * (1 - t2), cx + r2, cy - 3);
      ctx.stroke();
    }
    // Rising dust columns
    for (let i = 0; i < 6; i++) {
      const dx = (i - 2.5) * 22 * es * t;
      const dustH = (15 + i * 4) * es;
      ctx.globalAlpha = 0.35 * (1 - t);
      ctx.fillStyle = i % 2 === 0 ? '#FF6644' : '#887';
      ctx.beginPath();
      ctx.arc(cx + dx, cy - 8 - dustH * t, (5 - i * 0.5) * es * (1 - t), 0, Math.PI * 2);
      ctx.fill();
    }
    // Ground crack glow
    ctx.globalAlpha = 0.4 * (1 - t);
    ctx.fillStyle = '#FF2200';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 2, radius * 0.8, 6 * (1 - t), 0, 0, Math.PI * 2);
    ctx.fill();
  }

  if (atk.effect === 'slam') {
    if (p.specialState === 'slamHit') {
      const t = Math.min(1, (frame - atk.startup) / (atk.slamActive || 1));
      // Expanding shockwave rings（適正サイズ）
      ctx.strokeStyle = atk.color;
      ctx.lineWidth = 4 * (1 - t);
      ctx.globalAlpha = 0.7 * (1 - t);
      const r = 40 * t;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      // Second ring
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = 0.3 * (1 - t);
      ctx.beginPath(); ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2); ctx.stroke();
      // Ground crack lines
      ctx.strokeStyle = '#FF6622';
      ctx.lineWidth = 2 * (1 - t);
      ctx.globalAlpha = 0.5 * (1 - t);
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * 28 * t, cy + Math.sin(a) * 12 * t + 4);
        ctx.stroke();
      }
      // Central impact flash
      if (t < 0.3) {
        ctx.fillStyle = '#FFF';
        ctx.globalAlpha = 0.6 * (1 - t / 0.3);
        ctx.beginPath(); ctx.arc(cx, cy, 14 * (1 - t / 0.3), 0, Math.PI * 2); ctx.fill();
      }
    } else if (p.specialState === 'slamming') {
      // Falling indicator with speed lines + active hitbox glow
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(cx, cy + 10);
      ctx.lineTo(cx - 12, cy - 20);
      ctx.lineTo(cx + 12, cy - 20);
      ctx.fill();
      // Hitbox glow (shows active hitbox during descent)
      ctx.strokeStyle = atk.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.3;
      const sw = (atk.slamHw || atk.hw || 60);
      ctx.beginPath(); ctx.arc(cx, cy, sw * 0.4, 0, Math.PI * 2); ctx.stroke();
      // Speed lines above
      ctx.strokeStyle = '#FF8844';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(cx - 12 + i * 8, cy - 25);
        ctx.lineTo(cx - 12 + i * 8, cy - 55);
        ctx.stroke();
      }
    }
  }

  if (atk.effect === 'kick') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const kickNum = Math.floor(t * 3);
    const kickT = (t * 3) % 1;
    ctx.fillStyle = atk.color;
    ctx.globalAlpha = 0.7 * (1 - kickT * 0.5);
    const kx = cx + (25 + kickNum * 8) * dir;
    const ky = cy - 30 - kickNum * 10;
    ctx.beginPath();
    ctx.arc(kx, ky, 10 * (1 - kickT * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // Speed lines
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(kx - 15 * dir, ky - 5 + i * 5);
      ctx.lineTo(kx - 25 * dir, ky - 5 + i * 5);
      ctx.stroke();
    }
  }

  if (atk.effect === 'dash') {
    if (p.specialState === 'dashing') {
      const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
      // Green energy trail
      ctx.strokeStyle = '#22FFAA';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;
      for (let i = 0; i < 6; i++) {
        const ly = cy - 60 + i * 15;
        ctx.beginPath();
        ctx.moveTo(cx - 25 * dir, ly);
        ctx.lineTo(cx - (45 + i * 12) * dir, ly);
        ctx.stroke();
      }
      // Green afterimage silhouettes
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#22FFAA';
      ctx.beginPath(); ctx.ellipse(cx - p.vx * 1.5, cy - 30, 14, 30, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.12;
      ctx.beginPath(); ctx.ellipse(cx - p.vx * 3, cy - 30, 14, 30, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.06;
      ctx.beginPath(); ctx.ellipse(cx - p.vx * 4.5, cy - 30, 14, 30, 0, 0, Math.PI * 2); ctx.fill();
      // Forward energy burst
      ctx.fillStyle = atk.color;
      ctx.globalAlpha = 0.5 * (1 - t);
      ctx.beginPath(); ctx.arc(cx + 20 * dir, cy - 35, 10 * (0.5 + t * 0.5), 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'uppercut') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const startY = cy - 20;
    // Rising arc trail
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 6 * (1 - t * 0.5);
    ctx.globalAlpha = 0.8 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, startY);
    ctx.quadraticCurveTo(cx + 15 * dir, startY - 45 * t, cx + 10 * dir, startY - 65 * t);
    ctx.stroke();
    // White glow trail
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 12 * (1 - t * 0.5);
    ctx.globalAlpha = 0.15 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, startY);
    ctx.quadraticCurveTo(cx + 15 * dir, startY - 45 * t, cx + 10 * dir, startY - 65 * t);
    ctx.stroke();
    // Fire effect (bigger)
    ctx.fillStyle = '#FF8800';
    ctx.globalAlpha = 0.6 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 10 * dir, cy - 55 - 25 * t, 14 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
    // Inner white flame
    ctx.fillStyle = '#FFDD44';
    ctx.globalAlpha = 0.4 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 10 * dir, cy - 55 - 25 * t, 7 * (1 - t * 0.3), 0, Math.PI * 2);
    ctx.fill();
  }

  if (atk.effect === 'rapid') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const punchIdx = frame % 4;
    // Orange rapid punch impacts
    const offsets = [[15, -45], [22, -32], [12, -42], [24, -28], [18, -38], [20, -34]];
    const o = offsets[punchIdx % offsets.length];
    // Main impact
    ctx.fillStyle = '#FFAA22';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 1.2) * 0.3;
    ctx.beginPath();
    ctx.arc(cx + o[0] * dir, cy + o[1], 9, 0, Math.PI * 2);
    ctx.fill();
    // Previous punch afterglow
    const o2 = offsets[(punchIdx + 3) % offsets.length];
    ctx.fillStyle = '#FF8800';
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(cx + o2[0] * dir, cy + o2[1], 6, 0, Math.PI * 2);
    ctx.fill();
    // Speed lines (more)
    ctx.strokeStyle = '#FFCC44';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.4;
    for (let i = 0; i < 4; i++) {
      const lx = cx + (o[0] + 5) * dir;
      const ly = cy + o[1] - 6 + i * 4;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + 18 * dir, ly);
      ctx.stroke();
    }
    // Orange energy aura around fists area
    ctx.strokeStyle = '#FF6600';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.5) * 0.1;
    ctx.beginPath();
    ctx.arc(cx + 18 * dir, cy - 37, 22, 0, Math.PI * 2);
    ctx.stroke();
  }

  // --- Aerial attack effects ---
  if (atk.effect === 'airslash') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.strokeStyle = atk.color;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 10 * dir, cy - 30, 35, -Math.PI * 0.2 + t * Math.PI * 1.2, -Math.PI * 0.2 + t * Math.PI * 1.5);
    ctx.stroke();
    ctx.lineWidth = 10; ctx.globalAlpha = 0.2 * (1 - t); ctx.strokeStyle = '#FFF'; ctx.stroke();
  }

  if (atk.effect === 'airslam') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx, cy + 10, 25 * t, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.4 * (1 - t);
    ctx.beginPath(); ctx.arc(cx, cy + 10, 30 * t, 0, Math.PI * 2); ctx.stroke();
  }

  if (atk.effect === 'airkick') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.strokeStyle = atk.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.arc(cx + 5 * dir, cy - 30, 30, t * Math.PI * 2, t * Math.PI * 2 + Math.PI * 0.6);
    ctx.stroke();
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.5 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 25 * dir * t, cy - 35, 8, 0, Math.PI * 2); ctx.fill();
  }

  if (atk.effect === 'airknee') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.7 * (1 - t);
    const kx = cx + (15 + 15 * t) * dir;
    ctx.beginPath(); ctx.arc(kx, cy - 25, 12 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.3;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(kx - 10 * dir, cy - 30 + i * 6);
      ctx.lineTo(kx - 25 * dir, cy - 30 + i * 6); ctx.stroke();
    }
  }

  // --- Down attack effects ---
  if (atk.effect === 'sweep') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.strokeStyle = atk.color; ctx.lineWidth = 3; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5);
    ctx.lineTo(cx + 60 * dir * t, cy - 2);
    ctx.stroke();
    ctx.fillStyle = '#887'; ctx.globalAlpha = 0.3 * (1 - t);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(cx + (15 + i * 18) * dir * t, cy - 3, 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'lowkick') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.fillStyle = atk.color; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 25 * dir * t, cy - 8, 10 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
  }

  if (atk.effect === 'sliding') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.strokeStyle = atk.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(cx - (10 + i * 12) * dir, cy - 3 + i * 3);
      ctx.lineTo(cx - (20 + i * 12) * dir, cy - 3 + i * 3); ctx.stroke();
    }
    ctx.fillStyle = '#887'; ctx.globalAlpha = 0.3 * (1 - t);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(cx - (5 + i * 10) * dir, cy, 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'crouchupper') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.strokeStyle = atk.color; ctx.lineWidth = 4; ctx.globalAlpha = 0.8 * (1 - t);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, cy - 10);
    ctx.lineTo(cx + 12 * dir, cy - 50 * t);
    ctx.stroke();
    ctx.fillStyle = '#FF8800'; ctx.globalAlpha = 0.4 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 50 * t, 8, 0, Math.PI * 2); ctx.fill();
  }

  // === COMMAND ATTACK EFFECTS ===

  // Zen cmd1: 真空波 - big blue slash wave
  if (atk.effect === 'cmdZen1') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    // Charging slash aura
    ctx.strokeStyle = '#44AAFF';
    ctx.lineWidth = 6 * (1 - t);
    ctx.globalAlpha = 0.8 * (1 - t);
    const startA = dir > 0 ? -Math.PI * 0.8 : Math.PI * 0.2;
    ctx.beginPath();
    ctx.arc(cx + 20 * dir, cy - 35, 55, startA, startA + Math.PI * t * dir);
    ctx.stroke();
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 12 * (1 - t); ctx.globalAlpha = 0.2 * (1 - t);
    ctx.stroke();
  }

  // Zen cmd2: 神速斬り - teleport slash
  if (atk.effect === 'cmdZen2') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    // Flash lines at teleport
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.7 * (1 - t);
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + t * 3;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 15, cy - 35 + Math.sin(a) * 15);
      ctx.lineTo(cx + Math.cos(a) * 50 * (0.5 + t), cy - 35 + Math.sin(a) * 50 * (0.5 + t));
      ctx.stroke();
    }
    // Giant cross slash
    ctx.strokeStyle = '#88DDFF'; ctx.lineWidth = 5 * (1 - t); ctx.globalAlpha = 0.9 * (1 - t);
    ctx.beginPath(); ctx.moveTo(cx - 40 * dir, cy - 70); ctx.lineTo(cx + 60 * dir * t, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - 40 * dir, cy); ctx.lineTo(cx + 60 * dir * t, cy - 70); ctx.stroke();
  }

  // Don cmd1: 大地砕き - massive ground shockwave
  if (atk.effect === 'cmdDon1') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    // Multiple expanding ground waves
    for (let w = 0; w < 3; w++) {
      const wt = Math.max(0, t - w * 0.15);
      if (wt <= 0) continue;
      const r = 80 * wt;
      ctx.strokeStyle = w === 0 ? '#FF2200' : w === 1 ? '#FF6600' : '#FF8844';
      ctx.lineWidth = (6 - w * 1.5) * (1 - wt);
      ctx.globalAlpha = 0.7 * (1 - wt);
      ctx.beginPath();
      ctx.moveTo(cx - r, cy - 5); ctx.quadraticCurveTo(cx, cy - 30 * (1 - wt), cx + r, cy - 5);
      ctx.stroke();
    }
    // Ground fracture lines
    ctx.strokeStyle = '#FF4400'; ctx.lineWidth = 3 * (1 - t); ctx.globalAlpha = 0.6 * (1 - t);
    for (let i = 0; i < 10; i++) {
      const fx = (i - 4.5) * 18 * t;
      ctx.beginPath(); ctx.moveTo(cx + fx, cy - 3); ctx.lineTo(cx + fx * 1.2, cy + 10); ctx.stroke();
    }
    // Central explosion
    if (t < 0.3) {
      ctx.fillStyle = '#FFF'; ctx.globalAlpha = 0.8 * (1 - t / 0.3);
      ctx.beginPath(); ctx.arc(cx, cy - 10, 30 * (1 - t / 0.3), 0, Math.PI * 2); ctx.fill();
    }
  }

  // Don cmd2: 鬼突進 - charging rush
  if (atk.effect === 'cmdDon2') {
    if (p.specialState === 'charging') {
      const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
      // Red energy aura
      ctx.fillStyle = '#FF2200'; ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.ellipse(cx + 15 * dir, cy - 35, 25, 40, 0, 0, Math.PI * 2); ctx.fill();
      // Speed lines
      ctx.strokeStyle = '#FF6644'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6;
      for (let i = 0; i < 7; i++) {
        const ly = cy - 65 + i * 12;
        ctx.beginPath(); ctx.moveTo(cx - 20 * dir, ly); ctx.lineTo(cx - (60 + i * 8) * dir, ly); ctx.stroke();
      }
      // Fire trail
      ctx.fillStyle = '#FF8800'; ctx.globalAlpha = 0.4;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.arc(cx - (20 + i * 15) * dir, cy - 30 + Math.sin(frame * 0.5 + i) * 8, 8 - i, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // Saisoku cmd1: 手裏剣嵐 - shuriken storm (aura only, projectiles handled in update)
  if (atk.effect === 'cmdSaisoku1') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    // Spinning green aura
    ctx.strokeStyle = '#44FFAA'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 4; i++) {
      const a = frame * 0.15 + i * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(cx + 10 * dir, cy - 35, 25, a, a + Math.PI * 0.4);
      ctx.stroke();
    }
    // Wind effect
    ctx.strokeStyle = '#88FFCC'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.3;
    for (let i = 0; i < 5; i++) {
      const wy = cy - 55 + i * 10;
      ctx.beginPath(); ctx.moveTo(cx, wy); ctx.lineTo(cx + (30 + i * 5) * dir, wy + 2); ctx.stroke();
    }
  }

  // Saisoku cmd2: 瞬身乱舞 - clone rush
  if (atk.effect === 'cmdSaisoku2') {
    if (p.specialState === 'cloneRush') {
      const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
      // 4 clone afterimages at different positions
      const cloneOffsets = [[-30, -10], [20, -20], [-15, 10], [35, -5]];
      const activeClone = Math.floor(t * 4) % 4;
      for (let i = 0; i < 4; i++) {
        const cAlpha = i === activeClone ? 0.5 : 0.15;
        ctx.globalAlpha = cAlpha * (1 - t * 0.5);
        ctx.fillStyle = '#22FFAA';
        const ox = cloneOffsets[i][0] * dir;
        const oy = cloneOffsets[i][1];
        ctx.beginPath(); ctx.ellipse(cx + ox, cy + oy - 30, 12, 28, 0, 0, Math.PI * 2); ctx.fill();
      }
      // Slash marks per clone
      ctx.strokeStyle = '#AAFFDD'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6 * (1 - t);
      const slashIdx = frame % 4;
      const so = cloneOffsets[slashIdx];
      ctx.beginPath();
      ctx.moveTo(cx + so[0] * dir - 15 * dir, cy + so[1] - 45);
      ctx.lineTo(cx + so[0] * dir + 25 * dir, cy + so[1] - 15);
      ctx.stroke();
    }
  }

  // Meteor cmd1: 百裂拳 (enhanced rapid punches)
  if (atk.effect === 'cmdMeteo1') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const punchIdx = frame % 6;
    const offsets = [[18, -48], [24, -32], [14, -44], [26, -28], [20, -40], [22, -36]];
    const o = offsets[punchIdx];
    // Multiple simultaneous impacts
    ctx.fillStyle = '#FFAA00'; ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(cx + o[0] * dir, cy + o[1], 10, 0, Math.PI * 2); ctx.fill();
    // Previous punch
    const o2 = offsets[(punchIdx + 3) % 6];
    ctx.fillStyle = '#FF6600'; ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(cx + o2[0] * dir, cy + o2[1], 7, 0, Math.PI * 2); ctx.fill();
    // Intense speed lines
    ctx.strokeStyle = '#FFCC44'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 6; i++) {
      const lx = cx + (o[0] + 8) * dir;
      const ly = cy + o[1] - 8 + i * 3;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 22 * dir, ly); ctx.stroke();
    }
    // Fire aura
    ctx.strokeStyle = '#FF4400'; ctx.lineWidth = 3; ctx.globalAlpha = 0.25 + Math.sin(frame * 0.3) * 0.1;
    ctx.beginPath(); ctx.arc(cx + 18 * dir, cy - 37, 28, 0, Math.PI * 2); ctx.stroke();
  }

  // Meteor cmd2: 昇天拳MAX - super uppercut
  if (atk.effect === 'cmdMeteo2') {
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const startY = cy - 20;
    // Giant rising arc
    ctx.strokeStyle = '#FF8800'; ctx.lineWidth = 8 * (1 - t * 0.5); ctx.globalAlpha = 0.9 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.moveTo(cx + 5 * dir, startY);
    ctx.quadraticCurveTo(cx + 20 * dir, startY - 55 * t, cx + 12 * dir, startY - 80 * t);
    ctx.stroke();
    // White glow
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 16 * (1 - t); ctx.globalAlpha = 0.2 * (1 - t);
    ctx.stroke();
    // Big fire
    ctx.fillStyle = '#FF6600'; ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 60 - 30 * t, 18 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFDD44'; ctx.globalAlpha = 0.5 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 60 - 30 * t, 10 * (1 - t * 0.3), 0, Math.PI * 2); ctx.fill();
    // Explosion ring at peak
    if (t > 0.6) {
      const rt = (t - 0.6) / 0.4;
      ctx.strokeStyle = '#FFAA00'; ctx.lineWidth = 3 * (1 - rt); ctx.globalAlpha = 0.6 * (1 - rt);
      ctx.beginPath(); ctx.arc(cx + 12 * dir, cy - 80, 30 * rt, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Long command effects
  if (atk.effect === 'cmdLong1') {
    // Drill charge: spinning cyan drill effect
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    ctx.save();
    ctx.translate(cx + 30 * dir * t, cy);
    ctx.rotate(t * Math.PI * 8);
    ctx.strokeStyle = '#44FFCC'; ctx.lineWidth = 4 * (1 - t * 0.3); ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(0, 0, 15 + 5 * t, 0, Math.PI * 1.5); ctx.stroke();
    ctx.strokeStyle = '#88AAFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(0, 0, 22 + 5 * t, 0, Math.PI); ctx.stroke();
    ctx.restore();
    // Trail sparks
    for (let i = 0; i < 3; i++) {
      const tx = cx - (20 + i * 15) * dir * t;
      ctx.fillStyle = '#44FFCC'; ctx.globalAlpha = 0.3 * (1 - i * 0.25);
      ctx.beginPath(); ctx.arc(tx, cy - 5 + Math.sin(frame * 0.5 + i) * 8, 4 - i, 0, Math.PI * 2); ctx.fill();
    }
  }

  if (atk.effect === 'cmdLong2') {
    // Extended spear: long cyan beam
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const beamLen = 140 * Math.min(1, t * 2);
    // Main beam
    ctx.strokeStyle = '#A0B4FF'; ctx.lineWidth = 6 * (1 - t * 0.3); ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.moveTo(cx + 15 * dir, cy); ctx.lineTo(cx + (15 + beamLen) * dir, cy); ctx.stroke();
    // Inner glow
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.globalAlpha = 0.7 * (1 - t * 0.5);
    ctx.beginPath(); ctx.moveTo(cx + 15 * dir, cy); ctx.lineTo(cx + (15 + beamLen) * dir, cy); ctx.stroke();
    // Spear tip glow
    ctx.fillStyle = '#44FFCC'; ctx.globalAlpha = 0.8 * (1 - t * 0.3);
    ctx.beginPath(); ctx.arc(cx + (15 + beamLen) * dir, cy, 8 * (1 - t * 0.5), 0, Math.PI * 2); ctx.fill();
    // Electric crackle
    if (Math.random() > 0.4) {
      ctx.strokeStyle = '#44FFCC'; ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
      const sx = cx + (15 + Math.random() * beamLen) * dir;
      ctx.beginPath(); ctx.moveTo(sx, cy - 5); ctx.lineTo(sx + (Math.random() - 0.5) * 10, cy - 12 - Math.random() * 8); ctx.stroke();
    }
  }

  if (atk.effect === 'cmdJudge1') {
    // 拘束令状: 紫の鎖がターゲットに向かう
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const range = 70 * Math.min(1, t * 2);
    // 紫の波紋
    ctx.strokeStyle = '#C0A0FF'; ctx.lineWidth = 3 * (1 - t * 0.5); ctx.globalAlpha = 0.7 * (1 - t);
    ctx.beginPath(); ctx.arc(cx + range * dir * 0.5, cy - 35, 20 + t * 30, 0, Math.PI * 2); ctx.stroke();
    // 内側の拘束サークル
    ctx.strokeStyle = '#9966DD'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5 * (1 - t);
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx + range * dir * 0.5, cy - 35, 10 + t * 15, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    // 「拘束」の文字エフェクト
    if (t < 0.5) {
      ctx.fillStyle = '#C0A0FF'; ctx.globalAlpha = 0.6 * (1 - t * 2);
      ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('BIND', cx + range * dir * 0.5, cy - 55);
    }
  }

  if (atk.effect === 'cmdJudge2') {
    // 死刑宣告: 全方向に黒い波動
    const t = Math.min(1, (frame - atk.startup) / (atk.active || 1));
    const waveR = 20 + t * 80;
    // 黒い波動リング（複数）
    for (let r = 0; r < 3; r++) {
      const rt = Math.max(0, t - r * 0.15);
      if (rt <= 0) continue;
      const rr = 20 + rt * 80;
      ctx.strokeStyle = r === 0 ? '#2A2A3A' : r === 1 ? '#9966DD' : '#C0A0FF';
      ctx.lineWidth = (4 - r) * (1 - t * 0.5);
      ctx.globalAlpha = 0.6 * (1 - rt);
      ctx.beginPath(); ctx.arc(cx, cy - 35, rr, 0, Math.PI * 2); ctx.stroke();
    }
    // 中央の暗黒オーラ
    if (t < 0.5) {
      const grad = ctx.createRadialGradient(cx, cy - 35, 0, cx, cy - 35, 30);
      grad.addColorStop(0, 'rgba(42,42,58,0.6)');
      grad.addColorStop(1, 'rgba(42,42,58,0)');
      ctx.fillStyle = grad; ctx.globalAlpha = 1 - t * 2;
      ctx.beginPath(); ctx.arc(cx, cy - 35, 30, 0, Math.PI * 2); ctx.fill();
    }
    // 放射状の暗い線
    ctx.strokeStyle = '#2A2A3A'; ctx.lineWidth = 2; ctx.globalAlpha = 0.5 * (1 - t);
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + t * 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 15, cy - 35 + Math.sin(a) * 15);
      ctx.lineTo(cx + Math.cos(a) * waveR, cy - 35 + Math.sin(a) * waveR);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// --- Draw guard state ---
function drawGuardEffect(p) {
  if (!p.guarding) return;
  ctx.save();

  const durRatio = p.guardDurability / GUARD_MAX_DURABILITY;
  const isJustGuard = p.justGuardTimer > 0;

  // Shield bubble
  const shieldRadius = 38;
  if (isJustGuard) {
    // Just guard: bright white shield
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.9;
    ctx.shadowColor = '#FFFFFF';
    ctx.shadowBlur = 20;
  } else {
    // Normal guard: colored shield based on durability
    const r = Math.floor(255 * (1 - durRatio));
    const g = Math.floor(200 * durRatio);
    const b = Math.floor(255 * durRatio);
    ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.3 + durRatio * 0.4;
  }

  ctx.beginPath();
  ctx.arc(p.x, p.y - 35, shieldRadius, 0, Math.PI * 2);
  ctx.stroke();

  // Shield fill
  if (isJustGuard) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
  } else {
    ctx.fillStyle = `rgba(100, 180, 255, ${0.05 + durRatio * 0.1})`;
  }
  ctx.fill();
  ctx.shadowBlur = 0;

  // Durability bar under shield
  const barW = 40, barH = 4;
  const barX = p.x - barW / 2, barY = p.y + 8;
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  const fillColor = durRatio > 0.5 ? '#44DDFF' : durRatio > 0.25 ? '#FFAA00' : '#FF4444';
  ctx.fillStyle = fillColor;
  ctx.fillRect(barX, barY, barW * durRatio, barH);

  ctx.restore();
}

// --- Draw grab state ---
function drawGrabEffect(p) {
  if (!p.grabbing) return;
  const target = players.find(pp => pp.id === p.grabTarget);
  if (!target) return;

  ctx.save();
  // Grab circle
  const t = Math.sin(battleTime * 0.01) * 0.3 + 0.5;
  ctx.strokeStyle = '#FFAA00';
  ctx.lineWidth = 2;
  ctx.globalAlpha = t;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc((p.x + target.x) / 2, (p.y + target.y) / 2 - 35, 35, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // "THROW!" hint
  ctx.globalAlpha = 0.6 + Math.sin(battleTime * 0.008) * 0.3;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFAA00';
  const throwKey = p.id === 0 ? 'X で投げる' : (gameMode === 'cpu' ? '' : 'I で投げる');
  if (throwKey) ctx.fillText(throwKey, p.x, p.y - 110);
  ctx.restore();
}

function drawBattleHUD() {
  // Timer
  const mins = Math.floor(battleTimer / 60);
  const secs = battleTimer % 60;
  const timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  roundRect(ctx, 430, 10, 100, 44, 8); ctx.fill();
  ctx.strokeStyle = battleTimer <= 30 ? '#FF4444' : '#888';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 430, 10, 100, 44, 8); ctx.stroke();
  ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = battleTimer <= 30 ? '#FF4444' : '#FFF';
  if (battleTimer <= 10) { ctx.shadowColor = '#FF4444'; ctx.shadowBlur = 10; }
  ctx.fillText(timeStr, 480, 40); ctx.shadowBlur = 0;

  drawPlayerHUD(120, 530, players[0], '1P', '#44AAFF');
  const p2HudLabel = bossRushMode ? '【BOSS】' : (gameMode === 'cpu' ? 'CPU' : '2P');
  drawPlayerHUD(600, 530, players[1], p2HudLabel, bossRushMode ? '#FF44CC' : '#FF4444');

  // 必殺技ゲージ
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    if (!p || p.ultimateGauge === undefined) continue;
    const gx = i === 0 ? 120 : 600;
    const gy = 525;
    const gw = 240, gh = 8;
    const ratio = p.ultimateGauge / 100;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(gx, gy, gw, gh);
    if (ratio >= 1.0) {
      const pulse = 0.7 + Math.sin(battleTime * 0.15) * 0.3;
      ctx.globalAlpha = pulse;
      const gg = ctx.createLinearGradient(gx, gy, gx + gw, gy);
      gg.addColorStop(0, '#FFD700'); gg.addColorStop(1, '#FFA500');
      ctx.fillStyle = gg;
      ctx.fillRect(gx, gy, gw, gh);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1;
      ctx.strokeRect(gx, gy, gw, gh);
      ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('必殺技 READY!', gx + gw / 2, gy - 2);
    } else {
      const gg = ctx.createLinearGradient(gx, gy, gx + gw * ratio, gy);
      gg.addColorStop(0, '#4488FF'); gg.addColorStop(1, '#00CCFF');
      ctx.fillStyle = gg;
      ctx.fillRect(gx, gy, gw * ratio, gh);
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.strokeRect(gx, gy, gw, gh);
    }
  }
}

function drawPlayerHUD(x, y, player, label, color) {
  if (!player) return;
  const ch = characters[player.charIdx] || characters[0];
  const w = 240, h = 90;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  roundRect(ctx, x, y, w, h, 8); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  roundRect(ctx, x, y, w, h, 8); ctx.stroke();

  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = color; ctx.fillText(label, x + 10, y + 20);
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText(ch.name, x + 40, y + 20);

  const dmgStr = Math.floor(player.damage) + '%';
  let dmgColor = '#FFFFFF';
  if (player.damage >= 100) dmgColor = '#FFDD44';
  if (player.damage >= 200) dmgColor = '#FF8844';
  if (player.damage >= 300) dmgColor = '#FF4444';
  ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = dmgColor; ctx.shadowColor = dmgColor; ctx.shadowBlur = 8;
  ctx.fillText(dmgStr, x + w / 2, y + 62); ctx.shadowBlur = 0;

  ctx.textAlign = 'left';
  for (let i = 0; i < MAX_STOCKS; i++) {
    const sx = x + 10 + i * 22, sy = y + h - 18;
    if (i < player.stocks) {
      ctx.fillStyle = ch.color;
      ctx.beginPath(); ctx.arc(sx + 7, sy + 5, 7, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(sx + 7, sy + 5, 7, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Guard durability bar
  const guardRatio = player.guardDurability / GUARD_MAX_DURABILITY;
  const gbX = x + 120, gbY = y + h - 14, gbW = 110, gbH = 6;
  ctx.fillStyle = '#222';
  roundRect(ctx, gbX, gbY, gbW, gbH, 3); ctx.fill();
  const guardColor = guardRatio > 0.5 ? '#44BBDD' : guardRatio > 0.25 ? '#DDAA22' : '#DD4422';
  ctx.fillStyle = player.guardBreakStun > 0 ? '#FF2200' : guardColor;
  roundRect(ctx, gbX, gbY, gbW * guardRatio, gbH, 3); ctx.fill();
  ctx.font = '9px sans-serif'; ctx.fillStyle = '#AAA';
  ctx.fillText('GUARD', gbX + 1, gbY - 2);
}

// ============================================================
// ONLINE LOBBY
// ============================================================
function generateRoomId() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function setupPeerConnection(conn) {
  peerConn = conn;
  conn.on('open', () => {
    console.log('[ONLINE] Connection opened, isHost:', isHost);
    onlineState = 'connected';
    onlineError = '';
    // Send our character selection
    const myCharIdx = isHost ? p1Select : p2Select;
    conn.send({ type: 'charSelect', charIdx: myCharIdx });
    // Auto-transition to select screen
    onlineMode = true;
    gameMode = 'vs';
    modeSelected = true;
    p1Confirmed = false;
    p2Confirmed = false;
    if (scene === 'online') startTransition('select');
  });
  conn.on('data', (data) => {
    if (data.type === 'charSelect') {
      // Received remote player's character selection
      if (isHost) { p2Select = data.charIdx; }
      else { p1Select = data.charIdx; }
    } else if (data.type === 'charConfirm') {
      if (isHost) { p2Select = data.charIdx; p2Confirmed = true; }
      else { p1Select = data.charIdx; p1Confirmed = true; }
    } else if (data.type === 'startBattle') {
      if (isHost) { p2Select = data.charIdx; }
      else { p1Select = data.charIdx; }
      p1Confirmed = true; p2Confirmed = true;
      if (typeof data.stageIdx === 'number') selectedStage = data.stageIdx;
      if (scene === 'select' || scene === 'stageselect') startTransition('vsintro');
    } else if (data.type === 'input') {
      // Host receives guest input
      if (isHost) {
        remoteKeys = data.keys;
      }
    } else if (data.type === 'ultimate') {
      // Guest: trigger ultimate visual
      ultimateActive = true;
      ultimatePlayerId = data.playerId;
      ultimatePhase = 'darken';
      ultimateTimer = 0;
      ultimateVideo = null; // Guest skips video, uses fallback
    } else if (data.type === 'state') {
      // Guest receives authoritative state from host
      if (!isHost) {
        applyHostState(data);
      }
    }
  });
  conn.on('close', () => {
    console.log('[ONLINE] Connection closed');
    onlineError = '接続が切断されました';
    onlineState = 'menu';
    onlineMode = false;
    peerConn = null;
  });
  conn.on('error', (err) => {
    console.error('[ONLINE] Connection error:', err);
    onlineError = 'エラー: ' + err;
  });
}

function startHosting() {
  onlineRoomId = generateRoomId();
  onlineState = 'hosting';
  onlineError = '';
  isHost = true;
  console.log('[ONLINE] Hosting room:', onlineRoomId);
  peer = new Peer('smash-' + onlineRoomId);
  peer.on('open', (id) => {
    console.log('[ONLINE] Peer opened with ID:', id);
    onlineState = 'hosting';
  });
  peer.on('connection', (conn) => {
    console.log('[ONLINE] Guest connected!');
    setupPeerConnection(conn);
  });
  peer.on('error', (err) => {
    console.error('[ONLINE] Peer error:', err.type, err);
    onlineError = '接続エラー: ' + err.type;
    onlineState = 'menu';
  });
}

function joinRoom(roomId) {
  onlineState = 'joining';
  onlineError = '';
  isHost = false;
  console.log('[ONLINE] Joining room:', roomId);
  peer = new Peer();
  peer.on('open', (id) => {
    console.log('[ONLINE] Guest peer opened:', id, '→ connecting to smash-' + roomId);
    const conn = peer.connect('smash-' + roomId, { reliable: true });
    setupPeerConnection(conn);
  });
  peer.on('error', (err) => {
    console.error('[ONLINE] Peer error:', err.type, err);
    onlineError = 'エラー: ' + err.type;
    onlineState = 'menu';
  });
}

let guestSendCounter = 0;
let lastGuestKeys = null;
function sendGuestInput() {
  if (!peerConn || !peerConn.open) return;
  guestSendCounter++;
  const myKeys = {
    left: !!(keys['ArrowLeft']),
    right: !!(keys['ArrowRight']),
    up: !!(keys['ArrowUp']),
    down: !!(keys['ArrowDown']),
    z: !!(keys['z'] || keys['Z']),
    x: !!(keys['x'] || keys['X']),
    c: !!(keys['c'] || keys['C']),
    s: !!(keys['s'] || keys['S']),
    a: !!(keys['a'] || keys['A']),
    d: !!(keys['d'] || keys['D']),
  };
  // Send every frame but skip if unchanged (no action keys differ)
  if (lastGuestKeys && guestSendCounter % 2 !== 0) {
    let same = true;
    for (const k in myKeys) { if (myKeys[k] !== lastGuestKeys[k]) { same = false; break; } }
    if (same) return;
  }
  lastGuestKeys = { ...myKeys };
  peerConn.send({ type: 'input', keys: myKeys });
}

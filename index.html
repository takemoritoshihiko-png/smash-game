  } catch(e) {}
  bgmAudio.load();
}

// --- Particles ---
function spawnTitleParticle() {
  titleParticles.push({
    x: Math.random() * 960,
    y: 640 + 10,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -1 - Math.random() * 2,
    size: 1 + Math.random() * 3,
    alpha: 0.3 + Math.random() * 0.5,
    color: ['#FF4444', '#4488FF', '#44FF88', '#FFDD44'][Math.floor(Math.random() * 4)],
    life: 200 + Math.random() * 200
  });
}

function updateParticles() {
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.alpha *= 0.998;
    if (p.life <= 0 || p.alpha < 0.01) titleParticles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of titleParticles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Draw character body ---
function drawCharacterBody(x, y, scale, charIndex, time, facingLeft) {
  const ch = characters[charIndex];
  const c = ch.bodyColors;
  const s = scale;
  const bounce = Math.sin(time * 0.03 + charIndex) * 3 * s;
  const cy = y + bounce;

  ctx.save();
  ctx.translate(x, cy);
  if (facingLeft) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 60 * s, 25 * s, 8 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  if (charIndex === 0) {
    // Zen - image
    if (zenImg.complete && zenImg.naturalWidth > 0) {
      const imgW = 70 * s;
      const imgH = 90 * s;
      ctx.drawImage(zenImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 1) {
    // Don - image
    if (donImg.complete && donImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(donImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 2) {
    // Saisoku - image
    if (saisokuImg.complete && saisokuImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(saisokuImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 3) {
    // Meteor - image
    if (meteoImg.complete && meteoImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(meteoImg, -imgW / 2, -35 * s, imgW, imgH);
    }
  } else if (charIndex === 4) {
    // Long - image or Canvas fallback
    if (longImg.complete && longImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      ctx.drawImage(longImg, -imgW / 2, -35 * s, imgW, imgH);
    } else {
      // Canvas描画：機械系・槍使い
      // 体（装甲風）
      ctx.fillStyle = '#5A6AAE';
      ctx.fillRect(-12 * s, -20 * s, 24 * s, 45 * s);
      // 肩アーマー
      ctx.fillStyle = '#7B8CDE';
      ctx.fillRect(-16 * s, -18 * s, 10 * s, 12 * s);
      ctx.fillRect(6 * s, -18 * s, 10 * s, 12 * s);
      // 頭（ヘルメット）
      ctx.fillStyle = '#8899DD';
      ctx.beginPath();
      ctx.arc(0, -25 * s, 12 * s, 0, Math.PI * 2);
      ctx.fill();
      // バイザー
      ctx.fillStyle = '#44FFCC';
      ctx.fillRect(-8 * s, -28 * s, 16 * s, 6 * s);
      // 脚
      ctx.fillStyle = '#4A5A9E';
      ctx.fillRect(-10 * s, 25 * s, 8 * s, 20 * s);
      ctx.fillRect(2 * s, 25 * s, 8 * s, 20 * s);
      // 槍
      ctx.fillStyle = '#AABBEE';
      ctx.fillRect(14 * s, -35 * s, 3 * s, 70 * s);
      // 槍の穂先
      ctx.fillStyle = '#44FFCC';
      ctx.beginPath();
      ctx.moveTo(15.5 * s, -40 * s);
      ctx.lineTo(12 * s, -30 * s);
      ctx.lineTo(19 * s, -30 * s);
      ctx.closePath();
      ctx.fill();
      // 機械パーツ（胸のコア）
      ctx.fillStyle = '#44FFCC';
      ctx.fillRect(-4 * s, -10 * s, 8 * s, 8 * s);
      ctx.fillStyle = '#33DDAA';
      ctx.fillRect(-2 * s, -8 * s, 4 * s, 4 * s);
    }
  } else if (charIndex === 5) {
    // うる男 - 狼系獣人 (landscape image: center-crop to portrait)
    if (uruoImg.complete && uruoImg.naturalWidth > 0) {
      const imgW = 75 * s;
      const imgH = 90 * s;
      const nw = uruoImg.naturalWidth;
      const nh = uruoImg.naturalHeight;
      // Crop center portion to match 75:90 (5:6) portrait aspect ratio
      const cropH = nh;
      const cropW = cropH * (75 / 90);
      const cropX = (nw - cropW) / 2;
      ctx.drawImage(uruoImg, cropX, 0, cropW, cropH, -imgW / 2, -35 * s, imgW, imgH);
    } else {
      // Canvas描画：狼系獣人
      // 脚
      ctx.fillStyle = '#5A4A3A';
      ctx.fillRect(-10 * s, 25 * s, 8 * s, 22 * s);
      ctx.fillRect(2 * s, 25 * s, 8 * s, 22 * s);
      // 体（がっしり）
      ctx.fillStyle = '#7A6A5A';
      ctx.fillRect(-14 * s, -18 * s, 28 * s, 44 * s);
      // 胸の毛皮
      ctx.fillStyle = '#C8A878';
      ctx.beginPath();
      ctx.moveTo(-10 * s, -10 * s);
      ctx.lineTo(0, 5 * s);
      ctx.lineTo(10 * s, -10 * s);
      ctx.closePath();
      ctx.fill();
      // 腕（太い）
      ctx.fillStyle = '#6A5A4A';
      ctx.fillRect(-18 * s, -14 * s, 7 * s, 28 * s);
      ctx.fillRect(11 * s, -14 * s, 7 * s, 28 * s);
      // 爪（右手）
      ctx.fillStyle = '#EEE';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect((12 + i * 2) * s, 14 * s, 1.5 * s, 5 * s);
      }
      // 頭（狼）
      ctx.fillStyle = '#8A7A6A';
      ctx.beginPath();
      ctx.arc(0, -28 * s, 13 * s, 0, Math.PI * 2);
      ctx.fill();
      // 耳（三角）
      ctx.fillStyle = '#6A5A4A';
      ctx.beginPath();
      ctx.moveTo(-10 * s, -38 * s);
      ctx.lineTo(-6 * s, -50 * s);
      ctx.lineTo(-2 * s, -36 * s);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(2 * s, -36 * s);
      ctx.lineTo(6 * s, -50 * s);
      ctx.lineTo(10 * s, -38 * s);
      ctx.closePath();
      ctx.fill();
      // 耳の内側
      ctx.fillStyle = '#C8A878';
      ctx.beginPath();
      ctx.moveTo(-8 * s, -39 * s);
      ctx.lineTo(-6 * s, -47 * s);
      ctx.lineTo(-3 * s, -37 * s);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(3 * s, -37 * s);
      ctx.lineTo(6 * s, -47 * s);
      ctx.lineTo(8 * s, -39 * s);
      ctx.closePath();
      ctx.fill();
      // マズル（口元）
      ctx.fillStyle = '#B8A888';
      ctx.beginPath();
      ctx.ellipse(0, -22 * s, 7 * s, 5 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // 鼻
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(0, -24 * s, 2.5 * s, 0, Math.PI * 2);
      ctx.fill();
      // 目（鋭い）
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.ellipse(-5 * s, -30 * s, 3 * s, 2 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();

        ctx.quadraticCurveTo(-30 * ds, 20 * ds, -25 * ds, 5 * ds);
        ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        // 脚
        ctx.fillStyle = '#993300';
        ctx.fillRect(-10 * ds, 20 * ds, 8 * ds, 22 * ds);
        ctx.fillRect(2 * ds, 20 * ds, 8 * ds, 22 * ds);
        // 体
        ctx.fillStyle = '#CC4400';
        ctx.beginPath(); ctx.ellipse(0, 0, 16 * ds, 22 * ds, 0, 0, Math.PI * 2); ctx.fill();
        // 腹
        ctx.fillStyle = '#FFAA44';
        ctx.beginPath(); ctx.ellipse(0, 5 * ds, 10 * ds, 14 * ds, 0, 0, Math.PI * 2); ctx.fill();
        // 頭
        ctx.fillStyle = '#CC4400';
        ctx.beginPath(); ctx.ellipse(0, -25 * ds, 12 * ds, 10 * ds, 0, 0, Math.PI * 2); ctx.fill();
        // ツノ
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.moveTo(-6 * ds, -33 * ds); ctx.lineTo(-4 * ds, -45 * ds); ctx.lineTo(-1 * ds, -32 * ds); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(6 * ds, -33 * ds); ctx.lineTo(4 * ds, -45 * ds); ctx.lineTo(1 * ds, -32 * ds); ctx.closePath(); ctx.fill();
        // 目（赤い）
        ctx.fillStyle = '#FF2200';
        ctx.beginPath(); ctx.ellipse(-5 * ds, -26 * ds, 3 * ds, 2 * ds, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(5 * ds, -26 * ds, 3 * ds, 2 * ds, 0, 0, Math.PI * 2); ctx.fill();
        // 口（牙）
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath(); ctx.moveTo(-3 * ds, -19 * ds); ctx.lineTo(-2 * ds, -15 * ds); ctx.lineTo(-1 * ds, -19 * ds); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(3 * ds, -19 * ds); ctx.lineTo(2 * ds, -15 * ds); ctx.lineTo(1 * ds, -19 * ds); ctx.closePath(); ctx.fill();
        // 炎の息（アニメーション）
        const flameT = Math.sin(time * 0.05) * 0.5 + 0.5;
        ctx.fillStyle = `rgba(255, ${Math.floor(100 + flameT * 100)}, 0, ${0.3 + flameT * 0.3})`;
        ctx.beginPath(); ctx.ellipse(12 * ds, -22 * ds, 5 * ds + flameT * 3 * ds, 3 * ds, 0, 0, Math.PI * 2); ctx.fill();
      } else {
        // 人型モード描画
        // 脚
        ctx.fillStyle = '#993300';
        ctx.fillRect(-9 * s, 25 * s, 7 * s, 20 * s);
        ctx.fillRect(2 * s, 25 * s, 7 * s, 20 * s);
        // 体
        ctx.fillStyle = '#CC4400';
        ctx.fillRect(-11 * s, -16 * s, 22 * s, 42 * s);
        // 胸の鱗模様
        ctx.fillStyle = '#FF8833';
        ctx.beginPath(); ctx.moveTo(-8 * s, -8 * s); ctx.lineTo(0, 5 * s); ctx.lineTo(8 * s, -8 * s); ctx.closePath(); ctx.fill();
        // 腕
        ctx.fillStyle = '#BB3300';
        ctx.fillRect(-15 * s, -12 * s, 5 * s, 24 * s);
        ctx.fillRect(10 * s, -12 * s, 5 * s, 24 * s);
        // 頭
        ctx.fillStyle = '#FFDBB8';
        ctx.beginPath(); ctx.arc(0, -25 * s, 11 * s, 0, Math.PI * 2); ctx.fill();
        // 髪（炎っぽい赤い髪）
        ctx.fillStyle = '#FF4400';
        ctx.beginPath();
        ctx.moveTo(-10 * s, -28 * s);
        ctx.lineTo(-8 * s, -42 * s);
        ctx.lineTo(-3 * s, -35 * s);
        ctx.lineTo(0, -44 * s);
        ctx.lineTo(3 * s, -35 * s);
        ctx.lineTo(8 * s, -42 * s);
        ctx.lineTo(10 * s, -28 * s);
        ctx.closePath();
        ctx.fill();
        // 目（鋭い）
        ctx.fillStyle = '#FF6600';
        ctx.beginPath(); ctx.ellipse(-4 * s, -25 * s, 2.5 * s, 2 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(4 * s, -25 * s, 2.5 * s, 2 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(-4 * s, -25 * s, 1.2 * s, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(4 * s, -25 * s, 1.2 * s, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  ctx.restore();
}

// Draw character for battle (with animation transforms)
function drawBattleCharacter(x, y, scale, charIndex, time, facingLeft, animData) {
  const s = scale;

  ctx.save();
  ctx.translate(x, y);
  if (facingLeft) ctx.scale(-1, 1);

  // Animation transforms
  let scaleX = 1, scaleY = 1, rotation = 0, bobY = 0;
  let walkLean = 0;

  // Easing utility
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInCubic(t) { return t * t * t; }
  function easeOutElastic(t) {
    if (t === 0 || t === 1) return t;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;
  }

  // Limb offsets for procedural animation
  let armAngle = 0, legAngle = 0, armSwing = 0;

  if (animData) {
    // Idle breathing animation (per-character) - smoother with additional harmonics
    if (animData.animState === 'idle') {
      const t = animData.animTimer;
      if (charIndex === 0) {
        bobY = Math.sin(t * 0.04) * 2.5 + Math.sin(t * 0.08) * 0.5;
        scaleX = 1 + Math.sin(t * 0.04) * 0.012;
        scaleY = 1 + Math.sin(t * 0.04 + 0.5) * 0.008;
        armAngle = Math.sin(t * 0.03) * 0.03;
      } else if (charIndex === 1) {
        bobY = Math.sin(t * 0.025) * 3.5 + Math.sin(t * 0.05) * 0.8;
        scaleX = 1 + Math.sin(t * 0.025 + 1) * 0.01;
        scaleY = 1 + Math.sin(t * 0.025) * 0.018;
        armAngle = Math.sin(t * 0.02) * 0.02;
      } else if (charIndex === 2) {
        bobY = Math.sin(t * 0.07) * 2.5 + Math.sin(t * 0.14) * 1;
        scaleX = 1 + Math.sin(t * 0.09) * 0.015;
        scaleY = 1 + Math.sin(t * 0.07 + 0.3) * 0.01;
        armAngle = Math.sin(t * 0.08) * 0.05;
      } else if (charIndex === 3) {
        bobY = Math.sin(t * 0.045) * 2.5 + Math.sin(t * 0.09) * 0.6;
        walkLean = Math.sin(t * 0.03) * 0.025;
        scaleY = 1 + Math.sin(t * 0.045) * 0.01;
        armAngle = Math.sin(t * 0.04) * 0.04;
      } else if (charIndex === 4) {
        bobY = Math.sin(t * 0.06) * 1.5 + Math.sin(t * 0.12) * 0.5;
        scaleX = 1 + Math.sin(t * 0.08) * 0.01;
        scaleY = 1 + Math.sin(t * 0.06 + 0.5) * 0.006;
      } else if (charIndex === 12) {
        // Tank: slow heavy breathing
        bobY = Math.sin(t * 0.02) * 2 + Math.sin(t * 0.04) * 0.5;
        scaleX = 1 + Math.sin(t * 0.02) * 0.008;
        scaleY = 1 + Math.sin(t * 0.02 + 0.5) * 0.012;
      } else if (charIndex === 13) {
        // Namioji: boxer bounce
        bobY = Math.sin(t * 0.06) * 3 + Math.sin(t * 0.12) * 1;
        scaleX = 1 + Math.sin(t * 0.06) * 0.012;
        scaleY = 1 + Math.sin(t * 0.06 + 0.5) * 0.01;
        armAngle = Math.sin(t * 0.05) * 0.04;
      } else if (charIndex === 14) {
        // Tokko: rapid twitchy breathing
        bobY = Math.sin(t * 0.08) * 3 + Math.sin(t * 0.16) * 1.5;
        scaleX = 1 + Math.sin(t * 0.1) * 0.015;
        scaleY = 1 + Math.sin(t * 0.08 + 0.3) * 0.012;
        armAngle = Math.sin(t * 0.07) * 0.06;
      } else if (charIndex === 15) {
        // Sam: bouncy chicken hop
        bobY = Math.sin(t * 0.07) * 4 + Math.abs(Math.sin(t * 0.14)) * 2;
        scaleX = 1 + Math.sin(t * 0.07) * 0.015;
        scaleY = 1 + Math.sin(t * 0.07 + 0.5) * 0.02;
        armAngle = Math.sin(t * 0.1) * 0.08;
      } else if (charIndex === 16) {
        // King: confident, slow sway
        bobY = Math.sin(t * 0.03) * 2;
        scaleX = 1 + Math.sin(t * 0.03) * 0.008;
        scaleY = 1 + Math.sin(t * 0.03 + 0.5) * 0.006;
        armAngle = Math.sin(t * 0.025) * 0.02;
      } else if (charIndex === 17) {
        // Onpa: vibrating pulse
        bobY = Math.sin(t * 0.06) * 2 + Math.sin(t * 0.18) * 1;
        scaleX = 1 + Math.sin(t * 0.12) * 0.01;
        scaleY = 1 + Math.sin(t * 0.06 + 0.5) * 0.008;
      } else if (charIndex === 18) {
        // Sen: salaryman slight nod
        bobY = Math.sin(t * 0.04) * 2 + Math.sin(t * 0.08) * 0.5;
        scaleX = 1 + Math.sin(t * 0.04) * 0.008;
        scaleY = 1 + Math.sin(t * 0.04 + 0.5) * 0.006;
        armAngle = Math.sin(t * 0.03) * 0.02;
      } else if (charIndex === 19) {
        // Dosboss: heavy idle rumble
        bobY = Math.sin(t * 0.03) * 1.5 + Math.sin(t * 0.09) * 0.5;
        scaleX = 1 + Math.sin(t * 0.03) * 0.006;
        scaleY = 1 + Math.sin(t * 0.03 + 0.5) * 0.01;
      }
    }

    // Walk animation - 4-phase cycle with easing
    if (animData.animState === 'walk') {
      const wc = animData.walkCycle;
      // 4-frame walk phase: contact, down, passing, up
      const walkSpeeds = [0.18, 0.12, 0.3, 0.15, 0.2];
      const ws = walkSpeeds[charIndex] || 0.18;
      const phase = (wc * ws) % (Math.PI * 2);
      const walkPhase = Math.floor((phase / (Math.PI * 2)) * 4); // 0-3
      // Smooth sub-phase for interpolation
      const subPhase = ((phase / (Math.PI * 2)) * 4) % 1;
      const easedSub = easeOutCubic(subPhase);

      if (charIndex === 0) {
        bobY = Math.abs(Math.sin(phase)) * 2.5;
        walkLean = Math.sin(phase) * 0.07;
        scaleY = 0.96 + Math.abs(Math.sin(phase)) * 0.04;
        legAngle = Math.sin(phase) * 0.15;
        armSwing = -Math.sin(phase) * 0.12;
      } else if (charIndex === 1) {
        // Don: heavy stomp with impact pause
        const stompT = Math.abs(Math.sin(phase));
        const eased = stompT < 0.5 ? easeOutCubic(stompT * 2) * 0.5 : 0.5 + easeInCubic((stompT - 0.5) * 2) * 0.5;
        bobY = -eased * 6;
        scaleX = 1 + Math.sin(phase) * 0.04;
        scaleY = 1 - eased * 0.05;
        walkLean = Math.sin(phase) * 0.03;
        legAngle = Math.sin(phase) * 0.1;
        armSwing = -Math.sin(phase) * 0.08;
      } else if (charIndex === 2) {
        bobY = Math.abs(Math.sin(phase)) * 3.5;
        walkLean = Math.sin(phase) * 0.1;
        scaleX = 1 + Math.sin(phase * 2) * 0.015;
        legAngle = Math.sin(phase) * 0.2;
        armSwing = -Math.sin(phase) * 0.18;
      } else if (charIndex === 3) {
        bobY = Math.abs(Math.sin(phase)) * 3.5;
        scaleX = 1 - Math.sin(phase) * 0.025;
        walkLean = Math.sin(phase) * 0.05;
        legAngle = Math.sin(phase) * 0.12;
        armSwing = -Math.sin(phase) * 0.1;
      } else if (charIndex === 4) {
        // Long: mechanical stride with snap
        const mechPhase = phase % (Math.PI * 2);
        const mechT = mechPhase / (Math.PI * 2);
        const snapped = Math.round(mechT * 4) / 4;
        const blend = snapped * 0.6 + mechT * 0.4;
        bobY = Math.abs(Math.sin(blend * Math.PI * 2)) * 3;
        walkLean = Math.sin(blend * Math.PI * 2) * 0.035;
        scaleY = 1 - Math.abs(Math.sin(blend * Math.PI * 2)) * 0.025;
        legAngle = Math.sin(blend * Math.PI * 2) * 0.1;
      } else if (charIndex === 12) {
        // Tank: very heavy stomping walk
        const stompT = Math.abs(Math.sin(phase));
        const eased = stompT < 0.5 ? stompT * 2 : 1;
        bobY = -eased * 4;
        scaleX = 1 + Math.sin(phase) * 0.03;
        scaleY = 1 - eased * 0.04;
        walkLean = Math.sin(phase) * 0.02;
        legAngle = Math.sin(phase) * 0.08;
        armSwing = -Math.sin(phase) * 0.06;
      } else if (charIndex === 13) {
        // Namioji: light boxing footwork
        bobY = Math.abs(Math.sin(phase)) * 3;
        walkLean = Math.sin(phase) * 0.08;
        scaleY = 0.97 + Math.abs(Math.sin(phase)) * 0.03;
        legAngle = Math.sin(phase) * 0.14;
        armSwing = -Math.sin(phase) * 0.12;
      } else if (charIndex === 14) {
        // Tokko: very fast sprint
        bobY = Math.abs(Math.sin(phase)) * 4;
        walkLean = Math.sin(phase) * 0.12;
        scaleX = 1 + Math.sin(phase * 2) * 0.02;
        legAngle = Math.sin(phase) * 0.22;
        armSwing = -Math.sin(phase) * 0.2;
      } else if (charIndex === 15) {
        // Sam: chicken waddle
        bobY = Math.abs(Math.sin(phase)) * 5;
        walkLean = Math.sin(phase) * 0.1;
        scaleX = 1 + Math.sin(phase * 2) * 0.02;
        scaleY = 0.95 + Math.abs(Math.sin(phase)) * 0.05;
        legAngle = Math.sin(phase) * 0.18;
        armSwing = -Math.sin(phase) * 0.15;
      } else if (charIndex === 16) {
        // King: regal stride
        bobY = Math.abs(Math.sin(phase)) * 2.5;
        walkLean = Math.sin(phase) * 0.06;
        scaleY = 0.97 + Math.abs(Math.sin(phase)) * 0.03;
        legAngle = Math.sin(phase) * 0.12;
        armSwing = -Math.sin(phase) * 0.1;
      } else if (charIndex === 17) {
        // Onpa: gliding movement
        bobY = Math.abs(Math.sin(phase)) * 2;
        walkLean = Math.sin(phase) * 0.06;
        scaleX = 1 + Math.sin(phase * 2) * 0.015;
        legAngle = Math.sin(phase) * 0.1;
        armSwing = -Math.sin(phase) * 0.08;
      } else if (charIndex === 18) {
        // Sen: business walk
        bobY = Math.abs(Math.sin(phase)) * 2.5;
        walkLean = Math.sin(phase) * 0.06;
        scaleY = 0.97 + Math.abs(Math.sin(phase)) * 0.03;
        legAngle = Math.sin(phase) * 0.12;
        armSwing = -Math.sin(phase) * 0.1;
      } else if (charIndex === 19) {
        // Dosboss: heavy tank roll
        bobY = Math.abs(Math.sin(phase)) * 2;
        walkLean = Math.sin(phase) * 0.03;
        scaleX = 1 + Math.sin(phase) * 0.02;
        scaleY = 1 - Math.abs(Math.sin(phase)) * 0.03;
        legAngle = Math.sin(phase) * 0.08;
        armSwing = -Math.sin(phase) * 0.06;
      }
    }

    // Jump: 3-phase animation (rise / apex / fall) with easing
    if (animData.jumpSquash > 0) {
      const t = easeOutCubic(animData.jumpSquash / 6);
      scaleX = 1 + t * 0.18;
      scaleY = 1 - t * 0.18;
    }
    if (animData.animState === 'jump') {
      // Rising: velocity-based stretch (faster = more stretch)
      const riseSpeed = animData.vy ? Math.min(Math.abs(animData.vy) / 13, 1) : 0.5;
      const stretchAmt = 0.05 + riseSpeed * 0.1;
      scaleX = 1 - stretchAmt;
      scaleY = 1 + stretchAmt;
      walkLean = -0.06 * riseSpeed;
      // Arms up during rise
      armSwing = -0.2 * riseSpeed;
    }
    if (animData.animState === 'fall') {
      // Falling: velocity-based spread (faster = more spread)
      const fallSpeed = animData.vy ? Math.min(animData.vy / MAX_FALL_SPEED, 1) : 0.3;
      scaleX = 1 + 0.03 + fallSpeed * 0.04;
      scaleY = 1 - 0.03 - fallSpeed * 0.04;
      walkLean = 0.02 + fallSpeed * 0.02;
      armSwing = 0.15 * fallSpeed;
    }

    // Landing squash - elastic bounce with easing
    if (animData.landSquash > 0) {
      const raw = animData.landSquash / 12; // extended duration
      const t = easeOutElastic(1 - raw);
      scaleX = 1 + (1 - t) * 0.25;
      scaleY = 1 - (1 - t) * 0.25;
    }

    // Attack animation: squash/stretch during attack phases
    if (animData.attacking && animData.attackData) {
      const atk = animData.attackData;
      const frame = animData.attackFrame;
      const total = atk.startup + atk.active + atk.recovery;
      if (frame <= atk.startup) {
        // Startup: wind-up - slight pullback with easing
        const t = easeInCubic(frame / atk.startup);
        scaleX = 1 + t * 0.06;
        scaleY = 1 - t * 0.04;
        walkLean = -0.05 * t;
      } else if (frame <= atk.startup + atk.active) {
        // Active: snap forward - fast start, slow end
        const t = easeOutCubic((frame - atk.startup) / atk.active);
        scaleX = 1 - t * 0.08;
        scaleY = 1 + t * 0.06;
        walkLean = 0.08 * (1 - t);
      } else {
        // Recovery: ease back to neutral
        const t = easeOutCubic((frame - atk.startup - atk.active) / atk.recovery);
        scaleX = 1 - (1 - t) * 0.08;
        scaleY = 1 + (1 - t) * 0.06;
        walkLean = 0;
      }
    }

    // Strong knockback spin - smoother decay
    if (animData.spinAngle !== 0) {
      rotation = animData.spinAngle;
    }

    // Damage blink: 2-frame alternating with smooth alpha
    // (handled in rendering below via damageTint)
  }

  // Apply transforms
  ctx.translate(0, bobY);
  ctx.rotate(rotation + walkLean);
  ctx.scale(scaleX, scaleY);

  // Draw character image
  // 天才 uses different images per mode
  const tensaiIsDragon = animData && animData.dragonMode;
  const tensaiActiveImg = tensaiIsDragon ? tensaiDragonImg : tensaiHumanImg;
  const imgs = [zenImg, donImg, saisokuImg, meteoImg, longImg, uruoImg, kumataroImg, bulletImg, shaudenImg, judgemanImg, tensaiActiveImg, catbusImg, tankImg, namiojiImg, tokkoImg, samImg, kingImg, onpaImg, senImg, dosbossImg];
  const imgSizes = [[70, 90], [75, 90], [75, 90], [75, 90], [75, 90], [75, 90], [78, 90], [70, 90], [75, 90], [75, 90], [tensaiIsDragon ? 85 : 75, tensaiIsDragon ? 95 : 90], [80, 90], [168, 112], [75, 90], [75, 90], [75, 90], [75, 90], [75, 90], [85, 85], [75, 100]];
  const img = imgs[charIndex];
  if (img && img.complete && img.naturalWidth > 0) {
    const imgW = imgSizes[charIndex][0] * s;
    const imgH = imgSizes[charIndex][1] * s;
    const tankOfsX = charIndex === 12 ? -5 * s : 0;
    const tankOfsY = charIndex === 12 ? -20 * s : 0;
    const useScreen = charIndex === 12 || charIndex === 13 || charIndex === 18 || charIndex === 19;
    if (useScreen) ctx.globalCompositeOperation = 'screen';

    // Source crop for landscape images (うる男)
    let sx = 0, sy = 0, sw = img.naturalWidth, sh = img.naturalHeight;
    if (charIndex === 5) {
      const cropW = sh * (imgSizes[5][0] / imgSizes[5][1]);
      sx = (sw - cropW) / 2;
      sw = cropW;
    }
    if (charIndex === 19) {
      const cropH = sh * 0.85;
      sy = sh * 0.05;
      sh = cropH;
    }

    // Damage flash: smooth 2-frame blink with fading intensity
    if (animData && animData.damageTint > 0) {
      const blinkPhase = Math.floor(animData.damageTint / 3) % 2; // 3-frame alternation for smoother blink
      const intensity = Math.min(animData.damageTint / 8, 1); // fade out over time
      if (blinkPhase === 0) {
        // Red tint frame
        if (!drawBattleCharacter._tintCanvas) {
          drawBattleCharacter._tintCanvas = document.createElement('canvas');
          drawBattleCharacter._tintCtx = drawBattleCharacter._tintCanvas.getContext('2d');
        }
        const tc = drawBattleCharacter._tintCanvas;
        const tctx = drawBattleCharacter._tintCtx;
        tc.width = img.naturalWidth;
        tc.height = img.naturalHeight;
        tctx.clearRect(0, 0, tc.width, tc.height);
        tctx.drawImage(img, 0, 0);
        tctx.globalCompositeOperation = 'source-atop';
        tctx.fillStyle = '#FF3333';
        tctx.globalAlpha = 0.5 * intensity;
        tctx.fillRect(0, 0, tc.width, tc.height);
        tctx.globalCompositeOperation = 'source-over';
        tctx.globalAlpha = 1;
        // Slight shake on damage
        const shake = intensity * 2;
        ctx.drawImage(tc, sx, sy, sw, sh, -imgW / 2 + tankOfsX + (Math.random() - 0.5) * shake, -35 * s + tankOfsY + (Math.random() - 0.5) * shake, imgW, imgH);
      } else {
        // Normal frame (white flash)
        ctx.globalAlpha = 0.7 + 0.3 * intensity;
        ctx.drawImage(img, sx, sy, sw, sh, -imgW / 2 + tankOfsX, -35 * s + tankOfsY, imgW, imgH);
        ctx.globalAlpha = 1;
      }
    } else {
      ctx.drawImage(img, sx, sy, sw, sh, -imgW / 2 + tankOfsX, -35 * s + tankOfsY, imgW, imgH);
    }
    if (useScreen) ctx.globalCompositeOperation = 'source-over';
  } else if (charIndex === 4) {
    // Long: Canvas fallback for battle
    ctx.fillStyle = '#5A6AAE';
    ctx.fillRect(-12 * s, -20 * s, 24 * s, 45 * s);
    ctx.fillStyle = '#7B8CDE';
    ctx.fillRect(-16 * s, -18 * s, 10 * s, 12 * s);
    ctx.fillRect(6 * s, -18 * s, 10 * s, 12 * s);
    ctx.fillStyle = '#8899DD';
    ctx.beginPath(); ctx.arc(0, -25 * s, 12 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#44FFCC';
    ctx.fillRect(-8 * s, -28 * s, 16 * s, 6 * s);
    ctx.fillStyle = '#4A5A9E';
    ctx.fillRect(-10 * s, 25 * s, 8 * s, 20 * s);
    ctx.fillRect(2 * s, 25 * s, 8 * s, 20 * s);
    ctx.fillStyle = '#AABBEE';
    ctx.fillRect(14 * s, -35 * s, 3 * s, 70 * s);
    ctx.fillStyle = '#44FFCC';
    ctx.beginPath();
    ctx.moveTo(15.5 * s, -40 * s); ctx.lineTo(12 * s, -30 * s); ctx.lineTo(19 * s, -30 * s);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#44FFCC';
    ctx.fillRect(-4 * s, -10 * s, 8 * s, 8 * s);
    ctx.fillStyle = '#33DDAA';
    ctx.fillRect(-2 * s, -8 * s, 4 * s, 4 * s);
  } else if (charIndex === 5) {
    // うる男: Canvas fallback for battle
    // 脚

      } else if (atkType === 'aerial') {

    // ─── サイソク（忍者）───

          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#FF6B6B';
          ctx.beginPath(); ctx.ellipse(0, 12 * s, 18 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      } else if (atkType === 'up') {
        // 上攻撃: 両手振り上げ
        let angle;
        if (phase === 'startup') angle = Math.PI * 0.2 + easeIn * 0.2;
        else if (phase === 'active') angle = Math.PI * 0.4 - easeOut * Math.PI * 0.9;
        else angle = -Math.PI * 0.5 * (1 - easeOut);
        // 左手
        ctx.save();
        ctx.translate(-8 * s, armY);
        ctx.rotate(angle);
        ctx.fillStyle = '#3A3A3A';
        ctx.beginPath(); ctx.ellipse(0, 10 * s, 5 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4A4A4A';
        ctx.beginPath(); ctx.arc(0, 20 * s, pawR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        // 右手
        ctx.save();
        ctx.translate(8 * s, armY);
        ctx.rotate(angle);
        ctx.fillStyle = '#3A3A3A';
        ctx.beginPath(); ctx.ellipse(0, 10 * s, 5 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4A4A4A';
        ctx.beginPath(); ctx.arc(0, 20 * s, pawR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        if (phase === 'active') {
          ctx.globalAlpha = 0.3 * (1 - phaseT);
          ctx.strokeStyle = '#FF6B6B';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, armY, 22 * s, Math.PI * 0.6, Math.PI * 0.6 - phaseT * Math.PI * 0.7);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'side') {
        // 横攻撃: クマスワイプ
        let reach;
        if (phase === 'startup') reach = -6 * s * easeIn;
        else if (phase === 'active') reach = 22 * s * easeOut;
        else reach = 22 * s * (1 - easeOut);
        ctx.translate(armX + reach, armY + 2 * s);
        ctx.fillStyle = '#3A3A3A';
        ctx.beginPath(); ctx.ellipse(-10 * s, 0, 6 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4A4A4A';
        ctx.beginPath(); ctx.arc(0, 0, pawR * 1.1, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#D4877A';
        ctx.beginPath(); ctx.arc(1 * s, 0, 3.5 * s, 0, Math.PI * 2); ctx.fill();
        if (phase === 'active') {
          ctx.globalAlpha = 0.35 * (1 - phaseT);
          ctx.strokeStyle = '#FF4444';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, pawR * 2, -0.5, -0.5 + phaseT * Math.PI * 0.5);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'down' || atkType === 'downair') {
        // 下/空中下: お尻落とし・お尻プレス
        let squash;
        if (phase === 'startup') squash = easeIn * 0.1;
        else if (phase === 'active') squash = 0.1 + easeOut * 0.15;
        else squash = 0.25 * (1 - easeOut);
        ctx.save();
        ctx.scale(1 + squash, 1 - squash);
        if (phase === 'active') {
          ctx.globalAlpha = 0.4 * (1 - phaseT);
          ctx.fillStyle = '#FF6B6B';
          ctx.beginPath(); ctx.ellipse(0, 20 * s, 14 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }
    }
    // ─── バレット（銃使い・遠距離型）───
    else if (charIndex === 7) {
      const gunX = 12 * s, gunY = -8 * s;

      if (atkType === 'normal') {
        // 通常: ピストルショット - 銃を前に構えて発射
        let reach;
        if (phase === 'startup') reach = 5 * s * easeIn;
        else if (phase === 'active') reach = 8 * s + 3 * s * (1 - easeOut);
        else reach = 8 * s * (1 - easeOut);
        ctx.translate(gunX + reach, gunY);
        // 銃本体
        ctx.fillStyle = '#555';
        ctx.fillRect(-2 * s, -2 * s, 14 * s, 4 * s);
        ctx.fillStyle = '#888';
        ctx.fillRect(10 * s, -3 * s, 4 * s, 6 * s);
        // マズルフラッシュ
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.7 * (1 - phaseT * 2.5);
          ctx.fillStyle = '#FFAA00';
          ctx.beginPath(); ctx.arc(16 * s, 0, (6 + phaseT * 4) * s, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#FFF';
          ctx.beginPath(); ctx.arc(16 * s, 0, 3 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'strong') {
        // 強: チャージショット
        let charge;
        if (phase === 'startup') charge = easeIn;
        else if (phase === 'active') charge = 1;
        else charge = 1 - easeOut;
        ctx.translate(gunX, gunY);
        // 銃（大型）
        ctx.fillStyle = '#444';
        ctx.fillRect(-4 * s, -3 * s, 18 * s, 6 * s);
        ctx.fillStyle = '#666';
        ctx.fillRect(12 * s, -4 * s, 5 * s, 8 * s);
        // チャージエフェクト
        if (phase === 'startup') {
          ctx.globalAlpha = 0.4 * charge;
          ctx.strokeStyle = '#FF66AA';
          ctx.lineWidth = 2 * s;
          ctx.beginPath(); ctx.arc(18 * s, 0, (3 + charge * 6) * s, 0, Math.PI * 2); ctx.stroke();
          ctx.globalAlpha = 1;
        }
        // 発射エフェクト
        if (phase === 'active' && phaseT < 0.5) {
          ctx.globalAlpha = 0.8 * (1 - phaseT * 2);
          ctx.fillStyle = '#FF3366';
          ctx.beginPath(); ctx.arc(20 * s, 0, (8 + phaseT * 6) * s, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#FFF';
          ctx.beginPath(); ctx.arc(20 * s, 0, 4 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'special') {
        // 必殺: スナイパー
        let angle;
        if (phase === 'startup') angle = -0.05 * easeIn;
        else angle = -0.05;
        ctx.translate(gunX - 4 * s, gunY - 4 * s);
        ctx.rotate(angle);
        // スナイパーライフル
        ctx.fillStyle = '#333';
        ctx.fillRect(-6 * s, -2 * s, 28 * s, 4 * s);
        ctx.fillStyle = '#555';
        ctx.fillRect(18 * s, -3 * s, 6 * s, 6 * s);
        // スコープ
        ctx.fillStyle = '#00FFCC';
        ctx.beginPath(); ctx.arc(8 * s, -4 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
        // レーザーサイト
        if (phase === 'startup') {
          ctx.globalAlpha = 0.3 + easeIn * 0.4;
          ctx.strokeStyle = '#FF0000';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(24 * s, 0); ctx.lineTo(200 * s, 0); ctx.stroke();
          ctx.globalAlpha = 1;
        }
        // 発射
        if (phase === 'active' && phaseT < 0.3) {
          ctx.globalAlpha = 0.9 * (1 - phaseT * 3.3);
          ctx.fillStyle = '#FF0044';
          ctx.fillRect(24 * s, -3 * s, 200 * s, 6 * s);
          ctx.fillStyle = '#FFF';
          ctx.fillRect(24 * s, -1 * s, 200 * s, 2 * s);
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'aerial') {
        // 空中: 真下に撃つ
        ctx.translate(0, 8 * s);
        ctx.rotate(Math.PI / 2);
        ctx.fillStyle = '#555';
        ctx.fillRect(-2 * s, -2 * s, 12 * s, 4 * s);
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.6 * (1 - phaseT * 2.5);
          ctx.fillStyle = '#FFAA00';
          ctx.beginPath(); ctx.arc(14 * s, 0, 5 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'up') {
        // 上: 真上に連射
        ctx.translate(4 * s, gunY - 8 * s);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = '#555';
        ctx.fillRect(-2 * s, -2 * s, 12 * s, 4 * s);
        if (phase === 'active') {
          const flash = Math.floor(phaseT * 3) % 2 === 0;
          if (flash) {
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = '#FFAA00';
            ctx.beginPath(); ctx.arc(14 * s, 0, 4 * s, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
      } else if (atkType === 'side') {
        // 横: ピストル横撃ち（通常と似ているが少し大きい）
        let reach;
        if (phase === 'startup') reach = 3 * s * easeIn;
        else if (phase === 'active') reach = 10 * s;
        else reach = 10 * s * (1 - easeOut);
        ctx.translate(gunX + reach, gunY);
        ctx.fillStyle = '#555';
        ctx.fillRect(-2 * s, -2 * s, 14 * s, 4 * s);
        if (phase === 'active' && phaseT < 0.3) {
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = '#FFAA00';
          ctx.beginPath(); ctx.arc(16 * s, 0, 5 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'down') {
        // 下: 爆発弾設置
        ctx.translate(gunX, gunY + 10 * s);
        ctx.rotate(0.4);
        ctx.fillStyle = '#555';
        ctx.fillRect(-2 * s, -2 * s, 10 * s, 4 * s);
        if (phase === 'active') {
          ctx.globalAlpha = 0.5 * (1 - phaseT);
          ctx.fillStyle = '#FF6600';
          ctx.beginPath(); ctx.arc(12 * s, 6 * s, (4 + phaseT * 8) * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'downair') {
        // 空中下: 真下に1発
        ctx.translate(0, 8 * s);
        ctx.rotate(Math.PI / 2);
        ctx.fillStyle = '#555';
        ctx.fillRect(-2 * s, -2 * s, 12 * s, 4 * s);
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = '#FFAA00';
          ctx.beginPath(); ctx.arc(14 * s, 0, 6 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }
    // ─── シャうでん（タコ系・スピード型）───
    else if (charIndex === 8) {
      if (atkType === 'normal') {
        // 通常: 触手でピシャ
        let reach;
        if (phase === 'startup') reach = -5 * s * easeIn;
        else if (phase === 'active') reach = 22 * s * easeOut;
        else reach = 22 * s * (1 - easeOut);
        ctx.translate(10 * s + reach, -8 * s);
        // 触手
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 4 * s;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-8 * s, 0); ctx.quadraticCurveTo(6 * s, -4 * s, 14 * s, 2 * s); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        // 吸盤エフェクト
        ctx.fillStyle = '#F0A0C0';
        ctx.beginPath(); ctx.arc(14 * s, 2 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.5 * (1 - phaseT * 2.5);
          ctx.fillStyle = '#FF80B0';
          ctx.beginPath(); ctx.arc(16 * s, 0, 8 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'strong') {
        // 強: インク噴射
        let spray;
        if (phase === 'startup') spray = easeIn * 0.3;
        else if (phase === 'active') spray = 0.3 + easeOut * 0.7;
        else spray = 1 - easeOut * 0.5;
        ctx.translate(12 * s, -10 * s);
        if (phase === 'active') {
          ctx.globalAlpha = 0.6 * (1 - phaseT * 0.5);
          ctx.fillStyle = '#2A0040';
          // インクの飛沫
          for (let j = 0; j < 5; j++) {
            const dx = (8 + j * 12) * s * spray;
            const dy = (Math.sin(j * 1.5 + phaseT * 4) * 8) * s;
            const r = (4 - j * 0.5) * s;
            ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI * 2); ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'special') {
        // 必殺: ジェット噴射（突進）
        if (phase === 'active') {
          // ジェットエフェクト（後方に水噴射）
          ctx.globalAlpha = 0.5 * (1 - phaseT);
          ctx.fillStyle = '#66CCFF';
          for (let j = 0; j < 3; j++) {
            const bx = (-15 - j * 12) * s;
            const by = (Math.random() - 0.5) * 10 * s;
            ctx.beginPath(); ctx.ellipse(bx, by, (6 - j * 1.5) * s, 4 * s, 0, 0, Math.PI * 2); ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'aerial') {
        // 空中: 触手回転
        let angle;
        if (phase === 'startup') angle = easeIn * Math.PI * 0.3;
        else if (phase === 'active') angle = Math.PI * 0.3 + easeOut * Math.PI * 1.7;
        else angle = Math.PI * 2 * (1 - easeOut * 0.1);
        ctx.rotate(angle);
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 3 * s;
        ctx.lineCap = 'round';
        for (let j = 0; j < 4; j++) {
          const a = (j / 4) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * 20 * s, Math.sin(a) * 20 * s);
          ctx.stroke();
        }
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active') {
          ctx.globalAlpha = 0.3 * (1 - phaseT);
          ctx.strokeStyle = '#FF80B0';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(0, 0, 22 * s, 0, Math.PI * 2); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'up') {
        // 上: 触手を真上に伸ばす
        let reach;
        if (phase === 'startup') reach = easeIn * 0.5;
        else if (phase === 'active') reach = 0.5 + easeOut * 0.5;
        else reach = 1 - easeOut * 0.5;
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 4 * s;
        ctx.lineCap = 'round';
        const len = reach * 35 * s;
        ctx.beginPath(); ctx.moveTo(-3 * s, -15 * s); ctx.lineTo(-4 * s, -15 * s - len); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(3 * s, -15 * s); ctx.lineTo(4 * s, -15 * s - len); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active') {
          ctx.fillStyle = '#F0A0C0';
          ctx.beginPath(); ctx.arc(-4 * s, -15 * s - len, 3 * s, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(4 * s, -15 * s - len, 3 * s, 0, Math.PI * 2); ctx.fill();
        }
      } else if (atkType === 'side') {
        // 横: 触手でピシャ（通常より長い）
        let reach;
        if (phase === 'startup') reach = -3 * s * easeIn;
        else if (phase === 'active') reach = 26 * s * easeOut;
        else reach = 26 * s * (1 - easeOut);
        ctx.translate(8 * s + reach, -6 * s);
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 4 * s;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-12 * s, 0); ctx.quadraticCurveTo(0, -6 * s, 12 * s, 0); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active' && phaseT < 0.3) {
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#FF80B0';
          ctx.beginPath(); ctx.arc(12 * s, 0, 7 * s, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (atkType === 'down' || atkType === 'downair') {
        // 下/空中下: 触手叩きつけ
        let smash;
        if (phase === 'startup') smash = easeIn * 0.3;
        else if (phase === 'active') smash = 0.3 + easeOut * 0.7;
        else smash = (1 - easeOut) * 0.3;
        ctx.strokeStyle = '#E05090';
        ctx.lineWidth = 5 * s;
        ctx.lineCap = 'round';
        const dy = smash * 25 * s;
        ctx.beginPath(); ctx.moveTo(-6 * s, 10 * s); ctx.lineTo(-8 * s, 10 * s + dy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(6 * s, 10 * s); ctx.lineTo(8 * s, 10 * s + dy); ctx.stroke();
        ctx.lineWidth = 1; ctx.lineCap = 'butt';
        if (phase === 'active' && phaseT < 0.4) {
          ctx.globalAlpha = 0.5 * (1 - phaseT * 2.5);
          ctx.fillStyle = '#E05090';
          ctx.beginPath(); ctx.ellipse(0, 10 * s + dy + 5 * s, 12 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
    }

    ctx.restore();
  }

  ctx.restore();
}

function drawStar(cx, cy, r, points, ctx) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.4;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

// --- Utility: round rect ---
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}


// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle(dt) {
  titleTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 0, 640);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(0.5, '#141428');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.strokeStyle = 'rgba(100, 100, 255, 0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < 960; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 640); ctx.stroke();
  }
  for (let y = 0; y < 640; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(960, y); ctx.stroke();
  }

  if (Math.random() < 0.3) spawnTitleParticle();
  updateParticles();
  drawParticles();

  if (titleFadeIn) {
    titleAlpha = Math.min(1, titleAlpha + 0.02);
    if (titleAlpha >= 1) titleFadeIn = false;
  }

  ctx.save();
  ctx.globalAlpha = titleAlpha;

  const glowIntensity = 15 + Math.sin(titleTime * 0.002) * 8;
  ctx.shadowColor = '#FF4466';
  ctx.shadowBlur = glowIntensity;
  ctx.font = 'bold 90px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = '#FF2244';
  ctx.lineWidth = 4;
  ctx.strokeText('SMASH GAME', 480, 200);

  const titleGrad = ctx.createLinearGradient(200, 150, 760, 250);
  titleGrad.addColorStop(0, '#FF6688');
  titleGrad.addColorStop(0.5, '#FFDDDD');
  titleGrad.addColorStop(1, '#FF6688');
  ctx.fillStyle = titleGrad;
  ctx.fillText('SMASH GAME', 480, 200);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 22px sans-serif';
  ctx.fillStyle = '#8888CC';
  ctx.fillText('— 格闘アクション —', 480, 270);

  for (let i = 0; i < 4; i++) {
    ctx.globalAlpha = titleAlpha * 0.4;
    drawCharacterBody(180 + i * 210, 430, 0.9, i, titleTime, false);
    ctx.globalAlpha = titleAlpha;
  }

  pressAlpha += pressDir * 0.025;
  if (pressAlpha > 1) { pressAlpha = 1; pressDir = -1; }
  if (pressAlpha < 0.2) { pressAlpha = 0.2; pressDir = 1; }

  ctx.globalAlpha = titleAlpha * pressAlpha;
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = '#FFFFFF';
  ctx.shadowColor = '#FFFFFF';
  ctx.shadowBlur = 10;
  ctx.fillText('PRESS ENTER / CLICK TO START', 480, 535);
  ctx.shadowBlur = 0;

  // Online button
  ctx.globalAlpha = titleAlpha * (0.6 + pressAlpha * 0.4);
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#44DDFF';
  ctx.fillText('O キー : オンライン対戦', 480, 575);

  ctx.restore();
}

// ============================================================
// CHARACTER SELECT SCREEN (2P)
// ============================================================
function drawSelect(dt) {
  selectTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  // Header (compact)
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF4466';
  ctx.shadowBlur = 10;
  ctx.fillText('CHARACTER SELECT', 480, 28);
  ctx.shadowBlur = 0;

  // Divider
  const lineGrad = ctx.createLinearGradient(100, 0, 860, 0);
  lineGrad.addColorStop(0, 'transparent');
  lineGrad.addColorStop(0.5, '#FF4466');
  lineGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(100, 42); ctx.lineTo(860, 42); ctx.stroke();

  // Character cards - grid layout (+ random slot)
  const charCount = characters.length;
  const totalSlots = charCount + 1; // +1 for random
  const RANDOM_IDX = charCount;
  const cols = Math.min(totalSlots, 7);
  const rows = Math.ceil(totalSlots / cols);
  const cardW = 90;
  const cardH = rows <= 1 ? 220 : 130;
  const gapX = 6;
  const gapY = 4;
  const totalW = cols * cardW + (cols - 1) * gapX;
  const gridStartX = (960 - totalW) / 2;
  const gridStartY = 46;

  for (let i = 0; i < totalSlots; i++) {
    const isRandom = i === RANDOM_IDX;
    const ch = isRandom ? null : characters[i];
    const row = Math.floor(i / cols);
    const col = i % cols;
    const rowCount = (row < rows - 1) ? cols : (totalSlots - cols * (rows - 1));
    const rowTotalW = rowCount * cardW + (rowCount - 1) * gapX;
    const rowStartX = (960 - rowTotalW) / 2;
    const cx = rowStartX + col * (cardW + gapX);
    const cy = gridStartY + row * (cardH + gapY);
    const isP1 = p1Select === i;
    const isP2 = p2Select === i;

    ctx.save();

    // Card bg
    const cardGrad = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
    cardGrad.addColorStop(0, (isP1 || isP2) ? (isRandom ? '#44336688' : ch.dark + '88') : '#1a1a2e');
    cardGrad.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cardGrad;
    roundRect(ctx, cx, cy, cardW, cardH, 10);
    ctx.fill();

    // Border - P1 blue, P2 red, both = split
    if (isP1 && isP2) {
      ctx.strokeStyle = '#44AAFF';
      ctx.lineWidth = 3;
      ctx.save();
      ctx.beginPath();
      ctx.rect(cx, cy, cardW / 2, cardH);
      ctx.clip();
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = '#FF4444';
      ctx.beginPath();
      ctx.rect(cx + cardW / 2, cy, cardW / 2, cardH);
      ctx.clip();
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
      ctx.restore();
    } else if (isP1) {
      ctx.strokeStyle = '#44AAFF';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    } else if (isP2) {
      ctx.strokeStyle = '#FF4444';
      ctx.lineWidth = 3;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      roundRect(ctx, cx, cy, cardW, cardH, 10);
      ctx.stroke();
    }

    // P1/P2 indicators at top
    if (isP1) {
      ctx.fillStyle = '#44AAFF';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('▼ 1P', cx + 6, cy + 14);
      if (p1Confirmed) {
        ctx.fillStyle = '#44FF44';
        ctx.fillText('OK!', cx + 6, cy + 28);
      }
    }
    if (isP2) {
      ctx.fillStyle = '#FF4444';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(gameMode === 'cpu' ? 'CPU ▼' : '2P ▼', cx + cardW - 6, cy + 14);
      if (p2Confirmed) {
        ctx.fillStyle = '#44FF44';
        ctx.fillText('OK!', cx + cardW - 6, cy + 28);
      }
    }

    // Type label
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    if (isRandom) {
      ctx.fillStyle = '#FFDD44';
      ctx.fillText('RANDOM', cx + cardW / 2, cy + 38);
    } else {
      ctx.fillStyle = ch.accent;
      ctx.fillText(ch.type, cx + cardW / 2, cy + 38);
    }

    // Character / Random "?" icon
    const charScale = rows <= 1 ? 1.0 : 0.55;
    const charY = rows <= 1 ? cy + 115 : cy + 72;
    if (isRandom) {
      ctx.font = 'bold ' + Math.floor(48 * charScale) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFDD44';
      ctx.globalAlpha = 0.7 + Math.sin(selectTime * 0.005) * 0.3;
      ctx.fillText('?', cx + cardW / 2, charY + 8 * charScale);
      ctx.globalAlpha = 1;
    } else {
      drawCharacterBody(cx + cardW / 2, charY, charScale, i, selectTime, false);
    }

    // Name
    ctx.font = rows <= 1 ? 'bold 22px sans-serif' : 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = (isP1 || isP2) ? '#FFF' : '#888';
    ctx.fillText(isRandom ? 'ランダム' : ch.name, cx + cardW / 2, cy + cardH - 8);

    ctx.restore();
  }

  // Detail panels - P1 left, P2 right
  const detailY = gridStartY + rows * (cardH + gapY) + 4;
  const p1Label = '1P';
  drawSelectDetail(60, detailY, p1Select, p1Label, '#44AAFF', p1Confirmed);
  const p2Label = gameMode === 'cpu' ? 'CPU' : '2P';
  drawSelectDetail(500, detailY, p2Select, p2Label, '#FF4444', p2Confirmed);

  // Mode selection overlay (before char select starts)
  if (!modeSelected) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, 960, 640);

    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.fillText('モード選択', 480, 200);

    const modes = [
      { label: 'VS 対戦', desc: '2人で対戦', icon: 'VS', color: '#44AAFF' },
      { label: 'CPU 対戦', desc: 'CPUと対戦', icon: 'CPU', color: '#FF8844' },
    ];
    const modeIdx = gameMode === 'vs' ? 0 : 1;
    for (let i = 0; i < 2; i++) {
      const mx = 280 + i * 200;
      const my = 270;
      const sel = modeIdx === i;
      ctx.fillStyle = sel ? modes[i].color + '33' : 'rgba(20,20,40,0.8)';
      roundRect(ctx, mx, my, 180, 130, 12); ctx.fill();
      ctx.strokeStyle = sel ? modes[i].color : '#444';
      ctx.lineWidth = sel ? 3 : 1;
      roundRect(ctx, mx, my, 180, 130, 12); ctx.stroke();

      ctx.font = 'bold 32px sans-serif';
      ctx.fillStyle = sel ? modes[i].color : '#888';
      ctx.fillText(modes[i].icon, mx + 90, my + 55);
      ctx.font = 'bold 16px sans-serif';
      ctx.fillStyle = sel ? '#FFF' : '#888';
      ctx.fillText(modes[i].label, mx + 90, my + 85);
      ctx.font = '13px sans-serif';
      ctx.fillStyle = '#888';
      ctx.fillText(modes[i].desc, mx + 90, my + 108);
    }

    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('← → で選択  |  Enter で決定  |  ESC で戻る', 480, 460);
    return;
  }

  // Controls
  ctx.textAlign = 'center';
  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#555';
  if (p1Confirmed && p2Confirmed) {
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#44FF44';
    ctx.shadowColor = '#44FF44';
    ctx.shadowBlur = 10;
    if (gameMode === 'cpu') {
      ctx.fillText('READY!  Enter で難易度選択へ', 480, 618);
    } else {
      ctx.fillText('READY TO FIGHT!  Press ENTER to start', 480, 618);
    }
    ctx.shadowBlur = 0;
  } else if (gameMode === 'cpu') {
    ctx.fillText('1P: ← → + Enter で選択   |   A D で CPU キャラ変更   |   ESC で戻る', 480, 618);
  } else {
    ctx.fillText('1P: ← → + Enter で選択   |   2P: A D + Space で選択   |   ESC で戻る', 480, 618);
  }
}

function drawSelectDetail(px, py, charIdx, label, color, isConfirmed) {
  const isRandom = charIdx >= characters.length;
  const ch = isRandom ? { name:'ランダム', type:'RANDOM', accent:'#FFDD44', desc:'ランダムでキャラが選ばれる', stats:{power:0,speed:0,tech:0,defense:0} } : characters[charIdx];
  const pw = 400;
  const ph = 190;

  ctx.fillStyle = 'rgba(15, 15, 30, 0.85)';
  roundRect(ctx, px, py, pw, ph, 10);
  ctx.fill();
  ctx.strokeStyle = isConfirmed ? '#44FF44' : color;
  ctx.lineWidth = 1.5;
  roundRect(ctx, px, py, pw, ph, 10);
  ctx.stroke();

  // Label
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = color;
  ctx.fillText(label, px + 12, py + 18);

  // Character preview
  if (isRandom) {
    ctx.font = 'bold 60px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFDD44';
    ctx.globalAlpha = 0.7 + Math.sin(selectTime * 0.005) * 0.3;
    ctx.fillText('?', px + 75, py + 105);
    ctx.globalAlpha = 1;
  } else {
    drawCharacterBody(px + 75, py + 95, 1.15, charIdx, selectTime, false);
  }

  // Info
  ctx.textAlign = 'left';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#FFF';
  ctx.fillText(ch.name, px + 155, py + 35);

  ctx.font = 'bold 13px sans-serif';
  ctx.fillStyle = ch.accent;
  ctx.fillText(ch.type, px + 155, py + 53);

  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#AAA';
  ctx.fillText(ch.desc, px + 155, py + 72);

  // Stats
  const stats = ['POW', 'SPD', 'TEC', 'DEF'];
  const statKeys = ['power', 'speed', 'tech', 'defense'];
  const statColors = ['#FF4444', '#44FF88', '#FFDD44', '#4488FF'];

  for (let i = 0; i < 4; i++) {
    const sy = py + 84 + i * 20;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#777';
    ctx.fillText(stats[i], px + 155, sy + 2);

    ctx.fillStyle = '#1a1a2e';
    roundRect(ctx, px + 192, sy - 6, 170, 11, 3);
    ctx.fill();

    const val = ch.stats[statKeys[i]];
    const bw = (val / 5) * 170;
    ctx.fillStyle = statColors[i];
    roundRect(ctx, px + 192, sy - 6, bw, 11, 3);
    ctx.fill();
  }

  if (isConfirmed) {
    ctx.globalAlpha = 0.15 + Math.sin(selectTime * 0.005) * 0.05;
    ctx.fillStyle = '#44FF44';
    roundRect(ctx, px, py, pw, ph, 10);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawDifficulty(dt) {
  difficultyTime += dt;

  const grad = ctx.createLinearGradient(0, 0, 960, 640);
  grad.addColorStop(0, '#0a0a20');
  grad.addColorStop(1, '#1a0a20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 640);

  ctx.font = 'bold 40px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.shadowColor = '#FF8844';
  ctx.shadowBlur = 12;
  ctx.fillText('CPU 難易度選択', 480, 80);
  ctx.shadowBlur = 0;

  const difficulties = [
    { name: 'やさしい', desc: 'ランダムに動く・たまに攻撃', color: '#44CC44', stars: 1 },
    { name: 'ふつう',   desc: '近づいて攻撃・たまにジャンプ', color: '#FFAA22', stars: 2 },
    { name: 'つよい',   desc: '積極追撃・必殺技も使う', color: '#FF4444', stars: 3 },
    { name: 'さいきょう', desc: 'コンボ・復帰・即反撃', color: '#CC44FF', stars: 4 },
  ];

  for (let i = 0; i < difficulties.length; i++) {
    const d = difficulties[i];
    const totalCards = difficulties.length;
    const cardW = 170;
    const gap = 16;
    const totalW2 = totalCards * cardW + (totalCards - 1) * gap;
    const cx = (960 - totalW2) / 2 + i * (cardW + gap);
    const cy = 160;
    const w = cardW;
    const h = 300;
    const sel = difficultySelected === i;
    const bounce = sel ? Math.sin(difficultyTime * 0.005) * 4 : 0;

    ctx.save();
    if (sel) { ctx.shadowColor = d.color; ctx.shadowBlur = 20; }

    const cg = ctx.createLinearGradient(cx, cy, cx, cy + h);
    cg.addColorStop(0, sel ? d.color + '33' : '#1a1a2e');
    cg.addColorStop(1, '#0d0d1a');
    ctx.fillStyle = cg;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.fill();

    ctx.strokeStyle = sel ? d.color : '#444';
    ctx.lineWidth = sel ? 3 : 1;
    roundRect(ctx, cx, cy + bounce, w, h, 14);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Stars
    const starY = cy + 50 + bounce;
    const maxStars = d.stars <= 3 ? 3 : 4;
    const starSpacing = maxStars <= 3 ? 30 : 24;
    const starStartX = cx + w/2 - (maxStars - 1) * starSpacing / 2;
    for (let s = 0; s < maxStars; s++) {
      ctx.fillStyle = s < d.stars ? d.color : '#333';
      drawStar(starStartX + s * starSpacing, starY, maxStars <= 3 ? 14 : 12, 5, ctx);
    }

    // Name
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = sel ? '#FFF' : '#888';
    ctx.fillText(d.name, cx + w / 2, cy + 110 + bounce);

    // Description
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#AAA';
    const words = d.desc.split('・');
    for (let j = 0; j < words.length; j++) {
      ctx.fillText(words[j], cx + w / 2, cy + 145 + j * 20 + bounce);
    }

    // Character matchup preview
    const p1Ch = characters[p1Select];
    const p2Ch = characters[p2Select];
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#44AAFF';
    ctx.fillText(p1Ch.name, cx + w / 2 - 35, cy + 215 + bounce);
    ctx.fillStyle = '#888';
    ctx.fillText('vs', cx + w / 2, cy + 215 + bounce);
    ctx.fillStyle = '#FF4444';
    ctx.fillText(p2Ch.name, cx + w / 2 + 35, cy + 215 + bounce);

    // Draw mini characters
    drawCharacterBody(cx + w/2 - 30, cy + 260 + bounce, 0.45, p1Select, difficultyTime, false);
    drawCharacterBody(cx + w/2 + 30, cy + 260 + bounce, 0.45, p2Select, difficultyTime, true);

    ctx.restore();
  }

  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.fillText('← → で選択  |  Enter で対戦開始  |  ESC でキャラ選択に戻る', 480, 560);
}

// Screen shake system
let screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };
function triggerScreenShake(intensity, duration) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
  screenShake.duration = Math.max(screenShake.duration, duration);
}
function updateScreenShake() {
  if (screenShake.duration > 0) {
    screenShake.duration--;
    const t = screenShake.duration > 0 ? screenShake.intensity * (screenShake.duration / 10) : 0;
    screenShake.x = (Math.random() - 0.5) * t * 2;
    screenShake.y = (Math.random() - 0.5) * t * 2;
    if (screenShake.duration <= 0) { screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0; }
  }
}

// === Web Audio API Sound Effects ===
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function makeNoise(ac, duration, volume) {
  const buf = ac.createBuffer(1, ac.sampleRate * duration, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.setValueAtTime(volume, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.connect(g); g.connect(ac.destination);
  return { src, gain: g };
}

function playHitSound(type) {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;

    if (type === 'normal') {
      // ① Short punch snap
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.08);
      // Click noise
      const n = makeNoise(ac, 0.03, 0.12);
      n.src.start(now); n.src.stop(now + 0.03);

    } else if (type === 'strong') {
      // ② Heavy thud - low bass + noise burst
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.18);
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.25);
      // Impact noise
      const n = makeNoise(ac, 0.08, 0.2);
      n.src.start(now); n.src.stop(now + 0.08);
      // Sub bass body
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(80, now);
      o2.frequency.exponentialRampToValueAtTime(30, now + 0.2);
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.22);

    } else if (type === 'special') {
      // ③ Flashy explosion - multi-layer
      // Mid explosion
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(350, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.2);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.3);
      // High shimmer
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(600, now);
      o2.frequency.exponentialRampToValueAtTime(1400, now + 0.08);
      o2.frequency.exponentialRampToValueAtTime(300, now + 0.25);
      g2.gain.setValueAtTime(0.12, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.25);
      // Noise burst
      const n = makeNoise(ac, 0.1, 0.18);
      n.src.start(now); n.src.stop(now + 0.1);

    } else if (type === 'cmd') {
      // ④ Even flashier explosion for command attacks
      // Deep boom
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(250, now);
      o.frequency.exponentialRampToValueAtTime(35, now + 0.3);
      g.gain.setValueAtTime(0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.4);
      // Rising shimmer
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(400, now);
      o2.frequency.exponentialRampToValueAtTime(1800, now + 0.1);
      o2.frequency.exponentialRampToValueAtTime(500, now + 0.3);
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.35);
      // Sub bass
      const o3 = ac.createOscillator(); const g3 = ac.createGain();
      o3.type = 'sine';
      o3.frequency.setValueAtTime(60, now);
      o3.frequency.exponentialRampToValueAtTime(25, now + 0.35);
      g3.gain.setValueAtTime(0.2, now);
      g3.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o3.connect(g3); g3.connect(ac.destination);
      o3.start(now); o3.stop(now + 0.4);
      // Long noise
      const n = makeNoise(ac, 0.15, 0.22);
      n.src.start(now); n.src.stop(now + 0.15);

    } else if (type === 'guard') {
      // ⑦ Metallic clang - ガキン
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(1200, now);
      o.frequency.exponentialRampToValueAtTime(600, now + 0.04);
      o.frequency.exponentialRampToValueAtTime(400, now + 0.1);
      g.gain.setValueAtTime(0.16, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.12);
      // Metallic ring
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(2200, now);
      o2.frequency.exponentialRampToValueAtTime(1800, now + 0.08);
      g2.gain.setValueAtTime(0.08, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.1);
      // Short noise
      const n = makeNoise(ac, 0.02, 0.1);
      n.src.start(now); n.src.stop(now + 0.02);

    } else if (type === 'guardBreak') {
      // Glass shatter
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(1500, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      g.gain.setValueAtTime(0.22, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.4);
      // Shatter noise
      const n = makeNoise(ac, 0.15, 0.25);
      n.src.start(now); n.src.stop(now + 0.15);

    } else if (type === 'justGuard') {
      // Perfect parry - bright metallic ping
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1800, now);
      o.frequency.exponentialRampToValueAtTime(2400, now + 0.04);
      o.frequency.exponentialRampToValueAtTime(1500, now + 0.15);
      g.gain.setValueAtTime(0.16, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.2);
      // High ring
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(3000, now);
      g2.gain.setValueAtTime(0.06, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.12);

    } else if (type === 'ko') {
      // ⑥ KO blast - deep boom + rising whine + noise
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(120, now);
      o.frequency.exponentialRampToValueAtTime(25, now + 0.5);
      g.gain.setValueAtTime(0.28, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.6);
      // Rising whine (blow-away feel)
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(200, now);
      o2.frequency.exponentialRampToValueAtTime(1500, now + 0.25);
      o2.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      g2.gain.setValueAtTime(0.12, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o2.connect(g2); g2.connect(ac.destination);
      o2.start(now); o2.stop(now + 0.5);
      // Heavy noise
      const n = makeNoise(ac, 0.2, 0.2);
      n.src.start(now); n.src.stop(now + 0.2);

    } else if (type === 'jump') {
      // ⑤ Light bounce - ぴょん
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(350, now);
      o.frequency.exponentialRampToValueAtTime(700, now + 0.06);
      o.frequency.exponentialRampToValueAtTime(500, now + 0.1);
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.12);

    } else if (type === 'grab') {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(250, now);
      o.frequency.exponentialRampToValueAtTime(180, now + 0.05);
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.07);

    } else if (type === 'throw') {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(100, now + 0.12);
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.15);
    } else if (type === 'miss') {
      // Whiff sound - airy swoosh
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(250, now);
      o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
      g.gain.setValueAtTime(0.04, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now + 0.08);
    }
  } catch (e) { /* ignore audio errors */ }
}

// === BGM ===
const bgmAudio = new Audio('sounds/bgm.mp3');
bgmAudio.loop = true;
bgmAudio.volume = 0.4;
let bgmPlaying = false;

function startBGM() {
  if (bgmPlaying) return;
  bgmAudio.currentTime = 0;
  bgmAudio.play().catch(() => {});
  bgmPlaying = true;
}

function stopBGM() {
  if (!bgmPlaying) return;
  bgmAudio.pause();
  bgmAudio.currentTime = 0;
  bgmPlaying = false;
}

// === SE (攻撃ヒット・撃墜) ===
function playHitSE() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(200, now);
    o.frequency.exponentialRampToValueAtTime(50, now + 0.1);
    g.gain.setValueAtTime(0.25, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.1);
  } catch(e) {}
}

function playKOSE() {
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Deep boom
    const o = ac.createOscillator(); const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(100, now);
    o.frequency.exponentialRampToValueAtTime(20, now + 0.6);
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    o.connect(g); g.connect(ac.destination);
    o.start(now); o.stop(now + 0.6);
    // Sub rumble
    const o2 = ac.createOscillator(); const g2 = ac.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(50, now);
    o2.frequency.exponentialRampToValueAtTime(15, now + 0.5);
    g2.gain.setValueAtTime(0.2, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now); o2.stop(now + 0.55);
    // Noise burst
    const n = makeNoise(ac, 0.2, 0.18);
    n.src.start(now); n.src.stop(now + 0.2);
  } catch(e) {}
}

  for (const cmd of dragonCommandDefs) {

    a.startup = Math.max(1, Math.round(a.startup * f));
    a.active = Math.max(1, Math.round(a.active * f));

function addCmdInput(playerId, dir) {
  const now = performance.now();
  cmdInputBuffers[playerId].push(dir);
  cmdInputTimestamps[playerId].push(now);
  // Trim old entries
  while (cmdInputTimestamps[playerId].length > 0 && now - cmdInputTimestamps[playerId][0] > CMD_INPUT_TIMEOUT * 16.67) {
    cmdInputBuffers[playerId].shift();
    cmdInputTimestamps[playerId].shift();
  }
}

function checkCommandInput(player) {
  const pid = player.id;
  const buf = cmdInputBuffers[pid];
  if (buf.length < 4) return null;
  // 天才: ドラゴンモード時は別のcommandDefsを使用
  const cmds = (player.charIdx === 10 && player.dragonMode) ? dragonCommandDefs : commandDefs[player.charIdx];
  if (!cmds) return null;

  for (const cmd of cmds) {
    if (player['cd_' + cmd.cooldownKey] > 0) continue;
    const seq = cmd.seq;
    if (buf.length < seq.length) continue;
    // Check if the last N entries match the sequence
    const tail = buf.slice(buf.length - seq.length);
    // Convert relative directions (F/B) to absolute based on facing
    let match = true;
    for (let i = 0; i < seq.length; i++) {
      let expected = seq[i];
      if (expected === 'F') expected = player.facingLeft ? 'L' : 'R';
      else if (expected === 'B') expected = player.facingLeft ? 'R' : 'L';
      if (tail[i] !== expected) { match = false; break; }
    }
    if (match) {
      // Clear buffer on success
      cmdInputBuffers[pid] = [];
      cmdInputTimestamps[pid] = [];
      return cmd;
    }
  }
  return null;
}

function executeCommand(player, cmd) {
  if (player.attacking || player.hitstun > 0 || !player.alive || player.grabbing || player.grabbed || player.guarding || player.guardBreakStun > 0) return false;

  const atk = cmd.attack;
  player.attacking = true;
  player.attackType = 'command';
  player.attackFrame = 0;
  player.attackData = atk;
  player.hitTargets = [];
  player.lastHitFrame = -99;
  player.specialState = null;
  player['cd_' + cmd.cooldownKey] = CMD_COOLDOWN;

  // Command activation sound
  try {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    const o1 = ac.createOscillator();
    const g1 = ac.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(400, now);
    o1.frequency.exponentialRampToValueAtTime(900, now + 0.08);
    o1.frequency.exponentialRampToValueAtTime(600, now + 0.15);
    g1.gain.setValueAtTime(0.12, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(now); o1.stop(now + 0.2);
    // Accent tone
    const o2 = ac.createOscillator();
    const g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(800, now + 0.03);
    o2.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
    g2.gain.setValueAtTime(0.06, now + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(now + 0.03); o2.stop(now + 0.15);
  } catch(e) {}

  // Show command name (コミック風フォント演出)
  const ch = characters[player.charIdx];
  cmdNameDisplay.push({
    text: cmd.name, x: player.x, y: player.y - 120,
    life: 60, maxLife: 60, color: ch.accent,
  });

  // Flash effect
  hitEffects.push({ x: player.x, y: player.y - 40, life: 15, maxLife: 15, color: '#FFFFFF', size: 50 });

  // ② 虹色オーラ
  specialAura.push({ playerId: player.id, life: 45, maxLife: 45 });

  // ⑤ 背景カラフルフラッシュ
  cmdFlash.alpha = 0.3;
  cmdFlash.color = ch.accent;

  // ⑤ キャラクター一瞬大きくなる演出
  cmdScaleEffect.playerId = player.id;
  cmdScaleEffect.life = 12;

  // ② 画面シェイク
  triggerScreenShake(4, 8);

  return true;
}

// Scale dragon attacks too
(function scaleDragonAtks() {
  const factor = 1 / 1.68;
  const dmgFactor = 0.6;
  for (const type in dragonAttackDefs) {
    if (type === 'throwDmg') { dragonAttackDefs[type] = Math.round(dragonAttackDefs[type] * dmgFactor); continue; }
    const atk = dragonAttackDefs[type];
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    atk.damage = Math.round(atk.damage * dmgFactor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * dmgFactor * 10) / 10;
  }
})();

// --- Speed up attacks to 168% of original (frames × 0.595) ---
(function scaleAttackSpeeds() {
  const factor = 1 / 1.68;
  function scaleAtk(atk) {
    atk.startup = Math.max(1, Math.round(atk.startup * factor));
    atk.active = Math.max(1, Math.round(atk.active * factor));
    atk.recovery = Math.max(1, Math.round(atk.recovery * factor));
    if (atk.slamActive) atk.slamActive = Math.max(1, Math.round(atk.slamActive * factor));
    if (atk.hitInterval) atk.hitInterval = Math.max(1, Math.round(atk.hitInterval * factor));
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') continue;
      scaleAtk(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleAtk(cmd.attack);
    }
  }
})();

// --- Reduce all damage to 60% ---
(function scaleDamage() {
  const factor = 0.6;
  function scaleDmg(atk) {
    atk.damage = Math.round(atk.damage * factor * 10) / 10;
    if (atk.finalDamage) atk.finalDamage = Math.round(atk.finalDamage * factor * 10) / 10;
    if (atk.projectile) atk.projectile.damage = Math.round(atk.projectile.damage * factor * 10) / 10;
  }
  for (const charId in attackDefs) {
    const defs = attackDefs[charId];
    for (const type in defs) {
      if (type === 'throwDmg') { defs[type] = Math.round(defs[type] * factor); continue; }
      scaleDmg(defs[type]);
    }
  }
  for (const charId in commandDefs) {
    for (const cmd of commandDefs[charId]) {
      scaleDmg(cmd.attack);
    }
  }
})();

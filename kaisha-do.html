<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>会社道 KAISHA-DO</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1p:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2335;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fffb2;
    --gold: #ffd700;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --red: #ff4757;
    --pixel: 'DotGothic16', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS 1p', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    position: relative;
    max-width: 100vw;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .app > .bottom-area { max-width: 480px; width: 100%; margin: 0 auto; }
  .app > .lobby-section { max-width: 480px; width: 100%; margin: 0 auto; }

  /* ── HEADER (compact status bar) ── */
  .header {
    background: linear-gradient(180deg, #0d1b2e, #111827);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    position: relative;
    z-index: 100;
    height: 50px;
    display: flex;
    align-items: center;
  }
  .header-top {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .company-name { display: none; }
  .money-row { display: flex; align-items: baseline; gap: 4px; }
  .money-amount {
    font-size: 22px; font-weight: 900; color: var(--gold);
    font-family: var(--pixel); line-height: 1; transition: transform .1s;
  }
  .money-amount.bump { transform: scale(1.06); color: #ffe566; }
  .money-unit { font-size: 11px; color: var(--text-dim); }
  .income-rate {
    font-size: 10px; color: var(--accent3);
    font-family: var(--pixel); margin-left: 8px;
  }
  .live-dot {
    width: 5px; height: 5px; background: var(--accent3);
    border-radius: 50%; display: inline-block; margin-right: 2px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .header-right { display: flex; align-items: center; gap: 8px; }
  .header-floor {
    font-size: 14px; font-weight: 900; color: var(--accent);
    font-family: var(--pixel);
  }
  .sound-toggle {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 6px; color: var(--text-dim);
    font-size: 14px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .sound-toggle.on { color: var(--accent); border-color: var(--accent); }

  /* ── ROOM VIEW (main, 60%+ of screen) ── */
  .room-section {
    position: relative;
    flex-shrink: 0;
    flex-grow: 0;
  }

  .floor-nav { display: none; }
  .floor-status { display: none; }

  /* The room canvas - takes 60% of viewport */
  .room-wrapper {
    margin: 0;
    border: none;
    border-bottom: 2px solid var(--border);
    overflow: hidden;
    position: relative;
    height: 70vh;
    height: 70dvh;
    min-height: 350px;
    max-height: 550px;
    background: #080c14;
    image-rendering: pixelated;
  }

  /* Floor nav arrows - overlaid on room sides */
  .room-nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    background: rgba(10,14,26,.7);
    border: 1px solid rgba(0,212,255,.3);
    border-radius: 50%;
    width: 40px; height: 40px;
    font-size: 18px; color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
    backdrop-filter: blur(4px);
  }
  .room-nav-btn:active { transform: translateY(-50%) scale(.9); }
  .room-nav-btn:disabled { opacity: .15; pointer-events: none; }
  .room-nav-btn.left { left: 8px; }
  .room-nav-btn.right { right: 8px; }

  /* Floor indicator overlay */
  .room-floor-indicator {
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%); z-index: 15;
    background: rgba(10,14,26,.6);
    border: 1px solid rgba(0,212,255,.25);
    border-radius: 16px; padding: 3px 14px;
    font-size: 13px; font-weight: 900; color: var(--accent);
    font-family: var(--pixel);
    backdrop-filter: blur(4px);
  }
  .room-floor-count {
    font-size: 9px; color: var(--text-dim);
    margin-left: 6px; font-weight: 400;
  }

  /* Slide animation */
  @keyframes roomSlideLeft {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes roomSlideRight {
    from { transform: translateX(-100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .room-slide-left { animation: roomSlideLeft .3s ease; }
  .room-slide-right { animation: roomSlideRight .3s ease; }

  /* 2.5D Room SVG background */
  .room-svg-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* Characters area - 2.5D */
  .room-chars {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 8;
  }

  .pixel-char {
    position: absolute;
    cursor: pointer; pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    transition: left 2s ease-in-out, top 2s ease-in-out, transform .3s;
    will-change: left, top, transform;
    transform-origin: bottom center;
  }

  .char-body {
    width: 28px; height: 32px; position: relative;
    image-rendering: pixelated;
  }

  /* Pixel character parts */
  .char-head {
    width: 14px; height: 14px;
    border-radius: 3px;
    position: absolute; top: 0; left: 7px;
    border: 2px solid rgba(0,0,0,.2);
  }
  .char-body-rect {
    width: 18px; height: 12px;
    position: absolute; top: 13px; left: 5px;
    border-radius: 2px;
  }
  .char-legs {
    position: absolute; top: 24px; left: 7px;
    width: 14px; height: 8px;
    display: flex; gap: 2px;
  }
  .char-leg {
    width: 5px; height: 8px; background: #2a2040;
    border-radius: 0 0 2px 2px;
  }

  /* Char accessory */
  .char-acc {
    position: absolute; top: -6px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; line-height: 1;
  }

  /* PNG character image */
  .char-img {
    width: 60px; height: 80px;
    object-fit: contain;
    image-rendering: auto;
    display: block;
  }
  .char-img-wrap {
    width: 60px; height: 80px;
    position: relative;
  }

  /* Idle animation */
  @keyframes charBob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  @keyframes charBobImg {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }
  .pixel-char { animation: charBob 2s ease-in-out infinite; }
  .pixel-char.img-char { animation: charBobImg 1.5s ease-in-out infinite; }
  .pixel-char:nth-child(2n) { animation-delay: .4s; }
  .pixel-char:nth-child(3n) { animation-delay: .8s; }
  .pixel-char:nth-child(4n) { animation-delay: 1.2s; }

  /* Walk animation on legs */
  @keyframes legWalk {
    0%,100% { transform: skewX(0); }
    25% { transform: skewX(8deg); }
    75% { transform: skewX(-8deg); }
  }
  .pixel-char .char-leg:first-child {
    animation: legWalk 1s ease-in-out infinite;
  }
  .pixel-char .char-leg:last-child {
    animation: legWalk 1s ease-in-out infinite .5s;
  }

  /* Speech bubble */
  .char-speech {
    position: absolute; bottom: 38px; left: 50%;
    transform: translateX(-50%);
    background: #fff; color: #111; padding: 3px 8px;
    border-radius: 6px; font-size: 10px; font-family: var(--pixel);
    white-space: nowrap; pointer-events: none;
    animation: speechPop .3s ease, speechFade .3s ease 1.5s forwards;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .char-speech::after {
    content: ''; position: absolute;
    bottom: -5px; left: 50%; transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 5px solid #fff;
  }
  @keyframes speechPop { from { transform: translateX(-50%) scale(.7); opacity:0; } to { transform: translateX(-50%) scale(1); opacity:1; } }
  @keyframes speechFade { to { opacity: 0; transform: translateX(-50%) translateY(-5px); } }

  /* Locked floor overlay */
  .room-locked {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px;
    background: rgba(5,8,14,.85);
    font-family: var(--pixel);
  }
  .room-locked-icon { font-size: 36px; }
  .room-locked-text { font-size: 12px; color: var(--text-dim); }

  /* ── LOBBY (WAITING AREA) ── */
  .lobby-section {
    padding: 6px 12px;
    flex-shrink: 0;
  }
  .lobby-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    overflow-x: auto; min-height: 40px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .lobby-label {
    font-size: 9px; color: var(--text-dim);
    font-family: var(--pixel); flex-shrink: 0; letter-spacing: 1px;
  }
  .lobby-emp {
    font-size: 22px; cursor: pointer; padding: 2px;
    border-radius: 4px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; transition: transform .15s;
  }
  .lobby-emp:hover { transform: scale(1.15); }
  .lobby-emp.selected { background: rgba(255,107,53,.3); outline: 1px solid var(--accent2); }
  .lobby-empty { font-size: 10px; color: #1e3a5f; font-family: var(--pixel); }
  .lobby-count {
    font-size: 9px; color: var(--text-dim); font-family: var(--pixel);
    margin-left: auto; flex-shrink: 0;
  }

  /* ── BOTTOM TABS ── */
  .bottom-area { flex: 1; display: flex; flex-direction: column; }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 50;
  }
  .tab-btn {
    flex: 1; padding: 9px 2px; background: none; border: none;
    color: var(--text-dim); font-size: 11px; font-weight: 700;
    font-family: 'M PLUS 1p', sans-serif; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all .2s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { flex: 1; padding: 10px 14px 80px; overflow-y: auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-title {
    font-size: 10px; color: var(--text-dim); letter-spacing: 3px;
    margin-bottom: 8px; font-family: var(--pixel);
  }

  /* ── EMPLOYEE CARDS ── */
  .employee-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 7px;
    display: flex; align-items: center; gap: 10px;
    transition: all .2s; position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .employee-card::before {
    content: ''; position: absolute; left:0;top:0;bottom:0;
    width: 3px; background: var(--card-color, var(--accent));
  }
  .employee-card.can-afford { border-color: var(--card-color, var(--accent)); box-shadow: 0 0 8px rgba(0,212,255,.08); }
  .employee-card.cant-afford { opacity: .5; }
  .emp-emoji { font-size: 28px; flex-shrink:0; width:38px; text-align:center; }
  .emp-info { flex:1; min-width:0; }
  .emp-name { font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px; }
  .emp-count-badge {
    background: var(--card-color, var(--accent)); color:#000;
    font-size:9px; font-weight:900; padding:1px 5px; border-radius:99px;
    font-family: var(--pixel);
  }
  .emp-income { font-size:10px; color:var(--accent3); font-family:var(--pixel); margin-top:1px; }
  .emp-desc { font-size:9px; color:var(--text-dim); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hire-btn {
    background: var(--surface2); border: 1px solid var(--card-color, var(--accent));
    border-radius: 8px; padding: 6px 8px; cursor: pointer;
    text-align: center; min-width: 66px; flex-shrink:0;
    -webkit-tap-highlight-color: transparent; transition: all .15s;
  }
  .hire-btn:active { transform: scale(.95); }
  .hire-btn.can-afford { background: var(--card-color, var(--accent)); }
  .hire-btn.can-afford .hire-label { color:#000; }
  .hire-btn.can-afford .hire-cost { color:rgba(0,0,0,.7); }
  .hire-label { font-size:10px; font-weight:700; color:var(--text-dim); display:block; }
  .hire-cost { font-size:10px; font-family:var(--pixel); color:var(--text-dim); display:block; }

  /* ── UPGRADE CARDS ── */
  .upgrade-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 7px;
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    transition: all .2s; -webkit-tap-highlight-color: transparent;
  }
  .upgrade-card.purchased { opacity:.4; pointer-events:none; }
  .upgrade-card.can-afford { border-color:var(--gold); box-shadow: 0 0 10px rgba(255,215,0,.12); }
  .upgrade-card:active:not(.purchased) { transform: scale(.98); }
  .upg-icon { font-size:24px; flex-shrink:0; }
  .upg-info { flex:1; }
  .upg-name { font-size:12px; font-weight:700; }
  .upg-desc { font-size:9px; color:var(--text-dim); margin-top:2px; }
  .upg-cost { font-size:11px; font-family:var(--pixel); color:var(--gold); font-weight:700; flex-shrink:0; }
  .upg-done { font-size:16px; }

  /* ── MILESTONES ── */
  .milestone-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 7px;
    display: flex; align-items: center; gap: 10px;
  }
  .milestone-card.achieved { border-color: var(--gold); background: linear-gradient(135deg,var(--surface),rgba(255,215,0,.04)); }
  .ms-icon { font-size:22px; flex-shrink:0; }
  .ms-info { flex:1; }
  .ms-name { font-size:12px; font-weight:700; }
  .ms-desc { font-size:9px; color:var(--text-dim); margin-top:2px; }
  .ms-status { font-size:16px; flex-shrink:0; }

  /* ── PRESTIGE ── */
  .prestige-section {
    background: linear-gradient(135deg,#1a0a2e,#2d1060);
    border: 1px solid #7c3aed; border-radius: 12px;
    padding: 14px; text-align: center; margin-bottom: 14px;
  }
  .prestige-title { font-size:16px; font-weight:900; color:#c084fc; font-family:var(--pixel); margin-bottom:4px; }
  .prestige-desc { font-size:10px; color:#a78bfa; margin-bottom:10px; }
  .prestige-btn {
    background: linear-gradient(135deg,#7c3aed,#c084fc);
    border:none; border-radius:8px; padding:9px 18px; color:#fff;
    font-size:13px; font-weight:700; cursor:pointer;
    font-family:'M PLUS 1p',sans-serif; -webkit-tap-highlight-color:transparent;
  }
  .prestige-btn:disabled { opacity:.4; cursor:not-allowed; }

  /* ── QUEST ── */
  .quest-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; margin-bottom:7px;
    position:relative; overflow:hidden;
  }
  .quest-card.active { border-color:var(--accent2); }
  .quest-card.completed { border-color:var(--accent3); opacity:.6; }
  .quest-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .quest-icon { font-size:20px; }
  .quest-title { font-size:12px; font-weight:700; }
  .quest-desc { font-size:9px; color:var(--text-dim); margin-bottom:6px; }
  .quest-progress-bar { width:100%; height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-bottom:3px; }
  .quest-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:3px; transition:width .3s; }
  .quest-progress-text { font-size:9px; color:var(--text-dim); font-family:var(--pixel); display:flex; justify-content:space-between; }
  .quest-reward { font-size:10px; color:var(--gold); font-family:var(--pixel); margin-top:3px; }
  .quest-claim-btn {
    background:linear-gradient(135deg,var(--accent2),#ff8f5a);
    border:none; border-radius:6px; padding:5px 10px; color:#fff;
    font-weight:700; font-size:10px; cursor:pointer; margin-top:5px;
    font-family:'M PLUS 1p',sans-serif;
  }
  .quest-timer { font-size:9px; color:var(--accent2); font-family:var(--pixel); position:absolute; top:10px; right:10px; }

  /* ── RANKING ── */
  .ranking-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:10px 12px; margin-bottom:7px;
    display:flex; align-items:center; gap:10px;
  }
  .ranking-card.rank-1 { border-color:var(--gold); background:linear-gradient(135deg,var(--surface),rgba(255,215,0,.06)); }
  .ranking-card.rank-2 { border-color:#c0c0c0; }
  .ranking-card.rank-3 { border-color:#cd7f32; }
  .rank-num { font-size:18px; font-weight:900; font-family:var(--pixel); min-width:30px; text-align:center; }
  .rank-1 .rank-num { color:var(--gold); }
  .rank-2 .rank-num { color:#c0c0c0; }
  .rank-3 .rank-num { color:#cd7f32; }
  .rank-info { flex:1; }
  .rank-name { font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .rank-income { font-size:10px; color:var(--accent3); font-family:var(--pixel); margin-top:1px; }
  .rank-bar { width:100%; height:3px; background:var(--surface2); border-radius:2px; margin-top:3px; overflow:hidden; }
  .rank-bar-fill { height:100%; border-radius:2px; transition:width .3s; }
  .rank-share { font-size:9px; color:var(--text-dim); font-family:var(--pixel); }

  /* ── TOAST ── */
  .toast-container {
    position:fixed; top:70px; left:50%; transform:translateX(-50%);
    z-index:999; pointer-events:none; display:flex; flex-direction:column;
    align-items:center; gap:5px; width:300px;
  }
  .toast {
    background:var(--surface2); border:1px solid var(--accent);
    border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700;
    color:var(--accent); animation: toastIn .3s ease, toastOut .4s ease 1.6s forwards;
    white-space:nowrap; font-family:var(--pixel);
  }
  .toast.gold { border-color:var(--gold); color:var(--gold); }
  .toast.purple { border-color:#c084fc; color:#c084fc; }
  @keyframes toastIn { from{opacity:0;transform:translateY(-8px) scale(.9)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-8px)} }

  /* ── ACTION BAR ── */
  .action-bar {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    max-width:100vw; width:100%;
    background:linear-gradient(0deg,#0d1b2eee,#0d1b2ecc);
    border-top:1px solid var(--accent); padding:10px 16px;
    display:none; gap:8px; align-items:center; z-index:200;
    animation:slideUp .2s ease;
  }
  .action-bar.show { display:flex; }
  @keyframes slideUp { from{transform:translateX(-50%) translateY(100%)} to{transform:translateX(-50%) translateY(0)} }
  .action-info { flex:1; font-size:11px; font-family:var(--pixel); }
  .action-info .action-emoji { font-size:18px; margin-right:5px; }
  .action-btn {
    background:var(--accent); border:none; border-radius:6px;
    padding:7px 12px; color:#000; font-weight:700; font-size:11px;
    cursor:pointer; font-family:'M PLUS 1p',sans-serif;
    -webkit-tap-highlight-color:transparent; flex-shrink:0;
  }
  .action-btn.cancel { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); }
  .action-btn.move { background:var(--accent2); color:#fff; }

  .offline-banner {
    background:linear-gradient(135deg,#1a2d1a,#0d1f0d);
    border:1px solid #22c55e; border-radius:8px; padding:8px 12px;
    margin-bottom:10px; display:flex; align-items:center; gap:8px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .offline-icon { font-size:18px; }
  .offline-text { flex:1; font-size:10px; color:#86efac; }
  .offline-amount { font-size:13px; font-weight:900; color:#22c55e; font-family:var(--pixel); }
  .collect-btn { background:#22c55e; border:none; border-radius:6px; padding:5px 8px; color:#000; font-weight:700; font-size:10px; cursor:pointer; flex-shrink:0; }

  /* Placed furniture in room */
  .placed-furn {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
    transition: left .3s, top .3s;
    -webkit-tap-highlight-color: transparent;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.5));

function loadGame() {
  try {
    const s = localStorage.getItem('kaishaDoSave');
    if (s) game = { ...game, ...JSON.parse(s) };
  } catch(e){}
  if (!game.floorData || typeof game.floorData!=='object') game.floorData={};
  if (!game.waitingList) game.waitingList=[];
  if (!game.nextUid) game.nextUid=1;
  if (!game.prevFloorCount) game.prevFloorCount=1;
  if (!game.floorData[1]) game.floorData[1]=[];
  if (!game.furnitureOwned) game.furnitureOwned=[];
  if (!game.furniturePlaced) game.furniturePlaced={};
  if (!game.nextFid) game.nextFid=1;

  // Migrate old saves
  if (game.totalEmployees>0 && game.waitingList.length===0) {
    let any=false;
    for (const f in game.floorData) if (game.floorData[f].length) any=true;
    if (!any) {
      for (const e of EMP) {
        const c=game.employees[e.id]||0;
        for (let i=0;i<c;i++) game.waitingList.push({uid:game.nextUid++,empId:e.id});
      }
    }
  }
  const now=Date.now(), elapsed=(now-(game.lastSave||now))/1000;
  if (elapsed>10) {
    const off=getIncomePerSecond()*Math.min(elapsed,14400);
    if (off>0) showOfflineBanner(off);
  }
  game.lastSave=now;
}
function saveGame() { game.lastSave=Date.now(); localStorage.setItem('kaishaDoSave',JSON.stringify(game)); }

// ============================================================
// FLOOR SYSTEM
// ============================================================
function getFloorCount() {
  let c=1;
  for (let i=1;i<FLOOR_THRESHOLDS.length&&i<MAX_FLOORS;i++)
    if (game.totalEmployees>=FLOOR_THRESHOLDS[i]) c=i+1;
  return c;
}
function getFloorEmps(f) { return game.floorData[f]||[]; }
function isFloorFull(f) { return getFloorEmps(f).length>=FLOOR_CAP; }
function checkFloorUnlocks() {
  const n=getFloorCount();
  if (n>game.prevFloorCount) {
    for (let f=game.prevFloorCount+1;f<=n;f++) {
      if (!game.floorData[f]) game.floorData[f]=[];
      showToast(`🏗️ ${f}Fが増築されました！`,'gold');
      playSE('milestone');
    }
    game.prevFloorCount=n;
  }
}

// ============================================================
// CALCULATIONS
// ============================================================
function getEmpCost(id,count) { const e=EMP.find(x=>x.id===id); return e?Math.floor(e.baseCost*Math.pow(1.15,count)):0; }
function getIncomePerSecond() {
  let t=1;
  const gm=game.upgrades.includes('global')?1.5:1;
  for (const e of EMP) {
    const c=game.employees[e.id]||0; if(!c) continue;
    let inc=e.baseIncome*c;
    for (const u of UPGRADES) if(u.target===e.id&&game.upgrades.includes(u.id)) inc*=u.multiplier;
    t+=inc*gm;
  }
  return t*game.prestigeMultiplier;
}
function getTotalEmp() { return Object.values(game.employees).reduce((a,b)=>a+b,0); }

// ============================================================
// ACTIONS
// ============================================================
function hireEmployee(id) {
  const e=EMP.find(x=>x.id===id); if(!e) return;
  const c=game.employees[id]||0, cost=getEmpCost(id,c);
  if (game.money<cost) return;
  game.money-=cost; game.employees[id]=c+1; game.totalEmployees=getTotalEmp();
  game.waitingList.push({uid:game.nextUid++,empId:id});
  playSE('hire'); updateQuestProgress('hire');
  showToast(`${e.emoji} ${e.name}を採用！ロビーへ`);
  checkFloorUnlocks(); updateAll(); saveGame();
}

function assignToFloor(uid,floor) {
  const idx=game.waitingList.findIndex(w=>w.uid===uid);
  if (idx===-1) return;
  if (isFloorFull(floor)) { showToast('満員です！'); return; }
  const emp=game.waitingList.splice(idx,1)[0];
  if (!game.floorData[floor]) game.floorData[floor]=[];
  game.floorData[floor].push(emp);
  const ed=EMP.find(e=>e.id===emp.empId);
  playSE('hire'); showToast(`${ed.emoji} ${floor}Fに配置！`);
  cancelSelection(); updateAll(); saveGame();
}

function startMove(uid,fromFloor) {
  const fe=game.floorData[fromFloor]||[];
  const emp=fe.find(e=>e.uid===uid); if(!emp) return;
  movingEmp={uid,empId:emp.empId,fromFloor};
  selectedFloorEmp=null; selectedWaiting=null;
  const ed=EMP.find(e=>e.id===emp.empId);
  showActionBar(`<span class="action-emoji">${ed.emoji}</span>${ed.name}の移動先フロアを選択`);
  renderRoom();
}

function moveToFloor(toFloor) {
  if (!movingEmp) return;
  if (movingEmp.fromFloor===toFloor) { cancelSelection(); return; }
  if (isFloorFull(toFloor)) { showToast('移動先は満員です！'); return; }
  const old=game.floorData[movingEmp.fromFloor]||[];
  const idx=old.findIndex(e=>e.uid===movingEmp.uid);
  if (idx===-1) { cancelSelection(); return; }
  const emp=old.splice(idx,1)[0];
  if (!game.floorData[toFloor]) game.floorData[toFloor]=[];
  game.floorData[toFloor].push(emp);
  const ed=EMP.find(e=>e.id===emp.empId);
  playSE('upgrade'); showToast(`${ed.emoji} ${toFloor}Fに移動！`);
  cancelSelection(); updateAll(); saveGame();
}

function returnToLobby(uid,floor) {
  const fe=game.floorData[floor]||[];
  const idx=fe.findIndex(e=>e.uid===uid);
  if (idx===-1) return;
  const emp=fe.splice(idx,1)[0];
  game.waitingList.push(emp);
  const ed=EMP.find(e=>e.id===emp.empId);
  showToast(`${ed.emoji} ロビーに戻しました`);
  cancelSelection(); updateAll(); saveGame();
}

function cancelSelection() {
  selectedWaiting=null; selectedFloorEmp=null; movingEmp=null;
  document.getElementById('actionBar').classList.remove('show');
  renderRoom(); renderLobby();
}

function showActionBar(html) {
  const bar=document.getElementById('actionBar');
  document.getElementById('actionInfo').innerHTML=html;
  bar.classList.add('show');
}

function selectWaiting(uid) {
  if (selectedWaiting===uid) { cancelSelection(); return; }
  cancelSelection(); selectedWaiting=uid;
  const emp=game.waitingList.find(w=>w.uid===uid);
  if (!emp) return;
  const ed=EMP.find(e=>e.id===emp.empId);
  showActionBar(`<span class="action-emoji">${ed.emoji}</span>${ed.name}を配置するフロアへ移動して部屋をタップ`);
  renderLobby(); renderRoom();
}

function onCharTap(uid,floor) {
  if (movingEmp) return;
  if (selectedFloorEmp&&selectedFloorEmp.uid===uid) { cancelSelection(); return; }
  cancelSelection(); selectedFloorEmp={uid,floor};
  const fe=game.floorData[floor]||[];
  const emp=fe.find(e=>e.uid===uid);
  if (!emp) return;
  const ed=EMP.find(e=>e.id===emp.empId);
  // Show speech
  showSpeech(uid,ed.id);
  showActionBar(
    `<span class="action-emoji">${ed.emoji}</span>${ed.name}(${floor}F)`+
    `<button class="action-btn move" onclick="startMove(${uid},${floor})" style="margin-left:6px;padding:4px 10px;font-size:10px">移動</button>`+
    `<button class="action-btn cancel" onclick="returnToLobby(${uid},${floor})" style="padding:4px 10px;font-size:10px;color:var(--red);border-color:var(--red)">ロビーへ</button>`
  );
  renderRoom();
}

function showSpeech(uid,empId) {
  const el=document.querySelector(`.pixel-char[data-uid="${uid}"] .char-speech-area`);
  if (!el) return;
  const lines=SPEECHES[empId]||['...'];
  const line=lines[Math.floor(Math.random()*lines.length)];
  el.innerHTML=`<div class="char-speech">${line}</div>`;
}

function onRoomClick(e) {
  if (e.target.closest('.pixel-char')) return;
  const fc=getFloorCount();
  if (currentFloor>fc) return; // locked
  if (selectedWaiting!==null) {
    assignToFloor(selectedWaiting,currentFloor);
  } else if (movingEmp) {
    moveToFloor(currentFloor);
  }
}

function changeFloor(dir) {
  const maxF=Math.min(getFloorCount()+1, MAX_FLOORS);
  const newFloor=Math.max(1,Math.min(currentFloor+dir,maxF));
  if (newFloor===currentFloor) return;
  currentFloor=newFloor;
  // Slide animation
  const chars=document.getElementById('roomChars');
  chars.classList.remove('room-slide-left','room-slide-right');
  void chars.offsetWidth;
  chars.classList.add(dir>0?'room-slide-left':'room-slide-right');
  renderRoom(); updateFloorNav();
}

function updateFloorNav() {
  const fc=getFloorCount();
  const maxF=Math.min(fc+1,MAX_FLOORS);
  document.getElementById('roomPrev').disabled=currentFloor<=1;
  document.getElementById('roomNext').disabled=currentFloor>=maxF;
  // Header floor display
  document.getElementById('headerFloor').textContent=currentFloor+'F';
  // Room overlay indicator
  const emps=getFloorEmps(currentFloor);
  const indicator=document.getElementById('roomFloorIndicator');
  if (currentFloor>fc) {
    indicator.innerHTML=currentFloor+'F <span class="room-floor-count">🔒</span>';
  } else {
    indicator.innerHTML=currentFloor+'F <span class="room-floor-count">'+emps.length+'/'+FLOOR_CAP+'</span>';
  }
}

// ============================================================
// ROOM RENDERING
// ============================================================
function renderRoom() {
  const fc=getFloorCount();
  const locked=currentFloor>fc;
  const emps=getFloorEmps(currentFloor);
  const hasEmps=emps.length>0;
  const lit=hasEmps&&!locked;
  const isPlacing=selectedWaiting!==null;
  const isMoving=movingEmp!==null;

  // SVG 2.5D background
  document.getElementById('svgBackWall').setAttribute('fill', lit?'url(#backWallLit)':'url(#backWallDark)');
  document.getElementById('svgLeftWall').setAttribute('fill', lit?'url(#leftWallLit)':'url(#leftWallDark)');
  document.getElementById('svgRightWall').setAttribute('fill', lit?'url(#rightWallLit)':'url(#rightWallDark)');
  document.getElementById('svgFloor').setAttribute('fill', lit?'url(#floorLit)':'url(#floorDark)');
  document.getElementById('svgFloorLines').setAttribute('opacity', lit?'1':'0');
  // Windows
  const winOpacity = lit ? '1' : '0.4';
  document.getElementById('svgWin1').setAttribute('opacity', winOpacity);
  document.getElementById('svgWin2').setAttribute('opacity', winOpacity);
  document.getElementById('svgWinLights').setAttribute('opacity', lit?'1':'0');
  document.getElementById('svgAmbient').setAttribute('opacity', lit?'1':'0');
  // Corner lines
  const cornerOpacity = lit ? '0.5' : '0.3';
  ['svgCornerL','svgCornerR','svgCornerBL','svgCornerBR'].forEach(id=>{
    document.getElementById(id).setAttribute('opacity', cornerOpacity);
    document.getElementById(id).setAttribute('stroke', lit?'#2a2860':'#1a1830');
  });

  // Locked
  const lockedEl=document.getElementById('roomLocked');
  if (locked) {
    lockedEl.style.display='flex';
    const next=FLOOR_THRESHOLDS[currentFloor-1]||999;
    document.getElementById('lockedText').textContent=`社員${next}名で解放`;
  } else {
    lockedEl.style.display='none';
  }

  // Placement highlight
  const wrapper=document.getElementById('roomWrapper');
  if ((isPlacing||isMoving)&&!locked&&!isFloorFull(currentFloor)) {
    wrapper.style.outline='2px solid var(--accent)';
    wrapper.style.outlineOffset='-2px';
  } else {
    wrapper.style.outline='none';
  }

  // Characters
  const charsEl=document.getElementById('roomChars');
  if (locked||emps.length===0) { charsEl.innerHTML=''; updateFloorNav(); return; }

  let html='';
  const roomW=wrapper.offsetWidth||window.innerWidth;
  const roomH=wrapper.offsetHeight||400;
  const total=emps.length;

  // 2.5D layout: front row (bottom, larger) and back row (upper, smaller)
  // Front row: y=75-85% of room height, scale 1.0
  // Back row: y=50-58% of room height, scale 0.75
  const frontY = roomH * 0.78;
  const backY = roomH * 0.52;
  const frontScale = 1.0;
  const backScale = 0.75;

  // Split into front and back rows
  let frontCount, backCount;
  if (total <= 3) { frontCount = total; backCount = 0; }
  else { frontCount = Math.ceil(total / 2); backCount = total - frontCount; }

  // Assign row to each emp
  const rows = [];
  for (let i = 0; i < total; i++) {
    if (i < backCount) rows.push('back');
    else rows.push('front');
  }

  for (let i=0;i<emps.length;i++) {
    const emp=emps[i];
    const ed=EMP.find(e=>e.id===emp.empId);
    if (!ed) continue;

    const row = rows[i];
    const isBack = row === 'back';
    const rowCount = isBack ? backCount : frontCount;
    const indexInRow = isBack ? i : i - backCount;
    const scale = isBack ? backScale : frontScale;
    const rowY = isBack ? backY : frontY;
    const padding = isBack ? 120 : 80;
    const charW = 60 * scale;
    const usable = roomW - padding * 2 - charW;

    let slotX;
    if (rowCount === 1) { slotX = roomW / 2 - charW / 2; }
    else { slotX = padding + (usable / (rowCount - 1)) * indexInRow; }

    const jitter = (Math.sin(emp.uid * 7.3) * 10) * scale;
    if (!charPositions[emp.uid]) {
      charPositions[emp.uid] = { x: slotX + jitter, y: rowY, scale, slot: i, row };
    } else {
      charPositions[emp.uid].x = slotX + jitter;
      charPositions[emp.uid].y = rowY;
      charPositions[emp.uid].scale = scale;
      charPositions[emp.uid].row = row;
    }
    const cp = charPositions[emp.uid];
    const isSel=selectedFloorEmp&&selectedFloorEmp.uid===emp.uid;

    const isImg = !!ed.img;
    const charClass = `pixel-char${isSel?' selected-emp':''}${isImg?' img-char':''}`;
    const speechBottom = isImg ? '86px' : '38px';

    let charInner;
    if (isImg) {
      charInner = `<div class="char-img-wrap"><canvas class="char-img" data-src="${ed.img}" width="60" height="80"></canvas></div>`;
    } else {
      charInner = `<div class="char-body">
        ${ed.acc?`<div class="char-acc">${ed.acc}</div>`:''}
        <div class="char-head" style="background:${ed.headColor}"></div>
        <div class="char-body-rect" style="background:${ed.bodyColor}"></div>
        <div class="char-legs"><div class="char-leg"></div><div class="char-leg"></div></div>
      </div>`;
    }

    const animDelay = (emp.uid * 0.37 % 1).toFixed(2);
    const charScale = cp.scale || 1;
    const zIdx = Math.floor(cp.y || 0); // further back = lower z
    const shadowSize = isBack ? 6 : 10;
    html+=`<div class="${charClass}" data-uid="${emp.uid}"
      style="left:${cp.x}px;top:${cp.y}px;transform:scale(${charScale});z-index:${zIdx};animation-delay:${animDelay}s;filter:drop-shadow(0 ${shadowSize}px ${shadowSize}px rgba(0,0,0,.4));" onclick="event.stopPropagation();onCharTap(${emp.uid},${currentFloor})">
      <div class="char-speech-area" style="position:absolute;bottom:${speechBottom};left:50%;transform:translateX(-50%) scale(${1/charScale});pointer-events:none;z-index:999"></div>
      ${charInner}
    </div>`;
  }
  charsEl.innerHTML=html;
  updateFloorNav();
}

// Wander characters periodically
function wanderChars() {
  const fc=getFloorCount();
  if (currentFloor>fc) return;
  const emps=getFloorEmps(currentFloor);

  for (const emp of emps) {
    const cp=charPositions[emp.uid];
    if (!cp) continue;
    // Small wander within ±15px of current position
    const dx = (Math.random() - 0.5) * 30;
    const newX = cp.x + dx;
    cp.x = newX;
    const el=document.querySelector(`.pixel-char[data-uid="${emp.uid}"]`);
    if (el) el.style.left=cp.x+'px';
  }
}
setInterval(wanderChars,3000);

function renderLobby() {
  const bar=document.getElementById('lobbyBar');
  let h='<span class="lobby-label">ロビー:</span>';
  if (!game.waitingList.length) {
    h+='<span class="lobby-empty">待機社員なし</span>';
  } else {
    for (const emp of game.waitingList) {
      const ed=EMP.find(e=>e.id===emp.empId);
      const sel=selectedWaiting===emp.uid;
      h+=`<span class="lobby-emp${sel?' selected':''}" onclick="selectWaiting(${emp.uid})" title="${ed.name}">${ed.emoji}</span>`;
    }
    h+=`<span class="lobby-count">${game.waitingList.length}名</span>`;
  }
  bar.innerHTML=h;
}

// ============================================================
// STANDARD RENDERS
// ============================================================
function fmt(n) { if(n>=1e12) return (n/1e12).toFixed(1)+'兆'; if(n>=1e8) return (n/1e8).toFixed(1)+'億'; if(n>=1e4) return (n/1e4).toFixed(1)+'万'; return Math.floor(n).toLocaleString(); }

function updateMoneyDisplay(bump) {
  const el=document.getElementById('moneyDisplay');
  el.textContent=fmt(game.money);
  if (bump) { el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),100); }
  document.getElementById('incomeRate').textContent=`+${fmt(getIncomePerSecond())}円/秒`;
  document.getElementById('companyNameDisplay').textContent='★ '+COMPANY_NAMES[game.companyLevel||0];
}

function renderEmployees() {
  const list=document.getElementById('employeeList'); let h='';
  for (const e of EMP) {
    const c=game.employees[e.id]||0, cost=getEmpCost(e.id,c);
    const can=game.money>=cost;
    const unlocked=game.totalEarned>=e.unlockAt||game.money>=e.unlockAt||c>0;
    if (!unlocked) { h+=`<div class="employee-card cant-afford" style="--card-color:${e.color}"><div class="emp-emoji">🔒</div><div class="emp-info"><div class="emp-name">???</div><div class="emp-desc">¥${fmt(e.unlockAt)}以上で解放</div></div></div>`; continue; }
    let inc=e.baseIncome;
    for (const u of UPGRADES) if(u.target===e.id&&game.upgrades.includes(u.id)) inc*=u.multiplier;
    if (game.upgrades.includes('global')) inc*=1.5;
    inc*=game.prestigeMultiplier;
    h+=`<div class="employee-card ${can?'can-afford':'cant-afford'}" style="--card-color:${e.color}" onclick="hireEmployee('${e.id}')">
      <div class="emp-emoji">${e.emoji}</div><div class="emp-info">
      <div class="emp-name">${e.name}${c?`<span class="emp-count-badge" style="background:${e.color}">${c}名</span>`:''}</div>
      <div class="emp-income">+${fmt(inc)}円/秒 ×${c}名</div>
      <div class="emp-desc">${e.desc}</div></div>
      <div class="hire-btn ${can?'can-afford':''}" style="--card-color:${e.color}"><span class="hire-label">採用</span><span class="hire-cost">¥${fmt(cost)}</span></div></div>`;
  }
  list.innerHTML=h;
}

function renderUpgrades() {
  const list=document.getElementById('upgradeList'); let h='';
  for (const u of UPGRADES) {
    const p=game.upgrades.includes(u.id), can=game.money>=u.cost;
    h+=`<div class="upgrade-card ${p?'purchased':can?'can-afford':''}" onclick="buyUpgrade('${u.id}')">
      <div class="upg-icon">${u.emoji}</div><div class="upg-info"><div class="upg-name">${u.name}</div><div class="upg-desc">${u.desc}</div></div>
      ${p?'<div class="upg-done">✅</div>':`<div class="upg-cost">¥${fmt(u.cost)}</div>`}</div>`;
  }
  list.innerHTML=h;
}

function buyUpgrade(id) {
  if (game.upgrades.includes(id)) return;
  const u=UPGRADES.find(x=>x.id===id); if(!u||game.money<u.cost) return;
  game.money-=u.cost; game.upgrades.push(id);
  playSE('upgrade'); updateQuestProgress('upgrade');
  showToast(`⚡ ${u.name}を導入！`,'gold'); updateAll(); saveGame();
}

function renderMilestones() {
  const list=document.getElementById('milestoneList'); let h='';
  for (const ms of MILESTONES) {
    const a=ms.check(game); if(a&&!game.milestones.includes(ms.id)) game.milestones.push(ms.id);
    const d=game.milestones.includes(ms.id)||a;
    h+=`<div class="milestone-card ${d?'achieved':''}"><div class="ms-icon">${ms.emoji}</div><div class="ms-info"><div class="ms-name">${ms.name}</div><div class="ms-desc">${ms.desc}</div></div><div class="ms-status">${d?'🏆':'⬜'}</div></div>`;
  }
  list.innerHTML=h;
}

function renderPrestige() {
  const btn=document.getElementById('prestigeBtn');
  btn.disabled=game.money<1e9;
  document.getElementById('prestigeBonus').textContent=`転生後ボーナス: ×${(1+((game.prestigeCount+1)*.5)).toFixed(1)}`;
  const hist=document.getElementById('prestigeHistory');
  hist.innerHTML=game.prestigeCount>0
    ?`<div class="milestone-card achieved"><div class="ms-icon">⭐</div><div class="ms-info"><div class="ms-name">${game.prestigeCount}回転生済み</div><div class="ms-desc">収益ボーナス: ×${game.prestigeMultiplier.toFixed(1)}</div></div><div class="ms-status">✨</div></div>`
    :'<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:16px">まだ転生していません</div>';
}

function doPrestige() {
  if (game.money<1e9) return;
  game.prestigeCount++; game.prestigeMultiplier=1+game.prestigeCount*.5;
  game.money=0; game.totalEarned=0; game.employees={}; game.upgrades=[];
  game.totalEmployees=0; game.companyLevel=Math.min(game.prestigeCount,COMPANY_NAMES.length-1);
  game.floorData={1:[]}; game.waitingList=[]; game.prevFloorCount=1;
  game.furniturePlaced={}; game.furnitureOwned=[];
  currentFloor=1; charPositions={}; selectedFurn=null;
  playSE('prestige'); showToast('★ 転生完了！ボーナスGET！','purple');
  quests=[]; generateQuests(); cancelSelection(); updateAll(); saveGame();
}

function collectOffline() {
  const b=document.getElementById('offlineBanner');
  const a=parseFloat(b.dataset.amount||0);
  game.money+=a; game.totalEarned+=a; b.style.display='none';
  showToast(`💤 オフライン収益 ¥${fmt(a)} 回収！`); updateMoneyDisplay();
}

function renderRanking() {
  const list=document.getElementById('rankingList'); if(!list) return;
  const rd=[], ti=getIncomePerSecond(), gm=game.upgrades.includes('global')?1.5:1;
  for (const e of EMP) {
    const c=game.employees[e.id]||0; if(!c) continue;
    let inc=e.baseIncome*c;
    for (const u of UPGRADES) if(u.target===e.id&&game.upgrades.includes(u.id)) inc*=u.multiplier;
    inc*=gm*game.prestigeMultiplier;
    rd.push({name:e.name,emoji:e.emoji,count:c,income:inc,color:e.color,share:ti>0?inc/ti*100:0});
  }
  rd.sort((a,b)=>b.income-a.income);
  let h='';
  if (!rd.length) { h='<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:16px">社員を採用すると表示されます</div>'; }
  else {
    h+=`<div class="ranking-card" style="border-color:var(--accent);margin-bottom:12px"><div style="font-size:22px">🏢</div><div class="rank-info"><div class="rank-name">全社合計</div><div class="rank-income">+${fmt(ti)}円/秒</div></div><div style="font-size:12px;color:var(--accent);font-family:var(--pixel)">${game.totalEmployees}名</div></div>`;
    const medals=['🥇','🥈','🥉'];
    rd.forEach((e,i)=>{
      const r=i+1, rc=r<=3?`rank-${r}`:'';
      h+=`<div class="ranking-card ${rc}"><div class="rank-num">${r<=3?medals[r-1]:'#'+r}</div><div style="font-size:24px;flex-shrink:0">${e.emoji}</div><div class="rank-info"><div class="rank-name">${e.name} <span style="font-size:9px;color:var(--text-dim)">(${e.count}名)</span></div><div class="rank-income">+${fmt(e.income)}円/秒</div><div class="rank-bar"><div class="rank-bar-fill" style="width:${e.share}%;background:${e.color}"></div></div><div class="rank-share">シェア: ${e.share.toFixed(1)}%</div></div></div>`;
    });
  }
  list.innerHTML=h;
}

let selectedFurn = null; // {fid, floor}

function buyFurniture(id) {
  const item = FURNITURE_ITEMS.find(f=>f.id===id);
  if (!item || game.money < item.cost) return;
  game.money -= item.cost;
  const fid = game.nextFid++;
  // Auto-place on current floor
  const fc = getFloorCount();
  const floor = currentFloor <= fc ? currentFloor : 1;
  if (!game.furniturePlaced[floor]) game.furniturePlaced[floor] = [];
  const wrapper = document.getElementById('roomWrapper');
  const roomW = wrapper.offsetWidth || 440;
  const x = 60 + Math.random() * (roomW - 160);
  game.furniturePlaced[floor].push({ fid, id: item.id, x: Math.floor(x) });
  playSE('upgrade');
  showToast(`${item.emoji} ${item.name}を${floor}Fに配置！`, 'gold');
  updateAll(); saveGame();
}

function onFurnTap(fid, floor) {
  if (selectedFurn && selectedFurn.fid === fid) {
    selectedFurn = null;
  } else {
    selectedFurn = { fid, floor };
  }
  renderRoom();
  renderFurnitureInRoom();
  if (selectedFurn) {
    const fp = (game.furniturePlaced[floor]||[]).find(f=>f.fid===fid);
    if (!fp) return;
    const item = FURNITURE_ITEMS.find(f=>f.id===fp.id);
    showActionBar(
      `<span class="action-emoji">${item.emoji}</span>${item.name} ` +
      `<button class="action-btn" onclick="moveFurn(-30)" style="padding:3px 8px;font-size:10px">◀</button>` +
      `<button class="action-btn" onclick="moveFurn(30)" style="padding:3px 8px;font-size:10px">▶</button>` +
      `<button class="action-btn cancel" onclick="removeFurn()" style="padding:3px 8px;font-size:10px;color:var(--red);border-color:var(--red)">撤去</button>`
    );
  } else {
    document.getElementById('actionBar').classList.remove('show');
  }
}

function moveFurn(dx) {
  if (!selectedFurn) return;
  const arr = game.furniturePlaced[selectedFurn.floor] || [];
  const fp = arr.find(f=>f.fid===selectedFurn.fid);
  if (!fp) return;
  const wrapper = document.getElementById('roomWrapper');
  const roomW = wrapper.offsetWidth || 440;
  fp.x = Math.max(20, Math.min(fp.x + dx, roomW - 60));
  renderFurnitureInRoom(); saveGame();
}

function removeFurn() {
  if (!selectedFurn) return;
  const arr = game.furniturePlaced[selectedFurn.floor] || [];
  const idx = arr.findIndex(f=>f.fid===selectedFurn.fid);
  if (idx !== -1) {
    const item = FURNITURE_ITEMS.find(f=>f.id===arr[idx].id);
    arr.splice(idx, 1);
    showToast(`${item.emoji} ${item.name}を撤去しました`);
  }
  selectedFurn = null;
  document.getElementById('actionBar').classList.remove('show');
  renderFurnitureInRoom(); saveGame();
}

function renderFurnitureInRoom() {
  const el = document.getElementById('roomFurniture');
  if (!el) return;
  const fc = getFloorCount();
  if (currentFloor > fc) { el.innerHTML = ''; return; }
  const arr = game.furniturePlaced[currentFloor] || [];
  let h = '';
  for (const fp of arr) {
    const item = FURNITURE_ITEMS.find(f=>f.id===fp.id);
    if (!item) continue;
    const isSel = selectedFurn && selectedFurn.fid === fp.fid;
    const isAircon = fp.id === 'aircon';
    const furnY = isAircon ? '8%' : '62%';
    const furnScale = isAircon ? 0.9 : 0.85;
    h += `<div class="placed-furn${isSel?' selected-furn':''}${isAircon?' aircon':''}"
      style="left:${fp.x}px;top:${furnY};font-size:${Math.max(item.w*.7,20)}px;transform:scale(${furnScale});pointer-events:auto;"
      onclick="event.stopPropagation();onFurnTap(${fp.fid},${currentFloor})">${item.emoji}</div>`;
  }
  el.innerHTML = h;
}

function renderFurnitureShop() {
  const list = document.getElementById('furnitureShop');
  if (!list) return;
  let h = '';
  for (const item of FURNITURE_ITEMS) {
    const can = game.money >= item.cost;
    // Count owned on all floors
    let count = 0;
    for (const f in game.furniturePlaced) {
      count += (game.furniturePlaced[f]||[]).filter(fp=>fp.id===item.id).length;
    }
    h += `<div class="furn-card${can?' can-afford':''}" onclick="buyFurniture('${item.id}')">
      <div class="furn-emoji">${item.emoji}</div>
      <div class="furn-info">
        <div class="furn-name">${item.name}</div>
        ${count>0?`<div class="furn-owned">所持: ${count}個</div>`:''}
      </div>
      <div class="furn-cost">¥${fmt(item.cost)}</div>
    </div>`;
  }
  list.innerHTML = h;
}

function updateAll() {
  updateMoneyDisplay(); renderRoom(); renderLobby(); renderFurnitureInRoom();
  renderEmployees(); renderUpgrades(); renderFurnitureShop();
  renderMilestones(); renderPrestige(); updateFloorNav();
}

// ============================================================
// UI
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
}
function showToast(msg,type='') {
  const c=document.getElementById('toastContainer'), t=document.createElement('div');
  t.className='toast '+(type||''); t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}
function showOfflineBanner(amount) {
  const b=document.getElementById('offlineBanner');
  b.dataset.amount=amount; b.querySelector('.offline-amount').textContent='¥'+fmt(amount);
  b.style.display='flex';
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTick=Date.now();
function gameLoop() {
  const now=Date.now(), delta=(now-lastTick)/1000; lastTick=now;
  const inc=getIncomePerSecond()*delta;
  if (inc>0) { game.money+=inc; game.totalEarned+=inc; }
  updateMoneyDisplay();
  requestAnimationFrame(gameLoop);
}

setInterval(()=>{
  renderEmployees(); renderUpgrades(); renderFurnitureShop();
  renderRoom(); renderLobby(); renderFurnitureInRoom();
  updateQuestProgress('earn',getIncomePerSecond()*2);
  checkFloorUnlocks();
  for (const ms of MILESTONES) {
    if (!game.milestones.includes(ms.id)&&ms.check(game)) {
      game.milestones.push(ms.id); playSE('milestone');
      showToast(`🏆 実績解除: ${ms.name}！`,'gold');
    }
  }
  saveGame();
},2000);

// ============================================================
// SOUND
// ============================================================
let audioCtx=null, soundEnabled=false, bgmGain=null, bgmStarted=false;
function initAudio() { if(audioCtx) return; audioCtx=new(window.AudioContext||window.webkitAudioContext)(); bgmGain=audioCtx.createGain(); bgmGain.gain.value=.15; bgmGain.connect(audioCtx.destination); }
function toggleSound() {
  initAudio(); soundEnabled=!soundEnabled;
  const b=document.getElementById('soundToggle');
  b.textContent=soundEnabled?'🔊':'🔇'; b.classList.toggle('on',soundEnabled);
  if(soundEnabled){if(audioCtx.state==='suspended')audioCtx.resume();if(!bgmStarted)startBGM();bgmGain.gain.value=.15;}else{bgmGain.gain.value=0;}
}
function playSE(type) {
  if(!soundEnabled||!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  switch(type) {
    case 'hire': o.type='triangle'; o.frequency.setValueAtTime(523,t); g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.15); o.start(); o.stop(t+.15);
      setTimeout(()=>{if(!audioCtx)return;const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.type='triangle';o2.frequency.value=659;g2.gain.setValueAtTime(.12,audioCtx.currentTime);g2.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.15);o2.start();o2.stop(audioCtx.currentTime+.15)},80); break;
    case 'upgrade': o.type='square'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(880,t+.15); g.gain.setValueAtTime(.08,t); g.gain.exponentialRampToValueAtTime(.001,t+.2); o.start(); o.stop(t+.2); break;
    case 'milestone': o.type='sine'; o.frequency.setValueAtTime(523,t); g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.5); o.start(); o.stop(t+.5);
      [659,784,1047].forEach((f,i)=>setTimeout(()=>{if(!audioCtx)return;const x=audioCtx.createOscillator(),y=audioCtx.createGain();x.connect(y);y.connect(audioCtx.destination);x.type='sine';x.frequency.value=f;y.gain.setValueAtTime(.12,audioCtx.currentTime);y.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.3);x.start();x.stop(audioCtx.currentTime+.3)},(i+1)*120)); break;
    case 'quest': o.type='sine'; o.frequency.setValueAtTime(660,t); o.frequency.exponentialRampToValueAtTime(1320,t+.2); g.gain.setValueAtTime(.15,t); g.gain.exponentialRampToValueAtTime(.001,t+.3); o.start(); o.stop(t+.3); break;
    case 'prestige': o.type='sine'; o.frequency.setValueAtTime(262,t); g.gain.setValueAtTime(.15,t); g.gain.exponentialRampToValueAtTime(.001,t+.8); o.start(); o.stop(t+.8);
      [330,392,523,659,784].forEach((f,i)=>setTimeout(()=>{if(!audioCtx)return;const x=audioCtx.createOscillator(),y=audioCtx.createGain();x.connect(y);y.connect(audioCtx.destination);x.type='sine';x.frequency.value=f;y.gain.setValueAtTime(.12,audioCtx.currentTime);y.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.4);x.start();x.stop(audioCtx.currentTime+.4)},(i+1)*150)); break;
  }
}
function startBGM() {
  if(!audioCtx||bgmStarted) return; bgmStarted=true;
  const notes=[262,294,330,349,392,349,330,294]; let ni=0;
  function play(){if(!soundEnabled){setTimeout(play,500);return;}const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(bgmGain);o.type='sine';o.frequency.value=notes[ni]*.5;g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.8);o.start();o.stop(audioCtx.currentTime+.8);ni=(ni+1)%notes.length;setTimeout(play,800);}
  play();
}

// ============================================================
// QUEST
// ============================================================
const QUEST_TEMPLATES=[
  {id:'q_hire',name:'採用キャンペーン',desc:'{target}人採用しよう',icon:'👥',type:'hire',targets:[3,5,10,20],rewardMult:500},
  {id:'q_earn',name:'売上目標',desc:'¥{target}を稼ごう',icon:'💰',type:'earn',targets:[1000,10000,100000,1000000],rewardMult:.3},
  {id:'q_upgrade',name:'設備投資',desc:'{target}個の強化を購入しよう',icon:'⚡',type:'upgrade',targets:[1,2,3,5],rewardMult:2000},
];
let quests=[], questLastGen=0;
function generateQuests() {
  const now=Date.now(); if(quests.length>=3&&now-questLastGen<300000) return;
  quests=quests.filter(q=>!q.claimed);
  while(quests.length<3){
    const tp=QUEST_TEMPLATES[Math.floor(Math.random()*QUEST_TEMPLATES.length)];
    const d=Math.min(Math.floor(game.prestigeCount+game.totalEmployees/20),tp.targets.length-1);
    const tgt=tp.targets[Math.max(0,d)];
    const rew=Math.floor(tgt*tp.rewardMult*(1+game.prestigeCount*.2));
    quests.push({id:tp.id+'_'+now+'_'+quests.length,name:tp.name,desc:tp.desc.replace('{target}',tp.type==='earn'?fmt(tgt):tgt),icon:tp.icon,type:tp.type,target:tgt,progress:0,reward:rew,completed:false,claimed:false,createdAt:now,expiresAt:now+600000});
  }
  questLastGen=now;
}
function updateQuestProgress(type,amount=1) {
  for(const q of quests){if(q.claimed||q.type!==type) continue; q.progress+=amount; if(q.progress>=q.target&&!q.completed){q.completed=true;showToast(`📋 任務達成: ${q.name}！`,'gold');playSE('quest');}}
}
function claimQuest(id) {
  const q=quests.find(x=>x.id===id); if(!q||!q.completed||q.claimed) return;
  q.claimed=true; game.money+=q.reward; game.totalEarned+=q.reward;
  showToast(`📋 報酬 ¥${fmt(q.reward)} 獲得！`,'gold'); playSE('milestone');
  generateQuests(); renderQuests(); updateMoneyDisplay(true); saveGame();
}
function renderQuests() {
  const list=document.getElementById('questList'); if(!list) return;
  const now=Date.now(); quests=quests.filter(q=>q.claimed||now<q.expiresAt); generateQuests();
  let h='';
  for(const q of quests){
    if(q.claimed) continue;
    const p=Math.min(q.progress,q.target), pct=Math.floor(p/q.target*100);
    const rem=Math.max(0,q.expiresAt-now), m=Math.floor(rem/60000), s=Math.floor(rem%60000/1000);
    h+=`<div class="quest-card ${q.completed?'completed':'active'}"><div class="quest-timer">${m}:${String(s).padStart(2,'0')}</div><div class="quest-header"><span class="quest-icon">${q.icon}</span><span class="quest-title">${q.name}</span></div><div class="quest-desc">${q.desc}</div><div class="quest-progress-bar"><div class="quest-progress-fill" style="width:${pct}%"></div></div><div class="quest-progress-text"><span>${q.type==='earn'?fmt(p):p} / ${q.type==='earn'?fmt(q.target):q.target}</span><span>${pct}%</span></div><div class="quest-reward">報酬: ¥${fmt(q.reward)}</div>${q.completed?`<button class="quest-claim-btn" onclick="claimQuest('${q.id}')">報酬を受け取る！</button>`:''}</div>`;
  }
  if(!h) h='<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:16px">準備中...</div>';
  list.innerHTML=h;
}

// ============================================================
// WHITE BACKGROUND REMOVAL (canvas)
// ============================================================
const imgCache = {}; // src -> ImageData with transparency

function removeWhiteBg(canvas) {
  const src = canvas.dataset.src;
  if (!src) return;

  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');

  // If already processed, draw from cache
  if (imgCache[src]) {
    ctx.putImageData(imgCache[src], 0, 0);
    return;
  }

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);
    const imageData = ctx.getImageData(0, 0, w, h);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      // Threshold: if pixel is near-white, make transparent
      if (r > 220 && g > 220 && b > 220) {
        d[i+3] = 0; // fully transparent
      } else if (r > 200 && g > 200 && b > 200) {
        // Semi-transparent for near-white edge pixels (anti-aliasing)
        const brightness = (r + g + b) / 3;
        d[i+3] = Math.floor(255 * (1 - (brightness - 200) / 55));
      }
    }
    ctx.putImageData(imageData, 0, 0);
    imgCache[src] = imageData;
  };
  img.src = src;
}

// Process all char-img canvases after room render
function processCharImages() {
  document.querySelectorAll('canvas.char-img').forEach(removeWhiteBg);
}

// Patch renderRoom to call processCharImages after rendering
const _origRenderRoom = renderRoom;
renderRoom = function() {
  _origRenderRoom();
  processCharImages();
};

// ============================================================
// INIT
// ============================================================
loadGame(); generateQuests(); updateAll(); requestAnimationFrame(gameLoop);
</script>

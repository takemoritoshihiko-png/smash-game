<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>会社道 KAISHA-DO</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1p:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2335;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7fffb2;
    --gold: #ffd700;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --red: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS 1p', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1b2e 0%, #1a2d4a 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .company-name {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'DotGothic16', monospace;
    margin-bottom: 2px;
  }

  .money-display {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .money-icon { font-size: 18px; }

  .money-amount {
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
    font-family: 'DotGothic16', monospace;
    line-height: 1;
    transition: transform 0.1s;
  }

  .money-amount.bump {
    transform: scale(1.05);
    color: #ffe566;
  }

  .money-unit {
    font-size: 13px;
    color: var(--text-dim);
  }

  .income-rate {
    font-size: 12px;
    color: var(--accent3);
    font-family: 'DotGothic16', monospace;
    margin-top: 2px;
  }

  /* BUILDING VIEW - HTML based */
  .building-section {
    padding: 8px 16px;
  }

  .building-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.15));
  }

  .building-roof {
    background: linear-gradient(135deg, #1a3a5c, #0d2040);
    padding: 6px 12px;
    text-align: center;
    font-size: 10px;
    color: var(--accent);
    font-family: 'DotGothic16', monospace;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
  }

  .building-floors {
    display: flex;
    flex-direction: column;
  }

  .building-floor {
    min-height: 56px;
    border-bottom: 1px solid rgba(30, 58, 95, 0.4);
    padding: 6px 10px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: #0a1218;
    transition: background 0.5s, border-color 0.3s;
    cursor: pointer;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .building-floor:last-child { border-bottom: none; }

  .building-floor.lit {
    background: #0d1a2a;
  }

  .building-floor.selected {
    background: #132840;
    border-color: var(--accent);
    box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.08);
  }

  .floor-label {
    font-size: 9px;
    color: #1e3a5f;
    font-family: 'DotGothic16', monospace;
    min-width: 50px;
    flex-shrink: 0;
    padding-top: 4px;
    transition: color 0.3s;
  }

  .building-floor.lit .floor-label {
    color: #4a7a9b;
  }

  .floor-employees {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    flex: 1;
    min-height: 28px;
    align-items: center;
  }

  .floor-emp {
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
    line-height: 1;
    padding: 2px;
    border-radius: 4px;
  }

  .floor-emp:hover {
    transform: scale(1.2);
  }

  .floor-emp.selected-emp {
    background: rgba(0, 212, 255, 0.2);
    outline: 1px solid var(--accent);
    border-radius: 4px;
  }

  .floor-count {
    font-size: 9px;
    color: var(--text-dim);
    font-family: 'DotGothic16', monospace;
    flex-shrink: 0;
    padding-top: 4px;
  }

  .floor-full-badge {
    font-size: 8px;
    background: var(--accent2);
    color: #fff;
    padding: 1px 4px;
    border-radius: 4px;
    font-weight: 700;
  }

  .floor-empty-hint {
    font-size: 10px;
    color: #1e3a5f;
    font-family: 'DotGothic16', monospace;
  }

  /* FLOOR UNLOCK ANIMATION */
  @keyframes floorUnlock {
    0% { max-height: 0; opacity: 0; padding: 0 10px; }
    50% { max-height: 60px; opacity: 0.5; }
    100% { max-height: 80px; opacity: 1; padding: 6px 10px; }
  }

  .building-floor.new-floor {
    animation: floorUnlock 0.8s ease forwards;
    overflow: hidden;
    border-color: var(--accent);
    box-shadow: inset 0 0 30px rgba(0, 212, 255, 0.15);
  }

  /* WAITING LIST */
  .waiting-section {
    padding: 0 16px 8px;
  }

  .waiting-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    min-height: 42px;
  }

  .waiting-label {
    font-size: 9px;
    color: var(--text-dim);
    font-family: 'DotGothic16', monospace;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .waiting-emp {
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.15s;
    padding: 2px;
    border-radius: 4px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .waiting-emp:hover { transform: scale(1.2); }

  .waiting-emp.selected-waiting {
    background: rgba(255, 107, 53, 0.3);
    outline: 1px solid var(--accent2);
  }

  .waiting-empty {
    font-size: 10px;
    color: #1e3a5f;
    font-family: 'DotGothic16', monospace;
  }

  /* ACTION BAR - shows when employee selected */
  .action-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    max-width: 480px;
    width: 100%;
    background: linear-gradient(0deg, #0d1b2e 0%, rgba(13,27,46,0.95) 100%);
    border-top: 1px solid var(--accent);
    padding: 10px 16px;
    display: none;
    gap: 8px;
    align-items: center;
    z-index: 200;
    animation: slideUp 0.2s ease;
  }

  .action-bar.show { display: flex; }

  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(100%); }
    to { transform: translateX(-50%) translateY(0); }
  }

  .action-info {
    flex: 1;
    font-size: 12px;
    font-family: 'DotGothic16', monospace;
    color: var(--text);
  }

  .action-info .action-emoji { font-size: 20px; margin-right: 6px; }

  .action-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    color: #000;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .action-btn.cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .action-btn.move {
    background: var(--accent2);
  }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 8px 16px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }

  .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 3px;
  }

  .stat-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'DotGothic16', monospace;
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 85px;
    z-index: 99;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'M PLUS 1p', sans-serif;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* CONTENT */
  .content {
    flex: 1;
    padding: 12px 16px;
    padding-bottom: 60px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* EMPLOYEE CARDS */
  .section-title {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'DotGothic16', monospace;
  }

  .employee-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .employee-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-color, var(--accent));
  }

  .employee-card.can-afford {
    border-color: var(--card-color, var(--accent));
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
  }

  .employee-card.cant-afford { opacity: 0.5; }

  .emp-emoji {
    font-size: 32px;
    flex-shrink: 0;
    width: 44px;
    text-align: center;
  }

  .emp-info {
    flex: 1;
    min-width: 0;
  }

  .emp-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .emp-count-badge {
    background: var(--card-color, var(--accent));
    color: #000;
    font-size: 10px;
    font-weight: 900;
    padding: 1px 5px;
    border-radius: 999px;
    font-family: 'DotGothic16', monospace;
  }

  .emp-income {
    font-size: 11px;
    color: var(--accent3);
    font-family: 'DotGothic16', monospace;
    margin-top: 2px;
  }

  .emp-desc {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hire-btn {
    background: var(--surface2);
    border: 1px solid var(--card-color, var(--accent));
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    text-align: center;
    min-width: 72px;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .hire-btn:active { transform: scale(0.95); }

  .hire-btn.can-afford { background: var(--card-color, var(--accent)); }
  .hire-btn.can-afford .hire-label { color: #000; }
  .hire-btn.can-afford .hire-cost { color: rgba(0,0,0,0.7); }

  .hire-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    display: block;
  }

  .hire-cost {
    font-size: 11px;
    font-family: 'DotGothic16', monospace;
    color: var(--text-dim);
    display: block;
    margin-top: 1px;
  }

  /* UPGRADE CARDS */
  .upgrade-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .upgrade-card.purchased { opacity: 0.4; pointer-events: none; }

  .upgrade-card.can-afford {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.15);
  }

  .upgrade-card:active:not(.purchased) { transform: scale(0.98); }

  .upg-icon { font-size: 28px; flex-shrink: 0; }
  .upg-info { flex: 1; }
  .upg-name { font-size: 13px; font-weight: 700; }
  .upg-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .upg-cost {
    font-size: 12px;
    font-family: 'DotGothic16', monospace;
    color: var(--gold);
    font-weight: 700;
    flex-shrink: 0;
  }

  .upg-done { font-size: 18px; }

  /* MILESTONES */
  .milestone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .milestone-card.achieved {
    border-color: var(--gold);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(255,215,0,0.05) 100%);
  }

  .ms-icon { font-size: 24px; flex-shrink: 0; }
  .ms-info { flex: 1; }
  .ms-name { font-size: 13px; font-weight: 700; }
  .ms-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .ms-status { font-size: 18px; flex-shrink: 0; }

  /* PRESTIGE */
  .prestige-section {
    background: linear-gradient(135deg, #1a0a2e, #2d1060);
    border: 1px solid #7c3aed;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }

  .prestige-title {
    font-size: 18px;
    font-weight: 900;
    color: #c084fc;
    font-family: 'DotGothic16', monospace;
    margin-bottom: 6px;
  }

  .prestige-desc { font-size: 11px; color: #a78bfa; margin-bottom: 12px; }

  .prestige-btn {
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    color: white;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .prestige-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TOAST */
  .toast-container {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 300px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    animation: toastIn 0.3s ease, toastOut 0.4s ease 1.8s forwards;
    white-space: nowrap;
    font-family: 'DotGothic16', monospace;
  }

  .toast.gold { border-color: var(--gold); color: var(--gold); }
  .toast.purple { border-color: #c084fc; color: #c084fc; }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(-10px); }
  }

  .prestige-stars { display: flex; gap: 4px; margin-top: 4px; }
  .star { font-size: 10px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .offline-banner {
    background: linear-gradient(135deg, #1a2d1a, #0d1f0d);
    border: 1px solid #22c55e;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .offline-icon { font-size: 20px; }
  .offline-text { flex: 1; font-size: 11px; color: #86efac; }

  .offline-amount {
    font-size: 14px;
    font-weight: 900;
    color: #22c55e;
    font-family: 'DotGothic16', monospace;
  }

  .collect-btn {
    background: #22c55e;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    color: #000;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    flex-shrink: 0;
  }

  .bottom-safe { height: 60px; }

  .sound-toggle {
    position: absolute;
    right: 16px;
    top: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    z-index: 101;
    -webkit-tap-highlight-color: transparent;
  }

  .sound-toggle.on { color: var(--accent); border-color: var(--accent); }

  /* QUEST CARDS */
  .quest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .quest-card.active { border-color: var(--accent2); }
  .quest-card.completed { border-color: var(--accent3); opacity: 0.6; }

  .quest-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .quest-icon { font-size: 24px; }
  .quest-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .quest-desc { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; }

  .quest-progress-bar {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .quest-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    transition: width 0.3s;
  }

  .quest-progress-text {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DotGothic16', monospace;
    display: flex;
    justify-content: space-between;
  }

  .quest-reward {
    font-size: 11px;
    color: var(--gold);
    font-family: 'DotGothic16', monospace;
    margin-top: 4px;
  }

  .quest-claim-btn {
    background: linear-gradient(135deg, var(--accent2), #ff8f5a);
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    margin-top: 6px;
    font-family: 'M PLUS 1p', sans-serif;
  }

  .quest-timer {
    font-size: 10px;
    color: var(--accent2);
    font-family: 'DotGothic16', monospace;
    position: absolute;
    top: 12px;
    right: 12px;
  }

  /* RANKING */
  .ranking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ranking-card.rank-1 { border-color: var(--gold); background: linear-gradient(135deg, var(--surface), rgba(255,215,0,0.08)); }
  .ranking-card.rank-2 { border-color: #c0c0c0; }
  .ranking-card.rank-3 { border-color: #cd7f32; }

  .rank-num {
    font-size: 20px;
    font-weight: 900;
    font-family: 'DotGothic16', monospace;
    min-width: 32px;
    text-align: center;
  }

  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: #c0c0c0; }
  .rank-3 .rank-num { color: #cd7f32; }

  .rank-info { flex: 1; }

  .rank-name {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .rank-income {
    font-size: 11px;
    color: var(--accent3);
    font-family: 'DotGothic16', monospace;
    margin-top: 2px;
  }

  .rank-share {
    font-size: 11px;
    color: var(--text-dim);

  .rank-bar {

</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔇</button>
    <div class="company-name" id="companyNameDisplay">★ 株式会社ビギナーズ</div>

  <div class="tabs">

  <!-- CONTENT -->
  <div class="content">
    <div id="offlineBanner" class="offline-banner" style="display:none;" onclick="collectOffline()">
      <span class="offline-icon">💤</span>

    <div class="tab-panel active" id="tab-hire">
      <div class="section-title">▶ 社員採用</div>

    </div>

    <div class="tab-panel" id="tab-upgrade">
      <div class="section-title">▶ 経営強化</div>
      <div id="upgradeList"></div>
    </div>

    <div class="tab-panel" id="tab-quest">
      <div class="section-title">▶ ミッション</div>
      <div id="questList"></div>
    </div>

    <div class="tab-panel" id="tab-ranking">
      <div class="section-title">▶ 社員番付</div>
      <div id="rankingList"></div>
    </div>

    <div class="tab-panel" id="tab-milestone">
      <div class="section-title">▶ 実績</div>
      <div id="milestoneList"></div>
    </div>

    <div class="tab-panel" id="tab-prestige">
      <div class="section-title">▶ 会社転生</div>
      <div class="prestige-section">
        <div class="prestige-title">★ 会社転生</div>
        <div class="prestige-desc" id="prestigeDesc">
          転生すると全てリセットされますが<br>
          永続的な収益ボーナスを獲得できます！
        </div>
        <div style="font-size:13px; color:#c084fc; margin-bottom:12px; font-family:'DotGothic16',monospace;" id="prestigeBonus"></div>
        <button class="prestige-btn" id="prestigeBtn" onclick="doPrestige()">転生する（要：¥1,000,000,000）</button>
      </div>
      <div class="section-title">▶ 転生履歴</div>
      <div id="prestigeHistory"></div>
    </div>
  </div>

  <div class="bottom-safe"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- ACTION BAR for placement/movement -->
<div class="action-bar" id="actionBar">
  <div class="action-info" id="actionInfo"></div>
  <button class="action-btn cancel" onclick="cancelSelection()">キャンセル</button>
</div>

<script>
// ============================================================
// GAME DATA
// ============================================================

const EMPLOYEES = [
  { id: 'part_time', name: 'アルバイト', emoji: '🧑‍💼', desc: '時給制。コンビニ並みの稼ぎ', baseCost: 15, baseIncome: 0.1, color: '#64748b', unlockAt: 0 },
  { id: 'staff', name: '契約社員', emoji: '💼', desc: '安定した戦力。少し稼ぐ', baseCost: 120, baseIncome: 0.7, color: '#22c55e', unlockAt: 100 },
  { id: 'full_time', name: '正社員', emoji: '👔', desc: '会社の屋台骨。信頼できる', baseCost: 1300, baseIncome: 6, color: '#3b82f6', unlockAt: 1000 },
  { id: 'leader', name: 'リーダー', emoji: '🦺', desc: '現場を仕切るプロフェッショナル', baseCost: 10000, baseIncome: 40, color: '#06b6d4', unlockAt: 8000 },
  { id: 'manager', name: '課長', emoji: '🧑‍🏫', desc: 'チームを率いて成果を出す', baseCost: 80000, baseIncome: 250, color: '#8b5cf6', unlockAt: 50000 },
  { id: 'director', name: '部長', emoji: '🎩', desc: '部門の戦略立案と実行を担う', baseCost: 600000, baseIncome: 1500, color: '#f59e0b', unlockAt: 400000 },
  { id: 'exec', name: '役員', emoji: '🏛️', desc: '経営判断を下す重役', baseCost: 5000000, baseIncome: 10000, color: '#ef4444', unlockAt: 3000000 },
  { id: 'ceo', name: 'カリスマCEO', emoji: '👑', desc: '会社を次のステージへ導く伝説', baseCost: 50000000, baseIncome: 80000, color: '#ffd700', unlockAt: 30000000 },
];

const UPGRADES = [
  { id: 'coffee', name: 'コーヒーメーカー導入', desc: 'バイトの生産性2倍', emoji: '☕', cost: 500, target: 'part_time', multiplier: 2 },
  { id: 'pc', name: 'PCをアップグレード', desc: '契約社員の生産性2倍', emoji: '💻', cost: 3000, target: 'staff', multiplier: 2 },
  { id: 'training', name: '研修制度整備', desc: '正社員の生産性2倍', emoji: '📚', cost: 25000, target: 'full_time', multiplier: 2 },
  { id: 'bonus', name: 'インセンティブ制度', desc: 'リーダーの生産性2倍', emoji: '💰', cost: 200000, target: 'leader', multiplier: 2 },
  { id: 'ipo_prep', name: 'IPO準備室設立', desc: '課長の生産性2倍', emoji: '📈', cost: 1500000, target: 'manager', multiplier: 2 },
  { id: 'strategy', name: '中期経営計画策定', desc: '部長の生産性2倍', emoji: '📋', cost: 10000000, target: 'director', multiplier: 2 },
  { id: 'mna', name: 'M&A戦略部門', desc: '役員の生産性2倍', emoji: '🤝', cost: 80000000, target: 'exec', multiplier: 2 },
  { id: 'legend', name: '伝説の経営チーム', desc: 'CEO生産性2倍', emoji: '🌟', cost: 500000000, target: 'ceo', multiplier: 2 },
  { id: 'global', name: 'グローバル展開', desc: '全社員の収益1.5倍', emoji: '🌍', cost: 200000000, target: '_all', multiplier: 1.5 },
];

const MILESTONES = [
  { id: 'ms1', name: '初めての売上', desc: '初めて¥100を稼ぐ', emoji: '🌱', check: (g) => g.totalEarned >= 100 },
  { id: 'ms2', name: '最初の社員', desc: '誰かを採用する', emoji: '🤝', check: (g) => g.totalEmployees >= 1 },
  { id: 'ms3', name: '中小企業', desc: '社員10名を達成', emoji: '🏢', check: (g) => g.totalEmployees >= 10 },
  { id: 'ms4', name: '安定経営', desc: '¥10,000を稼ぐ', emoji: '📊', check: (g) => g.totalEarned >= 10000 },
  { id: 'ms5', name: '課長昇格', desc: '課長を採用する', emoji: '🎖️', check: (g) => (g.employees['manager'] || 0) >= 1 },
  { id: 'ms6', name: '成長企業', desc: '社員50名を達成', emoji: '🚀', check: (g) => g.totalEmployees >= 50 },
  { id: 'ms7', name: '億り人', desc: '¥100,000,000を稼ぐ', emoji: '💎', check: (g) => g.totalEarned >= 100000000 },
  { id: 'ms8', name: '上場企業', desc: '役員を採用する', emoji: '🏛️', check: (g) => (g.employees['exec'] || 0) >= 1 },
  { id: 'ms9', name: '1000億企業', desc: '¥100,000,000,000を稼ぐ', emoji: '🌠', check: (g) => g.totalEarned >= 100000000000 },
  { id: 'ms10', name: '初転生', desc: '初めて転生する', emoji: '⭐', check: (g) => g.prestigeCount >= 1 },
  { id: 'ms11', name: '増築成功', desc: '3フロア以上に拡張', emoji: '🏗️', check: (g) => getUnlockedFloorCount() >= 3 },
  { id: 'ms12', name: '本社ビル完成', desc: '最大フロアに到達', emoji: '🏙️', check: (g) => getUnlockedFloorCount() >= MAX_FLOORS },
];

const COMPANY_NAMES = [
  '株式会社ビギナーズ', '有限会社グロース', '株式会社ライズ',
  '株式会社エクセル', '株式会社フロンティア', 'GIC Holdings',
  '株式会社インフィニティ', 'APEX Corporation'
];

// Floor system constants
const MAX_FLOORS = 8;
const FLOOR_CAPACITY = 8;
const FLOOR_UNLOCK_THRESHOLDS = [0, 5, 15, 30, 50, 80, 120, 170]; // total employees needed

// ============================================================
// GAME STATE
// ============================================================

let game = {
  money: 0,
  totalEarned: 0,
  employees: {},        // { part_time: 3, staff: 2, ... } counts for income
  upgrades: [],
  milestones: [],
  prestigeCount: 0,
  prestigeMultiplier: 1,
  totalEmployees: 0,
  lastSave: Date.now(),
  companyLevel: 0,
  // New: placement system
  nextUid: 1,
  floorData: {},        // { 1: [{uid:1, empId:'part_time'}, ...], 2: [...] }
  waitingList: [],      // [{uid:2, empId:'staff'}, ...]
  prevFloorCount: 1,    // for detecting new floor unlocks
};

// Selection state (not saved)
let selectedWaiting = null;  // uid of selected waiting employee
let selectedFloorEmp = null; // {uid, floor} of selected floor employee
let movingEmp = null;        // {uid, empId, fromFloor} during move mode

function loadGame() {
  try {
    const saved = localStorage.getItem('kaishaDoSave');
    if (saved) {
      const data = JSON.parse(saved);
      game = { ...game, ...data };
    }
  } catch(e) {}

  // Migration: if old save has no floorData, initialize
  if (!game.floorData || typeof game.floorData !== 'object') game.floorData = {};
  if (!game.waitingList) game.waitingList = [];
  if (!game.nextUid) game.nextUid = 1;
  if (!game.prevFloorCount) game.prevFloorCount = 1;

  // Ensure floor 1 exists
  if (!game.floorData[1]) game.floorData[1] = [];

  // Migration: convert old employees to waiting list if floorData is empty
  if (game.totalEmployees > 0 && game.waitingList.length === 0) {
    let hasAnyOnFloor = false;
    for (const f in game.floorData) {
      if (game.floorData[f].length > 0) hasAnyOnFloor = true;
    }
    if (!hasAnyOnFloor) {
      for (const emp of EMPLOYEES) {
        const count = game.employees[emp.id] || 0;
        for (let i = 0; i < count; i++) {
          game.waitingList.push({ uid: game.nextUid++, empId: emp.id });
        }
      }
    }
  }

  // Check offline earnings
  const now = Date.now();
  const elapsed = (now - (game.lastSave || now)) / 1000;
  if (elapsed > 10) {
    const offlineIncome = getIncomePerSecond() * Math.min(elapsed, 3600 * 4);
    if (offlineIncome > 0) {
      showOfflineBanner(offlineIncome);
    }
  }
  game.lastSave = now;
}

function saveGame() {
  game.lastSave = Date.now();
  localStorage.setItem('kaishaDoSave', JSON.stringify(game));
}

// ============================================================
// FLOOR SYSTEM
// ============================================================

function getUnlockedFloorCount() {
  let count = 1; // always have floor 1
  for (let i = 1; i < FLOOR_UNLOCK_THRESHOLDS.length && i < MAX_FLOORS; i++) {
    if (game.totalEmployees >= FLOOR_UNLOCK_THRESHOLDS[i]) {
      count = i + 1;
    }
  }
  return count;
}

function getFloorEmployees(floorNum) {
  return game.floorData[floorNum] || [];
}

function isFloorFull(floorNum) {
  return getFloorEmployees(floorNum).length >= FLOOR_CAPACITY;
}

function checkFloorUnlocks() {
  const newCount = getUnlockedFloorCount();
  if (newCount > game.prevFloorCount) {
    for (let f = game.prevFloorCount + 1; f <= newCount; f++) {
      if (!game.floorData[f]) game.floorData[f] = [];
      showToast(`🏗️ ${f}Fが増築されました！`, 'gold');
      playSE('milestone');
    }
    game.prevFloorCount = newCount;
  }
}

// ============================================================
// CALCULATIONS
// ============================================================

function getEmployeeCost(empId, count) {
  const emp = EMPLOYEES.find(e => e.id === empId);
  if (!emp) return 0;
  return Math.floor(emp.baseCost * Math.pow(1.15, count));
}

function getIncomePerSecond() {
  let total = 1; // Base 1 yen/sec
  const globalMult = game.upgrades.includes('global') ? 1.5 : 1;

  for (const emp of EMPLOYEES) {
    const count = game.employees[emp.id] || 0;
    if (count === 0) continue;
    let income = emp.baseIncome * count;
    const empUpgrades = UPGRADES.filter(u => u.target === emp.id && game.upgrades.includes(u.id));
    for (const upg of empUpgrades) {
      income *= upg.multiplier;
    }
    income *= globalMult;
    total += income;
  }
  return total * game.prestigeMultiplier;
}

function getTotalEmployees() {
  return Object.values(game.employees).reduce((a, b) => a + b, 0);
}

// ============================================================
// ACTIONS
// ============================================================

function hireEmployee(empId) {
  const emp = EMPLOYEES.find(e => e.id === empId);
  if (!emp) return;

  const count = game.employees[empId] || 0;
  const cost = getEmployeeCost(empId, count);

  if (game.money < cost) return;

  game.money -= cost;
  game.employees[empId] = count + 1;
  game.totalEmployees = getTotalEmployees();

  // Add to waiting list
  const uid = game.nextUid++;
  game.waitingList.push({ uid, empId });

  playSE('hire');
  updateQuestProgress('hire');
  showToast(`${emp.emoji} ${emp.name}を採用！待機リストに追加`);
  checkFloorUnlocks();
  updateAll();
  saveGame();
}

function assignToFloor(uid, floorNum) {
  // Find in waiting list
  const idx = game.waitingList.findIndex(w => w.uid === uid);
  if (idx === -1) return;
  if (isFloorFull(floorNum)) {
    showToast('このフロアは満員です！', '');
    return;
  }

  const emp = game.waitingList.splice(idx, 1)[0];
  if (!game.floorData[floorNum]) game.floorData[floorNum] = [];
  game.floorData[floorNum].push(emp);

  const empData = EMPLOYEES.find(e => e.id === emp.empId);
  playSE('hire');
  showToast(`${empData.emoji} ${floorNum}Fに配置！`);
  cancelSelection();
  updateAll();
  saveGame();
}

function startMoveEmployee(uid, fromFloor) {
  const floorEmps = game.floorData[fromFloor] || [];
  const emp = floorEmps.find(e => e.uid === uid);
  if (!emp) return;

  movingEmp = { uid, empId: emp.empId, fromFloor };
  selectedFloorEmp = null;
  selectedWaiting = null;

  const empData = EMPLOYEES.find(e => e.id === emp.empId);
  const bar = document.getElementById('actionBar');
  const info = document.getElementById('actionInfo');
  info.innerHTML = `<span class="action-emoji">${empData.emoji}</span>${empData.name}の移動先フロアを選択`;
  bar.classList.add('show');
  renderBuilding();
}

function moveToFloor(toFloor) {
  if (!movingEmp) return;
  if (movingEmp.fromFloor === toFloor) {
    cancelSelection();
    return;
  }
  if (isFloorFull(toFloor)) {
    showToast('移動先フロアは満員です！', '');
    return;
  }

  // Remove from old floor
  const oldFloor = game.floorData[movingEmp.fromFloor] || [];
  const idx = oldFloor.findIndex(e => e.uid === movingEmp.uid);
  if (idx === -1) { cancelSelection(); return; }
  const emp = oldFloor.splice(idx, 1)[0];

  // Add to new floor
  if (!game.floorData[toFloor]) game.floorData[toFloor] = [];
  game.floorData[toFloor].push(emp);

  const empData = EMPLOYEES.find(e => e.id === emp.empId);
  playSE('upgrade');
  showToast(`${empData.emoji} ${toFloor}Fに移動！`);
  cancelSelection();
  updateAll();
  saveGame();
}

function cancelSelection() {
  selectedWaiting = null;
  selectedFloorEmp = null;
  movingEmp = null;
  document.getElementById('actionBar').classList.remove('show');
  renderBuilding();
  renderWaitingList();
}

function selectWaitingEmployee(uid) {
  if (selectedWaiting === uid) {
    cancelSelection();
    return;
  }
  cancelSelection();
  selectedWaiting = uid;

  const emp = game.waitingList.find(w => w.uid === uid);
  if (!emp) return;
  const empData = EMPLOYEES.find(e => e.id === emp.empId);

  const bar = document.getElementById('actionBar');
  const info = document.getElementById('actionInfo');
  info.innerHTML = `<span class="action-emoji">${empData.emoji}</span>${empData.name}を配置するフロアを選択`;
  bar.classList.add('show');
  renderBuilding();
  renderWaitingList();
}

function selectFloorEmployee(uid, floorNum) {
  if (movingEmp) {
    // If in move mode, ignore floor emp clicks
    return;
  }
  if (selectedFloorEmp && selectedFloorEmp.uid === uid) {
    cancelSelection();
    return;
  }
  cancelSelection();
  selectedFloorEmp = { uid, floor: floorNum };

  const floorEmps = game.floorData[floorNum] || [];
  const emp = floorEmps.find(e => e.uid === uid);
  if (!emp) return;
  const empData = EMPLOYEES.find(e => e.id === emp.empId);

  const bar = document.getElementById('actionBar');
  const info = document.getElementById('actionInfo');
  info.innerHTML = `<span class="action-emoji">${empData.emoji}</span>${empData.name}(${floorNum}F)` +
    `<button class="action-btn move" onclick="startMoveEmployee(${uid},${floorNum})" style="margin-left:8px;padding:4px 10px;">移動</button>`;
  bar.classList.add('show');
  renderBuilding();
}

function onFloorClick(floorNum) {
  if (selectedWaiting !== null) {
    assignToFloor(selectedWaiting, floorNum);
  } else if (movingEmp) {
    moveToFloor(floorNum);
  }
}

function buyUpgrade(upgradeId) {
  if (game.upgrades.includes(upgradeId)) return;
  const upg = UPGRADES.find(u => u.id === upgradeId);
  if (!upg || game.money < upg.cost) return;

  game.money -= upg.cost;
  game.upgrades.push(upgradeId);

  playSE('upgrade');
  updateQuestProgress('upgrade');
  showToast(`⚡ ${upg.name}を導入！`, 'gold');
  updateAll();
  saveGame();
}

function doPrestige() {
  if (game.money < 1000000000) return;

  game.prestigeCount++;
  game.prestigeMultiplier = 1 + (game.prestigeCount * 0.5);

  game.money = 0;
  game.totalEarned = 0;
  game.employees = {};
  game.upgrades = [];
  game.totalEmployees = 0;
  game.companyLevel = Math.min(game.prestigeCount, COMPANY_NAMES.length - 1);
  game.floorData = { 1: [] };
  game.waitingList = [];
  game.prevFloorCount = 1;

  playSE('prestige');
  showToast('★ 転生完了！ボーナスGET！', 'purple');
  quests = [];
  generateQuests();
  cancelSelection();
  updateAll();
  saveGame();
}

function collectOffline() {
  const banner = document.getElementById('offlineBanner');
  const amount = parseFloat(banner.dataset.amount || 0);
  game.money += amount;
  game.totalEarned += amount;
  banner.style.display = 'none';
  showToast(`💤 オフライン収益 ¥${formatMoney(amount)} 回収！`);
  updateMoneyDisplay();
}

// ============================================================
// DISPLAY
// ============================================================

function formatMoney(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(1) + '兆';
  if (n >= 1e8) return (n / 1e8).toFixed(1) + '億';
  if (n >= 1e4) return (n / 1e4).toFixed(1) + '万';
  return Math.floor(n).toLocaleString();
}

function updateMoneyDisplay(bump = false) {
  const el = document.getElementById('moneyDisplay');
  el.textContent = formatMoney(game.money);
  if (bump) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 100);
  }

  document.getElementById('incomeRate').textContent = `+${formatMoney(getIncomePerSecond())}円/秒`;
  document.getElementById('totalEmployees').textContent = game.totalEmployees + '名';
  document.getElementById('totalEarned').textContent = '¥' + formatMoney(game.totalEarned);
  document.getElementById('prestigeDisplay').textContent = '★' + game.prestigeCount;
  document.getElementById('companyNameDisplay').textContent = '★ ' + COMPANY_NAMES[game.companyLevel || 0];
}

function renderBuilding() {
  const container = document.getElementById('buildingFloors');
  const floorCount = getUnlockedFloorCount();
  const isPlacing = selectedWaiting !== null;
  const isMoving = movingEmp !== null;

  let html = '';

  // Render floors top-down
  for (let f = floorCount; f >= 1; f--) {
    const emps = getFloorEmployees(f);
    const hasEmps = emps.length > 0;
    const full = emps.length >= FLOOR_CAPACITY;
    const isNew = f > (game.prevFloorCount || 1) - 1 && f === floorCount && document.querySelector(`.building-floor[data-floor="${f}"]`) === null;
    const selectable = (isPlacing || isMoving) && !full;

    let classes = 'building-floor';
    if (hasEmps) classes += ' lit';
    if (selectable) classes += ' selected';

    let empHtml = '';
    if (emps.length > 0) {
      for (const emp of emps) {
        const empData = EMPLOYEES.find(e => e.id === emp.empId);
        const isSelected = selectedFloorEmp && selectedFloorEmp.uid === emp.uid;
        empHtml += `<span class="floor-emp${isSelected ? ' selected-emp' : ''}" onclick="event.stopPropagation();selectFloorEmployee(${emp.uid},${f})" title="${empData.name}">${empData.emoji}</span>`;
      }
    } else {
      if (isPlacing || isMoving) {
        empHtml = `<span class="floor-empty-hint">ここに配置</span>`;
      } else {
        empHtml = `<span class="floor-empty-hint">空室</span>`;
      }
    }

    const countInfo = full
      ? `<span class="floor-full-badge">満員</span>`
      : `<span class="floor-count">${emps.length}/${FLOOR_CAPACITY}</span>`;

    html += `<div class="${classes}" data-floor="${f}" onclick="onFloorClick(${f})">
      <span class="floor-label">${f}F</span>
      <div class="floor-employees">${empHtml}</div>
      ${countInfo}
    </div>`;
  }

  // Show next floor unlock hint
  if (floorCount < MAX_FLOORS) {
    const nextThreshold = FLOOR_UNLOCK_THRESHOLDS[floorCount];
    html = `<div class="building-floor" style="min-height:32px;justify-content:center;opacity:0.4;">
      <span class="floor-empty-hint">🔒 ${floorCount + 1}F 解放: 社員${nextThreshold}名</span>
    </div>` + html;
  }

  container.innerHTML = html;

  // Update roof label
  document.getElementById('buildingRoof').textContent = `KAISHA-DO BUILDING ─ ${floorCount}F`;
}

function renderWaitingList() {
  const bar = document.getElementById('waitingBar');
  let html = '<span class="waiting-label">待機:</span>';

  if (game.waitingList.length === 0) {
    html += '<span class="waiting-empty">待機社員なし</span>';
  } else {
    for (const emp of game.waitingList) {
      const empData = EMPLOYEES.find(e => e.id === emp.empId);
      const isSelected = selectedWaiting === emp.uid;
      html += `<span class="waiting-emp${isSelected ? ' selected-waiting' : ''}" onclick="selectWaitingEmployee(${emp.uid})" title="${empData.name}">${empData.emoji}</span>`;
    }
    html += `<span class="waiting-label" style="margin-left:auto;">${game.waitingList.length}名</span>`;
  }

  bar.innerHTML = html;
}

function renderEmployees() {
  const list = document.getElementById('employeeList');
  let html = '';

  for (const emp of EMPLOYEES) {
    const count = game.employees[emp.id] || 0;
    const cost = getEmployeeCost(emp.id, count);
    const canAfford = game.money >= cost;
    const isUnlocked = game.totalEarned >= emp.unlockAt || game.money >= emp.unlockAt || count > 0;

    if (!isUnlocked) {
      html += `
        <div class="employee-card cant-afford" style="--card-color:${emp.color}">
          <div class="emp-emoji">🔒</div>
          <div class="emp-info">
            <div class="emp-name">???</div>
            <div class="emp-desc">¥${formatMoney(emp.unlockAt)}以上稼ぐと解放</div>
          </div>
        </div>`;
      continue;
    }

    let empIncome = emp.baseIncome;
    const empUpgrades = UPGRADES.filter(u => u.target === emp.id && game.upgrades.includes(u.id));
    for (const upg of empUpgrades) empIncome *= upg.multiplier;
    if (game.upgrades.includes('global')) empIncome *= 1.5;
    empIncome *= game.prestigeMultiplier;

    html += `
      <div class="employee-card ${canAfford ? 'can-afford' : 'cant-afford'}" style="--card-color:${emp.color}" onclick="hireEmployee('${emp.id}')">
        <div class="emp-emoji">${emp.emoji}</div>
        <div class="emp-info">
          <div class="emp-name">
            ${emp.name}
            ${count > 0 ? `<span class="emp-count-badge" style="background:${emp.color}">${count}名</span>` : ''}
          </div>
          <div class="emp-income">+${formatMoney(empIncome)}円/秒 × ${count}名</div>
          <div class="emp-desc">${emp.desc}</div>
        </div>
        <div class="hire-btn ${canAfford ? 'can-afford' : ''}" style="--card-color:${emp.color}">
          <span class="hire-label">採用</span>
          <span class="hire-cost">¥${formatMoney(cost)}</span>
        </div>
      </div>`;
  }

  list.innerHTML = html;
}

function renderUpgrades() {
  const list = document.getElementById('upgradeList');
  let html = '';

  for (const upg of UPGRADES) {
    const purchased = game.upgrades.includes(upg.id);
    const canAfford = game.money >= upg.cost;
    html += `
      <div class="upgrade-card ${purchased ? 'purchased' : canAfford ? 'can-afford' : ''}" onclick="buyUpgrade('${upg.id}')">
        <div class="upg-icon">${upg.emoji}</div>
        <div class="upg-info">
          <div class="upg-name">${upg.name}</div>
          <div class="upg-desc">${upg.desc}</div>
        </div>
        ${purchased
          ? `<div class="upg-done">✅</div>`
          : `<div class="upg-cost">¥${formatMoney(upg.cost)}</div>`
        }
      </div>`;
  }

  list.innerHTML = html;
}

function renderMilestones() {
  const list = document.getElementById('milestoneList');
  let html = '';

  for (const ms of MILESTONES) {
    const achieved = ms.check(game);
    if (achieved && !game.milestones.includes(ms.id)) {
      game.milestones.push(ms.id);
    }
    const done = game.milestones.includes(ms.id) || achieved;
    html += `
      <div class="milestone-card ${done ? 'achieved' : ''}">
        <div class="ms-icon">${ms.emoji}</div>
        <div class="ms-info">
          <div class="ms-name">${ms.name}</div>
          <div class="ms-desc">${ms.desc}</div>
        </div>
        <div class="ms-status">${done ? '🏆' : '⬜'}</div>
      </div>`;
  }

  list.innerHTML = html;
}

function renderPrestige() {
  const btn = document.getElementById('prestigeBtn');
  const bonus = document.getElementById('prestigeBonus');
  const history = document.getElementById('prestigeHistory');

  const canPrestige = game.money >= 1000000000;
  btn.disabled = !canPrestige;

  const nextMult = 1 + ((game.prestigeCount + 1) * 0.5);
  bonus.textContent = `転生後の収益ボーナス: ×${nextMult.toFixed(1)}`;

  if (game.prestigeCount > 0) {
    history.innerHTML = `<div class="milestone-card achieved">
      <div class="ms-icon">⭐</div>
      <div class="ms-info">
        <div class="ms-name">${game.prestigeCount}回転生済み</div>
        <div class="ms-desc">現在の収益ボーナス: ×${game.prestigeMultiplier.toFixed(1)}</div>
      </div>
      <div class="ms-status">✨</div>
    </div>`;
  } else {
    history.innerHTML = `<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px;">まだ転生していません</div>`;
  }
}

function updateAll() {
  updateMoneyDisplay();
  renderBuilding();
  renderWaitingList();
  renderEmployees();
  renderUpgrades();
  renderQuests();
  renderRanking();
  renderMilestones();
  renderPrestige();
}

// ============================================================
// GAME LOOP
// ============================================================

let lastTick = Date.now();

function gameLoop() {
  const now = Date.now();
  const delta = (now - lastTick) / 1000;
  lastTick = now;

  const income = getIncomePerSecond() * delta;
  if (income > 0) {
    game.money += income;
    game.totalEarned += income;
  }

  updateMoneyDisplay();
  requestAnimationFrame(gameLoop);
}

setInterval(() => {
  renderEmployees();
  renderUpgrades();
  renderQuests();
  renderRanking();
  renderBuilding();
  renderWaitingList();

  updateQuestProgress('earn', getIncomePerSecond() * 2);
  checkFloorUnlocks();

  let newMilestone = false;
  for (const ms of MILESTONES) {
    if (!game.milestones.includes(ms.id) && ms.check(game)) {
      game.milestones.push(ms.id);
      playSE('milestone');
      showToast(`🏆 実績解除: ${ms.name}！`, 'gold');
      newMilestone = true;
    }
  }

  saveGame();
}, 2000);

// ============================================================
// SOUND SYSTEM (Web Audio API)
// ============================================================

let audioCtx = null;
let soundEnabled = false;
let bgmGain = null;
let bgmStarted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.15;
  bgmGain.connect(audioCtx.destination);
}

function toggleSound() {
  initAudio();
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('on', soundEnabled);
  if (soundEnabled) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!bgmStarted) startBGM();
    bgmGain.gain.value = 0.15;
  } else {
    bgmGain.gain.value = 0;
  }
}

function playSE(type) {
  if (!soundEnabled || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch(type) {
    case 'hire':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
      setTimeout(() => {
        if (!audioCtx) return;
        const osc2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        osc2.connect(g2); g2.connect(audioCtx.destination);
        osc2.type = 'triangle';
        osc2.frequency.value = 659;
        g2.gain.setValueAtTime(0.12, audioCtx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc2.start(); osc2.stop(audioCtx.currentTime + 0.15);
      }, 80);
      break;
    case 'upgrade':
      osc.type = 'square';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);
      break;
    case 'milestone':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
      [659, 784, 1047].forEach((freq, i) => {
        setTimeout(() => {
          if (!audioCtx) return;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine'; o.frequency.value = freq;
          g.gain.setValueAtTime(0.12, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
          o.start(); o.stop(audioCtx.currentTime + 0.3);
        }, (i + 1) * 120);
      });
      break;
    case 'quest':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      break;
    case 'prestige':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(262, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      osc.start(); osc.stop(audioCtx.currentTime + 0.8);
      [330, 392, 523, 659, 784].forEach((freq, i) => {
        setTimeout(() => {
          if (!audioCtx) return;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine'; o.frequency.value = freq;
          g.gain.setValueAtTime(0.12, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
          o.start(); o.stop(audioCtx.currentTime + 0.4);
        }, (i + 1) * 150);
      });
      break;
  }
}

function startBGM() {
  if (!audioCtx || bgmStarted) return;
  bgmStarted = true;
  const notes = [262, 294, 330, 349, 392, 349, 330, 294];
  let noteIndex = 0;

  function playBGMNote() {
    if (!soundEnabled) { setTimeout(playBGMNote, 500); return; }
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g);
    g.connect(bgmGain);
    osc.type = 'sine';
    osc.frequency.value = notes[noteIndex] * 0.5;
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.8);
    noteIndex = (noteIndex + 1) % notes.length;
    setTimeout(playBGMNote, 800);
  }
  playBGMNote();
}

// ============================================================
// QUEST / MISSION SYSTEM
// ============================================================

const QUEST_TEMPLATES = [
  { id: 'q_hire', name: '採用キャンペーン', desc: '{target}人採用しよう', icon: '👥', type: 'hire', targets: [3, 5, 10, 20], rewardMult: 500 },
  { id: 'q_earn', name: '売上目標', desc: '¥{target}を稼ごう', icon: '💰', type: 'earn', targets: [1000, 10000, 100000, 1000000], rewardMult: 0.3 },
  { id: 'q_upgrade', name: '設備投資', desc: '{target}個の強化を購入しよう', icon: '⚡', type: 'upgrade', targets: [1, 2, 3, 5], rewardMult: 2000 },
];

let quests = [];
let questProgress = { hire: 0, earn: 0, upgrade: 0 };
let questLastGenerated = 0;

function generateQuests() {
  const now = Date.now();
  if (quests.length >= 3 && now - questLastGenerated < 300000) return;

  quests = quests.filter(q => !q.claimed);

  while (quests.length < 3) {
    const template = QUEST_TEMPLATES[Math.floor(Math.random() * QUEST_TEMPLATES.length)];
    const difficulty = Math.min(Math.floor(game.prestigeCount + game.totalEmployees / 20), template.targets.length - 1);
    const target = template.targets[Math.max(0, difficulty)];
    const reward = Math.floor(target * template.rewardMult * (1 + game.prestigeCount * 0.2));

    const quest = {
      id: template.id + '_' + now + '_' + quests.length,
      name: template.name,
      desc: template.desc.replace('{target}', template.type === 'earn' ? formatMoney(target) : target),
      icon: template.icon,
      type: template.type,
      target: target,
      progress: 0,
      reward: reward,
      completed: false,
      claimed: false,
      createdAt: now,
      expiresAt: now + 600000,
    };
    quests.push(quest);
  }
  questLastGenerated = now;
  questProgress = { hire: 0, earn: 0, upgrade: 0 };
}

function updateQuestProgress(type, amount = 1) {
  for (const quest of quests) {
    if (quest.claimed || quest.type !== type) continue;
    quest.progress += amount;
    if (quest.progress >= quest.target && !quest.completed) {
      quest.completed = true;
      showToast(`📋 任務達成: ${quest.name}！`, 'gold');
      playSE('quest');
    }
  }
}

function claimQuest(questId) {
  const quest = quests.find(q => q.id === questId);
  if (!quest || !quest.completed || quest.claimed) return;
  quest.claimed = true;
  game.money += quest.reward;
  game.totalEarned += quest.reward;
  showToast(`📋 報酬 ¥${formatMoney(quest.reward)} 獲得！`, 'gold');
  playSE('milestone');
  generateQuests();
  renderQuests();
  updateMoneyDisplay(true);
  saveGame();
}

function renderQuests() {
  const list = document.getElementById('questList');
  if (!list) return;
  let html = '';

  const now = Date.now();
  quests = quests.filter(q => q.claimed || now < q.expiresAt);
  generateQuests();

  for (const quest of quests) {
    if (quest.claimed) continue;
    const progress = Math.min(quest.progress, quest.target);
    const pct = Math.floor((progress / quest.target) * 100);
    const remaining = Math.max(0, quest.expiresAt - now);
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);

    html += `
      <div class="quest-card ${quest.completed ? 'completed' : 'active'}">
        <div class="quest-timer">${mins}:${String(secs).padStart(2, '0')}</div>
        <div class="quest-header">
          <span class="quest-icon">${quest.icon}</span>
          <span class="quest-title">${quest.name}</span>
        </div>
        <div class="quest-desc">${quest.desc}</div>
        <div class="quest-progress-bar">
          <div class="quest-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="quest-progress-text">
          <span>${quest.type === 'earn' ? formatMoney(progress) : progress} / ${quest.type === 'earn' ? formatMoney(quest.target) : quest.target}</span>
          <span>${pct}%</span>
        </div>
        <div class="quest-reward">報酬: ¥${formatMoney(quest.reward)}</div>
        ${quest.completed ? `<button class="quest-claim-btn" onclick="claimQuest('${quest.id}')">報酬を受け取る！</button>` : ''}
      </div>`;
  }

  if (!html) {
    html = `<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px;">新しい任務を準備中...</div>`;
  }

  list.innerHTML = html;
}

// ============================================================
// RANKING SYSTEM
// ============================================================

function renderRanking() {
  const list = document.getElementById('rankingList');
  if (!list) return;

  const rankData = [];
  const totalIncome = getIncomePerSecond();
  const globalMult = game.upgrades.includes('global') ? 1.5 : 1;

  for (const emp of EMPLOYEES) {
    const count = game.employees[emp.id] || 0;
    if (count === 0) continue;

    let empIncome = emp.baseIncome * count;
    const empUpgrades = UPGRADES.filter(u => u.target === emp.id && game.upgrades.includes(u.id));
    for (const upg of empUpgrades) empIncome *= upg.multiplier;
    empIncome *= globalMult * game.prestigeMultiplier;

    rankData.push({
      name: emp.name,
      emoji: emp.emoji,
      count: count,
      income: empIncome,
      color: emp.color,
      share: totalIncome > 0 ? (empIncome / totalIncome * 100) : 0,
    });
  }

  rankData.sort((a, b) => b.income - a.income);

  let html = '';
  if (rankData.length === 0) {
    html = `<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px;">社員を採用すると番付が表示されます</div>`;
  } else {
    html += `<div class="ranking-card" style="border-color:var(--accent);margin-bottom:16px;">
      <div style="font-size:24px;">🏢</div>
      <div class="rank-info">
        <div class="rank-name">全社合計</div>
        <div class="rank-income">+${formatMoney(totalIncome)}円/秒</div>
      </div>
      <div style="font-size:13px;color:var(--accent);font-family:'DotGothic16',monospace;">${game.totalEmployees}名</div>
    </div>`;

    rankData.forEach((emp, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : '';
      const medals = ['🥇', '🥈', '🥉'];
      html += `
        <div class="ranking-card ${rankClass}">
          <div class="rank-num">${rank <= 3 ? medals[rank-1] : '#' + rank}</div>
          <div style="font-size:28px;flex-shrink:0;">${emp.emoji}</div>
          <div class="rank-info">
            <div class="rank-name">${emp.name} <span style="font-size:10px;color:var(--text-dim);">(${emp.count}名)</span></div>
            <div class="rank-income">+${formatMoney(emp.income)}円/秒</div>
            <div class="rank-bar">
              <div class="rank-bar-fill" style="width:${emp.share}%;background:${emp.color};"></div>
            </div>
            <div class="rank-share">収益シェア: ${emp.share.toFixed(1)}%</div>
          </div>
        </div>`;
    });
  }

  list.innerHTML = html;
}
